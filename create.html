<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Patholytica — Create Article</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg-color: #0f0f0f;
            --text-primary: #f1f1f1;
            --text-secondary: #aaa;
            --card-bg: #181818;
            --hover-bg: #222;
            --border-color: #2a2a2a;
            --accent: #3ea6ff;
            --accent-hover: #2d8ed6;
            --success: #2ecc71;
            --error: #e74c3c;
            --warning: #f39c12;
        }

        body.light-theme {
            --bg-color: #f9f9f9;
            --text-primary: #0f0f0f;
            --text-secondary: #606060;
            --card-bg: #ffffff;
            --hover-bg: #f0f0f0;
            --border-color: #e0e0e0;
            --accent: #065fd4;
            --accent-hover: #0448a3;
            --success: #27ae60;
            --error: #c0392b;
            --warning: #e67e22;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-color);
            color: var(--text-primary);
            transition: background 0.2s ease, color 0.2s ease;
        }

        .app-container {
            position: fixed;
            top: 0; left: 50%;
            transform: translateX(-50%);
            width: 100%; max-width: 480px;
            height: 100vh;
            background: var(--bg-color);
            overflow-y: auto;
        }
        .app-container::-webkit-scrollbar { width: 3px; }
        .app-container::-webkit-scrollbar-track { background: transparent; }
        .app-container::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 2px; }

        /* ── Header ── */
        .header-bar {
            position: sticky; top: 0;
            background: var(--bg-color);
            border-bottom: 1px solid var(--border-color);
            padding: 14px 18px;
            display: flex; align-items: center; justify-content: space-between;
            z-index: 50;
            backdrop-filter: blur(10px);
        }

        .header-left { display: flex; align-items: center; gap: 12px; }

        .back-btn {
            width: 36px; height: 36px;
            border-radius: 50%;
            background: var(--hover-bg);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            font-size: 15px;
            transition: all 0.2s ease;
        }
        .back-btn:hover { background: var(--border-color); }

        .header-title {
            font-size: 15px;
            font-weight: 600;
            color: var(--text-secondary);
            letter-spacing: 0.01em;
        }

        .header-actions { display: flex; gap: 10px; align-items: center; }

        .icon-btn {
            width: 36px; height: 36px;
            border-radius: 50%;
            background: var(--hover-bg);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            font-size: 14px;
            transition: all 0.2s ease;
        }
        .icon-btn:hover { background: var(--border-color); }

        .publish-btn {
            padding: 8px 22px;
            border-radius: 20px;
            background: var(--accent);
            color: white;
            border: none;
            cursor: pointer;
            font-size: 13px;
            font-weight: 700;
            letter-spacing: 0.02em;
            transition: all 0.2s ease;
        }
        .publish-btn:hover { background: var(--accent-hover); transform: translateY(-1px); }
        .publish-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

        /* ── Editor ── */
        .editor-wrapper {
            padding: 24px 20px;
            padding-bottom: 120px;
        }

        .title-section { margin-bottom: 24px; }

        .title-label {
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--text-secondary);
            margin-bottom: 8px;
        }

        .article-title-input {
            font-size: 28px;
            font-weight: 800;
            color: var(--text-primary);
            line-height: 1.2;
            border: none;
            outline: none;
            background: transparent;
            width: 100%;
            resize: none;
            overflow: hidden;
            padding: 0;
            font-family: inherit;
            letter-spacing: -0.02em;
        }
        .article-title-input::placeholder { color: var(--text-secondary); opacity: 0.4; }

        .char-counter {
            font-size: 11px;
            color: var(--text-secondary);
            text-align: right;
            margin-top: 6px;
        }
        .char-counter.warning { color: var(--warning); }
        .char-counter.over { color: var(--error); font-weight: 700; }

        /* ── Content divider ── */
        .section-divider {
            display: flex; align-items: center; gap: 10px;
            margin-bottom: 16px;
        }
        .section-divider-line { flex: 1; height: 1px; background: var(--border-color); }
        .section-divider-label {
            font-size: 10px; font-weight: 700;
            letter-spacing: 0.1em; text-transform: uppercase;
            color: var(--text-secondary); opacity: 0.6;
        }

        /* ── Content blocks ── */
        .content-item { margin-bottom: 12px; }

        .content-block {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 12px 14px;
            transition: border-color 0.2s ease;
        }
        .content-block:focus-within { border-color: var(--accent); }

        .content-editable {
            outline: none;
            min-height: 1.6em;
            word-wrap: break-word;
            overflow-wrap: break-word;
            width: 100%;
            cursor: text;
            color: var(--text-primary);
            font-size: 15px;
            line-height: 1.6;
        }
        .content-editable:empty::before {
            content: 'Write something...';
            color: var(--text-secondary);
            opacity: 0.4;
        }

        .block-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 8px;
            padding-top: 8px;
            border-top: 1px solid var(--border-color);
        }

        .block-char-counter { font-size: 11px; color: var(--text-secondary); }
        .block-char-counter.warning { color: var(--warning); }
        .block-char-counter.over { color: var(--error); font-weight: 700; }

        .line-btn {
            width: 26px; height: 26px;
            border-radius: 50%;
            background: transparent;
            border: 1px solid var(--border-color);
            color: var(--text-secondary);
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            font-size: 11px;
            transition: all 0.2s ease;
        }
        .line-btn:hover { background: var(--error); border-color: var(--error); color: white; }

        /* ── Media embeds ── */
        .media-embed {
            margin: 0;
            max-width: 100%;
            position: relative;
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            overflow: hidden;
        }

        .media-embed-inner { position: relative; }

        .media-embed img {
            width: 100%; max-width: 100%; height: auto;
            display: block;
            border-radius: 0;
        }

        .media-caption {
            font-size: 13px;
            color: var(--text-secondary);
            padding: 10px 14px;
            outline: none;
            cursor: text;
            border-top: 1px solid var(--border-color);
            background: var(--card-bg);
            min-height: 36px;
        }
        .media-caption:empty::before { content: 'Add a caption...'; opacity: 0.4; }

        .remove-media-btn {
            position: absolute;
            top: 8px; right: 8px;
            width: 30px; height: 30px;
            border-radius: 50%;
            background: rgba(0,0,0,0.75);
            color: white;
            border: none;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            font-size: 12px;
            opacity: 0;
            transition: opacity 0.2s ease, background 0.2s ease;
            z-index: 10;
        }
        .media-embed:hover .remove-media-btn { opacity: 1; }
        .media-embed-inner:hover .remove-media-btn { opacity: 1; }
        .remove-media-btn:hover { background: var(--error); }

        .media-badge {
            position: absolute;
            top: 8px; left: 8px;
            background: rgba(0,0,0,0.7);
            color: white;
            font-size: 10px;
            font-weight: 700;
            padding: 3px 8px;
            border-radius: 10px;
            letter-spacing: 0.03em;
        }

        /* PDF block */
        .pdf-embed-header {
            display: flex; align-items: center; gap: 10px;
            padding: 14px 16px;
        }
        .pdf-embed-header i { color: #e74c3c; font-size: 20px; flex-shrink: 0; }
        .pdf-embed-name {
            font-size: 13px; font-weight: 600;
            flex: 1;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
            color: var(--text-primary);
        }
        .pdf-size-badge {
            font-size: 11px; color: var(--text-secondary);
            background: var(--hover-bg);
            padding: 2px 8px; border-radius: 8px;
            flex-shrink: 0;
        }
        .pdf-preview-bar {
            background: var(--hover-bg);
            border-top: 1px solid var(--border-color);
            padding: 10px 16px;
            font-size: 12px;
            color: var(--text-secondary);
            display: flex; align-items: center; gap: 8px;
        }
        .pdf-preview-bar i { color: var(--accent); }

        /* YouTube block */
        .yt-embed-header {
            display: flex; align-items: center; gap: 10px;
            padding: 12px 16px;
        }
        .yt-embed-header i { color: #ff0000; font-size: 16px; }
        .yt-embed-title {
            font-size: 13px; font-weight: 600;
            flex: 1;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
            color: var(--text-primary);
        }
        .yt-embed-block iframe {
            width: 100%; aspect-ratio: 16/9;
            border: none; display: block;
        }

        /* Audio player */
        .custom-audio-player {
            padding: 14px 16px;
            display: flex; align-items: center; gap: 12px;
        }
        .play-btn {
            width: 40px; height: 40px;
            border-radius: 50%;
            background: var(--accent);
            border: none; color: white;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            font-size: 14px;
            transition: all 0.2s ease;
            flex-shrink: 0;
        }
        .play-btn:hover { background: var(--accent-hover); transform: scale(1.05); }
        .audio-info { flex: 1; min-width: 0; }
        .audio-title {
            font-size: 13px; font-weight: 600;
            margin-bottom: 8px;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
            color: var(--text-primary);
        }
        .waveform-container {
            position: relative; height: 28px;
            background: var(--hover-bg);
            border-radius: 4px; margin-bottom: 5px;
            cursor: pointer; overflow: hidden;
        }
        .waveform-progress {
            position: absolute; top: 0; left: 0;
            height: 100%; background: var(--accent); opacity: 0.3;
            transition: width 0.1s linear;
        }
        .waveform-bars {
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100%;
            display: flex; align-items: center; justify-content: space-around;
            padding: 0 4px;
        }
        .waveform-bar { width: 2px; background: var(--text-secondary); border-radius: 2px; opacity: 0.5; }
        .audio-time { display: flex; justify-content: space-between; font-size: 10px; color: var(--text-secondary); }

        /* ── YouTube modal ── */
        .modal-overlay {
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(4px);
            z-index: 200;
            display: none; align-items: flex-end; justify-content: center;
            padding: 0;
        }
        .modal-overlay.show { display: flex; }

        .modal-box {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 20px 20px 0 0;
            padding: 24px 24px calc(24px + env(safe-area-inset-bottom));
            width: 100%; max-width: 480px;
            animation: slideUp 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        @keyframes slideUp {
            from { transform: translateY(100%); opacity: 0; }
            to   { transform: translateY(0);    opacity: 1; }
        }

        .modal-handle {
            width: 36px; height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 0 auto 20px;
        }

        .modal-title {
            font-size: 17px; font-weight: 700;
            margin-bottom: 16px;
            display: flex; align-items: center; gap: 10px;
        }
        .modal-title i { color: #ff0000; }

        .modal-input {
            width: 100%;
            background: var(--hover-bg);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            padding: 13px 14px;
            font-size: 14px;
            color: var(--text-primary);
            outline: none;
            font-family: inherit;
            margin-bottom: 14px;
            transition: border-color 0.2s ease;
        }
        .modal-input:focus { border-color: var(--accent); }
        .modal-input::placeholder { color: var(--text-secondary); opacity: 0.6; }

        .modal-actions { display: flex; gap: 10px; }
        .modal-cancel {
            flex: 1; padding: 12px;
            border-radius: 10px;
            background: var(--hover-bg);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            cursor: pointer;
            font-size: 14px; font-weight: 600;
            transition: background 0.2s ease;
        }
        .modal-cancel:hover { background: var(--border-color); }
        .modal-confirm {
            flex: 1; padding: 12px;
            border-radius: 10px;
            background: #ff0000;
            border: none; color: white;
            cursor: pointer;
            font-size: 14px; font-weight: 700;
            transition: background 0.2s ease;
        }
        .modal-confirm:hover { background: #cc0000; }

        /* ── Action bar ── */
        .action-bar {
            position: fixed; bottom: 0;
            left: 50%; transform: translateX(-50%);
            width: 100%; max-width: 480px;
            background: var(--card-bg);
            border-top: 1px solid var(--border-color);
            padding: 10px 16px;
            padding-bottom: calc(10px + env(safe-area-inset-bottom));
            display: flex; gap: 6px;
            z-index: 100;
            overflow-x: auto;
        }
        .action-bar::-webkit-scrollbar { display: none; }

        .action-btn {
            flex: 1; min-width: 56px;
            display: flex; align-items: center; justify-content: center; gap: 5px;
            background: var(--hover-bg);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            padding: 9px 10px;
            cursor: pointer;
            transition: all 0.15s ease;
            font-size: 12px; font-weight: 600;
            color: var(--text-secondary);
            white-space: nowrap;
            flex-direction: column;
            gap: 4px;
        }
        .action-btn:hover { background: var(--border-color); color: var(--text-primary); border-color: var(--accent); }
        .action-btn:active { transform: scale(0.94); }
        .action-btn svg {
            width: 18px; height: 18px;
            stroke: currentColor;
            fill: none; stroke-width: 2;
        }
        .action-btn i { font-size: 16px; }
        .action-btn span { font-size: 10px; font-weight: 700; letter-spacing: 0.02em; }

        .action-btn.text-btn { color: var(--accent); border-color: var(--accent); background: rgba(62,166,255,0.08); }
        .action-btn.text-btn:hover { background: rgba(62,166,255,0.15); }

        /* ── Upload progress overlay ── */
        .upload-overlay {
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(4px);
            z-index: 300;
            display: none;
            align-items: center; justify-content: center;
        }
        .upload-overlay.show { display: flex; }
        .upload-box {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 32px;
            text-align: center;
            width: 260px;
        }
        .upload-spinner {
            width: 44px; height: 44px;
            border: 3px solid var(--border-color);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 16px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .upload-label { font-size: 14px; font-weight: 600; color: var(--text-primary); margin-bottom: 6px; }
        .upload-sub { font-size: 12px; color: var(--text-secondary); }

        /* ── Notification ── */
        .notification {
            position: fixed;
            top: 70px; left: 50%; transform: translateX(-50%);
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            padding: 14px 18px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
            z-index: 1000;
            display: none; align-items: center; gap: 10px;
            min-width: 280px; max-width: 380px;
        }
        .notification.show { display: flex; animation: slideDown 0.25s ease; }
        .notification.success { border-left: 3px solid var(--success); }
        .notification.error   { border-left: 3px solid var(--error); }
        .notification.warning { border-left: 3px solid var(--warning); }
        .notification i { font-size: 18px; flex-shrink: 0; }
        .notification.success i { color: var(--success); }
        .notification.error   i { color: var(--error); }
        .notification.warning i { color: var(--warning); }
        .notification span { font-size: 13px; font-weight: 500; }

        @keyframes slideDown {
            from { transform: translateX(-50%) translateY(-20px); opacity: 0; }
            to   { transform: translateX(-50%) translateY(0);     opacity: 1; }
        }

        @media (max-width: 480px) {
            .article-title-input { font-size: 24px; }
            .notification { left: 12px; right: 12px; transform: none; min-width: auto; }
            .notification.show { animation: slideDownM 0.25s ease; }
            @keyframes slideDownM {
                from { transform: translateY(-20px); opacity: 0; }
                to   { transform: translateY(0);     opacity: 1; }
            }
        }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header-bar">
        <div class="header-left">
            <button class="back-btn" onclick="goBack()">
                <i class="fas fa-arrow-left"></i>
            </button>
            <span class="header-title">New Article</span>
        </div>
        <div class="header-actions">
            <button class="icon-btn" onclick="toggleTheme()" title="Toggle theme">
                <i class="fas fa-circle-half-stroke"></i>
            </button>
            <button class="publish-btn" id="publishBtn" onclick="publishArticle()">
                Publish
            </button>
        </div>
    </div>

    <div class="editor-wrapper">
        <!-- Title -->
        <div class="title-section">
            <div class="title-label">Title</div>
            <textarea class="article-title-input" id="articleTitle" placeholder="Give your article a title..." rows="1"
                oninput="autoResizeTitle(this); updateTitleCounter()"></textarea>
            <div class="char-counter" id="titleCounter">0 / 60</div>
        </div>

        <!-- Content -->
        <div class="section-divider">
            <div class="section-divider-line"></div>
            <div class="section-divider-label">Content</div>
            <div class="section-divider-line"></div>
        </div>

        <div id="contentItems">
            <div class="content-item">
                <div class="content-block">
                    <div class="content-editable" contenteditable="true"
                        oninput="updateBlockCounter(this)"></div>
                    <div class="block-footer">
                        <span class="block-char-counter">0 / 200</span>
                        <button class="line-btn" onclick="deleteLine(this)" title="Delete">
                            <i class="fas fa-trash"></i>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Action bar -->
<div class="action-bar">
    <button class="action-btn text-btn" onclick="addNewParagraph()">
        <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        <span>TEXT</span>
    </button>
    <label class="action-btn">
        <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
        <span>IMAGE</span>
        <input type="file" accept="image/*" onchange="handleImageUpload(event)" style="display:none;">
    </label>
    <label class="action-btn">
        <svg viewBox="0 0 24 24"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
        <span>AUDIO</span>
        <input type="file" accept="audio/*" onchange="handleAudioUpload(event)" style="display:none;">
    </label>
    <label class="action-btn">
        <i class="fas fa-file-pdf" style="color:#e74c3c;"></i>
        <span>PDF</span>
        <input type="file" accept="application/pdf" onchange="handlePdfUpload(event)" style="display:none;">
    </label>
    <button class="action-btn" onclick="openYouTubeModal()">
        <i class="fab fa-youtube" style="color:#ff0000;"></i>
        <span>VIDEO</span>
    </button>
</div>

<!-- YouTube modal (bottom sheet) -->
<div class="modal-overlay" id="ytModal">
    <div class="modal-box">
        <div class="modal-handle"></div>
        <div class="modal-title">
            <i class="fab fa-youtube"></i>
            Embed YouTube Video
        </div>
        <input class="modal-input" id="ytUrlInput" type="url"
            placeholder="https://www.youtube.com/watch?v=...">
        <div class="modal-actions">
            <button class="modal-cancel" onclick="closeYouTubeModal()">Cancel</button>
            <button class="modal-confirm" onclick="embedYouTube()">Embed</button>
        </div>
    </div>
</div>

<!-- Upload progress overlay -->
<div class="upload-overlay" id="uploadOverlay">
    <div class="upload-box">
        <div class="upload-spinner"></div>
        <div class="upload-label" id="uploadLabel">Uploading PDF...</div>
        <div class="upload-sub">Please wait</div>
    </div>
</div>

<!-- Notification -->
<div class="notification" id="notification">
    <i class="fas fa-check-circle"></i>
    <span id="notificationText"></span>
</div>

<script>
const TITLE_MAX     = 60;
const BLOCK_MAX     = 200;
const IMAGE_MAX_MB  = 2;
const PDF_MAX_MB    = 10;
const AUDIO_MAX_SEC = 30;

let lineCounter = 1;

function goBack() {
    if (document.referrer && document.referrer.includes(window.location.host)) {
        window.history.back();
    } else {
        window.location.href = 'index.html';
    }
}

function toggleTheme() {
    document.body.classList.toggle('light-theme');
    localStorage.setItem('theme', document.body.classList.contains('light-theme') ? 'light' : 'dark');
}
if (localStorage.getItem('theme') === 'light') document.body.classList.add('light-theme');

function autoResizeTitle(t) { t.style.height = 'auto'; t.style.height = t.scrollHeight + 'px'; }

function updateTitleCounter() {
    const input = document.getElementById('articleTitle');
    const counter = document.getElementById('titleCounter');
    if (input.value.length > TITLE_MAX) input.value = input.value.slice(0, TITLE_MAX);
    const len = input.value.length;
    counter.textContent = `${len} / ${TITLE_MAX}`;
    counter.className = 'char-counter' + (len >= TITLE_MAX ? ' over' : len >= TITLE_MAX * 0.85 ? ' warning' : '');
    autoResizeTitle(input);
}

function updateBlockCounter(editable) {
    const len = editable.textContent.length;
    const footer = editable.closest('.content-block').querySelector('.block-char-counter');
    if (len > BLOCK_MAX) {
        editable.textContent = editable.textContent.slice(0, BLOCK_MAX);
        const sel = window.getSelection(), range = document.createRange();
        range.selectNodeContents(editable); range.collapse(false);
        sel.removeAllRanges(); sel.addRange(range);
    }
    const cur = Math.min(len, BLOCK_MAX);
    footer.textContent = `${cur} / ${BLOCK_MAX}`;
    footer.className = 'block-char-counter' + (cur >= BLOCK_MAX ? ' over' : cur >= BLOCK_MAX * 0.85 ? ' warning' : '');
}

function addNewParagraph() {
    lineCounter++;
    const item = document.createElement('div');
    item.className = 'content-item';
    item.innerHTML = `
        <div class="content-block">
            <div class="content-editable" contenteditable="true" oninput="updateBlockCounter(this)"></div>
            <div class="block-footer">
                <span class="block-char-counter">0 / ${BLOCK_MAX}</span>
                <button class="line-btn" onclick="deleteLine(this)"><i class="fas fa-trash"></i></button>
            </div>
        </div>`;
    document.getElementById('contentItems').appendChild(item);
    item.querySelector('.content-editable').focus();
}

function deleteLine(btn) {
    const item = btn.closest('.content-item');
    if (document.querySelectorAll('.content-item .content-editable').length > 1) item.remove();
    else showNotification('Cannot delete the last block', 'error');
}

// ── Image (stays as base64 — small enough) ────────────────
function handleImageUpload(event) {
    const file = event.target.files[0];
    if (!file) return;
    if (file.size > IMAGE_MAX_MB * 1024 * 1024) {
        showNotification(`Images must be under ${IMAGE_MAX_MB} MB`, 'error');
        event.target.value = ''; return;
    }
    const reader = new FileReader();
    reader.onload = function(e) {
        const sizeText = file.size >= 1024*1024
            ? `${(file.size/1024/1024).toFixed(1)} MB`
            : `${(file.size/1024).toFixed(0)} KB`;
        const item = document.createElement('div');
        item.className = 'content-item';
        item.innerHTML = `
            <div class="media-embed">
                <div class="media-embed-inner">
                    <button class="remove-media-btn" onclick="removeMedia(this)"><i class="fas fa-times"></i></button>
                    <span class="media-badge"><i class="fas fa-image"></i> ${sizeText}</span>
                    <img src="${e.target.result}" alt="Uploaded image">
                </div>
                <div class="media-caption" contenteditable="true"></div>
            </div>`;
        document.getElementById('contentItems').appendChild(item);
    };
    reader.readAsDataURL(file);
    event.target.value = '';
}

// ── Audio (stays as base64 — small, 30s max) ──────────────
function handleAudioUpload(event) {
    const file = event.target.files[0];
    if (!file) return;
    const tempUrl = URL.createObjectURL(file);
    const tempAudio = new Audio(tempUrl);
    tempAudio.addEventListener('loadedmetadata', function() {
        URL.revokeObjectURL(tempUrl);
        if (tempAudio.duration > AUDIO_MAX_SEC) {
            showNotification(`Audio must be ${AUDIO_MAX_SEC}s or less (yours: ${Math.round(tempAudio.duration)}s)`, 'error');
            event.target.value = ''; return;
        }
        const reader = new FileReader();
        reader.onload = function(e) {
            const audioId = 'audio-' + Math.random().toString(36).substr(2, 9);
            const dur = Math.floor(tempAudio.duration);
            const dStr = `${Math.floor(dur/60)}:${(dur%60).toString().padStart(2,'0')}`;
            const item = document.createElement('div');
            item.className = 'content-item';
            item.innerHTML = `
                <div class="media-embed">
                    <div class="media-embed-inner" style="position:relative;">
                        <button class="remove-media-btn" onclick="removeMedia(this)" style="opacity:1;top:8px;right:8px;"><i class="fas fa-times"></i></button>
                        <div class="custom-audio-player">
                            <button class="play-btn" onclick="toggleAudio(this,'${audioId}')"><i class="fas fa-play"></i></button>
                            <div class="audio-info">
                                <div class="audio-title">${file.name}</div>
                                <div class="waveform-container" onclick="seekAudio(event,this,'${audioId}')">
                                    <div class="waveform-progress"></div>
                                    <div class="waveform-bars">
                                        ${Array(15).fill(0).map(()=>`<div class="waveform-bar" style="height:${Math.random()*60+20}%"></div>`).join('')}
                                    </div>
                                </div>
                                <div class="audio-time"><span class="current-time">0:00</span><span class="duration">${dStr}</span></div>
                            </div>
                            <audio id="${audioId}" src="${e.target.result}" style="display:none;"></audio>
                        </div>
                    </div>
                    <div class="media-caption" contenteditable="true"></div>
                </div>`;
            document.getElementById('contentItems').appendChild(item);
        };
        reader.readAsDataURL(file);
        event.target.value = '';
    });
    tempAudio.addEventListener('error', function() {
        showNotification('Could not read audio file', 'error');
        event.target.value = '';
    });
}

// ── PDF — stored as File object, uploaded to Supabase Storage on publish ──
// We keep a map of DOM element → File so we don't base64 encode it
const pdfFileMap = new WeakMap();

function handlePdfUpload(event) {
    const file = event.target.files[0];
    if (!file) return;
    if (file.size > PDF_MAX_MB * 1024 * 1024) {
        showNotification(`PDFs must be under ${PDF_MAX_MB} MB`, 'error');
        event.target.value = ''; return;
    }
    const sizeText = file.size >= 1024*1024
        ? `${(file.size/1024/1024).toFixed(1)} MB`
        : `${(file.size/1024).toFixed(0)} KB`;

    const item = document.createElement('div');
    item.className = 'content-item';
    item.innerHTML = `
        <div class="media-embed" data-type="pdf">
            <div class="media-embed-inner" style="position:relative;">
                <button class="remove-media-btn" onclick="removeMedia(this)" style="opacity:1;"><i class="fas fa-times"></i></button>
                <div class="pdf-embed-header">
                    <i class="fas fa-file-pdf"></i>
                    <span class="pdf-embed-name">${file.name}</span>
                    <span class="pdf-size-badge">${sizeText}</span>
                </div>
                <div class="pdf-preview-bar">
                    <i class="fas fa-info-circle"></i>
                    PDF will be uploaded when you publish
                </div>
            </div>
            <div class="media-caption" contenteditable="true"></div>
        </div>`;
    document.getElementById('contentItems').appendChild(item);

    // Store the File reference keyed to the media-embed element
    const mediaEmbedEl = item.querySelector('.media-embed');
    pdfFileMap.set(mediaEmbedEl, file);

    event.target.value = '';
}

// ── YouTube ───────────────────────────────────────────────
function openYouTubeModal() {
    document.getElementById('ytUrlInput').value = '';
    document.getElementById('ytModal').classList.add('show');
    setTimeout(() => document.getElementById('ytUrlInput').focus(), 150);
}
function closeYouTubeModal() {
    document.getElementById('ytModal').classList.remove('show');
}
function extractYouTubeId(url) {
    const m = url.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/|youtube\.com\/embed\/|youtube\.com\/shorts\/)([A-Za-z0-9_-]{11})/);
    return m ? m[1] : null;
}
function embedYouTube() {
    const url = document.getElementById('ytUrlInput').value.trim();
    const videoId = extractYouTubeId(url);
    if (!videoId) { showNotification('Please enter a valid YouTube URL', 'error'); return; }
    closeYouTubeModal();
    const item = document.createElement('div');
    item.className = 'content-item';
    item.innerHTML = `
        <div class="media-embed" data-type="youtube" data-videoid="${videoId}">
            <div class="media-embed-inner" style="position:relative;">
                <button class="remove-media-btn" onclick="removeMedia(this)" style="opacity:1;z-index:20;"><i class="fas fa-times"></i></button>
                <div class="yt-embed-header">
                    <i class="fab fa-youtube"></i>
                    <span class="yt-embed-title">youtube.com/watch?v=${videoId}</span>
                </div>
                <div class="yt-embed-block">
                    <iframe src="https://www.youtube.com/embed/${videoId}"
                        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
                        allowfullscreen></iframe>
                </div>
            </div>
            <div class="media-caption" contenteditable="true"></div>
        </div>`;
    document.getElementById('contentItems').appendChild(item);
    showNotification('YouTube video embedded', 'success');
}

document.getElementById('ytModal').addEventListener('click', function(e) {
    if (e.target === this) closeYouTubeModal();
});
document.getElementById('ytUrlInput').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') embedYouTube();
});

// ── Media helpers ─────────────────────────────────────────
function removeMedia(btn) { btn.closest('.content-item').remove(); }

function toggleAudio(btn, audioId) {
    const player = btn.closest('.custom-audio-player');
    const audio  = document.getElementById(audioId);
    const icon   = btn.querySelector('i');
    if (audio.paused) {
        audio.play(); icon.className = 'fas fa-pause';
        audio.ontimeupdate = function() {
            const pct = (audio.currentTime / audio.duration) * 100;
            player.querySelector('.waveform-progress').style.width = pct + '%';
            const m = Math.floor(audio.currentTime/60), s = Math.floor(audio.currentTime%60);
            player.querySelector('.current-time').textContent = `${m}:${s.toString().padStart(2,'0')}`;
        };
        audio.onended = function() {
            icon.className = 'fas fa-play';
            player.querySelector('.waveform-progress').style.width = '0%';
            player.querySelector('.current-time').textContent = '0:00';
        };
    } else { audio.pause(); icon.className = 'fas fa-play'; }
}

function seekAudio(event, container, audioId) {
    const audio = document.getElementById(audioId);
    const rect  = container.getBoundingClientRect();
    audio.currentTime = ((event.clientX - rect.left) / rect.width) * audio.duration;
}

// ── Notification ──────────────────────────────────────────
function showNotification(message, type = 'success') {
    const el   = document.getElementById('notification');
    const text = document.getElementById('notificationText');
    const icon = el.querySelector('i');
    text.textContent = message;
    el.className = `notification ${type} show`;
    icon.className = type === 'success' ? 'fas fa-check-circle'
                   : type === 'warning' ? 'fas fa-exclamation-triangle'
                   : 'fas fa-exclamation-circle';
    setTimeout(() => el.classList.remove('show'), 4000);
}

function showUploadOverlay(label) {
    document.getElementById('uploadLabel').textContent = label;
    document.getElementById('uploadOverlay').classList.add('show');
}
function hideUploadOverlay() {
    document.getElementById('uploadOverlay').classList.remove('show');
}
</script>

// ── Upload PDF to Supabase Storage, return public URL ─────
async function uploadPdfToStorage(file, articleId) {
    const ext      = file.name.split('.').pop();
    const path     = `pdfs/${articleId}/${Date.now()}.${ext}`;
    const { data, error } = await supabase.storage
        .from('media')
        .upload(path, file, { contentType: 'application/pdf', upsert: false });
    if (error) throw error;
    const { data: urlData } = supabase.storage.from('media').getPublicUrl(path);
    return urlData.publicUrl;
}

// ── Publish ───────────────────────────────────────────────
window.publishArticle = async function() {
    if (!currentUser) { showNotification('Please log in to publish', 'error'); return; }

    const titleEl = document.getElementById('articleTitle');
    const title   = titleEl.value.trim();
    if (!title) { showNotification('Please add a title', 'error'); return; }
    if (title.length > 60) { showNotification('Title must be 60 characters or less', 'error'); titleEl.focus(); return; }

    const editables = document.querySelectorAll('.content-editable');
    for (const el of editables) {
        if (el.textContent.length > 200) {
            showNotification('Each text block must be 200 characters or less', 'error');
            el.focus(); return;
        }
    }

    const contentLines = [];
    editables.forEach(el => { const t = el.textContent.trim(); if (t) contentLines.push(t); });
    const content = contentLines.join('\n\n');
    if (!content) { showNotification('Please add some content', 'error'); return; }

    const publishBtn = document.getElementById('publishBtn');
    publishBtn.disabled = true; publishBtn.textContent = 'Publishing...';

    try {
        // 1. Insert article first (we need the ID for PDF storage paths)
        const { data: article, error: articleError } = await supabase
            .from('articles')
            .insert([{ title, content, firebase_user_id: currentUser.uid, views: 0, likes: 0 }])
            .select().single();
        if (articleError) throw articleError;

        // 2. Collect media, uploading PDFs to Storage
        const mediaItems = [];
        const mediaEmbeds = document.querySelectorAll('.media-embed');

        for (let index = 0; index < mediaEmbeds.length; index++) {
            const media   = mediaEmbeds[index];
            const caption = media.querySelector('.media-caption')?.textContent.trim() || '';
            const type    = media.dataset.type;

            if (type === 'pdf') {
                // Retrieve the stored File object
                const pdfFile = window.pdfFileMap && window.pdfFileMap.get(media);
                // pdfFileMap is defined in the non-module script, access via window won't work directly
                // Instead we stored it on the element itself as a property
                const file = media._pdfFile;
                if (file) {
                    showUploadOverlay(`Uploading PDF ${index + 1}...`);
                    try {
                        const publicUrl = await uploadPdfToStorage(file, article.id);
                        mediaItems.push({ type: 'pdf', src: publicUrl, caption, order: index });
                    } catch (uploadErr) {
                        console.error('PDF upload failed:', uploadErr);
                        showNotification('PDF upload failed: ' + uploadErr.message, 'error');
                    } finally {
                        hideUploadOverlay();
                    }
                }
            } else if (type === 'youtube') {
                const videoId = media.dataset.videoid;
                if (videoId) {
                    mediaItems.push({
                        type: 'youtube',
                        src: `https://www.youtube.com/embed/${videoId}`,
                        caption, order: index
                    });
                }
            } else {
                const img   = media.querySelector('img');
                const audio = media.querySelector('audio');
                if (img)   mediaItems.push({ type: 'image', src: img.src,   caption, order: index });
                if (audio) mediaItems.push({ type: 'audio', src: audio.src, caption, order: index });
            }
        }

        // 3. Insert media rows
        if (mediaItems.length > 0) {
            const { error: mediaError } = await supabase.from('media').insert(
                mediaItems.map(item => ({
                    article_id: article.id, type: item.type,
                    url: item.src, caption: item.caption, display_order: item.order
                }))
            );
            if (mediaError) console.error('Media insert error:', mediaError);
        }

        // 4. Auto-create library
        let libraryId = null;
        try {
            const userId = currentUserData?.user_id ?? currentUserData?.id ?? null;
            const { data: library, error: libError } = await supabase.from('playlists')
                .insert([{ name: title, description: `Auto-created library for "${title}"`, user_id: userId }])
                .select().single();
            if (!libError) {
                libraryId = library.id;
                await supabase.from('playlist_items').insert([{ playlist_id: library.id, article_id: article.id }]);
            }
        } catch(e) { console.error('Auto-library error:', e); }

        showNotification('Article published!', 'success');
        setTimeout(() => {
            window.location.href = libraryId ? `playlist.html?id=${libraryId}` : `article.html?id=${article.id}`;
        }, 1200);

    } catch (error) {
        console.error('Publish error:', error);
        showNotification('Error publishing: ' + error.message, 'error');
        publishBtn.disabled = false; publishBtn.textContent = 'Publish';
    }
};
</script>

<!-- Bridge: attach File to DOM element so the module script can read it -->
<script>
// Patch handlePdfUpload to also store _pdfFile on the element
const _originalHandlePdf = handlePdfUpload;
window.handlePdfUpload = function(event) {
    const file = event.target.files[0];
    if (!file) return;
    _originalHandlePdf(event);
    // After a tick the item will be appended — attach the file ref
    setTimeout(() => {
        const allPdfs = document.querySelectorAll('.media-embed[data-type="pdf"]');
        const last = allPdfs[allPdfs.length - 1];
        if (last) last._pdfFile = file;
    }, 50);
};
</script>
