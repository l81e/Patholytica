<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Library — Patholytica</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root {
  --bg-color: #1f1f1f;
  --text-primary: #fff;
  --text-secondary: #aaa;
  --card-bg: #1f1f1f;
  --hover-bg: #2a2a2a;
  --border-color: #303030;
  --accent: #f1d19e;
  --accent-hover: #d4b47a;
  --accent-green: #2ecc71;
}

* { box-sizing: border-box; }
html, body {
  margin: 0;
  padding: 0;
  min-height: 100%;
  font-family: "Roboto", Arial, sans-serif;
  overflow-x: hidden;
  max-width: 100vw;
}
body {
  background: var(--bg-color);
  color: var(--text-primary);
}

/* Header */
.header-wrapper {
  position: fixed;
  top: 0; left: 0; right: 0;
  background: var(--bg-color);
  padding-top: env(safe-area-inset-top);
  border-bottom: 1px solid var(--border-color);
  z-index: 40;
}
.header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 24px;
}
.header-left {
  display: flex;
  align-items: center;
  gap: 12px;
}
.back-btn {
  width: 36px; height: 36px;
  border-radius: 50%;
  background: transparent;
  border: none;
  color: var(--text-primary);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 16px;
  transition: background 0.2s ease;
}
.back-btn:hover { background: var(--hover-bg); }
.logo-img {
  height: 26px;
  width: auto;
  cursor: pointer;
}
.header-actions {
  display: flex;
  align-items: center;
  gap: 12px;
}
.auth-buttons { display: none; gap: 12px; }
.auth-buttons.show { display: flex; }
.btn-login {
  padding: 7px 18px;
  border-radius: 20px;
  font-size: 14px;
  font-weight: 500;
  cursor: pointer;
  background: transparent;
  color: var(--text-primary);
  border: 1px solid var(--border-color);
  text-decoration: none;
  transition: background 0.2s ease;
}
.btn-login:hover { background: var(--hover-bg); }
.user-welcome { display: none; align-items: center; gap: 10px; font-size: 14px; }
.user-welcome.show { display: flex; }
.welcome-text {
  font-weight: 500;
  cursor: pointer;
  transition: color 0.2s ease;
}
.welcome-text:hover { color: var(--accent); }

/* Main */
.main-container {
  max-width: 900px;
  width: 100%;
  margin: 0 auto;
  padding: 24px 24px 100px;
  padding-top: calc(65px + env(safe-area-inset-top) + 24px);
}

/* Library Header Card */
.library-header-card {
  background: #252525;
  border: 1px solid var(--border-color);
  border-radius: 16px;
  padding: 28px 24px 24px;
  margin-bottom: 32px;
}
.library-icon {
  width: 52px; height: 52px;
  background: rgba(241, 209, 158, 0.12);
  border-radius: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 22px;
  color: var(--accent);
  margin-bottom: 16px;
}
.library-title {
  font-family: 'Merriweather', Georgia, serif;
  font-size: 32px;
  font-weight: 700;
  margin: 0 0 12px 0;
  line-height: 1.25;
  color: var(--text-primary);
  word-wrap: break-word;
}
.library-description {
  font-size: 15px;
  color: var(--text-secondary);
  line-height: 1.6;
  margin-bottom: 16px;
}
.library-meta-row {
  display: flex;
  align-items: center;
  flex-wrap: wrap;
  gap: 6px 16px;
  font-size: 13px;
  color: var(--text-secondary);
  margin-bottom: 20px;
}
.library-meta-row span {
  display: flex;
  align-items: center;
  gap: 5px;
}
.library-meta-row i { font-size: 11px; opacity: 0.7; }
.author-link {
  cursor: pointer;
  transition: color 0.2s ease;
}
.author-link:hover { color: var(--accent); }

/* Action Buttons */
.library-actions {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
}
.lib-btn {
  padding: 9px 20px;
  border-radius: 10px;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  border: none;
  display: flex;
  align-items: center;
  gap: 7px;
  transition: all 0.2s ease;
}
.lib-btn-primary {
  background: var(--accent);
  color: #1f1f1f;
}
.lib-btn-primary:hover { opacity: 0.88; transform: translateY(-1px); }
.lib-btn-secondary {
  background: transparent;
  color: var(--text-primary);
  border: 1px solid var(--border-color);
}
.lib-btn-secondary:hover { background: var(--hover-bg); }

/* Articles */
.articles-section-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 16px;
}
.articles-section-title {
  font-size: 16px;
  font-weight: 600;
  color: var(--text-primary);
  letter-spacing: 0.3px;
}
.articles-count-badge {
  font-size: 12px;
  color: var(--text-secondary);
  background: #2a2a2a;
  padding: 3px 10px;
  border-radius: 20px;
  border: 1px solid var(--border-color);
}

.article-list { list-style: none; margin: 0; padding: 0; }
.article-item {
  padding: 22px 0;
  border-bottom: 1px solid var(--border-color);
  cursor: pointer;
  transition: background 0.2s ease;
  display: flex;
  align-items: flex-start;
  gap: 16px;
}
.article-item:hover {
  background: var(--hover-bg);
  margin: 0 -12px;
  padding: 22px 12px;
}
.article-number {
  font-size: 13px;
  color: var(--text-secondary);
  opacity: 0.5;
  min-width: 22px;
  padding-top: 4px;
  font-weight: 600;
  text-align: right;
  flex-shrink: 0;
}
.article-body { flex: 1; min-width: 0; }
.article-title {
  font-family: 'Merriweather', Georgia, serif;
  font-size: 22px;
  font-weight: 700;
  margin: 0 0 7px 0;
  line-height: 1.35;
  color: var(--text-primary);
  word-wrap: break-word;
}
.article-item:hover .article-title { color: var(--accent); }
.article-meta {
  font-size: 13px;
  color: var(--text-secondary);
  display: flex;
  align-items: center;
  gap: 8px;
  flex-wrap: wrap;
}
.meta-dot {
  width: 3px; height: 3px;
  background: var(--text-secondary);
  border-radius: 50%;
}

/* States */
.loading-state, .error-state, .empty-state {
  text-align: center;
  padding: 60px 20px;
  color: var(--text-secondary);
  font-size: 15px;
}
.error-state { color: #ff6b6b; }
.loading-spinner {
  width: 36px; height: 36px;
  border: 3px solid var(--border-color);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
  margin: 0 auto 16px;
}
@keyframes spin { to { transform: rotate(360deg); } }
.empty-icon { font-size: 40px; opacity: 0.3; margin-bottom: 12px; }
.empty-title { font-size: 16px; font-weight: 600; color: var(--text-primary); margin-bottom: 6px; }

/* Footer Bar */
.footer-bar {
  position: fixed;
  bottom: 0; left: 50%;
  transform: translateX(-50%);
  width: 100%; max-width: 450px;
  background: var(--card-bg);
  border-top: 1px solid var(--border-color);
  padding: 8px 24px;
  padding-bottom: calc(8px + env(safe-area-inset-bottom));
  display: flex;
  justify-content: space-around;
  align-items: center;
  z-index: 100;
}
.footer-btn {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 2px;
  background: none;
  border: none;
  color: var(--text-secondary);
  cursor: pointer;
  transition: color 0.2s ease;
  padding: 6px 12px;
}
.footer-btn:hover { color: var(--text-primary); }
.footer-btn.active { color: var(--accent); }
.footer-btn i { font-size: 20px; }
.footer-btn span { font-size: 10px; font-weight: 500; }

@media (max-width: 768px) {
  .main-container {
    padding: 16px 16px 100px;
    padding-top: calc(65px + env(safe-area-inset-top) + 16px);
  }
  .library-title { font-size: 24px; }
  .article-title { font-size: 18px; }
  .library-header-card { padding: 20px 16px; }
  .footer-bar { padding: 8px 16px; padding-bottom: calc(8px + env(safe-area-inset-bottom)); }
  .footer-btn { padding: 6px 8px; }
  .footer-btn i { font-size: 18px; }
  .footer-btn span { font-size: 9px; }
}
</style>
</head>
<body>

<div class="header-wrapper">
  <div class="header">
    <div class="header-left">
      <button class="back-btn" onclick="window.history.back()"><i class="fas fa-arrow-left"></i></button>
      <img src="IMG_3220.png" class="logo-img" alt="Patholytica" onclick="window.location.href='index.html'">
    </div>
    <div class="header-actions">
      <div class="auth-buttons" id="authButtons">
        <a href="login.html" class="btn-login">Log In</a>
      </div>
      <div class="user-welcome" id="userWelcome">
        <span class="welcome-text" id="welcomeText">Welcome</span>
      </div>
    </div>
  </div>
</div>

<div class="main-container">
  <div id="pageState">
    <div class="loading-state">
      <div class="loading-spinner"></div>
      Loading library…
    </div>
  </div>
</div>

<div class="footer-bar">
  <button class="footer-btn" onclick="window.location.href='index.html'">
    <i class="fas fa-home"></i><span>Home</span>
  </button>
  <button class="footer-btn" onclick="window.location.href='https://patholytica.com/dailyfeed'">
    <i class="fas fa-scroll"></i><span>Feed</span>
  </button>
  <button class="footer-btn" onclick="window.location.href='explore.html'">
    <i class="fas fa-search"></i><span>Explore</span>
  </button>
  <button class="footer-btn" onclick="window.location.href='https://patholytica.com/create'">
    <i class="fas fa-plus-circle"></i><span>Create</span>
  </button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyBs6V0yY14cuLBXB1nciZ-X0eyAiodC-Ak",
  authDomain: "patholytica.firebaseapp.com",
  databaseURL: "https://patholytica-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "patholytica",
  storageBucket: "patholytica.firebasestorage.app",
  messagingSenderId: "738430635282",
  appId: "1:738430635282:web:8451ef380447c7611137cb"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

const supabase = window.supabase.createClient(
  "https://vduqewqyvszfquntmark.supabase.co",
  "sb_publishable_YseP73aoHam8YT6B0b9EQQ_iAUEWARI"
);

const urlParams = new URLSearchParams(window.location.search);
const libraryId = urlParams.get('id');

// ── Auth ──────────────────────────────────────────────────────────────────────
window.logOut = async function() {
  try { await signOut(auth); window.location.reload(); } catch(e) {}
};

onAuthStateChanged(auth, async (user) => {
  const authButtons = document.getElementById('authButtons');
  const userWelcome = document.getElementById('userWelcome');
  const welcomeText = document.getElementById('welcomeText');

  if (user) {
    authButtons.classList.remove('show');
    userWelcome.classList.add('show');
    welcomeText.onclick = window.logOut;

    try {
      const { data: userData } = await supabase
        .from('users')
        .select('username')
        .eq('firebase_uid', user.uid)
        .single();
      if (userData?.username) welcomeText.textContent = `@${userData.username}`;
    } catch(e) {}
  } else {
    authButtons.classList.add('show');
    userWelcome.classList.remove('show');
  }

  // Load library regardless of auth
  if (libraryId) {
    await loadLibrary();
  } else {
    showError('No library ID specified.');
  }
});

// ── Show helpers ──────────────────────────────────────────────────────────────
function showError(msg) {
  document.getElementById('pageState').innerHTML = `
    <div class="error-state">
      <div style="font-size:36px;margin-bottom:12px;">📚</div>
      <div>${msg}</div>
      <br>
      <button class="lib-btn lib-btn-secondary" onclick="window.location.href='index.html'" style="margin:0 auto;">
        <i class="fas fa-arrow-left"></i> Go Back
      </button>
    </div>`;
}

// ── Load Library ──────────────────────────────────────────────────────────────
async function loadLibrary() {
  try {
    // 1. Fetch library from 'libraries' table (same pattern as index.html uses library_id on articles)
    const { data: library, error: libErr } = await supabase
      .from('libraries')
      .select('*')
      .eq('id', libraryId)
      .single();

    if (libErr || !library) {
      showError('Library not found.');
      return;
    }

    // 2. Fetch creator — uses firebase_uid like the rest of the codebase
    const { data: creator } = await supabase
      .from('users')
      .select('firebase_uid, username')
      .eq('firebase_uid', library.firebase_user_id)
      .single();

    // 3. Fetch articles that belong to this library (same column used in index.html filter)
    const { data: articles, error: artErr } = await supabase
      .from('articles')
      .select('*')
      .eq('library_id', libraryId)
      .order('created_at', { ascending: false });

    if (artErr) {
      showError('Error loading articles: ' + artErr.message);
      return;
    }

    // 4. Resolve article authors
    const authorIds = [...new Set((articles || []).map(a => a.firebase_user_id).filter(Boolean))];
    const userMap = {};

    if (authorIds.length > 0) {
      const { data: users } = await supabase
        .from('users')
        .select('firebase_uid, username')
        .in('firebase_uid', authorIds);
      if (users) users.forEach(u => { userMap[u.firebase_uid] = u; });
    }

    renderLibrary(library, creator, articles || [], userMap);

  } catch(err) {
    showError('An unexpected error occurred.');
  }
}

// ── Render ────────────────────────────────────────────────────────────────────
function renderLibrary(library, creator, articles, userMap) {
  const authorName = creator?.username ? `@${creator.username}` : 'Unknown';
  const createdDate = new Date(library.created_at).toLocaleDateString('en-US', {
    year: 'numeric', month: 'short', day: 'numeric'
  });
  const count = articles.length;

  // Build article list HTML
  let articlesHTML = '';
  if (count === 0) {
    articlesHTML = `
      <div class="empty-state">
        <div class="empty-icon"><i class="fas fa-file-alt"></i></div>
        <div class="empty-title">No articles yet</div>
        <div style="font-size:13px;">This library doesn't have any articles.</div>
      </div>`;
  } else {
    articlesHTML = '<ul class="article-list" id="articleList">';
    articles.forEach((article, i) => {
      const user = userMap[article.firebase_user_id];
      const author = user?.username ? `@${user.username}` : 'Unknown';
      const date = new Date(article.created_at).toLocaleDateString('en-US', {
        year: 'numeric', month: 'short', day: 'numeric'
      });
      articlesHTML += `
        <li class="article-item" onclick="window.location.href='article.html?id=${article.id}'">
          <div class="article-number">${i + 1}</div>
          <div class="article-body">
            <h2 class="article-title">${escHtml(article.title || 'Untitled')}</h2>
            <div class="article-meta">
              <span>${escHtml(author)}</span>
              <div class="meta-dot"></div>
              <span>${date}</span>
            </div>
          </div>
        </li>`;
    });
    articlesHTML += '</ul>';
  }

  document.getElementById('pageState').innerHTML = `
    <div class="library-header-card">
      <div class="library-icon"><i class="fas fa-book-open"></i></div>
      <h1 class="library-title">${escHtml(library.name || 'Untitled Library')}</h1>
      ${library.description ? `<p class="library-description">${escHtml(library.description)}</p>` : ''}
      <div class="library-meta-row">
        <span class="author-link" onclick="window.location.href='profile.html?username=${creator?.username || ''}'">
          <i class="fas fa-user"></i> ${escHtml(authorName)}
        </span>
        <span><i class="fas fa-calendar-alt"></i> ${createdDate}</span>
        <span><i class="fas fa-file-alt"></i> ${count} article${count !== 1 ? 's' : ''}</span>
        <span><i class="fas fa-hashtag"></i> ID ${library.id}</span>
      </div>
      <div class="library-actions">
        ${count > 0 ? `
        <button class="lib-btn lib-btn-primary" onclick="window.location.href='article.html?id=${articles[0].id}'">
          <i class="fas fa-play"></i> Read First
        </button>` : ''}
        <button class="lib-btn lib-btn-secondary" onclick="shareLibrary()">
          <i class="fas fa-share"></i> Share
        </button>
      </div>
    </div>

    <div class="articles-section-header">
      <div class="articles-section-title">Articles</div>
      <div class="articles-count-badge">${count}</div>
    </div>

    ${articlesHTML}
  `;
}

window.shareLibrary = function() {
  const url = window.location.href;
  if (navigator.share) {
    navigator.share({ title: 'Patholytica Library', url });
  } else {
    navigator.clipboard.writeText(url).then(() => alert('Link copied!'));
  }
};

function escHtml(text) {
  const d = document.createElement('div');
  d.textContent = text;
  return d.innerHTML;
}
</script>
</body>
</html>
