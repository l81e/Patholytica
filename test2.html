<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EmojiType</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=Syne+Mono&family=Lora:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --border: #2a2a3a;
    --text: #e8e8f0;
    --muted: #6b6b8a;
    --accent: #7b6cff;
    --accent2: #ff6ca8;
  }

- { box-sizing: border-box; margin: 0; padding: 0; }

body {
background: var(–bg);
color: var(–text);
font-family: ‘Syne’, sans-serif;
min-height: 100vh;
display: flex;
flex-direction: column;
align-items: center;
padding: 40px 20px 80px;
position: relative;
overflow-x: hidden;
}

body::before {
content: ‘’;
position: fixed;
inset: 0;
background:
radial-gradient(ellipse 60% 50% at 20% 10%, rgba(123,108,255,0.08) 0%, transparent 60%),
radial-gradient(ellipse 50% 40% at 80% 80%, rgba(255,108,168,0.06) 0%, transparent 60%);
pointer-events: none;
z-index: 0;
}

header {
text-align: center;
margin-bottom: 48px;
position: relative;
z-index: 1;
}

header h1 {
font-size: clamp(2rem, 5vw, 3.5rem);
font-weight: 800;
letter-spacing: -0.03em;
background: linear-gradient(135deg, #fff 30%, var(–accent) 70%, var(–accent2));
-webkit-background-clip: text;
-webkit-text-fill-color: transparent;
background-clip: text;
line-height: 1.1;
}

header p {
color: var(–muted);
margin-top: 10px;
font-size: 0.95rem;
letter-spacing: 0.01em;
}

.editor-wrap {
width: 100%;
max-width: 780px;
position: relative;
z-index: 1;
}

.input-area {
background: var(–surface);
border: 1px solid var(–border);
border-radius: 16px;
overflow: hidden;
transition: border-color 0.2s;
}

.input-area:focus-within {
border-color: rgba(123,108,255,0.5);
box-shadow: 0 0 0 3px rgba(123,108,255,0.1);
}

.input-label {
display: flex;
align-items: center;
gap: 8px;
padding: 14px 20px 0;
color: var(–muted);
font-size: 0.75rem;
letter-spacing: 0.1em;
text-transform: uppercase;
}

.input-label span { color: var(–accent); }

textarea {
width: 100%;
min-height: 140px;
background: transparent;
border: none;
outline: none;
resize: vertical;
padding: 12px 20px 20px;
font-family: ‘Syne’, sans-serif;
font-size: 1.05rem;
color: var(–text);
line-height: 1.7;
caret-color: var(–accent);
}

textarea::placeholder { color: var(–muted); }

.toolbar {
display: flex;
gap: 10px;
padding: 12px 20px;
border-top: 1px solid var(–border);
background: rgba(255,255,255,0.02);
flex-wrap: wrap;
align-items: center;
}

.toolbar-hint {
margin-left: auto;
color: var(–muted);
font-size: 0.72rem;
letter-spacing: 0.04em;
}

.btn {
padding: 8px 20px;
border-radius: 8px;
border: none;
cursor: pointer;
font-family: ‘Syne’, sans-serif;
font-size: 0.85rem;
font-weight: 700;
letter-spacing: 0.02em;
transition: all 0.15s;
}

.btn-primary {
background: var(–accent);
color: #fff;
}

.btn-primary:hover { background: #9588ff; transform: translateY(-1px); }
.btn-primary:active { transform: translateY(0); }

.btn-ghost {
background: transparent;
color: var(–muted);
border: 1px solid var(–border);
}

.btn-ghost:hover { color: var(–text); border-color: var(–muted); }

.output-wrap {
width: 100%;
max-width: 780px;
margin-top: 28px;
position: relative;
z-index: 1;
}

.output-label {
color: var(–muted);
font-size: 0.75rem;
letter-spacing: 0.1em;
text-transform: uppercase;
margin-bottom: 12px;
padding: 0 4px;
}

.output-box {
background: var(–surface);
border: 1px solid var(–border);
border-radius: 16px;
padding: 28px 32px;
min-height: 80px;
font-size: 1.1rem;
line-height: 2;
word-break: break-word;
display: none;
}

.output-box.visible { display: block; }

.reference {
width: 100%;
max-width: 780px;
margin-top: 40px;
position: relative;
z-index: 1;
}

.reference summary {
cursor: pointer;
color: var(–muted);
font-size: 0.8rem;
letter-spacing: 0.1em;
text-transform: uppercase;
display: flex;
align-items: center;
gap: 8px;
user-select: none;
padding: 4px;
list-style: none;
}

.reference summary::-webkit-details-marker { display: none; }
.reference summary:hover { color: var(–text); }

.ref-grid {
display: grid;
grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
gap: 8px;
margin-top: 16px;
}

.ref-item {
background: var(–surface);
border: 1px solid var(–border);
border-radius: 10px;
padding: 10px 14px;
font-size: 0.78rem;
color: var(–muted);
display: flex;
align-items: center;
gap: 10px;
cursor: pointer;
transition: border-color 0.15s;
}

.ref-item:hover { border-color: rgba(123,108,255,0.4); color: var(–text); }

.ref-item code {
font-family: ‘Syne Mono’, monospace;
font-size: 0.72rem;
color: var(–accent);
background: rgba(123,108,255,0.1);
padding: 2px 6px;
border-radius: 4px;
white-space: nowrap;
flex-shrink: 0;
}

/* ============================================
STYLED TEXT EFFECTS
============================================ */

.emo-magnify {
font-weight: 700;
font-size: 1.3em;
letter-spacing: -0.02em;
text-shadow: 0 2px 12px rgba(255,255,255,0.25);
}

.emo-urgent {
font-weight: 700;
color: #fff;
background: linear-gradient(135deg, #ff3c00, #ff6b00);
padding: 0.1em 0.35em;
border-radius: 4px;
animation: urgentPulse 1.4s ease-in-out infinite;
display: inline-block;
}

@keyframes urgentPulse {
0%, 100% { box-shadow: 0 0 0 0 rgba(255,80,0,0.5); }
50% { box-shadow: 0 0 0 6px rgba(255,80,0,0); }
}

.emo-pinned {
font-weight: 700;
border-left: 3px solid #7b6cff;
padding-left: 0.5em;
background: rgba(123,108,255,0.1);
border-radius: 0 4px 4px 0;
padding-right: 0.3em;
}

.emo-fire {
font-weight: 700;
background: linear-gradient(90deg, #ff4500, #ff8c00, #ffb700);
-webkit-background-clip: text;
-webkit-text-fill-color: transparent;
background-clip: text;
animation: flicker 2s ease-in-out infinite;
filter: drop-shadow(0 0 8px rgba(255,100,0,0.6));
}

@keyframes flicker {
0%, 100% { filter: drop-shadow(0 0 8px rgba(255,100,0,0.6)); }
30% { filter: drop-shadow(0 0 12px rgba(255,60,0,0.9)); }
60% { filter: drop-shadow(0 0 6px rgba(255,140,0,0.5)); }
}

.emo-diamond {
font-weight: 700;
background: linear-gradient(135deg, #a8edfc, #3dd6f5, #7b9fff, #c9f0ff);
-webkit-background-clip: text;
-webkit-text-fill-color: transparent;
background-clip: text;
filter: drop-shadow(0 0 8px rgba(100,200,255,0.5));
animation: crystalShine 3s ease-in-out infinite;
}

@keyframes crystalShine {
0%, 100% { filter: drop-shadow(0 0 8px rgba(100,200,255,0.5)); }
50% { filter: drop-shadow(0 0 16px rgba(100,220,255,0.9)); }
}

.emo-yellow {
color: #ffe566;
text-shadow: 0 0 12px rgba(255,220,0,0.8), 0 0 24px rgba(255,200,0,0.3);
background: rgba(255,230,0,0.08);
padding: 0.05em 0.2em;
border-radius: 3px;
}

.emo-blue {
color: #60b4ff;
text-shadow: 0 0 12px rgba(60,140,255,0.8), 0 0 24px rgba(60,140,255,0.3);
}

.emo-green {
color: #4dff91;
text-shadow: 0 0 12px rgba(0,200,80,0.8), 0 0 24px rgba(0,200,80,0.3);
}

.emo-purple {
color: #d580ff;
text-shadow: 0 0 12px rgba(180,60,255,0.9), 0 0 28px rgba(180,60,255,0.4);
animation: neonPulse 2s ease-in-out infinite;
}

@keyframes neonPulse {
0%, 100% { text-shadow: 0 0 12px rgba(180,60,255,0.9), 0 0 28px rgba(180,60,255,0.4); }
50% { text-shadow: 0 0 20px rgba(200,80,255,1), 0 0 40px rgba(180,60,255,0.6); }
}

.emo-red {
color: #ff4d4d;
text-shadow: 0 0 12px rgba(255,40,40,0.9), 0 0 28px rgba(255,40,40,0.4);
}

.emo-dark {
color: #fff;
background: rgba(0,0,0,0.7);
padding: 0.1em 0.4em;
border-radius: 4px;
box-shadow: 0 0 30px rgba(0,0,0,0.8), inset 0 0 20px rgba(255,255,255,0.05);
}

.emo-brain {
font-style: italic;
color: #80c4ff;
border-bottom: 2px solid #4080ff;
padding-bottom: 0.05em;
}

.emo-book {
font-family: ‘Lora’, serif;
background: #1e1a14;
color: #d4c8a0;
padding: 0.1em 0.4em;
border-radius: 4px;
border: 1px solid #3a3020;
}

.emo-idea {
background: rgba(255,200,0,0.12);
color: #ffd700;
padding: 0.1em 0.35em;
border-radius: 4px;
text-shadow: 0 0 16px rgba(255,210,0,0.6);
animation: ideaGlow 2.5s ease-in-out infinite;
}

@keyframes ideaGlow {
0%, 100% { text-shadow: 0 0 16px rgba(255,210,0,0.6); }
50% { text-shadow: 0 0 28px rgba(255,220,0,1); }
}

.emo-target {
font-weight: 700;
outline: 2px solid rgba(255,80,80,0.6);
outline-offset: 3px;
padding: 0.1em 0.3em;
animation: targetRing 2s ease-in-out infinite;
display: inline-block;
}

@keyframes targetRing {
0%, 100% { outline-color: rgba(255,80,80,0.6); outline-offset: 3px; }
50% { outline-color: rgba(255,80,80,0.2); outline-offset: 6px; }
}

.emo-puzzle {
border: 1px dashed rgba(160,120,255,0.6);
padding: 0.1em 0.4em;
border-radius: 6px;
color: #c0a0ff;
}

.emo-tag {
background: rgba(100,160,255,0.12);
border: 1px solid rgba(100,160,255,0.3);
color: #90bfff;
padding: 0.1em 0.6em;
border-radius: 20px;
font-size: 0.9em;
}

.emo-micro {
font-family: ‘Syne Mono’, monospace;
color: #40e0d0;
font-size: 0.9em;
border-bottom: 1px solid rgba(64,224,208,0.4);
}

.emo-warning {
background: repeating-linear-gradient(
-45deg,
rgba(255,180,0,0.12),
rgba(255,180,0,0.12) 4px,
rgba(255,180,0,0.04) 4px,
rgba(255,180,0,0.04) 8px
);
border: 1px solid rgba(255,180,0,0.4);
color: #ffc84a;
padding: 0.1em 0.4em;
border-radius: 4px;
font-weight: 700;
}

.emo-check {
color: #40e080;
background: rgba(40,200,80,0.1);
padding: 0.1em 0.35em;
border-radius: 4px;
font-weight: 700;
}

.emo-cross {
color: #ff4d4d;
background: rgba(255,60,60,0.08);
padding: 0.1em 0.35em;
border-radius: 4px;
text-decoration: line-through;
text-decoration-color: rgba(255,80,80,0.7);
}

.emo-hourglass {
color: #d4a840;
background: linear-gradient(90deg, rgba(212,168,64,0.03), rgba(212,168,64,0.15), rgba(212,168,64,0.03));
background-size: 200% 100%;
padding: 0.1em 0.35em;
border-radius: 4px;
animation: sweep 2s linear infinite;
}

@keyframes sweep {
0% { background-position: -100% 0; }
100% { background-position: 200% 0; }
}

.emo-lock {
color: #a0a0b0;
background: linear-gradient(135deg, #2a2a3a, #3a3a4a);
padding: 0.1em 0.4em;
border-radius: 4px;
border: 1px solid #4a4a5a;
font-weight: 600;
letter-spacing: 0.05em;
}

.emo-unlock {
color: #c0e0ff;
background: linear-gradient(135deg, #1a2a3a, #2a3a5a);
padding: 0.1em 0.4em;
border-radius: 4px;
border: 1px solid rgba(100,160,255,0.4);
box-shadow: 0 0 12px rgba(100,160,255,0.2);
}

.emo-lightning {
font-weight: 700;
background: linear-gradient(90deg, #ffe500, #00cfff);
-webkit-background-clip: text;
-webkit-text-fill-color: transparent;
background-clip: text;
animation: electricPulse 0.8s ease-in-out infinite;
filter: drop-shadow(0 0 6px rgba(0,200,255,0.6));
}

@keyframes electricPulse {
0%, 100% { filter: drop-shadow(0 0 6px rgba(0,200,255,0.6)); }
50% { filter: drop-shadow(0 0 14px rgba(255,220,0,0.9)); }
}

.emo-wave {
display: inline-block;
animation: waveText 1.5s ease-in-out infinite;
color: #40bfff;
}

@keyframes waveText {
0%, 100% { transform: translateY(0); }
25% { transform: translateY(-4px); }
75% { transform: translateY(4px); }
}

.emo-spin {
display: inline-block;
animation: expandLetters 4s ease-in-out infinite;
color: #a080ff;
}

@keyframes expandLetters {
0%, 100% { letter-spacing: 0em; }
50% { letter-spacing: 0.1em; }
}

.emo-float {
display: inline-block;
animation: floatText 2.2s ease-in-out infinite;
color: #ffd080;
}

@keyframes floatText {
0%, 100% { transform: translateY(0) rotate(-0.8deg); }
50% { transform: translateY(-6px) rotate(0.8deg); }
}

.emo-rocket {
font-weight: 700;
display: inline-block;
animation: rocketEntry 0.6s cubic-bezier(0.16,1,0.3,1) both;
color: #fff;
text-shadow: -4px 0 12px rgba(200,160,255,0.5);
}

@keyframes rocketEntry {
0% { transform: translateX(-20px); opacity: 0; }
100% { transform: translateX(0); opacity: 1; }
}

.emo-cinematic {
animation: cinematicReveal 1.2s cubic-bezier(0.16,1,0.3,1) both;
color: #f0f0f0;
}

@keyframes cinematicReveal {
0% { opacity: 0; filter: blur(6px); letter-spacing: 0.2em; }
100% { opacity: 1; filter: blur(0); letter-spacing: 0; }
}

.emo-star {
color: #fff;
animation: starSparkle 1.8s ease-in-out infinite;
}

@keyframes starSparkle {
0%, 100% { text-shadow: -1px -1px 6px rgba(255,255,180,0.9), 1px 1px 6px rgba(255,255,180,0.9); }
50% { text-shadow: -2px -2px 14px rgba(255,255,140,1), 2px 2px 14px rgba(255,240,100,1); }
}

.emo-sparkle {
background: linear-gradient(90deg, #fff 0%, #ffd700 25%, #fff 50%, #c0f0ff 75%, #fff 100%);
background-size: 200% auto;
-webkit-background-clip: text;
-webkit-text-fill-color: transparent;
background-clip: text;
animation: sparkleMove 1.8s linear infinite;
}

@keyframes sparkleMove {
0% { background-position: 0% center; }
100% { background-position: 200% center; }
}

.emo-rainbow {
background: linear-gradient(90deg, #ff0000, #ff7700, #ffff00, #00ff00, #0077ff, #8800ff, #ff00ff);
background-size: 200% auto;
-webkit-background-clip: text;
-webkit-text-fill-color: transparent;
background-clip: text;
animation: rainbowMove 2.5s linear infinite;
font-weight: 700;
}

@keyframes rainbowMove {
0% { background-position: 0% center; }
100% { background-position: 200% center; }
}

.emo-crown {
font-weight: 800;
background: linear-gradient(135deg, #ffd700, #ffaa00, #ffe066, #d4920a);
-webkit-background-clip: text;
-webkit-text-fill-color: transparent;
background-clip: text;
filter: drop-shadow(0 2px 8px rgba(200,140,0,0.5));
font-size: 1.08em;
letter-spacing: 0.02em;
}

.emo-magic {
display: inline-block;
background: linear-gradient(90deg, #ff80ff, #80ffff, #ffff80, #ff80ff);
background-size: 200% auto;
-webkit-background-clip: text;
-webkit-text-fill-color: transparent;
background-clip: text;
animation: magicShift 1.8s linear infinite;
}

@keyframes magicShift {
0% { background-position: 0% center; }
100% { background-position: 200% center; }
}

.emo-heart {
color: #ff80a0;
text-shadow: 0 0 16px rgba(255,80,120,0.6);
display: inline-block;
animation: heartbeat 1.4s ease-in-out infinite;
}

@keyframes heartbeat {
0%, 100% { transform: scale(1); }
14% { transform: scale(1.06); }
28% { transform: scale(1); }
42% { transform: scale(1.04); }
}

.emo-happy {
color: #ffe050;
display: inline-block;
animation: happyBounce 0.7s ease-in-out infinite;
}

@keyframes happyBounce {
0%, 100% { transform: translateY(0); }
50% { transform: translateY(-4px); }
}

.emo-calm {
color: #c0d4e8;
text-shadow: 0 0 10px rgba(140,180,220,0.3);
animation: calmPulse 3s ease-in-out infinite;
}

@keyframes calmPulse {
0%, 100% { opacity: 1; }
50% { opacity: 0.8; }
}

.emo-surprised {
display: inline-block;
animation: popIn 0.5s cubic-bezier(0.34,1.56,0.64,1) both;
color: #ffcc44;
font-size: 1.12em;
}

@keyframes popIn {
0% { transform: scale(0.4); opacity: 0; }
100% { transform: scale(1); opacity: 1; }
}

.emo-cool {
background: linear-gradient(135deg, #1a1a2e, #2a2a4e);
color: #a0d0ff;
padding: 0.1em 0.4em;
border-radius: 4px;
border: 1px solid rgba(80,140,255,0.3);
box-shadow: 0 0 12px rgba(80,140,255,0.12);
letter-spacing: 0.03em;
}

.emo-robot {
font-family: ‘Syne Mono’, monospace;
color: #00ffcc;
text-shadow: 0 0 8px rgba(0,255,200,0.6);
border: 1px solid rgba(0,255,200,0.25);
padding: 0.05em 0.35em;
border-radius: 3px;
letter-spacing: 0.05em;
font-size: 0.9em;
}

.emo-science {
color: #40ffcc;
font-family: ‘Syne Mono’, monospace;
text-shadow: 0 0 8px rgba(40,200,160,0.6);
border-bottom: 1px solid rgba(40,200,160,0.4);
font-size: 0.9em;
}

.emo-temple {
font-family: ‘Lora’, serif;
color: #c8b89a;
letter-spacing: 0.06em;
text-shadow: 0 1px 4px rgba(0,0,0,0.8);
}

.emo-earth {
background: linear-gradient(90deg, #1a6040, #1a4080, #2a8050, #1a5070, #1a6040);
background-size: 300% auto;
-webkit-background-clip: text;
-webkit-text-fill-color: transparent;
background-clip: text;
animation: earthRotate 4s linear infinite;
font-weight: 700;
}

@keyframes earthRotate {
0% { background-position: 0% center; }
100% { background-position: 300% center; }
}

.emo-money {
font-weight: 700;
background: linear-gradient(135deg, #ffd700, #40c060, #80e0a0, #ffd700);
background-size: 200% auto;
-webkit-background-clip: text;
-webkit-text-fill-color: transparent;
background-clip: text;
filter: drop-shadow(0 1px 6px rgba(100,180,100,0.4));
}

.emo-balance {
color: #e8e8e8;
border-left: 2px solid #ff4040;
border-right: 2px solid #4040ff;
padding: 0.05em 0.4em;
background: linear-gradient(90deg, rgba(255,40,40,0.07), transparent, rgba(40,40,255,0.07));
}

.emo-signal {
color: #60c0ff;
display: inline-block;
animation: signalWave 1.5s ease-in-out infinite;
}

@keyframes signalWave {
0%, 100% { text-shadow: 0 0 4px rgba(60,160,255,0.4); letter-spacing: 0; }
50% { text-shadow: 0 0 16px rgba(60,160,255,0.9); letter-spacing: 0.04em; }
}

.emo-music {
color: #ff80c0;
display: inline-block;
animation: musicBeat 0.55s ease-in-out infinite alternate;
}

@keyframes musicBeat {
0% { transform: scaleY(0.96); }
100% { transform: scaleY(1.04); }
}

.emo-ice {
color: #c0e8ff;
background: rgba(160,220,255,0.07);
border: 1px solid rgba(160,220,255,0.2);
padding: 0.1em 0.35em;
border-radius: 4px;
text-shadow: 0 0 8px rgba(180,230,255,0.4);
letter-spacing: 0.04em;
}

.emo-sound {
font-weight: 800;
font-size: 1.1em;
color: #fff;
display: inline-block;
animation: soundPulse 0.8s ease-in-out infinite;
}

@keyframes soundPulse {
0%, 100% { transform: scale(1); text-shadow: 0 0 8px rgba(255,255,255,0.3); }
50% { transform: scale(1.04); text-shadow: 0 0 20px rgba(255,255,255,0.8); }
}

::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: var(–bg); }
::-webkit-scrollbar-thumb { background: var(–border); border-radius: 3px; }
</style>

</head>
<body>

<header>
  <h1>EmojiType</h1>
  <p>Wrap text in emoji pairs — the emoji disappears, the effect remains.</p>
</header>

<div class="editor-wrap">
  <div class="input-area">
    <div class="input-label"><span>✦</span> Input</div>
    <textarea id="input" placeholder="Try: 🔥This is on fire🔥 and 💎pure crystal💎 and ❗URGENT❗"></textarea>
    <div class="toolbar">
      <button class="btn btn-primary" onclick="render()">Render →</button>
      <button class="btn btn-ghost" onclick="clearAll()">Clear</button>
      <button class="btn btn-ghost" onclick="loadDemo()">Demo</button>
      <span class="toolbar-hint">Ctrl+Enter to render</span>
    </div>
  </div>
</div>

<div class="output-wrap">
  <div class="output-label">✦ Rendered Output</div>
  <div class="output-box" id="output"></div>
</div>

<div class="reference">
  <details>
    <summary>✦ &nbsp; All supported emoji pairs (click to insert)</summary>
    <div class="ref-grid" id="refGrid"></div>
  </details>
</div>

<script>
const EMOJI_MAP = {

  '🌟': ['emo-star',      'Star — edge sparkle'],
  '✨': ['emo-sparkle',   'Sparkle — glitter sweep'],
  '🌈': ['emo-rainbow',   'Rainbow — gradient flow'],
  '👑': ['emo-crown',     'Crown — gold regal'],

  '❤️': ['emo-heart',    'Heart — warm pulse'],

  '🏛️': ['emo-temple',   'Temple — stone serif'],

  '💰': ['emo-money',     'Money — gold-green'],

  '📡': ['emo-signal',    'Signal — wave pulse'],
  '🎵': ['emo-music',     'Music — rhythm beat'],
  '🧊': ['emo-ice',       'Ice — frosted edges'],
  '🔊': ['emo-sound',     'Sound — pulse enlarge'],
};

function escapeHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function buildPattern() {
  const keys = Object.keys(EMOJI_MAP).sort((a,b) => b.length - a.length);
  const escaped = keys.map(k => k.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')).join('|');
  return new RegExp(`(${escaped})([\\s\\S]*?)\\1`, 'gu');
}

function processTextRaw(text) {
  const re = buildPattern();
  let result = '';
  let lastIndex = 0;
  let match;

  while ((match = re.exec(text)) !== null) {
    result += escapeHtml(text.slice(lastIndex, match.index));
    const emoji = match[1];
    const inner = match[2];
    const [className] = EMOJI_MAP[emoji];
    result += `<span class="${className}">${processTextRaw(inner)}</span>`;
    lastIndex = re.lastIndex;
  }

  result += escapeHtml(text.slice(lastIndex));
  return result;
}

function render() {
  const raw = document.getElementById('input').value;
  const output = document.getElementById('output');
  if (!raw.trim()) { output.classList.remove('visible'); return; }

  const html = raw.split('\n').map(line => processTextRaw(line)).join('<br>');
  output.innerHTML = html;
  output.classList.add('visible');

  // Re-trigger entry animations
  output.querySelectorAll('span[class^="emo-"]').forEach(el => {
    el.style.animation = 'none';
    void el.offsetHeight;
    el.style.animation = '';
  });
}

function clearAll() {
  document.getElementById('input').value = '';
  const out = document.getElementById('output');
  out.innerHTML = '';
  out.classList.remove('visible');
}

function loadDemo() {

Feel 😄joyful😄 or 😌calm😌 — either way, 👑you are royalty👑.

  render();
}

// Reference grid
const grid = document.getElementById('refGrid');
Object.entries(EMOJI_MAP).forEach(([emoji, [cls, desc]]) => {
  const item = document.createElement('div');
  item.className = 'ref-item';
  item.title = 'Click to insert into editor';
  item.innerHTML = `<code>${emoji}…${emoji}</code><span>${desc}</span>`;
  item.onclick = () => {
    const ta = document.getElementById('input');
    const start = ta.selectionStart;
    const end = ta.selectionEnd;
    const sel = ta.value.slice(start, end) || 'text';
    const insert = `${emoji}${sel}${emoji}`;
    ta.value = ta.value.slice(0, start) + insert + ta.value.slice(end);
    ta.focus();
    ta.setSelectionRange(start + emoji.length, start + emoji.length + sel.length);
  };
  grid.appendChild(item);
});

document.getElementById('input').addEventListener('keydown', e => {
  if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) {
    e.preventDefault();
    render();
  }
});
</script>

</body>
</html>
