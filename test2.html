<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Patholytica — Explore</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Merriweather:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root {
  --bg: #000000;
  --bg-1: #0d0d0d;
  --bg-2: #141414;
  --bg-3: #1a1a1a;
  --text-1: #f0ede8;
  --text-2: #8a8480;
  --text-3: #4a4744;
  --border: #222222;
  --border-light: #2a2a2a;
  --accent: #c8a96e;
  --accent-dim: rgba(200,169,110,0.12);
  --accent-hover: #d4b87e;
  --red: #e05555;
  --green: #4a9e6e;
  --purple: #7e6ab0;
  --header-h: 56px;
  --sidebar-w: 220px;
  --right-w: 280px;
}
body.light {
  --bg: #f5f3ef;
  --bg-1: #ffffff;
  --bg-2: #f0ede8;
  --bg-3: #e8e4dc;
  --text-1: #1a1814;
  --text-2: #6b6560;
  --text-3: #a09890;
  --border: #ddd9d0;
  --border-light: #e8e4dc;
  --accent: #9a7540;
  --accent-dim: rgba(154,117,64,0.10);
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{min-height:100%;font-family:"Inter",sans-serif;overflow-x:hidden;background:var(--bg);color:var(--text-1);}
body{transition:background 0.2s,color 0.2s;}
a{text-decoration:none;color:inherit;}
button{font-family:inherit;cursor:pointer;}

/* ── Scrollbar ── */
::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px;}

/* ══════════════════════════════════════
   LAYOUT
══════════════════════════════════════ */
.app-shell{
  display:grid;
  grid-template-columns: var(--sidebar-w) 1fr var(--right-w);
  grid-template-rows: var(--header-h) 1fr;
  grid-template-areas:
    "header header header"
    "sidebar main right";
  min-height:100vh;
  max-width:1200px;
  margin:0 auto;
}

/* ── Header ── */
.site-header{
  grid-area:header;
  position:sticky;top:0;z-index:100;
  background:rgba(0,0,0,0.85);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
  padding:0 24px;gap:16px;
}
body.light .site-header{background:rgba(245,243,239,0.88);}

.header-logo{
  display:flex;align-items:center;gap:10px;flex-shrink:0;
}
.logo-img{height:22px;width:auto;cursor:pointer;transition:opacity 0.2s;}
body.light .logo-img{filter:invert(1);}
.logo-img:hover{opacity:0.7;}

.header-search{
  flex:1;max-width:400px;position:relative;
}
.header-search input{
  width:100%;padding:9px 16px 9px 40px;
  border-radius:9999px;border:1px solid var(--border);
  background:var(--bg-2);color:var(--text-1);
  font-size:14px;outline:none;font-family:inherit;
  transition:all 0.15s;
}
.header-search input::placeholder{color:var(--text-3);}
.header-search input:focus{border-color:var(--accent);background:var(--bg-1);}
.header-search .s-icon{
  position:absolute;left:14px;top:50%;transform:translateY(-50%);
  color:var(--text-3);font-size:13px;pointer-events:none;
}
.header-search .s-clear{
  position:absolute;right:12px;top:50%;transform:translateY(-50%);
  background:var(--text-3);border:none;color:var(--bg);
  width:18px;height:18px;border-radius:50%;font-size:10px;
  display:none;align-items:center;justify-content:center;transition:background 0.15s;
}
.header-search .s-clear.show{display:flex;}
.header-search .s-clear:hover{background:var(--text-2);}

.header-actions{display:flex;align-items:center;gap:8px;flex-shrink:0;}
.btn-pill{
  padding:7px 18px;border-radius:9999px;font-size:13px;font-weight:600;
  border:1px solid var(--border);background:transparent;color:var(--text-1);
  transition:all 0.15s;white-space:nowrap;
}
.btn-pill:hover{background:var(--bg-2);}
.btn-pill.primary{background:var(--accent);color:#000;border-color:var(--accent);}
.btn-pill.primary:hover{background:var(--accent-hover);border-color:var(--accent-hover);}
.btn-icon{
  width:36px;height:36px;border-radius:50%;border:1px solid var(--border);
  background:transparent;color:var(--text-2);font-size:15px;
  display:flex;align-items:center;justify-content:center;transition:all 0.15s;
}
.btn-icon:hover{background:var(--bg-2);color:var(--text-1);}

/* User avatar button */
.user-avatar-btn{
  width:34px;height:34px;border-radius:50%;background:var(--accent);
  border:none;display:flex;align-items:center;justify-content:center;
  font-size:14px;font-weight:700;color:#000;cursor:pointer;overflow:hidden;
  transition:opacity 0.15s;flex-shrink:0;
}
.user-avatar-btn img{width:100%;height:100%;object-fit:cover;}
.user-avatar-btn:hover{opacity:0.85;}

/* ── Left sidebar ── */
.sidebar{
  grid-area:sidebar;
  position:sticky;top:var(--header-h);height:calc(100vh - var(--header-h));
  overflow-y:auto;padding:20px 12px;
  border-right:1px solid var(--border);
  display:flex;flex-direction:column;gap:4px;
}
.sidebar-label{
  font-size:10px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;
  color:var(--text-3);padding:16px 12px 8px;
}
.sidebar-label:first-child{padding-top:4px;}
.nav-item{
  display:flex;align-items:center;gap:12px;padding:10px 12px;
  border-radius:10px;font-size:14px;font-weight:500;color:var(--text-2);
  background:transparent;border:none;width:100%;text-align:left;
  transition:all 0.15s;cursor:pointer;
}
.nav-item i{width:18px;text-align:center;font-size:15px;transition:color 0.15s;}
.nav-item:hover{background:var(--bg-2);color:var(--text-1);}
.nav-item:hover i{color:var(--accent);}
.nav-item.active{background:var(--accent-dim);color:var(--accent);font-weight:600;}
.nav-item.active i{color:var(--accent);}
.nav-item .nav-badge{
  margin-left:auto;background:var(--accent);color:#000;
  font-size:10px;font-weight:700;padding:2px 7px;border-radius:9999px;
}
.sidebar-divider{height:1px;background:var(--border);margin:8px 0;}

/* Create button in sidebar */
.sidebar-create{
  margin-top:auto;padding-top:16px;
}
.btn-create{
  display:flex;align-items:center;justify-content:center;gap:8px;
  width:100%;padding:11px;border-radius:10px;
  background:var(--accent);color:#000;border:none;
  font-size:14px;font-weight:700;transition:all 0.15s;
}
.btn-create:hover{background:var(--accent-hover);}

/* ── Main feed ── */
.main-content{
  grid-area:main;
  min-height:calc(100vh - var(--header-h));
  border-right:1px solid var(--border);
}

/* Tab bar inside main */
.feed-tabs{
  position:sticky;top:var(--header-h);z-index:50;
  background:rgba(0,0,0,0.85);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border);
  display:flex;
}
body.light .feed-tabs{background:rgba(245,243,239,0.88);}
.feed-tab{
  flex:1;padding:14px 0;background:none;border:none;
  color:var(--text-2);font-size:14px;font-weight:600;cursor:pointer;
  border-bottom:2px solid transparent;transition:all 0.15s;font-family:inherit;
}
.feed-tab:hover{color:var(--text-1);background:var(--bg-2);}
.feed-tab.active{color:var(--text-1);border-bottom-color:var(--accent);}

/* Search filter bar (shows when search active) */
.search-filter-bar{
  display:none;padding:12px 16px;border-bottom:1px solid var(--border);
  gap:8px;overflow-x:auto;scrollbar-width:none;
}
.search-filter-bar::-webkit-scrollbar{display:none;}
.search-filter-bar.show{display:flex;}
.filter-chip{
  padding:6px 16px;border-radius:9999px;font-size:13px;font-weight:600;
  border:1px solid var(--border);background:transparent;color:var(--text-2);
  white-space:nowrap;transition:all 0.15s;font-family:inherit;
}
.filter-chip:hover{color:var(--text-1);}
.filter-chip.active{background:var(--accent);border-color:var(--accent);color:#000;}

/* ── Post cards ── */
.posts-feed{padding:0;}
.post-card{
  padding:18px 20px;border-bottom:1px solid var(--border);
  cursor:pointer;transition:background 0.12s;
  display:flex;gap:14px;
}
.post-card:hover{background:var(--bg-1);}
.post-card:last-child{border-bottom:none;}

.post-avatar{
  width:42px;height:42px;border-radius:50%;
  background:var(--accent);color:#000;
  display:flex;align-items:center;justify-content:center;
  font-size:16px;font-weight:700;flex-shrink:0;overflow:hidden;
}
.post-avatar img{width:100%;height:100%;object-fit:cover;}
.post-avatar.green{background:var(--green);}
.post-avatar.purple{background:var(--purple);}

.post-body{flex:1;min-width:0;}
.post-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:4px;}
.post-author{font-size:15px;font-weight:700;color:var(--text-1);}
.post-meta{display:flex;align-items:center;gap:6px;font-size:13px;color:var(--text-2);}
.post-dot{font-size:4px;color:var(--text-3);}

.post-title{
  font-size:16px;font-weight:700;color:var(--text-1);
  margin-bottom:6px;line-height:1.35;letter-spacing:-0.01em;
}
.post-excerpt{
  font-size:14px;line-height:1.6;color:var(--text-2);
  font-family:"Merriweather",Georgia,serif;
  display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;
  margin-bottom:10px;
}

/* Tags */
.post-tags{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px;}
.tag{
  padding:3px 10px;border-radius:9999px;font-size:11px;font-weight:600;
  background:var(--bg-3);color:var(--text-2);border:1px solid var(--border);
  transition:all 0.15s;
}
.tag:hover{border-color:var(--accent);color:var(--accent);}
.tag.accent{background:var(--accent-dim);color:var(--accent);border-color:transparent;}

/* Thumbnail image on post card */
.post-thumb{
  width:80px;height:80px;border-radius:10px;object-fit:cover;
  flex-shrink:0;border:1px solid var(--border);
  align-self:flex-start;
}

/* Post footer — engagement row */
.post-footer{display:flex;align-items:center;gap:16px;}
.engage-btn{
  display:flex;align-items:center;gap:5px;background:none;border:none;
  font-size:13px;color:var(--text-2);padding:4px 0;transition:color 0.15s;font-family:inherit;
}
.engage-btn:hover{color:var(--text-1);}
.engage-btn.liked{color:var(--red);}
.engage-btn.liked i{color:var(--red);}
.engage-btn i{font-size:14px;transition:color 0.15s;}
.engage-btn:hover i{color:var(--accent);}
.engage-btn.liked:hover i{color:var(--red);}
.engage-sep{flex:1;}

/* Media preview inside card */
.post-media-preview{
  margin:10px 0;border-radius:12px;overflow:hidden;
  border:1px solid var(--border);max-height:200px;
}
.post-media-preview img{width:100%;height:200px;object-fit:cover;display:block;}
.media-tag{
  display:inline-flex;align-items:center;gap:5px;
  padding:3px 10px;border-radius:9999px;font-size:11px;font-weight:600;
  border:1px solid var(--border);color:var(--text-2);background:var(--bg-2);
}
.media-tag i{font-size:11px;}

/* ── Right sidebar ── */
.right-panel{
  grid-area:right;
  position:sticky;top:var(--header-h);height:calc(100vh - var(--header-h));
  overflow-y:auto;padding:20px 16px;
  display:flex;flex-direction:column;gap:20px;
}

.panel-box{
  background:var(--bg-1);border:1px solid var(--border);
  border-radius:14px;overflow:hidden;
}
.panel-box-header{
  padding:14px 16px 12px;border-bottom:1px solid var(--border);
  font-size:16px;font-weight:800;letter-spacing:-0.02em;
}
.panel-box-footer{
  padding:12px 16px;border-top:1px solid var(--border);
  font-size:13px;color:var(--accent);font-weight:600;cursor:pointer;
  transition:background 0.12s;
}
.panel-box-footer:hover{background:var(--bg-2);}

/* Trending item */
.trending-item{
  padding:12px 16px;border-bottom:1px solid var(--border);
  cursor:pointer;transition:background 0.12s;
}
.trending-item:last-child{border-bottom:none;}
.trending-item:hover{background:var(--bg-2);}
.trending-rank{font-size:11px;color:var(--text-3);font-weight:600;margin-bottom:3px;}
.trending-title{font-size:14px;font-weight:700;color:var(--text-1);margin-bottom:2px;line-height:1.3;}
.trending-meta{font-size:12px;color:var(--text-2);}

/* Who to follow */
.follow-item{
  display:flex;align-items:center;gap:12px;padding:12px 16px;
  border-bottom:1px solid var(--border);transition:background 0.12s;cursor:pointer;
}
.follow-item:last-child{border-bottom:none;}
.follow-item:hover{background:var(--bg-2);}
.follow-avatar{
  width:38px;height:38px;border-radius:50%;background:var(--accent);
  color:#000;display:flex;align-items:center;justify-content:center;
  font-size:15px;font-weight:700;flex-shrink:0;overflow:hidden;
}
.follow-avatar img{width:100%;height:100%;object-fit:cover;}
.follow-info{flex:1;min-width:0;}
.follow-name{font-size:14px;font-weight:700;color:var(--text-1);}
.follow-sub{font-size:12px;color:var(--text-2);}
.btn-follow{
  padding:5px 14px;border-radius:9999px;font-size:12px;font-weight:700;
  border:1px solid var(--border);background:transparent;color:var(--text-1);
  transition:all 0.15s;white-space:nowrap;flex-shrink:0;
}
.btn-follow:hover{background:var(--text-1);color:var(--bg);}
.btn-follow.following{background:var(--accent-dim);border-color:var(--accent);color:var(--accent);}

/* ── User profile popup (dropdown) ── */
.user-popup-overlay{display:none;position:fixed;inset:0;z-index:199;}
.user-popup-overlay.show{display:block;}
.user-popup{
  position:fixed;top:calc(var(--header-h) + 8px);right:20px;
  width:280px;background:var(--bg-1);
  border:1px solid var(--border);border-radius:16px;
  box-shadow:0 16px 48px rgba(0,0,0,0.7);
  z-index:200;display:none;animation:popIn 0.16s ease;overflow:hidden;
}
.user-popup.show{display:block;}
@keyframes popIn{from{opacity:0;transform:translateY(-8px) scale(0.97);}to{opacity:1;transform:none;}}
.popup-profile{padding:16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;}
.popup-ava{width:46px;height:46px;border-radius:50%;background:var(--accent);color:#000;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:700;overflow:hidden;flex-shrink:0;}
.popup-ava img{width:100%;height:100%;object-fit:cover;}
.popup-name{font-weight:700;font-size:15px;margin-bottom:2px;}
.popup-stats{font-size:12px;color:var(--text-2);}
.popup-item{display:flex;align-items:center;gap:14px;padding:13px 16px;background:none;border:none;color:var(--text-1);font-size:14px;font-weight:500;width:100%;text-align:left;cursor:pointer;transition:background 0.12s;font-family:inherit;}
.popup-item:hover{background:var(--bg-2);}
.popup-item i{width:16px;text-align:center;color:var(--text-2);}
.popup-item.red{color:var(--red);}
.popup-item.red i{color:var(--red);}
.popup-divider{height:1px;background:var(--border);}

/* ── Search results overlay (inside main) ── */
.search-results-view{display:none;padding:0;}
.search-results-view.show{display:block;}
.results-section-head{
  padding:14px 20px 10px;font-size:11px;font-weight:700;
  letter-spacing:0.08em;text-transform:uppercase;color:var(--text-3);
  border-bottom:1px solid var(--border);
}
.result-row{
  display:flex;align-items:flex-start;gap:14px;padding:14px 20px;
  border-bottom:1px solid var(--border);cursor:pointer;transition:background 0.12s;
}
.result-row:hover{background:var(--bg-1);}
.result-ava{
  width:42px;height:42px;border-radius:50%;background:var(--accent);
  color:#000;display:flex;align-items:center;justify-content:center;
  font-size:16px;font-weight:700;flex-shrink:0;overflow:hidden;
}
.result-ava img{width:100%;height:100%;object-fit:cover;}
.result-ava.sq{border-radius:10px;}
.result-ava.green{background:var(--green);}
.result-ava.purple{background:var(--purple);}
.result-info{flex:1;min-width:0;}
.result-name{font-size:15px;font-weight:700;margin-bottom:2px;}
.result-sub{font-size:13px;color:var(--text-2);}
.result-badge{
  padding:2px 9px;border-radius:9999px;font-size:11px;font-weight:700;
  flex-shrink:0;align-self:center;
}
.result-badge.user{background:rgba(74,158,255,0.12);color:#4a9eff;}
.result-badge.article{background:rgba(74,158,100,0.12);color:var(--green);}
.result-badge.library{background:rgba(126,106,176,0.12);color:var(--purple);}
.result-badge.content{background:var(--accent-dim);color:var(--accent);}

/* Content search card */
.content-card{
  margin:0;padding:14px 20px;border-bottom:1px solid var(--border);
  cursor:pointer;transition:background 0.12s;
}
.content-card:hover{background:var(--bg-1);}
.content-card-inner{display:flex;gap:12px;margin-bottom:8px;}
.content-card-icon{
  width:42px;height:42px;border-radius:10px;
  background:var(--accent-dim);display:flex;align-items:center;justify-content:center;
  flex-shrink:0;font-size:16px;color:var(--accent);
}
.content-card-meta{flex:1;min-width:0;}
.content-card-title{font-size:15px;font-weight:700;margin-bottom:2px;color:var(--text-1);}
.content-card-author{font-size:13px;color:var(--text-2);}
.content-excerpt{
  font-size:13px;line-height:1.6;color:var(--text-2);
  font-family:"Merriweather",Georgia,serif;
  display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;
  padding-left:54px;
}
.content-excerpt mark{background:var(--accent-dim);color:var(--text-1);padding:1px 2px;border-radius:2px;font-style:normal;}

/* ── Empty / loading states ── */
.empty{text-align:center;padding:60px 24px;color:var(--text-2);}
.empty i{font-size:36px;opacity:0.3;display:block;margin-bottom:14px;}
.empty h3{font-size:20px;font-weight:800;color:var(--text-1);margin-bottom:6px;letter-spacing:-0.02em;}
.empty p{font-size:14px;}
.spinner{display:inline-block;width:20px;height:20px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 0.8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.loading-row{display:flex;align-items:center;justify-content:center;padding:32px;}

/* Skeleton */
@keyframes shimmer{0%{background-position:-600px 0;}100%{background-position:600px 0;}}
.sk{
  background:linear-gradient(90deg,var(--bg-2) 25%,var(--bg-3) 50%,var(--bg-2) 75%);
  background-size:1200px 100%;animation:shimmer 1.5s infinite linear;border-radius:6px;
}
body.light .sk{background:linear-gradient(90deg,#e8e4dc 25%,#ddd8ce 50%,#e8e4dc 75%);background-size:1200px 100%;}
.sk-card{padding:18px 20px;border-bottom:1px solid var(--border);display:flex;gap:14px;}
.sk-ava{width:42px;height:42px;border-radius:50%;flex-shrink:0;}
.sk-body{flex:1;display:flex;flex-direction:column;gap:8px;}
.sk-line{height:12px;} .sk-w90{width:90%;} .sk-w70{width:70%;} .sk-w50{width:50%;} .sk-w30{width:30%;}
.sk-title{height:16px;width:80%;}
.sk-excerpt{height:12px;}

/* ── Comments panel (slide-in from right) ── */
.comments-backdrop{position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:299;opacity:0;pointer-events:none;transition:opacity 0.25s;}
.comments-backdrop.open{opacity:1;pointer-events:all;}
.comments-panel{
  position:fixed;top:0;right:0;bottom:0;width:380px;max-width:100vw;
  background:var(--bg-1);border-left:1px solid var(--border);
  z-index:300;transform:translateX(100%);transition:transform 0.3s cubic-bezier(0.4,0,0.2,1);
  display:flex;flex-direction:column;
}
.comments-panel.open{transform:translateX(0);}
.cp-header{display:flex;align-items:center;justify-content:space-between;padding:18px 20px;border-bottom:1px solid var(--border);flex-shrink:0;}
.cp-title{font-size:17px;font-weight:800;letter-spacing:-0.02em;}
.cp-close{width:32px;height:32px;border-radius:50%;border:none;background:transparent;color:var(--text-2);font-size:18px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:background 0.15s;}
.cp-close:hover{background:var(--bg-2);color:var(--text-1);}
.cp-list{flex:1;overflow-y:auto;padding:8px 0;}
.cp-comment{display:flex;gap:10px;padding:14px 20px;border-bottom:1px solid var(--border);}
.cp-comment:last-child{border-bottom:none;}
.cp-ava{width:34px;height:34px;border-radius:50%;background:var(--accent);color:#000;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0;overflow:hidden;}
.cp-ava img{width:100%;height:100%;object-fit:cover;}
.cp-author{font-size:14px;font-weight:700;margin-bottom:3px;}
.cp-text{font-size:14px;line-height:1.5;color:var(--text-1);}
.cp-time{font-size:12px;color:var(--text-2);margin-top:4px;}
.cp-input-row{display:flex;gap:8px;align-items:center;padding:14px 20px;border-top:1px solid var(--border);flex-shrink:0;}
.cp-input{flex:1;background:var(--bg-2);border:1px solid var(--border);border-radius:9999px;padding:10px 16px;color:var(--text-1);font-size:14px;outline:none;font-family:inherit;transition:border-color 0.15s;}
.cp-input::placeholder{color:var(--text-3);}
.cp-input:focus{border-color:var(--accent);}
.cp-send{width:36px;height:36px;border-radius:50%;background:var(--accent);border:none;color:#000;font-size:14px;display:flex;align-items:center;justify-content:center;transition:all 0.15s;flex-shrink:0;}
.cp-send:hover{background:var(--accent-hover);}
.cp-send:disabled{opacity:0.4;}
.cp-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:var(--text-2);gap:10px;}
.cp-empty i{font-size:36px;opacity:0.3;}
.cp-empty div{font-size:15px;font-weight:600;}

/* ── Load more ── */
.load-more-btn{
  display:block;width:100%;padding:16px;background:none;border:none;
  color:var(--accent);font-size:14px;font-weight:600;cursor:pointer;
  transition:background 0.15s;font-family:inherit;border-top:1px solid var(--border);
}
.load-more-btn:hover{background:var(--bg-1);}
.load-more-btn:disabled{opacity:0.4;cursor:not-allowed;}

/* ── Mobile responsive ── */
@media(max-width:900px){
  .app-shell{grid-template-columns: var(--sidebar-w) 1fr;grid-template-areas:"header header""sidebar main";}
  .right-panel{display:none;}
}
@media(max-width:640px){
  :root{--sidebar-w:0px;}
  .app-shell{grid-template-columns:1fr;grid-template-areas:"header""main";}
  .sidebar{display:none;}
  .header-search{max-width:none;}
  .comments-panel{width:100%;}
}
</style>
</head>
<body>

<script>
if(localStorage.getItem('theme')==='light')document.body.classList.add('light');
</script>

<div class="app-shell">

        <div class="sk-card"><div class="sk sk-ava"></div><div class="sk-body"><div class="sk sk-line sk-w30"></div><div class="sk sk-title"></div><div class="sk sk-excerpt sk-w90"></div><div class="sk sk-excerpt sk-w70"></div></div></div>
        <div class="sk-card"><div class="sk sk-ava"></div><div class="sk-body"><div class="sk sk-line sk-w30"></div><div class="sk sk-title"></div><div class="sk sk-excerpt sk-w90"></div></div></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

const FB = initializeApp({
  apiKey:"AIzaSyBs6V0yY14cuLBXB1nciZ-X0eyAiodC-Ak",
  authDomain:"patholytica.firebaseapp.com",
  projectId:"patholytica",
  storageBucket:"patholytica.firebasestorage.app",
  messagingSenderId:"738430635282",
  appId:"1:738430635282:web:8451ef380447c7611137cb"
});
const auth = getAuth(FB);
const sb = window.supabase.createClient(
  "https://vduqewqyvszfquntmark.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZkdXFld3F5dnN6ZnF1bnRtYXJrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njk2MTg3MjgsImV4cCI6MjA4NTE5NDcyOH0.V2JellFmUGgYhKfW-D4CBdcBHyPztOlcgLCBdhnXj7c"
);

/* ─ Globals ─ */
let currentUser = null;
let userLikes = new Set();
let articles = [], offset = 0, hasMore = true, feedLoading = false;
let feedMode = 'recent'; // 'foryou' | 'recent'
let currentArticleId = null;
let commentCountCache = {};

const LIMIT = 15;

/* ─ Helpers ─ */
const $ = id => document.getElementById(id);
function fmt(n){if(n>=1e6)return(n/1e6).toFixed(1)+'M';if(n>=1e3)return(n/1e3).toFixed(1)+'k';return(n||0).toString();}
function timeAgo(d){
  const s=(Date.now()-new Date(d))/1000;
  if(s<60)return Math.floor(s)+'s';if(s<3600)return Math.floor(s/60)+'m';
  if(s<86400)return Math.floor(s/3600)+'h';if(s<604800)return Math.floor(s/86400)+'d';
  return new Date(d).toLocaleDateString('en-US',{month:'short',day:'numeric'});
}
function esc(t){const d=document.createElement('div');d.textContent=t;return d.innerHTML;}
function highlight(text,q){
  if(!text||!q)return esc(text);
  return esc(text).replace(new RegExp(`(${q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')})`, 'gi'),'<mark>$1</mark>');
}
function avatarLetter(name){
  if(!name)return'A';
  const i=name.indexOf('@');
  return(i!==-1&&name.length>i+1?name[i+1]:name[0]).toUpperCase();
}
function colorClass(str){
  const colors=['','green','purple'];
  const h=str?[...str].reduce((a,c)=>a+c.charCodeAt(0),0)%3:0;
  return colors[h];
}

/* ─ Theme ─ */
window.toggleTheme = function(){
  const light=document.body.classList.toggle('light');
  localStorage.setItem('theme',light?'light':'dark');
  $('themeLabel').textContent=light?'Dark Mode':'Light Mode';
  $('themeIcon').className=light?'fas fa-moon':'fas fa-circle-half-stroke';
};
(function(){
  const l=document.body.classList.contains('light');
  const lbl=$('themeLabel'),ico=$('themeIcon');
  if(lbl)lbl.textContent=l?'Dark Mode':'Light Mode';
  if(ico)ico.className=l?'fas fa-moon':'fas fa-circle-half-stroke';
})();
$('themeToggle').addEventListener('click',toggleTheme);

/* ─ Auth ─ */
window.doLogout = async function(){try{await signOut(auth);location.reload();}catch(e){alert('Error logging out');}};

onAuthStateChanged(auth,async user=>{
  if(user){
    $('authButtons').style.display='none';
    $('userActions').style.display='flex';
    currentUser = await getMe(user.uid);
    if(currentUser)await loadLikes();
    await populatePopup(user);
  } else {
    $('authButtons').style.display='flex';
    $('userActions').style.display='none';
  }
  loadFeed(true);
  loadTrending();
  loadFollowSuggestions();
});

async function getMe(uid){
  try{const{data}=await sb.from('users').select('user_id,firebase_uid,username,pfp').eq('firebase_uid',uid).single();return data||null;}
  catch{return null;}
}
async function loadLikes(){
  if(!currentUser)return;
  try{
    const{data}=await sb.from('likes').select('article_id').eq('user_id',currentUser.user_id);
    userLikes.clear();(data||[]).forEach(l=>userLikes.add(String(l.article_id)));
    updateAllLikeBtns();
  }catch{}
}
function updateAllLikeBtns(){
  document.querySelectorAll('.engage-btn[data-like]').forEach(b=>{
    const liked=userLikes.has(String(b.dataset.like));
    b.classList.toggle('liked',liked);
    b.querySelector('i').className=liked?'fas fa-heart':'far fa-heart';
  });
}

async function populatePopup(user){
  try{
    const{data:ud}=await sb.from('users').select('*').eq('firebase_uid',user.uid).single();
    if(!ud)return;
    $('popupName').textContent=`@${ud.username}`;
    const ava=$('popupAva');
    ava.innerHTML=ud.pfp?`<img src="${ud.pfp}" alt="">`:avatarLetter(ud.username);
    // Update header avatar
    const uab=$('userAvatarBtn');
    uab.innerHTML=ud.pfp?`<img src="${ud.pfp}" alt="">`:avatarLetter(ud.username);
    const[ar,lr]=await Promise.all([
      sb.from('articles').select('id,views').eq('firebase_uid',user.uid),
      sb.from('playlists').select('id').eq('user_id',ud.user_id)
    ]);
    const arts=ar.data||[],libs=lr.data||[];
    const views=arts.reduce((s,a)=>s+(a.views||0),0);
    $('popupStats').textContent=`${arts.length} articles · ${libs.length} libs · ${fmt(views)} views`;
  }catch{}
}

/* ─ Popup ─ */
window.togglePopup=function(){
  const p=$('userPopup'),o=$('popupOverlay');
  if(p.classList.contains('show')){closePopup();}
  else{p.classList.add('show');o.classList.add('show');}
};
window.closePopup=function(){$('userPopup').classList.remove('show');$('popupOverlay').classList.remove('show');};

/* ─ View switching ─ */
window.showView=function(v){
  ['feed','libraries','trending'].forEach(x=>$(x+'View').style.display='none');
  ['navFeed','navTrending','navLibraries'].forEach(x=>$(x)?.classList.remove('active'));
  if(v==='feed'){$('feedView').style.display='block';$('navFeed').classList.add('active');}
  else if(v==='trending'){$('trendingView').style.display='block';$('navTrending').classList.add('active');loadTrendingFull();}
  else if(v==='libraries'){$('librariesView').style.display='block';$('navLibraries').classList.add('active');loadLibraries();}
};

/* ─ Feed tabs ─ */
window.switchFeedTab=function(tab){
  if(tab==='foryou'){$('tabForYou').classList.add('active');$('tabRecent').classList.remove('active');}
  else{$('tabRecent').classList.add('active');$('tabForYou').classList.remove('active');}
  $('tabSearch').classList.remove('active');
  hideSearch();
  feedMode=tab;articles=[];offset=0;hasMore=true;
  loadFeed(true);
};
window.focusSearch=function(){
  $('searchInput').focus();
  showSearch();
  $('tabSearch').classList.add('active');
  $('tabForYou').classList.remove('active');
  $('tabRecent').classList.remove('active');
};

/* ─ Feed ─ */
async function loadFeed(isNew=true){
  if(feedLoading||(!isNew&&!hasMore))return;
  feedLoading=true;
  if(isNew){$('postsFeed').innerHTML=skeletonFeed();$('loadMoreBtn').style.display='none';}

  try{
    let q=sb.from('articles').select('*').order('created_at',{ascending:false}).range(offset,offset+LIMIT-1);
    const{data,error}=await q;
    if(error)throw error;
    if(!data||data.length===0){
      if(isNew)$('postsFeed').innerHTML=`<div class="empty"><i class="fas fa-newspaper"></i><h3>No articles yet</h3><p>Be the first to publish</p></div>`;
      hasMore=false;feedLoading=false;return;
    }
    if(data.length<LIMIT)hasMore=false;
    offset+=data.length;

    // Fetch authors
    const uids=[...new Set(data.map(a=>a.firebase_user_id).filter(Boolean))];
    let uMap={};
    if(uids.length){const{data:u}=await sb.from('users').select('firebase_uid,username,pfp').in('firebase_uid',uids);(u||[]).forEach(u=>uMap[u.firebase_uid]=u);}

    // Fetch first media
    const ids=data.map(a=>a.id);
    let mMap={};
    if(ids.length){const{data:m}=await sb.from('media').select('*').in('article_id',ids).order('display_order',{ascending:true});(m||[]).forEach(m=>{if(!mMap[m.article_id])mMap[m.article_id]=m;});}

    // Fetch comment counts
    const{data:cc}=await sb.from('comments').select('article_id');
    (cc||[]).forEach(c=>{commentCountCache[c.article_id]=(commentCountCache[c.article_id]||0)+1;});

    const enriched=data.map(a=>({
      ...a,
      author:uMap[a.firebase_user_id],
      firstMedia:mMap[a.id]||null,
      commentCount:commentCountCache[a.id]||0
    }));
    articles=[...articles,...enriched];

    if(isNew)$('postsFeed').innerHTML='';
    enriched.forEach(a=>$('postsFeed').appendChild(buildCard(a)));
    updateAllLikeBtns();
    if(hasMore)$('loadMoreBtn').style.display='block';

  }catch(e){
    console.error(e);
    if(isNew)$('postsFeed').innerHTML=`<div class="empty"><i class="fas fa-exclamation-triangle"></i><h3>Failed to load</h3><p>Please refresh</p></div>`;
  }
  feedLoading=false;
}

window.loadMore=function(){loadFeed(false);};

function skeletonFeed(){
  return Array(3).fill(0).map(()=>`
    <div class="sk-card">
      <div class="sk sk-ava"></div>
      <div class="sk-body">
        <div class="sk sk-line sk-w30" style="margin-bottom:4px;"></div>
        <div class="sk sk-title" style="margin-bottom:8px;"></div>
        <div class="sk sk-excerpt sk-w90" style="margin-bottom:6px;"></div>
        <div class="sk sk-excerpt sk-w70"></div>
      </div>
    </div>`).join('');
}

function buildCard(a){
  const author=a.author;
  const uname=author?.username?`@${author.username}`:'Anonymous';
  const letter=avatarLetter(uname);
  const cc=colorClass(uname);
  const liked=userLikes.has(String(a.id));
  const hasImg=a.firstMedia?.type==='image'&&a.firstMedia?.url;
  const hasPdf=a.firstMedia?.type==='pdf';
  const hasYt=a.firstMedia?.type==='youtube';
  const hasAudio=a.firstMedia?.type==='audio';
  const excerpt=(a.content||'').replace(/\n/g,' ').substring(0,220)+(a.content?.length>220?'…':'');

  const div=document.createElement('div');
  div.className='post-card';
  div.dataset.id=a.id;

  let mediaBadge='';
  if(hasPdf)mediaBadge=`<span class="media-tag"><i class="fas fa-file-pdf" style="color:#e74c3c;"></i> PDF</span>`;
  else if(hasYt)mediaBadge=`<span class="media-tag"><i class="fab fa-youtube" style="color:#ff0000;"></i> Video</span>`;
  else if(hasAudio)mediaBadge=`<span class="media-tag"><i class="fas fa-headphones"></i> Audio</span>`;

  div.innerHTML=`
    <div class="post-avatar ${cc}">
      ${author?.pfp?`<img src="${author.pfp}" alt="">`  :letter}
    </div>
    <div class="post-body">
      <div class="post-header">
        <div>
          <span class="post-author">${esc(uname)}</span>
          <div class="post-meta">
            <span>${timeAgo(a.created_at)}</span>
            ${mediaBadge?`<span class="post-dot">•</span>${mediaBadge}`:''}
          </div>
        </div>
        ${hasImg?`<img class="post-thumb" src="${a.firstMedia.url}" alt="" onerror="this.style.display='none'">`:'' }
      </div>
      <div class="post-title">${esc(a.title||'Untitled')}</div>
      ${excerpt?`<div class="post-excerpt">${esc(excerpt)}</div>`:''}
      <div class="post-footer">
        <button class="engage-btn ${liked?'liked':''}" data-like="${a.id}">
          <i class="${liked?'fas':'far'} fa-heart"></i>&nbsp;${fmt(a.likes||0)}
        </button>
        <button class="engage-btn" data-comment="${a.id}">
          <i class="far fa-comment"></i>&nbsp;${fmt(a.commentCount||0)}
        </button>
        <button class="engage-btn" onclick="shareArticle('${a.id}','${esc(a.title||'')}')">
          <i class="fas fa-arrow-up-from-bracket"></i>
        </button>
        <span class="engage-sep"></span>
        <button class="engage-btn" style="font-size:12px;font-weight:600;color:var(--accent);" data-open="${a.id}">
          Read <i class="fas fa-arrow-right" style="font-size:11px;"></i>
        </button>
      </div>
    </div>`;

  // Wire events
  div.querySelector(`[data-like]`).addEventListener('click',e=>{e.stopPropagation();handleLike(a.id,div);});
  div.querySelector(`[data-comment]`).addEventListener('click',e=>{e.stopPropagation();openComments(a.id);});
  div.querySelector(`[data-open]`).addEventListener('click',e=>{e.stopPropagation();window.location.href=`article.html?id=${a.id}`;});
  div.addEventListener('click',()=>window.location.href=`article.html?id=${a.id}`);

  return div;
}

/* ─ Like ─ */
async function handleLike(id,card){
  const idStr=String(id);
  const btn=card.querySelector(`[data-like="${id}"]`);
  if(!currentUser){window.location.href='login.html';return;}
  if(btn.dataset.processing==='1')return;
  btn.dataset.processing='1';

  const wasLiked=userLikes.has(idStr);
  const likeSpan=btn;
  const prevLikes=parseInt((likeSpan.textContent||'0').replace(/[^0-9]/g,''))||0;
  const newLikes=wasLiked?Math.max(0,prevLikes-1):prevLikes+1;

  if(wasLiked){userLikes.delete(idStr);btn.classList.remove('liked');btn.querySelector('i').className='far fa-heart';}
  else{userLikes.add(idStr);btn.classList.add('liked');btn.querySelector('i').className='fas fa-heart';}
  btn.innerHTML=`<i class="${wasLiked?'far':'fas'} fa-heart"></i>&nbsp;${fmt(newLikes)}`;

  try{
    if(wasLiked){
      await sb.from('likes').delete().eq('article_id',id).eq('user_id',currentUser.user_id);
      const{error}=await sb.rpc('decrement_likes',{article_id:parseInt(id)});
      if(error){const{data:f}=await sb.from('articles').select('likes').eq('id',id).single();await sb.from('articles').update({likes:Math.max(0,(f?.likes||1)-1)}).eq('id',id);}
    } else {
      const{error:ie}=await sb.from('likes').insert([{article_id:parseInt(id),user_id:currentUser.user_id}]);
      if(ie&&ie.code!=='23505')throw ie;
      const{error}=await sb.rpc('increment_likes',{article_id:parseInt(id)});
      if(error){const{data:f}=await sb.from('articles').select('likes').eq('id',id).single();await sb.from('articles').update({likes:(f?.likes||0)+1}).eq('id',id);}
    }
  }catch(e){
    // Revert
    if(wasLiked){userLikes.add(idStr);btn.classList.add('liked');}else{userLikes.delete(idStr);btn.classList.remove('liked');}
    btn.innerHTML=`<i class="${wasLiked?'fas':'far'} fa-heart"></i>&nbsp;${fmt(prevLikes)}`;
  }
  btn.dataset.processing='0';
}

/* ─ Share ─ */
window.shareArticle=async function(id,title){
  const url=`${location.origin}/article.html?id=${id}`;
  if(navigator.share){try{await navigator.share({title,url});}catch{}}
  else{try{await navigator.clipboard.writeText(url);alert('Link copied!');}catch{}}
};

/* ─ Comments ─ */
window.openComments=async function(id){
  currentArticleId=id;
  $('commentsBd').classList.add('open');
  $('commentsPanel').classList.add('open');
  await loadComments(id);
};

async function loadComments(id){
  $('cpList').innerHTML=`<div class="loading-row"><div class="spinner"></div></div>`;
  try{
    const{data:comments}=await sb.from('comments').select('*').eq('article_id',id).order('created_at',{ascending:true});
    if(!comments||!comments.length){$('cpList').innerHTML=`<div class="cp-empty"><i class="fas fa-comments"></i><div>No replies yet</div></div>`;return;}
    const uids=[...new Set(comments.map(c=>c.user_id).filter(Boolean))];let umap={};
    if(uids.length){const{data:u}=await sb.from('users').select('user_id,username,pfp').in('user_id',uids);(u||[]).forEach(u=>umap[u.user_id]=u);}
    $('cpList').innerHTML=comments.map(c=>{
      const u=umap[c.user_id],name=u?.username?`@${u.username}`:'Anonymous';
      return`<div class="cp-comment">
        <div class="cp-ava">${u?.pfp?`<img src="${u.pfp}" alt="">`:(u?.username||'A')[0].toUpperCase()}</div>
        <div>
          <div class="cp-author">${esc(name)}</div>
          <div class="cp-text">${esc(c.comment_text)}</div>
          <div class="cp-time">${timeAgo(c.created_at)}</div>
        </div>
      </div>`;
    }).join('');
  }catch{$('cpList').innerHTML=`<div class="cp-empty"><i class="fas fa-exclamation-triangle"></i><div>Failed to load</div></div>`;}
}

window.postComment=async function(){
  const input=$('cpInput'),text=input.value.trim();
  if(!text||!currentArticleId)return;
  const btn=$('cpSend');btn.disabled=true;
  try{
    if(!currentUser){window.location.href='login.html';return;}
    await sb.from('comments').insert([{article_id:currentArticleId,user_id:currentUser.user_id,comment_text:text}]);
    input.value='';
    await loadComments(currentArticleId);
    // Update count on card
    const card=document.querySelector(`.post-card[data-id="${currentArticleId}"]`);
    if(card){const cb=card.querySelector('[data-comment]');if(cb){const n=parseInt(cb.textContent.replace(/\D/g,''))||0;cb.innerHTML=`<i class="far fa-comment"></i>&nbsp;${fmt(n+1)}`;}}
  }catch{alert('Failed to post reply.');}
  btn.disabled=false;
};
$('cpInput').addEventListener('keypress',e=>{if(e.key==='Enter')postComment();});

async function loadTrendingFull(){

    const{data}=await sb.from('articles').select('*').order('views',{ascending:false}).limit(30);

    const ids=data.map(a=>a.id);

/* ─ Search ─ */
let searchTimer, searchQuery='', searchOffset=0, searchHasMore=false, searchFilter='all';
const SEARCH_LIMIT=10;

const searchInput=$('searchInput');
const clearBtn=$('clearSearch');

function showSearch(){
  $('feedView').style.display='none';
  $('trendingView').style.display='none';
  $('librariesView').style.display='none';
  $('searchView').classList.add('show');
  $('searchFilterBar').classList.add('show');
  $('feedTabs').style.display='flex';
}
function hideSearch(){
  $('searchView').classList.remove('show');
  $('searchFilterBar').classList.remove('show');
  $('feedView').style.display='block';
}

searchInput.addEventListener('input',e=>{
  const q=e.target.value.trim();
  clearBtn.classList.toggle('show',!!q);
  if(!q){
    clearResults();
    if($('searchView').classList.contains('show')){
      switchFeedTab('recent');
    }
    return;
  }
  showSearch();
  $('tabSearch').classList.add('active');
  clearTimeout(searchTimer);
  searchTimer=setTimeout(()=>{searchOffset=0;doSearch(q,true);},280);
});

clearBtn.addEventListener('click',()=>{
  searchInput.value='';clearBtn.classList.remove('show');
  clearResults();
  switchFeedTab('recent');
});

document.querySelectorAll('.filter-chip').forEach(c=>c.addEventListener('click',()=>{
  document.querySelectorAll('.filter-chip').forEach(x=>x.classList.remove('active'));
  c.classList.add('active');searchFilter=c.dataset.filter;
  if(searchQuery){searchOffset=0;doSearch(searchQuery,true);}
}));

function clearResults(){
  $('searchResultsList').innerHTML=`<li class="empty"><i class="fas fa-search"></i><h3>Search Patholytica</h3><p>Find articles, authors, and libraries</p></li>`;
  $('searchLoadMore').style.display='none';
  searchQuery='';searchOffset=0;
}

$('searchLoadMoreBtn')?.addEventListener('click',()=>doSearch(searchQuery,false));

async function doSearch(q,isNew=true){
  searchQuery=q;
  const list=$('searchResultsList');
  if(isNew){list.innerHTML='';list.appendChild(Object.assign(document.createElement('li'),{className:'loading-row',innerHTML:'<div class="spinner"></div>'}));}
  try{
    let results=[],total=0;
    if(searchFilter==='all'){
      const per=Math.ceil(SEARCH_LIMIT/3),off=Math.floor(searchOffset/3);
      const[ur,ar,pr]=await Promise.all([
        sb.from('users').select('*',{count:'exact'}).ilike('username',`%${q}%`).range(off,off+per-1),
        sb.from('articles').select('*',{count:'exact'}).ilike('title',`%${q}%`).range(off,off+per-1),
        sb.from('playlists').select('*',{count:'exact'}).ilike('name',`%${q}%`).range(off,off+per-1)
      ]);
      if(ur.data)results.push(...ur.data.map(u=>({...u,_type:'user'})));
      if(ar.data){
        const uids=[...new Set(ar.data.map(a=>a.firebase_user_id).filter(Boolean))];let umap={};
        if(uids.length){const{data:u}=await sb.from('users').select('firebase_uid,username').in('firebase_uid',uids);(u||[]).forEach(u=>umap[u.firebase_uid]=u);}
        results.push(...ar.data.map(a=>({...a,_type:'article',_author:umap[a.firebase_user_id]?.username||'Unknown'})));
      }
      if(pr.data)results.push(...pr.data.map(p=>({...p,_type:'playlist'})));
      total=(ur.count||0)+(ar.count||0)+(pr.count||0);
      results=results.slice(0,SEARCH_LIMIT);
    } else if(searchFilter==='users'){
      const{data,count}=await sb.from('users').select('*',{count:'exact'}).ilike('username',`%${q}%`).range(searchOffset,searchOffset+SEARCH_LIMIT-1);
      results=(data||[]).map(u=>({...u,_type:'user'}));total=count||0;
    } else if(searchFilter==='articles'){
      const{data,count}=await sb.from('articles').select('*',{count:'exact'}).ilike('title',`%${q}%`).range(searchOffset,searchOffset+SEARCH_LIMIT-1);
      const uids=[...new Set((data||[]).map(a=>a.firebase_user_id).filter(Boolean))];let umap={};
      if(uids.length){const{data:u}=await sb.from('users').select('firebase_uid,username').in('firebase_uid',uids);(u||[]).forEach(u=>umap[u.firebase_uid]=u);}
      results=(data||[]).map(a=>({...a,_type:'article',_author:umap[a.firebase_user_id]?.username||'Unknown'}));total=count||0;
    } else if(searchFilter==='article-content'){
      const{data,count}=await sb.from('articles').select('*',{count:'exact'}).ilike('content',`%${q}%`).range(searchOffset,searchOffset+SEARCH_LIMIT-1);
      const uids=[...new Set((data||[]).map(a=>a.firebase_user_id).filter(Boolean))];let umap={};
      if(uids.length){const{data:u}=await sb.from('users').select('firebase_uid,username').in('firebase_uid',uids);(u||[]).forEach(u=>umap[u.firebase_uid]=u);}
      results=(data||[]).map(a=>{
        let excerpt='';
        if(a.content){const idx=a.content.toLowerCase().indexOf(q.toLowerCase()),s=Math.max(0,idx-40),e2=Math.min(a.content.length,idx+q.length+100);excerpt=(s>0?'…':'')+a.content.substring(s,e2)+(e2<a.content.length?'…':'');}
        return{...a,_type:'content',_author:umap[a.firebase_user_id]?.username||'Unknown',_excerpt:excerpt};
      });total=count||0;
    } else if(searchFilter==='playlists'){
      const{data,count}=await sb.from('playlists').select('*',{count:'exact'}).ilike('name',`%${q}%`).range(searchOffset,searchOffset+SEARCH_LIMIT-1);
      results=(data||[]).map(p=>({...p,_type:'playlist'}));total=count||0;
    }

    searchHasMore=(searchOffset+results.length)<total;
    if(isNew)list.innerHTML='';
    if(!results.length&&isNew){list.innerHTML=`<li class="empty"><i class="fas fa-search"></i><h3>No results for "${esc(q)}"</h3><p>Try different keywords</p></li>`;$('searchLoadMore').style.display='none';return;}

    results.forEach(r=>{
      const li=document.createElement('li');
      if(r._type==='content'){
        const date=new Date(r.created_at).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
        li.innerHTML=`
          <div class="content-card">
            <div class="content-card-inner">
              <div class="content-card-icon"><i class="fas fa-file-lines"></i></div>
              <div class="content-card-meta">
                <div class="content-card-title">${esc(r.title||'Untitled')}</div>
                <div class="content-card-author">@${esc(r._author)} · ${date}</div>
              </div>
              <span class="result-badge content">Content</span>
            </div>
            ${r._excerpt?`<div class="content-excerpt">${highlight(r._excerpt,q)}</div>`:''}
          </div>`;
        li.onclick=()=>window.location.href=`article.html?id=${r.id}`;
      } else {
        li.innerHTML=`<div class="result-row"></div>`;
        const row=li.querySelector('.result-row');
        const ava=document.createElement('div');
        if(r._type==='user'){
          ava.className=`result-ava ${colorClass(r.username)}`;
          ava.innerHTML=r.pfp?`<img src="${r.pfp}" alt="">`:avatarLetter('@'+r.username);
          row.onclick=()=>window.location.href=`profile.html?username=${r.username}`;
        } else if(r._type==='article'){
          ava.className='result-ava sq green';
          ava.innerHTML=avatarLetter(r.title||'A');
          row.onclick=()=>window.location.href=`article.html?id=${r.id}`;
        } else if(r._type==='playlist'){
          ava.className='result-ava sq purple';
          ava.innerHTML=`<i class="fas fa-layer-group" style="font-size:15px;"></i>`;
          row.onclick=()=>window.location.href=`playlist.html?id=${r.id}`;
        }
        const info=document.createElement('div');info.className='result-info';
        const badge=document.createElement('span');
        if(r._type==='user'){
          info.innerHTML=`<div class="result-name">@${esc(r.username||'?')}</div><div class="result-sub">${esc(r.bio||'No bio')}</div>`;
          badge.className='result-badge user';badge.textContent='User';
        } else if(r._type==='article'){
          const date=new Date(r.created_at).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
          info.innerHTML=`<div class="result-name">${esc(r.title||'Untitled')}</div><div class="result-sub">@${esc(r._author)} · ${date}</div>`;
          badge.className='result-badge article';badge.textContent='Article';
        } else if(r._type==='playlist'){
          info.innerHTML=`<div class="result-name">${esc(r.name||'Untitled')}</div><div class="result-sub">${r.article_count||0} articles</div>`;
          badge.className='result-badge library';badge.textContent='Library';
        }
        row.appendChild(ava);row.appendChild(info);row.appendChild(badge);
      }
      list.appendChild(li);
    });

    searchOffset+=results.length;
    $('searchLoadMore').style.display=searchHasMore?'block':'none';
  }catch(e){
    console.error(e);
    if(isNew)list.innerHTML=`<li class="empty"><i class="fas fa-exclamation-triangle"></i><h3>Search failed</h3><p>Please try again</p></li>`;
  }
}
