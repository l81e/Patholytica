<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Patholytica — Login</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root {
  --bg:#0a0a0a;--bg2:#111;--bg3:#181818;
  --border:#1e1e1e;--border2:#2a2a2a;
  --text:#e8e6e1;--text2:#6e6c68;--text3:#3a3835;
  --accent:#c8a96e;
  --glass:rgba(10,10,10,0.85);--glass2:rgba(14,14,14,0.92);
  --gb:rgba(255,255,255,0.055);
  --sh:0 8px 32px rgba(0,0,0,0.72);
  --sh2:0 24px 64px rgba(0,0,0,0.88);
  --r:14px;
  --st:env(safe-area-inset-top,0px);
  --sb:env(safe-area-inset-bottom,0px);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{width:100%;height:100%;overflow:hidden;font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text)}

/* ── BACKGROUND ── */
#bg-layer{
  position:fixed;inset:-60px;z-index:0;
  background:#0a0a0a;
  background-size:cover;background-position:center;
  transition:background-image 1.8s ease, filter .6s;
  filter:blur(16px) brightness(42%);
  will-change:transform;
}
#bg-grid{
  position:fixed;inset:0;z-index:2;
  background-image:radial-gradient(circle,rgba(255,255,255,0.038) 1px,transparent 1px);
  background-size:28px 28px;
  pointer-events:none;
}

/* ── FLOATING CARDS ── */
#float-cards{
  position:fixed;inset:0;z-index:3;
  pointer-events:none;overflow:hidden;
}
.fc{
  position:absolute;
  background:var(--glass2);
  border:1px solid var(--gb);
  border-radius:var(--r);
  backdrop-filter:blur(12px);
  -webkit-backdrop-filter:blur(12px);
  box-shadow:var(--sh);
  padding:14px 16px;
  opacity:0;
  animation:fcFloat linear infinite;
  will-change:transform,opacity;
}
.fc-title{font-size:9px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--text3);margin-bottom:8px;display:flex;align-items:center;gap:6px}
.fc-title i{font-size:10px}
.fc-line{height:7px;border-radius:4px;background:var(--border2);margin-bottom:5px}
.fc-line.s{width:60%}.fc-line.xs{width:40%}
.fc-check{display:flex;align-items:center;gap:7px;margin-bottom:6px}
.fc-cb{width:11px;height:11px;border-radius:3px;border:1.5px solid var(--border2);flex-shrink:0}
.fc-cb.done{background:#3dba72;border-color:#3dba72}
.fc-ct{height:6px;border-radius:3px;background:var(--border2);flex:1}
.fc-ct.done{background:rgba(61,186,114,0.3)}
.fc-time{font-family:'DM Mono',monospace;font-size:20px;font-weight:500;color:var(--text3);letter-spacing:-.02em;text-align:center;padding:8px 0 4px}
.fc-date{font-family:'DM Mono',monospace;font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:.07em;text-align:center}
.fc-qt{font-family:'DM Serif Display',serif;font-size:10px;color:var(--text3);line-height:1.6;font-style:italic}
.fc-habit{display:flex;align-items:center;gap:6px;margin-bottom:5px}
.fc-hname{font-size:9px;color:var(--text3);flex:1}
.fc-hdots{display:flex;gap:2px}
.fc-hdot{width:9px;height:9px;border-radius:2px;background:var(--border2)}
.fc-hdot.on{background:#3dba72}
@keyframes fcFloat{
  0%{opacity:0;transform:translateY(40px) rotate(var(--rot))}
  8%{opacity:var(--max-op)}
  88%{opacity:var(--max-op)}
  100%{opacity:0;transform:translateY(-60px) rotate(var(--rot))}
}

/* ── SCENE ── */
#scene{
  position:fixed;inset:0;z-index:10;
  display:flex;align-items:center;justify-content:center;
  padding:calc(var(--st) + 16px) 16px calc(var(--sb) + 16px);
  transition:transform .3s ease;
}

/* ── CARD ── */
#card{
  width:100%;max-width:340px;
  background:var(--glass2);
  border:1px solid var(--gb);
  border-radius:calc(var(--r) + 4px);
  backdrop-filter:blur(28px) saturate(1.4);
  -webkit-backdrop-filter:blur(28px) saturate(1.4);
  box-shadow:var(--sh2),inset 0 1px 0 rgba(255,255,255,0.05);
  padding:28px 24px 24px;
  animation:cardIn .55s cubic-bezier(.4,0,.2,1) both, cardFloat 5s ease-in-out .6s infinite;
  position:relative;overflow:hidden;
}
#card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,0.07),transparent);
  pointer-events:none;
}
@media(max-width:400px){#card{padding:22px 16px 20px;max-width:100%}}
@keyframes cardIn{
  from{opacity:0;transform:translateY(20px) scale(0.97)}
  to{opacity:1;transform:translateY(0) scale(1)}
}
@keyframes cardFloat{
  0%,100%{transform:translateY(0);box-shadow:var(--sh2),inset 0 1px 0 rgba(255,255,255,0.05)}
  50%{transform:translateY(-5px);box-shadow:0 32px 80px rgba(0,0,0,0.9),inset 0 1px 0 rgba(255,255,255,0.05)}
}

/* ── BRAND ── */
#brand{text-align:center;margin-bottom:22px}
#logo-wrap{
  display:flex;align-items:center;justify-content:center;
  margin-bottom:7px;
}
#logo-wrap img{
  height:32px;width:auto;
  filter:brightness(1.05);
}
#app-sub{
  font-size:12px;color:var(--text2);font-weight:400;
  letter-spacing:.01em;
}

/* ── INPUTS ── */
#form{display:flex;flex-direction:column;gap:9px}
.field{position:relative}
.field i.fi{
  position:absolute;left:12px;top:50%;transform:translateY(-50%);
  font-size:12px;color:var(--text3);pointer-events:none;transition:color .2s;
}
.field:focus-within i.fi{color:var(--accent)}
.finput{
  width:100%;
  background:var(--bg3);
  border:1px solid var(--border2);
  border-radius:9px;
  padding:11px 12px 11px 34px;
  color:var(--text);
  font-size:13px;
  font-family:'DM Sans',sans-serif;
  outline:none;
  transition:border-color .2s,box-shadow .2s;
  -webkit-appearance:none;
}
.finput::placeholder{color:var(--text3)}
.finput:focus{
  border-color:rgba(200,169,110,0.55);
  box-shadow:0 0 0 3px rgba(200,169,110,0.1),inset 0 1px 0 rgba(200,169,110,0.04);
}
.finput:-webkit-autofill{
  -webkit-box-shadow:0 0 0 40px #181818 inset;
  -webkit-text-fill-color:var(--text);
}
.pw-eye{
  position:absolute;right:11px;top:50%;transform:translateY(-50%);
  background:none;border:none;color:var(--text3);cursor:pointer;
  font-size:12px;padding:2px 4px;transition:color .2s;
}
.pw-eye:hover{color:var(--text2)}

/* signup extras */
.signup-extra{display:none}
.signup-extra.show{display:block}

/* ── FORGOT ── */
#forgot-row{text-align:right;margin-top:-2px;margin-bottom:2px}
#forgot-btn{
  background:none;border:none;font-size:11px;color:var(--text3);
  cursor:pointer;font-family:'DM Sans',sans-serif;transition:color .18s;padding:0;
}
#forgot-btn:hover{color:var(--text2)}

/* ── PRIMARY BTN ── */
#login-btn{
  width:100%;padding:12px;
  background:var(--accent);
  border:none;border-radius:9px;
  color:#0a0a0a;font-size:13.5px;font-weight:600;
  font-family:'DM Sans',sans-serif;
  cursor:pointer;position:relative;overflow:hidden;
  transition:transform .14s,box-shadow .18s,background .18s;
  box-shadow:0 4px 18px rgba(200,169,110,0.28);
  margin-top:2px;
}
#login-btn::after{
  content:'';position:absolute;top:0;left:-100%;width:100%;height:100%;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,0.15),transparent);
  transition:left .4s;
}
#login-btn:hover::after{left:100%}
#login-btn:hover{box-shadow:0 6px 24px rgba(200,169,110,0.4);background:#d4b87a}
#login-btn:active{transform:scale(0.98)}
#login-btn:disabled{opacity:.55;cursor:not-allowed;transform:none}

/* ── DIVIDER ── */
.divider{display:flex;align-items:center;gap:10px;margin:4px 0}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border)}
.divider span{font-size:10px;color:var(--text3);letter-spacing:.06em;text-transform:uppercase;flex-shrink:0}

/* ── ALT LOGIN ── */
#alt-row{display:flex;gap:9px;justify-content:center}
.alt-btn{
  width:44px;height:44px;border-radius:50%;
  background:rgba(255,255,255,0.04);
  border:1px solid var(--border2);
  color:var(--text2);font-size:16px;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:all .18s;
  backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);flex-shrink:0;
}
.alt-btn:hover{background:rgba(255,255,255,0.08);border-color:rgba(255,255,255,0.12);color:var(--text);transform:translateY(-1px);box-shadow:0 6px 20px rgba(0,0,0,0.4)}
.alt-btn:active{transform:scale(0.95) translateY(0)}
.alt-btn.google:hover{border-color:rgba(234,67,53,0.4);color:#ea4335}
.alt-btn.apple:hover{border-color:rgba(232,232,232,0.25);color:#e8e6e1}

/* ── BOTTOM LINKS ── */
#bottom-links{
  display:flex;align-items:center;justify-content:center;
  gap:5px;margin-top:2px;font-size:12px;color:var(--text2);
}
#bottom-links button{
  background:none;border:none;font-size:12px;font-weight:600;
  color:var(--accent);cursor:pointer;font-family:'DM Sans',sans-serif;
  padding:0;transition:opacity .15s;
}
#bottom-links button:hover{opacity:.75}

/* guest */
#guest-btn{
  display:block;width:100%;background:none;border:none;
  font-size:11px;color:var(--text3);cursor:pointer;
  font-family:'DM Sans',sans-serif;padding:5px;border-radius:7px;
  transition:color .18s,background .18s;margin-top:1px;
}
#guest-btn:hover{color:var(--text2);background:rgba(255,255,255,0.03)}

/* ── TOAST ── */
#toast{
  position:fixed;top:calc(var(--st) + 14px);left:50%;transform:translateX(-50%);
  background:#111;border:1px solid var(--border2);border-radius:12px;
  padding:10px 20px;font-size:13px;color:var(--text);
  z-index:9000;display:none;white-space:nowrap;
  box-shadow:var(--sh);pointer-events:none;
  animation:tin .2s ease;
}
#toast.err{border-color:rgba(239,68,68,.35);color:#fca5a5;background:#160a0a}
#toast.ok{border-color:rgba(200,169,110,.35);color:#e8d4a8;background:#120f08}
@keyframes tin{
  from{opacity:0;transform:translateX(-50%) translateY(-8px)}
  to{opacity:1;transform:translateX(-50%) translateY(0)}
}

/* spinner */
#login-btn .spinner{
  display:none;width:15px;height:15px;
  border:2px solid rgba(10,10,10,0.3);border-top-color:#0a0a0a;
  border-radius:50%;animation:spin .6s linear infinite;margin:0 auto;
}
@keyframes spin{to{transform:rotate(360deg)}}
#login-btn.loading .btn-text{display:none}
#login-btn.loading .spinner{display:block}
</style>
</head>
<body>

<div id="bg-layer"></div>
<div id="bg-grid"></div>
<div id="float-cards"></div>

<div id="scene">
  <div id="card">

    <div id="brand">
      <div id="logo-wrap">
        <img src="IMG_0696.png" alt="Patholytica">
      </div>
      <div id="app-sub">Made with passion. Make it your place.</div>
    </div>

    <div id="form">

      <div class="field signup-extra" id="field-name">
        <i class="fas fa-user fi"></i>
        <input class="finput" id="inp-name" type="text" placeholder="Full name" autocomplete="name">
      </div>
      <div class="field signup-extra" id="field-username">
        <i class="fas fa-at fi"></i>
        <input class="finput" id="inp-username" type="text" placeholder="Username" autocomplete="username">
      </div>

      <div class="field">
        <i class="fas fa-envelope fi"></i>
        <input class="finput" id="inp-email" type="email" placeholder="Email address" autocomplete="email" inputmode="email">
      </div>
      <div class="field">
        <i class="fas fa-lock fi"></i>
        <input class="finput" id="inp-pw" type="password" placeholder="Password" autocomplete="current-password">
        <button class="pw-eye" id="pw-toggle" type="button" tabindex="-1"><i class="fas fa-eye" id="pw-icon"></i></button>
      </div>

      <div id="forgot-row">
        <button id="forgot-btn" type="button">Forgot password?</button>
      </div>

      <button id="login-btn" type="button">
        <span class="btn-text">Sign In</span>
        <div class="spinner"></div>
      </button>

      <div class="divider"><span>or</span></div>

      <div id="alt-row">
        <button class="alt-btn google" id="google-btn" title="Continue with Google" type="button"><i class="fab fa-google"></i></button>
        <button class="alt-btn apple" id="apple-btn" title="Continue with Apple" type="button"><i class="fab fa-apple"></i></button>
      </div>

      <div id="bottom-links">
        <span id="bottom-text">No account?</span>
        <button type="button" id="toggle-mode-btn">Create account</button>
      </div>

      <button id="guest-btn" type="button">
        <i class="fas fa-door-open" style="margin-right:5px;font-size:10px"></i>Enter as guest
      </button>

    </div>
  </div>
</div>

<div id="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
  getAuth,
  signInWithEmailAndPassword,
  signInWithPopup,
  GoogleAuthProvider,
  sendPasswordResetEmail,
  createUserWithEmailAndPassword
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyBs6V0yY14cuLBXB1nciZ-X0eyAiodC-Ak",
  authDomain: "patholytica.firebaseapp.com",
  databaseURL: "https://patholytica-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "patholytica",
  storageBucket: "patholytica.firebasestorage.app",
  messagingSenderId: "738430635282",
  appId: "1:738430635282:web:8451ef380447c7611137cb"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const googleProvider = new GoogleAuthProvider();

const supabase = window.supabase.createClient(
  "https://vduqewqyvszfquntmark.supabase.co",
  "sb_publishable_YseP73aoHam8YT6B0b9EQQ_iAUEWARI"
);

async function createUserInSupabase(firebaseUser, fullName, username) {
  try {
    const { data: existingByUid } = await supabase
      .from('users').select('*').eq('firebase_uid', firebaseUser.uid).maybeSingle();
    if (existingByUid) {
      await supabase.from('users').update({ updated_at: new Date().toISOString() }).eq('firebase_uid', firebaseUser.uid);
      return existingByUid;
    }
    const { data: existingByEmail } = await supabase
      .from('users').select('*').eq('email', firebaseUser.email).maybeSingle();
    if (existingByEmail) {
      await supabase.from('users').update({ firebase_uid: firebaseUser.uid, updated_at: new Date().toISOString() }).eq('email', firebaseUser.email);
      return existingByEmail;
    }
    const { data, error } = await supabase.from('users').insert([{
      firebase_uid: firebaseUser.uid,
      email: firebaseUser.email,
      username: username || firebaseUser.email.split('@')[0],
      full_name: fullName || firebaseUser.displayName || null,
      created_at: new Date().toISOString(),
      updated_at: new Date().toISOString()
    }]).select();
    if (error) throw error;
    return data[0];
  } catch (err) {
    console.error('createUserInSupabase:', err);
  }
}

async function updateUserInSupabase(uid) {
  await supabase.from('users').update({ updated_at: new Date().toISOString() }).eq('firebase_uid', uid);
}

function getErrorMessage(code) {
  return ({
    'auth/invalid-email': 'Invalid email address',
    'auth/user-disabled': 'This account has been disabled',
    'auth/user-not-found': 'No account found with this email',
    'auth/wrong-password': 'Incorrect password',
    'auth/invalid-credential': 'Incorrect email or password',
    'auth/email-already-in-use': 'An account with this email already exists',
    'auth/weak-password': 'Password must be at least 6 characters',
    'auth/popup-closed-by-user': 'Sign-in popup was closed',
    'auth/cancelled-popup-request': 'Sign-in cancelled',
  })[code] || 'An error occurred. Please try again.';
}

/* ── UI STATE ── */
var isSignUp = false;

window._setSignUp = function(val) {
  isSignUp = val;
  document.querySelectorAll('.signup-extra').forEach(function(el) {
    el.classList.toggle('show', val);
  });
  document.getElementById('login-btn').querySelector('.btn-text').textContent = val ? 'Create Account' : 'Sign In';
  document.getElementById('forgot-row').style.display = val ? 'none' : 'block';
  document.getElementById('bottom-text').textContent = val ? 'Have an account?' : 'No account?';
  document.getElementById('toggle-mode-btn').textContent = val ? 'Sign in' : 'Create account';
};

document.getElementById('toggle-mode-btn').addEventListener('click', function() {
  window._setSignUp(!isSignUp);
});

/* ── LOGIN / SIGNUP ── */
document.getElementById('login-btn').addEventListener('click', async function() {
  var email = document.getElementById('inp-email').value.trim();
  var pw = document.getElementById('inp-pw').value;
  var name = document.getElementById('inp-name').value.trim();
  var username = document.getElementById('inp-username').value.trim();
  var btn = this;

  if (!email) return showToast('Please enter your email', 'err');
  if (!pw) return showToast('Please enter your password', 'err');

  btn.classList.add('loading'); btn.disabled = true;

  try {
    if (isSignUp) {
      const result = await createUserWithEmailAndPassword(auth, email, pw);
      await createUserInSupabase(result.user, name, username);
      showToast('Account created!', 'ok');
      setTimeout(function() { window.location.href = 'index.html'; }, 1100);
    } else {
      const result = await signInWithEmailAndPassword(auth, email, pw);
      await updateUserInSupabase(result.user.uid);
      showToast('Welcome back!', 'ok');
      setTimeout(function() { window.location.href = 'index.html'; }, 1100);
    }
  } catch (err) {
    showToast(getErrorMessage(err.code), 'err');
    btn.classList.remove('loading'); btn.disabled = false;
  }
});

/* enter key */
['inp-email','inp-pw','inp-name','inp-username'].forEach(function(id) {
  var el = document.getElementById(id);
  if (el) el.addEventListener('keydown', function(e) {
    if (e.key === 'Enter') document.getElementById('login-btn').click();
  });
});

/* google */
document.getElementById('google-btn').addEventListener('click', async function() {
  try {
    const result = await signInWithPopup(auth, googleProvider);
    await createUserInSupabase(result.user);
    showToast('Signed in with Google!', 'ok');
    setTimeout(function() { window.location.href = 'index.html'; }, 1100);
  } catch (err) {
    showToast(getErrorMessage(err.code), 'err');
  }
});

/* apple placeholder */
document.getElementById('apple-btn').addEventListener('click', function() {
  showToast('Apple sign-in coming soon', '');
});

/* forgot */
document.getElementById('forgot-btn').addEventListener('click', async function() {
  var email = document.getElementById('inp-email').value.trim();
  if (!email) return showToast('Enter your email first', 'err');
  try {
    await sendPasswordResetEmail(auth, email);
    showToast('Reset link sent — check your inbox', 'ok');
  } catch (err) {
    showToast(getErrorMessage(err.code), 'err');
  }
});

/* guest */
document.getElementById('guest-btn').addEventListener('click', function() {
  showToast('Entering as guest…', 'ok', 1400);
  setTimeout(function() { window.location.href = 'index.html'; }, 1500);
});
</script>

<script>
/* ── TOAST ── */
function showToast(msg, type, ms) {
  ms = ms || 2800;
  var el = document.getElementById('toast');
  el.textContent = msg;
  el.className = type || '';
  el.style.display = 'block';
  clearTimeout(el._t);
  el._t = setTimeout(function() { el.style.display = 'none'; }, ms);
}

/* ── PW TOGGLE ── */
document.getElementById('pw-toggle').addEventListener('click', function() {
  var inp = document.getElementById('inp-pw');
  var icon = document.getElementById('pw-icon');
  if (inp.type === 'password') { inp.type = 'text'; icon.className = 'fas fa-eye-slash'; }
  else { inp.type = 'password'; icon.className = 'fas fa-eye'; }
});

/* ── BACKGROUND IMAGES ── */
var BG_IMAGES = [
  'https://images.unsplash.com/photo-1475274047050-1d0c0975c63e?w=1400&q=80',
  'https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=1400&q=80',
  'https://images.unsplash.com/photo-1419242902214-272b3f66ee7a?w=1400&q=80',
  'https://images.unsplash.com/photo-1534796636912-3b95b3ab5986?w=1400&q=80',
  'https://images.unsplash.com/photo-1464802686167-b939a6910659?w=1400&q=80',
  'https://images.unsplash.com/photo-1543722530-d2c3201371e7?w=1400&q=80',
  'https://images.unsplash.com/photo-1502481851512-e9e2529bfbf9?w=1400&q=80',
  'https://images.unsplash.com/photo-1444703686981-a3abbc4d4fe3?w=1400&q=80'
];
var bgIdx = Math.floor(Math.random() * BG_IMAGES.length);
var bgEl = document.getElementById('bg-layer');

function loadBG(src) {
  var img = new Image();
  img.onload = function() { bgEl.style.backgroundImage = "url('" + src + "')"; };
  img.src = src;
}
loadBG(BG_IMAGES[bgIdx]);
setInterval(function() { bgIdx = (bgIdx + 1) % BG_IMAGES.length; loadBG(BG_IMAGES[bgIdx]); }, 7000);

/* ── PARALLAX ── */
document.addEventListener('mousemove', function(e) {
  var cx = window.innerWidth / 2, cy = window.innerHeight / 2;
  var dx = (e.clientX - cx) / cx, dy = (e.clientY - cy) / cy;
  bgEl.style.transform = 'translate(' + (dx * -14) + 'px,' + (dy * -10) + 'px) scale(1.06)';
});
if (window.DeviceOrientationEvent) {
  window.addEventListener('deviceorientation', function(e) {
    var x = Math.max(-12, Math.min(12, e.gamma || 0));
    var y = Math.max(-12, Math.min(12, (e.beta || 0) - 45));
    bgEl.style.transform = 'translate(' + (x * .5) + 'px,' + (y * .5) + 'px) scale(1.06)';
  }, { passive: true });
}

/* ── KEYBOARD PUSH ── */
if (window.visualViewport) {
  window.visualViewport.addEventListener('resize', function() {
    var offset = window.innerHeight - window.visualViewport.height;
    document.getElementById('scene').style.transform = offset > 60
      ? 'translateY(-' + Math.min(offset * 0.45, 110) + 'px)' : '';
  });
}

/* ── FLOATING CARDS ── */
var FC_TEMPLATES = [
  function() {
    return '<div class="fc-title"><i class="fas fa-sticky-note"></i>Note</div>' +
      '<div class="fc-line" style="width:80%"></div>' +
      '<div class="fc-line s"></div><div class="fc-line xs"></div>';
  },
  function() {
    return '<div class="fc-title"><i class="fas fa-check-square"></i>To-Do</div>' +
      '<div class="fc-check"><div class="fc-cb done"></div><div class="fc-ct done"></div></div>' +
      '<div class="fc-check"><div class="fc-cb done"></div><div class="fc-ct done" style="width:70%"></div></div>' +
      '<div class="fc-check"><div class="fc-cb"></div><div class="fc-ct"></div></div>';
  },
  function() {
    var now = new Date();
    var h = String(now.getHours()).padStart(2,'0'), m = String(now.getMinutes()).padStart(2,'0'), s = String(now.getSeconds()).padStart(2,'0');
    return '<div class="fc-time">' + h + ':' + m + ':' + s + '</div>' +
      '<div class="fc-date">' + now.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'}) + '</div>';
  },
  function() {
    var q = ['The obstacle is the way.','Stay curious, stay humble.','Small steps every day.','Clarity is power.'];
    return '<div class="fc-title"><i class="fas fa-quote-right"></i>Quote</div>' +
      '<div class="fc-qt">' + q[Math.floor(Math.random() * q.length)] + '</div>';
  },
  function() {
    var html = '<div class="fc-title"><i class="fas fa-seedling"></i>Habits</div>';
    ['Read','Exercise','Journal'].forEach(function(r) {
      html += '<div class="fc-habit"><div class="fc-hname">' + r + '</div><div class="fc-hdots">';
      for (var i = 0; i < 7; i++) html += '<div class="fc-hdot' + (Math.random() > .4 ? ' on' : '') + '"></div>';
      html += '</div></div>';
    });
    return html;
  }
];

function spawnCard() {
  var container = document.getElementById('float-cards');
  var tmpl = FC_TEMPLATES[Math.floor(Math.random() * FC_TEMPLATES.length)];
  var w = 150 + Math.floor(Math.random() * 40), h = 110 + Math.floor(Math.random() * 50);
  var el = document.createElement('div');
  el.className = 'fc';
  var side = Math.random(), x, y;
  if (side < .25) { x = -20 - Math.random() * 100; y = Math.random() * (window.innerHeight - h); }
  else if (side < .5) { x = window.innerWidth + 20; y = Math.random() * (window.innerHeight - h); }
  else if (side < .75) { x = Math.random() * (window.innerWidth - w); y = -20 - Math.random() * 60; }
  else { x = Math.random() * (window.innerWidth - w); y = window.innerHeight + 20; }
  /* avoid center */
  var cx = window.innerWidth / 2, cy = window.innerHeight / 2;
  var dx = x + w/2 - cx, dy = y + h/2 - cy, dist = Math.sqrt(dx*dx + dy*dy);
  if (dist < 260) { x += (dx/dist)*(260-dist+40); y += (dy/dist)*(260-dist+40); }
  var rot = (Math.random()-.5)*8, dur = 14 + Math.random()*12, maxOp = .1 + Math.random()*.13;
  el.style.cssText = 'left:'+x+'px;top:'+y+'px;width:'+w+'px;--rot:'+rot+'deg;--max-op:'+maxOp+';animation-duration:'+dur+'s;animation-delay:'+(Math.random()*-dur)+'s';
  el.innerHTML = tmpl();
  container.appendChild(el);
  setTimeout(function() { el.remove(); }, (dur + 2) * 1000);
}
for (var i = 0; i < 7; i++) spawnCard();
setInterval(spawnCard, 3200);
</script>
</body>
