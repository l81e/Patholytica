<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Patholytica — Article</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg-color: #1f1f1f;
            --text-primary: #fff;
            --text-secondary: #aaa;
            --card-bg: #1f1f1f;
            --hover-bg: #2a2a2a;
            --border-color: #303030;
            --accent: #3ea6ff;
            --accent-hover: #2d8ed6;
        }

        body.light-theme {
            --bg-color: #f9f9f9;
            --text-primary: #0f0f0f;
            --text-secondary: #606060;
            --card-bg: #f9f9f9;
            --hover-bg: #f0f0f0;
            --border-color: #e5e5e5;
            --accent: #065fd4;
            --accent-hover: #0448a3;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-color);
            color: var(--text-primary);
            transition: background 0.2s ease, color 0.2s ease;
        }

        .app-container {
            position: fixed;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            max-width: 450px;
            height: 100vh;
            background: var(--bg-color);
            overflow-y: auto;
        }

        .app-container::-webkit-scrollbar { width: 4px; }
        .app-container::-webkit-scrollbar-track { background: var(--border-color); }
        .app-container::-webkit-scrollbar-thumb { background: var(--text-secondary); border-radius: 2px; }

        .header-bar {
            position: sticky;
            top: 0;
            background: var(--bg-color);
            border-bottom: 1px solid var(--border-color);
            padding: 12px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            z-index: 50;
        }

        .back-btn {
            width: 36px; height: 36px;
            border-radius: 50%;
            background: var(--hover-bg);
            border: none;
            color: var(--text-primary);
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            font-size: 18px;
            transition: background 0.2s ease;
        }
        .back-btn:hover { background: var(--border-color); }

        .header-actions { display: flex; gap: 12px; }

        .icon-btn {
            width: 36px; height: 36px;
            border-radius: 50%;
            background: var(--hover-bg);
            border: none;
            color: var(--text-primary);
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            font-size: 16px;
            transition: background 0.2s ease;
        }
        .icon-btn:hover { background: var(--border-color); }

        .article-wrapper {
            padding: 20px;
            padding-bottom: 100px;
        }

        .article-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
        }

        .author-avatar {
            width: 44px; height: 44px;
            border-radius: 50%;
            background: var(--accent);
            display: flex; align-items: center; justify-content: center;
            font-size: 18px; font-weight: bold;
            color: white;
            overflow: hidden;
            flex-shrink: 0;
            cursor: pointer;
        }
        .author-avatar img { width: 100%; height: 100%; object-fit: cover; }

        .author-info { flex: 1; }

        .author-name {
            color: var(--text-primary);
            font-weight: 600;
            font-size: 17px;
            margin-bottom: 2px;
            cursor: pointer;
            transition: color 0.2s ease;
        }
        .author-name:hover { color: var(--accent); }

        .article-date { color: var(--text-secondary); font-size: 12px; }

        .article-stats {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 16px;
            padding: 12px 0;
            border-bottom: 1px solid var(--border-color);
        }

        .stat-item {
            display: flex; align-items: center; gap: 6px;
            color: var(--text-secondary); font-size: 14px;
        }
        .stat-item i { font-size: 16px; }
        .stat-item.views i { color: var(--accent); }
        .stat-item.likes i { color: #ef4444; }

        .article-title {
            font-size: 32px; font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 16px;
            line-height: 1.2;
        }

        .article-content { color: var(--text-primary); font-size: 16px; line-height: 1.6; }

        .content-paragraph { margin-bottom: 14px; }

        .media-embed { margin: 16px 0; max-width: 100%; }

        .media-embed img {
            width: 100%; max-width: 100%; height: auto;
            border-radius: 8px; display: block;
        }

        .media-caption {
            font-size: 13px; color: var(--text-secondary);
            margin-top: 6px; font-style: italic;
        }

        /* PDF embed */
        .pdf-embed-block {
            background: var(--hover-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            overflow: hidden;
        }
        .pdf-embed-block iframe { width: 100%; height: 320px; border: none; display: block; }
        .pdf-embed-header {
            display: flex; align-items: center; gap: 10px;
            padding: 12px 14px;
            border-bottom: 1px solid var(--border-color);
        }
        .pdf-embed-header i { color: #e74c3c; font-size: 18px; }
        .pdf-embed-name {
            font-size: 13px; font-weight: 500;
            flex: 1;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
            color: var(--text-primary);
        }
        .pdf-open-link {
            font-size: 11px; color: var(--accent);
            text-decoration: none;
            background: var(--border-color);
            padding: 3px 10px; border-radius: 10px;
            font-weight: 600; flex-shrink: 0;
        }

        /* YouTube embed */
        .yt-embed-block {
            background: var(--hover-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            overflow: hidden;
        }
        .yt-embed-block iframe { width: 100%; aspect-ratio: 16/9; border: none; display: block; }
        .yt-embed-header {
            display: flex; align-items: center; gap: 10px;
            padding: 10px 14px;
            border-bottom: 1px solid var(--border-color);
        }
        .yt-embed-header i { color: #ff0000; font-size: 16px; }
        .yt-embed-title {
            font-size: 13px; font-weight: 500;
            flex: 1;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
            color: var(--text-primary);
        }
        .yt-watch-link {
            font-size: 11px; color: var(--accent);
            text-decoration: none;
            background: var(--border-color);
            padding: 3px 10px; border-radius: 10px;
            font-weight: 600; flex-shrink: 0;
        }

        /* Audio player */
        .custom-audio-player {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 16px;
            display: flex; align-items: center; gap: 12px;
            max-width: 100%;
            border: 1px solid var(--border-color);
        }

        .play-btn {
            width: 44px; height: 44px;
            border-radius: 50%;
            background: var(--accent);
            border: none; color: white;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            font-size: 16px;
            transition: all 0.2s ease;
            flex-shrink: 0;
        }
        .play-btn:hover { background: var(--accent-hover); transform: scale(1.05); }

        .audio-info { flex: 1; min-width: 0; overflow: hidden; }

        .audio-title {
            font-size: 13px; font-weight: 500;
            margin-bottom: 8px;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
            color: var(--text-primary);
        }

        .waveform-container {
            position: relative; height: 32px;
            background: var(--hover-bg);
            border-radius: 4px; margin-bottom: 6px;
            cursor: pointer; overflow: hidden;
        }
        .waveform-progress {
            position: absolute; top: 0; left: 0;
            height: 100%;
            background: var(--accent); opacity: 0.3;
            transition: width 0.1s linear;
        }
        .waveform-bars {
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100%;
            display: flex; align-items: center; justify-content: space-around;
            padding: 0 4px;
        }
        .waveform-bar { width: 2px; background: var(--text-secondary); border-radius: 2px; opacity: 0.6; }
        .audio-time { display: flex; justify-content: space-between; font-size: 11px; color: var(--text-secondary); }

        /* Suggested articles */
        .suggested-articles {
            margin-top: 40px; padding-top: 20px; padding-bottom: 2px;
            border-top: 2px solid var(--border-color);
        }
        .suggested-header { font-size: 18px; font-weight: 600; margin-bottom: 16px; color: var(--text-primary); }

        .suggested-article {
            display: flex; gap: 12px;
            padding: 12px;
            background: var(--hover-bg);
            border-radius: 8px; margin-bottom: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
            border: 1px solid var(--border-color);
        }
        .suggested-article:hover { background: var(--border-color); transform: translateY(-2px); }

        .suggested-thumbnail {
            width: 80px; height: 80px;
            border-radius: 6px;
            background: var(--border-color);
            flex-shrink: 0; overflow: hidden;
            display: flex; align-items: center; justify-content: center;
        }
        .suggested-thumbnail img { width: 100%; height: 100%; object-fit: cover; }
        .suggested-thumbnail i { font-size: 32px; color: var(--text-secondary); }

        .suggested-info { flex: 1; display: flex; flex-direction: column; justify-content: center; }

        .suggested-title {
            font-size: 15px; font-weight: 600;
            color: var(--text-primary); margin-bottom: 6px; line-height: 1.3;
            display: -webkit-box; -webkit-line-clamp: 2;
            -webkit-box-orient: vertical; overflow: hidden;
        }

        .suggested-meta { display: flex; align-items: center; gap: 12px; font-size: 12px; color: var(--text-secondary); }
        .suggested-meta-item { display: flex; align-items: center; gap: 4px; }

        /* Action bar */
        .action-bar {
            position: fixed; bottom: 0;
            left: 50%; transform: translateX(-50%);
            width: 100%; max-width: 450px;
            background: var(--card-bg);
            border-top: 1px solid var(--border-color);
            padding: 12px 20px;
            padding-bottom: calc(12px + env(safe-area-inset-bottom));
            display: flex; gap: 12px;
            z-index: 100;
        }

        .action-btn {
            flex: 1;
            display: flex; align-items: center; justify-content: center; gap: 8px;
            background: var(--hover-bg);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            padding: 10px 16px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 14px; font-weight: 600;
            color: var(--text-primary);
        }
        .action-btn:active { transform: scale(0.95); }
        .action-btn svg { width: 20px; height: 20px; stroke: var(--text-primary); fill: none; stroke-width: 2; }
        .action-btn.liked svg { fill: #ef4444; stroke: #ef4444; }
        .action-btn.liked { background: rgba(239,68,68,0.1); border-color: #ef4444; color: #ef4444; }

        /* Comments popup */
        .comments-overlay {
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.7);
            z-index: 199; opacity: 0; pointer-events: none;
            transition: opacity 0.3s ease;
        }
        .comments-overlay.active { opacity: 1; pointer-events: all; }

        .comments-popup {
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%) scale(0.9);
            width: calc(100% - 40px); max-width: 500px;
            height: 70vh; max-height: 600px;
            background: var(--card-bg);
            border-radius: 16px;
            z-index: 200;
            opacity: 0; pointer-events: none;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex; flex-direction: column;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
        }
        .comments-popup.active { opacity: 1; pointer-events: all; transform: translate(-50%, -50%) scale(1); }

        .comments-header {
            display: flex; align-items: center; justify-content: space-between;
            padding: 16px 20px;
            border-bottom: 1px solid var(--border-color);
        }
        .comments-header h3 { font-size: 16px; font-weight: 600; }

        .close-comments {
            background: none; border: none; color: var(--text-primary);
            font-size: 24px; cursor: pointer; padding: 0;
            width: 32px; height: 32px;
            display: flex; align-items: center; justify-content: center;
            border-radius: 50%; transition: background 0.2s ease;
        }
        .close-comments:hover { background: var(--hover-bg); }

        .comments-list { flex: 1; overflow-y: auto; padding: 16px 20px; }
        .comments-list::-webkit-scrollbar { width: 6px; }
        .comments-list::-webkit-scrollbar-track { background: transparent; }
        .comments-list::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 3px; }

        .comment-item { display: flex; gap: 12px; margin-bottom: 20px; }

        .comment-avatar {
            width: 32px; height: 32px;
            border-radius: 50%;
            background: var(--accent);
            display: flex; align-items: center; justify-content: center;
            font-size: 12px; font-weight: bold; color: white;
            flex-shrink: 0; overflow: hidden;
        }
        .comment-avatar img { width: 100%; height: 100%; object-fit: cover; }

        .comment-content { flex: 1; }
        .comment-author { font-weight: 600; font-size: 13px; margin-bottom: 4px; }
        .comment-text { font-size: 14px; line-height: 1.4; margin-bottom: 6px; }
        .comment-time { font-size: 11px; color: var(--text-secondary); }

        .comment-input-wrapper {
            padding: 12px 20px;
            border-top: 1px solid var(--border-color);
            background: var(--bg-color);
            border-radius: 0 0 16px 16px;
        }
        .comment-input-container { display: flex; gap: 8px; align-items: center; }

        .comment-input {
            flex: 1;
            background: var(--hover-bg);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 10px 16px;
            color: var(--text-primary);
            font-size: 14px; outline: none;
        }
        .comment-input:focus { border-color: var(--accent); }

        .send-comment-btn {
            width: 36px; height: 36px;
            border-radius: 50%;
            background: var(--accent);
            border: none; color: white;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            font-size: 16px; transition: all 0.2s ease;
        }
        .send-comment-btn:hover { background: var(--accent-hover); }
        .send-comment-btn:disabled { opacity: 0.5; cursor: not-allowed; }

        .no-comments {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 100%; color: var(--text-secondary); gap: 12px;
        }
        .no-comments i { font-size: 48px; opacity: 0.5; }

        .loading-container {
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            min-height: 100vh; color: var(--text-primary); gap: 16px;
        }

        .spinner {
            width: 48px; height: 48px;
            border: 4px solid var(--border-color);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .error-container {
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            min-height: 100vh; gap: 16px;
            text-align: center; padding: 20px;
        }
        .error-icon { font-size: 64px; color: var(--text-secondary); }
        .error-text { font-size: 18px; color: var(--text-secondary); }
        .error-btn {
            padding: 12px 24px;
            background: var(--accent); color: white;
            border: none; border-radius: 24px;
            font-size: 14px; font-weight: 600;
            cursor: pointer; transition: background 0.2s ease;
        }
        .error-btn:hover { background: var(--accent-hover); }

        @media (max-width: 768px) {
            .article-wrapper { padding: 16px; }
            .article-title { font-size: 28px; }
        }
    </style>
</head>
<body>
    <div class="app-container" id="appContainer">
        <div class="header-bar">
            <button class="back-btn" onclick="goBack()">
                <i class="fas fa-arrow-left"></i>
            </button>
            <div class="header-actions">
                <button class="icon-btn" onclick="toggleTheme()" title="Toggle theme">
                    <i class="fas fa-circle-half-stroke"></i>
                </button>
                <button class="icon-btn" onclick="shareArticle()" title="Share">
                    <i class="fas fa-share"></i>
                </button>
            </div>
        </div>

        <div class="loading-container" id="loadingContainer">
            <div class="spinner"></div>
            <div>Loading article...</div>
        </div>

        <div id="errorContainer" class="error-container" style="display: none;">
            <i class="fas fa-exclamation-triangle error-icon"></i>
            <div class="error-text">Article not found</div>
            <button class="error-btn" onclick="goBack()">Go Back</button>
        </div>

        <div id="articleContent" style="display: none;">
            <div class="article-wrapper">
                <div class="article-header">
                    <div class="author-avatar" id="authorAvatar">A</div>
                    <div class="author-info">
                        <div class="author-name" id="authorName">Loading...</div>
                        <div class="article-date" id="articleDate">Loading...</div>
                    </div>
                </div>

                <div class="article-stats">
                    <div class="stat-item views">
                        <i class="fas fa-eye"></i>
                        <span id="viewCount">0</span>
                    </div>
                    <div class="stat-item likes">
                        <i class="fas fa-heart"></i>
                        <span id="likeCountStat">0</span>
                    </div>
                </div>

                <div class="article-title" id="articleTitle"></div>
                <div class="article-content" id="articleBody"></div>

                <div class="suggested-articles" id="suggestedArticles" style="display: none;">
                    <div class="suggested-header">More from this author</div>
                    <div id="suggestedArticlesList"></div>
                </div>

                <div style="height: 80px;"></div>
            </div>
        </div>
    </div>

    <div class="action-bar" id="actionBar" style="display: none;">
        <button class="action-btn" id="likeBtn" onclick="toggleLike()">
            <svg viewBox="0 0 24 24">
                <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path>
            </svg>
            <span id="likeCount">0</span>
        </button>
        <button class="action-btn" id="commentBtn" onclick="openComments()">
            <svg viewBox="0 0 24 24">
                <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
            </svg>
            <span id="commentCount">0</span>
        </button>
    </div>

    <div class="comments-overlay" id="commentsOverlay" onclick="closeComments()"></div>

    <div class="comments-popup" id="commentsPopup">
        <div class="comments-header">
            <h3>Comments</h3>
            <button class="close-comments" onclick="closeComments()">×</button>
        </div>
        <div class="comments-list" id="commentsList">
            <div class="no-comments">
                <i class="fas fa-comments"></i>
                <div>No comments yet</div>
                <div style="font-size: 12px;">Be the first to comment!</div>
            </div>
        </div>
        <div class="comment-input-wrapper">
            <div class="comment-input-container">
                <input type="text" class="comment-input" id="commentInput" placeholder="Add a comment...">
                <button class="send-comment-btn" id="sendCommentBtn" onclick="sendComment()">
                    <i class="fas fa-paper-plane"></i>
                </button>
            </div>
        </div>
    </div>

    <script>
        function goBack() {
            if (document.referrer && document.referrer.includes(window.location.host)) {
                window.history.back();
            } else {
                window.location.href = 'index.html';
            }
        }

        function toggleTheme() {
            document.body.classList.toggle('light-theme');
            localStorage.setItem("theme", document.body.classList.contains("light-theme") ? "light" : "dark");
        }

        if (localStorage.getItem("theme") === "light") document.body.classList.add("light-theme");

        window.toggleAudio = function(btn, audioId) {
            const player = btn.closest('.custom-audio-player');
            const audio  = document.getElementById(audioId);
            const icon   = btn.querySelector('i');
            if (audio.paused) {
                audio.play();
                icon.className = 'fas fa-pause';
                audio.ontimeupdate = function() {
                    const progress = (audio.currentTime / audio.duration) * 100;
                    player.querySelector('.waveform-progress').style.width = progress + '%';
                    const m = Math.floor(audio.currentTime / 60);
                    const s = Math.floor(audio.currentTime % 60);
                    player.querySelector('.current-time').textContent = `${m}:${s.toString().padStart(2,'0')}`;
                };
                audio.onended = function() {
                    icon.className = 'fas fa-play';
                    player.querySelector('.waveform-progress').style.width = '0%';
                    player.querySelector('.current-time').textContent = '0:00';
                };
            } else {
                audio.pause();
                icon.className = 'fas fa-play';
            }
        };

        window.seekAudio = function(event, container, audioId) {
            const audio = document.getElementById(audioId);
            const rect  = container.getBoundingClientRect();
            audio.currentTime = ((event.clientX - rect.left) / rect.width) * audio.duration;
        };

        document.getElementById('commentInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') window.sendComment();
        });

        function openProfile(username) {
            if (username) {
                window.location.href = `https://patholytica.com/profile.html?username=${username.replace('@','')}`;
            }
        }
    </script>

        const supabase = window.supabase.createClient(
            "https://vduqewqyvszfquntmark.supabase.co",
            "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZkdXFld3F5dnN6ZnF1bnRtYXJrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njk2MTg3MjgsImV4cCI6MjA4NTE5NDcyOH0.V2JellFmUGgYhKfW-D4CBdcBHyPztOlcgLCBdhnXj7c"
        );

        let currentUser        = null;
        let currentArticle     = null;
        let userHasLiked       = false;
        let viewTimer          = null;
        let hasIncrementedView = false;

        async function getCurrentUser() {
            try {
                const firebaseUser = auth.currentUser;
                if (!firebaseUser) return null;
                const { data, error } = await supabase
                    .from('users')
                    .select('user_id, firebase_uid, username, full_name, pfp')
                    .eq('firebase_uid', firebaseUser.uid)
                    .single();
                if (error) { console.error(error); return null; }
                return data;
            } catch (e) { console.error(e); return null; }
        }

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                currentUser = await getCurrentUser();
                if (currentUser && currentArticle) await checkIfUserLiked();
            } else {
                currentUser = null;
            }
        });

        function getArticleId() {
            return new URLSearchParams(window.location.search).get('id');
        }

        function startViewTimer(articleId) {
            if (hasIncrementedView) return;
            viewTimer = setTimeout(() => incrementView(articleId), 5000);
        }

        function clearViewTimer() {
            if (viewTimer) { clearTimeout(viewTimer); viewTimer = null; }
        }

        async function incrementView(articleId) {
            if (hasIncrementedView) return;
            try {
                hasIncrementedView = true;
                const { data: article, error: fetchError } = await supabase
                    .from('articles').select('views').eq('id', articleId).single();
                if (fetchError) throw fetchError;
                const newViews = (article.views || 0) + 1;
                await supabase.from('articles').update({ views: newViews }).eq('id', articleId);
                if (currentArticle) {
                    currentArticle.views = newViews;
                    document.getElementById('viewCount').textContent = formatNumber(newViews);
                }
            } catch (e) { console.error(e); hasIncrementedView = false; }
        }

        window.addEventListener('beforeunload', clearViewTimer);
        document.addEventListener('visibilitychange', () => {
            if (document.hidden) {
                clearViewTimer();
            } else if (!hasIncrementedView && currentArticle) {
                startViewTimer(currentArticle.id);
            }
        });

        function formatNumber(num) {
            if (num >= 1000000) return (num / 1000000).toFixed(1) + 'M';
            if (num >= 1000)    return (num / 1000).toFixed(1) + 'K';
            return num.toString();
        }

        function formatDate(date) {
            const now      = new Date();
            const diffMins  = Math.floor((now - date) / 60000);
            const diffHours = Math.floor((now - date) / 3600000);
            const diffDays  = Math.floor((now - date) / 86400000);
            if (diffMins  < 60) return `${diffMins}m ago`;
            if (diffHours < 24) return `${diffHours}h ago`;
            if (diffDays  <  7) return `${diffDays}d ago`;
            return date.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
        }

        async function loadSuggestedArticles(firebaseUserId, currentArticleId) {
            try {
                const { data: articles, error } = await supabase
                    .from('articles')
                    .select('id, title, created_at, views, likes, media(url)')
                    .eq('firebase_user_id', firebaseUserId)
                    .neq('id', currentArticleId)
                    .order('created_at', { ascending: false })
                    .limit(3);
                if (error) throw error;
                if (articles && articles.length > 0) {
                    const section = document.getElementById('suggestedArticles');
                    const list    = document.getElementById('suggestedArticlesList');
                    list.innerHTML = articles.map(a => {
                        const img = a.media && a.media.length > 0 ? a.media[0].url : null;
                        const thumb = img
                            ? `<img src="${img}" alt="${a.title || 'Article'}">`
                            : `<i class="fas fa-file-alt"></i>`;
                        return `
                            <div class="suggested-article" onclick="window.location.href='article.html?id=${a.id}'">
                                <div class="suggested-thumbnail">${thumb}</div>
                                <div class="suggested-info">
                                    <div class="suggested-title">${a.title || 'Untitled'}</div>
                                    <div class="suggested-meta">
                                        <div class="suggested-meta-item"><i class="fas fa-eye"></i><span>${formatNumber(a.views || 0)}</span></div>
                                        <div class="suggested-meta-item"><i class="fas fa-heart"></i><span>${formatNumber(a.likes || 0)}</span></div>
                                        <div class="suggested-meta-item"><span>${formatDate(new Date(a.created_at))}</span></div>
                                    </div>
                                </div>
                            </div>`;
                    }).join('');
                    section.style.display = 'block';
                }
            } catch (e) { console.error(e); }
        }

        async function loadArticle() {
            const articleId = getArticleId();
            if (!articleId) { showError(); return; }

            try {
                const { data: article, error: articleError } = await supabase
                    .from('articles').select('*').eq('id', articleId).single();
                if (articleError) throw articleError;
                if (!article) { showError(); return; }

                currentArticle = article;

                const { data: author } = await supabase
                    .from('users').select('username, full_name, pfp')
                    .eq('firebase_uid', article.firebase_user_id).single();

                const { data: media } = await supabase
                    .from('media').select('*').eq('article_id', articleId)
                    .order('display_order', { ascending: true });

                displayArticle(article, author, media);

                if (currentUser) await checkIfUserLiked();
                await loadCommentCount(articleId);
                await loadSuggestedArticles(article.firebase_user_id, articleId);
                startViewTimer(articleId);

            } catch (e) { console.error(e); showError(); }
        }

        async function loadCommentCount(articleId) {
            try {
                const { data } = await supabase
                    .from('comments').select('id').eq('article_id', articleId);
                document.getElementById('commentCount').textContent = data?.length || 0;
            } catch (e) { console.error(e); }
        }

        function getAvatarContent(author, pfp) {
            if (pfp) return `<img src="${pfp}" alt="${author}">`;
            if (!author) return 'A';
            const atIdx = author.indexOf('@');
            return (atIdx !== -1 && author.length > atIdx + 1)
                ? author.charAt(atIdx + 1).toUpperCase()
                : author.charAt(0).toUpperCase();
        }

        function displayArticle(article, author, media) {
            document.getElementById('loadingContainer').style.display = 'none';
            document.getElementById('articleContent').style.display  = 'block';
            document.getElementById('actionBar').style.display       = 'flex';

            document.getElementById('articleTitle').textContent = article.title || 'Untitled';
            document.title = `${article.title || 'Article'} — Patholytica`;

            const authorUsername = author?.username || '';
            const authorName     = authorUsername ? `@${authorUsername}` : (author?.full_name || 'Anonymous');
            const authorNameEl   = document.getElementById('authorName');
            authorNameEl.textContent = authorName;
            if (authorUsername) {
                authorNameEl.style.cursor = 'pointer';
                authorNameEl.onclick = () => openProfile(authorUsername);
            }

            const avatarEl = document.getElementById('authorAvatar');
            avatarEl.innerHTML = getAvatarContent(authorName, author?.pfp);
            if (authorUsername) {
                avatarEl.style.cursor = 'pointer';
                avatarEl.onclick = () => openProfile(authorUsername);
            }

            document.getElementById('articleDate').textContent     = formatDate(new Date(article.created_at));
            document.getElementById('viewCount').textContent       = formatNumber(article.views || 0);
            document.getElementById('likeCountStat').textContent   = formatNumber(article.likes || 0);
            document.getElementById('likeCount').textContent       = article.likes || 0;

            const contentContainer = document.getElementById('articleBody');
            contentContainer.innerHTML = '';

            const paragraphs = (article.content || 'No content available').split('\n\n');
            paragraphs.forEach((paragraph, index) => {
                if (paragraph.trim()) {
                    const p = document.createElement('div');
                    p.className   = 'content-paragraph';
                    p.textContent = paragraph.trim();
                    contentContainer.appendChild(p);

                    if (media) {
                        media.filter(m => m.display_order === index)
                             .forEach(m => contentContainer.appendChild(createMediaElement(m)));
                    }
                }
            });

            if (media) {
                media.filter(m => m.display_order >= paragraphs.length)
                     .forEach(m => contentContainer.appendChild(createMediaElement(m)));
            }
        }

        function createMediaElement(mediaItem) {
            const mediaDiv = document.createElement('div');
            mediaDiv.className = 'media-embed';

            if (mediaItem.type === 'image') {
                mediaDiv.innerHTML = `
                    <img src="${mediaItem.url}" alt="${mediaItem.caption || 'Article image'}">
                    ${mediaItem.caption ? `<div class="media-caption">${mediaItem.caption}</div>` : ''}
                `;

            } else if (mediaItem.type === 'audio') {
                const audioId = 'audio-' + Math.random().toString(36).substr(2, 9);
                mediaDiv.innerHTML = `
                    <div class="custom-audio-player">
                        <button class="play-btn" onclick="toggleAudio(this,'${audioId}')">
                            <i class="fas fa-play"></i>
                        </button>
                        <div class="audio-info">
                            <div class="audio-title">${mediaItem.caption || 'Audio'}</div>
                            <div class="waveform-container" onclick="seekAudio(event,this,'${audioId}')">
                                <div class="waveform-progress"></div>
                                <div class="waveform-bars">
                                    ${Array(15).fill(0).map(()=>`<div class="waveform-bar" style="height:${Math.random()*60+20}%"></div>`).join('')}
                                </div>
                            </div>
                            <div class="audio-time">
                                <span class="current-time">0:00</span>
                                <span class="duration">0:00</span>
                            </div>
                        </div>
                        <audio id="${audioId}" src="${mediaItem.url}" style="display:none;"></audio>
                    </div>
                    ${mediaItem.caption ? `<div class="media-caption">${mediaItem.caption}</div>` : ''}
                `;
                setTimeout(() => {
                    const audio = document.getElementById(audioId);
                    if (audio) {
                        audio.addEventListener('loadedmetadata', () => {
                            const dur = Math.floor(audio.duration);
                            const durationSpan = audio.closest('.custom-audio-player').querySelector('.duration');
                            if (durationSpan) durationSpan.textContent = `${Math.floor(dur/60)}:${(dur%60).toString().padStart(2,'0')}`;
                        });
                    }
                }, 100);

            } else if (mediaItem.type === 'pdf') {
                const fileName = mediaItem.caption || 'Document';
                mediaDiv.innerHTML = `
                    <div class="pdf-embed-block">
                        <div class="pdf-embed-header">
                            <i class="fas fa-file-pdf"></i>
                            <span class="pdf-embed-name">${fileName}</span>
                            <a class="pdf-open-link" href="${mediaItem.url}" target="_blank">Open</a>
                        </div>
                        <iframe src="${mediaItem.url}" title="${fileName}"></iframe>
                    </div>
                    ${mediaItem.caption ? `<div class="media-caption">${mediaItem.caption}</div>` : ''}
                `;

            } else if (mediaItem.type === 'youtube') {
                const ytMatch = mediaItem.url.match(/embed\/([A-Za-z0-9_-]{11})/);
                const videoId = ytMatch ? ytMatch[1] : '';
                const label   = mediaItem.caption || (videoId ? `youtube.com/watch?v=${videoId}` : 'YouTube Video');
                mediaDiv.innerHTML = `
                    <div class="yt-embed-block">
                        <div class="yt-embed-header">
                            <i class="fab fa-youtube"></i>
                            <span class="yt-embed-title">${label}</span>
                            ${videoId ? `<a class="yt-watch-link" href="https://www.youtube.com/watch?v=${videoId}" target="_blank">Watch</a>` : ''}
                        </div>
                        <iframe
                            src="${mediaItem.url}"
                            title="${label}"
                            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
                            allowfullscreen>
                        </iframe>
                    </div>
                    ${mediaItem.caption ? `<div class="media-caption">${mediaItem.caption}</div>` : ''}
                `;
            }

            return mediaDiv;
        }

        function showError() {
            document.getElementById('loadingContainer').style.display = 'none';
            document.getElementById('errorContainer').style.display   = 'flex';
        }

        async function checkIfUserLiked() {
            if (!currentUser || !currentArticle) return;
            try {
                const { data } = await supabase
                    .from('likes').select('*')
                    .eq('article_id', currentArticle.id)
                    .eq('user_id', currentUser.user_id)
                    .single();
                userHasLiked = !!data;
                document.getElementById('likeBtn').classList.toggle('liked', userHasLiked);
            } catch (e) { console.error(e); }
        }

        window.toggleLike = async function() {
            if (!currentUser) { window.location.href = 'https://patholytica.com/login'; return; }
            if (!currentArticle) return;

            const likeBtn       = document.getElementById('likeBtn');
            const likeCount     = document.getElementById('likeCount');
            const likeCountStat = document.getElementById('likeCountStat');
            const wasLiked      = userHasLiked;
            const originalCount = currentArticle.likes || 0;

            try {
                if (wasLiked) {
                    userHasLiked = false;
                    likeBtn.classList.remove('liked');
                    currentArticle.likes = Math.max(0, originalCount - 1);
                    likeCount.textContent     = currentArticle.likes;
                    likeCountStat.textContent = formatNumber(currentArticle.likes);
                    await supabase.from('likes').delete()
                        .eq('article_id', currentArticle.id).eq('user_id', currentUser.user_id);
                } else {
                    userHasLiked = true;
                    likeBtn.classList.add('liked');
                    currentArticle.likes = originalCount + 1;
                    likeCount.textContent     = currentArticle.likes;
                    likeCountStat.textContent = formatNumber(currentArticle.likes);
                    await supabase.from('likes').insert([{ article_id: currentArticle.id, user_id: currentUser.user_id }]);
                }
                await supabase.from('articles').update({ likes: currentArticle.likes }).eq('id', currentArticle.id);
            } catch (e) {
                console.error(e);
                userHasLiked          = wasLiked;
                currentArticle.likes  = originalCount;
                likeCount.textContent = originalCount;
                likeCountStat.textContent = formatNumber(originalCount);
                likeBtn.classList.toggle('liked', wasLiked);
            }
        };

        window.shareArticle = function() {
            const url   = window.location.href;
            const title = currentArticle?.title || 'Check out this article';
            if (navigator.share) {
                navigator.share({ title, url }).catch(console.error);
            } else {
                navigator.clipboard.writeText(url);
                alert('Link copied to clipboard!');
            }
        };

        window.openComments = async function() {
            if (!currentArticle) return;
            document.getElementById('commentsPopup').classList.add('active');
            document.getElementById('commentsOverlay').classList.add('active');
            document.body.style.overflow = 'hidden';
            await loadComments(currentArticle.id);
        };

        window.closeComments = function() {
            document.getElementById('commentsPopup').classList.remove('active');
            document.getElementById('commentsOverlay').classList.remove('active');
            document.body.style.overflow = '';
        };

        async function loadComments(articleId) {
            const commentsList = document.getElementById('commentsList');
            commentsList.innerHTML = '<div class="loading-container" style="min-height:auto;height:100%;"><div class="spinner" style="width:32px;height:32px;border-width:3px;"></div></div>';
            try {
                const { data: comments, error } = await supabase
                    .from('comments').select('*').eq('article_id', articleId)
                    .order('created_at', { ascending: true });
                if (error) throw error;

                if (!comments || comments.length === 0) {
                    commentsList.innerHTML = `
                        <div class="no-comments">
                            <i class="fas fa-comments"></i>
                            <div>No comments yet</div>
                            <div style="font-size:12px;">Be the first to comment!</div>
                        </div>`;
                    return;
                }

                const userIds = [...new Set(comments.map(c => c.user_id).filter(Boolean))];
                let usersMap  = {};
                if (userIds.length > 0) {
                    const { data: users } = await supabase
                        .from('users').select('user_id, username, full_name, pfp').in('user_id', userIds);
                    if (users) users.forEach(u => usersMap[u.user_id] = u);
                }

                commentsList.innerHTML = comments.map(comment => {
                    const user   = usersMap[comment.user_id];
                    const author = user?.username ? `@${user.username}` : (user?.full_name || 'Anonymous');
                    let avatarContent;
                    if (user?.pfp) {
                        avatarContent = `<img src="${user.pfp}" alt="${author}">`;
                    } else {
                        const letter = user?.username
                            ? user.username.charAt(0).toUpperCase()
                            : author.charAt(author.indexOf('@') + 1)?.toUpperCase() || 'A';
                        avatarContent = letter;
                    }
                    return `
                        <div class="comment-item">
                            <div class="comment-avatar">${avatarContent}</div>
                            <div class="comment-content">
                                <div class="comment-author">${author}</div>
                                <div class="comment-text">${comment.comment_text}</div>
                                <div class="comment-time">${formatDate(new Date(comment.created_at))}</div>
                            </div>
                        </div>`;
                }).join('');
            } catch (e) {
                console.error(e);
                commentsList.innerHTML = `
                    <div class="no-comments">
                        <i class="fas fa-exclamation-triangle"></i>
                        <div>Failed to load comments</div>
                    </div>`;
            }
        }

        window.sendComment = async function() {
            const input   = document.getElementById('commentInput');
            const text    = input.value.trim();
            if (!text || !currentArticle) return;

            const sendBtn = document.getElementById('sendCommentBtn');
            sendBtn.disabled = true;
            try {
                if (!currentUser) currentUser = await getCurrentUser();
                if (!currentUser) { window.location.href = 'https://patholytica.com/login'; return; }

                const { error } = await supabase.from('comments').insert([{
                    article_id:   currentArticle.id,
                    user_id:      currentUser.user_id,
                    comment_text: text
                }]);
                if (error) throw error;

                input.value = '';
                await loadComments(currentArticle.id);
                const cc = document.getElementById('commentCount');
                cc.textContent = parseInt(cc.textContent) + 1;
            } catch (e) {
                console.error(e);
                alert('Failed to post comment. Please try again.');
            } finally {
                sendBtn.disabled = false;
            }
        };

        loadArticle();
    </script>
</body>
</html>
