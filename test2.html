<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
    <title>Article Scroller - Patholytica</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg-color: #1f1f1f;
            --text-primary: #fff;
            --text-secondary: #aaa;
            --card-bg: #1f1f1f;
            --hover-bg: #2a2a2a;
            --border-color: #303030;
            --accent: #f1d19e;
            --accent-hover: #d9b87a;
        }

        body.light-theme {
            --bg-color: #f9f9f9;
            --text-primary: #0f0f0f;
            --text-secondary: #606060;
            --card-bg: #f9f9f9;
            --hover-bg: #f0f0f0;
            --border-color: #e5e5e5;
            --accent: #c49a3c;
            --accent-hover: #a07c28;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-color);
            color: var(--text-primary);
            overflow: hidden;
            transition: background 0.2s ease, color 0.2s ease;
            position: fixed;
            width: 100%;
            height: 100%;
        }

        .app-container {
            position: fixed;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            max-width: 450px;
            height: 100vh;
            background: var(--bg-color);
        }

        .scroller-container {
            position: relative;
            width: 100%;
            height: 100vh;
            background: var(--bg-color);
            overflow: hidden;
        }

        .posts-wrapper {
            height: 100%;
            overflow-y: scroll;
            scroll-snap-type: y mandatory;
            scrollbar-width: none;
        }

        .posts-wrapper::-webkit-scrollbar { display: none; }

        .article-card {
            position: relative;
            height: 100vh;
            scroll-snap-align: start;
            scroll-snap-stop: always;
            background: var(--bg-color);
            padding: 8px 20px 100px;
            padding-top: calc(16px + env(safe-area-inset-top));
            display: flex;
            flex-direction: column;
        }

        .card-top-line {
            width: calc(100% + 40px);
            margin-left: -20px;
            height: 1px;
            background: var(--border-color);
            flex-shrink: 0;
            margin-bottom: 14px;
        }

        .article-header {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-shrink: 0;
            position: relative;
            z-index: 50;
        }

        .author-avatar {
            width: 44px; height: 44px;
            border-radius: 50%;
            background: var(--accent);
            display: flex; align-items: center; justify-content: center;
            font-size: 18px; font-weight: bold;
            color: #1f1f1f;
            overflow: hidden; flex-shrink: 0;
        }
        .author-avatar img { width: 100%; height: 100%; object-fit: cover; }
        .author-info { flex: 1; }
        .author-name { color: var(--text-primary); font-weight: 600; font-size: 17px; margin-bottom: 2px; }
        .article-date { color: var(--text-secondary); font-size: 12px; }

        .header-bottom-line {
            width: calc(100% + 40px);
            margin-left: -20px;
            height: 1px;
            background: var(--border-color);
            flex-shrink: 0;
            margin-top: 14px;
            margin-bottom: 14px;
        }

        .article-title {
            font-size: 22px; font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 10px; line-height: 1.25;
            flex-shrink: 0;
        }

        .article-stats {
            display: flex; align-items: center;
            gap: 14px; margin-bottom: 12px; flex-shrink: 0;
        }
        .stat-item { display: flex; align-items: center; gap: 5px; font-size: 13px; color: var(--text-secondary); }
        .stat-item.views i { color: var(--accent); }
        .stat-item.likes i { color: #ef4444; }

        .article-content {
            color: var(--text-primary);
            font-size: 16px; line-height: 1.6;
            flex: 1; overflow-y: auto;
            padding-right: 60px;
        }
        .article-content::-webkit-scrollbar { width: 4px; }
        .article-content::-webkit-scrollbar-track { background: var(--border-color); }
        .article-content::-webkit-scrollbar-thumb { background: var(--text-secondary); border-radius: 2px; }
        .content-paragraph { margin-bottom: 14px; }

        /* ── MCQ ── */
        .mcq-card {
            position: relative;
            height: 100vh;
            scroll-snap-align: start;
            scroll-snap-stop: always;
            background: var(--bg-color);
            padding: 8px 20px 100px;
            padding-top: calc(16px + env(safe-area-inset-top));
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .mcq-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            padding: 3px 10px;
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--text-secondary);
            margin-bottom: 16px;
            flex-shrink: 0;
            align-self: flex-start;
        }

        .mcq-question {
            font-size: 20px;
            font-weight: 700;
            color: var(--text-primary);
            line-height: 1.35;
            margin-bottom: 14px;
            flex-shrink: 0;
            padding-right: 50px;
        }

        .mcq-media {
            padding-right: 60px;
            flex-shrink: 0;
            margin-bottom: 14px;
        }

        .mcq-scroll-area {
            flex: 1;
            overflow-y: auto;
            padding-right: 60px;
            display: flex;
            flex-direction: column;
            gap: 0;
        }
        .mcq-scroll-area::-webkit-scrollbar { width: 3px; }
        .mcq-scroll-area::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 2px; }

        .mcq-options {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .mcq-option {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px 16px;
            border-radius: 10px;
            border: 1px solid var(--border-color);
            background: var(--hover-bg);
            cursor: pointer;
            transition: border-color 0.15s ease, background 0.15s ease;
            text-align: left;
            font-size: 15px;
            font-weight: 500;
            color: var(--text-primary);
            line-height: 1.4;
            -webkit-tap-highlight-color: transparent;
            width: 100%;
        }

        .mcq-option:hover:not(:disabled) { border-color: var(--accent); }

        .mcq-option .opt-letter {
            width: 26px; height: 26px;
            border-radius: 50%;
            border: 1.5px solid var(--border-color);
            display: flex; align-items: center; justify-content: center;
            font-size: 11px; font-weight: 800;
            flex-shrink: 0;
            color: var(--text-secondary);
            transition: all 0.15s ease;
        }

        .mcq-option .opt-text { flex: 1; }
        .mcq-option:disabled { cursor: default; }

        .mcq-option.selected-correct { border-color: #4ade80; background: rgba(74,222,128,0.08); }
        .mcq-option.selected-correct .opt-letter { background: #4ade80; border-color: #4ade80; color: #1a1a1a; }
        .mcq-option.selected-wrong { border-color: #ef4444; background: rgba(239,68,68,0.07); }
        .mcq-option.selected-wrong .opt-letter { background: #ef4444; border-color: #ef4444; color: #fff; }
        .mcq-option.reveal-correct { border-color: rgba(74,222,128,0.5); }
        .mcq-option.reveal-correct .opt-letter { border-color: #4ade80; color: #4ade80; }

        .mcq-result-msg {
            font-size: 13px;
            font-weight: 600;
            margin-top: 14px;
            min-height: 20px;
            color: var(--text-secondary);
            flex-shrink: 0;
        }
        .mcq-result-msg.correct { color: #4ade80; }
        .mcq-result-msg.wrong   { color: #ef4444; }

        /* ── Action buttons ── */
        .action-buttons {
            position: absolute;
            right: 16px;
            bottom: 143px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            z-index: 10;
        }
        .action-btn {
            display: flex; flex-direction: column; align-items: center; gap: 3px;
            background: none; border: none; cursor: pointer; transition: transform 0.1s;
        }
        .action-btn:active { transform: scale(0.9); }
        .action-btn svg { width: 28px; height: 28px; stroke: var(--text-primary); fill: none; stroke-width: 2; }
        .action-btn.liked svg { fill: #ef4444; stroke: #ef4444; }
        .action-btn span { color: var(--text-primary); font-size: 11px; font-weight: 600; }

        /* ── Media ── */
        .media-embed { margin: 16px 0; max-width: 100%; }
        .media-embed img { width: 100%; max-width: 100%; height: auto; border-radius: 8px; display: block; }
        .media-caption { font-size: 13px; color: var(--text-secondary); margin-top: 6px; font-style: italic; }

        .custom-audio-player {
            background: var(--card-bg); border-radius: 12px; padding: 16px;
            display: flex; align-items: center; gap: 12px; max-width: 100%;
            border: 1px solid var(--border-color);
        }
        .play-btn {
            width: 44px; height: 44px; border-radius: 50%;
            background: var(--accent); border: none; color: #1f1f1f;
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            font-size: 16px; transition: background 0.2s ease; flex-shrink: 0;
        }
        .play-btn:hover { background: var(--accent-hover); }
        .audio-info { flex: 1; min-width: 0; overflow: hidden; }
        .audio-title { font-size: 13px; font-weight: 500; margin-bottom: 8px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: var(--text-primary); }
        .waveform-container { position: relative; height: 32px; background: var(--hover-bg); border-radius: 4px; margin-bottom: 6px; cursor: pointer; overflow: hidden; }
        .waveform-progress { position: absolute; top: 0; left: 0; height: 100%; background: var(--accent); opacity: 0.3; transition: width 0.1s linear; }
        .waveform-bars { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; align-items: center; justify-content: space-around; padding: 0 4px; }
        .waveform-bar { width: 2px; background: var(--text-secondary); border-radius: 2px; opacity: 0.6; }
        .audio-time { display: flex; justify-content: space-between; font-size: 11px; color: var(--text-secondary); }

        /* ── Comments ── */
        .comments-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 199; opacity: 0; pointer-events: none; transition: opacity 0.3s ease; }
        .comments-overlay.active { opacity: 1; pointer-events: all; }
        .comments-popup {
            position: fixed; top: 50%; left: 50%;
            transform: translate(-50%, -50%) scale(0.9);
            width: calc(100% - 40px); max-width: 500px;
            height: 70vh; max-height: 600px;
            background: var(--card-bg); border-radius: 16px; z-index: 200;
            opacity: 0; pointer-events: none;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex; flex-direction: column;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
        }
        .comments-popup.active { opacity: 1; pointer-events: all; transform: translate(-50%, -50%) scale(1); }
        .comments-header { display: flex; align-items: center; justify-content: space-between; padding: 16px 20px; border-bottom: 1px solid var(--border-color); }
        .comments-header h3 { font-size: 16px; font-weight: 600; }
        .close-comments { background: none; border: none; color: var(--text-primary); font-size: 24px; cursor: pointer; width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; border-radius: 50%; transition: background 0.2s ease; }
        .close-comments:hover { background: var(--hover-bg); }
        .comments-list { flex: 1; overflow-y: auto; padding: 16px 20px; }
        .comments-list::-webkit-scrollbar { width: 6px; }
        .comments-list::-webkit-scrollbar-track { background: transparent; }
        .comments-list::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 3px; }
        .comment-item { display: flex; gap: 12px; margin-bottom: 20px; }
        .comment-avatar { width: 32px; height: 32px; border-radius: 50%; background: var(--accent); display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: bold; color: #1f1f1f; flex-shrink: 0; overflow: hidden; }
        .comment-avatar img { width: 100%; height: 100%; object-fit: cover; }
        .comment-content { flex: 1; }
        .comment-author { font-weight: 600; font-size: 13px; margin-bottom: 4px; }
        .comment-text { font-size: 14px; line-height: 1.4; margin-bottom: 6px; }
        .comment-time { font-size: 11px; color: var(--text-secondary); }
        .comment-input-wrapper { padding: 12px 20px; border-top: 1px solid var(--border-color); background: var(--bg-color); border-radius: 0 0 16px 16px; }
        .comment-input-container { display: flex; gap: 8px; align-items: center; }
        .comment-input { flex: 1; background: var(--hover-bg); border: 1px solid var(--border-color); border-radius: 20px; padding: 10px 16px; color: var(--text-primary); font-size: 14px; outline: none; }
        .comment-input:focus { border-color: var(--accent); }
        .send-comment-btn { width: 36px; height: 36px; border-radius: 50%; background: var(--accent); border: none; color: #1f1f1f; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 16px; transition: background 0.2s ease; }
        .send-comment-btn:hover { background: var(--accent-hover); }
        .send-comment-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .no-comments { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; color: var(--text-secondary); gap: 12px; }
        .no-comments i { font-size: 48px; opacity: 0.5; }
        .loading-container { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; color: var(--text-primary); gap: 16px; }
        .spinner { width: 48px; height: 48px; border: 3px solid var(--border-color); border-top-color: var(--accent); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ── Skeleton ── */
        @keyframes shimmer { 0% { background-position: -400px 0; } 100% { background-position: 400px 0; } }
        .skeleton-base {
            background: linear-gradient(90deg, var(--hover-bg) 25%, var(--border-color) 50%, var(--hover-bg) 75%);
            background-size: 800px 100%; animation: shimmer 1.4s infinite linear; border-radius: 6px;
        }
        .skeleton-card { position: relative; height: 100vh; scroll-snap-align: start; scroll-snap-stop: always; background: var(--bg-color); padding: 8px 20px 100px; padding-top: calc(16px + env(safe-area-inset-top)); display: flex; flex-direction: column; }
        .skeleton-card .card-top-line { width: calc(100% + 40px); margin-left: -20px; height: 1px; background: var(--border-color); flex-shrink: 0; margin-bottom: 14px; }
        .skeleton-header { display: flex; align-items: center; gap: 12px; flex-shrink: 0; }
        .skeleton-avatar { width: 44px; height: 44px; border-radius: 50%; flex-shrink: 0; }
        .skeleton-author-block { flex: 1; display: flex; flex-direction: column; gap: 6px; }
        .skeleton-name { height: 14px; width: 120px; }
        .skeleton-date { height: 10px; width: 70px; }
        .skeleton-divider { width: calc(100% + 40px); margin-left: -20px; height: 1px; background: var(--border-color); flex-shrink: 0; margin-top: 14px; margin-bottom: 14px; }
        .skeleton-title { height: 22px; width: 85%; margin-bottom: 8px; }
        .skeleton-title-short { height: 22px; width: 60%; margin-bottom: 10px; }
        .skeleton-stats { display: flex; gap: 12px; margin-bottom: 14px; flex-shrink: 0; }
        .skeleton-stat { height: 13px; width: 52px; }
        .skeleton-line { height: 13px; margin-bottom: 10px; width: 100%; }
        .skeleton-line.w90 { width: 90%; } .skeleton-line.w75 { width: 75%; }
        .skeleton-line.w80 { width: 80%; } .skeleton-line.w65 { width: 65%; }
        .skeleton-line.w95 { width: 95%; }

        /* ── Footer ── */
        .footer-bar { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 450px; background: var(--card-bg); border-top: 1px solid var(--border-color); padding: 8px 24px; padding-bottom: calc(8px + env(safe-area-inset-bottom)); display: flex; justify-content: space-around; align-items: center; z-index: 100; }
        .footer-btn { display: flex; flex-direction: column; align-items: center; gap: 2px; background: none; border: none; color: var(--text-secondary); cursor: pointer; transition: color 0.2s ease; padding: 6px 12px; }
        .footer-btn:hover { color: var(--text-primary); }
        .footer-btn.active { color: var(--accent); }
        .footer-btn i { font-size: 20px; }
        .footer-btn span { font-size: 10px; font-weight: 500; }
        @media (max-width: 768px) {
            .footer-bar { padding: 8px 16px; padding-bottom: calc(8px + env(safe-area-inset-bottom)); }
            .footer-btn { padding: 6px 8px; }
            .footer-btn i { font-size: 18px; }
            .footer-btn span { font-size: 9px; }
        }

        /* ── Library Picker Card ── */
        .library-picker-card {
            position: relative;
            height: 100vh;
            scroll-snap-align: start;
            scroll-snap-stop: always;
            background: var(--bg-color);
            padding: 8px 20px calc(130px + env(safe-area-inset-bottom));
            padding-top: calc(16px + env(safe-area-inset-top));
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .lp-card-logo { display: flex; align-items: center; gap: 10px; flex-shrink: 0; margin-bottom: 14px; }
        .lp-card-logo img { height: 28px; width: auto; object-fit: contain; }
        .lp-card-title { font-size: 22px; font-weight: 800; color: var(--text-primary); line-height: 1.2; margin-bottom: 4px; flex-shrink: 0; }
        .lp-card-sub { font-size: 13px; color: var(--text-secondary); line-height: 1.5; margin-bottom: 16px; flex-shrink: 0; }
        .lp-card-id-row { display: flex; gap: 8px; align-items: center; margin-bottom: 6px; flex-shrink: 0; }
        .lp-card-id-input { flex: 1; background: var(--hover-bg); border: 1px solid var(--border-color); border-radius: 10px; padding: 10px 13px; color: var(--text-primary); font-size: 14px; outline: none; transition: border-color 0.15s ease; }
        .lp-card-id-input:focus { border-color: var(--accent); }
        .lp-card-id-input::placeholder { color: var(--text-secondary); }
        .lp-card-id-go-btn { padding: 10px 16px; border-radius: 10px; background: var(--accent); color: #1a1a1a; font-size: 13px; font-weight: 700; border: none; cursor: pointer; transition: background 0.15s ease; white-space: nowrap; flex-shrink: 0; }
        .lp-card-id-go-btn:hover { background: var(--accent-hover); }
        .lp-card-id-go-btn:disabled { opacity: 0.4; cursor: not-allowed; }
        .lp-card-id-error { font-size: 12px; color: #ef4444; min-height: 16px; margin-bottom: 10px; flex-shrink: 0; }
        .lp-card-divider { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; flex-shrink: 0; }
        .lp-card-divider-line { flex: 1; height: 1px; background: var(--border-color); }
        .lp-card-divider-text { font-size: 10px; font-weight: 700; color: var(--text-secondary); letter-spacing: 0.08em; text-transform: uppercase; white-space: nowrap; }
        .lp-card-hint { font-size: 11px; color: var(--text-secondary); font-weight: 600; margin-bottom: 10px; flex-shrink: 0; }
        .lp-card-scroll { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; margin-bottom: 12px; padding-right: 2px; }
        .lp-card-scroll::-webkit-scrollbar { width: 3px; }
        .lp-card-scroll::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 2px; }
        .lp-item { display: flex; align-items: center; gap: 12px; padding: 12px 14px; border-radius: 12px; border: 1.5px solid var(--border-color); background: var(--hover-bg); cursor: pointer; transition: border-color 0.15s ease, background 0.15s ease; -webkit-tap-highlight-color: transparent; flex-shrink: 0; }
        .lp-item.selected { border-color: var(--accent); background: rgba(241,209,158,0.06); }
        .lp-item .lp-check { width: 20px; height: 20px; border-radius: 50%; border: 1.5px solid var(--border-color); display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: all 0.15s ease; font-size: 11px; color: transparent; }
        .lp-item.selected .lp-check { background: var(--accent); border-color: var(--accent); color: #1a1a1a; }
        .lp-item .lp-info { flex: 1; min-width: 0; }
        .lp-item .lp-name { font-size: 14px; font-weight: 600; color: var(--text-primary); margin-bottom: 1px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .lp-item .lp-meta { font-size: 11px; color: var(--text-secondary); }
        .lp-item .lp-article-count { font-size: 11px; font-weight: 700; color: var(--accent); background: rgba(241,209,158,0.1); border: 1px solid rgba(241,209,158,0.2); border-radius: 20px; padding: 2px 8px; flex-shrink: 0; white-space: nowrap; }
        .lp-card-loading { display: flex; flex-direction: column; align-items: center; gap: 10px; color: var(--text-secondary); font-size: 13px; padding: 24px 0; flex-shrink: 0; }
        .lp-card-actions { display: flex; flex-direction: column; gap: 8px; flex-shrink: 0; }
        .lp-card-start-btn { width: 100%; padding: 14px; border-radius: 12px; background: var(--accent); color: #1a1a1a; font-size: 15px; font-weight: 700; border: none; cursor: pointer; transition: background 0.15s ease, opacity 0.15s ease, transform 0.1s ease; }
        .lp-card-start-btn:hover:not(:disabled) { background: var(--accent-hover); }
        .lp-card-start-btn:active:not(:disabled) { transform: scale(0.98); }
        .lp-card-start-btn:disabled { opacity: 0.4; cursor: not-allowed; }
        .lp-card-scroll-hint { display: flex; align-items: center; justify-content: center; gap: 6px; font-size: 12px; color: var(--text-secondary); padding: 4px 0 0; flex-shrink: 0; }
        .lp-card-scroll-hint i { font-size: 11px; opacity: 0.6; }

        @keyframes lp-btn-launch {
            0%   { transform: scale(1);    opacity: 1; }
            30%  { transform: scale(1.03); opacity: 1; }
            60%  { transform: scale(0.97); opacity: 0.85; }
            100% { transform: scale(1);    opacity: 1; }
        }
        .lp-card-start-btn.launching { animation: lp-btn-launch 0.45s ease forwards; background: var(--accent-hover); }

        @keyframes lp-card-exit {
            0%   { opacity: 1; transform: translateY(0) scale(1); }

<script>
(function() {
    const canvas = document.getElementById('confettiCanvas');
    const ctx = canvas.getContext('2d');
    let particles = [];
    let animFrame = null;

    function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
    window.addEventListener('resize', resize);
    resize();

    const COLORS = ['#f1d19e','#4ade80','#60a5fa','#f472b6','#facc15','#a78bfa'];

    function spawnParticles(x, y) {
        for (let i = 0; i < 80; i++) {
            const angle = Math.random() * Math.PI * 2;
            const speed = Math.random() * 6 + 2;
            particles.push({
                x: x ?? canvas.width / 2, y: y ?? canvas.height * 0.4,
                vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed - 3,
                size: Math.random() * 7 + 3,
                color: COLORS[Math.floor(Math.random() * COLORS.length)],
                alpha: 1, rotation: Math.random() * Math.PI * 2,
                rotSpeed: (Math.random() - 0.5) * 0.2,
                shape: Math.random() > 0.5 ? 'rect' : 'circle'
            });
        }
        if (!animFrame) animate();
    }

    function animate() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        particles = particles.filter(p => p.alpha > 0.01);
        particles.forEach(p => {
            p.x += p.vx; p.y += p.vy; p.vy += 0.15; p.vx *= 0.99;
            p.alpha -= 0.018; p.rotation += p.rotSpeed;
            ctx.save(); ctx.globalAlpha = Math.max(0, p.alpha);
            ctx.translate(p.x, p.y); ctx.rotate(p.rotation); ctx.fillStyle = p.color;
            if (p.shape === 'rect') { ctx.fillRect(-p.size/2, -p.size/4, p.size, p.size/2); }
            else { ctx.beginPath(); ctx.arc(0,0,p.size/2,0,Math.PI*2); ctx.fill(); }
            ctx.restore();
        });
        if (particles.length > 0) { animFrame = requestAnimationFrame(animate); }
        else { animFrame = null; ctx.clearRect(0,0,canvas.width,canvas.height); }
    }

    window.launchConfetti = function(targetEl) {
        if (targetEl) { const r = targetEl.getBoundingClientRect(); spawnParticles(r.left + r.width/2, r.top + r.height/2); }
        else { spawnParticles(); }
    };
})();
</script>

<!-- ── EmojiType Renderer ── -->
<script>
const EMOJI_MAP = {
    '🔍': 'emo-magnify',   '❗': 'emo-urgent',    '📌': 'emo-pinned',
    '🔥': 'emo-fire',      '💎': 'emo-diamond',   '🟡': 'emo-yellow',
    '🔵': 'emo-blue',      '🟢': 'emo-green',     '🟣': 'emo-purple',
    '🔴': 'emo-red',       '⚫': 'emo-dark',      '🧠': 'emo-brain',
    '📖': 'emo-book',      '💡': 'emo-idea',      '🎯': 'emo-target',
    '🧩': 'emo-puzzle',    '🏷️': 'emo-tag',      '🔬': 'emo-micro',
    '⚠️': 'emo-warning',  '✅': 'emo-check',     '❌': 'emo-cross',
    '⏳': 'emo-hourglass', '🔒': 'emo-lock',      '🔓': 'emo-unlock',
    '⚡': 'emo-lightning', '🌊': 'emo-wave',      '🌀': 'emo-spin',
    '💫': 'emo-float',     '🚀': 'emo-rocket',    '🎬': 'emo-cinematic',
    '🌟': 'emo-star',      '✨': 'emo-sparkle',   '🌈': 'emo-rainbow',
    '👑': 'emo-crown',     '🪄': 'emo-magic',     '❤️': 'emo-heart',
    '😄': 'emo-happy',     '😌': 'emo-calm',      '😮': 'emo-surprised',
    '😎': 'emo-cool',      '🤖': 'emo-robot',     '🧪': 'emo-science',
    '🏛️': 'emo-temple',   '🌍': 'emo-earth',     '💰': 'emo-money',
    '⚖️': 'emo-balance',  '📡': 'emo-signal',    '🎵': 'emo-music',
    '🧊': 'emo-ice',       '🔊': 'emo-sound',
};

function buildEmojiPattern() {
    const keys = Object.keys(EMOJI_MAP).sort((a,b) => b.length - a.length);
    const escaped = keys.map(k => k.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')).join('|');
    return new RegExp(`(${escaped})([\\s\\S]*?)\\1`, 'gu');
}

function escHtmlET(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function renderEmojiText(text) {
    const re = buildEmojiPattern();
    let result = '';
    let lastIndex = 0;
    let match;
    while ((match = re.exec(text)) !== null) {
        result += escHtmlET(text.slice(lastIndex, match.index));
        const cls = EMOJI_MAP[match[1]];
        result += `<span class="${cls}">${renderEmojiText(match[2])}</span>`;
        lastIndex = re.lastIndex;
    }
    result += escHtmlET(text.slice(lastIndex));
    return result;
}

// ════════════════════════════════════════════════════════════
// SPACE CARD — canvas-based layout preview
// ════════════════════════════════════════════════════════════

function buildSpaceCard(layoutJson, username, pfp) {
    const card = document.createElement('div');
    card.className = 'space-card';
    card.id = 'spaceCard';

    const avatarContent = pfp
        ? `<img src="${pfp}" alt="${username}">`
        : (username ? username.charAt(0).toUpperCase() : 'U');

    card.innerHTML = `
        <div class="card-top-line"></div>
        <div class="space-card-header">
            <div class="space-card-icon"><i class="fas fa-th-large"></i></div>
            <div class="space-card-meta">
                <div class="space-card-title">My Space</div>
                <div class="space-card-sub">Your personal canvas</div>
            </div>
            <a class="space-card-open" href="https://patholytica.com/space" target="_blank">
                <i class="fas fa-expand-alt"></i> Open
            </a>
        </div>
        <div class="space-card-divider"></div>
        <div class="space-thumb-wrap" id="spaceThumbWrap">
            <div class="space-thumb-shimmer" id="spaceThumbShimmer"></div>
            <canvas class="space-preview-canvas" id="spacePreviewCanvas"></canvas>
            <div class="space-author-overlay">
                <div class="space-author-overlay-avatar">${avatarContent}</div>
                <div class="space-author-overlay-name">@${username || 'you'}</div>
                <div class="space-author-overlay-label">My Space</div>
            </div>
        </div>
    `;

    card.querySelector('#spaceThumbWrap').addEventListener('click', () => {
        window.open('https://patholytica.com/space', '_blank');
    });

    requestAnimationFrame(() => {
        const wrap    = card.querySelector('#spaceThumbWrap');
        const canvas  = card.querySelector('#spacePreviewCanvas');
        const shimmer = card.querySelector('#spaceThumbShimmer');

        if (!layoutJson || !layoutJson.spaces || !layoutJson.spaces.length) {
            shimmer.classList.add('hidden');
            canvas.remove();
            const empty = document.createElement('div');
            empty.className = 'space-thumb-empty';
            empty.innerHTML = `
                <i class="fas fa-th-large"></i>
                <p>No canvas data yet. Open your Space and tap <strong>Publish</strong> to preview it here.</p>
                <a href="https://patholytica.com/space" target="_blank">
                    <i class="fas fa-external-link-alt"></i> Open Space
                </a>`;
            wrap.insertBefore(empty, wrap.querySelector('.space-author-overlay'));
            return;
        }

        renderSpaceToCanvas(canvas, layoutJson, () => {
            canvas.classList.add('ready');
            shimmer.classList.add('hidden');
        });
    });

    return card;
}

// ── Core canvas renderer ─────────────────────────────────────────────────
function renderSpaceToCanvas(canvas, layoutJson, onDone) {
    const spaceData = layoutJson.spaces[layoutJson.cur || 0] || layoutJson.spaces[0];
    if (!spaceData) { onDone(); return; }

    const widgets = spaceData.widgets || [];
    const bg      = spaceData.bg || {};
    const FULL    = 4000;

    // Compute bounding box of all widget positions
    let minX = FULL, minY = FULL, maxX = 0, maxY = 0;
    widgets.forEach(w => {
        minX = Math.min(minX, w.x || 0);
        minY = Math.min(minY, w.y || 0);
        maxX = Math.max(maxX, (w.x || 0) + (w.width  || 200));
        maxY = Math.max(maxY, (w.y || 0) + (w.height || 200));
    });
    if (widgets.length === 0) { minX = 0; minY = 0; maxX = 900; maxY = 700; }

    const PAD   = 60;
    const cropX = Math.max(0, minX - PAD);
    const cropY = Math.max(0, minY - PAD);
    const cropW = Math.min(FULL, maxX + PAD) - cropX;
    const cropH = Math.min(FULL, maxY + PAD) - cropY;

    const wrapEl = canvas.parentElement;
    const dispW  = wrapEl.clientWidth  || 340;
    const dispH  = wrapEl.clientHeight || 480;
    const scale  = Math.min(dispW / cropW, dispH / cropH);

    canvas.width  = Math.round(cropW * scale);
    canvas.height = Math.round(cropH * scale);

    const ctx = canvas.getContext('2d');

    function proceed() {
        applyBgOverlay(ctx, canvas.width, canvas.height, bg);
        drawWidgets(ctx, widgets, cropX, cropY, scale, onDone);
    }

    if (bg.type === 'image' && bg.value && bg.value.startsWith('data:')) {
        const bgImg = new Image();
        bgImg.onload = () => {
            ctx.save();
            ctx.filter = `blur(${bg.blur || 0}px) brightness(${bg.brightness || 100}%)`;
            ctx.drawImage(bgImg, cropX * scale, cropY * scale, cropW * scale, cropH * scale,
                          0, 0, canvas.width, canvas.height);
            ctx.filter = 'none';
            ctx.restore();
            proceed();
        };
        bgImg.onerror = () => {
            drawBgGradient(ctx, canvas.width, canvas.height, '#0a0a0a');
            proceed();
        };
        bgImg.src = bg.value;
    } else {
        drawBgGradient(ctx, canvas.width, canvas.height, bg.value || 'linear-gradient(135deg,#0a0a0a,#111)');
        proceed();
    }
}

function drawBgGradient(ctx, w, h, value) {
    ctx.save();
    const stops = parseGradientStops(value);
    if (stops && stops.length >= 2) {
        const grad = ctx.createLinearGradient(0, 0, w, h);
        stops.forEach((stop, i) => grad.addColorStop(i / (stops.length - 1), stop));
        ctx.fillStyle = grad;
    } else {
        const hex = value.match(/#[0-9a-fA-F]{3,8}/);
        ctx.fillStyle = hex ? hex[0] : '#0a0a0a';
    }
    ctx.fillRect(0, 0, w, h);
    ctx.restore();
}

function parseGradientStops(css) {
    return css.match(/#[0-9a-fA-F]{3,8}|rgba?\([^)]+\)/g) || null;
}

function applyBgOverlay(ctx, w, h, bg) {
    const dim = (bg.dim || 0) / 100;
    if (dim > 0) {
        ctx.save();
        ctx.fillStyle = `rgba(0,0,0,${dim})`;
        ctx.fillRect(0, 0, w, h);
        ctx.restore();
    }
}

function drawWidgets(ctx, widgets, cropX, cropY, scale, onDone) {
    const sorted       = [...widgets].sort((a, b) => (a.z || 0) - (b.z || 0));
    const imageWidgets = sorted.filter(w => w.type === 'image' && w.url);
    const total        = imageWidgets.length;
    let loaded         = 0;

    function finish() {
        drawNonImageWidgets(ctx, sorted, cropX, cropY, scale);
        onDone();
    }

    if (total === 0) { finish(); return; }

    imageWidgets.forEach(w => {
        const img = new Image();
        img.onload = img.onerror = () => {
            const sx = (w.x - cropX) * scale;
            const sy = (w.y - cropY) * scale;
            const sw = w.width  * scale;
            const sh = w.height * scale;
            ctx.save();
            roundRectClip(ctx, sx, sy, sw, sh, 10 * scale);
            if (img.naturalWidth > 0) ctx.drawImage(img, sx, sy, sw, sh);
            ctx.restore();
            loaded++;
            if (loaded === total) finish();
        };
        img.src = w.url;
    });
}

function drawNonImageWidgets(ctx, sorted, cropX, cropY, scale) {
    sorted.forEach(w => {
        if (w.type === 'image') return;

        const sx = (w.x - cropX) * scale;
        const sy = (w.y - cropY) * scale;
        const sw = w.width  * scale;
        const sh = w.height * scale;
        const r  = 10 * scale;

        ctx.save();

        // Background
        ctx.fillStyle = widgetBgColor(w);
        roundRectFill(ctx, sx, sy, sw, sh, r);

        // Border
        ctx.strokeStyle = widgetBorderColor(w);
        ctx.lineWidth   = Math.max(1, scale * 0.8);
        roundRectStroke(ctx, sx, sy, sw, sh, r);

        // Header bar
        const HEADER_TYPES = ['note','todo','clock','quote','habit','calendar','pomodoro','reminder','audio','pdf','ambient','music','youtube'];
        const headerH = 26 * scale;
        if (HEADER_TYPES.includes(w.type)) {
            ctx.save();
            ctx.fillStyle = 'rgba(255,255,255,0.03)';
            roundRectFillTop(ctx, sx, sy, sw, headerH, r);
            ctx.restore();

            ctx.fillStyle = 'rgba(255,255,255,0.35)';
            ctx.font = `600 ${Math.round(8.5 * scale)}px -apple-system, sans-serif`;
            ctx.textBaseline = 'middle';
            ctx.textAlign    = 'left';
            ctx.fillText(widgetIconLabel(w).toUpperCase(), sx + 9 * scale, sy + headerH / 2);
        }

        // Content
        drawWidgetContent(ctx, w, sx, sy, sw, sh, scale, headerH);

        ctx.restore();
    });
}

function drawWidgetContent(ctx, w, sx, sy, sw, sh, scale, headerH) {
    const pad      = 10 * scale;
    const contentY = sy + headerH + pad;
    const contentH = sh - headerH - pad * 1.5;

    // Clip to widget body (below header)
    ctx.save();
    ctx.beginPath();
    ctx.rect(sx + 1, sy + headerH, sw - 2, sh - headerH - 1);
    ctx.clip();

    ctx.textBaseline = 'top';
    ctx.textAlign    = 'left';

    // ── Note ──────────────────────────────────────────────────
    if (w.type === 'note') {
        ctx.fillStyle = 'rgba(232,230,225,0.82)';
        ctx.font      = `${Math.round(10.5 * scale)}px -apple-system, sans-serif`;
        const lineH   = 15.5 * scale;
        const lines   = wrapText(ctx, w.content || '', sw - pad * 2);
        const maxLines = Math.floor(contentH / lineH);
        lines.slice(0, maxLines).forEach((line, i) => {
            ctx.fillText(line, sx + pad, contentY + i * lineH);
        });

    // ── Clock ─────────────────────────────────────────────────
    } else if (w.type === 'clock') {
        const now     = new Date();
        const use12   = w.clkStyle === 'style-ampm';
        let timeStr;
        try {
            timeStr = now.toLocaleTimeString('en-US', {
                hour: '2-digit', minute: '2-digit',
                hour12: use12,
                timeZone: (w.clkTz && w.clkTz !== 'local') ? w.clkTz : undefined
            });
        } catch(_) {
            timeStr = now.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', hour12: false });
        }
        const dateStr = now.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' }).toUpperCase();
        const midX    = sx + sw / 2;
        const midY    = sy + sh / 2;
        ctx.textAlign    = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillStyle    = 'rgba(232,230,225,0.92)';
        ctx.font         = `500 ${Math.round(20 * scale)}px 'Courier New', monospace`;
        ctx.fillText(timeStr, midX, midY - 7 * scale);
        ctx.fillStyle = 'rgba(110,108,104,0.85)';
        ctx.font      = `${Math.round(8 * scale)}px -apple-system, sans-serif`;
        ctx.fillText(dateStr, midX, midY + 10 * scale);
        if (w.clkLabel) {
            ctx.fillStyle = 'rgba(110,108,104,0.6)';
            ctx.font      = `${Math.round(7 * scale)}px -apple-system, sans-serif`;
            ctx.fillText(w.clkLabel, midX, midY + 20 * scale);
        }

    // ── To-Do ─────────────────────────────────────────────────
    } else if (w.type === 'todo') {
        const items  = (w.items || []).slice(0, 7);
        const itemH  = 17 * scale;
        items.forEach((item, i) => {
            const iy = contentY + i * itemH;
            // Checkbox square
            ctx.strokeStyle = item.done ? '#3dba72' : 'rgba(110,108,104,0.6)';
            ctx.lineWidth   = Math.max(1, scale * 0.7);
            const cbS = 11 * scale;
            ctx.strokeRect(sx + pad, iy + 1 * scale, cbS, cbS);
            if (item.done) {
                ctx.fillStyle = '#3dba72';
                ctx.fillRect(sx + pad, iy + 1 * scale, cbS, cbS);
                ctx.fillStyle    = '#fff';
                ctx.font         = `700 ${Math.round(8 * scale)}px sans-serif`;
                ctx.textAlign    = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText('✓', sx + pad + cbS / 2, iy + 1 * scale + cbS / 2);
                ctx.textAlign    = 'left';
                ctx.textBaseline = 'top';
            }
            ctx.fillStyle    = item.done ? 'rgba(110,108,104,0.5)' : 'rgba(232,230,225,0.85)';
            ctx.font         = `${Math.round(10 * scale)}px -apple-system, sans-serif`;
            ctx.textBaseline = 'top';
            const tx = sx + pad + 16 * scale;
            const maxTw = sw - pad - 16 * scale - pad;
            let txt = item.text || '';
            while (txt.length > 2 && ctx.measureText(txt).width > maxTw) txt = txt.slice(0, -1);
            if ((item.text || '').length > txt.length) txt += '…';
            ctx.fillText(txt, tx, iy + 1.5 * scale);
        });

    // ── Quote ─────────────────────────────────────────────────
    } else if (w.type === 'quote') {
        ctx.fillStyle = 'rgba(232,230,225,0.88)';
        ctx.font      = `italic ${Math.round(10.5 * scale)}px Georgia, serif`;
        const lineH   = 15 * scale;
        const lines   = wrapText(ctx, w.content || '', sw - pad * 2);
        const maxLines = Math.floor((contentH - 20 * scale) / lineH);
        lines.slice(0, maxLines).forEach((line, i) => {
            ctx.fillText(line, sx + pad, contentY + i * lineH);
        });
        if (w.author) {
            ctx.fillStyle = 'rgba(110,108,104,0.75)';
            ctx.font      = `${Math.round(9 * scale)}px -apple-system, sans-serif`;
            ctx.fillText(w.author, sx + pad, sy + sh - 16 * scale);
        }

    // ── Pomodoro ──────────────────────────────────────────────
    } else if (w.type === 'pomodoro') {
        const cx  = sx + sw / 2;
        const cy  = sy + sh / 2 - 4 * scale;
        const rr  = Math.min(sw, sh) * 0.28;
        const tot = ((w.pomSess === 'break' ? w.pomBreak : w.pomWork) || 25) * 60;
        const left = w.pomLeft || tot;
        // Track
        ctx.strokeStyle = 'rgba(42,42,42,0.95)';
        ctx.lineWidth   = 4 * scale;
        ctx.beginPath(); ctx.arc(cx, cy, rr, 0, Math.PI * 2); ctx.stroke();
        // Progress
        const endAngle = -Math.PI / 2 + (Math.PI * 2) * (1 - left / tot);
        ctx.strokeStyle = w.pomSess === 'break' ? '#3dba72' : '#ef4444';
        ctx.lineWidth   = 4 * scale;
        ctx.lineCap     = 'round';
        ctx.beginPath(); ctx.arc(cx, cy, rr, -Math.PI / 2, endAngle); ctx.stroke();
        // Time text
        const m = Math.floor(left / 60), s = left % 60;
        ctx.fillStyle    = 'rgba(232,230,225,0.92)';
        ctx.font         = `500 ${Math.round(13 * scale)}px 'Courier New', monospace`;
        ctx.textAlign    = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(`${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`, cx, cy);
        ctx.fillStyle = 'rgba(110,108,104,0.7)';
        ctx.font      = `${Math.round(7.5 * scale)}px -apple-system, sans-serif`;
        ctx.fillText((w.pomSess || 'work').toUpperCase(), cx, cy + 14 * scale);

    // ── Habits ────────────────────────────────────────────────
    } else if (w.type === 'habit') {
        const habits = (w.habits || []).slice(0, 6);
        const itemH  = 19 * scale;
        habits.forEach((h, i) => {
            const hy = contentY + i * itemH;
            ctx.fillStyle    = 'rgba(232,230,225,0.78)';
            ctx.font         = `${Math.round(10 * scale)}px -apple-system, sans-serif`;
            ctx.textBaseline = 'middle';
            ctx.textAlign    = 'left';
            // Truncate name
            let name = h.name || '';
            const maxNameW = sw * 0.52;
            while (name.length > 1 && ctx.measureText(name).width > maxNameW) name = name.slice(0, -1);
            ctx.fillText(name, sx + pad, hy + 7 * scale);
            // Day dots
            const dotR  = 4 * scale;
            const dotGap = 11 * scale;
            for (let di = 0; di < 7; di++) {
                const done = (h.done || [])[di];
                const dx   = sx + sw - pad - (6 - di) * dotGap;
                ctx.fillStyle = done ? '#3dba72' : 'rgba(58,56,53,0.9)';
                ctx.beginPath(); ctx.arc(dx, hy + 7 * scale, dotR, 0, Math.PI * 2); ctx.fill();
            }
        });

    // ── Calendar ──────────────────────────────────────────────
    } else if (w.type === 'calendar') {
        const now   = new Date();
        const y     = w.calY || now.getFullYear();
        const m     = w.calM != null ? w.calM : now.getMonth();
        const MS    = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
        // Month label
        ctx.fillStyle    = 'rgba(232,230,225,0.88)';
        ctx.font         = `700 ${Math.round(10 * scale)}px -apple-system, sans-serif`;
        ctx.textBaseline = 'top';
        ctx.textAlign    = 'left';
        ctx.fillText(`${MS[m]} ${y}`, sx + pad, contentY);
        // Day headers
        const DAYS = ['S','M','T','W','T','F','S'];
        const cellW = (sw - pad * 2) / 7;
        const cellH = 13 * scale;
        DAYS.forEach((d, di) => {
            ctx.fillStyle = 'rgba(110,108,104,0.6)';
            ctx.font      = `600 ${Math.round(7.5 * scale)}px -apple-system, sans-serif`;
            ctx.textAlign = 'center';
            ctx.fillText(d, sx + pad + di * cellW + cellW / 2, contentY + 13 * scale);
        });
        // Dates
        const first = new Date(y, m, 1).getDay();
        const dim   = new Date(y, m + 1, 0).getDate();
        for (let d = 1; d <= dim; d++) {
            const col = (first + d - 1) % 7;
            const row = Math.floor((first + d - 1) / 7);
            const dx  = sx + pad + col * cellW + cellW / 2;
            const dy  = contentY + 27 * scale + row * cellH;
            const isToday = d === now.getDate() && m === now.getMonth() && y === now.getFullYear();
            if (isToday) {
                ctx.fillStyle = '#f1d19e';
                ctx.beginPath(); ctx.arc(dx, dy + 4 * scale, 6.5 * scale, 0, Math.PI * 2); ctx.fill();
                ctx.fillStyle = '#1a1a1a';
            } else {
                ctx.fillStyle = 'rgba(110,108,104,0.7)';
            }
            ctx.font         = `${Math.round(8 * scale)}px -apple-system, sans-serif`;
            ctx.textAlign    = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(String(d), dx, dy + 4 * scale);
        }

    // ── Ambient ───────────────────────────────────────────────
    } else if (w.type === 'ambient') {
        ctx.fillStyle    = 'rgba(110,108,104,0.55)';
        ctx.font         = `${Math.round(9 * scale)}px -apple-system, sans-serif`;
        ctx.textAlign    = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(w.playing ? `▶ ${w.playing}` : 'No sound playing', sx + sw / 2, sy + sh / 2);

    // ── YouTube ───────────────────────────────────────────────
    } else if (w.type === 'youtube') {
        const pillW = 40 * scale, pillH = 16 * scale;
        const px    = sx + pad, py = contentY;
        ctx.fillStyle = '#ff0000';
        roundRectFill(ctx, px, py, pillW, pillH, 4 * scale);
        ctx.fillStyle    = '#fff';
        ctx.font         = `700 ${Math.round(7.5 * scale)}px -apple-system, sans-serif`;
        ctx.textAlign    = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText('▶ YT', px + pillW / 2, py + pillH / 2);

    // ── Music ─────────────────────────────────────────────────
    } else if (w.type === 'music') {
        const pillW = 52 * scale, pillH = 16 * scale;
        const px    = sx + pad, py = contentY;
        ctx.fillStyle = '#1DB954';
        roundRectFill(ctx, px, py, pillW, pillH, 4 * scale);
        ctx.fillStyle    = '#fff';
        ctx.font         = `700 ${Math.round(7.5 * scale)}px -apple-system, sans-serif`;
        ctx.textAlign    = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText('SPOTIFY', px + pillW / 2, py + pillH / 2);

    // ── Reminder ──────────────────────────────────────────────
    } else if (w.type === 'reminder') {
        const items = (w.reminders || []).slice(0, 5);
        const itemH = 18 * scale;
        items.forEach((r, i) => {
            const iy  = contentY + i * itemH;
            const dt  = new Date(r.time);
            const lbl = dt.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
            ctx.fillStyle    = 'rgba(232,230,225,0.82)';
            ctx.font         = `${Math.round(10 * scale)}px -apple-system, sans-serif`;
            ctx.textBaseline = 'top';
            ctx.textAlign    = 'left';
            ctx.fillText(r.title || '', sx + pad + 14 * scale, iy);
            ctx.fillStyle = 'rgba(110,108,104,0.6)';
            ctx.font      = `${Math.round(8.5 * scale)}px -apple-system, sans-serif`;
            ctx.fillText(lbl, sx + pad + 14 * scale, iy + 11 * scale);
            // Bell dot
            ctx.fillStyle = '#f1d19e';
            ctx.beginPath(); ctx.arc(sx + pad + 4 * scale, iy + 6 * scale, 3.5 * scale, 0, Math.PI * 2); ctx.fill();
        });

    // ── Audio ─────────────────────────────────────────────────
    } else if (w.type === 'audio') {
        ctx.fillStyle    = 'rgba(232,230,225,0.6)';
        ctx.font         = `${Math.round(9.5 * scale)}px -apple-system, sans-serif`;
        ctx.textBaseline = 'middle';
        ctx.textAlign    = 'left';
        ctx.fillText(w.audioName || 'Audio file', sx + pad, sy + sh / 2);

    // ── PDF ───────────────────────────────────────────────────
    } else if (w.type === 'pdf') {
        ctx.fillStyle    = 'rgba(239,68,68,0.7)';
        ctx.font         = `700 ${Math.round(18 * scale)}px -apple-system, sans-serif`;
        ctx.textAlign    = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText('PDF', sx + sw / 2, sy + sh / 2 - 4 * scale);
        ctx.fillStyle = 'rgba(110,108,104,0.55)';
        ctx.font      = `${Math.round(8.5 * scale)}px -apple-system, sans-serif`;
        ctx.fillText(w.pdfName || '', sx + sw / 2, sy + sh / 2 + 12 * scale);
    }

    ctx.restore();
}

// ── Canvas drawing utilities ─────────────────────────────────────────────
function roundRectFill(ctx, x, y, w, h, r) {
    ctx.beginPath();
    if (ctx.roundRect) { ctx.roundRect(x, y, w, h, r); }
    else { fallbackRRect(ctx, x, y, w, h, r); }
    ctx.closePath();
    ctx.fill();
}

function roundRectFillTop(ctx, x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.lineTo(x + w - r, y); ctx.arcTo(x + w, y, x + w, y + r, r);
    ctx.lineTo(x + w, y + h);
    ctx.lineTo(x, y + h);
    ctx.lineTo(x, y + r); ctx.arcTo(x, y, x + r, y, r);
    ctx.closePath();
    ctx.fill();
}

function roundRectStroke(ctx, x, y, w, h, r) {
    ctx.beginPath();
    if (ctx.roundRect) { ctx.roundRect(x, y, w, h, r); }
    else { fallbackRRect(ctx, x, y, w, h, r); }
    ctx.closePath();
    ctx.stroke();
}

function roundRectClip(ctx, x, y, w, h, r) {
    ctx.beginPath();
    if (ctx.roundRect) { ctx.roundRect(x, y, w, h, r); }
    else { fallbackRRect(ctx, x, y, w, h, r); }
    ctx.closePath();
    ctx.clip();
}

function fallbackRRect(ctx, x, y, w, h, r) {
    ctx.moveTo(x + r, y);
    ctx.lineTo(x + w - r, y);   ctx.arcTo(x + w, y,     x + w, y + r,     r);
    ctx.lineTo(x + w, y + h - r); ctx.arcTo(x + w, y + h, x + w - r, y + h, r);
    ctx.lineTo(x + r, y + h);   ctx.arcTo(x,     y + h, x,     y + h - r, r);
    ctx.lineTo(x, y + r);       ctx.arcTo(x, y,          x + r, y,         r);
}

function wrapText(ctx, text, maxW) {
    const words = (text || '').split(' ');
    const lines = [];
    let line = '';
    words.forEach(word => {
        const test = line ? line + ' ' + word : word;
        if (ctx.measureText(test).width > maxW && line) { lines.push(line); line = word; }
        else line = test;
    });
    if (line) lines.push(line);
    return lines;
}

    function isMCQ(content) { return typeof content === 'string' && content.trimStart().startsWith('❔'); }

    function parseMCQ(content) {
        const lines = content.trim().split('\n').map(l => l.trim()).filter(Boolean);
        const questionLine = lines[0].replace(/^❔/, '').trim();
        const options = lines.slice(1).map(line => {
            const correct = line.startsWith('✅');
            const label   = line.replace(/^✅/, '').trim();
            return { label, correct };
        });
        for (let i = options.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [options[i], options[j]] = [options[j], options[i]];
        }
        return { question: questionLine, options };
    }
