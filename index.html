<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Patholytica — Home</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@400;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root {
  --bg-color: #1f1f1f;
  --text-primary: #fff;
  --text-secondary: #aaa;
  --card-bg: #252525;
  --hover-bg: #2a2a2a;
  --border-color: #303030;
  --accent: #f1d19e;
  --accent-green: #2ecc71;
}

* { box-sizing: border-box; }
html, body {
  margin: 0; padding: 0;
  min-height: 100%;
  font-family: "DM Sans", "Roboto", Arial, sans-serif;
  overflow-x: hidden; max-width: 100vw;
}
body { background: var(--bg-color); color: var(--text-primary); }

/* ── Header ── */
.header-wrapper {
  position: fixed; top: 0; left: 0; right: 0;
  background: var(--bg-color);
  padding-top: env(safe-area-inset-top);
  border-bottom: 1px solid var(--border-color);
  z-index: 40;
}
.header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px 24px;
}
.logo-img { height: 28px; width: auto; cursor: pointer; }
.header-actions { display: flex; align-items: center; gap: 10px; }
.auth-buttons { display: none; gap: 12px; }
.auth-buttons.show { display: flex; }
.btn-login {
  padding: 8px 20px; border-radius: 20px; font-size: 14px; font-weight: 500;
  cursor: pointer; text-decoration: none;
  border: 1px solid var(--border-color); background: transparent; color: var(--text-primary);
  transition: background 0.2s ease;
}
.btn-login:hover { background: var(--hover-bg); }
.user-welcome { display: none; align-items: center; gap: 10px; font-size: 14px; position: relative; }
.user-welcome.show { display: flex; }
.welcome-text { font-weight: 500; cursor: pointer; transition: color 0.2s ease; }
.welcome-text:hover { color: var(--accent); }
.header-icon-btn {
  display: flex; align-items: center; justify-content: center;
  width: 30px; height: 30px; border-radius: 50%;
  background: none; border: 1px solid var(--border-color);
  color: var(--text-secondary); font-size: 14px;
  cursor: pointer; transition: background 0.2s ease, color 0.2s ease;
  flex-shrink: 0; position: relative;
}
.header-icon-btn:hover { background: var(--hover-bg); color: var(--text-primary); }
.header-icon-btn.accent {
  background: rgba(241,209,158,0.12);
  border-color: rgba(241,209,158,0.3);
  color: var(--accent);
}
.header-icon-btn.accent:hover { background: rgba(241,209,158,0.22); border-color: var(--accent); }
.header-icon-btn.hidden { display: none; }
.header-icon-btn.show { display: flex; }

/* ── Notification badge ── */
.notif-badge {
  position: absolute; top: -4px; right: -4px;
  background: #ef4444; color: #fff;
  font-size: 9px; font-weight: 700;
  width: 16px; height: 16px; border-radius: 50%;
  display: none; align-items: center; justify-content: center;
  border: 2px solid var(--bg-color); pointer-events: none;
}
.notif-badge.show { display: flex; }

/* ── Notification Panel ── */
.notif-panel {
  display: none; flex-direction: column;
  position: fixed; top: calc(56px + env(safe-area-inset-top)); right: 12px;
  width: 320px; max-width: calc(100vw - 24px);
  max-height: 480px;
  background: #1e1e1e; border: 1px solid var(--border-color);
  border-radius: 16px; box-shadow: 0 16px 48px rgba(0,0,0,0.7);
  z-index: 300; overflow: hidden;
}
.notif-panel.show { display: flex; }
.notif-panel-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 16px 10px; border-bottom: 1px solid var(--border-color);
  flex-shrink: 0;
}
.notif-panel-title { font-size: 14px; font-weight: 700; }
.notif-mark-all {
  font-size: 11px; font-weight: 600; color: var(--accent);
  background: none; border: none; cursor: pointer; padding: 0;
  font-family: "DM Sans", sans-serif;
  transition: opacity 0.2s ease;
}
.notif-mark-all:hover { opacity: 0.7; }
.notif-list { flex: 1; overflow-y: auto; }
.notif-list::-webkit-scrollbar { width: 3px; }
.notif-list::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 2px; }
.notif-item {
  display: flex; align-items: flex-start; gap: 10px;
  padding: 12px 16px; border-bottom: 1px solid rgba(48,48,48,0.6);
  cursor: pointer; transition: background 0.15s ease; position: relative;
}
.notif-item:hover { background: var(--hover-bg); }
.notif-item.unread { background: rgba(241,209,158,0.04); }
.notif-item.unread::before {
  content: ''; position: absolute; left: 6px; top: 50%; transform: translateY(-50%);
  width: 5px; height: 5px; border-radius: 50%; background: var(--accent);
}
.notif-icon {
  width: 32px; height: 32px; border-radius: 50%; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center; font-size: 13px;
}
.notif-icon.like    { background: rgba(239,68,68,0.15);   color: #ef4444; }
.notif-icon.comment { background: rgba(96,165,250,0.15);  color: #60a5fa; }
.notif-icon.follow  { background: rgba(241,209,158,0.15); color: var(--accent); }
.notif-icon.article { background: rgba(74,222,128,0.15);  color: #4ade80; }
.notif-text { flex: 1; min-width: 0; }
.notif-msg  { font-size: 13px; line-height: 1.4; color: var(--text-primary); }
.notif-time { font-size: 11px; color: var(--text-secondary); margin-top: 2px; }
.notif-empty {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 10px; padding: 40px 20px; color: var(--text-secondary);
}
.notif-empty i { font-size: 32px; opacity: 0.3; }
.notif-empty p { font-size: 13px; opacity: 0.6; margin: 0; }
.notif-spinner-wrap { padding: 24px; display: flex; justify-content: center; }
.notif-spinner {
  width: 22px; height: 22px;
  border: 2px solid var(--border-color); border-top-color: var(--accent);
  border-radius: 50%; animation: spin 0.9s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ── Popups ── */
.header-popup {
  display: none; position: absolute; top: calc(100% + 10px); right: 0;
  background: #252525; border: 1px solid var(--border-color);
  border-radius: 12px; padding: 6px; min-width: 160px;
  box-shadow: 0 12px 32px rgba(0,0,0,0.6);
  z-index: 200; flex-direction: column; gap: 2px;
}
.header-popup.show { display: flex; }
.popup-item {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 14px; border-radius: 8px;
  font-size: 14px; font-weight: 500; cursor: pointer;
  color: var(--text-primary); transition: background 0.2s ease; white-space: nowrap;
}
.popup-item:hover { background: var(--hover-bg); }
.popup-item i { font-size: 13px; width: 14px; text-align: center; color: var(--text-secondary); }
.popup-danger { color: #ff6b6b; }
.popup-danger i { color: #ff6b6b; }
.popup-divider { height: 1px; background: var(--border-color); margin: 4px 0; }

/* ── Main container ── */
.list-container {
  max-width: 900px; width: 100%; margin: 0 auto;
  padding: 16px 24px 32px;
  padding-top: calc(65px + env(safe-area-inset-top) + 16px);
}

/* ── Library ID entry ── */
.library-entry { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; }
.library-id-input {
  flex: 1; min-width: 120px; max-width: 100%;
  background: #2a2a2a; border: 1px solid var(--border-color);
  border-radius: 10px; color: var(--text-primary);
  font-size: 15px; padding: 10px 14px; outline: none;
  transition: border-color 0.2s ease; -moz-appearance: textfield;
  font-family: "DM Sans", sans-serif;
}
.library-id-input::-webkit-outer-spin-button,
.library-id-input::-webkit-inner-spin-button { -webkit-appearance: none; }
.library-id-input::placeholder { color: var(--text-secondary); opacity: 0.6; }
.library-id-input:focus { border-color: var(--accent); }
.library-id-input.error { border-color: #ff6b6b; }
.btn-start {
  padding: 10px 22px; border-radius: 10px;
  background: var(--accent); color: #1f1f1f;
  border: none; font-size: 14px; font-weight: 600;
  cursor: pointer; white-space: nowrap;
  font-family: "DM Sans", sans-serif;
  transition: opacity 0.2s ease, transform 0.15s ease;
}
.btn-start:hover { opacity: 0.88; transform: translateY(-1px); }
.btn-start:active { transform: scale(0.97); }
.btn-start:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

/* ── Library banner ── */
.library-banner {
  display: none; background: #252525;
  border: 1px solid var(--border-color); border-radius: 12px;
  padding: 14px 18px; margin-bottom: 14px;
  gap: 14px; align-items: flex-start;
}
.library-banner.show { display: flex; }
.library-banner-thumb {
  width: 48px; height: 48px; border-radius: 10px; overflow: hidden; flex-shrink: 0;
  background: rgba(241,209,158,0.08); border: 1px solid rgba(241,209,158,0.15);
  display: flex; align-items: center; justify-content: center;
  color: var(--accent); font-size: 18px;
}
.library-banner-thumb img { width: 100%; height: 100%; object-fit: cover; }
.library-banner-info { flex: 1; min-width: 0; }
.library-banner-name {
  font-size: 15px; font-weight: 600; margin-bottom: 4px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.library-banner-meta {
  font-size: 12px; color: var(--text-secondary);
  display: flex; flex-wrap: wrap; gap: 6px 12px;
}
.library-banner-meta span { display: flex; align-items: center; gap: 5px; }
.library-banner-meta i { font-size: 11px; opacity: 0.7; }
.library-banner-clear {
  background: none; border: none; color: var(--text-secondary);
  cursor: pointer; font-size: 14px; padding: 4px; border-radius: 50%;
  transition: color 0.2s ease, background 0.2s ease; flex-shrink: 0;
}
.library-banner-clear:hover { color: var(--text-primary); background: var(--hover-bg); }
.banner-open-btn {
  display: inline-flex; align-items: center; gap: 5px;
  margin-top: 8px; padding: 5px 12px; border-radius: 20px;
  background: rgba(241,209,158,0.1); border: 1px solid rgba(241,209,158,0.25);
  color: var(--accent); font-size: 12px; font-weight: 600; cursor: pointer;
  transition: background 0.2s ease;
}
.banner-open-btn:hover { background: rgba(241,209,158,0.18); }

/* ── Active creators ── */
.creators-section { margin-bottom: 20px; }
.section-label {
  font-size: 11px; text-transform: uppercase; letter-spacing: 1.5px;
  color: var(--text-secondary); margin-bottom: 8px; opacity: 0.6; font-weight: 600;
}
.creators-list { display: flex; flex-direction: column; gap: 2px; }
.creator-row {
  display: flex; align-items: center; gap: 12px;
  padding: 8px 10px; border-radius: 10px;
  cursor: pointer; transition: background 0.2s ease;
}
.creator-row:hover { background: var(--hover-bg); }
.creator-rank { font-size: 12px; width: 18px; text-align: center; flex-shrink: 0; font-weight: 600; color: var(--text-secondary); }
.creator-rank.gold   { color: #f1d19e; }
.creator-rank.silver { color: #b0b0b0; }
.creator-rank.bronze { color: #cd7f32; }
.creator-avatar {
  width: 32px; height: 32px; border-radius: 50%;
  background: rgba(241,209,158,0.12); border: 1px solid rgba(241,209,158,0.2);
  display: flex; align-items: center; justify-content: center;
  font-size: 13px; font-weight: 700; color: var(--accent);
  flex-shrink: 0; text-transform: uppercase; overflow: hidden;
}
.creator-avatar img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
.creator-info { flex: 1; min-width: 0; }
.creator-name { font-size: 14px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.creator-count { font-size: 11px; color: var(--text-secondary); }
.creator-badge {
  font-size: 11px; font-weight: 600; color: var(--accent);
  background: rgba(241,209,158,0.1); border: 1px solid rgba(241,209,158,0.2);
  border-radius: 20px; padding: 2px 9px; white-space: nowrap; flex-shrink: 0;
}
.creator-skeleton { display: flex; align-items: center; gap: 12px; padding: 8px 10px; }
.skel-circle { width: 32px; height: 32px; border-radius: 50%; background: #2a2a2a; flex-shrink: 0; animation: shimmer 1.4s infinite; }
.skel-line   { height: 11px; border-radius: 6px; background: #2a2a2a; animation: shimmer 1.4s infinite; }

/* ── Libraries header ── */
.libraries-header {
  display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px;
}
.libraries-header .section-label { margin-bottom: 0; }
.library-count-badge {
  font-size: 11px; font-weight: 600; color: var(--accent);
  background: rgba(241,209,158,0.1); border: 1px solid rgba(241,209,158,0.2);
  border-radius: 20px; padding: 2px 10px;
}

/* ── Favourites section header ── */
.fav-section-header {
  display: flex; align-items: center; gap: 8px;
  margin-bottom: 10px; margin-top: 4px;
}
.fav-section-label {
  font-size: 11px; text-transform: uppercase; letter-spacing: 1.5px;
  font-weight: 700; color: var(--accent); opacity: 0.9;
}
.fav-section-line {
  flex: 1; height: 1px;
  background: linear-gradient(to right, rgba(241,209,158,0.25), transparent);
}
.fav-section-icon {
  font-size: 11px; color: var(--accent); opacity: 0.7;
}

.all-section-header {
  display: flex; align-items: center; gap: 8px;
  margin-bottom: 10px; margin-top: 20px;
}
.all-section-label {
  font-size: 11px; text-transform: uppercase; letter-spacing: 1.5px;
  font-weight: 600; color: var(--text-secondary); opacity: 0.55;
}
.all-section-line {
  flex: 1; height: 1px; background: var(--border-color);
}

/* ── Library cards ── */
.libraries-grid { display: flex; flex-direction: column; gap: 12px; }

/* ── Deck wrapper ── */
.deck-wrapper { position: relative; padding-bottom: 10px; }
.deck-card-behind {
  position: absolute; left: 0; right: 0;
  background: var(--card-bg); border: 1px solid var(--border-color);
  border-radius: 14px; height: 100%;
  transition: transform 0.2s ease;
}
.deck-card-behind.b1 { transform: rotate(1.4deg) translateY(5px); background: #222; z-index: 0; }
.deck-card-behind.b2 { transform: rotate(-1deg) translateY(9px); background: #202020; z-index: -1; }
.deck-wrapper:hover .deck-card-behind.b1 { transform: rotate(2.5deg) translateY(7px); }
.deck-wrapper:hover .deck-card-behind.b2 { transform: rotate(-1.8deg) translateY(12px); }

/* Favourite card glow */
.deck-wrapper.is-faved .deck-card-behind.b1 {
  border-color: rgba(241,209,158,0.18);
}

.library-card {
  background: var(--card-bg); border: 1px solid var(--border-color);
  border-radius: 14px; overflow: hidden;
  transition: border-color 0.2s ease, transform 0.15s ease, box-shadow 0.2s ease;
  display: flex; flex-direction: column; position: relative; z-index: 1;
}
.deck-wrapper.is-faved .library-card {
  border-color: rgba(241,209,158,0.22);
}
.deck-wrapper:hover .library-card {
  border-color: rgba(241,209,158,0.35);
  transform: translateY(-2px);
  box-shadow: 0 8px 24px rgba(0,0,0,0.35);
}
.library-card:active { transform: scale(0.99); }

.library-card-thumb {
  width: 100%; height: 160px; overflow: hidden; position: relative;
  background: linear-gradient(135deg, #2a2a2a 0%, #1e1e1e 100%); flex-shrink: 0;
  cursor: pointer;
}
.library-card-thumb img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.3s ease; }
.deck-wrapper:hover .library-card-thumb img { transform: scale(1.03); }
.library-card-thumb-placeholder {
  width: 100%; height: 100%;
  display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 8px;
  color: rgba(241,209,158,0.3); font-size: 36px;
}
.library-card-thumb-placeholder span { font-size: 11px; color: var(--text-secondary); opacity: 0.4; font-weight: 500; }
.library-card-thumb-overlay {
  position: absolute; bottom: 0; left: 0; right: 0; height: 60px;
  background: linear-gradient(to top, rgba(0,0,0,0.65) 0%, transparent 100%);
}

/* Saved ribbon */
.faved-ribbon {
  position: absolute; top: 10px; right: 10px;
  display: flex; align-items: center; gap: 5px;
  background: rgba(20,18,14,0.78);
  border: 1px solid rgba(241,209,158,0.3);
  backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px);
  border-radius: 20px; padding: 4px 10px;
  font-size: 11px; font-weight: 700; color: var(--accent);
  letter-spacing: 0.04em; pointer-events: none;
}
.faved-ribbon svg {
  width: 11px; height: 11px;
  fill: var(--accent); flex-shrink: 0;
}

.library-card-body { padding: 14px 16px 10px; display: flex; flex-direction: column; gap: 6px; cursor: pointer; }
.library-card-name {
  font-size: 17px; font-weight: 700; line-height: 1.3; color: var(--text-primary);
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
}
.deck-wrapper:hover .library-card-name { color: var(--accent); }
.library-card-desc {
  font-size: 13px; color: var(--text-secondary); line-height: 1.5;
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
}
.library-card-footer {
  display: flex; align-items: center; justify-content: space-between;
  margin-top: 6px; flex-wrap: wrap; gap: 6px;
}
.library-card-meta { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
.library-card-meta-item { display: flex; align-items: center; gap: 4px; font-size: 12px; color: var(--text-secondary); }
.library-card-meta-item i { font-size: 11px; opacity: 0.65; }
.library-card-creator { display: flex; align-items: center; gap: 6px; }
.creator-mini-avatar {
  width: 20px; height: 20px; border-radius: 50%;
  background: rgba(241,209,158,0.12); border: 1px solid rgba(241,209,158,0.2);
  display: flex; align-items: center; justify-content: center;
  font-size: 9px; font-weight: 700; color: var(--accent);
  flex-shrink: 0; text-transform: uppercase; overflow: hidden;
}
.creator-mini-avatar img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
.creator-mini-name { font-size: 12px; color: var(--text-secondary); font-weight: 500; }

/* ── Card action bar ── */
.library-card-actions {
  display: flex; align-items: center; gap: 8px;
  padding: 0 14px 14px;
}
.lib-action-btn {
  display: flex; align-items: center; gap: 5px;
  padding: 6px 12px; border-radius: 20px; font-size: 12px; font-weight: 600;
  cursor: pointer; border: 1px solid var(--border-color);
  background: none; color: var(--text-secondary);
  font-family: "DM Sans", sans-serif;
  transition: background 0.15s ease, color 0.15s ease, border-color 0.15s ease;
  white-space: nowrap;
}
.lib-action-btn:hover { background: var(--hover-bg); color: var(--text-primary); border-color: #444; }

/* Save button states */
.lib-action-btn.fav-btn { position: relative; overflow: hidden; }

.lib-action-btn.fav-btn .btn-icon {
  display: inline-flex; align-items: center; justify-content: center;
  transition: transform 0.32s cubic-bezier(0.34,1.56,0.64,1), opacity 0.22s ease;
  flex-shrink: 0;
}

/* Heart SVG inside save button */
.lib-action-btn.fav-btn .heart-svg {
  width: 12px; height: 12px;
  fill: none; stroke: currentColor; stroke-width: 2;
  stroke-linecap: round; stroke-linejoin: round;
  transition: fill 0.2s ease, stroke 0.2s ease;
  display: block;
}

.lib-action-btn.fav-btn.faved {
  border-color: rgba(239,68,68,0.35);
  color: #ef4444;
  background: rgba(239,68,68,0.05);
}
.lib-action-btn.fav-btn.faved .heart-svg {
  fill: #ef4444; stroke: #ef4444;
}

/* Fav button pop animation */
@keyframes favPop {
  0%   { transform: scale(1); }
  40%  { transform: scale(1.45); }
  65%  { transform: scale(0.85); }
  100% { transform: scale(1); }
}
.lib-action-btn.fav-btn.popping .btn-icon { animation: favPop 0.38s cubic-bezier(0.34,1.56,0.64,1) forwards; }

.lib-action-btn.open-feed-btn {
  color: var(--accent); border-color: rgba(241,209,158,0.3); background: rgba(241,209,158,0.06);
}
.lib-action-btn.open-feed-btn:hover { background: rgba(241,209,158,0.14); }

/* ── Skeletons ── */
.library-card-skeleton { background: var(--card-bg); border: 1px solid var(--border-color); border-radius: 14px; overflow: hidden; }
.skel-thumb { height: 160px; background: #2a2a2a; animation: shimmer 1.4s infinite; }
.skel-body  { padding: 14px 16px 16px; display: flex; flex-direction: column; gap: 10px; }
.skel-title    { height: 18px; border-radius: 6px; background: #2a2a2a; width: 70%; animation: shimmer 1.4s infinite; }
.skel-subtitle { height: 13px; border-radius: 6px; background: #2a2a2a; width: 90%; animation: shimmer 1.4s infinite; }
.skel-meta-row { height: 11px; border-radius: 6px; background: #2a2a2a; width: 45%; animation: shimmer 1.4s infinite; }
@keyframes shimmer { 0%,100%{opacity:0.45} 50%{opacity:0.9} }

.empty-state { text-align: center; padding: 48px 24px; color: var(--text-secondary); }

</style>

<script>
window.escHtml = function(t) { const d = document.createElement('div'); d.textContent = t; return d.innerHTML; };

function closeUserPopup()   { document.getElementById('userPopup').classList.remove('show'); }
function closeCreatePopup() { document.getElementById('createPopup').classList.remove('show'); }

document.getElementById('welcomeText').addEventListener('click', function(e) {
  e.stopPropagation();
  const up = document.getElementById('userPopup'), cp = document.getElementById('createPopup');
  cp.classList.remove('show'); up.classList.toggle('show');
});
document.getElementById('fabCreateBtn').addEventListener('click', function(e) {
  e.stopPropagation();
  const cp = document.getElementById('createPopup'), up = document.getElementById('userPopup');
  up.classList.remove('show'); cp.classList.toggle('show');
});
document.addEventListener('click', function(e) {
  closeUserPopup(); closeCreatePopup();
  if (!document.getElementById('notifBellBtn').contains(e.target) &&
      !document.getElementById('notifPanel').contains(e.target)) {
    document.getElementById('notifPanel').classList.remove('show');
  }
});

/* ── Pong ── */
var pongRunning = false, pongInitialized = false;
function openPong() {
  document.getElementById('pongOverlay').classList.add('show');
  document.body.style.overflow = 'hidden';
  if (!pongInitialized) { initPong(); pongInitialized = true; }
}
function closePong() {
  document.getElementById('pongOverlay').classList.remove('show');
  document.body.style.overflow = ''; pongRunning = false;
}
document.getElementById('pongOverlay').addEventListener('click', function(e) { if (e.target === this) closePong(); });

function initPong() {
  const canvas = document.getElementById('pongCanvas'), ctx = canvas.getContext('2d');
  function resize() { const mw = Math.min(480, window.innerWidth - 80); canvas.width = mw; canvas.height = Math.round(mw * (200/480)); }
  resize(); window.addEventListener('resize', () => { resize(); resetPos(); });
  const ACCENT = '#f1d19e', PAD_W = 8, PAD_H_R = 0.22, BALL_R = 5, AI_S = 0.035;
  let W, H, padH, pY, aY, bX, bY, bVX, bVY, pScore = 0, aScore = 0, spd;
  function dims() { W = canvas.width; H = canvas.height; padH = Math.round(H * PAD_H_R); spd = W * 0.012; }
  function resetPos() {
    dims(); pY = aY = (H - padH) / 2; bX = W/2; bY = H/2;
    const ang = (Math.random()*0.6 - 0.3) + (Math.random() > 0.5 ? 0 : Math.PI);
    bVX = Math.cos(ang)*spd; bVY = Math.sin(ang)*spd;
    if (Math.abs(bVX) < spd*0.5) bVX = bVX < 0 ? -spd*0.7 : spd*0.7;
  }
  function draw() {
    ctx.clearRect(0,0,W,H);
    ctx.setLineDash([6,8]); ctx.strokeStyle = 'rgba(255,255,255,0.08)'; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(W/2,0); ctx.lineTo(W/2,H); ctx.stroke(); ctx.setLineDash([]);
    ctx.fillStyle = ACCENT; ctx.beginPath(); ctx.roundRect(4,pY,PAD_W,padH,4); ctx.fill();
    ctx.fillStyle = 'rgba(255,255,255,0.5)'; ctx.beginPath(); ctx.roundRect(W-4-PAD_W,aY,PAD_W,padH,4); ctx.fill();
    ctx.fillStyle = '#fff'; ctx.beginPath(); ctx.arc(bX,bY,BALL_R,0,Math.PI*2); ctx.fill();
  }
  function update() {
    if (!pongRunning) return;
    bX += bVX; bY += bVY;
    if (bY-BALL_R <= 0) { bY = BALL_R; bVY = Math.abs(bVY); }
    if (bY+BALL_R >= H) { bY = H-BALL_R; bVY = -Math.abs(bVY); }
    const am = H*AI_S, ac = aY+padH/2;
    if (ac < bY-4) aY = Math.min(H-padH, aY+am);
    else if (ac > bY+4) aY = Math.max(0, aY-am);
    if (bX-BALL_R<=4+PAD_W && bX-BALL_R>=2 && bY>=pY && bY<=pY+padH) {
      bX = 4+PAD_W+BALL_R;
      const h=(bY-(pY+padH/2))/(padH/2), s=Math.sqrt(bVX*bVX+bVY*bVY)*1.04;
      bVX = Math.abs(Math.cos(h*0.9)*s); bVY = Math.sin(h*0.9)*s;
    }
    if (bX+BALL_R>=W-4-PAD_W && bX+BALL_R<=W-2 && bY>=aY && bY<=aY+padH) {
      bX = W-4-PAD_W-BALL_R;
      const h=(bY-(aY+padH/2))/(padH/2), s=Math.sqrt(bVX*bVX+bVY*bVY)*1.02;
      bVX = -Math.abs(Math.cos(h*0.9)*s); bVY = Math.sin(h*0.9)*s;
    }
    if (bX-BALL_R <= 0) {
      aScore++; document.getElementById('aiScore').textContent = aScore;
      if (aScore >= 12) { pongRunning=false; document.getElementById('pongHint').textContent='AI wins! Click or tap to play again.'; pScore=0;aScore=0;document.getElementById('playerScore').textContent=0;document.getElementById('aiScore').textContent=0;resetPos();return; }
      resetPos();
    }
    if (bX+BALL_R >= W) {
      pScore++; document.getElementById('playerScore').textContent = pScore;
      if (pScore >= 12) { pongRunning=false; document.getElementById('pongHint').textContent='You win! Click or tap to play again.'; pScore=0;aScore=0;document.getElementById('playerScore').textContent=0;document.getElementById('aiScore').textContent=0;resetPos();return; }
      resetPos();
    }
  }
  function loop() { update(); draw(); requestAnimationFrame(loop); }
  function start() { if (pongRunning) return; pongRunning=true; document.getElementById('pongHint').textContent='Mouse / drag to move your paddle'; requestAnimationFrame(loop); }
  canvas.addEventListener('mousemove', e => { const r=canvas.getBoundingClientRect(); pY=Math.max(0,Math.min(H-padH,e.clientY-r.top-padH/2)); });
  canvas.addEventListener('touchmove', e => { e.preventDefault(); const r=canvas.getBoundingClientRect(); pY=Math.max(0,Math.min(H-padH,e.touches[0].clientY-r.top-padH/2)); }, {passive:false});
  canvas.addEventListener('click', start);
  canvas.addEventListener('touchstart', e => { e.preventDefault(); start(); }, {passive:false});
  resetPos(); draw();
}
</script>

/* ── SVGs ── */
const HEART_SVG = `<svg class="heart-svg" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>`;
const BELL_SVG  = `<i class="fas fa-bell" style="font-size:12px;"></i>`;

onAuthStateChanged(auth, async (user) => {
  const authButtons     = document.getElementById('authButtons');
  const userWelcome     = document.getElementById('userWelcome');
  const welcomeText     = document.getElementById('welcomeText');
  const fabCreateBtn    = document.getElementById('fabCreateBtn');

/* ════════════════════════════════════════
   FAVOURITES
════════════════════════════════════════ */
async function loadUserFavourites() {
  if (!currentSupaUser) return;
  try {
    const { data } = await supabase
      .from('favourite_playlists').select('playlist_id')
      .eq('user_id', currentSupaUser.user_id);
    userFavourites.clear();
    (data || []).forEach(r => userFavourites.add(String(r.playlist_id)));
    updateFavButtons();
  } catch(e) {}
}

function updateFavButtons() {
  document.querySelectorAll('.fav-btn').forEach(btn => {
    const pid   = String(btn.dataset.pid);
    const faved = userFavourites.has(pid);
    const iconWrap = btn.querySelector('.btn-icon');
    const label    = btn.querySelector('.fav-label');

    btn.classList.toggle('faved', faved);

    if (faved) {
      iconWrap.innerHTML = BELL_SVG;
      if (label) label.textContent = 'Saved';
    } else {
      iconWrap.innerHTML = HEART_SVG;
      if (label) label.textContent = 'Save';
    }

    // Update deck-wrapper highlight
    const wrapper = btn.closest('.deck-wrapper');
    if (wrapper) wrapper.classList.toggle('is-faved', faved);

    // Update ribbon inside thumb
    const ribbon = btn.closest('.library-card')?.querySelector('.faved-ribbon');
    if (ribbon) ribbon.style.display = faved ? 'flex' : 'none';
  });
}

window.toggleFavourite = async function(e, playlistId) {
  e.stopPropagation();
  if (!currentSupaUser) { window.location.href = 'login.html'; return; }
  const pid      = String(playlistId);
  const wasFaved = userFavourites.has(pid);

  // Optimistic toggle
  if (wasFaved) userFavourites.delete(pid); else userFavourites.add(pid);
  updateFavButtons();

  // Trigger pop animation
  const btn = document.querySelector(`.fav-btn[data-pid="${pid}"]`);
  if (btn) {
    btn.classList.remove('popping');
    void btn.offsetWidth; // reflow to restart animation
    btn.classList.add('popping');
    btn.addEventListener('animationend', () => btn.classList.remove('popping'), { once: true });
  }

  try {
    if (wasFaved) {
      await supabase.from('favourite_playlists').delete()
        .eq('user_id', currentSupaUser.user_id).eq('playlist_id', parseInt(pid));
    } else {
      await supabase.from('favourite_playlists')
        .insert([{ user_id: currentSupaUser.user_id, playlist_id: parseInt(pid) }]);
    }
  } catch(err) {
    // Revert on failure
    if (wasFaved) userFavourites.add(pid); else userFavourites.delete(pid);
    updateFavButtons();
  }
};

/* ════════════════════════════════════════
   NOTIFICATIONS
════════════════════════════════════════ */
function notifIcon(type) {
  if (type === 'like_article' || type === 'like_comment')           return { cls: 'like',    icon: 'fa-heart' };
  if (type === 'comment_on_article' || type === 'reply_to_comment') return { cls: 'comment', icon: 'fa-comment' };
  if (type === 'new_follower')                                      return { cls: 'follow',  icon: 'fa-user-plus' };
  if (type === 'new_article_from_following')                        return { cls: 'article', icon: 'fa-file-alt' };
  return { cls: 'follow', icon: 'fa-bell' };
}

function relTime(dateStr) {
  const ms = Date.now() - new Date(dateStr).getTime();
  const m = Math.floor(ms/60000), h = Math.floor(ms/3600000), d = Math.floor(ms/86400000);
  if (m < 1) return 'just now';
  if (m < 60) return `${m}m ago`;
  if (h < 24) return `${h}h ago`;
  if (d < 7)  return `${d}d ago`;
  return new Date(dateStr).toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
}

async function loadNotifications() {
  if (!currentSupaUser) return;
  const list  = document.getElementById('notifList');
  const badge = document.getElementById('notifBadge');
  list.innerHTML = '<div class="notif-spinner-wrap"><div class="notif-spinner"></div></div>';
  try {
    const { data: notifs } = await supabase
      .from('notifications').select('*')
      .eq('recipient_id', currentSupaUser.user_id)
      .order('created_at', { ascending: false }).limit(30);

    if (!notifs || notifs.length === 0) {
      list.innerHTML = `<div class="notif-empty"><i class="fas fa-bell-slash"></i><p>No notifications yet</p></div>`;
      badge.classList.remove('show'); return;
    }

    const unread = notifs.filter(n => !n.is_read).length;
    if (unread > 0) { badge.textContent = unread > 9 ? '9+' : unread; badge.classList.add('show'); }
    else badge.classList.remove('show');

    list.innerHTML = notifs.map(n => {
      const { cls, icon } = notifIcon(n.type);
      let target = '#';
      if (n.article_id)       target = `article.html?id=${n.article_id}`;
      else if (n.playlist_id) target = `playlist.html?id=${n.playlist_id}`;
      return `<div class="notif-item ${n.is_read ? '' : 'unread'}" data-id="${n.id}" data-target="${target}" onclick="window._handleNotif(this)">
        <div class="notif-icon ${cls}"><i class="fas ${icon}"></i></div>
        <div class="notif-text">
          <div class="notif-msg">${window.escHtml(n.message || 'New notification')}</div>
          <div class="notif-time">${relTime(n.created_at)}</div>
        </div>
      </div>`;
    }).join('');
  } catch(e) {
    list.innerHTML = `<div class="notif-empty"><i class="fas fa-exclamation-triangle"></i><p>Failed to load</p></div>`;
  }
}

window._handleNotif = async function(el) {
  const id = el.dataset.id, target = el.dataset.target;
  el.classList.remove('unread');
  const unread = document.querySelectorAll('.notif-item.unread').length;
  const badge  = document.getElementById('notifBadge');
  if (unread === 0) badge.classList.remove('show');
  else { badge.textContent = unread > 9 ? '9+' : unread; }
  try { await supabase.from('notifications').update({ is_read: true }).eq('id', id); } catch(e) {}
  if (target && target !== '#') window.location.href = target;
};

document.getElementById('notifMarkAll').addEventListener('click', async function() {
  if (!currentSupaUser) return;
  document.querySelectorAll('.notif-item.unread').forEach(el => el.classList.remove('unread'));
  document.getElementById('notifBadge').classList.remove('show');
  try {
    await supabase.from('notifications').update({ is_read: true })
      .eq('recipient_id', currentSupaUser.user_id).eq('is_read', false);
  } catch(e) {}
});

document.getElementById('notifBellBtn').addEventListener('click', function(e) {
  e.stopPropagation();
  const panel = document.getElementById('notifPanel');
  panel.classList.toggle('show');
  if (panel.classList.contains('show') && currentSupaUser) loadNotifications();
});

/* ════════════════════════════════════════
   CREATORS
════════════════════════════════════════ */
async function loadCreators() {
  const el = document.getElementById('creatorsList');
  try {
    const { data: articles } = await supabase.from('articles').select('firebase_user_id');
    if (!articles) { el.innerHTML = ''; return; }
    const counts = {};
    articles.forEach(a => { if (a.firebase_user_id) counts[a.firebase_user_id] = (counts[a.firebase_user_id]||0)+1; });
    const sorted = Object.entries(counts).sort((a,b)=>b[1]-a[1]).slice(0,3);
    if (!sorted.length) { el.innerHTML = ''; return; }
    const { data: users } = await supabase.from('users').select('firebase_uid, username, pfp').in('firebase_uid', sorted.map(([u])=>u));
    const um = {};
    if (users) users.forEach(u => { um[u.firebase_uid] = u; });
    const rc = ['gold','silver','bronze'], rl = ['#1','#2','#3'];
    el.innerHTML = sorted.map(([uid,count],i) => {
      const u = um[uid];
      const name = u?.username ? `@${u.username}` : 'Unknown';
      const init = (u?.username||'?').replace(/^@/,'')[0].toUpperCase();
      const avatarHTML  = u?.pfp ? `<img src="${u.pfp}" alt="${init}">` : init;
      const profileLink = u?.username ? `profile.html?username=${window.escHtml(u.username)}` : '#';
      return `<div class="creator-row" onclick="window.location.href='${profileLink}'">
        <div class="creator-rank ${rc[i]}">${rl[i]}</div>
        <div class="creator-avatar">${avatarHTML}</div>
        <div class="creator-info">
          <div class="creator-name">${window.escHtml(name)}</div>
          <div class="creator-count">${count} article${count!==1?'s':''}</div>
        </div>
        <div class="creator-badge">${count}</div>
      </div>`;
    }).join('');
  } catch(e) { el.innerHTML = ''; }
}

/* ════════════════════════════════════════
   LIBRARIES — load + card builder
════════════════════════════════════════ */
const PAGE_SIZE = 10;
let currentOffset  = 0;
let totalLibraries = 0;

function buildLibraryCard(lib, articleCount, creator, isFaved) {
  const wrapper = document.createElement('div');
  wrapper.className = 'deck-wrapper' + (isFaved ? ' is-faved' : '');

  const b2 = document.createElement('div'); b2.className = 'deck-card-behind b2';
  const b1 = document.createElement('div'); b1.className = 'deck-card-behind b1';
  wrapper.appendChild(b2); wrapper.appendChild(b1);

  const card = document.createElement('div');
  card.className = 'library-card';

  const thumbHTML = lib.thumbnail_url
    ? `<img src="${window.escHtml(lib.thumbnail_url)}" alt="${window.escHtml(lib.name||'')}" loading="lazy">
       <div class="library-card-thumb-overlay"></div>`
    : `<div class="library-card-thumb-placeholder"><i class="fas fa-book-open"></i><span>No cover</span></div>`;

  const creatorInit   = (creator?.username||'?').replace(/^@/,'')[0].toUpperCase();
  const creatorAvatar = creator?.pfp
    ? `<img src="${window.escHtml(creator.pfp)}" alt="${creatorInit}">`
    : creatorInit;
  const creatorName = creator?.username ? `@${creator.username}` : 'Unknown';
  const date = new Date(lib.created_at).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});

  // Saved ribbon shown only when faved
  const ribbonDisplay = isFaved ? 'flex' : 'none';

  card.innerHTML = `
    <div class="library-card-thumb">
      ${thumbHTML}
      <div class="faved-ribbon" style="display:${ribbonDisplay};">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
        Saved
      </div>
    </div>
    <div class="library-card-body">
      <div class="library-card-name">${window.escHtml(lib.name||'Untitled Library')}</div>
      ${lib.description ? `<div class="library-card-desc">${window.escHtml(lib.description)}</div>` : ''}
      <div class="library-card-footer">
        <div class="library-card-meta">
          <div class="library-card-meta-item"><i class="fas fa-layer-group"></i><span>${articleCount} article${articleCount!==1?'s':''}</span></div>
          <div class="library-card-meta-item"><i class="fas fa-calendar-alt"></i><span>${date}</span></div>
        </div>
        <div class="library-card-creator">
          <div class="creator-mini-avatar">${creatorAvatar}</div>
          <span class="creator-mini-name">${window.escHtml(creatorName)}</span>
        </div>
      </div>
    </div>
    <div class="library-card-actions">
      <button class="lib-action-btn fav-btn ${isFaved ? 'faved' : ''}" data-pid="${lib.id}" onclick="toggleFavourite(event,${lib.id})">
        <span class="btn-icon">${isFaved ? BELL_SVG : HEART_SVG}</span>
        <span class="fav-label">${isFaved ? 'Saved' : 'Save'}</span>
      </button>
      <button class="lib-action-btn" onclick="event.stopPropagation(); openDeckModal(${lib.id}, ${JSON.stringify(lib.name||'Library')})">
        <i class="fas fa-layer-group"></i> Preview
      </button>
      <button class="lib-action-btn open-feed-btn" onclick="event.stopPropagation(); window.location.href='dailyfeed.html?playlist=${lib.id}'">
        <i class="fas fa-play"></i> Study
      </button>
    </div>`;

  card.querySelector('.library-card-thumb').addEventListener('click', () => openDeckModal(lib.id, lib.name||'Library'));
  card.querySelector('.library-card-body').addEventListener('click',  () => openDeckModal(lib.id, lib.name||'Library'));

  wrapper.appendChild(card);
  return wrapper;
}

async function loadLibraries(append = false) {
  const grid         = document.getElementById('librariesGrid');
  const loadMoreWrap = document.getElementById('loadMoreWrap');
  const loadMoreBtn  = document.getElementById('loadMoreBtn');

  if (!append) {
    grid.innerHTML = `
      <div class="library-card-skeleton"><div class="skel-thumb"></div><div class="skel-body"><div class="skel-title"></div><div class="skel-subtitle"></div><div class="skel-meta-row"></div></div></div>
      <div class="library-card-skeleton"><div class="skel-thumb"></div><div class="skel-body"><div class="skel-title" style="width:55%"></div><div class="skel-subtitle" style="width:80%"></div><div class="skel-meta-row" style="width:35%"></div></div></div>
      <div class="library-card-skeleton"><div class="skel-thumb"></div><div class="skel-body"><div class="skel-title" style="width:65%"></div><div class="skel-subtitle"></div><div class="skel-meta-row" style="width:40%"></div></div></div>`;
    currentOffset = 0; loadMoreWrap.style.display = 'none';
  }

  try {
    if (!append) {
      const { count } = await supabase.from('playlists').select('*',{count:'exact',head:true});
      totalLibraries = count || 0;
      document.getElementById('libCountBadge').textContent  = totalLibraries;
      document.getElementById('footerLibCount').textContent = totalLibraries;
    }

    const { data: libs, error } = await supabase
      .from('playlists').select('*')
      .order('created_at',{ascending:false})
      .range(currentOffset, currentOffset + PAGE_SIZE - 1);

    if (error) throw error;
    if (!append) grid.innerHTML = '';

    if (!libs || libs.length === 0) {
      if (!append) grid.innerHTML = `<div class="empty-state"><i class="fas fa-book-open"></i><p>No libraries yet</p></div>`;
      loadMoreWrap.style.display = 'none'; return;
    }

    // Article counts
    const libIds = libs.map(l => l.id);
    const { data: itemRows } = await supabase.from('playlist_items').select('playlist_id').in('playlist_id', libIds);
    const countMap = {};
    (itemRows||[]).forEach(r => { countMap[r.playlist_id] = (countMap[r.playlist_id]||0)+1; });

    // Creator lookup
    const userIds = [...new Set(libs.map(l=>l.user_id).filter(Boolean))];
    const creatorMap = {};
    if (userIds.length) {
      const { data: creators } = await supabase.from('users').select('user_id, username, pfp').in('user_id', userIds);
      (creators||[]).forEach(c => { creatorMap[c.user_id] = c; });
    }

    // Split into faved vs non-faved
    const favedLibs = libs.filter(l => userFavourites.has(String(l.id)));
    const otherLibs = libs.filter(l => !userFavourites.has(String(l.id)));

    // Only insert section headers on first load and if there are faved libs in this batch
    if (!append && favedLibs.length > 0) {
      // Saved section header
      const favHeader = document.createElement('div');
      favHeader.className = 'fav-section-header';
      favHeader.innerHTML = `
        <span class="fav-section-label">Saved</span>
        <div class="fav-section-line"></div>`;
      grid.appendChild(favHeader);

      favedLibs.forEach(lib => {
        grid.appendChild(buildLibraryCard(lib, countMap[lib.id]||0, creatorMap[lib.user_id]||null, true));
      });

      if (otherLibs.length > 0) {
        // All libraries section header
        const allHeader = document.createElement('div');
        allHeader.className = 'all-section-header';
        allHeader.innerHTML = `
          <div class="all-section-line"></div>
          <span class="all-section-label">All Libraries</span>
          <div class="all-section-line"></div>`;
        grid.appendChild(allHeader);
      }

      otherLibs.forEach(lib => {
        grid.appendChild(buildLibraryCard(lib, countMap[lib.id]||0, creatorMap[lib.user_id]||null, false));
      });
    } else {
      // No faved in this batch or subsequent pages — render normally
      libs.forEach(lib => {
        grid.appendChild(buildLibraryCard(lib, countMap[lib.id]||0, creatorMap[lib.user_id]||null, userFavourites.has(String(lib.id))));
      });
    }

    currentOffset += libs.length;
    if (currentOffset < totalLibraries) {
      loadMoreWrap.style.display = 'block';
      loadMoreBtn.disabled = false;
      loadMoreBtn.innerHTML = '<i class="fas fa-chevron-down"></i> Load more';
    } else {
      loadMoreWrap.style.display = 'none';
    }
  } catch(err) {
    grid.innerHTML = `<div class="error-state">Error loading libraries: ${err.message}</div>`;
  }
}

window.loadMoreLibraries = async function() {
  const btn = document.getElementById('loadMoreBtn');
  btn.disabled = true; btn.innerHTML = '<i class="fas fa-circle-notch fa-spin"></i> Loading…';
  await loadLibraries(true);
};

/* ════════════════════════════════════════
   JUMP TO LIBRARY
════════════════════════════════════════ */
window.jumpToLibrary = async function() {
  const input    = document.getElementById('libraryIdInput');
  const btn      = document.getElementById('startBtn');
  const banner   = document.getElementById('libraryBanner');
  const bName    = document.getElementById('libraryBannerName');
  const bMeta    = document.getElementById('libraryBannerMeta');
  const bThumb   = document.getElementById('libraryBannerThumb');
  const bOpenBtn = document.getElementById('bannerOpenBtn');
  const val = input.value.trim();

  if (!val || isNaN(val) || parseInt(val) <= 0) {
    input.classList.add('error'); setTimeout(() => input.classList.remove('error'), 1200); input.focus(); return;
  }
  const libraryId = parseInt(val);
  btn.disabled = true; btn.textContent = '…';
  bName.textContent = 'Loading…'; bMeta.innerHTML = '';
  bThumb.innerHTML = '<i class="fas fa-book-open"></i>';
  banner.classList.add('show');

  try {
    const { data: lib, error } = await supabase.from('playlists').select('*').eq('id', libraryId).single();
    if (error || !lib) {
      bName.textContent = `Library #${libraryId}`;
      bMeta.innerHTML = `<span><i class="fas fa-exclamation-circle"></i> Library not found</span>`;
      bOpenBtn.style.display = 'none';
    } else {
      if (lib.thumbnail_url) bThumb.innerHTML = `<img src="${window.escHtml(lib.thumbnail_url)}" style="width:100%;height:100%;object-fit:cover;border-radius:9px;">`;
      bName.textContent = lib.name || `Library #${libraryId}`;
      const { count: artCount } = await supabase.from('playlist_items').select('*',{count:'exact',head:true}).eq('playlist_id', libraryId);
      const parts = [`<span><i class="fas fa-layer-group"></i> ${artCount||0} articles</span>`];
      if (lib.description) parts.push(`<span><i class="fas fa-align-left"></i> ${window.escHtml(lib.description)}</span>`);
      if (lib.created_at) {
        const d = new Date(lib.created_at).toLocaleDateString('en-US',{year:'numeric',month:'short',day:'numeric'});
        parts.push(`<span><i class="fas fa-calendar-alt"></i> ${d}</span>`);
      }
      bMeta.innerHTML = parts.join('');
      bOpenBtn.style.display = 'inline-flex';
      bOpenBtn.onclick = () => { window.location.href = `dailyfeed.html?playlist=${libraryId}`; };
    }
  } catch(e) {
    bName.textContent = `Library #${libraryId}`;
    bMeta.innerHTML = `<span><i class="fas fa-hashtag"></i> ID ${libraryId}</span>`;
    bOpenBtn.style.display = 'none';
  } finally {
    btn.disabled = false; btn.textContent = 'Go';
  }
};

window.clearJump = function() {
  document.getElementById('libraryIdInput').value = '';
  document.getElementById('libraryBanner').classList.remove('show');
};

/* ════════════════════════════════════════
   DECK MODAL
════════════════════════════════════════ */
let deckArticles = [];
let deckCurrent  = 0;
let deckLibId    = null;

window.openDeckModal = async function(libId, libName) {
  deckLibId = libId;
  document.getElementById('deckModalTitle').textContent = libName;
  document.getElementById('deckModalMeta').textContent  = 'Loading articles…';
  document.getElementById('deckModalOverlay').classList.add('show');
  document.body.style.overflow = 'hidden';
  switchDeckTab('deck');

  const stack = document.getElementById('deckCardStack');
  stack.innerHTML = `<div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;">
    <div style="width:28px;height:28px;border:2.5px solid #303030;border-top-color:#f1d19e;border-radius:50%;animation:spin 0.9s linear infinite;"></div>
  </div>`;

  try {
    const { data: items, error: itemsErr } = await supabase
      .from('playlist_items').select('article_id').eq('playlist_id', libId);
    if (itemsErr) throw itemsErr;

    if (!items || items.length === 0) {
      document.getElementById('deckModalMeta').textContent = 'No articles in this library';
      stack.innerHTML = `<div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:var(--text-secondary);font-size:14px;">No articles yet</div>`;
      document.getElementById('deckArticleList').innerHTML = `<div style="padding:24px;text-align:center;color:var(--text-secondary);font-size:14px;">No articles yet</div>`;
      return;
    }

    const articleIds = items.map(i => i.article_id);

    const { data: arts, error: artsErr } = await supabase
      .from('articles').select('id, title, content, firebase_user_id, created_at, views, likes')
      .in('id', articleIds);
    if (artsErr) throw artsErr;

    const fbUids = [...new Set((arts||[]).map(a => a.firebase_user_id).filter(Boolean))];
    const authorMap = {};
    if (fbUids.length) {
      const { data: users } = await supabase
        .from('users').select('firebase_uid, username, full_name, pfp').in('firebase_uid', fbUids);
      (users||[]).forEach(u => {
        authorMap[u.firebase_uid] = {
          name: u.username ? `@${u.username}` : (u.full_name || 'Anonymous'),
          pfp:  u.pfp || null
        };
      });
    }

    const artMap = {};
    (arts||[]).forEach(a => { artMap[a.id] = a; });
    deckArticles = articleIds.map(id => artMap[id]).filter(Boolean).map(a => ({
      ...a,
      authorName: authorMap[a.firebase_user_id]?.name || 'Unknown',
      authorPfp:  authorMap[a.firebase_user_id]?.pfp  || null
    }));

    document.getElementById('deckModalMeta').textContent =
      `${deckArticles.length} article${deckArticles.length !== 1 ? 's' : ''}`;

    document.getElementById('deckOpenFeedBtn').onclick = () => {
      closeDeckModal(); window.location.href = `dailyfeed.html?playlist=${libId}`;
    };

    deckCurrent = 0;
    renderDeckCards();
    renderDeckList();

  } catch(err) {
    console.error('Deck modal error:', err);
    document.getElementById('deckModalMeta').textContent = 'Failed to load';
    stack.innerHTML = `<div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:#ef4444;font-size:13px;">Error: ${window.escHtml(err.message)}</div>`;
  }
};

function renderDeckCards() {
  const stack = document.getElementById('deckCardStack');
  stack.innerHTML = '';
  if (!deckArticles.length) return;

  const visibleCount = Math.min(4, deckArticles.length - deckCurrent);

  for (let i = visibleCount - 1; i >= 0; i--) {
    const art  = deckArticles[deckCurrent + i];
    const card = document.createElement('div');
    card.className = `deck-article-card pos-${i}`;

    const isMCQ = typeof art.content === 'string' && art.content.trimStart().startsWith('❔');
    const raw = isMCQ
      ? art.content.replace(/^❔/,'').split('\n')[0].trim()
      : (art.content||'').replace(/\n+/g,' ').trim();
    const snippet = raw.slice(0, 130);

    const avatarHTML = art.authorPfp
      ? `<img src="${window.escHtml(art.authorPfp)}" alt="">`
      : `<span class="deck-art-author-init">${(art.authorName||'?').replace(/^@/,'')[0].toUpperCase()}</span>`;

    card.innerHTML = `
      <div class="deck-art-tag"><i class="fas fa-${isMCQ?'question-circle':'file-alt'}"></i> &nbsp;${isMCQ?'MCQ':'Article'}</div>
      <div class="deck-art-title">${window.escHtml(art.title||'Untitled')}</div>
      <div class="deck-art-snippet">${window.escHtml(snippet)}${raw.length>130?'…':''}</div>
      <div class="deck-art-footer">
        <div class="deck-art-author">${avatarHTML}<span>${window.escHtml(art.authorName)}</span></div>
        <div class="deck-art-read">Read <i class="fas fa-arrow-right" style="font-size:9px;"></i></div>
      </div>`;

    if (i === 0) {
      card.addEventListener('click', () => { window.location.href = `article.html?id=${art.id}`; });
    }
    stack.appendChild(card);
  }

  document.getElementById('deckProgress').textContent = `${deckCurrent+1} / ${deckArticles.length}`;
  document.getElementById('deckNextBtn').disabled = deckCurrent >= deckArticles.length - 1;
}

function renderDeckList() {
  const list = document.getElementById('deckArticleList');
  if (!deckArticles.length) {
    list.innerHTML = `<div style="padding:24px;text-align:center;color:var(--text-secondary);font-size:14px;">No articles</div>`;
    return;
  }
  list.innerHTML = deckArticles.map((art, i) => {
    const isMCQ = typeof art.content === 'string' && art.content.trimStart().startsWith('❔');
    const date  = new Date(art.created_at).toLocaleDateString('en-US',{month:'short',day:'numeric'});
    return `<div class="deck-list-item" onclick="window.location.href='article.html?id=${art.id}'">
      <div class="deck-list-num">${i+1}</div>
      <div class="deck-list-info">
        <div class="deck-list-title">${window.escHtml(art.title||'Untitled')}</div>
        <div class="deck-list-meta">${isMCQ?'❔ MCQ':'📄 Article'} &nbsp;·&nbsp; ${window.escHtml(art.authorName)} &nbsp;·&nbsp; ${date}</div>
      </div>
      <i class="fas fa-chevron-right deck-list-arrow"></i>
    </div>`;
  }).join('');
}

document.getElementById('deckNextBtn').addEventListener('click', function() {
  if (deckCurrent >= deckArticles.length - 1) return;
  const top = document.querySelector('.deck-article-card.pos-0');
  if (top) {
    top.classList.add('swipe-left');
    setTimeout(() => { deckCurrent++; renderDeckCards(); }, 270);
  } else { deckCurrent++; renderDeckCards(); }
});

document.getElementById('deckShuffleBtn').addEventListener('click', function() {
  for (let i = deckArticles.length-1; i > 0; i--) {
    const j = Math.floor(Math.random()*(i+1));
    [deckArticles[i], deckArticles[j]] = [deckArticles[j], deckArticles[i]];
  }
  deckCurrent = 0; renderDeckCards(); renderDeckList();
});

(function() {
  let startX = 0, dragging = false;
  const getStack = () => document.getElementById('deckCardStack');
  getStack().addEventListener('touchstart', e => { startX = e.touches[0].clientX; dragging = true; }, {passive:true});
  getStack().addEventListener('touchend',   e => {
    if (!dragging) return; dragging = false;
    if (e.changedTouches[0].clientX - startX < -60 && deckCurrent < deckArticles.length-1) {
      const top = getStack().querySelector('.deck-article-card.pos-0');
      if (top) { top.classList.add('swipe-left'); setTimeout(()=>{ deckCurrent++; renderDeckCards(); },270); }
    }
  });
  getStack().addEventListener('mousedown', e => { startX = e.clientX; dragging = true; });
  document.addEventListener('mouseup', e => {
    if (!dragging) return; dragging = false;
    if (e.clientX - startX < -60 && deckCurrent < deckArticles.length-1) {
      const top = document.querySelector('.deck-article-card.pos-0');
      if (top) { top.classList.add('swipe-left'); setTimeout(()=>{ deckCurrent++; renderDeckCards(); },270); }
    }
  });
})();

window.closeDeckModal = function() {
  document.getElementById('deckModalOverlay').classList.remove('show');
  document.body.style.overflow = '';
};
document.getElementById('deckModalOverlay').addEventListener('click', e => { if (e.target === document.getElementById('deckModalOverlay')) closeDeckModal(); });
document.getElementById('deckModalClose').addEventListener('click', closeDeckModal);

window.switchDeckTab = function(tab) {
  document.getElementById('tabDeck').classList.toggle('active', tab==='deck');
  document.getElementById('tabList').classList.toggle('active', tab==='list');
  document.getElementById('deckView').style.display = tab==='deck' ? 'flex' : 'none';
  document.getElementById('listView').style.display = tab==='list' ? 'flex' : 'none';
};

/* ── Init ── */
loadCreators();
loadLibraries(false);
</script>
