<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Patholytica — Library</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@400;700;900&family=DM+Sans:wght@400;500;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root {
  --bg-color: #0a0a0a;
  --text-primary: #ffffff;
  --text-secondary: #888888;
  --card-bg: rgba(30, 30, 30, 0.6);
  --hover-bg: rgba(241, 209, 158, 0.08);
  --border-color: rgba(255, 255, 255, 0.1);
  --accent: #f1d19e;
  --accent-glow: rgba(241, 209, 158, 0.3);
  --glass: blur(12px);
}

* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

/* Custom Scrollbar */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: var(--bg-color); }
::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
::-webkit-scrollbar-thumb:hover { background: var(--accent); }

html, body {
  margin: 0; padding: 0;
  min-height: 100%;
  font-family: "DM Sans", sans-serif;
  background: var(--bg-color);
  color: var(--text-primary);
  overflow-x: hidden;
}

/* Background Ambient Glow */
body::before {
  content: ''; position: fixed; top: -10%; left: -10%; width: 40%; height: 40%;
  background: radial-gradient(circle, var(--accent-glow) 0%, transparent 70%);
  z-index: -1; pointer-events: none; opacity: 0.4;
}

.header-wrapper {
  position: fixed; top: 0; left: 0; right: 0;
  background: rgba(10, 10, 10, 0.8);
  backdrop-filter: var(--glass);
  -webkit-backdrop-filter: var(--glass);
  padding-top: env(safe-area-inset-top);
  border-bottom: 1px solid var(--border-color);
  z-index: 100;
}

.header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 24px; max-width: 1200px; margin: 0 auto;
}

.logo-img { height: 26px; width: auto; filter: brightness(1.2); }

.list-container {
  max-width: 800px; width: 100%; margin: 0 auto;
  padding: 16px 24px 120px;
  padding-top: calc(80px + env(safe-area-inset-top));
}

/* ── Library Entry (Cyber Input) ── */
.library-entry {
  display: flex; align-items: center; gap: 12px;
  margin-bottom: 32px;
  background: var(--card-bg);
  padding: 8px; border-radius: 16px;
  border: 1px solid var(--border-color);
  backdrop-filter: var(--glass);
}

.library-id-input {
  flex: 1; background: transparent; border: none;
  color: var(--accent); font-family: 'JetBrains Mono', monospace;
  font-size: 18px; padding: 12px; outline: none;
  letter-spacing: 2px;
}

.btn-start {
  padding: 12px 28px; border-radius: 12px;
  background: var(--accent); color: #000;
  border: none; font-size: 14px; font-weight: 700;
  cursor: pointer; text-transform: uppercase; letter-spacing: 1px;
  transition: all 0.3s ease;
}
.btn-start:hover { box-shadow: 0 0 20px var(--accent-glow); transform: translateY(-2px); }

/* ── Article Cards (The Core Change) ── */
.article-item {
  position: relative;
  padding: 24px; margin-bottom: 16px;
  background: var(--card-bg);
  border: 1px solid var(--border-color);
  border-radius: 20px;
  cursor: pointer;
  transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
  backdrop-filter: var(--glass);
  overflow: hidden;
}

.article-item::after {
  content: ''; position: absolute; top: 0; left: 0; width: 2px; height: 0;
  background: var(--accent); transition: height 0.3s ease;
}

.article-item:hover {
  border-color: var(--accent-glow);
  transform: translateX(8px);
  background: rgba(40, 40, 40, 0.8);
}

.article-item:hover::after { height: 100%; }

.article-title {
  font-family: 'Merriweather', serif;
  font-size: 24px; font-weight: 700; margin: 0 0 10px 0;
  line-height: 1.4; color: var(--text-primary);
}

.article-meta {
  font-size: 12px; color: var(--text-secondary);
  display: flex; align-items: center; gap: 12px;
  font-weight: 500; letter-spacing: 0.5px;
}

.creator-avatar {
  width: 36px; height: 36px; border-radius: 50%;
  border: 1px solid var(--accent-glow);
  background: #1a1a1a; transition: transform 0.3s ease;
}

.creator-row:hover .creator-avatar {
  transform: scale(1.1) rotate(5deg);
  border-color: var(--accent);
}

/* ── Date Group Header ── */
.date-group-header {
  font-size: 10px; text-transform: uppercase; letter-spacing: 3px;
  color: var(--accent); opacity: 0.8;
  padding: 24px 0 12px; font-weight: 700;
}

/* ── Pong Easter Egg Custom Styles ── */
#pongCanvas { border: 1px solid var(--accent-glow); box-shadow: 0 0 30px rgba(0,0,0,0.5); }
.pong-modal { border: 1px solid var(--accent); }

/* ── Footer ── */
.footer-bar {
  position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
  width: 90%; max-width: 400px;
  background: rgba(20, 20, 20, 0.8);
  backdrop-filter: var(--glass);
  border: 1px solid var(--border-color);
  border-radius: 24px; padding: 10px;
  display: flex; justify-content: space-around; z-index: 1000;
}

.footer-btn {
  background: none; border: none; color: var(--text-secondary);
  display: flex; flex-direction: column; align-items: center; gap: 4px;
  transition: 0.3s; cursor: pointer;
}

.footer-btn.active, .footer-btn:hover { color: var(--accent); }
.footer-btn i { font-size: 18px; }
.footer-btn span { font-size: 9px; font-weight: 700; text-transform: uppercase; }

@media (max-width: 600px) {
  .article-title { font-size: 20px; }
  .list-container { padding: 16px 16px 120px; }
}
</style>
</head>
<body>

<div class="header-wrapper">
  <div class="header">
    <img src="IMG_3220.png" class="logo-img" alt="Patholytica">
    <div class="header-actions">
        <div id="userWelcome" class="user-welcome">
            <span id="welcomeText" class="welcome-text" style="font-size:12px; color:var(--accent); font-weight:700; cursor:pointer;"></span>
        </div>
    </div>
  </div>
</div>

<div class="list-container">
  <div class="library-entry">
    <input type="number" id="libraryIdInput" class="library-id-input" placeholder="ACCESS_ID" min="1" inputmode="numeric">
    <button class="btn-start" id="startBtn" onclick="startLibrary()">Sync</button>
  </div>

  <div class="library-banner" id="libraryBanner" style="display:none; margin-bottom:20px; padding:20px; background:rgba(241,209,158,0.05); border-radius:16px; border:1px dashed var(--accent-glow);">
    <div id="libraryBannerName" style="font-weight:700; color:var(--accent); margin-bottom:5px;"></div>
    <div id="libraryBannerMeta" style="font-size:11px; color:var(--text-secondary);"></div>
  </div>

  <div class="creators-section">
    <div class="date-group-header">Top Contributors</div>
    <div class="creators-list" id="creatorsList" style="display:flex; gap:10px; overflow-x:auto; padding-bottom:10px; margin-bottom:20px;">
        </div>
  </div>

  <div class="date-group-header">Recent Archival</div>
  <ul class="article-list" id="articleList">
    </ul>
</div>

<div class="pong-overlay" id="pongOverlay">
    <div class="pong-modal">
      <button class="pong-modal-close" onclick="closePong()"><i class="fas fa-times"></i></button>
      <div class="pong-modal-title">System.Breakout</div>
      <div class="pong-score">USR <span id="playerScore">0</span> — <span id="aiScore">0</span> SYS</div>
      <canvas id="pongCanvas" width="480" height="200"></canvas>
      <div class="pong-hint" id="pongHint">Tap to initialize paddle</div>
    </div>
</div>

<div class="footer-bar">
  <button class="footer-btn active" onclick="location.href='index.html'"><i class="fas fa-home"></i><span>Home</span></button>
  <button class="footer-btn" onclick="location.href='#'"><i class="fas fa-scroll"></i><span>Feed</span></button>
  <button class="footer-btn" onclick="location.href='explore.html'"><i class="fas fa-search"></i><span>Explore</span></button>
  <button class="footer-btn" onclick="openPong()"><i class="fas fa-gamepad"></i><span>Break</span></button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

// ... (Your existing Firebase / Supabase Init) ...
const supabase = window.supabase.createClient("https://vduqewqyvszfquntmark.supabase.co", "sb_publishable_YseP73aoHam8YT6B0b9EQQ_iAUEWARI");
window._supabase = supabase;

// Updated Article Rendering for Cyber-Noir UI
function renderArticleItem(article, userMap) {
  const li = document.createElement('li');
  li.className = 'article-item';
  li.onclick = () => { window.location.href = `article.html?id=${article.id}`; };
  const author = userMap[article.firebase_user_id];
  const name = author?.username ? `@${author.username}` : 'unknown_entity';
  const date = new Date(article.created_at).toLocaleDateString('en-US', { month: '2-digit', day: '2-digit', year: '2-digit' });
  
  li.innerHTML = `
    <h2 class="article-title">${article.title || 'NULL_TITLE'}</h2>
    <div class="article-meta">
      <span style="color:var(--accent)">${name}</span>
      <span style="opacity:0.3">|</span>
      <span>${date}</span>
    </div>`;
  return li;
}

// Global Load Articles
window._loadArticles = async function(libraryId = null) {
    const list = document.getElementById('articleList');
    list.innerHTML = '<div style="padding:20px; opacity:0.5; font-family:monospace;">INITIALIZING_STREAM...</div>';
    
    let query = supabase.from('articles').select('*').order('created_at', { ascending: false });
    if (libraryId) {
        const { data: items } = await supabase.from('playlist_items').select('article_id').eq('playlist_id', libraryId);
        if (items) query = query.in('id', items.map(i => i.article_id));
    }

    const { data: articles } = await query;
    const { data: users } = await supabase.from('users').select('firebase_uid, username');
    const userMap = {}; users?.forEach(u => userMap[u.firebase_uid] = u);

    list.innerHTML = '';
    articles?.forEach(a => list.appendChild(renderArticleItem(a, userMap)));
};

_loadArticles();
</script>

<script>
// Pong Visual Polish
function initPong() {
  const canvas = document.getElementById('pongCanvas');
  const ctx = canvas.getContext('2d');
  const ACCENT = '#f1d19e';
  
  // Custom Draw with Glow
  function drawBall(x, y) {
    ctx.shadowBlur = 15;
    ctx.shadowColor = ACCENT;
    ctx.fillStyle = ACCENT;
    ctx.beginPath();
    ctx.arc(x, y, 5, 0, Math.PI * 2);
    ctx.fill();
    ctx.shadowBlur = 0;
  }
  // ... (Rest of your robust Pong logic)
}
// Existing startLibrary / clear functions remain same logic
</script>

</body>
</html>
