<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Patholytica — Library</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root {
  --bg: #0a0a0a;
  --bg2: #111;
  --bg3: #181818;
  --border: #1e1e1e;
  --border2: #2a2a2a;
  --text: #e8e6e1;
  --text2: #6e6c68;
  --text3: #3a3835;
  --accent: #f1d19e;
  --green: #3dba72;
  --red: #ef4444;
  --glass: rgba(10,10,10,0.82);
  --glass2: rgba(14,14,14,0.92);
  --gb: rgba(255,255,255,0.055);
  --sh: 0 8px 32px rgba(0,0,0,0.72);
  --sh2: 0 24px 64px rgba(0,0,0,0.88);
  --r: 14px;
  --st: env(safe-area-inset-top, 0px);
  --sb: env(safe-area-inset-bottom, 0px);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100%;
  overflow-x: hidden;
}

/* ── Background ── */
#bg-layer {
  position: fixed; inset: 0; z-index: 0;
  background: radial-gradient(ellipse at 20% 20%, rgba(241,209,158,0.04) 0%, transparent 60%),
              radial-gradient(ellipse at 80% 80%, rgba(61,186,114,0.03) 0%, transparent 60%),
              var(--bg);
  pointer-events: none;
}

/* ── Header ── */
.header-wrapper {
  position: fixed; top: 0; left: 0; right: 0;
  padding-top: var(--st);
  z-index: 40;
  background: var(--glass2);
  border-bottom: 1px solid var(--gb);
  backdrop-filter: blur(24px) saturate(1.6);
  -webkit-backdrop-filter: blur(24px) saturate(1.6);
  box-shadow: 0 1px 0 rgba(255,255,255,0.04), var(--sh);
}
.header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px 20px;
  max-width: 900px; margin: 0 auto;
}
.logo-img { height: 26px; width: auto; cursor: pointer; opacity: 0.92; transition: opacity 0.2s; }
.logo-img:hover { opacity: 1; }
.header-actions { display: flex; align-items: center; gap: 12px; }

.auth-buttons { display: none; gap: 10px; }
.auth-buttons.show { display: flex; }
.btn-login {
  padding: 7px 18px; border-radius: 20px; font-size: 13px; font-weight: 500;
  cursor: pointer; text-decoration: none;
  border: 1px solid var(--border2);
  background: var(--glass); color: var(--text);
  backdrop-filter: blur(8px);
  transition: background 0.2s, border-color 0.2s;
  font-family: 'DM Sans', sans-serif;
}
.btn-login:hover { background: var(--bg3); border-color: var(--border2); }

.user-welcome { display: none; align-items: center; gap: 10px; font-size: 13px; }
.user-welcome.show { display: flex; }
.welcome-text {
  font-weight: 500; cursor: pointer; color: var(--text2);
  transition: color 0.2s; letter-spacing: 0.02em;
}
.welcome-text:hover { color: var(--accent); }

.header-create-btn {
  display: none;
  align-items: center; justify-content: center;
  width: 30px; height: 30px; border-radius: 50%;
  background: rgba(241,209,158,0.08);
  border: 1px solid rgba(241,209,158,0.2);
  color: var(--accent); font-size: 13px;
  cursor: pointer; transition: all 0.2s; flex-shrink: 0;
}
.header-create-btn.show { display: flex; }
.header-create-btn:hover { background: rgba(241,209,158,0.16); border-color: var(--accent); }

/* ── Main container ── */
.page {
  position: relative; z-index: 1;
  max-width: 900px; margin: 0 auto;
  padding: 16px 20px 120px;
  padding-top: calc(58px + var(--st) + 16px);
}

/* ── Library entry ── */
.search-block {
  margin-bottom: 20px;
}
.search-row {
  display: flex; gap: 8px; align-items: center;
}
.library-id-input {
  flex: 1;
  background: var(--glass);
  border: 1px solid var(--border2);
  border-radius: 12px;
  color: var(--text);
  font-size: 14px; font-family: 'DM Mono', monospace;
  padding: 11px 16px; outline: none;
  backdrop-filter: blur(12px);
  transition: border-color 0.2s, box-shadow 0.2s;
  -moz-appearance: textfield;
}
.library-id-input::-webkit-outer-spin-button,
.library-id-input::-webkit-inner-spin-button { -webkit-appearance: none; }
.library-id-input::placeholder { color: var(--text3); font-family: 'DM Sans', sans-serif; }
.library-id-input:focus {
  border-color: rgba(241,209,158,0.4);
  box-shadow: 0 0 0 3px rgba(241,209,158,0.06);
}
.library-id-input.error { border-color: var(--red); box-shadow: 0 0 0 3px rgba(239,68,68,0.08); }

.btn-start {
  padding: 11px 22px; border-radius: 12px;
  background: var(--accent); color: #0a0a0a;
  border: none; font-size: 13px; font-weight: 600;
  cursor: pointer; white-space: nowrap;
  font-family: 'DM Sans', sans-serif;
  transition: opacity 0.2s, transform 0.15s, box-shadow 0.2s;
  box-shadow: 0 4px 16px rgba(241,209,158,0.18);
}
.btn-start:hover { opacity: 0.88; transform: translateY(-1px); box-shadow: 0 6px 20px rgba(241,209,158,0.26); }
.btn-start:active { transform: scale(0.97); }
.btn-start:disabled { opacity: 0.4; cursor: not-allowed; transform: none; box-shadow: none; }

/* ── Library banner ── */
.library-banner {
  display: none;
  background: var(--glass);
  border: 1px solid var(--gb);
  border-radius: 12px;
  padding: 12px 16px;
  margin-top: 10px;
  gap: 12px; align-items: flex-start;
  backdrop-filter: blur(16px);
  box-shadow: var(--sh), inset 0 1px 0 rgba(255,255,255,0.04);
  animation: fadeIn 0.2s ease;
}
.library-banner.show { display: flex; }
.library-banner-icon {
  width: 34px; height: 34px; border-radius: 9px;
  background: rgba(241,209,158,0.08);
  border: 1px solid rgba(241,209,158,0.15);
  display: flex; align-items: center; justify-content: center;
  color: var(--accent); font-size: 14px; flex-shrink: 0;
}
.library-banner-info { flex: 1; min-width: 0; }
.library-banner-name {
  font-size: 14px; font-weight: 600; margin-bottom: 4px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  color: var(--text);
}
.library-banner-meta {
  font-size: 11px; color: var(--text2);
  display: flex; flex-wrap: wrap; gap: 5px 10px;
  font-family: 'DM Mono', monospace;
}
.library-banner-meta span { display: flex; align-items: center; gap: 4px; }
.library-banner-meta i { font-size: 10px; opacity: 0.6; }
.library-banner-clear {
  background: none; border: none; color: var(--text3);
  cursor: pointer; font-size: 13px; padding: 4px; border-radius: 6px;
  transition: color 0.2s, background 0.2s; flex-shrink: 0;
  width: 24px; height: 24px; display: flex; align-items: center; justify-content: center;
}
.library-banner-clear:hover { color: var(--text); background: var(--bg3); }

/* ── Section label ── */
.section-label {
  font-size: 10px; text-transform: uppercase; letter-spacing: 1.8px;
  color: var(--text3); margin-bottom: 10px;
  font-weight: 600; font-family: 'DM Mono', monospace;
}

/* ── Creators ── */
.creators-section { margin-bottom: 24px; }
.creators-list { display: flex; flex-direction: column; gap: 2px; }

.creator-row {
  display: flex; align-items: center; gap: 12px;
  padding: 9px 12px; border-radius: 10px;
  cursor: pointer;
  transition: background 0.15s, transform 0.15s;
  border: 1px solid transparent;
}
.creator-row:hover {
  background: var(--glass);
  border-color: var(--gb);
  transform: translateX(2px);
}
.creator-rank {
  font-size: 11px; width: 18px; text-align: center;
  flex-shrink: 0; font-weight: 700;
  color: var(--text3); font-family: 'DM Mono', monospace;
}
.creator-rank.gold   { color: var(--accent); }
.creator-rank.silver { color: #9e9e9e; }
.creator-rank.bronze { color: #a0765a; }

.creator-avatar {
  width: 32px; height: 32px; border-radius: 50%;
  background: rgba(241,209,158,0.08);
  border: 1px solid rgba(241,209,158,0.15);
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; font-weight: 700; color: var(--accent);
  flex-shrink: 0; text-transform: uppercase; overflow: hidden;
}
.creator-avatar img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }

.creator-info { flex: 1; min-width: 0; }
.creator-name { font-size: 13px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: var(--text); }
.creator-count { font-size: 10px; color: var(--text3); font-family: 'DM Mono', monospace; margin-top: 1px; }

.creator-badge {
  font-size: 10px; font-weight: 600; color: var(--accent);
  background: rgba(241,209,158,0.07);
  border: 1px solid rgba(241,209,158,0.15);
  border-radius: 20px; padding: 2px 9px;
  white-space: nowrap; flex-shrink: 0;
  font-family: 'DM Mono', monospace;
}

/* ── Skeleton ── */
.creator-skeleton { display: flex; align-items: center; gap: 12px; padding: 9px 12px; }
.skel-circle { width: 32px; height: 32px; border-radius: 50%; background: var(--bg3); flex-shrink: 0; animation: shimmer 1.6s infinite; }
.skel-line { height: 10px; border-radius: 5px; background: var(--bg3); animation: shimmer 1.6s infinite; }

/* ── Date group ── */
.date-group-header {
  font-size: 10px; text-transform: uppercase; letter-spacing: 1.8px;
  color: var(--text3);
  padding: 16px 0 8px;
  border-bottom: 1px solid var(--border);
  position: sticky; top: calc(58px + var(--st));
  background: var(--bg); z-index: 10;
  font-weight: 600; font-family: 'DM Mono', monospace;
}

/* ── Article list ── */
.article-list { list-style: none; margin: 0; padding: 0; }

.article-item {
  padding: 18px 0;
  border-bottom: 1px solid var(--border);
  cursor: pointer;
  transition: all 0.18s;
  border-radius: 0;
  position: relative;
}
.article-item::before {
  content: '';
  position: absolute; left: -12px; top: 0; bottom: 0; width: 2px;
  background: var(--accent);
  border-radius: 1px;
  opacity: 0;
  transition: opacity 0.18s;
}
.article-item:hover { padding-left: 12px; }
.article-item:hover::before { opacity: 1; }

.article-title {
  font-family: 'DM Serif Display', Georgia, serif;
  font-size: 24px; font-weight: 400; margin: 0 0 6px 0;
  line-height: 1.35; color: var(--text); word-wrap: break-word;
  transition: color 0.18s;
}
.article-item:hover .article-title { color: var(--accent); }

.article-meta {
  font-size: 11px; color: var(--text3);
  display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
  font-family: 'DM Mono', monospace; letter-spacing: 0.03em;
}
.meta-dot { width: 2px; height: 2px; background: var(--text3); border-radius: 50%; }

/* ── Load more ── */
.load-more-row { padding: 8px 0; border-bottom: 1px solid var(--border); }
.btn-load-more {
  background: none; border: none; color: var(--text2);
  font-size: 12px; font-weight: 500; cursor: pointer;
  padding: 4px 0; display: flex; align-items: center; gap: 6px;
  font-family: 'DM Mono', monospace; letter-spacing: 0.03em;
  transition: color 0.2s;
}
.btn-load-more:hover { color: var(--accent); }
.btn-load-more i { font-size: 10px; transition: transform 0.2s; }
.btn-load-more.open i { transform: rotate(180deg); }
.btn-load-more.loading { opacity: 0.4; pointer-events: none; }

/* ── Skeleton articles ── */
.skeleton-article { padding: 18px 0; border-bottom: 1px solid var(--border); }
.skel-title-lg { height: 26px; border-radius: 5px; background: var(--bg3); margin-bottom: 8px; width: 72%; animation: shimmer 1.6s infinite; }
.skel-title-sm { height: 18px; border-radius: 5px; background: var(--bg3); margin-bottom: 8px; width: 44%; animation: shimmer 1.6s infinite; }
.skel-meta     { height: 10px; border-radius: 5px; background: var(--bg3); width: 26%; animation: shimmer 1.6s infinite; }

@keyframes shimmer { 0%,100%{opacity:0.3} 50%{opacity:0.7} }
@keyframes fadeIn { from{opacity:0;transform:translateY(-4px)} to{opacity:1;transform:none} }

.loading-state { text-align: center; padding: 40px; color: var(--text3); font-size: 14px; font-family: 'DM Mono', monospace; }
.error-state   { text-align: center; padding: 40px; color: var(--red); font-size: 14px; font-family: 'DM Mono', monospace; }

/* ── Footer ── */
.footer-info {
  text-align: center;
  padding: 20px 20px 0;
  color: var(--text3); font-size: 13px;
  font-family: 'DM Mono', monospace;
}
.article-count {
  color: var(--accent); font-weight: 600;
  cursor: pointer;
  border-bottom: 1px dashed rgba(241,209,158,0.3);
  transition: border-color 0.2s;
}
.article-count:hover { border-color: var(--accent); }

.footer-credit {
  text-align: center;
  padding: 8px 0 calc(72px + var(--sb) + 8px);
  font-size: 11px; color: var(--text3);
  font-family: 'DM Mono', monospace; opacity: 0.4;
}
.footer-credit a { color: inherit; text-decoration: underline; text-underline-offset: 2px; }

/* ── Bottom nav ── */
.footer-bar {
  position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
  width: 100%; max-width: 450px;
  height: 52px;
  background: var(--glass2);
  border: 1px solid var(--gb);
  border-radius: 26px 26px 0 0;
  backdrop-filter: blur(24px) saturate(1.6);
  -webkit-backdrop-filter: blur(24px) saturate(1.6);
  box-shadow: 0 -1px 0 rgba(255,255,255,0.04), var(--sh2);
  padding: 0 8px; padding-bottom: var(--sb);
  display: flex; justify-content: space-around; align-items: center; z-index: 100;
}
.footer-btn {
  display: flex; flex-direction: column; align-items: center; gap: 3px;
  background: none; border: none; color: var(--text3);
  cursor: pointer; transition: color 0.2s; padding: 8px 14px;
  font-family: 'DM Sans', sans-serif; border-radius: 12px;
}
.footer-btn:hover { color: var(--text2); }
.footer-btn.active { color: var(--accent); }
.footer-btn i { font-size: 18px; }
.footer-btn span { font-size: 9px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; }

/* ── Pong Easter Egg ── */
.pong-overlay {
  display: none;
  position: fixed; inset: 0; z-index: 200;
  background: rgba(0,0,0,0.85);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  align-items: center; justify-content: center;
}
.pong-overlay.show { display: flex; }
.pong-modal {
  background: var(--bg2);
  border: 1px solid var(--border2);
  border-radius: 20px;
  padding: 20px;
  display: flex; flex-direction: column; align-items: center; gap: 10px;
  box-shadow: var(--sh2), inset 0 1px 0 rgba(255,255,255,0.04);
  position: relative;
  max-width: calc(100vw - 48px);
}
.pong-modal-close {
  position: absolute; top: 12px; right: 12px;
  width: 26px; height: 26px; border-radius: 50%;
  background: none; border: 1px solid var(--border2);
  color: var(--text2); font-size: 12px;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  transition: background 0.2s, color 0.2s;
}
.pong-modal-close:hover { background: var(--bg3); color: var(--text); }
.pong-modal-title {
  font-size: 10px; text-transform: uppercase; letter-spacing: 1.8px;
  color: var(--text3); font-weight: 600; font-family: 'DM Mono', monospace;
}
.pong-score {
  font-size: 12px; color: var(--text2); letter-spacing: 2px;
  font-family: 'DM Mono', monospace;
}
.pong-score span { color: var(--accent); font-weight: 600; }
#pongCanvas {
  border: 1px solid var(--border2); border-radius: 10px;
  display: block; background: #080808; max-width: 100%;
}
.pong-hint {
  font-size: 10px; color: var(--text3); text-align: center;
  font-family: 'DM Mono', monospace; opacity: 0.5;
}

@media (max-width: 600px) {
  .page { padding: 12px 16px 120px; padding-top: calc(58px + var(--st) + 12px); }
  .article-title { font-size: 20px; }
  .header { padding: 11px 16px; }
  .footer-bar { border-radius: 0; }
}
</style>
</head>
<body>

<div id="bg-layer"></div>

<div class="header-wrapper">
  <div class="header">
    <img src="IMG_3220.png" class="logo-img" alt="Patholytica Logo">
    <div class="header-actions">
      <div class="auth-buttons" id="authButtons">
        <a href="login.html" class="btn-login">Log In</a>
      </div>
      <div class="user-welcome" id="userWelcome">
        <span class="welcome-text" id="welcomeText">Welcome</span>
        <button class="header-create-btn" id="fabCreateBtn" onclick="window.location.href='https://patholytica.com/create'">
          <i class="fas fa-plus"></i>
        </button>
      </div>
    </div>
  </div>
</div>

<div class="page">

  <div class="search-block">
    <div class="search-row">
      <input type="number" id="libraryIdInput" class="library-id-input"
        placeholder="Enter Library ID…" min="1" inputmode="numeric" pattern="[0-9]*"
        onkeydown="if(event.key==='Enter') startLibrary()">
      <button class="btn-start" id="startBtn" onclick="startLibrary()">Start</button>
    </div>

    <div class="library-banner" id="libraryBanner">
      <div class="library-banner-icon"><i class="fas fa-book-open"></i></div>
      <div class="library-banner-info">
        <div class="library-banner-name" id="libraryBannerName">—</div>
        <div class="library-banner-meta" id="libraryBannerMeta"></div>
      </div>
      <button class="library-banner-clear" onclick="clearLibraryFilter()"><i class="fas fa-times"></i></button>
    </div>
  </div>

  <div class="creators-section">
    <div class="section-label">Active Creators</div>
    <div class="creators-list" id="creatorsList">
      <div class="creator-skeleton"><div class="skel-circle"></div><div style="flex:1"><div class="skel-line" style="width:42%;margin-bottom:6px"></div><div class="skel-line" style="width:24%"></div></div></div>
      <div class="creator-skeleton"><div class="skel-circle"></div><div style="flex:1"><div class="skel-line" style="width:56%;margin-bottom:6px"></div><div class="skel-line" style="width:20%"></div></div></div>
      <div class="creator-skeleton"><div class="skel-circle"></div><div style="flex:1"><div class="skel-line" style="width:34%;margin-bottom:6px"></div><div class="skel-line" style="width:28%"></div></div></div>
    </div>
  </div>

  <ul class="article-list" id="articleList">
    <li class="skeleton-article"><div class="skel-title-lg"></div><div class="skel-title-sm"></div><div class="skel-meta"></div></li>
    <li class="skeleton-article"><div class="skel-title-lg" style="width:60%"></div><div class="skel-title-sm" style="width:40%"></div><div class="skel-meta" style="width:20%"></div></li>
    <li class="skeleton-article"><div class="skel-title-lg" style="width:78%"></div><div class="skel-title-sm" style="width:50%"></div><div class="skel-meta" style="width:30%"></div></li>
  </ul>

</div>

<!-- Pong Easter Egg -->
<div class="pong-overlay" id="pongOverlay">
  <div class="pong-modal">
    <button class="pong-modal-close" onclick="closePong()"><i class="fas fa-times"></i></button>
    <div class="pong-modal-title">🦦 Easter Egg</div>
    <div class="pong-score">YOU <span id="playerScore">0</span> &nbsp;—&nbsp; <span id="aiScore">0</span> AI</div>
    <canvas id="pongCanvas" width="480" height="200"></canvas>
    <div class="pong-hint" id="pongHint">Click or tap to start · mouse / drag to move</div>
  </div>
</div>

<div class="footer-info">
  <span class="article-count" id="articleCount" onclick="openPong()" title="🏓">0</span> articles accessible
</div>
<div class="footer-credit">
  Prototype by <a href="https://www.instagram.com/eyadayms?" target="_blank">Eyad</a>
</div>

<div class="footer-bar">
  <button class="footer-btn active" onclick="window.location.href='index.html'"><i class="fas fa-home"></i><span>Home</span></button>
  <button class="footer-btn" onclick="window.location.href='https://patholytica.com/dailyfeed'"><i class="fas fa-scroll"></i><span>Feed</span></button>
  <button class="footer-btn" onclick="window.location.href='explore.html'"><i class="fas fa-search"></i><span>Explore</span></button>
  <button class="footer-btn" onclick="window.location.href='https://patholytica.com/space'"><i class="fas fa-meteor"></i><span>Space</span></button>
</div>

<script>
window.escHtml = function(t){ const d=document.createElement('div'); d.textContent=t; return d.innerHTML; };

/* ── Pong ── */
var pongRunning = false, pongInitialized = false;
function openPong() {
  document.getElementById('pongOverlay').classList.add('show');
  document.body.style.overflow = 'hidden';
  if (!pongInitialized) { initPong(); pongInitialized = true; }
}
function closePong() {
  document.getElementById('pongOverlay').classList.remove('show');
  document.body.style.overflow = '';
  pongRunning = false;
}
document.getElementById('pongOverlay').addEventListener('click', function(e) {
  if (e.target === this) closePong();
});

function initPong() {
  const canvas = document.getElementById('pongCanvas');
  const ctx = canvas.getContext('2d');
  function resize() { const maxW = Math.min(480, window.innerWidth - 80); canvas.width = maxW; canvas.height = Math.round(maxW * (200/480)); }
  resize();
  window.addEventListener('resize', () => { resize(); resetPos(); });
  const ACCENT = '#f1d19e', PAD_W = 8, PAD_H_R = 0.22, BALL_R = 5, AI_S = 0.035;
  let W, H, padH, pY, aY, bX, bY, bVX, bVY, pScore = 0, aScore = 0, spd;
  function dims() { W = canvas.width; H = canvas.height; padH = Math.round(H * PAD_H_R); spd = W * 0.012; }
  function resetPos() {
    dims(); pY = aY = (H - padH) / 2; bX = W/2; bY = H/2;
    const ang = (Math.random()*0.6-0.3) + (Math.random()>0.5 ? 0 : Math.PI);
    bVX = Math.cos(ang)*spd; bVY = Math.sin(ang)*spd;
    if (Math.abs(bVX) < spd*0.5) bVX = bVX < 0 ? -spd*0.7 : spd*0.7;
  }
  function draw() {
    ctx.clearRect(0,0,W,H);
    ctx.setLineDash([5,8]); ctx.strokeStyle='rgba(255,255,255,0.06)'; ctx.lineWidth=1;
    ctx.beginPath(); ctx.moveTo(W/2,0); ctx.lineTo(W/2,H); ctx.stroke(); ctx.setLineDash([]);
    ctx.fillStyle=ACCENT; ctx.beginPath(); ctx.roundRect(4,pY,PAD_W,padH,4); ctx.fill();
    ctx.fillStyle='rgba(255,255,255,0.4)'; ctx.beginPath(); ctx.roundRect(W-4-PAD_W,aY,PAD_W,padH,4); ctx.fill();
    ctx.fillStyle='#fff'; ctx.beginPath(); ctx.arc(bX,bY,BALL_R,0,Math.PI*2); ctx.fill();
  }
  function update() {
    if (!pongRunning) return;
    bX+=bVX; bY+=bVY;
    if (bY-BALL_R<=0) { bY=BALL_R; bVY=Math.abs(bVY); }
    if (bY+BALL_R>=H) { bY=H-BALL_R; bVY=-Math.abs(bVY); }
    const am=H*AI_S, ac=aY+padH/2;
    if (ac<bY-4) aY=Math.min(H-padH,aY+am);
    else if (ac>bY+4) aY=Math.max(0,aY-am);
    if (bX-BALL_R<=4+PAD_W&&bX-BALL_R>=2&&bY>=pY&&bY<=pY+padH) {
      bX=4+PAD_W+BALL_R;
      const h=(bY-(pY+padH/2))/(padH/2),s=Math.sqrt(bVX*bVX+bVY*bVY)*1.04;
      bVX=Math.abs(Math.cos(h*0.9)*s); bVY=Math.sin(h*0.9)*s;
    }
    if (bX+BALL_R>=W-4-PAD_W&&bX+BALL_R<=W-2&&bY>=aY&&bY<=aY+padH) {
      bX=W-4-PAD_W-BALL_R;
      const h=(bY-(aY+padH/2))/(padH/2),s=Math.sqrt(bVX*bVX+bVY*bVY)*1.02;
      bVX=-Math.abs(Math.cos(h*0.9)*s); bVY=Math.sin(h*0.9)*s;
    }
    if (bX-BALL_R<=0) {
      aScore++; document.getElementById('aiScore').textContent=aScore;
      if (aScore>=12) { pongRunning=false; document.getElementById('pongHint').textContent='AI wins! Click to play again.'; pScore=0;aScore=0; document.getElementById('playerScore').textContent=0; document.getElementById('aiScore').textContent=0; resetPos(); return; }
      resetPos();
    }
    if (bX+BALL_R>=W) {
      pScore++; document.getElementById('playerScore').textContent=pScore;
      if (pScore>=12) { pongRunning=false; document.getElementById('pongHint').textContent='You win! Click to play again.'; pScore=0;aScore=0; document.getElementById('playerScore').textContent=0; document.getElementById('aiScore').textContent=0; resetPos(); return; }
      resetPos();
    }
  }
  function loop() { update(); draw(); requestAnimationFrame(loop); }
  function start() { if (pongRunning) return; pongRunning=true; document.getElementById('pongHint').textContent='Mouse / drag to move your paddle'; requestAnimationFrame(loop); }
  canvas.addEventListener('mousemove', e => { const r=canvas.getBoundingClientRect(); pY=Math.max(0,Math.min(H-padH,e.clientY-r.top-padH/2)); });
  canvas.addEventListener('touchmove', e => { e.preventDefault(); const r=canvas.getBoundingClientRect(); pY=Math.max(0,Math.min(H-padH,e.touches[0].clientY-r.top-padH/2)); }, {passive:false});
  canvas.addEventListener('click', start);
  canvas.addEventListener('touchstart', e => { e.preventDefault(); start(); }, {passive:false});
  resetPos(); draw();
}
</script>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyBs6V0yY14cuLBXB1nciZ-X0eyAiodC-Ak",
  authDomain: "patholytica.firebaseapp.com",
  databaseURL: "https://patholytica-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "patholytica",
  storageBucket: "patholytica.firebasestorage.app",
  messagingSenderId: "738430635282",
  appId: "1:738430635282:web:8451ef380447c7611137cb"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const supabase = window.supabase.createClient(
  "https://vduqewqyvszfquntmark.supabase.co",
  "sb_publishable_YseP73aoHam8YT6B0b9EQQ_iAUEWARI"
);
window._supabase = supabase;

window.logOut = async function() {
  try { await signOut(auth); window.location.reload(); } catch(e) {}
};

onAuthStateChanged(auth, async (user) => {
  const authButtons  = document.getElementById('authButtons');
  const userWelcome  = document.getElementById('userWelcome');
  const welcomeText  = document.getElementById('welcomeText');
  const fabCreateBtn = document.getElementById('fabCreateBtn');
  if (user) {
    authButtons.classList.remove('show');
    userWelcome.classList.add('show');
    fabCreateBtn?.classList.add('show');
    welcomeText.onclick = window.logOut;
    try {
      const { data: ud } = await supabase.from('users').select('username').eq('firebase_uid', user.uid).single();
      if (ud?.username) welcomeText.textContent = `@${ud.username}`;
    } catch(e) {}
  } else {
    authButtons.classList.add('show');
    userWelcome.classList.remove('show');
    fabCreateBtn?.classList.remove('show');
  }
});

const PREVIEW = 3;

function monthRange(dateStr) {
  const d = new Date(dateStr);
  const y = d.getUTCFullYear(), m = d.getUTCMonth();
  return { start: new Date(Date.UTC(y,m,1)).toISOString(), end: new Date(Date.UTC(y,m+1,1)).toISOString() };
}
function monthLabel(dateStr) {
  return new Date(dateStr).toLocaleDateString('en-US', { year:'numeric', month:'long' });
}

function renderArticleItem(article, userMap) {
  const li = document.createElement('li');
  li.className = 'article-item';
  li.onclick = () => { window.location.href = `article.html?id=${article.id}`; };
  const author = userMap[article.firebase_user_id];
  const name = author?.username ? `@${author.username}` : 'Unknown Author';
  const date = new Date(article.created_at).toLocaleDateString('en-US', { month:'short', day:'numeric' });
  li.innerHTML = `
    <h2 class="article-title">${window.escHtml(article.title || 'Untitled')}</h2>
    <div class="article-meta">
      <span>${window.escHtml(name)}</span>
      <div class="meta-dot"></div>
      <span>${date}</span>
    </div>`;
  return li;
}

async function loadCreators() {
  const el = document.getElementById('creatorsList');
  try {
    const { data: articles, error } = await supabase.from('articles').select('firebase_user_id');
    if (error || !articles) { el.innerHTML=''; return; }
    const counts = {};
    articles.forEach(a => { if(a.firebase_user_id) counts[a.firebase_user_id]=(counts[a.firebase_user_id]||0)+1; });
    const sorted = Object.entries(counts).sort((a,b)=>b[1]-a[1]).slice(0,3);
    if (!sorted.length) { el.innerHTML=''; return; }
    const uids = sorted.map(([u])=>u);
    const { data: users } = await supabase.from('users').select('firebase_uid, username, pfp').in('firebase_uid', uids);
    const um = {};
    if (users) users.forEach(u=>{ um[u.firebase_uid]=u; });
    const rc=['gold','silver','bronze'], rl=['#1','#2','#3'];
    el.innerHTML = sorted.map(([uid,count],i) => {
      const u=um[uid];
      const name=u?.username?`@${u.username}`:'Unknown';
      const init=(u?.username||'?').replace(/^@/,'')[0].toUpperCase();
      const avatarHTML = u?.pfp ? `<img src="${u.pfp}" alt="${init}">` : init;
      const profileLink = u?.username ? `profile.html?username=${window.escHtml(u.username)}` : '#';
      return `<div class="creator-row" onclick="window.location.href='${profileLink}'">
        <div class="creator-rank ${rc[i]}">${rl[i]}</div>
        <div class="creator-avatar">${avatarHTML}</div>
        <div class="creator-info">
          <div class="creator-name">${window.escHtml(name)}</div>
          <div class="creator-count">${count} article${count!==1?'s':''}</div>
        </div>
        <div class="creator-badge">${count}</div>
      </div>`;
    }).join('');
  } catch(e) { document.getElementById('creatorsList').innerHTML=''; }
}

async function loadArticles(libraryArticleIds = null) {
  const list = document.getElementById('articleList');
  list.innerHTML = `
    <li class="skeleton-article"><div class="skel-title-lg"></div><div class="skel-title-sm"></div><div class="skel-meta"></div></li>
    <li class="skeleton-article"><div class="skel-title-lg" style="width:60%"></div><div class="skel-title-sm" style="width:40%"></div><div class="skel-meta" style="width:20%"></div></li>
    <li class="skeleton-article"><div class="skel-title-lg" style="width:78%"></div><div class="skel-title-sm" style="width:50%"></div><div class="skel-meta" style="width:30%"></div></li>`;
  try {
    let metaQuery = supabase.from('articles').select('id, created_at, firebase_user_id').order('created_at', { ascending:false });
    if (libraryArticleIds) metaQuery = metaQuery.in('id', libraryArticleIds);
    const { data: meta, error: metaErr } = await metaQuery;
    if (metaErr) { list.innerHTML=`<li class="error-state">Error: ${metaErr.message}</li>`; return; }
    if (!meta || meta.length===0) {
      list.innerHTML='<li class="loading-state">No articles found.</li>';
      document.getElementById('articleCount').textContent='0'; return;
    }
    document.getElementById('articleCount').textContent = meta.length;
    const monthGroups = {};
    meta.forEach(a => {
      const label = monthLabel(a.created_at);
      if (!monthGroups[label]) monthGroups[label] = { count:0, firstDate:a.created_at };
      monthGroups[label].count++;
    });
    list.innerHTML = '';
    const userMap = {};
    for (const [label, group] of Object.entries(monthGroups)) {
      const { start, end } = monthRange(group.firstDate);
      let previewQuery = supabase.from('articles').select('*')
        .gte('created_at',start).lt('created_at',end)
        .order('created_at',{ ascending:false }).limit(PREVIEW);
      if (libraryArticleIds) previewQuery = previewQuery.in('id', libraryArticleIds);
      const { data: preview } = await previewQuery;
      if (!preview || preview.length===0) continue;
      const newIds = [...new Set(preview.map(a=>a.firebase_user_id).filter(Boolean))].filter(id=>!userMap[id]);
      if (newIds.length) {
        const { data: nu } = await supabase.from('users').select('firebase_uid, username').in('firebase_uid', newIds);
        if (nu) nu.forEach(u=>{ userMap[u.firebase_uid]=u; });
      }
      const headerLi = document.createElement('li');
      headerLi.innerHTML = `<div class="date-group-header">${label}</div>`;
      list.appendChild(headerLi);
      preview.forEach(a => list.appendChild(renderArticleItem(a, userMap)));
      const remaining = group.count - preview.length;
      if (remaining > 0) {
        const moreLi = document.createElement('li');
        moreLi.className = 'load-more-row';
        let expanded = false, expandedItems = [];
        const btn = document.createElement('button');
        btn.className = 'btn-load-more';
        btn.innerHTML = `<i class="fas fa-chevron-down"></i> ${remaining} more from ${label}`;
        btn.onclick = async () => {
          if (expanded) {
            expandedItems.forEach(el=>el.remove()); expandedItems=[]; expanded=false;
            btn.classList.remove('open');
            btn.innerHTML=`<i class="fas fa-chevron-down"></i> ${remaining} more from ${label}`; return;
          }
          btn.classList.add('loading');
          btn.innerHTML=`<i class="fas fa-circle-notch fa-spin"></i> Loading…`;
          try {
            let mq = supabase.from('articles').select('*')
              .gte('created_at',start).lt('created_at',end)
              .order('created_at',{ ascending:false })
              .range(PREVIEW, group.count-1);
            if (libraryArticleIds) mq = mq.in('id', libraryArticleIds);
            const { data: more, error: mErr } = await mq;
            if (mErr||!more) throw new Error(mErr?.message||'fetch failed');
            const nids=[...new Set(more.map(a=>a.firebase_user_id).filter(Boolean))].filter(id=>!userMap[id]);
            if (nids.length) {
              const { data: nu } = await supabase.from('users').select('firebase_uid, username').in('firebase_uid', nids);
              if (nu) nu.forEach(u=>{ userMap[u.firebase_uid]=u; });
            }
            more.forEach(a=>{ const el=renderArticleItem(a,userMap); list.insertBefore(el,moreLi); expandedItems.push(el); });
            expanded=true; btn.classList.remove('loading'); btn.classList.add('open');
            btn.innerHTML=`<i class="fas fa-chevron-down"></i> Collapse ${label}`;
          } catch(e) {
            btn.classList.remove('loading');
            btn.innerHTML=`<i class="fas fa-chevron-down"></i> ${remaining} more from ${label}`;
          }
        };
        moreLi.appendChild(btn); list.appendChild(moreLi);
      }
    }
  } catch(err) {
    list.innerHTML=`<li class="error-state">Unexpected error: ${err.message}</li>`;
  }
}

window._loadArticles = async function(libraryId = null) {
  let ids = null;
  if (libraryId !== null) {
    const { data: items, error } = await supabase.from('playlist_items').select('article_id').eq('playlist_id', libraryId);
    if (error) { document.getElementById('articleList').innerHTML=`<li class="error-state">Error: ${error.message}</li>`; return; }
    if (!items||items.length===0) {
      document.getElementById('articleList').innerHTML='<li class="loading-state">No articles in this library.</li>';
      document.getElementById('articleCount').textContent='0'; return;
    }
    ids = items.map(i=>i.article_id);
  }
  await loadArticles(ids);
};

loadCreators();
window._loadArticles(null);
</script>

<script>
async function startLibrary() {
  const input=document.getElementById('libraryIdInput');
  const btn=document.getElementById('startBtn');
  const banner=document.getElementById('libraryBanner');
  const bName=document.getElementById('libraryBannerName');
  const bMeta=document.getElementById('libraryBannerMeta');
  const val=input.value.trim();
  if (!val||isNaN(val)||parseInt(val)<=0) {
    input.classList.add('error');
    setTimeout(()=>input.classList.remove('error'),1200);
    input.focus(); return;
  }
  const libraryId=parseInt(val);
  btn.disabled=true; btn.textContent='…';
  bName.textContent='Loading…'; bMeta.innerHTML='';
  banner.classList.add('show');
  try {
    const { data:lib, error:libErr } = await window._supabase.from('playlists').select('*').eq('id',libraryId).single();
    if (libErr||!lib) {
      bName.textContent=`Library #${libraryId}`;
      bMeta.innerHTML=`<span><i class="fas fa-exclamation-circle"></i> Library not found</span>`;
    } else {
      bName.textContent=lib.name||`Library #${libraryId}`;
      const parts=[];
      if(lib.description) parts.push(`<span><i class="fas fa-align-left"></i> ${lib.description}</span>`);
      if(lib.created_at){
        const d=new Date(lib.created_at).toLocaleDateString('en-US',{year:'numeric',month:'short',day:'numeric'});
        parts.push(`<span><i class="fas fa-calendar-alt"></i> ${d}</span>`);
      }
      parts.push(`<span><i class="fas fa-hashtag"></i> ID ${libraryId}</span>`);
      bMeta.innerHTML=parts.join('');
    }
  } catch(e) {
    bName.textContent=`Library #${libraryId}`;
    bMeta.innerHTML=`<span><i class="fas fa-hashtag"></i> ID ${libraryId}</span>`;
  } finally { btn.disabled=false; btn.textContent='Start'; }
  window._loadArticles(libraryId);
}

function clearLibraryFilter() {
  document.getElementById('libraryIdInput').value='';
  document.getElementById('libraryBanner').classList.remove('show');
  window._loadArticles(null);
}
</script>
