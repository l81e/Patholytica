<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>My Space</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0a0a;
  --bg2: #111111;
  --bg3: #181818;
  --border: #1e1e1e;
  --border2: #2a2a2a;
  --text: #e8e6e1;
  --text2: #6e6c68;
  --text3: #3a3835;
  --accent: #4f9eff;
  --accent2: #3dba72;
  --accent3: #e88c3a;
  --accent4: #a56fd4;
  --accent5: #ef4444;
  --glass: rgba(14,14,14,0.85);
  --glass-border: rgba(255,255,255,0.07);
  --shadow: 0 8px 32px rgba(0,0,0,0.7);
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
  --toolbar-h: 64px;
  --topbar-h: 52px;
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body {
  width: 100%; height: 100%;
  overflow: hidden;
  font-family: 'DM Sans', sans-serif;
  touch-action: none;
}
body { background: var(--bg); color: var(--text); }

/* ── Canvas ── */
#canvas {
  position: fixed; inset: 0;
  background: var(--bg);
  overflow: hidden;
  touch-action: none;
}
#bg-layer {
  position: absolute; inset: 0;
  background: var(--bg);
  background-size: cover;
  background-position: center;
  will-change: transform;
  transition: filter 0.4s ease;
}
#bg-overlay {
  position: absolute; inset: 0;
  pointer-events: none;
  transition: background 0.3s;
}

/* ── Widgets Layer ── */
#widgets-layer {
  position: absolute;
  top: calc(var(--safe-top) + var(--topbar-h));
  left: 0; right: 0;
  bottom: calc(var(--safe-bottom) + var(--toolbar-h));
  overflow-y: auto;
  overflow-x: hidden;
  -webkit-overflow-scrolling: touch;
  scroll-behavior: smooth;
}
#widgets-layer::-webkit-scrollbar { display: none; }

/* ── View Mode: Card Stack ── */
.widgets-scroll-inner {
  padding: 12px 14px 20px;
  display: flex;
  flex-direction: column;
  gap: 10px;
  min-height: 100%;
}

/* ── Widget Base ── */
.widget {
  width: 100%;
  border: 1px solid var(--glass-border);
  border-radius: 16px;
  backdrop-filter: blur(16px) saturate(1.4);
  -webkit-backdrop-filter: blur(16px) saturate(1.4);
  background: var(--glass);
  box-shadow: var(--shadow), inset 0 1px 0 rgba(255,255,255,0.05);
  overflow: hidden;
  position: relative;
  transition: transform 0.2s ease, box-shadow 0.2s ease;
  /* no absolute positioning on mobile */
}

/* Edit mode: show drag handle row */
.widget .widget-move-bar {
  display: none;
  align-items: center; justify-content: space-between;
  padding: 10px 14px 8px;
  border-bottom: 1px solid var(--glass-border);
  cursor: grab;
  touch-action: none;
  background: rgba(255,255,255,0.02);
}
.edit-mode .widget .widget-move-bar { display: flex; }
.move-dots {
  display: flex; gap: 3px; align-items: center;
}
.move-dots span {
  display: block; width: 4px; height: 4px;
  border-radius: 50%; background: var(--text3);
}
.widget-move-actions {
  display: flex; gap: 6px;
}
.wmove-btn {
  width: 28px; height: 28px; border-radius: 8px;
  background: none; border: 1px solid var(--border2);
  color: var(--text2); cursor: pointer; font-size: 12px;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.15s ease;
}
.wmove-btn:hover, .wmove-btn:active { background: var(--bg3); }
.wmove-btn.danger:active { background: rgba(239,68,68,0.15); color: var(--accent5); border-color: var(--accent5); }

/* Widget header */
.widget-header {
  display: flex; align-items: center; gap: 8px;
  padding: 12px 14px 10px;
  border-bottom: 1px solid var(--glass-border);
  font-size: 11px; font-weight: 500; letter-spacing: 0.06em;
  text-transform: uppercase; color: var(--text2);
}
.widget-header i { font-size: 12px; }

/* Dragging state */
.widget.dragging {
  opacity: 0.5;
  transform: scale(0.97);
  box-shadow: none;
  pointer-events: none;
}
.widget.drag-over {
  border-color: var(--accent);
  box-shadow: 0 0 0 2px var(--accent), var(--shadow);
}

/* ── Note Widget ── */
.note-widget[data-color="yellow"] { background: rgba(255,213,79,0.08); border-color: rgba(255,213,79,0.18); }
.note-widget[data-color="green"]  { background: rgba(61,186,114,0.07); border-color: rgba(61,186,114,0.18); }
.note-widget[data-color="blue"]   { background: rgba(79,158,255,0.07); border-color: rgba(79,158,255,0.18); }
.note-widget[data-color="purple"] { background: rgba(165,111,212,0.07); border-color: rgba(165,111,212,0.18); }
.note-widget[data-color="red"]    { background: rgba(239,68,68,0.07); border-color: rgba(239,68,68,0.18); }
.note-body {
  width: 100%; min-height: 100px; max-height: 280px;
  padding: 12px 14px;
  background: transparent; border: none; outline: none; resize: none;
  color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 15px;
  line-height: 1.65; display: block;
}
.note-body::placeholder { color: var(--text3); }
.note-colors {
  display: flex; gap: 8px; padding: 8px 14px 12px; align-items: center;
}
.note-color-dot {
  width: 18px; height: 18px; border-radius: 50%; cursor: pointer;
  border: 2px solid transparent; transition: all 0.15s ease;
}
.note-color-dot.active { border-color: white; transform: scale(1.15); }

/* ── Clock ── */
.clock-display {
  padding: 20px; text-align: center;
}
.clock-time {
  font-family: 'DM Mono', monospace; font-size: 44px; font-weight: 500;
  color: var(--text); letter-spacing: -0.02em; line-height: 1;
}
.clock-date {
  font-family: 'DM Mono', monospace;
  font-size: 13px; color: var(--text2); letter-spacing: 0.08em;
  text-transform: uppercase; margin-top: 6px;
}

/* ── Todo ── */
.todo-body { padding: 6px 14px 14px; }
.todo-item {
  display: flex; align-items: flex-start; gap: 10px;
  padding: 9px 0; border-bottom: 1px solid var(--border);
}
.todo-item:last-child { border-bottom: none; }
.todo-checkbox {
  width: 20px; height: 20px; border-radius: 6px;
  border: 1.5px solid var(--border2); flex-shrink: 0; margin-top: 1px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; transition: all 0.15s ease;
}
.todo-checkbox.checked { background: var(--accent2); border-color: var(--accent2); }
.todo-checkbox.checked::after { content: '✓'; font-size: 12px; color: white; font-weight: 700; }
.todo-text {
  flex: 1; font-size: 15px; color: var(--text); line-height: 1.5;
  outline: none; cursor: text; min-height: 22px; word-break: break-word;
}
.todo-text.done { text-decoration: line-through; color: var(--text2); }
.todo-del {
  width: 24px; height: 24px; border-radius: 6px;
  background: none; border: none; color: var(--text3);
  cursor: pointer; font-size: 14px; display: flex;
  align-items: center; justify-content: center; flex-shrink: 0;
  transition: all 0.15s ease; margin-top: 1px;
}
.todo-del:active { background: rgba(239,68,68,0.15); color: var(--accent5); }
.todo-add-row {
  display: flex; align-items: center; gap: 8px;
  padding: 10px 0 0; border-top: 1px solid var(--border); margin-top: 4px;
}
.todo-add-input {
  flex: 1; background: none; border: none; outline: none;
  font-size: 15px; color: var(--text2); font-family: 'DM Sans', sans-serif;
}
.todo-add-input::placeholder { color: var(--text3); }
.todo-add-btn {
  width: 28px; height: 28px; border-radius: 8px;
  background: var(--bg3); border: 1px solid var(--border2);
  color: var(--text2); cursor: pointer; font-size: 15px;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.15s ease; flex-shrink: 0;
}
.todo-add-btn:active { background: var(--accent); border-color: var(--accent); color: white; }

/* ── Image ── */
.image-body {
  width: 100%; min-height: 160px;
  display: flex; align-items: center; justify-content: center;
  position: relative; overflow: hidden;
}
.image-body img {
  width: 100%; display: block; object-fit: cover;
  border-radius: 0 0 15px 15px;
}
.image-placeholder {
  width: 100%; min-height: 160px;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 10px; color: var(--text3); font-size: 14px; cursor: pointer;
  padding: 24px;
}
.image-placeholder i { font-size: 32px; }
.image-tap-hint {
  position: absolute; bottom: 10px; right: 10px;
  background: rgba(0,0,0,0.6); border-radius: 8px;
  padding: 4px 10px; font-size: 11px; color: var(--text2);
  backdrop-filter: blur(8px); pointer-events: none;
  opacity: 0; transition: opacity 0.2s;
}
.edit-mode .image-body:hover .image-tap-hint,
.edit-mode .image-body:focus .image-tap-hint { opacity: 1; }

/* ── Quote ── */
.quote-body { padding: 18px 18px 16px; }
.quote-text {
  font-family: 'DM Serif Display', Georgia, serif;
  font-size: 17px; line-height: 1.65; color: var(--text);
  font-style: italic; margin-bottom: 12px;
  outline: none; cursor: text; word-break: break-word;
}
.quote-author {
  font-size: 13px; color: var(--text2);
  letter-spacing: 0.06em; text-transform: uppercase;
  outline: none; cursor: text;
}

/* ── Spotify ── */
.spotify-widget iframe { width: 100%; height: 152px; border: none; display: block; }
.spotify-input-body { padding: 14px 14px 18px; display: flex; flex-direction: column; gap: 10px; }
.spotify-url-input {
  width: 100%;
  background: var(--bg3); border: 1px solid var(--border2);
  border-radius: 10px; padding: 11px 13px;
  color: var(--text); font-size: 14px; outline: none;
  font-family: 'DM Mono', monospace;
}
.spotify-url-input::placeholder { color: var(--text3); }
.spotify-url-input:focus { border-color: var(--accent); }
.spotify-load-btn {
  padding: 11px; border-radius: 10px;
  background: #1DB954; border: none; color: white;
  font-size: 14px; font-weight: 600; cursor: pointer;
  font-family: 'DM Sans', sans-serif; width: 100%;
}
.spotify-load-btn:active { background: #17a349; }

/* ── Top Bar ── */
#topbar {
  position: fixed;
  top: 0; left: 0; right: 0;
  height: calc(var(--safe-top) + var(--topbar-h));
  padding-top: var(--safe-top);
  background: var(--glass);
  border-bottom: 1px solid var(--glass-border);
  backdrop-filter: blur(20px) saturate(1.5);
  -webkit-backdrop-filter: blur(20px) saturate(1.5);
  z-index: 100;
  display: flex; align-items: flex-end;
}
.topbar-inner {
  width: 100%; height: var(--topbar-h);
  display: flex; align-items: center;
  padding: 0 14px; gap: 8px;
}
.topbar-title {
  flex: 1;
  font-family: 'DM Serif Display', serif;
  font-size: 20px; color: var(--text);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.topbar-btn {
  width: 36px; height: 36px; border-radius: 12px;
  background: var(--bg3); border: 1px solid var(--border2);
  color: var(--text2); font-size: 15px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.15s ease; flex-shrink: 0;
}
.topbar-btn:active { background: var(--border2); }
.topbar-btn.active { background: var(--accent); border-color: var(--accent); color: white; }

/* Spaces drawer trigger */
#spaces-pill {
  display: flex; align-items: center; gap: 6px;
  padding: 6px 12px; border-radius: 12px;
  background: var(--bg3); border: 1px solid var(--border2);
  cursor: pointer; font-size: 13px; font-weight: 500; color: var(--text2);
  flex-shrink: 0; max-width: 120px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  transition: all 0.15s ease;
}
#spaces-pill:active { background: var(--border2); }
#spaces-pill i { font-size: 11px; flex-shrink: 0; }

/* ── Bottom Toolbar ── */
#toolbar {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  height: calc(var(--safe-bottom) + var(--toolbar-h));
  padding-bottom: var(--safe-bottom);
  background: var(--glass);
  border-top: 1px solid var(--glass-border);
  backdrop-filter: blur(20px) saturate(1.5);
  -webkit-backdrop-filter: blur(20px) saturate(1.5);
  z-index: 100;
  display: flex; align-items: flex-start;
}
.toolbar-inner {
  width: 100%; height: var(--toolbar-h);
  display: flex; align-items: center; justify-content: space-around;
  padding: 0 8px;
}
.tb-btn {
  flex: 1; height: 48px; max-width: 56px;
  border-radius: 14px;
  background: none; border: none; cursor: pointer;
  color: var(--text2); font-size: 18px;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.15s ease;
  position: relative;
}
.tb-btn:active { background: var(--bg3); transform: scale(0.9); }
.tb-btn.active { color: var(--accent); }
.tb-sep { width: 1px; height: 24px; background: var(--border2); flex-shrink: 0; }

/* Add Sheet */
#add-sheet {
  position: fixed; left: 0; right: 0; bottom: 0;
  background: #111;
  border-top: 1px solid var(--border2);
  border-radius: 20px 20px 0 0;
  z-index: 200;
  transform: translateY(100%);
  transition: transform 0.35s cubic-bezier(0.4,0,0.2,1);
  padding-bottom: var(--safe-bottom);
}
#add-sheet.show { transform: translateY(0); }
.sheet-handle {
  width: 36px; height: 4px; border-radius: 2px;
  background: var(--border2); margin: 12px auto 0;
}
.sheet-title {
  font-size: 13px; font-weight: 600; color: var(--text2);
  text-align: center; padding: 10px 0 14px;
  letter-spacing: 0.05em; text-transform: uppercase;
}
.add-grid {
  display: grid; grid-template-columns: repeat(3, 1fr);
  gap: 10px; padding: 0 16px 20px;
}
.add-item {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 8px; padding: 16px 8px;
  background: var(--bg3); border: 1px solid var(--border2);
  border-radius: 14px; cursor: pointer;
  transition: all 0.15s ease;
}
.add-item:active { background: var(--border2); transform: scale(0.95); }
.add-item i { font-size: 22px; color: var(--text2); }
.add-item span { font-size: 12px; color: var(--text2); font-weight: 500; }

/* ── Spaces Drawer ── */
#spaces-drawer {
  position: fixed; left: 0; right: 0; bottom: 0;
  background: #111;
  border-top: 1px solid var(--border2);
  border-radius: 20px 20px 0 0;
  z-index: 200;
  transform: translateY(100%);
  transition: transform 0.35s cubic-bezier(0.4,0,0.2,1);
  padding-bottom: var(--safe-bottom);
}
#spaces-drawer.show { transform: translateY(0); }
.spaces-list { padding: 8px 14px 16px; display: flex; flex-direction: column; gap: 6px; }
.space-row {
  display: flex; align-items: center; gap: 12px;
  padding: 13px 14px; border-radius: 12px;
  background: var(--bg3); border: 1px solid var(--border2);
  cursor: pointer; transition: all 0.15s ease;
}
.space-row:active { background: var(--border2); }
.space-row.active { border-color: var(--accent); background: rgba(79,158,255,0.08); }
.space-row-name {
  flex: 1; font-size: 15px; font-weight: 500; color: var(--text);
  outline: none;
}
.space-row-badge {
  font-size: 11px; color: var(--text2); background: var(--bg);
  border: 1px solid var(--border2); border-radius: 8px;
  padding: 3px 8px; flex-shrink: 0;
}
.space-row-del {
  width: 28px; height: 28px; border-radius: 8px; border: none;
  background: none; color: var(--text3); font-size: 14px;
  display: flex; align-items: center; justify-content: center; cursor: pointer;
}
.space-row-del:active { background: rgba(239,68,68,0.15); color: var(--accent5); }
.spaces-add-btn {
  width: 100%; padding: 13px; border-radius: 12px;
  background: none; border: 1px dashed var(--border2);
  color: var(--text2); font-size: 14px; font-weight: 500;
  cursor: pointer; font-family: 'DM Sans', sans-serif;
  display: flex; align-items: center; justify-content: center; gap: 8px;
  transition: all 0.15s ease;
}
.spaces-add-btn:active { border-color: var(--accent); color: var(--accent); }

/* ── Background Drawer ── */
#bg-drawer {
  position: fixed; left: 0; right: 0; bottom: 0;
  background: #111;
  border-top: 1px solid var(--border2);
  border-radius: 20px 20px 0 0;
  z-index: 200;
  transform: translateY(100%);
  transition: transform 0.35s cubic-bezier(0.4,0,0.2,1);
  padding-bottom: var(--safe-bottom);
  max-height: 85vh; overflow-y: auto;
}
#bg-drawer::-webkit-scrollbar { display: none; }
#bg-drawer.show { transform: translateY(0); }
.drawer-body { padding: 0 16px 20px; display: flex; flex-direction: column; gap: 18px; }
.drawer-section-label {
  font-size: 11px; font-weight: 600; letter-spacing: 0.08em;
  text-transform: uppercase; color: var(--text2); margin-bottom: 10px;
}
.preset-grid {
  display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px;
}
.preset-swatch {
  aspect-ratio: 1; border-radius: 12px; cursor: pointer;
  border: 2px solid transparent; transition: all 0.15s ease;
}
.preset-swatch:active { transform: scale(0.93); }
.preset-swatch.active { border-color: var(--accent); }
.drawer-upload-btn {
  width: 100%; padding: 13px; border-radius: 12px;
  background: var(--bg3); border: 1px dashed var(--border2);
  color: var(--text2); font-size: 14px; cursor: pointer;
  font-family: 'DM Sans', sans-serif;
  display: flex; align-items: center; justify-content: center; gap: 8px;
}
.drawer-upload-btn:active { border-color: var(--accent); color: var(--accent); }
.slider-row {
  display: flex; align-items: center; gap: 12px;
}
.slider-label { font-size: 13px; color: var(--text2); min-width: 80px; }
.slider-row input[type=range] { flex: 1; accent-color: var(--accent); height: 20px; }
.toggle-row {
  display: flex; align-items: center; gap: 12px;
  padding: 12px 14px; background: var(--bg3); border: 1px solid var(--border2); border-radius: 12px;
}
.toggle-label { flex: 1; font-size: 14px; color: var(--text); }
.toggle-sub { font-size: 12px; color: var(--text2); }
/* iOS-style toggle */
.ios-toggle { position: relative; display: inline-block; width: 44px; height: 26px; flex-shrink: 0; }
.ios-toggle input { opacity: 0; width: 0; height: 0; }
.ios-slider {
  position: absolute; cursor: pointer; inset: 0;
  background: var(--border2); border-radius: 13px; transition: 0.3s;
}
.ios-slider:before {
  content: ''; position: absolute;
  width: 20px; height: 20px; left: 3px; bottom: 3px;
  background: white; border-radius: 50%; transition: 0.3s;
}
.ios-toggle input:checked + .ios-slider { background: var(--accent); }
.ios-toggle input:checked + .ios-slider:before { transform: translateX(18px); }

/* ── Sheet Overlay ── */
#sheet-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.5);
  z-index: 199; display: none;
  backdrop-filter: blur(2px);
}
#sheet-overlay.show { display: block; }

/* ── Export/Import Sheet ── */
#io-sheet {
  position: fixed; left: 0; right: 0; bottom: 0;
  background: #111; border-top: 1px solid var(--border2);
  border-radius: 20px 20px 0 0;
  z-index: 200; padding-bottom: var(--safe-bottom);
  transform: translateY(100%);
  transition: transform 0.35s cubic-bezier(0.4,0,0.2,1);
}
#io-sheet.show { transform: translateY(0); }
.io-list { padding: 4px 14px 16px; display: flex; flex-direction: column; gap: 6px; }
.io-item {
  display: flex; align-items: center; gap: 14px;
  padding: 14px; border-radius: 12px;
  background: var(--bg3); border: 1px solid var(--border2);
  cursor: pointer; transition: all 0.15s ease;
}
.io-item:active { background: var(--border2); }
.io-item i { font-size: 18px; color: var(--text2); width: 22px; text-align: center; }
.io-item-info h4 { font-size: 15px; font-weight: 500; color: var(--text); margin-bottom: 2px; }
.io-item-info p { font-size: 12px; color: var(--text2); }

/* ── Animations ── */
.widget { animation: widgetIn 0.22s cubic-bezier(0.4,0,0.2,1); }
@keyframes widgetIn {
  from { opacity:0; transform: translateY(12px) scale(0.97); }
  to   { opacity:1; transform: translateY(0) scale(1); }
}
@keyframes widgetOut {
  to { opacity:0; transform: scale(0.92) translateY(8px); }
}

/* Long press visual */
.widget.long-pressed {
  border-color: var(--accent);
  box-shadow: 0 0 0 2px var(--accent), var(--shadow);
}
</style>
</head>
<body>

<div id="canvas">
  <div id="bg-layer"><div id="bg-overlay"></div></div>
  <div id="widgets-layer">
    <div class="widgets-scroll-inner" id="widgetsInner"></div>
  </div>
</div>

<!-- Top Bar -->
<div id="topbar">
  <div class="topbar-inner">
    <div id="spaces-pill" onclick="openDrawer('spaces')">
      <span id="spaces-pill-name">Main</span>
      <i class="fas fa-chevron-down"></i>
    </div>
    <div class="topbar-title" id="topbar-title">My Space</div>
    <button class="topbar-btn" onclick="openDrawer('bg')" title="Background"><i class="fas fa-image"></i></button>
    <button class="topbar-btn" id="editToggle" onclick="toggleEditMode()" title="Edit"><i class="fas fa-pen-to-square"></i></button>
  </div>
</div>

<!-- Bottom Toolbar -->
<div id="toolbar">
  <div class="toolbar-inner">
    <button class="tb-btn" onclick="openAddSheet()" title="Add Widget"><i class="fas fa-plus-circle"></i></button>
    <div class="tb-sep"></div>
    <button class="tb-btn" id="snapBtn" onclick="toggleSnap()" title="Snap"><i class="fas fa-th"></i></button>
    <button class="tb-btn" onclick="openDrawer('io')" title="More"><i class="fas fa-ellipsis"></i></button>
  </div>
</div>

<!-- Sheet Overlay -->
<div id="sheet-overlay" onclick="closeAllSheets()"></div>

<!-- Add Widget Sheet -->
<div id="add-sheet">
  <div class="sheet-handle"></div>
  <div class="sheet-title">Add Widget</div>
  <div class="add-grid">
    <div class="add-item" onclick="addWidget('note');closeAllSheets()">
      <i class="fas fa-sticky-note"></i><span>Note</span>
    </div>
    <div class="add-item" onclick="addWidget('clock');closeAllSheets()">
      <i class="fas fa-clock"></i><span>Clock</span>
    </div>
    <div class="add-item" onclick="addWidget('todo');closeAllSheets()">
      <i class="fas fa-check-square"></i><span>To-Do</span>
    </div>
    <div class="add-item" onclick="addWidget('image');closeAllSheets()">
      <i class="fas fa-image"></i><span>Image</span>
    </div>
    <div class="add-item" onclick="addWidget('quote');closeAllSheets()">
      <i class="fas fa-quote-right"></i><span>Quote</span>
    </div>
    <div class="add-item" onclick="addWidget('spotify');closeAllSheets()">
      <i class="fab fa-spotify"></i><span>Spotify</span>
    </div>
  </div>
</div>

<!-- Spaces Drawer -->
<div id="spaces-drawer">
  <div class="sheet-handle"></div>
  <div class="sheet-title">My Spaces</div>
  <div class="spaces-list" id="spacesList"></div>
</div>

<!-- Background Drawer -->
<div id="bg-drawer">
  <div class="sheet-handle"></div>
  <div class="sheet-title">Background</div>
  <div class="drawer-body">
    <div>
      <div class="drawer-section-label">Presets</div>
      <div class="preset-grid" id="presetGrid"></div>
    </div>
    <label class="drawer-upload-btn" for="bgUpload">
      <i class="fas fa-upload"></i> Upload from Photos
      <input type="file" id="bgUpload" accept="image/*" style="display:none">
    </label>
    <div>
      <div class="drawer-section-label">Adjustments</div>
      <div style="display:flex;flex-direction:column;gap:14px;">
        <div class="slider-row"><span class="slider-label">Blur</span><input type="range" id="blurSlider" min="0" max="20" value="0"></div>
        <div class="slider-row"><span class="slider-label">Brightness</span><input type="range" id="brightnessSlider" min="20" max="150" value="100"></div>
        <div class="slider-row"><span class="slider-label">Dim</span><input type="range" id="dimSlider" min="0" max="90" value="0"></div>
      </div>
    </div>
    <div class="toggle-row">
      <div><div class="toggle-label">Parallax</div><div class="toggle-sub">Moves with device tilt</div></div>
      <label class="ios-toggle"><input type="checkbox" id="parallaxToggle"><span class="ios-slider"></span></label>
    </div>
  </div>
</div>

<!-- IO Sheet -->
<div id="io-sheet">
  <div class="sheet-handle"></div>
  <div class="sheet-title">Options</div>
  <div class="io-list">
    <div class="io-item" onclick="exportLayout();closeAllSheets()">
      <i class="fas fa-download"></i>
      <div class="io-item-info"><h4>Export Layout</h4><p>Save as JSON file</p></div>
    </div>
    <label class="io-item" for="importFile">
      <i class="fas fa-upload"></i>
      <div class="io-item-info"><h4>Import Layout</h4><p>Load from JSON file</p></div>
      <input type="file" id="importFile" accept=".json" style="display:none">
    </label>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════════
let spaces = [];
let currentSpaceIdx = 0;
let editMode = false;
let snapEnabled = false;
let zCounter = 10;
let dragSrc = null; // for reorder drag

// ── Helpers ─────────────────────────────────────────────
function uid() { return Math.random().toString(36).slice(2, 10); }
function currentSpace() { return spaces[currentSpaceIdx]; }

// ── Persistence ─────────────────────────────────────────
function save() { try { localStorage.setItem('myspace_mobile_v1', JSON.stringify(spaces)); } catch(e) {} }
function load() { try { const d = localStorage.getItem('myspace_mobile_v1'); if (d) spaces = JSON.parse(d); } catch(e) {} }

// ═══════════════════════════════════════════════════════════
// SHEETS / DRAWERS
// ═══════════════════════════════════════════════════════════
function openDrawer(type) {
  closeAllSheets();
  document.getElementById('sheet-overlay').classList.add('show');
  if (type === 'add') document.getElementById('add-sheet').classList.add('show');
  else if (type === 'spaces') { renderSpacesDrawer(); document.getElementById('spaces-drawer').classList.add('show'); }
  else if (type === 'bg') { renderPresets(); document.getElementById('bg-drawer').classList.add('show'); }
  else if (type === 'io') document.getElementById('io-sheet').classList.add('show');
}

function openAddSheet() { openDrawer('add'); }

function closeAllSheets() {
  document.getElementById('sheet-overlay').classList.remove('show');
  ['add-sheet','spaces-drawer','bg-drawer','io-sheet'].forEach(id => {
    document.getElementById(id).classList.remove('show');
  });
}

// Swipe down to close drawers
['add-sheet','spaces-drawer','bg-drawer','io-sheet'].forEach(id => {
  const el = document.getElementById(id);
  let startY = 0, isDragging = false;
  el.addEventListener('touchstart', e => { startY = e.touches[0].clientY; isDragging = false; }, { passive: true });
  el.addEventListener('touchmove', e => {
    const dy = e.touches[0].clientY - startY;
    if (dy > 10) isDragging = true;
    if (isDragging && dy > 0) el.style.transform = `translateY(${dy}px)`;
  }, { passive: true });
  el.addEventListener('touchend', e => {
    const dy = e.changedTouches[0].clientY - startY;
    el.style.transform = '';
    if (dy > 60) closeAllSheets();
  });
});

// ═══════════════════════════════════════════════════════════
// SPACES
// ═══════════════════════════════════════════════════════════
function renderSpacesDrawer() {
  const list = document.getElementById('spacesList');
  list.innerHTML = '';
  spaces.forEach((s, i) => {
    const row = document.createElement('div');
    row.className = 'space-row' + (i === currentSpaceIdx ? ' active' : '');
    row.innerHTML = `
      <div class="space-row-name" contenteditable="true"
           onblur="renameSpace(${i}, this.textContent)"
           onkeydown="if(event.key==='Enter'){event.preventDefault();this.blur()}">${s.name}</div>
      <span class="space-row-badge">${s.widgets.length} widgets</span>
      ${spaces.length > 1 ? `<button class="space-row-del" onclick="deleteSpace(${i})"><i class="fas fa-times"></i></button>` : ''}
    `;
    row.addEventListener('click', e => {
      if (e.target.isContentEditable || e.target.closest('.space-row-del')) return;
      switchSpace(i); closeAllSheets();
    });
    list.appendChild(row);
  });
  const addBtn = document.createElement('button');
  addBtn.className = 'spaces-add-btn';
  addBtn.innerHTML = '<i class="fas fa-plus"></i> New Space';
  addBtn.addEventListener('click', addSpace);
  list.appendChild(addBtn);
}

function switchSpace(idx) {
  currentSpaceIdx = idx;
  renderWidgets();
  applyBg();
  updateTopbarTitle();
  save();
}

function addSpace() {
  spaces.push({
    id: spaces.length,
    name: `Space ${spaces.length + 1}`,
    widgets: [],
    bg: defaultBg()
  });
  switchSpace(spaces.length - 1);
  renderSpacesDrawer();
}

function renameSpace(idx, name) {
  spaces[idx].name = name.trim() || `Space ${idx + 1}`;
  updateTopbarTitle();
  save();
}

function deleteSpace(idx) {
  if (spaces.length <= 1) return;
  spaces.splice(idx, 1);
  if (currentSpaceIdx >= spaces.length) currentSpaceIdx = spaces.length - 1;
  switchSpace(currentSpaceIdx);
  renderSpacesDrawer();
}

function updateTopbarTitle() {
  const s = currentSpace();
  document.getElementById('spaces-pill-name').textContent = s.name;
  document.getElementById('topbar-title').textContent = s.name;
}

function defaultBg() {
  return { type: 'gradient', value: 'linear-gradient(135deg,#0a0a0a 0%,#111 100%)', blur: 0, brightness: 100, dim: 0, parallax: false };
}

// ═══════════════════════════════════════════════════════════
// BACKGROUND
// ═══════════════════════════════════════════════════════════
const BG_PRESETS = [
  { label: 'Void',   value: 'linear-gradient(135deg,#0a0a0a 0%,#111 100%)' },
  { label: 'Ocean',  value: 'linear-gradient(135deg,#0a1628 0%,#0d2a4a 50%,#072040 100%)' },
  { label: 'Forest', value: 'linear-gradient(135deg,#0a1a0f 0%,#0f2a18 50%,#081508 100%)' },
  { label: 'Dusk',   value: 'linear-gradient(135deg,#1a0a1e 0%,#2a0d3a 40%,#1a0828 100%)' },
  { label: 'Ember',  value: 'linear-gradient(135deg,#1a0800 0%,#2d1100 50%,#1a0600 100%)' },
  { label: 'Steel',  value: 'linear-gradient(135deg,#0d1117 0%,#161b22 50%,#0d1117 100%)' },
  { label: 'Slate',  value: 'linear-gradient(135deg,#131619 0%,#1c2028 100%)' },
  { label: 'Noir',   value: 'linear-gradient(160deg,#050505 0%,#0c0c0c 100%)' },
];

function renderPresets() {
  const grid = document.getElementById('presetGrid');
  grid.innerHTML = '';
  BG_PRESETS.forEach(p => {
    const sw = document.createElement('div');
    sw.className = 'preset-swatch' + (currentSpace().bg.value === p.value ? ' active' : '');
    sw.style.background = p.value;
    sw.title = p.label;
    sw.addEventListener('click', () => {
      document.querySelectorAll('.preset-swatch').forEach(s => s.classList.remove('active'));
      sw.classList.add('active');
      const bg = currentSpace().bg;
      bg.type = 'gradient'; bg.value = p.value;
      applyBg(); save();
    });
    grid.appendChild(sw);
  });
}

function applyBg() {
  const bg = currentSpace().bg;
  const layer = document.getElementById('bg-layer');
  const overlay = document.getElementById('bg-overlay');
  if (bg.type === 'gradient') {
    layer.style.background = bg.value;
    layer.style.backgroundSize = '';
  } else if (bg.type === 'image') {
    layer.style.background = `url('${bg.value}') center/cover no-repeat`;
  }
  layer.style.filter = `blur(${bg.blur || 0}px) brightness(${bg.brightness || 100}%)`;
  overlay.style.background = `rgba(0,0,0,${(bg.dim || 0) / 100})`;
  document.getElementById('parallaxToggle').checked = bg.parallax || false;
  document.getElementById('blurSlider').value = bg.blur || 0;
  document.getElementById('brightnessSlider').value = bg.brightness || 100;
  document.getElementById('dimSlider').value = bg.dim || 0;
}

['blur','brightness','dim'].forEach(type => {
  document.getElementById(type + 'Slider').addEventListener('input', e => {
    currentSpace().bg[type] = parseInt(e.target.value);
    applyBg(); save();
  });
});

document.getElementById('parallaxToggle').addEventListener('change', e => {
  currentSpace().bg.parallax = e.target.checked;
  save();
  if (e.target.checked) startParallax(); else stopParallax();
});

// Gyroscope parallax
let parallaxActive = false;
function startParallax() {
  if (parallaxActive) return;
  if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
    DeviceOrientationEvent.requestPermission().then(r => { if (r === 'granted') enableParallax(); });
  } else { enableParallax(); }
}
function enableParallax() {
  parallaxActive = true;
  window.addEventListener('deviceorientation', onDeviceOrientation, { passive: true });
}
function stopParallax() {
  parallaxActive = false;
  window.removeEventListener('deviceorientation', onDeviceOrientation);
  document.getElementById('bg-layer').style.transform = '';
}
function onDeviceOrientation(e) {
  const x = Math.max(-15, Math.min(15, e.gamma || 0));
  const y = Math.max(-15, Math.min(15, (e.beta || 0) - 45));
  document.getElementById('bg-layer').style.transform = `translate(${x * 0.4}px, ${y * 0.4}px) scale(1.04)`;
}

document.getElementById('bgUpload').addEventListener('change', e => {
  const f = e.target.files[0]; if (!f) return;
  const r = new FileReader();
  r.onload = ev => {
    const bg = currentSpace().bg;
    bg.type = 'image'; bg.value = ev.target.result;
    applyBg(); save(); renderPresets();
  };
  r.readAsDataURL(f);
});

// ═══════════════════════════════════════════════════════════
// EDIT MODE
// ═══════════════════════════════════════════════════════════
function toggleEditMode() {
  editMode = !editMode;
  document.getElementById('widgets-layer').classList.toggle('edit-mode', editMode);
  const btn = document.getElementById('editToggle');
  btn.classList.toggle('active', editMode);
  btn.querySelector('i').className = editMode ? 'fas fa-lock-open' : 'fas fa-pen-to-square';
  document.getElementById('snapBtn').classList.toggle('active', editMode && snapEnabled);
}

function toggleSnap() {
  snapEnabled = !snapEnabled;
  document.getElementById('snapBtn').classList.toggle('active', snapEnabled);
}

// ═══════════════════════════════════════════════════════════
// WIDGET RENDERING
// ═══════════════════════════════════════════════════════════
function renderWidgets() {
  const inner = document.getElementById('widgetsInner');
  inner.innerHTML = '';
  currentSpace().widgets.forEach(w => {
    const el = buildWidgetEl(w);
    if (el) inner.appendChild(el);
  });
  initReorder();
}

function buildWidgetEl(w) {
  const el = document.createElement('div');
  el.className = 'widget ' + w.type + '-widget';
  el.dataset.id = w.id;
  if (w.color) el.dataset.color = w.color;

  // Move bar (edit mode handle)
  const moveBar = document.createElement('div');
  moveBar.className = 'widget-move-bar';
  moveBar.setAttribute('draggable', 'true');
  moveBar.innerHTML = `
    <div class="move-dots">
      <span></span><span></span><span></span>
      <span></span><span></span><span></span>
    </div>
    <div class="widget-move-actions">
      <button class="wmove-btn danger" onclick="deleteWidget('${w.id}')" title="Delete"><i class="fas fa-trash-alt"></i></button>
    </div>
  `;
  el.appendChild(moveBar);

  // Inner content
  const inner = buildWidgetInner(w);
  el.appendChild(inner);

  // Drag events for reorder
  el.setAttribute('draggable', 'false'); // only move bar triggers drag
  moveBar.addEventListener('dragstart', e => {
    if (!editMode) { e.preventDefault(); return; }
    dragSrc = el;
    el.classList.add('dragging');
    e.dataTransfer.effectAllowed = 'move';
  });
  el.addEventListener('dragend', () => {
    el.classList.remove('dragging');
    document.querySelectorAll('.widget.drag-over').forEach(e => e.classList.remove('drag-over'));
    dragSrc = null;
    persistOrder();
  });
  el.addEventListener('dragover', e => {
    if (!editMode || !dragSrc || dragSrc === el) return;
    e.preventDefault();
    document.querySelectorAll('.widget.drag-over').forEach(e => e.classList.remove('drag-over'));
    el.classList.add('drag-over');
  });
  el.addEventListener('drop', e => {
    if (!editMode || !dragSrc || dragSrc === el) return;
    e.preventDefault();
    el.classList.remove('drag-over');
    const container = document.getElementById('widgetsInner');
    const els = [...container.querySelectorAll('.widget')];
    const srcIdx = els.indexOf(dragSrc), dstIdx = els.indexOf(el);
    if (srcIdx < dstIdx) container.insertBefore(dragSrc, el.nextSibling);
    else container.insertBefore(dragSrc, el);
    persistOrder();
  });

  // Touch reorder
  setupTouchReorder(el, moveBar);

  return el;
}

function persistOrder() {
  const els = document.querySelectorAll('#widgetsInner .widget');
  const newOrder = [...els].map(el => findWidget(el.dataset.id)).filter(Boolean);
  currentSpace().widgets = newOrder;
  save();
}

function buildWidgetInner(w) {
  const wrap = document.createElement('div');

  if (w.type === 'note') {
    wrap.innerHTML = `
      <div class="widget-header">
        <i class="fas fa-sticky-note"></i>Note
      </div>
      <textarea class="note-body" placeholder="Write something...">${w.content || ''}</textarea>
      <div class="note-colors">
        ${['yellow','green','blue','purple','red'].map(c =>
          `<div class="note-color-dot${w.color===c?' active':''}"
               style="background:${colorHex(c)}"
               onclick="setNoteColor('${w.id}','${c}')"></div>`
        ).join('')}
      </div>
    `;
    const ta = wrap.querySelector('textarea');
    ta.addEventListener('input', () => { updateWidgetData(w.id, { content: ta.value }); });
  }

  else if (w.type === 'clock') {
    wrap.innerHTML = `
      <div class="widget-header"><i class="fas fa-clock"></i>Clock</div>
      <div class="clock-display">
        <div class="clock-time" id="clock-${w.id}">--:--:--</div>
        <div class="clock-date" id="clockdate-${w.id}"></div>
      </div>
    `;
    tickClock(w.id);
  }

  else if (w.type === 'todo') {
    const items = w.items || [];
    wrap.innerHTML = `
      <div class="widget-header"><i class="fas fa-check-square"></i>To-Do</div>
      <div class="todo-body">
        <div class="todo-items">
          ${items.map(item => `
            <div class="todo-item" data-tid="${item.id}">
              <div class="todo-checkbox${item.done?' checked':''}" onclick="toggleTodo('${w.id}','${item.id}')"></div>
              <div class="todo-text${item.done?' done':''}" contenteditable="true"
                   onblur="editTodo('${w.id}','${item.id}',this.textContent)">${item.text}</div>
              <button class="todo-del" onclick="deleteTodo('${w.id}','${item.id}')"><i class="fas fa-times"></i></button>
            </div>
          `).join('')}
        </div>
        <div class="todo-add-row">
          <input class="todo-add-input" placeholder="Add item…" data-wid="${w.id}"
                 onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();addTodoItem('${w.id}',this)}">
          <button class="todo-add-btn" onclick="addTodoItem('${w.id}',this.previousElementSibling)">
            <i class="fas fa-plus"></i>
          </button>
        </div>
      </div>
    `;
  }

  else if (w.type === 'image') {
    const hasImg = w.url && w.url.length > 0;
    wrap.innerHTML = `
      <div class="image-body">
        ${hasImg
          ? `<img src="${w.url}" alt="Image"><div class="image-tap-hint"><i class="fas fa-camera"></i> Change</div>`
          : `<div class="image-placeholder" onclick="triggerImageUpload('${w.id}')">
               <i class="fas fa-image"></i>
               <span>Tap to upload image</span>
             </div>`
        }
      </div>
      <input type="file" class="image-upload-input" id="imgup-${w.id}" accept="image/*">
    `;
    const inp = wrap.querySelector(`#imgup-${w.id}`);
    inp.addEventListener('change', e => {
      const f = e.target.files[0]; if (!f) return;
      const r = new FileReader();
      r.onload = ev => { updateWidgetData(w.id, { url: ev.target.result }); renderWidgets(); save(); };
      r.readAsDataURL(f);
    });
    if (hasImg) {
      wrap.querySelector('.image-body').addEventListener('click', () => {
        if (editMode) triggerImageUpload(w.id);
      });
    }
  }

  else if (w.type === 'quote') {
    wrap.innerHTML = `
      <div class="widget-header"><i class="fas fa-quote-right"></i>Quote</div>
      <div class="quote-body">
        <div class="quote-text" contenteditable="true"
             onblur="updateWidgetData('${w.id}',{content:this.textContent})">${w.content || 'Your quote here...'}</div>
        <div class="quote-author" contenteditable="true"
             onblur="updateWidgetData('${w.id}',{author:this.textContent})">— ${w.author || 'Author'}</div>
      </div>
    `;
  }

  else if (w.type === 'spotify') {
    if (w.embedUrl) {
      wrap.innerHTML = `<iframe src="${w.embedUrl}" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" loading="lazy"></iframe>`;
    } else {
      wrap.innerHTML = `
        <div class="widget-header"><i class="fab fa-spotify" style="color:#1DB954"></i>Spotify</div>
        <div class="spotify-input-body">
          <div style="font-size:13px;color:var(--text2);">Paste a Spotify track or playlist URL:</div>
          <input class="spotify-url-input" placeholder="https://open.spotify.com/…" id="sp-${w.id}"
                 inputmode="url" autocomplete="off" autocorrect="off">
          <button class="spotify-load-btn" onclick="loadSpotify('${w.id}')">Load</button>
        </div>
      `;
    }
  }

  return wrap;
}

// ═══════════════════════════════════════════════════════════
// TOUCH REORDER
// ═══════════════════════════════════════════════════════════
function setupTouchReorder(el, handle) {
  let startY, startScrollTop, isTouchDrag = false, clone = null, placeholder = null;
  const container = () => document.getElementById('widgetsInner');

  handle.addEventListener('touchstart', e => {
    if (!editMode) return;
    startY = e.touches[0].clientY;
    startScrollTop = document.getElementById('widgets-layer').scrollTop;
    isTouchDrag = false;

    const rect = el.getBoundingClientRect();
    // Create ghost clone
    clone = el.cloneNode(true);
    clone.style.cssText = `position:fixed;top:${rect.top}px;left:${rect.left}px;width:${rect.width}px;opacity:0.85;z-index:999;pointer-events:none;transform:scale(1.02);transition:none;box-shadow:0 20px 60px rgba(0,0,0,0.8);border:1px solid var(--accent);border-radius:16px;`;
    document.body.appendChild(clone);

    // Placeholder
    placeholder = document.createElement('div');
    placeholder.style.cssText = `height:${rect.height}px;border:2px dashed var(--border2);border-radius:16px;opacity:0.4;transition:none;`;
    el.parentNode.insertBefore(placeholder, el);
    el.style.display = 'none';
  }, { passive: true });

  handle.addEventListener('touchmove', e => {
    if (!editMode || !clone) return;
    isTouchDrag = true;
    const touch = e.touches[0];
    const dy = touch.clientY - startY;
    const rect = clone.getBoundingClientRect();
    clone.style.top = (parseFloat(clone.style.top) + (touch.clientY - (parseFloat(clone.style.top) + rect.height/2) - rect.height/2)) + 'px';
    clone.style.top = touch.clientY - (clone.getBoundingClientRect().height / 2) + 'px';

    // Find target
    const widgets = [...container().querySelectorAll('.widget:not([style*="display: none"])')];
    let target = null;
    for (const w of widgets) {
      const r = w.getBoundingClientRect();
      if (touch.clientY > r.top && touch.clientY < r.bottom) { target = w; break; }
    }
    if (target && target !== el) {
      const r = target.getBoundingClientRect();
      if (touch.clientY < r.top + r.height / 2) {
        container().insertBefore(placeholder, target);
      } else {
        container().insertBefore(placeholder, target.nextSibling);
      }
    }
  }, { passive: true });

  handle.addEventListener('touchend', e => {
    if (!isTouchDrag || !clone) { cleanup(); return; }
    container().insertBefore(el, placeholder);
    el.style.display = '';
    cleanup();
    persistOrder();
  });

  function cleanup() {
    if (clone) { clone.remove(); clone = null; }
    if (placeholder) { placeholder.remove(); placeholder = null; }
    el.style.display = '';
    isTouchDrag = false;
  }
}

function initReorder() {
  // drag events are set in buildWidgetEl
}

// ═══════════════════════════════════════════════════════════
// ADD WIDGET
// ═══════════════════════════════════════════════════════════
const DEFAULTS = {
  note:    { width: 0, height: 0, content: '', color: 'yellow' },
  clock:   { width: 0, height: 0 },
  todo:    { width: 0, height: 0, items: [] },
  image:   { width: 0, height: 0, url: '' },
  quote:   { width: 0, height: 0, content: 'Your quote here...', author: 'Author' },
  spotify: { width: 0, height: 0, embedUrl: '' },
};

function addWidget(type) {
  const def = DEFAULTS[type] || {};
  const w = { id: uid(), type, z: ++zCounter, ...def, ...(def.items ? { items: [] } : {}) };
  currentSpace().widgets.push(w);
  const inner = document.getElementById('widgetsInner');
  const el = buildWidgetEl(w);
  if (el) inner.appendChild(el);
  // Scroll to new widget
  setTimeout(() => el.scrollIntoView({ behavior: 'smooth', block: 'start' }), 100);
  save();
}

// ═══════════════════════════════════════════════════════════
// WIDGET OPERATIONS
// ═══════════════════════════════════════════════════════════
function findWidget(id) { return currentSpace().widgets.find(w => w.id === id); }

function updateWidgetData(id, patch) {
  const w = findWidget(id); if (!w) return;
  Object.assign(w, patch); save();
}

function deleteWidget(id) {
  const sp = currentSpace();
  sp.widgets = sp.widgets.filter(w => w.id !== id);
  const el = document.querySelector(`.widget[data-id="${id}"]`);
  if (el) { el.style.animation = 'widgetOut 0.18s ease forwards'; setTimeout(() => el.remove(), 180); }
  save();
}

function colorHex(c) {
  const m = { yellow:'#ffd54f', green:'#4caf50', blue:'#4f9eff', purple:'#a56fd4', red:'#ef4444' };
  return m[c] || '#fff';
}

window.setNoteColor = function(id, color) {
  const w = findWidget(id); if (!w) return;
  w.color = color;
  const el = document.querySelector(`.widget[data-id="${id}"]`);
  if (el) {
    el.dataset.color = color;
    el.querySelectorAll('.note-color-dot').forEach((dot, i) => {
      dot.classList.toggle('active', ['yellow','green','blue','purple','red'][i] === color);
    });
  }
  save();
};

window.toggleTodo = function(wid, tid) {
  const w = findWidget(wid); if (!w || !w.items) return;
  const item = w.items.find(i => i.id === tid); if (!item) return;
  item.done = !item.done;
  const box = document.querySelector(`.todo-item[data-tid="${tid}"] .todo-checkbox`);
  const txt = document.querySelector(`.todo-item[data-tid="${tid}"] .todo-text`);
  if (box) box.classList.toggle('checked', item.done);
  if (txt) txt.classList.toggle('done', item.done);
  save();
};

window.addTodoItem = function(wid, input) {
  const text = input.value.trim(); if (!text) return;
  const w = findWidget(wid); if (!w) return;
  if (!w.items) w.items = [];
  const item = { id: uid(), text, done: false };
  w.items.push(item);
  input.value = '';
  const container = input.closest('.todo-body').querySelector('.todo-items');
  const div = document.createElement('div');
  div.className = 'todo-item'; div.dataset.tid = item.id;
  div.innerHTML = `
    <div class="todo-checkbox" onclick="toggleTodo('${wid}','${item.id}')"></div>
    <div class="todo-text" contenteditable="true"
         onblur="editTodo('${wid}','${item.id}',this.textContent)">${item.text}</div>
    <button class="todo-del" onclick="deleteTodo('${wid}','${item.id}')"><i class="fas fa-times"></i></button>
  `;
  container.appendChild(div);
  save();
};

window.editTodo = function(wid, tid, text) {
  const w = findWidget(wid); if (!w || !w.items) return;
  const item = w.items.find(i => i.id === tid); if (!item) return;
  item.text = text.trim(); save();
};

window.deleteTodo = function(wid, tid) {
  const w = findWidget(wid); if (!w || !w.items) return;
  w.items = w.items.filter(i => i.id !== tid);
  const el = document.querySelector(`.todo-item[data-tid="${tid}"]`);
  if (el) el.remove();
  save();
};

window.triggerImageUpload = function(id) {
  const inp = document.getElementById('imgup-' + id);
  if (inp) inp.click();
};

window.loadSpotify = function(id) {
  const inp = document.getElementById('sp-' + id); if (!inp) return;
  const url = inp.value.trim(); if (!url) return;
  let embedUrl = url;
  const m = url.match(/open\.spotify\.com\/(track|album|playlist|episode)\/([A-Za-z0-9]+)/);
  if (m) embedUrl = `https://open.spotify.com/embed/${m[1]}/${m[2]}?utm_source=generator`;
  updateWidgetData(id, { embedUrl });
  renderWidgets(); save();
};

// ═══════════════════════════════════════════════════════════
// CLOCK
// ═══════════════════════════════════════════════════════════
function tickClock(id) {
  function update() {
    const el = document.getElementById('clock-' + id); if (!el) return;
    const now = new Date();
    el.textContent = [now.getHours(), now.getMinutes(), now.getSeconds()]
      .map(n => String(n).padStart(2,'0')).join(':');
    const de = document.getElementById('clockdate-' + id);
    if (de) de.textContent = now.toLocaleDateString('en-US', { weekday:'short', month:'short', day:'numeric' });
    setTimeout(update, 1000);
  }
  update();
}

// ═══════════════════════════════════════════════════════════
// EXPORT / IMPORT
// ═══════════════════════════════════════════════════════════
window.exportLayout = function() {
  const blob = new Blob([JSON.stringify(spaces, null, 2)], { type: 'application/json' });
  const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
  a.download = 'myspace-layout.json'; a.click();
};

document.getElementById('importFile').addEventListener('change', e => {
  const f = e.target.files[0]; if (!f) return;
  const r = new FileReader();
  r.onload = ev => {
    try {
      spaces = JSON.parse(ev.target.result);
      currentSpaceIdx = 0;
      switchSpace(0); save(); closeAllSheets();
    } catch(err) { alert('Invalid layout file.'); }
  };
  r.readAsText(f);
});

// ═══════════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════════
load();
if (!spaces || spaces.length === 0) {
  spaces = [{ id: 0, name: 'Main', widgets: [], bg: defaultBg() }];
}

if (currentSpace().widgets.length === 0) {
  currentSpace().widgets = [
    { id: uid(), type: 'clock', z: 10 },
    { id: uid(), type: 'note', z: 11, color: 'yellow', content: 'Welcome to My Space 🌙\n\nTap the pencil to edit. Tap + to add widgets.' },
    { id: uid(), type: 'todo', z: 12, items: [
      { id: uid(), text: 'Customize your space', done: false },
      { id: uid(), text: 'Try a background preset', done: false },
      { id: uid(), text: 'Add a Spotify widget', done: false },
    ]},
    { id: uid(), type: 'quote', z: 13, content: 'The space between who you are and who you want to be is where the magic happens.', author: 'Unknown' },
  ];
}

switchSpace(currentSpaceIdx);
</script>
