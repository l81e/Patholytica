<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Patholytica — Batch Create</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg: #0f0f0f;
            --text: #f1f1f1;
            --sub: #aaa;
            --card: #181818;
            --hover: #222;
            --border: #2a2a2a;
            --accent: #3ea6ff;
            --accent-h: #2d8ed6;
            --success: #2ecc71;
            --error: #e74c3c;
            --warning: #f39c12;
        }
        body.light {
            --bg: #f9f9f9; --text: #0f0f0f; --sub: #606060;
            --card: #fff; --hover: #f0f0f0; --border: #e0e0e0;
            --accent: #065fd4; --accent-h: #0448a3;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg); color: var(--text);
            transition: background .2s, color .2s;
        }

        .app {
            position: fixed; top:0; left:50%; transform:translateX(-50%);
            width:100%; max-width:480px; height:100vh;
            background: var(--bg); display:flex; flex-direction:column;
            overflow:hidden;
        }

        /* Header */
        .header {
            padding: 14px 18px;
            border-bottom: 1px solid var(--border);
            display:flex; align-items:center; justify-content:space-between;
            flex-shrink: 0;
            background: var(--bg);
        }
        .header-left { display:flex; align-items:center; gap:12px; }
        .back-btn, .theme-btn {
            width:36px; height:36px; border-radius:50%;
            background:var(--hover); border:1px solid var(--border);
            color:var(--text); cursor:pointer;
            display:flex; align-items:center; justify-content:center;
            font-size:14px; transition:background .2s;
        }
        .back-btn:hover, .theme-btn:hover { background:var(--border); }
        .header-title { font-size:15px; font-weight:700; }
        .header-sub { font-size:11px; color:var(--sub); margin-top:1px; }

        /* Body split */
        .body {
            flex:1; display:flex; flex-direction:column;
            overflow:hidden; padding:16px;
            gap:14px;
        }

        /* Format hint */
        .format-hint {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius:10px;
            padding:10px 14px;
            flex-shrink:0;
        }
        .format-hint-title {
            font-size:10px; font-weight:700; letter-spacing:.08em;
            text-transform:uppercase; color:var(--sub); margin-bottom:6px;
        }
        .format-hint code {
            font-size:11px; color:var(--accent);
            background: rgba(62,166,255,.1);
            padding:2px 6px; border-radius:4px;
            font-family: 'SF Mono', 'Fira Code', monospace;
            display:block; line-height:1.7; word-break:break-all;
        }

        /* Textarea */
        .textarea-wrap { flex:1; position:relative; min-height:0; }
        .big-input {
            width:100%; height:100%;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius:12px;
            padding:16px;
            font-size:14px; line-height:1.7;
            color:var(--text);
            font-family: 'SF Mono', 'Fira Code', monospace;
            resize:none; outline:none;
            transition:border-color .2s;
        }
        .big-input:focus { border-color:var(--accent); }
        .big-input::placeholder { color:var(--sub); opacity:.5; font-style:italic; }

        /* Counter */
        .input-meta {
            position:absolute; bottom:10px; right:12px;
            font-size:10px; color:var(--sub); pointer-events:none;
        }
        .input-meta span { color:var(--accent); font-weight:700; }

        /* Buttons */
        .btn-row {
            display:flex; gap:10px; flex-shrink:0;
            padding-bottom: calc(env(safe-area-inset-bottom));
        }
        .btn {
            flex:1; padding:14px;
            border-radius:12px; border:none;
            font-size:14px; font-weight:700;
            cursor:pointer; transition:all .2s;
            display:flex; align-items:center; justify-content:center; gap:8px;
        }
        .btn-preview {
            background:var(--hover); color:var(--text);
            border:1px solid var(--border);
        }
        .btn-preview:hover { background:var(--border); }
        .btn-publish {
            background:var(--accent); color:#fff;
        }
        .btn-publish:hover { background:var(--accent-h); transform:translateY(-1px); }
        .btn:disabled { opacity:.4; cursor:not-allowed; transform:none !important; }

        /* Preview panel (slides up) */
        .preview-overlay {
            position:fixed; inset:0;
            background:rgba(0,0,0,.75);
            backdrop-filter:blur(6px);
            z-index:200;
            display:none; align-items:flex-end; justify-content:center;
        }
        .preview-overlay.show { display:flex; }
        .preview-sheet {
            background:var(--bg);
            border-radius:20px 20px 0 0;
            border:1px solid var(--border);
            width:100%; max-width:480px;
            max-height:88vh;
            display:flex; flex-direction:column;
            animation:slideUp .3s cubic-bezier(.4,0,.2,1);
            padding-bottom: env(safe-area-inset-bottom);
        }
        @keyframes slideUp {
            from { transform:translateY(100%); opacity:0; }
            to   { transform:translateY(0);    opacity:1; }
        }
        .preview-handle {
            width:36px; height:4px; background:var(--border);
            border-radius:2px; margin:14px auto 0;
            flex-shrink:0;
        }
        .preview-header {
            padding:14px 18px 10px;
            display:flex; align-items:center; justify-content:space-between;
            border-bottom:1px solid var(--border);
            flex-shrink:0;
        }
        .preview-header-title {
            font-size:15px; font-weight:700;
        }
        .preview-count {
            font-size:12px; font-weight:700;
            background:var(--accent); color:#fff;
            padding:3px 10px; border-radius:20px;
        }
        .close-preview {
            width:32px; height:32px; border-radius:50%;
            background:var(--hover); border:1px solid var(--border);
            color:var(--text); cursor:pointer;
            display:flex; align-items:center; justify-content:center; font-size:13px;
        }
        .preview-list {
            flex:1; overflow-y:auto; padding:14px;
            display:flex; flex-direction:column; gap:10px;
        }
        .preview-list::-webkit-scrollbar { width:3px; }
        .preview-list::-webkit-scrollbar-thumb { background:var(--border); border-radius:2px; }

        /* Preview cards */
        .preview-card {
            background:var(--card);
            border:1px solid var(--border);
            border-radius:12px;
            padding:14px;
            position:relative;
        }
        .preview-card-num {
            position:absolute; top:10px; right:12px;
            font-size:10px; font-weight:700; letter-spacing:.06em;
            color:var(--sub); background:var(--hover);
            padding:2px 8px; border-radius:8px;
        }
        .preview-card-title {
            font-size:15px; font-weight:800;
            line-height:1.3; margin-bottom:8px;
            padding-right:44px;
            letter-spacing:-.01em;
        }
        .preview-card-body {
            font-size:13px; line-height:1.65;
            color:var(--sub);
            white-space:pre-wrap; word-break:break-word;
        }
        .preview-card.error-card {
            border-color:var(--error);
        }
        .preview-card.error-card .preview-card-title {
            color:var(--error);
        }

        /* Publish from preview */
        .preview-footer {
            padding:12px 14px;
            border-top:1px solid var(--border);
            display:flex; gap:10px;
            flex-shrink:0;
        }

        /* Progress overlay */
        .progress-overlay {
            position:fixed; inset:0;
            background:rgba(0,0,0,.65);
            backdrop-filter:blur(4px);
            z-index:400;
            display:none; align-items:center; justify-content:center;
        }
        .progress-overlay.show { display:flex; }
        .progress-box {
            background:var(--card); border:1px solid var(--border);
            border-radius:16px; padding:32px 28px;
            text-align:center; width:260px;
        }
        .progress-spinner {
            width:44px; height:44px;
            border:3px solid var(--border); border-top-color:var(--accent);
            border-radius:50%; animation:spin .8s linear infinite;
            margin:0 auto 16px;
        }
        @keyframes spin { to { transform:rotate(360deg); } }
        .progress-label { font-size:14px; font-weight:700; margin-bottom:4px; }
        .progress-sub { font-size:12px; color:var(--sub); }
        .progress-bar-wrap {
            margin-top:14px; background:var(--hover);
            border-radius:4px; height:6px; overflow:hidden;
        }
        .progress-bar {
            height:100%; background:var(--accent);
            border-radius:4px; transition:width .3s ease;
            width:0%;
        }

        /* Notification */
        .notif {
            position:fixed; top:70px; left:50%; transform:translateX(-50%);
            background:var(--card); border:1px solid var(--border);
            border-radius:10px; padding:13px 18px;
            box-shadow:0 8px 32px rgba(0,0,0,.4);
            z-index:500; display:none; align-items:center; gap:10px;
            min-width:260px; max-width:360px;
        }
        .notif.show { display:flex; animation:notifIn .25s ease; }
        .notif.success { border-left:3px solid var(--success); }
        .notif.error   { border-left:3px solid var(--error); }
        .notif.warning { border-left:3px solid var(--warning); }
        .notif i { font-size:17px; }
        .notif.success i { color:var(--success); }
        .notif.error   i { color:var(--error); }
        .notif.warning i { color:var(--warning); }
        .notif span { font-size:13px; font-weight:500; }
        @keyframes notifIn {
            from { transform:translateX(-50%) translateY(-16px); opacity:0; }
            to   { transform:translateX(-50%) translateY(0); opacity:1; }
        }

        @media (max-width:480px) {
            .notif { left:12px; right:12px; transform:none; min-width:auto; }
            .notif.show { animation:notifInM .25s ease; }
            @keyframes notifInM {
                from { transform:translateY(-16px); opacity:0; }
                to   { transform:translateY(0); opacity:1; }
            }
        }
    </style>
</head>
<body>

<div class="app">
    <div class="header">
        <div class="header-left">
            <button class="back-btn" onclick="goBack()"><i class="fas fa-arrow-left"></i></button>
            <div>
                <div class="header-title">Batch Create</div>
                <div class="header-sub">Multiple articles at once</div>
            </div>
        </div>
        <button class="theme-btn" onclick="toggleTheme()"><i class="fas fa-circle-half-stroke"></i></button>
    </div>

    <div class="body">
        <!-- Format hint -->
        <div class="format-hint">
            <div class="format-hint-title">Format</div>
            <code>art1:[Title]:[Content]::art2:[Title]:[Content]::art3:…</code>
        </div>

        <!-- Big textarea -->
        <div class="textarea-wrap">
            <textarea class="big-input" id="batchInput"
                placeholder="art1:Introduction to Pathology:Pathology is the study of disease and its causes...::art2:Cell Biology Basics:Cells are the fundamental unit of life..."
                oninput="onInput()"></textarea>
            <div class="input-meta"><span id="artCount">0</span> articles detected</div>
        </div>

        <!-- Action buttons -->
        <div class="btn-row">
            <button class="btn btn-preview" id="previewBtn" onclick="openPreview()" disabled>
                <i class="fas fa-eye"></i> Preview
            </button>
            <button class="btn btn-publish" id="publishBtn" onclick="publishAll()" disabled>
                <i class="fas fa-paper-plane"></i> Publish All
            </button>
        </div>
    </div>
</div>

<!-- Preview sheet -->
<div class="preview-overlay" id="previewOverlay">
    <div class="preview-sheet">
        <div class="preview-handle"></div>
        <div class="preview-header">
            <div class="preview-header-title">Preview</div>
            <div style="display:flex;align-items:center;gap:8px;">
                <div class="preview-count" id="previewCount">0 articles</div>
                <button class="close-preview" onclick="closePreview()"><i class="fas fa-times"></i></button>
            </div>
        </div>
        <div class="preview-list" id="previewList"></div>
        <div class="preview-footer">
            <button class="btn btn-preview" style="flex:.6;" onclick="closePreview()">
                <i class="fas fa-pencil"></i> Edit
            </button>
            <button class="btn btn-publish" id="previewPublishBtn" onclick="publishAll(); closePreview();">
                <i class="fas fa-paper-plane"></i> Publish All
            </button>
        </div>
    </div>
</div>

<!-- Progress overlay -->
<div class="progress-overlay" id="progressOverlay">
    <div class="progress-box">
        <div class="progress-spinner"></div>
        <div class="progress-label" id="progressLabel">Publishing…</div>
        <div class="progress-sub" id="progressSub">Please wait</div>
        <div class="progress-bar-wrap">
            <div class="progress-bar" id="progressBar"></div>
        </div>
    </div>
</div>

<!-- Notification -->
<div class="notif" id="notif">
    <i class="fas fa-check-circle"></i>
    <span id="notifText"></span>
</div>

<script>
/* ── Helpers ─────────────────────────────────────────── */
function goBack() {
    if (document.referrer && document.referrer.includes(location.host)) history.back();
    else location.href = 'index.html';
}
function toggleTheme() {
    document.body.classList.toggle('light');
    localStorage.setItem('theme', document.body.classList.contains('light') ? 'light' : 'dark');
}
if (localStorage.getItem('theme') === 'light') document.body.classList.add('light');

function showNotif(msg, type = 'success') {
    const el = document.getElementById('notif');
    const icon = el.querySelector('i');
    document.getElementById('notifText').textContent = msg;
    el.className = `notif ${type} show`;
    icon.className = type === 'success' ? 'fas fa-check-circle'
                   : type === 'warning' ? 'fas fa-exclamation-triangle'
                   : 'fas fa-exclamation-circle';
    clearTimeout(el._t);
    el._t = setTimeout(() => el.classList.remove('show'), 4000);
}

function setProgress(label, sub, pct) {
    document.getElementById('progressLabel').textContent = label;
    document.getElementById('progressSub').textContent = sub;
    document.getElementById('progressBar').style.width = pct + '%';
}

/* ── Parser ──────────────────────────────────────────── */
/**
 * Parses:  art1:[Title]:[Content]::art2:[Title]:[Content]::…
 * Returns: [{ title, content }, …]  or  null if no valid articles found
 */
function parseInput(raw) {
    const raw_trimmed = raw.trim();
    if (!raw_trimmed) return [];

    // Split on :: separator
    const chunks = raw_trimmed.split('::');
    const results = [];

    for (const chunk of chunks) {
        const c = chunk.trim();
        if (!c) continue;

        // Match artN:[title]:[content]  — title & content may contain colons
        // We grab everything after the first colon as "rest", then split rest on first colon
        const prefixMatch = c.match(/^art\d+:([\s\S]+)$/i);
        if (!prefixMatch) continue;

        const rest = prefixMatch[1];
        // Split on first colon to separate title from content
        const colonIdx = rest.indexOf(':');
        if (colonIdx === -1) continue;

        const title   = rest.slice(0, colonIdx).trim();
        const content = rest.slice(colonIdx + 1).trim();

        if (!title && !content) continue;

        results.push({ title: title || '(no title)', content: content || '(no content)' });
    }

    return results;
}

/* ── Live input feedback ─────────────────────────────── */
function onInput() {
    const raw = document.getElementById('batchInput').value;
    const articles = parseInput(raw);
    const n = articles.length;
    document.getElementById('artCount').textContent = n;

    const hasValid = n > 0;
    document.getElementById('previewBtn').disabled  = !hasValid;
    document.getElementById('publishBtn').disabled  = !hasValid;
    document.getElementById('previewPublishBtn').disabled = !hasValid;
}

/* ── Preview ─────────────────────────────────────────── */
function openPreview() {
    const articles = parseInput(document.getElementById('batchInput').value);
    if (!articles.length) { showNotif('No valid articles found', 'warning'); return; }

    const list = document.getElementById('previewList');
    list.innerHTML = '';
    document.getElementById('previewCount').textContent =
        articles.length + (articles.length === 1 ? ' article' : ' articles');

    articles.forEach((art, i) => {
        const card = document.createElement('div');
        card.className = 'preview-card';
        card.innerHTML = `
            <div class="preview-card-num">art${i + 1}</div>
            <div class="preview-card-title">${escHtml(art.title)}</div>
            <div class="preview-card-body">${escHtml(art.content)}</div>
        `;
        list.appendChild(card);
    });

    document.getElementById('previewOverlay').classList.add('show');
}

function closePreview() {
    document.getElementById('previewOverlay').classList.remove('show');
}

document.getElementById('previewOverlay').addEventListener('click', function(e) {
    if (e.target === this) closePreview();
});

function escHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

/* ── Publish (wired up in module below) ─────────────────── */
// stub; replaced by module
window.publishAll = function() {
    showNotif('Auth not ready yet, try again in a second', 'warning');
};
</script>

<script type="module">
import { initializeApp }               from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

const firebaseConfig = {
    apiKey: "AIzaSyBs6V0yY14cuLBXB1nciZ-X0eyAiodC-Ak",
    authDomain: "patholytica.firebaseapp.com",
    databaseURL: "https://patholytica-default-rtdb.europe-west1.firebasedatabase.app",
    projectId: "patholytica",
    storageBucket: "patholytica.firebasestorage.app",
    messagingSenderId: "738430635282",
    appId: "1:738430635282:web:8451ef380447c7611137cb"
};

const app  = initializeApp(firebaseConfig);
const auth = getAuth(app);

const supabase = window.supabase.createClient(
    "https://vduqewqyvszfquntmark.supabase.co",
    "sb_publishable_YseP73aoHam8YT6B0b9EQQ_iAUEWARI"
);

let currentUser     = null;
let currentUserData = null;

onAuthStateChanged(auth, async (user) => {
    if (user) {
        currentUser = user;
        let { data: userData, error } = await supabase
            .from('users').select('*').eq('firebase_uid', user.uid).single();
        if (error && error.code !== 'PGRST116') { console.error(error); return; }
        if (!userData) {
            let { data: byEmail } = await supabase.from('users').select('*').eq('email', user.email).single();
            if (byEmail) {
                await supabase.from('users').update({ firebase_uid: user.uid }).eq('email', user.email);
                userData = { ...byEmail, firebase_uid: user.uid };
            } else {
                const { data: newU } = await supabase.from('users').insert([{
                    firebase_uid: user.uid, email: user.email,
                    full_name: user.displayName || user.email?.split('@')[0],
                    username: user.email?.split('@')[0] || 'user'
                }]).select('*').single();
                userData = newU;
            }
        }
        currentUserData = userData;
    } else {
        location.href = 'login.html';
    }
});

window.publishAll = async function() {
    if (!currentUser) { showNotif('Please log in first', 'error'); return; }

    const articles = parseInput(document.getElementById('batchInput').value);
    if (!articles.length) { showNotif('No valid articles found', 'warning'); return; }

    // Validate
    for (let i = 0; i < articles.length; i++) {
        if (articles[i].title.length > 60) {
            showNotif(`Article ${i+1}: title exceeds 60 chars`, 'error'); return;
        }
    }

    // Lock UI
    document.getElementById('publishBtn').disabled  = true;
    document.getElementById('previewBtn').disabled  = true;
    document.getElementById('previewPublishBtn').disabled = true;
    document.getElementById('progressOverlay').classList.add('show');

    const results = { ok: 0, fail: 0 };

    for (let i = 0; i < articles.length; i++) {
        const art = articles[i];
        const pct = Math.round(((i) / articles.length) * 100);
        setProgress(
            `Publishing article ${i + 1} of ${articles.length}`,
            `"${art.title.slice(0, 40)}${art.title.length > 40 ? '…' : ''}"`,
            pct
        );

        try {
            const { data: inserted, error: insErr } = await supabase
                .from('articles')
                .insert([{
                    title: art.title,
                    content: art.content,
                    firebase_user_id: currentUser.uid,
                    views: 0,
                    likes: 0
                }])
                .select().single();

            if (insErr) throw insErr;

            // Auto-library
            try {
                const userId = currentUserData?.user_id ?? currentUserData?.id ?? null;
                const { data: lib, error: libErr } = await supabase
                    .from('playlists')
                    .insert([{
                        name: art.title,
                        description: `Auto-created library for "${art.title}"`,
                        user_id: userId
                    }]).select().single();
                if (!libErr && lib) {
                    await supabase.from('playlist_items')
                        .insert([{ playlist_id: lib.id, article_id: inserted.id }]);
                }
            } catch(e) { /* non-fatal */ }

            results.ok++;
        } catch (err) {
            console.error(`Article ${i+1} failed:`, err);
            results.fail++;
        }
    }

    setProgress('Done!', '', 100);
    await new Promise(r => setTimeout(r, 600));

    document.getElementById('progressOverlay').classList.remove('show');
    document.getElementById('publishBtn').disabled  = false;
    document.getElementById('previewBtn').disabled  = false;
    document.getElementById('previewPublishBtn').disabled = false;

    if (results.fail === 0) {
        showNotif(`${results.ok} article${results.ok !== 1 ? 's' : ''} published!`, 'success');
        document.getElementById('batchInput').value = '';
        document.getElementById('artCount').textContent = '0';
    } else {
        showNotif(
            `${results.ok} published, ${results.fail} failed — check console`,
            results.ok > 0 ? 'warning' : 'error'
        );
    }
};
</script>

</body>
</html>
