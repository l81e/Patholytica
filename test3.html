const mu=()=>{ el.classList.remove(‘dragging’); document.removeEventListener(‘mousemove’,mm); document.removeEventListener(‘mouseup’,mu); State.save(); History.push(); };
document.addEventListener(‘mousemove’,mm);
document.addEventListener(‘mouseup’,mu);
});

// Touch
handle.addEventListener(‘touchstart’,e=>{
if(!State.editMode) return;
e.stopPropagation();
const t=e.touches[0];
el.classList.add(‘dragging’);
const move=startDrag(t.clientX,t.clientY); if(!move) return;
const mm=ev=>{ ev.preventDefault(); const t2=ev.touches[0]; move(t2.clientX,t2.clientY); };
const mu=()=>{ el.classList.remove(‘dragging’); document.removeEventListener(‘touchmove’,mm); document.removeEventListener(‘touchend’,mu); State.save(); History.push(); };
document.addEventListener(‘touchmove’,mm,{passive:false});
document.addEventListener(‘touchend’,mu);
},{passive:true});
}

function attachResize(handle, el, w) {
function startResize(clientX, clientY) {
const sw=w.width, sh=w.height, sx=clientX, sy=clientY;
return (cx,cy)=>{
w.width=snap(Math.max(140, sw+(cx-sx)/Viewport.scale));
w.height=snap(Math.max(70, sh+(cy-sy)/Viewport.scale));
el.style.width=w.width+‘px’; el.style.height=w.height+‘px’;
};
}

handle.addEventListener(‘mousedown’,e=>{
if(!State.editMode) return;
e.preventDefault(); e.stopPropagation();
const move=startResize(e.clientX,e.clientY);
const mm=ev=>move(ev.clientX,ev.clientY);
const mu=()=>{ document.removeEventListener(‘mousemove’,mm); document.removeEventListener(‘mouseup’,mu); State.save(); History.push(); };
document.addEventListener(‘mousemove’,mm);
document.addEventListener(‘mouseup’,mu);
});

handle.addEventListener(‘touchstart’,e=>{
if(!State.editMode) return;
e.preventDefault(); e.stopPropagation();
const t=e.touches[0];
const move=startResize(t.clientX,t.clientY);
const mm=ev=>{ ev.preventDefault(); const t2=ev.touches[0]; move(t2.clientX,t2.clientY); };
const mu=()=>{ document.removeEventListener(‘touchmove’,mm); document.removeEventListener(‘touchend’,mu); State.save(); History.push(); };
document.addEventListener(‘touchmove’,mm,{passive:false});
document.addEventListener(‘touchend’,mu);
},{passive:false});
}

function attachLongPress(el, w) {
let timer;
el.addEventListener(‘touchstart’,e=>{
timer=setTimeout(()=>{
const t=e.touches[0]; Ctx.show(t.clientX,t.clientY,w);
},550);
},{passive:true});
[‘touchmove’,‘touchend’].forEach(ev=>el.addEventListener(ev,()=>clearTimeout(timer),{passive:true}));
}

// ═══════════════════════════════════════════════════════════
// SELECT / Z
// ═══════════════════════════════════════════════════════════
function selectWidget(el,w) {
document.querySelectorAll(’.widget.selected’).forEach(e=>e.classList.remove(‘selected’));
el.classList.add(‘selected’);
w.z=++State.zCounter; el.style.zIndex=w.z;
}

// ═══════════════════════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════════════════════
const Render = {
all() {
const canvas=document.getElementById(‘canvas’);
// Remove only widgets (keep svg, snap-grid, draw-canvas)
canvas.querySelectorAll(’.widget’).forEach(e=>e.remove());
State.space.widgets.forEach(w=>{
const el=buildWidgetEl(w);
canvas.appendChild(el);
if(w.type===‘clock’) tickClock(w.id);
});
if(State.editMode) canvas.classList.add(‘edit-mode’);
},
one(id) {
const w=findW(id); if(!w) return;
const old=document.querySelector(`.widget[data-id="${id}"]`);
const el=buildWidgetEl(w);
if(old) old.replaceWith(el); else document.getElementById(‘canvas’).appendChild(el);
if(w.type===‘clock’) tickClock(id);
}
};

// ═══════════════════════════════════════════════════════════
// CONTEXT MENU
// ═══════════════════════════════════════════════════════════
const Ctx = {
target: null,
show(x,y,w) {
this.target=w;
document.getElementById(‘ctx-lock-label’).textContent=w.locked?‘Unlock’:‘Lock’;
document.getElementById(‘ctx-pin-label’).textContent=w.pinned?‘Unpin’:‘Pin’;
const m=document.getElementById(‘ctx-menu’);
m.style.display=‘block’; m.style.left=x+‘px’; m.style.top=y+‘px’;
const r=m.getBoundingClientRect();
if(r.right>window.innerWidth) m.style.left=(x-r.width)+‘px’;
if(r.bottom>window.innerHeight) m.style.top=(y-r.height)+‘px’;
},
hide() { document.getElementById(‘ctx-menu’).style.display=‘none’; this.target=null; },
action(act) {
const w=this.target; this.hide(); if(!w) return;
const el=document.querySelector(`.widget[data-id="${w.id}"]`);
if(act===‘delete’) deleteWidget(w.id);
else if(act===‘duplicate’) duplicateWidget(w);
else if(act===‘forward’) { w.z=++State.zCounter; if(el) el.style.zIndex=w.z; State.save(); }
else if(act===‘back’) { w.z=Math.max(1,(w.z||10)-2); if(el) el.style.zIndex=w.z; State.save(); }
else if(act===‘lock’) {
w.locked=!w.locked; if(el) el.classList.toggle(‘locked-note’,w.locked); State.save();
}
else if(act===‘pin’) { w.pinned=!w.pinned; toast(w.pinned?‘Pinned’:‘Unpinned’); State.save(); }
else if(act===‘connect’) {
if(!State.connectMode) {
State.connectMode=true; State.connectSource=w.id;
toast(‘Tap another widget to connect’); return;
}
}
}
};
document.addEventListener(‘click’,e=>{ if(!e.target.closest(’#ctx-menu’)) Ctx.hide(); });
document.addEventListener(‘touchstart’,e=>{ if(!e.target.closest(’#ctx-menu’)) Ctx.hide(); },{passive:true});

// ═══════════════════════════════════════════════════════════
// MIND-MAP CONNECTIONS
// ═══════════════════════════════════════════════════════════
const Connections = {
render() {
const svg=document.getElementById(‘connections-svg’);
svg.innerHTML=’’;
(State.space.connections||[]).forEach(c=>{
const a=findW(c.a), b=findW(c.b); if(!a||!b) return;
const ax=a.x+a.width/2, ay=a.y+a.height/2;
const bx=b.x+b.width/2, by=b.y+b.height/2;
const path=document.createElementNS(‘http://www.w3.org/2000/svg’,‘path’);
const mx=(ax+bx)/2;
path.setAttribute(‘d’,`M${ax},${ay} C${mx},${ay} ${mx},${by} ${bx},${by}`);
path.className.baseVal=‘connection-line’;
path.dataset.ca=c.a; path.dataset.cb=c.b;
path.addEventListener(‘click’,()=>{ State.space.connections=State.space.connections.filter(x=>!(x.a===c.a&&x.b===c.b)); Connections.render(); State.save(); });
svg.appendChild(path);
});
}
};

// Handle connect mode taps
document.getElementById(‘canvas’).addEventListener(‘click’,e=>{
if(!State.connectMode) return;
const wEl=e.target.closest(’.widget’);
if(!wEl) { State.connectMode=false; State.connectSource=null; return; }
const targetId=wEl.dataset.id;
if(targetId===State.connectSource) return;
if(!State.space.connections) State.space.connections=[];
const exists=State.space.connections.find(c=>(c.a===State.connectSource&&c.b===targetId)||(c.a===targetId&&c.b===State.connectSource));
if(!exists) { State.space.connections.push({a:State.connectSource,b:targetId}); Connections.render(); State.save(); toast(‘Connected!’); }
State.connectMode=false; State.connectSource=null;
});

// ═══════════════════════════════════════════════════════════
// DRAWING LAYER
// ═══════════════════════════════════════════════════════════
const Draw = (() => {
let ctx, drawing=false, tool=‘pen’, color=’#4f9eff’, size=3, lastX, lastY;
const canvas=()=>document.getElementById(‘draw-canvas’);

function init() {
ctx=canvas().getContext(‘2d’);
ctx.lineCap=‘round’; ctx.lineJoin=‘round’;
// Load saved drawing
loadFromSpace();
}

function loadFromSpace() {
if(!ctx) return;
ctx.clearRect(0,0,3000,3000);
const data=State.space.drawData;
if(data) { const img=new Image(); img.onload=()=>ctx.drawImage(img,0,0); img.src=data; }
}

function saveToSpace() {
State.space.drawData=canvas().toDataURL(‘image/png’);
State.save();
}

function setTool(t) {
tool=t;
document.getElementById(‘draw-pen-btn’).classList.toggle(‘on’,t===‘pen’);
document.getElementById(‘draw-erase-btn’).classList.toggle(‘on’,t===‘eraser’);
}

function setColor(el) {
color=el.dataset.c;
document.querySelectorAll(’.draw-color’).forEach(d=>d.classList.toggle(‘on’,d===el));
}

function clear() { ctx.clearRect(0,0,3000,3000); saveToSpace(); }

function toggle() {
const on=!canvas().classList.contains(‘drawing-mode’);
canvas().classList.toggle(‘drawing-mode’,on);
document.getElementById(‘draw-mode-btn’).classList.toggle(‘on’,on);
document.getElementById(‘draw-toolbar’).classList.toggle(‘show’,on);
State.drawMode=on;
}

function getPos(e,touch=false) {
const vp=Viewport;
const cl=touch?e.touches[0]:e;
return { x:(cl.clientX-vp.tx)/vp.scale, y:(cl.clientY-vp.ty)/vp.scale };
}

function down(x,y) {
drawing=true; lastX=x; lastY=y;
ctx.beginPath(); ctx.moveTo(x,y);
}

function move(x,y) {
if(!drawing) return;
if(tool===‘eraser’) { ctx.clearRect(x-size*3,y-size*3,size*6,size*6); return; }
ctx.strokeStyle=color; ctx.lineWidth=size;
ctx.lineTo(x,y); ctx.stroke();
ctx.beginPath(); ctx.moveTo(x,y);
}

function up() { if(drawing) { drawing=false; saveToSpace(); } }

// Mouse
canvas().addEventListener(‘mousedown’,e=>{if(State.drawMode){const p=getPos(e);down(p.x,p.y);}});
canvas().addEventListener(‘mousemove’,e=>{if(State.drawMode){const p=getPos(e);move(p.x,p.y);}});
canvas().addEventListener(‘mouseup’,()=>up());

// Touch
canvas().addEventListener(‘touchstart’,e=>{
if(!State.drawMode) return; e.preventDefault();
const p=getPos(e,true); down(p.x,p.y);
},{passive:false});
canvas().addEventListener(‘touchmove’,e=>{
if(!State.drawMode) return; e.preventDefault();
const p=getPos(e,true); move(p.x,p.y);
},{passive:false});
canvas().addEventListener(‘touchend’,()=>up());

document.getElementById(‘draw-size’).addEventListener(‘input’,e=>size=parseInt(e.target.value));

return { init, toggle, setTool, setColor, clear, loadFromSpace };
})();

// ═══════════════════════════════════════════════════════════
// SEARCH
// ═══════════════════════════════════════════════════════════
const Search = {
run(q) {
const res=document.getElementById(‘search-results’);
res.innerHTML=’’;
if(!q.trim()) return;
const hits=State.space.widgets.filter(w=>{
const content=(w.content||w.name||’’).toLowerCase();
const items=(w.items||[]).map(i=>i.text).join(’ ‘).toLowerCase();
return content.includes(q.toLowerCase())||items.includes(q.toLowerCase())||w.type.includes(q.toLowerCase());
});
if(!hits.length) { res.innerHTML=`<div style="font-size:13px;color:var(--text2);padding:8px">No results</div>`; return; }
hits.forEach(w=>{
const m=WIDGET_META[w.type];
const d=document.createElement(‘div’);
d.className=‘search-result’;
d.innerHTML=`<i class="${m.icon}"></i><span>${w.content?w.content.slice(0,50):m.label}</span>`;
d.addEventListener(‘click’,()=>{
UI.closeAll();
// Pan to widget
const vpCx=window.innerWidth/2, vpCy=window.innerHeight/2;
const tx=vpCx-w.x*Viewport.scale-w.width*Viewport.scale/2;
const ty=vpCy-w.y*Viewport.scale-w.height*Viewport.scale/2;
document.getElementById(‘canvas’).style.transition=‘transform 0.4s ease’;
document.getElementById(‘canvas’).style.transform=`translate(${tx}px,${ty}px) scale(${Viewport.scale})`;
setTimeout(()=>document.getElementById(‘canvas’).style.transition=’’,400);
});
res.appendChild(d);
});
}
};

const Pwd = {
_cb: null,
prompt(title, cb) {
this._cb=cb;
document.getElementById(‘pwd-title’).textContent=title;
document.getElementById(‘pwd-input’).value=’’;
document.getElementById(‘pwd-modal’).classList.add(‘show’);
document.getElementById(‘pwd-overlay’).classList.add(‘show’);
document.getElementById(‘pwd-input’).focus();
},
cancel() {
document.getElementById(‘pwd-modal’).classList.remove(‘show’);
document.getElementById(‘pwd-overlay’).classList.remove(‘show’);
},
confirm() {
const v=document.getElementById(‘pwd-input’).value;
if(this._cb) this._cb(v);
this.cancel();
}
};
document.getElementById(‘pwd-confirm’).addEventListener(‘click’,()=>Pwd.confirm());
document.getElementById(‘pwd-input’).addEventListener(‘keydown’,e=>{ if(e.key===‘Enter’) Pwd.confirm(); });

const UI = {
openAdd() {
this._open(‘add-sheet’);
// Build grid
const g=document.getElementById(‘add-grid’); g.innerHTML=’’;
WIDGET_TYPES.forEach(type=>{
const m=WIDGET_META[type];

},
openBg() { Background.renderPresets(); this._open(‘bg-sheet’); },
openSpaces() { Spaces.render(); this._open(‘spaces-sheet’); },
openSearch() { this._open(‘search-sheet’); setTimeout(()=>document.getElementById(‘search-input’).focus(),200); },
openOptions() {
this._open(‘options-sheet’);

b.innerHTML=’’;
const items=[
{ icon:‘fas fa-download’, title:‘Export Layout’, sub:‘Save JSON file’, action:()=>{ IO.exportJSON(); this.closeAll(); } },
{ icon:‘fas fa-upload’, title:‘Import Layout’, sub:‘Load from JSON’, action:()=>{ document.getElementById(‘import-file’).click(); this.closeAll(); } },
{ icon:‘fas fa-camera’, title:‘Screenshot Canvas’, sub:‘Export as PNG’, action:()=>{ toast(‘Use browser screenshot — html2canvas not bundled’); this.closeAll(); } },
{ icon:‘fas fa-history’, title:‘Version History’, sub:‘Last 5 auto-saves’, action:()=>{ IO.showHistory(); this.closeAll(); } },
{ icon:‘fas fa-trash-alt’, title:‘Clear Space’, sub:‘Remove all widgets’, action:()=>{ if(confirm(‘Clear all widgets?’)){ History.push(); State.space.widgets=[]; Render.all(); State.save(); this.closeAll(); } } },
];
items.forEach(item=>{
const d=document.createElement(‘div’);
d.style.cssText=‘display:flex;align-items:center;gap:12px;padding:13px 14px;background:var(–bg3);border:1px solid var(–border2);border-radius:11px;cursor:pointer;margin-bottom:6px’;
d.innerHTML=`<i class="${item.icon}" style="color:var(--text2);width:18px;text-align:center;font-size:16px"></i><div><div style="font-size:14px;font-weight:500;color:var(--text)">${item.title}</div><div style="font-size:11px;color:var(--text2)">${item.sub}</div></div>`;
d.addEventListener(‘click’,item.action);
b.appendChild(d);
});
},
_open(id) {
this.closeAll(true);
document.getElementById(id).classList.add(‘show’);
document.getElementById(‘sheet-overlay’).classList.add(‘show’);
},
closeAll(keep=false) {
if(!keep) document.getElementById(‘sheet-overlay’).classList.remove(‘show’);
[‘add-sheet’,‘bg-sheet’,‘spaces-sheet’,‘options-sheet’,‘search-sheet’].forEach(id=>document.getElementById(id).classList.remove(‘show’));
}
};

// Swipe-down-to-close sheets
[‘add-sheet’,‘bg-sheet’,‘spaces-sheet’,‘options-sheet’,‘search-sheet’].forEach(id=>{
const el=document.getElementById(id);
let sy=0;
el.addEventListener(‘touchstart’,e=>{ sy=e.touches[0].clientY; },{passive:true});
el.addEventListener(‘touchmove’,e=>{
const dy=e.touches[0].clientY-sy;
if(dy>0) el.style.transform=`translateY(${dy}px)`;
},{passive:true});
el.addEventListener(‘touchend’,e=>{
const dy=e.changedTouches[0].clientY-sy;
el.style.transform=’’;
if(dy>70) UI.closeAll();
});
});

// ═══════════════════════════════════════════════════════════
// IO (Export / Import / History)
// ═══════════════════════════════════════════════════════════
const IO = {
exportJSON() {
const blob=new Blob([JSON.stringify({spaces:State.spaces,currentSpace:State.currentSpace},null,2)],{type:‘application/json’});
const a=document.createElement(‘a’); a.href=URL.createObjectURL(blob);
a.download=‘myspace-layout.json’; a.click(); toast(‘Exported!’);
},
importJSON(file) {
const r=new FileReader();
r.onload=ev=>{
try {
const d=JSON.parse(ev.target.result);
State.spaces=d.spaces||[]; State.currentSpace=d.currentSpace||0;
Spaces.switchTo(State.currentSpace); State.save(); toast(‘Imported!’);
} catch(e) { toast(‘Invalid file’); }
};
r.readAsText(file);
},
// Auto-save version history (last 5)
_history: [],
pushVersion() {
const snap=JSON.stringify({spaces:State.spaces,ts:Date.now()});
this._history.push(snap);
if(this._history.length>5) this._history.shift();
localStorage.setItem(‘myspace_history’, JSON.stringify(this._history));
},
loadHistory() {
try { this._history=JSON.parse(localStorage.getItem(‘myspace_history’)||’[]’); } catch(e){}
},
showHistory() {
const h=this._history;
if(!h.length) return toast(‘No history yet’);
const sel=prompt(`Restore a version?\n${h.map((v,i)=>`${i+1}: ${new Date(JSON.parse(v).ts).toLocaleString()}`).join('\n')}\n\nEnter number:`);
if(!sel) return;
const idx=parseInt(sel)-1;
if(isNaN(idx)||idx<0||idx>=h.length) return toast(‘Invalid choice’);
const d=JSON.parse(h[idx]);
State.spaces=d.spaces; State.currentSpace=0;
Spaces.switchTo(0); State.save(); toast(‘Restored!’);
}
};

// Auto-save version every 2 minutes
setInterval(()=>IO.pushVersion(), 120000);

document.getElementById(‘import-file’).addEventListener(‘change’,e=>{ const f=e.target.files[0]; if(f) IO.importJSON(f); });

// ═══════════════════════════════════════════════════════════
// KEYBOARD SHORTCUTS
// ═══════════════════════════════════════════════════════════
document.addEventListener(‘keydown’,e=>{
if(e.target.tagName===‘INPUT’||e.target.tagName===‘TEXTAREA’||e.target.isContentEditable) return;
const cmd=e.metaKey||e.ctrlKey;
if(cmd&&e.key===‘e’) { e.preventDefault(); State.toggleEditMode(); }
if(cmd&&e.key===‘z’) { e.preventDefault(); e.shiftKey?History.redo():History.undo(); }
if(cmd&&e.key===‘d’) { e.preventDefault(); const s=document.querySelector(’.widget.selected’); if(s){const w=findW(s.dataset.id);if(w)duplicateWidget(w);} }
if(e.key===‘Delete’||e.key===‘Backspace’) { const s=document.querySelector(’.widget.selected’); if(s) deleteWidget(s.dataset.id); }
if(e.key===‘Escape’) { Ctx.hide(); UI.closeAll(); State.connectMode=false; }
if(cmd&&e.key===‘0’) { e.preventDefault(); Viewport.reset(); }
if(cmd&&e.key===’=’) { e.preventDefault(); Viewport.zoomAt(window.innerWidth/2,window.innerHeight/2,1.15); }
if(cmd&&e.key===’-’) { e.preventDefault(); Viewport.zoomAt(window.innerWidth/2,window.innerHeight/2,1/1.15); }
});

// ═══════════════════════════════════════════════════════════
// MEMORY MODE (notes fade if > 7 days old)
// ═══════════════════════════════════════════════════════════
function applyMemoryMode() {
const WEEK=7*24*60*60*1000;
State.space.widgets.forEach(w=>{
if(w.type===‘note’&&w.createdAt&&Date.now()-w.createdAt>WEEK) {
w.faded=true;
document.querySelector(`.widget[data-id="${w.id}"]`)?.classList.add(‘faded’);
}
});
}

// ═══════════════════════════════════════════════════════════
// AUTO DAY / NIGHT THEME
// ═══════════════════════════════════════════════════════════
function applyTimeTheme() {
const h=new Date().getHours();
const isDark=h<7||h>=20;
// already dark by default; could add a “day” CSS override here
document.body.dataset.timeTheme=isDark?‘night’:‘day’;
}
applyTimeTheme();
