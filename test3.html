<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>My Space</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

<!-- ═══════════════════════════════════════════════════════
     STYLES
     ═══════════════════════════════════════════════════════ -->

<style>
/* ── CSS Variables ── */
:root {
  --bg: #0a0a0a;
  --bg2: #101010;
  --bg3: #181818;
  --bg4: #202020;
  --border: #1e1e1e;
  --border2: #2a2a2a;
  --border3: #363636;
  --text: #e8e6e1;
  --text2: #6e6c68;
  --text3: #3a3835;
  --accent: #4f9eff;
  --accent-h: #3a8ae8;
  --green: #3dba72;
  --orange: #e88c3a;
  --purple: #a56fd4;
  --red: #ef4444;
  --yellow: #fbbf24;
  --glass: rgba(10,10,10,0.82);
  --glass2: rgba(16,16,16,0.88);
  --glass-b: rgba(255,255,255,0.055);
  --shadow: 0 8px 32px rgba(0,0,0,0.72);
  --shadow2: 0 24px 64px rgba(0,0,0,0.88);
  --radius: 15px;
  --safe-t: env(safe-area-inset-top, 0px);
  --safe-b: env(safe-area-inset-bottom, 0px);
  --safe-l: env(safe-area-inset-left, 0px);
  --safe-r: env(safe-area-inset-right, 0px);
  --topbar: 48px;
  --toolbar: 58px;
}

/* ── Reset ── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { width: 100%; height: 100%; overflow: hidden; font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); touch-action: none; }

/* ── Layer Structure ── */
/* Layer 1: Background */
#bg-layer {
  position: fixed; inset: -60px;
  z-index: 0;
  background: var(--bg);
  background-size: cover; background-position: center;
  transition: filter 0.4s ease;
  pointer-events: none;
  will-change: transform;
}
#bg-overlay { position: absolute; inset: 0; pointer-events: none; transition: background 0.3s; }

/* Layer 2: Canvas viewport (clips, receives pan/zoom) */
#canvas-viewport {
  position: fixed; inset: 0;
  z-index: 1;
  overflow: hidden;
  touch-action: none;
}

/* The actual infinite canvas that gets transformed */
#canvas {
  position: absolute;
  top: 0; left: 0;
  width: 3000px; height: 3000px;
  transform-origin: 0 0;
  will-change: transform;
}

/* Drawing canvas overlay */
#draw-canvas {
  position: absolute;
  top: 0; left: 0;
  width: 3000px; height: 3000px;
  pointer-events: none;
  z-index: 50;
}
#draw-canvas.drawing-mode { pointer-events: all; cursor: crosshair; }

/* Layer 3: UI overlay (fixed, always on top) */
#ui-layer {
  position: fixed; inset: 0;
  z-index: 1000;
  pointer-events: none;
}
#ui-layer > * { pointer-events: all; }

/* ── Widget Base ── */
.widget {
  position: absolute;
  min-width: 140px; min-height: 70px;
  border: 1px solid var(--glass-b);
  border-radius: var(--radius);
  backdrop-filter: blur(18px) saturate(1.3);
  -webkit-backdrop-filter: blur(18px) saturate(1.3);
  background: var(--glass);
  box-shadow: var(--shadow), inset 0 1px 0 rgba(255,255,255,0.04);
  overflow: hidden;
  user-select: none;
  -webkit-user-select: none;
  transition: box-shadow 0.18s, border-color 0.18s;
  will-change: transform;
}
.widget.selected {
  border-color: var(--accent);
  box-shadow: var(--shadow), 0 0 0 1px var(--accent), 0 0 20px rgba(79,158,255,0.12);
}
.widget.dragging { box-shadow: var(--shadow2), 0 0 0 1px var(--accent); transition: none; }
.widget.locked { pointer-events: none; }

/* Drag handle */
.w-handle {
  position: absolute; top: 0; left: 0; right: 0; height: 30px;
  cursor: grab; z-index: 5; display: none;
  align-items: center; padding: 0 10px; gap: 7px;
  background: rgba(255,255,255,0.018); border-bottom: 1px solid var(--glass-b);
}
.w-handle:active { cursor: grabbing; }
.edit-mode .w-handle { display: flex; }
.w-handle-dots { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 2px; opacity: 0.35; }
.w-handle-dots span { width: 3px; height: 3px; border-radius: 50%; background: var(--text); display: block; }
.w-handle-spacer { flex: 1; }
.w-handle-btn {
  width: 20px; height: 20px; border-radius: 5px; border: none;
  background: none; color: var(--text3); cursor: pointer; font-size: 11px;
  display: flex; align-items: center; justify-content: center; transition: all 0.12s;
}
.w-handle-btn:hover, .w-handle-btn:active { background: rgba(255,255,255,0.08); color: var(--text); }
.w-handle-btn.del:hover { background: rgba(239,68,68,0.18); color: var(--red); }

/* Content shifts down in edit mode */
.edit-mode .w-body { margin-top: 30px; }
.w-body { height: 100%; transition: margin 0.15s; }

/* Resize corner */
.w-resize {
  position: absolute; bottom: 0; right: 0;
  width: 20px; height: 20px; cursor: se-resize; z-index: 6;
  display: none; align-items: flex-end; justify-content: flex-end; padding: 3px;
}
.w-resize::after {
  content: ''; width: 8px; height: 8px;
  border-right: 2px solid var(--text2); border-bottom: 2px solid var(--text2);
  border-radius: 0 0 2px 0; display: block;
}
.edit-mode .w-resize { display: flex; }

/* Tag badge */
.w-tags { position: absolute; bottom: 4px; left: 8px; display: flex; gap: 4px; flex-wrap: wrap; z-index: 4; pointer-events: none; }
.w-tag { font-size: 9px; padding: 2px 6px; border-radius: 8px; background: rgba(79,158,255,0.12); color: var(--accent); font-weight: 500; }

/* Group outline */
.widget.grouped { outline: 1px dashed var(--purple); outline-offset: 3px; }

/* Locked/faded (memory mode) */
.widget.faded { opacity: 0.45; filter: grayscale(0.4); }
.widget.locked-note::after {
  content: '🔒'; position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
  font-size: 28px; z-index: 10; cursor: pointer;
}

/* ── Widget: Widget-header shared ── */
.wh {
  display: flex; align-items: center; gap: 7px;
  padding: 9px 11px 7px;
  border-bottom: 1px solid var(--glass-b);
  font-size: 10px; font-weight: 600; letter-spacing: 0.07em;
  text-transform: uppercase; color: var(--text2);
  flex-shrink: 0;
}
.wh i { font-size: 11px; }
.wh-spacer { flex: 1; }

/* ── Note widget ── */
.note-widget[data-color="yellow"] { background: rgba(251,191,36,0.07); border-color: rgba(251,191,36,0.18); }
.note-widget[data-color="green"]  { background: rgba(61,186,114,0.07); border-color: rgba(61,186,114,0.18); }
.note-widget[data-color="blue"]   { background: rgba(79,158,255,0.07); border-color: rgba(79,158,255,0.18); }
.note-widget[data-color="purple"] { background: rgba(165,111,212,0.07); border-color: rgba(165,111,212,0.18); }
.note-widget[data-color="red"]    { background: rgba(239,68,68,0.07);   border-color: rgba(239,68,68,0.18); }

.note-editable {
  width: 100%; height: calc(100% - 54px);
  padding: 10px 12px; background: none; border: none; outline: none; resize: none;
  color: var(--text); font-size: 13.5px; line-height: 1.7;
  font-family: inherit; display: block;
}
.note-editable::placeholder { color: var(--text3); }
.note-colors { display: flex; gap: 6px; padding: 6px 11px 9px; align-items: center; }
.nc-dot {
  width: 12px; height: 12px; border-radius: 50%; cursor: pointer;
  border: 2px solid transparent; transition: all 0.12s; flex-shrink: 0;
}
.nc-dot.active { border-color: rgba(255,255,255,0.65); transform: scale(1.25); }
.note-font-sel {
  margin-left: auto; background: none; border: none; color: var(--text2);
  font-size: 10px; cursor: pointer; padding: 2px 4px; border-radius: 4px;
  transition: background 0.12s; font-family: 'DM Sans', sans-serif;
}
.note-font-sel:hover { background: var(--bg3); }

/* ── Clock ── */
.clock-body { display: flex; flex-direction: column; align-items: center; justify-content: center; height: calc(100% - 30px); padding: 12px; }
.clock-time { font-family: 'DM Mono', monospace; font-size: 36px; font-weight: 500; color: var(--text); letter-spacing: -0.02em; line-height: 1; }
.clock-date { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--text2); letter-spacing: 0.07em; text-transform: uppercase; margin-top: 5px; }
.clock-seconds { font-family: 'DM Mono', monospace; font-size: 12px; color: var(--text3); margin-top: 2px; }

/* ── Todo ── */
.todo-body { height: calc(100% - 30px); display: flex; flex-direction: column; overflow: hidden; }
.todo-list { flex: 1; overflow-y: auto; padding: 6px 11px; }
.todo-list::-webkit-scrollbar { width: 3px; }
.todo-list::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }
.todo-item { display: flex; align-items: flex-start; gap: 8px; padding: 6px 0; border-bottom: 1px solid var(--border); }
.todo-item:last-child { border-bottom: none; }
.todo-cb { width: 16px; height: 16px; border-radius: 4px; border: 1.5px solid var(--border2); display: flex; align-items: center; justify-content: center; cursor: pointer; flex-shrink: 0; margin-top: 2px; transition: all 0.12s; }
.todo-cb.done { background: var(--green); border-color: var(--green); }
.todo-cb.done::after { content: '✓'; font-size: 9px; color: white; font-weight: 700; }
.todo-text { flex: 1; font-size: 12.5px; color: var(--text); line-height: 1.5; outline: none; word-break: break-word; }
.todo-text.done { text-decoration: line-through; color: var(--text2); }
.todo-del-btn { width: 18px; height: 18px; border-radius: 4px; border: none; background: none; color: var(--text3); cursor: pointer; font-size: 11px; display: flex; align-items: center; justify-content: center; opacity: 0; transition: all 0.12s; }
.todo-item:hover .todo-del-btn { opacity: 1; }
.todo-del-btn:hover { background: rgba(239,68,68,0.14); color: var(--red); }
.todo-add { display: flex; align-items: center; gap: 7px; padding: 7px 11px; border-top: 1px solid var(--border); flex-shrink: 0; }
.todo-add input { flex: 1; background: none; border: none; outline: none; font-size: 12.5px; color: var(--text2); font-family: 'DM Sans', sans-serif; }
.todo-add input::placeholder { color: var(--text3); }
.todo-add-btn { width: 20px; height: 20px; border-radius: 5px; background: var(--bg3); border: 1px solid var(--border2); color: var(--text2); cursor: pointer; font-size: 12px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: all 0.12s; }
.todo-add-btn:hover { background: var(--accent); border-color: var(--accent); color: white; }

/* ── Image widget ── */
.image-body { width: 100%; height: 100%; border-radius: calc(var(--radius) - 1px); overflow: hidden; display: flex; align-items: center; justify-content: center; }
.image-body img { width: 100%; height: 100%; object-fit: cover; display: block; transition: transform 0.3s; }
.image-body:hover img { transform: scale(1.02); }
.image-placeholder { width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px; color: var(--text3); font-size: 12px; cursor: pointer; }
.image-placeholder i { font-size: 24px; }

/* ── Quote ── */
.quote-body { height: calc(100% - 30px); display: flex; flex-direction: column; justify-content: center; padding: 14px 16px; gap: 10px; }
.quote-text { font-family: 'Playfair Display', Georgia, serif; font-size: 15px; line-height: 1.7; color: var(--text); font-style: italic; outline: none; word-break: break-word; }
.quote-author { font-size: 11px; color: var(--text2); letter-spacing: 0.06em; text-transform: uppercase; outline: none; }

/* ── Music/Spotify ── */
.music-body { height: 100%; }
.music-body iframe { width: 100%; height: 100%; border: none; display: block; border-radius: calc(var(--radius) - 1px); }
.music-setup { height: calc(100% - 30px); display: flex; flex-direction: column; justify-content: center; gap: 9px; padding: 12px; }
.music-input { background: var(--bg3); border: 1px solid var(--border2); border-radius: 8px; padding: 8px 10px; color: var(--text); font-size: 12px; outline: none; font-family: 'DM Mono', monospace; width: 100%; }
.music-input::placeholder { color: var(--text3); }
.music-input:focus { border-color: var(--accent); }
.music-btn { padding: 8px; border-radius: 8px; background: #1DB954; border: none; color: white; font-size: 12.5px; font-weight: 600; cursor: pointer; font-family: 'DM Sans', sans-serif; transition: background 0.12s; }
.music-btn:hover { background: #17a349; }

/* ── Pomodoro ── */
.pomo-body { height: calc(100% - 30px); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 10px; padding: 12px; }
.pomo-ring { position: relative; width: 90px; height: 90px; }
.pomo-ring svg { transform: rotate(-90deg); }
.pomo-ring circle { fill: none; stroke-width: 4; }
.pomo-ring .bg-ring { stroke: var(--border2); }
.pomo-ring .prog-ring { stroke: var(--red); stroke-linecap: round; transition: stroke-dashoffset 0.5s linear; }
.pomo-time { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); font-family: 'DM Mono', monospace; font-size: 18px; color: var(--text); font-weight: 500; }
.pomo-label { font-size: 10px; color: var(--text2); letter-spacing: 0.07em; text-transform: uppercase; }
.pomo-controls { display: flex; gap: 8px; }
.pomo-btn { width: 30px; height: 30px; border-radius: 8px; border: 1px solid var(--border2); background: var(--bg3); color: var(--text2); cursor: pointer; font-size: 13px; display: flex; align-items: center; justify-content: center; transition: all 0.12s; }
.pomo-btn:hover { background: var(--border2); color: var(--text); }
.pomo-btn.active { background: var(--red); border-color: var(--red); color: white; }

/* ── Habit Tracker ── */
.habit-body { height: calc(100% - 30px); overflow-y: auto; padding: 8px 11px; }
.habit-body::-webkit-scrollbar { width: 3px; }
.habit-body::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }
.habit-row { display: flex; align-items: center; gap: 8px; padding: 5px 0; border-bottom: 1px solid var(--border); }
.habit-row:last-child { border-bottom: none; }
.habit-name { flex: 1; font-size: 12px; color: var(--text); outline: none; }
.habit-dots { display: flex; gap: 4px; }
.habit-dot { width: 14px; height: 14px; border-radius: 3px; background: var(--bg3); border: 1px solid var(--border2); cursor: pointer; transition: all 0.12s; flex-shrink: 0; }
.habit-dot.on { background: var(--green); border-color: var(--green); }
.habit-add-row { display: flex; gap: 7px; padding: 7px 0 0; border-top: 1px solid var(--border); margin-top: 3px; }
.habit-add-row input { flex: 1; background: none; border: none; outline: none; font-size: 12px; color: var(--text2); font-family: 'DM Sans', sans-serif; }
.habit-add-row input::placeholder { color: var(--text3); }

/* ── Calendar ── */
.cal-body { height: calc(100% - 30px); padding: 8px 11px; overflow: hidden; }
.cal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
.cal-month { font-size: 12px; font-weight: 600; color: var(--text); }
.cal-nav { width: 20px; height: 20px; border-radius: 4px; border: none; background: none; color: var(--text2); cursor: pointer; font-size: 12px; display: flex; align-items: center; justify-content: center; transition: background 0.12s; }
.cal-nav:hover { background: var(--bg3); }
.cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; }
.cal-day-label { font-size: 9px; color: var(--text2); text-align: center; padding: 2px 0; font-weight: 600; letter-spacing: 0.04em; }
.cal-day { font-size: 10px; text-align: center; padding: 4px 2px; border-radius: 4px; cursor: pointer; color: var(--text2); transition: all 0.12s; }
.cal-day:hover { background: var(--bg3); color: var(--text); }
.cal-day.today { background: var(--accent); color: white; font-weight: 600; }
.cal-day.other-month { opacity: 0.3; }
.cal-day.has-note { position: relative; }
.cal-day.has-note::after { content: ''; position: absolute; bottom: 2px; left: 50%; transform: translateX(-50%); width: 3px; height: 3px; border-radius: 50%; background: var(--orange); }

/* ── Ambient ── */
.ambient-body { height: calc(100% - 30px); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px; padding: 12px; }
.ambient-sounds { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; width: 100%; }
.ambient-item { display: flex; flex-direction: column; align-items: center; gap: 4px; padding: 10px 8px; background: var(--bg3); border: 1px solid var(--border2); border-radius: 10px; cursor: pointer; transition: all 0.15s; font-size: 11px; color: var(--text2); }
.ambient-item i { font-size: 18px; }
.ambient-item.playing { background: rgba(79,158,255,0.1); border-color: var(--accent); color: var(--accent); }

/* ── Reminder widget ── */
.reminder-body { height: calc(100% - 30px); overflow-y: auto; padding: 8px 11px; }
.reminder-item { display: flex; align-items: flex-start; gap: 8px; padding: 6px 0; border-bottom: 1px solid var(--border); }
.reminder-item:last-child { border-bottom: none; }
.reminder-icon { font-size: 14px; flex-shrink: 0; margin-top: 1px; }
.reminder-info { flex: 1; min-width: 0; }
.reminder-title { font-size: 12px; color: var(--text); margin-bottom: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.reminder-time { font-size: 10px; color: var(--text2); font-family: 'DM Mono', monospace; }
.reminder-del { width: 18px; height: 18px; border-radius: 4px; border: none; background: none; color: var(--text3); cursor: pointer; font-size: 11px; display: flex; align-items: center; justify-content: center; transition: all 0.12s; }
.reminder-del:hover { background: rgba(239,68,68,0.14); color: var(--red); }
.reminder-add-row { display: flex; flex-direction: column; gap: 5px; padding: 7px 0 0; border-top: 1px solid var(--border); }
.reminder-add-row input { background: none; border: none; outline: none; font-size: 12px; color: var(--text2); font-family: 'DM Sans', sans-serif; }
.reminder-add-row input::placeholder { color: var(--text3); }
.reminder-add-row input[type=datetime-local] { font-family: 'DM Mono', monospace; font-size: 11px; color-scheme: dark; }
.reminder-add-btn { align-self: flex-end; padding: 5px 12px; border-radius: 7px; background: var(--accent); border: none; color: white; font-size: 11px; font-weight: 600; cursor: pointer; font-family: 'DM Sans', sans-serif; }

/* ── Connection lines (mind map) ── */
#connections-svg { position: absolute; top: 0; left: 0; width: 3000px; height: 3000px; pointer-events: none; z-index: 1; overflow: visible; }
.connection-line { stroke: var(--accent); stroke-width: 1.5; fill: none; opacity: 0.5; stroke-dasharray: 5 3; }

/* ── Topbar ── */
#topbar {
  position: absolute; top: 0; left: 0; right: 0;
  height: calc(var(--safe-t) + var(--topbar));
  padding-top: var(--safe-t);
  background: var(--glass2);
  border-bottom: 1px solid var(--glass-b);
  backdrop-filter: blur(22px) saturate(1.4);
  -webkit-backdrop-filter: blur(22px) saturate(1.4);
  display: flex; align-items: flex-end;
}
.topbar-inner {
  width: 100%; height: var(--topbar);
  display: flex; align-items: center;
  padding: 0 12px; gap: 8px;
}
#space-name-btn {
  font-family: 'DM Serif Display', serif;
  font-size: 18px; color: var(--text); background: none; border: none; cursor: pointer;
  padding: 4px 8px; border-radius: 8px; transition: background 0.12s; flex-shrink: 0;
  max-width: 160px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
#space-name-btn:hover { background: rgba(255,255,255,0.05); }
.topbar-spacer { flex: 1; }
.topbar-btn {
  width: 34px; height: 34px; border-radius: 10px;
  background: none; border: 1px solid transparent; color: var(--text2); cursor: pointer;
  font-size: 15px; display: flex; align-items: center; justify-content: center;
  transition: all 0.15s; flex-shrink: 0;
}
.topbar-btn:hover { background: var(--bg3); color: var(--text); }
.topbar-btn.on { background: rgba(79,158,255,0.15); color: var(--accent); border-color: rgba(79,158,255,0.3); }
#edit-badge {
  font-size: 10px; font-weight: 600; letter-spacing: 0.06em;
  text-transform: uppercase; color: var(--accent);
  background: rgba(79,158,255,0.12); border: 1px solid rgba(79,158,255,0.25);
  border-radius: 8px; padding: 4px 9px; display: none; align-items: center; gap: 5px;
}
#edit-badge.show { display: flex; }
#edit-badge i { font-size: 8px; }

/* Zoom indicator */
#zoom-badge {
  font-family: 'DM Mono', monospace; font-size: 11px; color: var(--text2);
  background: var(--bg3); border: 1px solid var(--border2); border-radius: 8px;
  padding: 4px 8px; pointer-events: none;
}

/* ── Bottom toolbar ── */
#toolbar {
  position: absolute; bottom: 0; left: 0; right: 0;
  height: calc(var(--safe-b) + var(--toolbar));
  padding-bottom: var(--safe-b);
  background: var(--glass2);
  border-top: 1px solid var(--glass-b);
  backdrop-filter: blur(22px) saturate(1.4);
  -webkit-backdrop-filter: blur(22px) saturate(1.4);
  display: flex; align-items: flex-start;
}
/* Desktop: pill */
@media (min-width: 600px) {
  #toolbar {
    bottom: 20px; left: 50%; right: auto; transform: translateX(-50%);
    border-radius: 26px; border: 1px solid var(--glass-b); padding-bottom: 0;
    width: auto; height: auto;
    box-shadow: 0 12px 48px rgba(0,0,0,0.8), inset 0 1px 0 rgba(255,255,255,0.05);
  }
  .toolbar-inner { height: 50px; padding: 6px 10px; gap: 2px; width: auto; }
  .tb-btn { flex: none; width: 38px; height: 38px; font-size: 15px; }
}
.toolbar-inner { width: 100%; height: var(--toolbar); display: flex; align-items: center; justify-content: space-around; padding: 0 8px; gap: 4px; }
.tb-btn {
  flex: 1; max-width: 50px; height: 42px; border-radius: 12px;
  background: none; border: none; cursor: pointer; color: var(--text2); font-size: 16px;
  display: flex; align-items: center; justify-content: center; transition: all 0.15s;
  position: relative;
}
.tb-btn:hover, .tb-btn:active { background: var(--bg3); color: var(--text); }
.tb-btn.on { color: var(--accent); }
.tb-sep { width: 1px; height: 20px; background: var(--border2); flex-shrink: 0; }

/* Tooltip (desktop) */
@media (min-width: 600px) {
  .tb-btn[data-tip]:hover::after {
    content: attr(data-tip);
    position: absolute; bottom: calc(100% + 8px); left: 50%; transform: translateX(-50%);
    background: var(--bg3); border: 1px solid var(--border2);
    color: var(--text); font-size: 11px; white-space: nowrap;
    padding: 4px 9px; border-radius: 6px; pointer-events: none;
    font-family: 'DM Sans', sans-serif; animation: tipIn 0.12s ease;
  }
  @keyframes tipIn { from { opacity:0; transform: translateX(-50%) translateY(3px); } to { opacity:1; transform: translateX(-50%) translateY(0); } }
}

/* ── Sheets / Modals ── */
.sheet-overlay {
  position: absolute; inset: 0; background: rgba(0,0,0,0.55);
  backdrop-filter: blur(3px); -webkit-backdrop-filter: blur(3px);
  z-index: 500; display: none; cursor: pointer;
}
.sheet-overlay.show { display: block; }

.sheet {
  position: absolute; left: 0; right: 0; bottom: 0;
  background: #111; border-top: 1px solid var(--border2);
  border-radius: 20px 20px 0 0;
  padding-bottom: calc(var(--safe-b) + 6px);
  z-index: 501; display: none; max-height: 88vh; overflow-y: auto;
  animation: sheetUp 0.3s cubic-bezier(0.4,0,0.2,1);
}
.sheet.show { display: block; }
.sheet::-webkit-scrollbar { display: none; }
@keyframes sheetUp { from { transform: translateY(100%); } to { transform: none; } }
/* Desktop: centered */
@media (min-width: 600px) {
  .sheet {
    bottom: auto; left: 50%; top: 50%; right: auto;
    transform: translate(-50%,-50%);
    width: min(460px, 94vw); border-radius: 18px; max-height: 88vh;
    padding-bottom: 0; border: 1px solid var(--border2);
    animation: modalIn 0.2s cubic-bezier(0.4,0,0.2,1);
  }
  @keyframes modalIn { from { opacity:0; transform: translate(-50%,-50%) scale(0.96); } to { opacity:1; transform: translate(-50%,-50%) scale(1); } }
}
.sheet-handle { width: 34px; height: 4px; background: var(--border2); border-radius: 2px; margin: 10px auto 0; }
@media (min-width: 600px) { .sheet-handle { display: none; } }
.sheet-header { display: flex; align-items: center; justify-content: space-between; padding: 14px 18px 10px; border-bottom: 1px solid var(--border); }
.sheet-title { font-size: 14px; font-weight: 600; color: var(--text); }
.sheet-close { width: 26px; height: 26px; border-radius: 50%; border: none; background: none; color: var(--text2); cursor: pointer; font-size: 17px; display: flex; align-items: center; justify-content: center; transition: background 0.12s; }
.sheet-close:hover { background: var(--bg3); }
.sheet-body { padding: 14px 18px 16px; display: flex; flex-direction: column; gap: 14px; }

/* Add widget grid */
.add-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 9px; }
@media (min-width: 360px) { .add-grid { grid-template-columns: repeat(4, 1fr); } }
@media (min-width: 500px) { .add-grid { grid-template-columns: repeat(5, 1fr); } }
.add-item { display: flex; flex-direction: column; align-items: center; gap: 6px; padding: 14px 6px; background: var(--bg3); border: 1px solid var(--border2); border-radius: 12px; cursor: pointer; transition: all 0.15s; font-size: 11px; font-weight: 500; color: var(--text2); text-align: center; }
.add-item i { font-size: 19px; }
.add-item:hover, .add-item:active { background: var(--border2); transform: scale(0.96); color: var(--text); }

/* BG Presets */
.preset-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
.preset-sw { aspect-ratio: 1; border-radius: 10px; cursor: pointer; border: 2px solid transparent; transition: all 0.15s; }
.preset-sw.on { border-color: var(--accent); }
.preset-sw:active { transform: scale(0.93); }
.sheet-label { font-size: 10px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text2); }
.sheet-row { display: flex; align-items: center; gap: 10px; }
.sheet-row label { font-size: 13px; color: var(--text2); min-width: 78px; }
.sheet-row input[type=range] { flex: 1; accent-color: var(--accent); cursor: pointer; }
.sheet-upload { width: 100%; padding: 10px; border-radius: 10px; background: var(--bg3); border: 1px dashed var(--border2); color: var(--text2); font-size: 13px; cursor: pointer; font-family: 'DM Sans', sans-serif; display: flex; align-items: center; justify-content: center; gap: 7px; transition: all 0.15s; }
.sheet-upload:hover { border-color: var(--accent); color: var(--text); }
.sheet-toggle-row { display: flex; align-items: center; gap: 10px; padding: 10px 12px; background: var(--bg3); border: 1px solid var(--border2); border-radius: 10px; }
.sheet-toggle-label { flex: 1; font-size: 13px; color: var(--text); }
/* iOS toggle */
.ios-sw { position: relative; width: 40px; height: 23px; flex-shrink: 0; }
.ios-sw input { opacity: 0; width: 0; height: 0; }
.ios-track { position: absolute; inset: 0; background: var(--border2); border-radius: 12px; transition: 0.25s; cursor: pointer; }
.ios-track::before { content: ''; position: absolute; width: 17px; height: 17px; left: 3px; top: 3px; background: white; border-radius: 50%; transition: 0.25s; }
.ios-sw input:checked + .ios-track { background: var(--accent); }
.ios-sw input:checked + .ios-track::before { transform: translateX(17px); }

/* Spaces list */
.spaces-list { display: flex; flex-direction: column; gap: 6px; }
.space-row { display: flex; align-items: center; gap: 10px; padding: 12px 14px; background: var(--bg3); border: 1px solid var(--border2); border-radius: 11px; cursor: pointer; transition: all 0.15s; }
.space-row:hover, .space-row:active { background: var(--border2); }
.space-row.on { border-color: var(--accent); background: rgba(79,158,255,0.07); }
.space-row-name { flex: 1; font-size: 14px; color: var(--text); outline: none; }
.space-row-meta { font-size: 11px; color: var(--text2); }
.space-row-del { width: 24px; height: 24px; border-radius: 6px; border: none; background: none; color: var(--text3); cursor: pointer; font-size: 12px; display: flex; align-items: center; justify-content: center; transition: all 0.12s; }
.space-row-del:hover { background: rgba(239,68,68,0.14); color: var(--red); }
.sheet-add-row-btn { width: 100%; padding: 11px; border-radius: 10px; background: none; border: 1px dashed var(--border2); color: var(--text2); font-size: 13px; cursor: pointer; font-family: 'DM Sans', sans-serif; display: flex; align-items: center; justify-content: center; gap: 7px; transition: all 0.15s; }
.sheet-add-row-btn:hover { border-color: var(--accent); color: var(--accent); }

/* Search bar */
.search-wrap { position: relative; }
.search-input { width: 100%; padding: 10px 12px 10px 36px; background: var(--bg3); border: 1px solid var(--border2); border-radius: 10px; color: var(--text); font-size: 13px; outline: none; font-family: 'DM Sans', sans-serif; }
.search-input::placeholder { color: var(--text3); }
.search-input:focus { border-color: var(--accent); }
.search-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--text2); font-size: 13px; pointer-events: none; }
.search-results { display: flex; flex-direction: column; gap: 4px; max-height: 220px; overflow-y: auto; }
.search-result { padding: 9px 11px; background: var(--bg3); border-radius: 8px; cursor: pointer; font-size: 13px; color: var(--text); transition: background 0.12s; display: flex; align-items: center; gap: 8px; }
.search-result:hover { background: var(--border2); }
.search-result i { color: var(--text2); font-size: 12px; width: 14px; text-align: center; }

/* Context menu */
#ctx-menu {
  position: fixed; background: #141414; border: 1px solid var(--border2);
  border-radius: 13px; padding: 5px; box-shadow: var(--shadow2);
  z-index: 2000; display: none; min-width: 168px;
  animation: ctxIn 0.13s cubic-bezier(0.4,0,0.2,1);
}
@keyframes ctxIn { from { opacity:0; transform: scale(0.94) translateY(-3px); } to { opacity:1; transform: none; } }
.ctx-item { display: flex; align-items: center; gap: 9px; padding: 9px 11px; border-radius: 8px; cursor: pointer; font-size: 13px; color: var(--text); transition: background 0.1s; }
.ctx-item:hover, .ctx-item:active { background: var(--bg3); }
.ctx-item i { width: 13px; text-align: center; color: var(--text2); font-size: 12px; }
.ctx-item.danger { color: var(--red); }
.ctx-item.danger i { color: var(--red); }
.ctx-sep { height: 1px; background: var(--border); margin: 3px 0; }

/* Password modal */
#pwd-modal { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); background: #111; border: 1px solid var(--border2); border-radius: 16px; padding: 24px; z-index: 600; display: none; width: min(320px, 90vw); box-shadow: var(--shadow2); }
#pwd-modal.show { display: block; }
#pwd-modal h3 { font-size: 15px; font-weight: 600; margin-bottom: 12px; }
#pwd-input { width: 100%; padding: 10px 12px; background: var(--bg3); border: 1px solid var(--border2); border-radius: 8px; color: var(--text); font-size: 14px; outline: none; margin-bottom: 10px; }
#pwd-input:focus { border-color: var(--accent); }
.pwd-btns { display: flex; gap: 8px; }
.pwd-btn { flex: 1; padding: 9px; border-radius: 8px; border: none; font-size: 13px; font-weight: 600; cursor: pointer; font-family: 'DM Sans', sans-serif; }
.pwd-btn.confirm { background: var(--accent); color: white; }
.pwd-btn.cancel { background: var(--bg3); color: var(--text2); border: 1px solid var(--border2); }

/* Notification toast */
#toast {
  position: absolute; top: calc(var(--safe-t) + var(--topbar) + 10px); left: 50%; transform: translateX(-50%);
  background: #111; border: 1px solid var(--border2); border-radius: 12px;
  padding: 10px 18px; font-size: 13px; color: var(--text); z-index: 900;
  display: none; white-space: nowrap; box-shadow: var(--shadow);
  animation: toastIn 0.2s ease;
  pointer-events: none;
}
@keyframes toastIn { from { opacity:0; transform: translateX(-50%) translateY(-8px); } to { opacity:1; transform: translateX(-50%) translateY(0); } }

/* Drawing toolbar */
#draw-toolbar {
  position: absolute; top: calc(var(--safe-t) + var(--topbar) + 10px); left: 50%; transform: translateX(-50%);
  background: var(--glass2); border: 1px solid var(--glass-b); border-radius: 20px;
  backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
  display: none; align-items: center; gap: 4px; padding: 5px 8px;
  box-shadow: var(--shadow);
}
#draw-toolbar.show { display: flex; }
.draw-btn { width: 34px; height: 34px; border-radius: 10px; border: none; background: none; color: var(--text2); cursor: pointer; font-size: 14px; display: flex; align-items: center; justify-content: center; transition: all 0.12s; }
.draw-btn:hover { background: var(--bg3); color: var(--text); }
.draw-btn.on { background: rgba(79,158,255,0.15); color: var(--accent); }
.draw-color { width: 22px; height: 22px; border-radius: 50%; cursor: pointer; border: 2px solid transparent; transition: all 0.12s; flex-shrink: 0; }
.draw-color.on { border-color: white; transform: scale(1.2); }
input#draw-size { width: 60px; accent-color: var(--accent); cursor: pointer; }

/* Undo/redo bar */
#undo-bar {
  position: absolute; top: calc(var(--safe-t) + var(--topbar) + 10px); right: 12px;
  display: flex; flex-direction: column; gap: 4px;
}
.undo-btn { width: 32px; height: 32px; border-radius: 9px; border: 1px solid var(--border2); background: var(--glass2); backdrop-filter: blur(12px); color: var(--text2); cursor: pointer; font-size: 13px; display: flex; align-items: center; justify-content: center; transition: all 0.12s; }
.undo-btn:hover { background: var(--bg3); color: var(--text); }
.undo-btn:disabled { opacity: 0.25; pointer-events: none; }

/* Version history dot */
.ver-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--border2); cursor: pointer; transition: all 0.15s; flex-shrink: 0; }
.ver-dot.cur { background: var(--accent); }
.ver-dot:hover { background: var(--text2); }

/* Snap grid overlay */
#snap-grid {
  position: absolute; inset: 0; width: 3000px; height: 3000px;
  background-image: linear-gradient(rgba(255,255,255,0.022) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.022) 1px, transparent 1px);
  background-size: 20px 20px;
  pointer-events: none; display: none; z-index: 0;
}
#snap-grid.show { display: block; }

/* Animations */
.widget { animation: wIn 0.2s cubic-bezier(0.4,0,0.2,1); }
@keyframes wIn { from { opacity:0; transform: scale(0.88) translateY(8px); } to { opacity:1; transform: none; } }
@keyframes wOut { to { opacity:0; transform: scale(0.88); } }

/* Scrollbar global */
::-webkit-scrollbar { width: 4px; height: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }
</style>

<body>

<!-- ═══ LAYER 1: Background ═══ -->

<div id="bg-layer"><div id="bg-overlay"></div></div>

<!-- ═══ LAYER 2: Canvas viewport ═══ -->

<div id="canvas-viewport">
  <div id="canvas">
    <svg id="connections-svg"></svg>
    <div id="snap-grid"></div>
    <canvas id="draw-canvas" width="3000" height="3000"></canvas>
    <!-- widgets injected here -->
  </div>
</div>

<!-- ═══ LAYER 3: UI overlay ═══ -->

<div id="ui-layer">

  <!-- Toast notification -->

  <div id="toast"></div>

  <!-- Topbar -->

  <div id="topbar">
    <div class="topbar-inner">
      <button id="space-name-btn" onclick="UI.openSpaces()">Main</button>
      <div id="edit-badge"><i class="fas fa-circle"></i> EDITING</div>
      <div class="topbar-spacer"></div>
      <div id="zoom-badge">100%</div>
      <button class="topbar-btn" id="search-btn" data-tip="Search" onclick="UI.openSearch()"><i class="fas fa-search"></i></button>
      <button class="topbar-btn" id="undo-desktop-btn" onclick="History.undo()" title="Undo"><i class="fas fa-undo"></i></button>
      <button class="topbar-btn" id="redo-desktop-btn" onclick="History.redo()" title="Redo"><i class="fas fa-redo"></i></button>
    </div>
  </div>

  <!-- Undo/redo (mobile - side) -->

  <div id="undo-bar">
    <button class="undo-btn" id="undo-btn" onclick="History.undo()" title="Undo"><i class="fas fa-undo"></i></button>
    <button class="undo-btn" id="redo-btn" onclick="History.redo()" title="Redo"><i class="fas fa-redo"></i></button>
  </div>

  <!-- Drawing toolbar -->

  <div id="draw-toolbar">
    <button class="draw-btn on" id="draw-pen-btn" onclick="Draw.setTool('pen')"><i class="fas fa-pen"></i></button>
    <button class="draw-btn" id="draw-erase-btn" onclick="Draw.setTool('eraser')"><i class="fas fa-eraser"></i></button>
    <div class="tb-sep"></div>
    <div class="draw-color on" style="background:#4f9eff" data-c="#4f9eff" onclick="Draw.setColor(this)"></div>
    <div class="draw-color" style="background:#fbbf24" data-c="#fbbf24" onclick="Draw.setColor(this)"></div>
    <div class="draw-color" style="background:#ef4444" data-c="#ef4444" onclick="Draw.setColor(this)"></div>
    <div class="draw-color" style="background:#3dba72" data-c="#3dba72" onclick="Draw.setColor(this)"></div>
    <div class="draw-color" style="background:#e8e6e1" data-c="#e8e6e1" onclick="Draw.setColor(this)"></div>
    <div class="tb-sep"></div>
    <input type="range" id="draw-size" min="1" max="20" value="3">
    <button class="draw-btn" onclick="Draw.clear()" title="Clear drawing"><i class="fas fa-trash"></i></button>
  </div>

  <!-- Bottom Toolbar -->

  <div id="toolbar">
    <div class="toolbar-inner">
      <button class="tb-btn" id="edit-btn" data-tip="Edit Mode" onclick="State.toggleEditMode()"><i class="fas fa-pen-to-square"></i></button>
      <div class="tb-sep"></div>
      <button class="tb-btn" data-tip="Add Widget" onclick="UI.openAdd()"><i class="fas fa-plus-circle"></i></button>
      <button class="tb-btn" data-tip="Background" onclick="UI.openBg()"><i class="fas fa-image"></i></button>
      <button class="tb-btn" id="draw-mode-btn" data-tip="Draw" onclick="Draw.toggle()"><i class="fas fa-paint-brush"></i></button>
      <div class="tb-sep"></div>
      <button class="tb-btn" id="snap-btn" data-tip="Snap Grid" onclick="State.toggleSnap()"><i class="fas fa-th"></i></button>
      <button class="tb-btn" data-tip="Options" onclick="UI.openOptions()"><i class="fas fa-ellipsis"></i></button>
    </div>
  </div>

  <!-- Sheet Overlay -->

  <div class="sheet-overlay" id="sheet-overlay" onclick="UI.closeAll()"></div>

  <!-- ── Add Widget Sheet ── -->

  <div class="sheet" id="add-sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-header"><span class="sheet-title">Add Widget</span><button class="sheet-close" onclick="UI.closeAll()">×</button></div>
    <div class="sheet-body">
      <div class="add-grid" id="add-grid"></div>
    </div>
  </div>

  <!-- ── Background Sheet ── -->

  <div class="sheet" id="bg-sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-header"><span class="sheet-title">Background</span><button class="sheet-close" onclick="UI.closeAll()">×</button></div>
    <div class="sheet-body">
      <div>
        <div class="sheet-label" style="margin-bottom:8px">Presets</div>
        <div class="preset-grid" id="preset-grid"></div>
      </div>
      <label class="sheet-upload" for="bg-upload"><i class="fas fa-upload"></i>Upload Image<input type="file" id="bg-upload" accept="image/*" style="display:none"></label>
      <div>
        <div class="sheet-label" style="margin-bottom:10px">Adjustments</div>
        <div style="display:flex;flex-direction:column;gap:11px">
          <div class="sheet-row"><label>Blur</label><input type="range" id="bg-blur" min="0" max="20" value="0"></div>
          <div class="sheet-row"><label>Brightness</label><input type="range" id="bg-bright" min="20" max="150" value="100"></div>
          <div class="sheet-row"><label>Dim</label><input type="range" id="bg-dim" min="0" max="90" value="0"></div>
        </div>
      </div>
      <div>
        <div class="sheet-label" style="margin-bottom:8px">Options</div>
        <div style="display:flex;flex-direction:column;gap:6px">
          <div class="sheet-toggle-row">
            <span class="sheet-toggle-label">Parallax (mouse/gyro)</span>
            <label class="ios-sw"><input type="checkbox" id="bg-parallax"><span class="ios-track"></span></label>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- ── Spaces Sheet ── -->

  <div class="sheet" id="spaces-sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-header"><span class="sheet-title">Spaces</span><button class="sheet-close" onclick="UI.closeAll()">×</button></div>
    <div class="sheet-body">
      <div class="spaces-list" id="spaces-list"></div>
      <button class="sheet-add-row-btn" onclick="Spaces.add()"><i class="fas fa-plus"></i>New Space</button>
    </div>
  </div>

  <!-- ── Options Sheet ── -->

  <div class="sheet" id="options-sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-header"><span class="sheet-title">Options</span><button class="sheet-close" onclick="UI.closeAll()">×</button></div>
    <div class="sheet-body" id="options-body"></div>
  </div>

  <!-- ── Search Sheet ── -->

  <div class="sheet" id="search-sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-header"><span class="sheet-title">Search</span><button class="sheet-close" onclick="UI.closeAll()">×</button></div>
    <div class="sheet-body">
      <div class="search-wrap">
        <i class="fas fa-search search-icon"></i>
        <input type="search" class="search-input" id="search-input" placeholder="Search notes, widgets…" oninput="Search.run(this.value)">
      </div>
      <div class="search-results" id="search-results"></div>
    </div>
  </div>

  <!-- Context Menu -->

  <div id="ctx-menu">
    <div class="ctx-item" onclick="Ctx.action('duplicate')"><i class="fas fa-copy"></i>Duplicate</div>
    <div class="ctx-item" onclick="Ctx.action('forward')"><i class="fas fa-layer-group"></i>Bring Forward</div>
    <div class="ctx-item" onclick="Ctx.action('back')"><i class="fas fa-layer-minus"></i>Send Back</div>
    <div class="ctx-sep"></div>
    <div class="ctx-item" onclick="Ctx.action('lock')"><i class="fas fa-lock"></i><span id="ctx-lock-label">Lock</span></div>
    <div class="ctx-item" onclick="Ctx.action('pin')"><i class="fas fa-thumbtack"></i><span id="ctx-pin-label">Pin Note</span></div>
    <div class="ctx-item" onclick="Ctx.action('connect')"><i class="fas fa-link"></i>Connect</div>
    <div class="ctx-sep"></div>
    <div class="ctx-item danger" onclick="Ctx.action('delete')"><i class="fas fa-trash"></i>Delete</div>
  </div>

  <!-- Password Modal -->

  <div class="sheet-overlay" id="pwd-overlay" onclick="Pwd.cancel()" style="z-index:599"></div>
  <div id="pwd-modal">
    <h3 id="pwd-title">Set Password</h3>
    <input type="password" id="pwd-input" placeholder="Enter password…">
    <div class="pwd-btns">
      <button class="pwd-btn cancel" onclick="Pwd.cancel()">Cancel</button>
      <button class="pwd-btn confirm" id="pwd-confirm">Confirm</button>
    </div>
  </div>

</div><!-- /ui-layer -->

<!-- Hidden file inputs -->

<script>
'use strict';

// ═══════════════════════════════════════════════════════════
// CONSTANTS
// ═══════════════════════════════════════════════════════════
const GRID = 20;
const IS_TOUCH = 'ontouchstart' in window || navigator.maxTouchPoints > 0;
const CANVAS_W = 3000, CANVAS_H = 3000;
const WIDGET_TYPES = ['note','clock','todo','image','quote','music','pomodoro','habit','calendar','ambient','reminder'];
const WIDGET_META = {
  note:     { icon:'fas fa-sticky-note',  label:'Note',     w:240, h:200 },
  clock:    { icon:'fas fa-clock',         label:'Clock',    w:200, h:130 },
  todo:     { icon:'fas fa-check-square',  label:'To-Do',    w:260, h:280 },
  image:    { icon:'fas fa-image',         label:'Image',    w:240, h:200 },
  quote:    { icon:'fas fa-quote-right',   label:'Quote',    w:280, h:180 },
  music:    { icon:'fab fa-spotify',       label:'Music',    w:300, h:180 },
  pomodoro: { icon:'fas fa-stopwatch',     label:'Pomodoro', w:190, h:220 },
  habit:    { icon:'fas fa-seedling',      label:'Habits',   w:260, h:260 },
  calendar: { icon:'fas fa-calendar-alt', label:'Calendar', w:240, h:240 },
  ambient:  { icon:'fas fa-cloud-rain',   label:'Ambient',  w:200, h:200 },
  reminder: { icon:'fas fa-bell',         label:'Reminders',w:250, h:250 },
};
const BG_PRESETS = [
  { v:'linear-gradient(135deg,#0a0a0a,#111)' },
  { v:'linear-gradient(135deg,#0a1628,#0d2a4a,#072040)' },
  { v:'linear-gradient(135deg,#0a1a0f,#0f2a18,#081508)' },
  { v:'linear-gradient(135deg,#1a0a1e,#2a0d3a,#1a0828)' },
  { v:'linear-gradient(135deg,#1a0800,#2d1100,#1a0600)' },
  { v:'linear-gradient(135deg,#0d1117,#161b22)' },
  { v:'linear-gradient(135deg,#131619,#1c2028)' },
  { v:'linear-gradient(160deg,#050505,#0c0c0c)' },
];
const NOTE_COLORS = ['yellow','green','blue','purple','red'];
const NOTE_FONTS = ['DM Sans','Playfair Display','DM Mono','JetBrains Mono'];
const COLOR_MAP = { yellow:'#fbbf24',green:'#3dba72',blue:'#4f9eff',purple:'#a56fd4',red:'#ef4444' };

// ═══════════════════════════════════════════════════════════
// GLOBAL STATE
// ═══════════════════════════════════════════════════════════
const AppState = {
  spaces: [],
  currentSpace: 0,
  editMode: false,
  snapEnabled: false,
  drawMode: false,
  connectMode: false, // for mind-map connections
  connectSource: null,
  zCounter: 10,

  get space() { return this.spaces[this.currentSpace]; },

  init() {
    const saved = localStorage.getItem('myspace_v4');
    if (saved) {
      try {
        const d = JSON.parse(saved);
        this.spaces = d.spaces || [];
        this.currentSpace = d.currentSpace || 0;
        this.zCounter = d.zCounter || 10;
      } catch(e) {}
    }
    if (!this.spaces.length) {
      this.spaces = [this._defaultSpace('Main')];
    }
    // Clamp index
    if (this.currentSpace >= this.spaces.length) this.currentSpace = 0;
  },

  _defaultSpace(name) {
    return {
      id: uid(), name,
      widgets: [],
      bg: { type:'gradient', value: BG_PRESETS[0].v, blur:0, brightness:100, dim:0, parallax:false },
      drawData: null,
      connections: [],
    };
  },

  save() {
    try {
      localStorage.setItem('myspace_v4', JSON.stringify({
        spaces: this.spaces,
        currentSpace: this.currentSpace,
        zCounter: this.zCounter,
      }));
    } catch(e) {}
  },

  toggleEditMode() {
    this.editMode = !this.editMode;
    document.getElementById('canvas').classList.toggle('edit-mode', this.editMode);
    document.getElementById('edit-btn').classList.toggle('on', this.editMode);
    document.getElementById('edit-badge').classList.toggle('show', this.editMode);
    // Lock all widgets in view mode
    document.querySelectorAll('.widget').forEach(el => {
      el.classList.toggle('locked', !this.editMode);
    });
    // Disable draw mode if exiting
    if (!this.editMode && this.drawMode) Draw.toggle();
  },

  toggleSnap() {
    this.snapEnabled = !this.snapEnabled;
    document.getElementById('snap-btn').classList.toggle('on', this.snapEnabled);
    document.getElementById('snap-grid').classList.toggle('show', this.snapEnabled);
  },
};

// ─── Shorthand ───────────────────────────────────────────
const State = AppState;

// ═══════════════════════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════════════════════
function uid() { return Math.random().toString(36).slice(2,11); }
function snap(v) { return State.snapEnabled ? Math.round(v / GRID) * GRID : v; }
function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }
function colorHex(c) { return COLOR_MAP[c] || c; }

function toast(msg, ms=2200) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.style.display='block';
  clearTimeout(el._t);
  el._t = setTimeout(() => el.style.display='none', ms);
}

// ═══════════════════════════════════════════════════════════
// HISTORY (Undo / Redo) — stores last 20 states
// ═══════════════════════════════════════════════════════════
const History = (() => {
  const MAX = 20;
  let stack = [], ptr = -1;

  function push() {
    const snap = JSON.parse(JSON.stringify(State.space.widgets));
    if (ptr < stack.length - 1) stack = stack.slice(0, ptr + 1);
    stack.push(snap);
    if (stack.length > MAX) stack.shift();
    ptr = stack.length - 1;
    _updateBtns();
  }

  function undo() {
    if (ptr <= 0) return toast('Nothing to undo');
    ptr--;
    State.space.widgets = JSON.parse(JSON.stringify(stack[ptr]));
    Render.all(); State.save(); _updateBtns(); toast('Undo');
  }

  function redo() {
    if (ptr >= stack.length - 1) return toast('Nothing to redo');
    ptr++;
    State.space.widgets = JSON.parse(JSON.stringify(stack[ptr]));
    Render.all(); State.save(); _updateBtns(); toast('Redo');
  }

  function reset() { stack=[]; ptr=-1; push(); _updateBtns(); }

  function _updateBtns() {
    ['undo-btn','undo-desktop-btn'].forEach(id => {
      const b = document.getElementById(id); if(b) b.disabled = ptr <= 0;
    });
    ['redo-btn','redo-desktop-btn'].forEach(id => {
      const b = document.getElementById(id); if(b) b.disabled = ptr >= stack.length-1;
    });
  }

  return { push, undo, redo, reset };
})();

// ═══════════════════════════════════════════════════════════
// CANVAS PAN + PINCH ZOOM
// ═══════════════════════════════════════════════════════════
const Viewport = (() => {
  let tx=0, ty=0, scale=1;
  const MIN_SCALE=0.25, MAX_SCALE=3;
  const cv = () => document.getElementById('canvas');

  function apply(animated=false) {
    const el = cv();
    el.style.transition = animated ? 'transform 0.25s ease' : 'none';
    el.style.transform = `translate(${tx}px,${ty}px) scale(${scale})`;
    document.getElementById('zoom-badge').textContent = Math.round(scale*100)+'%';
  }

  function constrainPan() {
    // Allow some slack beyond canvas bounds
    const vpW = window.innerWidth, vpH = window.innerHeight;
    const cW = CANVAS_W * scale, cH = CANVAS_H * scale;
    tx = clamp(tx, -cW + vpW * 0.2, vpW * 0.8);
    ty = clamp(ty, -cH + vpH * 0.2, vpH * 0.8);
  }

  function panBy(dx, dy) { tx+=dx; ty+=dy; constrainPan(); apply(); }

  function zoomAt(cx, cy, delta) {
    const newScale = clamp(scale * delta, MIN_SCALE, MAX_SCALE);
    const ratio = newScale / scale;
    tx = cx - ratio*(cx-tx);
    ty = cy - ratio*(cy-ty);
    scale = newScale;
    constrainPan(); apply();
  }

  function reset() {
    // Center canvas on viewport start
    const safeTop = parseInt(getComputedStyle(document.documentElement).getPropertyValue('--topbar')) || 48;
    tx = 20; ty = safeTop + 10; scale = 1;
    apply(true);
  }

  // Convert viewport coords → canvas coords
  function toCanvas(vx, vy) {
    return { x: (vx - tx) / scale, y: (vy - ty) / scale };
  }

  // ── Mouse Wheel zoom ────────────────────────────────────
  document.getElementById('canvas-viewport').addEventListener('wheel', e => {
    e.preventDefault();
    const delta = e.ctrlKey ? (1 - e.deltaY * 0.01) : (e.deltaY < 0 ? 1.08 : 1/1.08);
    zoomAt(e.clientX, e.clientY, delta);
  }, { passive:false });

  // ── Touch ────────────────────────────────────────────────
  let touches = {};
  let lastPinchDist = null, lastPinchMid = null;
  let panStart = null;
  let panStartTx, panStartTy;

  document.getElementById('canvas-viewport').addEventListener('touchstart', e => {
    for (const t of e.touches) touches[t.identifier] = { x:t.clientX, y:t.clientY };

    if (e.touches.length === 1) {
      const t = e.touches[0];
      // Only pan if touching the background (not a widget drag handle)
      const target = document.elementFromPoint(t.clientX, t.clientY);
      const onHandle = target?.closest('.w-handle') || target?.closest('.w-resize');
      const onWidget = target?.closest('.widget');
      if (!onWidget || !State.editMode) {
        panStart = { x:t.clientX, y:t.clientY };
        panStartTx = tx; panStartTy = ty;
      }
    } else {
      panStart = null;
    }

    if (e.touches.length === 2) {
      const [a,b] = [e.touches[0], e.touches[1]];
      lastPinchDist = Math.hypot(b.clientX-a.clientX, b.clientY-a.clientY);
      lastPinchMid = { x:(a.clientX+b.clientX)/2, y:(a.clientY+b.clientY)/2 };
    }
  }, { passive:true });

  document.getElementById('canvas-viewport').addEventListener('touchmove', e => {
    e.preventDefault();
    for (const t of e.touches) touches[t.identifier] = { x:t.clientX, y:t.clientY };

    if (e.touches.length === 1 && panStart) {
      const t = e.touches[0];
      tx = panStartTx + (t.clientX - panStart.x);
      ty = panStartTy + (t.clientY - panStart.y);
      constrainPan(); apply();
    }

    if (e.touches.length === 2) {
      const [a,b] = [e.touches[0], e.touches[1]];
      const dist = Math.hypot(b.clientX-a.clientX, b.clientY-a.clientY);
      const mid = { x:(a.clientX+b.clientX)/2, y:(a.clientY+b.clientY)/2 };

      if (lastPinchDist) {
        // Scale
        const delta = dist / lastPinchDist;
        zoomAt(mid.x, mid.y, delta);
        // Pan with midpoint movement
        panBy(mid.x - lastPinchMid.x, mid.y - lastPinchMid.y);
      }
      lastPinchDist = dist; lastPinchMid = mid;
    }
  }, { passive:false });

  document.getElementById('canvas-viewport').addEventListener('touchend', e => {
    for (const t of e.changedTouches) delete touches[t.identifier];
    if (e.touches.length < 2) { lastPinchDist = null; lastPinchMid = null; }
    if (e.touches.length === 0) panStart = null;
  }, { passive:true });

  // ── Mouse pan (desktop: middle click or background drag) ─
  let mPan = false, mPanStart;
  document.getElementById('canvas-viewport').addEventListener('mousedown', e => {
    if (e.button === 1 || (e.button === 0 && !e.target.closest('.widget'))) {
      if (e.button === 0 && State.editMode && e.target.closest('.widget')) return;
      mPan = true;
      mPanStart = { x:e.clientX - tx, y:e.clientY - ty };
      e.preventDefault();
    }
  });
  window.addEventListener('mousemove', e => {
    if (!mPan) return;
    tx = e.clientX - mPanStart.x;
    ty = e.clientY - mPanStart.y;
    constrainPan(); apply();
  });
  window.addEventListener('mouseup', () => { mPan = false; });

  return { apply, reset, toCanvas, get scale() { return scale; }, get tx() { return tx; }, get ty() { return ty; } };
})();

// ═══════════════════════════════════════════════════════════
// BACKGROUND SYSTEM
// ═══════════════════════════════════════════════════════════
const Background = (() => {
  let parallaxOn = false;

  function apply() {
    const bg = State.space.bg;
    const layer = document.getElementById('bg-layer');
    const overlay = document.getElementById('bg-overlay');
    if (bg.type === 'gradient') { layer.style.background = bg.value; layer.style.backgroundSize=''; }
    else if (bg.type === 'image') { layer.style.background = `url('${bg.value}') center/cover no-repeat`; }
    layer.style.filter = `blur(${bg.blur||0}px) brightness(${bg.brightness||100}%)`;
    overlay.style.background = `rgba(0,0,0,${(bg.dim||0)/100})`;
    document.getElementById('bg-parallax').checked = bg.parallax||false;
    document.getElementById('bg-blur').value = bg.blur||0;
    document.getElementById('bg-bright').value = bg.brightness||100;
    document.getElementById('bg-dim').value = bg.dim||0;
    if (bg.parallax) startParallax(); else stopParallax();
  }

  function renderPresets() {
    const g = document.getElementById('preset-grid'); g.innerHTML='';
    BG_PRESETS.forEach(p => {
      const sw = document.createElement('div');
      sw.className='preset-sw'+(State.space.bg.value===p.v?' on':'');
      sw.style.background = p.v;
      sw.addEventListener('click', () => {
        document.querySelectorAll('.preset-sw').forEach(s=>s.classList.remove('on'));
        sw.classList.add('on');
        const bg = State.space.bg; bg.type='gradient'; bg.value=p.v;
        apply(); State.save();
      });
      g.appendChild(sw);
    });
  }

  function startParallax() {
    if (parallaxOn) return; parallaxOn=true;
    if (IS_TOUCH && typeof DeviceOrientationEvent !== 'undefined') {
      const req = DeviceOrientationEvent.requestPermission;
      if (typeof req === 'function') req().then(r => { if(r==='granted') window.addEventListener('deviceorientation', _gyro, {passive:true}); });
      else window.addEventListener('deviceorientation', _gyro, {passive:true});
    } else { window.addEventListener('mousemove', _mouse); }
  }

  function stopParallax() {
    parallaxOn=false;
    window.removeEventListener('deviceorientation', _gyro);
    window.removeEventListener('mousemove', _mouse);
    document.getElementById('bg-layer').style.transform='';
  }

  function _gyro(e) {
    const x=clamp(e.gamma||0,-15,15), y=clamp((e.beta||0)-45,-15,15);
    document.getElementById('bg-layer').style.transform=`translate(${x*.5}px,${y*.5}px) scale(1.05)`;
  }
  function _mouse(e) {
    const cx=window.innerWidth/2, cy=window.innerHeight/2;
    const dx=(e.clientX-cx)/cx, dy=(e.clientY-cy)/cy;
    document.getElementById('bg-layer').style.transform=`translate(${dx*-16}px,${dy*-16}px) scale(1.05)`;
  }

  // Slider bindings
  ['bg-blur','bg-bright','bg-dim'].forEach(id => {
    document.getElementById(id).addEventListener('input', e => {
      const map={'bg-blur':'blur','bg-bright':'brightness','bg-dim':'dim'};
      State.space.bg[map[id]] = parseInt(e.target.value);
      apply(); State.save();
    });
  });
  document.getElementById('bg-parallax').addEventListener('change', e => {
    State.space.bg.parallax = e.target.checked; State.save();
    if (e.target.checked) startParallax(); else stopParallax();
  });
  document.getElementById('bg-upload').addEventListener('change', e => {
    const f=e.target.files[0]; if(!f) return;
    const r=new FileReader(); r.onload=ev=>{
      const bg=State.space.bg; bg.type='image'; bg.value=ev.target.result;
      apply(); State.save(); renderPresets();
    }; r.readAsDataURL(f);
  });

  return { apply, renderPresets };
})();

// ═══════════════════════════════════════════════════════════
// SPACES
// ═══════════════════════════════════════════════════════════
const Spaces = (() => {
  function render() {
    const list = document.getElementById('spaces-list'); list.innerHTML='';
    State.spaces.forEach((s,i) => {
      const row = document.createElement('div');
      row.className='space-row'+(i===State.currentSpace?' on':'');
      row.innerHTML=`
        <div class="space-row-name" contenteditable="true"
             onblur="Spaces.rename(${i},this.textContent)"
             onkeydown="if(event.key==='Enter'){event.preventDefault();this.blur()}">${s.name}</div>
        <span class="space-row-meta">${s.widgets.length} widgets</span>
        ${State.spaces.length>1?`<button class="space-row-del" onclick="Spaces.del(${i})"><i class="fas fa-times"></i></button>`:''}
      `;
      row.addEventListener('click', e => {
        if(e.target.isContentEditable||e.target.closest('.space-row-del')) return;
        Spaces.switchTo(i); UI.closeAll();
      });
      list.appendChild(row);
    });
  }

  function switchTo(idx) {
    State.currentSpace = idx;
    document.getElementById('space-name-btn').textContent = State.space.name;
    Render.all(); Background.apply(); Connections.render();
    Draw.loadFromSpace(); History.reset(); State.save();
  }

  function add() {
    State.spaces.push(AppState._defaultSpace(`Space ${State.spaces.length+1}`));
    State.currentSpace = State.spaces.length-1;
    switchTo(State.currentSpace); render();
  }

  function del(idx) {
    if(State.spaces.length<=1) return toast('Cannot delete last space');
    State.spaces.splice(idx,1);
    if(State.currentSpace>=State.spaces.length) State.currentSpace=State.spaces.length-1;
    switchTo(State.currentSpace); render(); State.save();
  }

  function rename(idx, name) {
    State.spaces[idx].name = name.trim()||`Space ${idx+1}`;
    document.getElementById('space-name-btn').textContent = State.space.name;
    State.save();
  }

  return { render, switchTo, add, del, rename };
})();

// ═══════════════════════════════════════════════════════════
// WIDGET SYSTEM
// ═══════════════════════════════════════════════════════════

/* ── Find widget in state ── */
function findW(id) { return State.space.widgets.find(w=>w.id===id); }

/* ── Update widget data and save ── */
function updateW(id, patch) {
  const w=findW(id); if(!w) return;
  Object.assign(w,patch); State.save();
}

/* ── Add widget ── */
function addWidget(type) {
  const meta = WIDGET_META[type];
  const vp = Viewport;
  // Place in visible center of viewport
  const vcx = (window.innerWidth/2 - vp.tx) / vp.scale;
  const vcy = (window.innerHeight/2 - vp.ty) / vp.scale;
  const w = {
    id: uid(), type,
    x: snap(vcx - meta.w/2 + (Math.random()-0.5)*60),
    y: snap(vcy - meta.h/2 + (Math.random()-0.5)*60),
    width: meta.w, height: meta.h,
    z: ++State.zCounter,
    color: 'yellow', font: 'DM Sans',
    content: '', tags: [], locked: false, pinned: false,
    createdAt: Date.now(),
    // type-specific defaults
    ...(type==='todo'   ? { items:[] } : {}),
    ...(type==='habit'  ? { habits:[] } : {}),
    ...(type==='reminder' ? { reminders:[] } : {}),
    ...(type==='pomodoro' ? { pomWork:25, pomBreak:5, pomState:'idle', pomLeft:25*60, pomSession:'work' } : {}),
    ...(type==='calendar' ? { calYear: new Date().getFullYear(), calMonth: new Date().getMonth() } : {}),
    ...(type==='ambient' ? { playing:null } : {}),
  };
  History.push();
  State.space.widgets.push(w);
  const el = buildWidgetEl(w);
  document.getElementById('canvas').appendChild(el);
  if(!State.editMode) State.toggleEditMode();
  State.save();
  return w;
}

/* ── Delete widget ── */
function deleteWidget(id) {
  History.push();
  State.space.widgets = State.space.widgets.filter(w=>w.id!==id);
  const el = document.querySelector(`.widget[data-id="${id}"]`);
  if(el) { el.style.animation='wOut 0.18s ease forwards'; setTimeout(()=>el.remove(),180); }
  // Remove connections involving this widget
  State.space.connections = (State.space.connections||[]).filter(c=>c.a!==id&&c.b!==id);
  Connections.render(); State.save();
}

/* ── Duplicate widget ── */
function duplicateWidget(w) {
  History.push();
  const n = JSON.parse(JSON.stringify(w));
  n.id=uid(); n.x=snap(w.x+24); n.y=snap(w.y+24); n.z=++State.zCounter;
  State.space.widgets.push(n);
  const el = buildWidgetEl(n);
  document.getElementById('canvas').appendChild(el);
  State.save();
}

// ═══════════════════════════════════════════════════════════
// BUILD WIDGET ELEMENT
// ═══════════════════════════════════════════════════════════
function buildWidgetEl(w) {
  const el = document.createElement('div');
  el.className = 'widget '+w.type+'-widget';
  el.dataset.id = w.id;
  el.style.cssText = `left:${w.x}px;top:${w.y}px;width:${w.width}px;height:${w.height}px;z-index:${w.z||10}`;
  if(w.color) el.dataset.color = w.color;
  if(w.faded) el.classList.add('faded');
  if(w.locked) el.classList.add('locked-note');

  // Tags
  if(w.tags?.length) {
    const tb = document.createElement('div'); tb.className='w-tags';
    w.tags.forEach(t=>{ const s=document.createElement('span'); s.className='w-tag'; s.textContent='#'+t; tb.appendChild(s); });
    el.appendChild(tb);
  }

  // Drag handle
  const dh = document.createElement('div'); dh.className='w-handle';
  dh.innerHTML=`<div class="w-handle-dots">${Array(6).fill('<span></span>').join('')}</div><div class="w-handle-spacer"></div><button class="w-handle-btn del" onclick="deleteWidget('${w.id}')"><i class="fas fa-trash-alt"></i></button>`;
  el.appendChild(dh);

  // Body
  const body = document.createElement('div'); body.className='w-body';
  body.style.height='100%';
  body.appendChild(buildInner(w));
  el.appendChild(body);

  // Resize
  const rh = document.createElement('div'); rh.className='w-resize'; el.appendChild(rh);

  // Attach interactions
  attachDrag(dh, el, w);
  attachResize(rh, el, w);
  attachLongPress(el, w);
  el.addEventListener('mousedown', ()=>{ if(State.editMode) selectWidget(el,w); });
  el.addEventListener('touchstart', ()=>{ if(State.editMode) selectWidget(el,w); },{passive:true});
  el.addEventListener('contextmenu', e=>{ e.preventDefault(); Ctx.show(e.clientX,e.clientY,w); });

  if(!State.editMode) el.classList.add('locked');
  return el;
}

/* ── Build inner content per type ── */
function buildInner(w) {
  const wrap = document.createElement('div'); wrap.style.height='100%';

  switch(w.type) {

    case 'note': {
      wrap.innerHTML=`
        <div class="wh"><i class="${WIDGET_META.note.icon}"></i>Note<span class="wh-spacer"></span>
        <select class="note-font-sel" onchange="updateW('${w.id}',{font:this.value});document.querySelector('.widget[data-id=\\'${w.id}\\'] .note-editable').style.fontFamily=this.value">
          ${NOTE_FONTS.map(f=>`<option value="${f}"${w.font===f?' selected':''}>${f}</option>`).join('')}
        </select></div>

/* ── Pomodoro ── */
const pomoTimers = {};
function buildPomodoro(w, wrap) {
const r=42, circ=2*Math.PI*r;
wrap.innerHTML=` <div class="wh"><i class="${WIDGET_META.pomodoro.icon}"></i>Pomodoro</div> <div class="pomo-body"> <div class="pomo-ring"> <svg width="90" height="90" viewBox="0 0 90 90"> <circle class="bg-ring" cx="45" cy="45" r="${r}"/> <circle class="prog-ring" id="pomo-ring-${w.id}" cx="45" cy="45" r="${r}" stroke-dasharray="${circ}" stroke-dashoffset="0"/> </svg> <div class="pomo-time" id="pomo-time-${w.id}">--:--</div> </div> <div class="pomo-label" id="pomo-label-${w.id}">${w.pomSession||'work'}</div> <div class="pomo-controls"> <button class="pomo-btn" onclick="pomoAction('${w.id}','start')" id="pomo-start-${w.id}"><i class="fas fa-play"></i></button> <button class="pomo-btn" onclick="pomoAction('${w.id}','pause')"><i class="fas fa-pause"></i></button> <button class="pomo-btn" onclick="pomoAction('${w.id}','reset')"><i class="fas fa-redo"></i></button> </div> <div style="display:flex;gap:8px;align-items:center;font-size:11px;color:var(--text2)"> <span>Work</span> <input type="number" min="1" max="60" value="${w.pomWork||25}" style="width:40px;background:var(--bg3);border:1px solid var(--border2);border-radius:5px;padding:3px 5px;color:var(--text);font-size:11px;outline:none;text-align:center" onchange="updateW('${w.id}',{pomWork:+this.value})"> <span>Break</span> <input type="number" min="1" max="30" value="${w.pomBreak||5}" style="width:40px;background:var(--bg3);border:1px solid var(--border2);border-radius:5px;padding:3px 5px;color:var(--text);font-size:11px;outline:none;text-align:center" onchange="updateW('${w.id}',{pomBreak:+this.value})"> </div> </div>`;
pomoUpdate(w.id);
}

function pomoAction(id, action) {
const w=findW(id); if(!w) return;
if(action===‘start’) {
clearInterval(pomoTimers[id]);
pomoTimers[id]=setInterval(()=>{
w.pomLeft–;
if(w.pomLeft<=0) {
clearInterval(pomoTimers[id]);
w.pomSession = w.pomSession===‘work’?‘break’:‘work’;
w.pomLeft = (w.pomSession===‘work’?w.pomWork:w.pomBreak)*60;
toast(`Pomodoro: ${w.pomSession} time!`);
if(‘Notification’ in window && Notification.permission===‘granted’) new Notification(`Pomodoro: ${w.pomSession} time!`);
}
pomoUpdate(id); State.save();
},1000);
document.getElementById(‘pomo-start-’+id)?.classList.add(‘active’);
} else if(action===‘pause’) {
clearInterval(pomoTimers[id]);
document.getElementById(‘pomo-start-’+id)?.classList.remove(‘active’);
} else if(action===‘reset’) {
clearInterval(pomoTimers[id]);
w.pomLeft=(w.pomWork||25)*60; w.pomSession=‘work’;
pomoUpdate(id); State.save();
document.getElementById(‘pomo-start-’+id)?.classList.remove(‘active’);
}
}

function pomoUpdate(id) {
const w=findW(id); if(!w) return;
const tEl=document.getElementById(‘pomo-time-’+id); if(!tEl) return;
const m=Math.floor(w.pomLeft/60), s=w.pomLeft%60;
tEl.textContent=`${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
const lEl=document.getElementById(‘pomo-label-’+id); if(lEl) lEl.textContent=w.pomSession||‘work’;
const rEl=document.getElementById(‘pomo-ring-’+id); if(!rEl) return;
const r=42, circ=2*Math.PI*r;
const total=(w.pomSession===‘work’?w.pomWork:w.pomBreak)*60||1500;
rEl.style.strokeDashoffset=circ*(1-w.pomLeft/total);
}

function buildCalendar(w, wrap) {
const months=[‘January’,‘February’,‘March’,‘April’,‘May’,‘June’,‘July’,‘August’,‘September’,‘October’,‘November’,‘December’];
const now=new Date(), curYear=w.calYear||now.getFullYear(), curMonth=w.calMonth??now.getMonth();
const days=[‘Su’,‘Mo’,‘Tu’,‘We’,‘Th’,‘Fr’,‘Sa’];
const first=new Date(curYear,curMonth,1).getDay();
const daysInMonth=new Date(curYear,curMonth+1,0).getDate();
let cells=’’;
for(let i=0;i<first;i++) cells+=`<div class="cal-day other-month">${new Date(curYear,curMonth,-(first-i-1)).getDate()}</div>`;
for(let d=1;d<=daysInMonth;d++) {
const isToday=d===now.getDate()&&curMonth===now.getMonth()&&curYear===now.getFullYear();
cells+=`<div class="cal-day${isToday?' today':''}">${d}</div>`;
}

}

const move=startDrag(e.clientX,e.clientY); if(!move) return;
