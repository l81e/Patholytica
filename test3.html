<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emoji Stylizer</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-main: #f8fafc;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem;
            line-height: 1.6;
        }

        .container {
            width: 100%;
            max-width: 800px;
        }

        textarea {
            width: 100%;
            height: 150px;
            background: var(--card-bg);
            color: white;
            border: 1px solid #334155;
            border-radius: 8px;
            padding: 1rem;
            font-size: 1rem;
            margin-bottom: 1.5rem;
            resize: vertical;
        }

        #output {
            min-height: 150px;
            background: var(--card-bg);
            border-radius: 8px;
            padding: 1.5rem;
            border: 1px solid #334155;
            white-space: pre-wrap;
        }

        h1 { margin-bottom: 0.5rem; color: #38bdf8; }
        p { margin-bottom: 1.5rem; opacity: 0.8; }

        /* --- DYNAMIC STYLES --- */

        /* Core Emphasis */
        .style-🔍 { font-weight: bold; font-size: 130%; letter-spacing: -0.5px; text-shadow: 2px 2px 4px rgba(0,0,0,0.3); }
        .style-❗ { font-weight: bold; background: #ff4500; color: white; padding: 0 4px; border-radius: 4px; animation: pulse 1s infinite; display: inline-block; }
        .style-📌 { font-weight: bold; border-left: 4px solid #38bdf8; background: rgba(56, 189, 248, 0.1); padding: 2px 8px; }
        .style-🔥 { font-weight: bold; background: linear-gradient(to right, #ff4d00, #ff9900); -webkit-background-clip: text; -webkit-text-fill-color: transparent; filter: drop-shadow(0 0 2px #ff4d00); }

        /* Glows */
        .style-🟡 { text-shadow: 0 0 8px #fde047; background: rgba(253, 224, 71, 0.1); border-radius: 4px; }
        .style-🔵 { text-shadow: 0 0 8px #3b82f6; background: rgba(59, 130, 246, 0.1); border-radius: 4px; }
        .style-🔴 { text-shadow: 0 0 8px #ef4444; background: rgba(239, 68, 68, 0.1); border-radius: 4px; font-weight: bold; }

        /* Knowledge */
        .style-🧠 { font-style: italic; border-bottom: 2px solid #3b82f6; }
        .style-💡 { background: rgba(250, 204, 21, 0.3); box-shadow: 0 0 15px rgba(250, 204, 21, 0.4); border-radius: 2px; }
        .style-📖 { font-family: 'Georgia', serif; background: #fef3c7; color: #451a03; padding: 2px 10px; border-radius: 2px; }

        /* Motion & Energy */
        .style-⚡ { color: #facc15; text-shadow: 0 0 10px #3b82f6; animation: quickPulse 0.4s infinite alternate; display: inline-block; }
        .style-🌊 { display: inline-block; animation: wave 2s ease-in-out infinite; }
        .style-🚀 { display: inline-block; animation: rocket 0.5s ease-out forwards; font-style: italic; }

        /* Decorative */
        .style-🌈 { background: linear-gradient(90deg, #ff0000, #ff7f00, #ffff00, #00ff00, #0000ff, #4b0082, #8b00ff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-size: 200% auto; animation: rainbow 3s linear infinite; font-weight: bold; }
        .style-✨ { animation: twinkle 1.5s infinite; text-shadow: 0 0 5px white; }

        /* Animations */
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
        @keyframes quickPulse { from { opacity: 0.8; transform: scale(1); } to { opacity: 1; transform: scale(1.1); } }
        @keyframes wave { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-5px); } }
        @keyframes rainbow { to { background-position: 200% center; } }
        @keyframes twinkle { 0%, 100% { opacity: 1; } 50% { opacity: 0.7; } }
        @keyframes rocket { from { transform: translateX(-20px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

    </style>
</head>
<body>

    <div class="container">
        <h1>Emoji Style Engine</h1>
        <p>Type text surrounded by emojis (e.g., 🔍Hello🔍 or 🔥Hot🔥) to see the effect.</p>
        
        <textarea id="input" placeholder="Try typing: This is 🔥Very Hot🔥 and this is 🌊Wavy🌊..."></textarea>
        
        <div id="output">Your styled text will appear here...</div>
    </div>

    <script>
        const input = document.getElementById('input');
        const output = document.getElementById('output');

        // Map of emojis to specific classes or logic
        // This regex looks for: [emoji][text][same emoji]
        const emojiRegex = /([\u{1F300}-\u{1F9FF}\u{2600}-\u{26FF}])(.*?)\1/gu;

        function updateStyles() {
            let text = input.value;
            
            // Basic HTML escaping to prevent XSS
            text = text.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");

            // Replace emoji patterns with styled spans
            const processedText = text.replace(emojiRegex, (match, emoji, content) => {
                return `<span class="style-${emoji}">${content}</span>`;
            });

            output.innerHTML = processedText || '<span style="opacity:0.5">Start typing...</span>';
        }

        input.addEventListener('input', updateStyles);
    </script>
</body>
</html>
