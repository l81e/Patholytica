<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Patholytica — Library</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root {
  --bg-color: #1f1f1f;
  --text-primary: #fff;
  --text-secondary: #aaa;
  --card-bg: #1f1f1f;
  --hover-bg: #2a2a2a;
  --border-color: #303030;
  --accent: #f1d19e;
  --accent-green: #2ecc71;
}

* { box-sizing: border-box; }
html, body {
  margin: 0; padding: 0;
  min-height: 100%;
  font-family: "Roboto", Arial, sans-serif;
  overflow-x: hidden; max-width: 100vw;
}
body { background: var(--bg-color); color: var(--text-primary); }

.header-wrapper {
  position: fixed; top: 0; left: 0; right: 0;
  background: var(--bg-color);
  padding-top: env(safe-area-inset-top);
  border-bottom: 1px solid var(--border-color);
  z-index: 40;
}
.header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px 24px;
}
.logo-img { height: 28px; width: auto; cursor: pointer; }
.header-actions { display: flex; align-items: center; gap: 16px; }
.auth-buttons { display: none; gap: 12px; }
.auth-buttons.show { display: flex; }
.btn-login {
  padding: 8px 20px; border-radius: 20px; font-size: 14px; font-weight: 500;
  cursor: pointer; text-decoration: none;
  border: 1px solid var(--border-color); background: transparent; color: var(--text-primary);
  transition: background 0.2s ease;
}
.btn-login:hover { background: var(--hover-bg); }
.user-welcome { display: none; align-items: center; gap: 10px; font-size: 14px; }
.user-welcome.show { display: flex; }
.welcome-text { font-weight: 500; cursor: pointer; transition: color 0.2s ease; }
.welcome-text:hover { color: var(--accent); }

.fab-create { display: none; }

.header-create-btn {
  display: none;
  align-items: center; justify-content: center;
  width: 30px; height: 30px; border-radius: 50%;
  background: rgba(241,209,158,0.12);
  border: 1px solid rgba(241,209,158,0.3);
  color: var(--accent); font-size: 14px;
  cursor: pointer; transition: background 0.2s ease, border-color 0.2s ease;
  flex-shrink: 0;
}
.header-create-btn.show { display: flex; }
.header-create-btn:hover { background: rgba(241,209,158,0.22); border-color: var(--accent); }

.list-container {
  max-width: 900px; width: 100%; margin: 0 auto;
  padding: 16px 24px 32px;
  padding-top: calc(65px + env(safe-area-inset-top) + 16px);
}

/* ── Library entry ── */
.library-entry {
  display: flex; align-items: center; gap: 10px;
  margin-bottom: 14px;
}
.library-id-input {
  flex: 1; min-width: 120px; max-width: 100%;
  background: #2a2a2a; border: 1px solid var(--border-color);
  border-radius: 10px; color: var(--text-primary);
  font-size: 15px; padding: 10px 14px; outline: none;
  transition: border-color 0.2s ease; -moz-appearance: textfield;
}
.library-id-input::-webkit-outer-spin-button,
.library-id-input::-webkit-inner-spin-button { -webkit-appearance: none; }
.library-id-input::placeholder { color: var(--text-secondary); opacity: 0.6; }
.library-id-input:focus { border-color: var(--accent); }
.library-id-input.error { border-color: #ff6b6b; }
.btn-start {
  padding: 10px 22px; border-radius: 10px;
  background: var(--accent); color: #1f1f1f;
  border: none; font-size: 14px; font-weight: 600;
  cursor: pointer; white-space: nowrap;
  transition: opacity 0.2s ease, transform 0.15s ease;
}
.btn-start:hover { opacity: 0.88; transform: translateY(-1px); }
.btn-start:active { transform: scale(0.97); }
.btn-start:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

/* ── Library banner ── */
.library-banner {
  display: none; background: #252525;
  border: 1px solid var(--border-color); border-radius: 12px;
  padding: 14px 18px; margin-bottom: 14px;
  gap: 14px; align-items: flex-start;
}
.library-banner.show { display: flex; }
.library-banner-icon {
  width: 36px; height: 36px; border-radius: 9px;
  background: rgba(241,209,158,0.12);
  display: flex; align-items: center; justify-content: center;
  color: var(--accent); font-size: 15px; flex-shrink: 0;
}
.library-banner-info { flex: 1; min-width: 0; }
.library-banner-name {
  font-size: 15px; font-weight: 600; margin-bottom: 4px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.library-banner-meta {
  font-size: 12px; color: var(--text-secondary);
  display: flex; flex-wrap: wrap; gap: 6px 12px;
}
.library-banner-meta span { display: flex; align-items: center; gap: 5px; }
.library-banner-meta i { font-size: 11px; opacity: 0.7; }
.library-banner-clear {
  background: none; border: none; color: var(--text-secondary);
  cursor: pointer; font-size: 14px; padding: 4px; border-radius: 50%;
  transition: color 0.2s ease, background 0.2s ease; flex-shrink: 0;
}
.library-banner-clear:hover { color: var(--text-primary); background: var(--hover-bg); }

/* ── Active creators ── */
.creators-section { margin-bottom: 14px; }
.section-label {
  font-size: 11px; text-transform: uppercase; letter-spacing: 1.5px;
  color: var(--text-secondary); margin-bottom: 8px; opacity: 0.6;
}
.creators-list { display: flex; flex-direction: column; gap: 2px; }
.creator-row {
  display: flex; align-items: center; gap: 12px;
  padding: 8px 10px; border-radius: 10px;
  cursor: pointer; transition: background 0.2s ease;
}
.creator-row:hover { background: var(--hover-bg); }
.creator-rank { font-size: 12px; width: 18px; text-align: center; flex-shrink: 0; font-weight: 600; color: var(--text-secondary); }
.creator-rank.gold   { color: #f1d19e; }
.creator-rank.silver { color: #b0b0b0; }
.creator-rank.bronze { color: #cd7f32; }
.creator-avatar {
  width: 32px; height: 32px; border-radius: 50%;
  background: rgba(241,209,158,0.12); border: 1px solid rgba(241,209,158,0.2);
  display: flex; align-items: center; justify-content: center;
  font-size: 13px; font-weight: 700; color: var(--accent);
  flex-shrink: 0; text-transform: uppercase;
}
.creator-info { flex: 1; min-width: 0; }
.creator-name { font-size: 14px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.creator-count { font-size: 11px; color: var(--text-secondary); }
.creator-badge {
  font-size: 11px; font-weight: 600; color: var(--accent);
  background: rgba(241,209,158,0.1); border: 1px solid rgba(241,209,158,0.2);
  border-radius: 20px; padding: 2px 9px; white-space: nowrap; flex-shrink: 0;
}
.creator-skeleton { display: flex; align-items: center; gap: 12px; padding: 8px 10px; }
.skel-circle { width: 32px; height: 32px; border-radius: 50%; background: #2a2a2a; flex-shrink: 0; animation: shimmer 1.4s infinite; }
.skel-line   { height: 11px; border-radius: 6px; background: #2a2a2a; animation: shimmer 1.4s infinite; }

/* ── Date group ── */
.date-group-header {
  font-size: 11px; text-transform: uppercase; letter-spacing: 1.5px;
  color: var(--text-secondary); opacity: 0.55;
  padding: 14px 0 8px;
  border-bottom: 1px solid var(--border-color);
  position: sticky; top: calc(65px + env(safe-area-inset-top));
  background: var(--bg-color); z-index: 10;
}

/* ── Articles ── */
.article-list { list-style: none; margin: 0; padding: 0; }
.article-item {
  padding: 16px 0; border-bottom: 1px solid var(--border-color);
  cursor: pointer; transition: background 0.2s ease;
}
.article-item:hover { background: var(--hover-bg); margin: 0 -12px; padding: 16px 12px; }
.article-title {
  font-family: 'Merriweather', Georgia, serif;
  font-size: 28px; font-weight: 700; margin: 0 0 6px 0;
  line-height: 1.3; color: var(--text-primary); word-wrap: break-word;
}
.article-item:hover .article-title { color: var(--accent); }
.article-meta { font-size: 13px; color: var(--text-secondary); display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
.meta-dot { width: 3px; height: 3px; background: var(--text-secondary); border-radius: 50%; }

/* ── Load more ── */
.load-more-row { padding: 10px 0; border-bottom: 1px solid var(--border-color); }
.btn-load-more {
  background: none; border: none; color: var(--accent);
  font-size: 13px; font-weight: 500; cursor: pointer;
  padding: 5px 0; display: flex; align-items: center; gap: 6px;
  opacity: 0.85; transition: opacity 0.2s ease;
}
.btn-load-more:hover { opacity: 1; }
.btn-load-more i { font-size: 11px; transition: transform 0.2s ease; }
.btn-load-more.open i { transform: rotate(180deg); }
.btn-load-more.loading { opacity: 0.5; pointer-events: none; }

/* ── Skeletons ── */
.skeleton-article { padding: 16px 0; border-bottom: 1px solid var(--border-color); }
.skel-title-lg { height: 28px; border-radius: 6px; background: #2a2a2a; margin-bottom: 8px; width: 75%; animation: shimmer 1.4s infinite; }
.skel-title-sm { height: 20px; border-radius: 6px; background: #2a2a2a; margin-bottom: 8px; width: 45%; animation: shimmer 1.4s infinite; }
.skel-meta     { height: 11px; border-radius: 6px; background: #2a2a2a; width: 28%; animation: shimmer 1.4s infinite; }
@keyframes shimmer { 0%,100%{opacity:0.45} 50%{opacity:0.9} }

.loading-state { text-align: center; padding: 32px; color: var(--text-secondary); font-size: 15px; }
.error-state   { text-align: center; padding: 32px; color: #ff4444; font-size: 15px; }

/* ── Space button ── */
.space-btn-wrap {
  display: none;
  max-width: 900px; width: 100%; margin: 0 auto;
  padding: 0 24px 16px;
}
.space-btn-wrap.show { display: block; }
.btn-space-wide {
  display: flex; align-items: center; justify-content: center; gap: 10px;
  width: 100%; padding: 14px 20px; border-radius: 14px;
  background: linear-gradient(135deg, rgba(241,209,158,0.10) 0%, rgba(241,209,158,0.04) 100%);
  color: var(--accent);
  border: 1px solid rgba(241,209,158,0.30);
  font-size: 15px; font-weight: 600; cursor: pointer;
  text-decoration: none; letter-spacing: 0.3px;
  transition: background 0.25s ease, border-color 0.25s ease, box-shadow 0.25s ease;
  box-shadow: 0 0 18px rgba(241,209,158,0.06);
}
.btn-space-wide:hover {
  background: linear-gradient(135deg, rgba(241,209,158,0.18) 0%, rgba(241,209,158,0.08) 100%);
  border-color: rgba(241,209,158,0.55);
  box-shadow: 0 0 28px rgba(241,209,158,0.14);
}
.btn-space-wide i { font-size: 16px; }

/* ── Pong collapsed toggle ── */
.pong-section {
  display: none;
  max-width: 900px; width: 100%; margin: 0 auto;
  padding: 0 24px 0;
}
.pong-section.show { display: block; }

.pong-toggle {
  width: 100%;
  display: flex; align-items: center; justify-content: space-between;
  background: none; border: none; border-top: 1px solid var(--border-color);
  padding: 12px 0;
  cursor: pointer; color: var(--text-secondary);
  transition: color 0.2s ease;
}
.pong-toggle:hover { color: var(--text-primary); }
.pong-toggle-left {
  display: flex; align-items: center; gap: 8px;
  font-size: 11px; text-transform: uppercase; letter-spacing: 1.5px; opacity: 0.6;
}
.pong-toggle-left i { font-size: 13px; opacity: 0.8; }
.pong-toggle-chevron {
  font-size: 11px; opacity: 0.5;
  transition: transform 0.25s ease;
}
.pong-toggle.open .pong-toggle-chevron { transform: rotate(180deg); }

.pong-body {
  overflow: hidden;
  max-height: 0;
  transition: max-height 0.35s ease;
}
.pong-body.open { max-height: 400px; }

.pong-inner {
  display: flex; flex-direction: column; align-items: center; gap: 8px;
  padding: 10px 0 4px;
}
.pong-score { font-size: 13px; color: var(--text-secondary); letter-spacing: 2px; }
.pong-score span { color: var(--accent); font-weight: 600; }
#pongCanvas { border: 1px solid var(--border-color); border-radius: 8px; display: block; background: #141414; max-width: 100%; }
.pong-hint { font-size: 11px; color: var(--text-secondary); opacity: 0.5; text-align: center; padding-bottom: 14px; }

/* ── Footer ── */
.footer {
  background: var(--bg-color); border-top: 1px solid var(--border-color);
  padding: 14px 24px 24px;
  text-align: center;
  color: var(--text-secondary); font-size: 14px;
  padding-bottom: calc(64px + env(safe-area-inset-bottom) + 10px);
}
.article-count { color: var(--accent); font-weight: 600; }

.footer-bar {
  position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
  width: 100%; max-width: 450px;
  background: var(--card-bg); border-top: 1px solid var(--border-color);
  padding: 8px 24px; padding-bottom: calc(8px + env(safe-area-inset-bottom));
  display: flex; justify-content: space-around; align-items: center; z-index: 100;
}
.footer-btn {
  display: flex; flex-direction: column; align-items: center; gap: 2px;
  background: none; border: none; color: var(--text-secondary);
  cursor: pointer; transition: color 0.2s ease; padding: 6px 12px;
}
.footer-btn:hover { color: var(--text-primary); }
.footer-btn.active { color: var(--accent); }
.footer-btn i { font-size: 20px; }
.footer-btn span { font-size: 10px; font-weight: 500; }

.footer-credit {
  text-align: center;
  padding: 6px 0 2px;
  font-size: 12px;
  color: var(--text-secondary);
  opacity: 0.45;
}
.footer-credit a {
  color: inherit;
  text-decoration: underline;
  text-underline-offset: 2px;
}

@media (max-width: 768px) {
  .list-container { padding: 12px 16px 24px; padding-top: calc(65px + env(safe-area-inset-top) + 12px); }
  .article-title { font-size: 22px; }
  .article-meta { font-size: 12px; }
  .footer { padding: 12px 16px; font-size: 13px; padding-bottom: calc(64px + env(safe-area-inset-bottom) + 10px); }
  .footer-bar { padding: 8px 16px; padding-bottom: calc(8px + env(safe-area-inset-bottom)); }
  .footer-btn { padding: 6px 8px; }
  .footer-btn i { font-size: 18px; }
  .footer-btn span { font-size: 9px; }
  .pong-section, .space-btn-wrap { padding-left: 16px; padding-right: 16px; }
  .library-id-input { max-width: 100%; font-size: 14px; }
  .btn-start { font-size: 13px; padding: 9px 14px; }
}
</style>
</head>
<body>

<div class="header-wrapper">
  <div class="header">
    <img src="IMG_3220.png" class="logo-img" alt="Patholytica Logo">
    <div class="header-actions">
      <div class="auth-buttons" id="authButtons">
        <a href="login.html" class="btn-login">Log In</a>
      </div>
      <div class="user-welcome" id="userWelcome">
        <span class="welcome-text" id="welcomeText">Welcome</span>
        <button class="header-create-btn" id="fabCreateBtn" onclick="window.location.href='https://patholytica.com/create'">
          <i class="fas fa-plus"></i>
        </button>
      </div>
    </div>
  </div>
</div>

<div class="list-container">

  <div class="library-entry">
    <input type="number" id="libraryIdInput" class="library-id-input"
      placeholder="Library ID" min="1" inputmode="numeric" pattern="[0-9]*"
      onkeydown="if(event.key==='Enter') startLibrary()">
    <button class="btn-start" id="startBtn" onclick="startLibrary()">Start</button>
  </div>

  <div class="library-banner" id="libraryBanner">
    <div class="library-banner-icon"><i class="fas fa-book-open"></i></div>
    <div class="library-banner-info">
      <div class="library-banner-name" id="libraryBannerName">—</div>
      <div class="library-banner-meta" id="libraryBannerMeta"></div>
    </div>
    <button class="library-banner-clear" onclick="clearLibraryFilter()"><i class="fas fa-times"></i></button>
  </div>

  <div class="creators-section">
    <div class="section-label">Active Creators</div>
    <div class="creators-list" id="creatorsList">
      <div class="creator-skeleton"><div class="skel-circle"></div><div style="flex:1"><div class="skel-line" style="width:42%;margin-bottom:5px"></div><div class="skel-line" style="width:24%"></div></div></div>
      <div class="creator-skeleton"><div class="skel-circle"></div><div style="flex:1"><div class="skel-line" style="width:56%;margin-bottom:5px"></div><div class="skel-line" style="width:20%"></div></div></div>
      <div class="creator-skeleton"><div class="skel-circle"></div><div style="flex:1"><div class="skel-line" style="width:34%;margin-bottom:5px"></div><div class="skel-line" style="width:28%"></div></div></div>
    </div>
  </div>

  <ul class="article-list" id="articleList">
    <li class="skeleton-article"><div class="skel-title-lg"></div><div class="skel-title-sm"></div><div class="skel-meta"></div></li>
    <li class="skeleton-article"><div class="skel-title-lg" style="width:62%"></div><div class="skel-title-sm" style="width:40%"></div><div class="skel-meta" style="width:22%"></div></li>
    <li class="skeleton-article"><div class="skel-title-lg" style="width:78%"></div><div class="skel-title-sm" style="width:52%"></div><div class="skel-meta" style="width:30%"></div></li>
  </ul>

</div>

<!-- Space button — above pong -->
<div class="space-btn-wrap" id="spaceBtnWrap">
  <a href="https://patholytica.com/space" target="_blank" class="btn-space-wide">
    <i class="fas fa-meteor"></i> Open Space
  </a>
</div>

<!-- Pong — collapsed by default -->
<div class="pong-section" id="pongSection">
  <button class="pong-toggle" id="pongToggle" onclick="togglePong()">
    <span class="pong-toggle-left">
      <i class="fas fa-table-tennis-paddle-ball"></i> Mini Pong
    </span>
    <i class="fas fa-chevron-down pong-toggle-chevron"></i>
  </button>
  <div class="pong-body" id="pongBody">
    <div class="pong-inner">
      <div class="pong-score">YOU <span id="playerScore">0</span> &nbsp;—&nbsp; <span id="aiScore">0</span> AI</div>
      <canvas id="pongCanvas" width="480" height="200"></canvas>
      <div class="pong-hint" id="pongHint">Click or tap to start &nbsp;·&nbsp; Mouse / drag to move paddle</div>
    </div>
  </div>
</div>

<footer class="footer">
  <span class="article-count" id="articleCount">0</span> articles accessible
</footer>

<div class="footer-credit">
  Prototype by <a href="https://www.instagram.com/eyadayms?" target="_blank">Eyad</a>
</div>

<div class="footer-bar">
  <button class="footer-btn active" onclick="window.location.href='index.html'"><i class="fas fa-home"></i><span>Home</span></button>
  <button class="footer-btn" onclick="window.location.href='https://patholytica.com/dailyfeed'"><i class="fas fa-scroll"></i><span>Feed</span></button>
  <button class="footer-btn" onclick="window.location.href='explore.html'"><i class="fas fa-search"></i><span>Explore</span></button>
  <button class="footer-btn" onclick="window.location.href='https://patholytica.com/create'"><i class="fas fa-plus-circle"></i><span>Create</span></button>
</div>

<script>
window.escHtml = function(t){ const d=document.createElement('div'); d.textContent=t; return d.innerHTML; };

function togglePong() {
  const toggle = document.getElementById('pongToggle');
  const body   = document.getElementById('pongBody');
  const isOpen = body.classList.contains('open');
  toggle.classList.toggle('open', !isOpen);
  body.classList.toggle('open', !isOpen);
}
</script>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyBs6V0yY14cuLBXB1nciZ-X0eyAiodC-Ak",
  authDomain: "patholytica.firebaseapp.com",
  databaseURL: "https://patholytica-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "patholytica",
  storageBucket: "patholytica.firebasestorage.app",
  messagingSenderId: "738430635282",
  appId: "1:738430635282:web:8451ef380447c7611137cb"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const supabase = window.supabase.createClient(
  "https://vduqewqyvszfquntmark.supabase.co",
  "sb_publishable_YseP73aoHam8YT6B0b9EQQ_iAUEWARI"
);
window._supabase = supabase;

window.logOut = async function() {
  try { await signOut(auth); window.location.reload(); } catch(e) {}
};

onAuthStateChanged(auth, async (user) => {
  const authButtons  = document.getElementById('authButtons');
  const userWelcome  = document.getElementById('userWelcome');
  const welcomeText  = document.getElementById('welcomeText');
  const fabCreateBtn = document.getElementById('fabCreateBtn');
  if (user) {
    authButtons.classList.remove('show');
    userWelcome.classList.add('show');
    fabCreateBtn?.classList.add('show');
    welcomeText.onclick = window.logOut;
    try {
      const { data: ud } = await supabase.from('users').select('username').eq('firebase_uid', user.uid).single();
      if (ud?.username) welcomeText.textContent = `@${ud.username}`;
    } catch(e) {}
  } else {
    authButtons.classList.add('show');
    userWelcome.classList.remove('show');
    fabCreateBtn?.classList.remove('show');
  }
});

const PREVIEW = 3;

function monthRange(dateStr) {
  const d = new Date(dateStr);
  const y = d.getUTCFullYear(), m = d.getUTCMonth();
  return {
    start: new Date(Date.UTC(y, m, 1)).toISOString(),
    end:   new Date(Date.UTC(y, m+1, 1)).toISOString()
  };
}

function monthLabel(dateStr) {
  return new Date(dateStr).toLocaleDateString('en-US', { year: 'numeric', month: 'long' });
}

function renderArticleItem(article, userMap) {
  const li = document.createElement('li');
  li.className = 'article-item';
  li.onclick = () => { window.location.href = `article.html?id=${article.id}`; };
  const author = userMap[article.firebase_user_id];
  const name = author?.username ? `@${author.username}` : 'Unknown Author';
  const date = new Date(article.created_at).toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
  li.innerHTML = `
    <h2 class="article-title">${window.escHtml(article.title || 'Untitled')}</h2>
    <div class="article-meta">
      <span>${window.escHtml(name)}</span>
      <div class="meta-dot"></div>
      <span>${date}</span>
    </div>`;
  return li;
}

async function loadCreators() {
  const el = document.getElementById('creatorsList');
  try {
    const { data: articles, error } = await supabase.from('articles').select('firebase_user_id');
    if (error || !articles) { el.innerHTML=''; return; }
    const counts = {};
    articles.forEach(a => { if(a.firebase_user_id) counts[a.firebase_user_id]=(counts[a.firebase_user_id]||0)+1; });
    const sorted = Object.entries(counts).sort((a,b)=>b[1]-a[1]).slice(0,3);
    if (!sorted.length) { el.innerHTML=''; return; }
    const uids = sorted.map(([u])=>u);
    const { data: users } = await supabase.from('users').select('firebase_uid, username').in('firebase_uid', uids);
    const um = {};
    if (users) users.forEach(u=>{um[u.firebase_uid]=u;});
    const rc=['gold','silver','bronze'], rl=['#1','#2','#3'];
    el.innerHTML = sorted.map(([uid,count],i)=>{
      const u=um[uid]; const name=u?.username?`@${u.username}`:'Unknown';
      const init=(u?.username||'?').replace(/^@/,'')[0].toUpperCase();
      return `<div class="creator-row" onclick="window.location.href='profile.html?uid=${window.escHtml(uid)}'">
        <div class="creator-rank ${rc[i]}">${rl[i]}</div>
        <div class="creator-avatar">${init}</div>
        <div class="creator-info">
          <div class="creator-name">${window.escHtml(name)}</div>
          <div class="creator-count">${count} article${count!==1?'s':''}</div>
        </div>
        <div class="creator-badge">${count}</div>
      </div>`;
    }).join('');
  } catch(e) { document.getElementById('creatorsList').innerHTML=''; }
}

async function loadArticles(libraryArticleIds = null) {
  const list = document.getElementById('articleList');
  list.innerHTML = `
    <li class="skeleton-article"><div class="skel-title-lg"></div><div class="skel-title-sm"></div><div class="skel-meta"></div></li>
    <li class="skeleton-article"><div class="skel-title-lg" style="width:62%"></div><div class="skel-title-sm" style="width:40%"></div><div class="skel-meta" style="width:22%"></div></li>
    <li class="skeleton-article"><div class="skel-title-lg" style="width:78%"></div><div class="skel-title-sm" style="width:52%"></div><div class="skel-meta" style="width:30%"></div></li>`;

  try {
    let metaQuery = supabase.from('articles').select('id, created_at, firebase_user_id').order('created_at', { ascending: false });
    if (libraryArticleIds) metaQuery = metaQuery.in('id', libraryArticleIds);
    const { data: meta, error: metaErr } = await metaQuery;

    if (metaErr) { list.innerHTML=`<li class="error-state">Error: ${metaErr.message}</li>`; return; }
    if (!meta || meta.length===0) {
      list.innerHTML='<li class="loading-state">No articles found.</li>';
      document.getElementById('articleCount').textContent='0';
      return;
    }

    document.getElementById('articleCount').textContent = meta.length;

    const monthGroups = {};
    meta.forEach(a => {
      const label = monthLabel(a.created_at);
      if (!monthGroups[label]) monthGroups[label] = { count:0, firstDate:a.created_at };
      monthGroups[label].count++;
    });

    list.innerHTML = '';
    const userMap = {};

    for (const [label, group] of Object.entries(monthGroups)) {
      const { start, end } = monthRange(group.firstDate);

      let previewQuery = supabase.from('articles').select('*')
        .gte('created_at', start).lt('created_at', end)
        .order('created_at', { ascending: false }).limit(PREVIEW);
      if (libraryArticleIds) previewQuery = previewQuery.in('id', libraryArticleIds);
      const { data: preview } = await previewQuery;
      if (!preview || preview.length===0) continue;

      const newIds = [...new Set(preview.map(a=>a.firebase_user_id).filter(Boolean))].filter(id=>!userMap[id]);
      if (newIds.length) {
        const { data: nu } = await supabase.from('users').select('firebase_uid, username').in('firebase_uid', newIds);
        if (nu) nu.forEach(u=>{userMap[u.firebase_uid]=u;});
      }

      const headerLi = document.createElement('li');
      headerLi.innerHTML = `<div class="date-group-header">${label}</div>`;
      list.appendChild(headerLi);

      preview.forEach(a => list.appendChild(renderArticleItem(a, userMap)));

      const remaining = group.count - preview.length;
      if (remaining > 0) {
        const moreLi = document.createElement('li');
        moreLi.className = 'load-more-row';
        let expanded = false, expandedItems = [];
        const btn = document.createElement('button');
        btn.className = 'btn-load-more';
        btn.innerHTML = `<i class="fas fa-chevron-down"></i> Show ${remaining} more from ${label}`;

        btn.onclick = async () => {
          if (expanded) {
            expandedItems.forEach(el=>el.remove());
            expandedItems=[]; expanded=false;
            btn.classList.remove('open');
            btn.innerHTML=`<i class="fas fa-chevron-down"></i> Show ${remaining} more from ${label}`;
            return;
          }
          btn.classList.add('loading');
          btn.innerHTML=`<i class="fas fa-circle-notch fa-spin"></i> Loading…`;
          try {
            let mq = supabase.from('articles').select('*')
              .gte('created_at', start).lt('created_at', end)
              .order('created_at', { ascending: false })
              .range(PREVIEW, group.count-1);
            if (libraryArticleIds) mq = mq.in('id', libraryArticleIds);
            const { data: more, error: mErr } = await mq;
            if (mErr || !more) throw new Error(mErr?.message||'fetch failed');
            const nids=[...new Set(more.map(a=>a.firebase_user_id).filter(Boolean))].filter(id=>!userMap[id]);
            if (nids.length) {
              const { data: nu } = await supabase.from('users').select('firebase_uid, username').in('firebase_uid', nids);
              if (nu) nu.forEach(u=>{userMap[u.firebase_uid]=u;});
            }
            more.forEach(a=>{
              const el=renderArticleItem(a, userMap);
              list.insertBefore(el, moreLi);
              expandedItems.push(el);
            });
            expanded=true;
            btn.classList.remove('loading'); btn.classList.add('open');
            btn.innerHTML=`<i class="fas fa-chevron-down"></i> Collapse ${label}`;
          } catch(e) {
            btn.classList.remove('loading');
            btn.innerHTML=`<i class="fas fa-chevron-down"></i> Show ${remaining} more from ${label}`;
          }
        };
        moreLi.appendChild(btn);
        list.appendChild(moreLi);
      }
    }

    document.getElementById('spaceBtnWrap').classList.add('show');
    document.getElementById('pongSection').classList.add('show');

  } catch(err) {
    list.innerHTML=`<li class="error-state">Unexpected error: ${err.message}</li>`;
  }
}

window._loadArticles = async function(libraryId = null) {
  let ids = null;
  if (libraryId !== null) {
    const { data: items, error } = await supabase.from('playlist_items').select('article_id').eq('playlist_id', libraryId);
    if (error) { document.getElementById('articleList').innerHTML=`<li class="error-state">Error: ${error.message}</li>`; return; }
    if (!items||items.length===0) {
      document.getElementById('articleList').innerHTML='<li class="loading-state">No articles in this library.</li>';
      document.getElementById('articleCount').textContent='0';
      return;
    }
    ids = items.map(i=>i.article_id);
  }
  await loadArticles(ids);
};

loadCreators();
window._loadArticles(null);
</script>

<script>
async function startLibrary() {
  const input=document.getElementById('libraryIdInput');
  const btn=document.getElementById('startBtn');
  const banner=document.getElementById('libraryBanner');
  const bName=document.getElementById('libraryBannerName');
  const bMeta=document.getElementById('libraryBannerMeta');
  const val=input.value.trim();
  if (!val||isNaN(val)||parseInt(val)<=0) {
    input.classList.add('error');
    setTimeout(()=>input.classList.remove('error'),1200);
    input.focus(); return;
  }
  const libraryId=parseInt(val);
  btn.disabled=true; btn.textContent='…';
  bName.textContent='Loading…'; bMeta.innerHTML='';
  banner.classList.add('show');
  try {
    const { data:lib, error:libErr } = await window._supabase.from('playlists').select('*').eq('id',libraryId).single();
    if (libErr||!lib) {
      bName.textContent=`Library #${libraryId}`;
      bMeta.innerHTML=`<span><i class="fas fa-exclamation-circle"></i> Library not found</span>`;
    } else {
      bName.textContent=lib.name||`Library #${libraryId}`;
      const parts=[];
      if(lib.description) parts.push(`<span><i class="fas fa-align-left"></i> ${lib.description}</span>`);
      if(lib.created_at){
        const d=new Date(lib.created_at).toLocaleDateString('en-US',{year:'numeric',month:'short',day:'numeric'});
        parts.push(`<span><i class="fas fa-calendar-alt"></i> ${d}</span>`);
      }
      parts.push(`<span><i class="fas fa-hashtag"></i> ID ${libraryId}</span>`);
      bMeta.innerHTML=parts.join('');
    }
  } catch(e) {
    bName.textContent=`Library #${libraryId}`;
    bMeta.innerHTML=`<span><i class="fas fa-hashtag"></i> ID ${libraryId}</span>`;
  } finally { btn.disabled=false; btn.textContent='Start'; }
  window._loadArticles(libraryId);
}

function clearLibraryFilter() {
  document.getElementById('libraryIdInput').value='';
  document.getElementById('libraryBanner').classList.remove('show');
  window._loadArticles(null);
}

// ── Pong ──────────────────────────────────────────────────────
(function(){
  const canvas=document.getElementById('pongCanvas');
  const ctx=canvas.getContext('2d');
  function resize(){
    const w=Math.min(480,canvas.parentElement.offsetWidth);
    canvas.width=w; canvas.height=Math.round(w*(200/480));
  }
  resize();
  window.addEventListener('resize',()=>{resize();resetPos();});
  const ACCENT='#f1d19e',PAD_W=8,PAD_H_R=0.22,BALL_R=5,AI_S=0.035;
  let W,H,padH,pY,aY,bX,bY,bVX,bVY,pScore=0,aScore=0,running=false,spd;
  function dims(){W=canvas.width;H=canvas.height;padH=Math.round(H*PAD_H_R);spd=W*0.012;}
  function resetPos(){
    dims();pY=aY=(H-padH)/2;bX=W/2;bY=H/2;
    const ang=(Math.random()*0.6-0.3)+(Math.random()>0.5?0:Math.PI);
    bVX=Math.cos(ang)*spd;bVY=Math.sin(ang)*spd;
    if(Math.abs(bVX)<spd*0.5)bVX=bVX<0?-spd*0.7:spd*0.7;
  }
  function draw(){
    ctx.clearRect(0,0,W,H);
    ctx.setLineDash([6,8]);ctx.strokeStyle='rgba(255,255,255,0.08)';ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(W/2,0);ctx.lineTo(W/2,H);ctx.stroke();ctx.setLineDash([]);
    ctx.fillStyle=ACCENT;ctx.beginPath();ctx.roundRect(4,pY,PAD_W,padH,4);ctx.fill();
    ctx.fillStyle='rgba(255,255,255,0.5)';ctx.beginPath();ctx.roundRect(W-4-PAD_W,aY,PAD_W,padH,4);ctx.fill();
    ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(bX,bY,BALL_R,0,Math.PI*2);ctx.fill();
  }
  function update(){
    if(!running)return;
    bX+=bVX;bY+=bVY;
    if(bY-BALL_R<=0){bY=BALL_R;bVY=Math.abs(bVY);}
    if(bY+BALL_R>=H){bY=H-BALL_R;bVY=-Math.abs(bVY);}
    const am=H*AI_S,ac=aY+padH/2;
    if(ac<bY-4)aY=Math.min(H-padH,aY+am);else if(ac>bY+4)aY=Math.max(0,aY-am);
    if(bX-BALL_R<=4+PAD_W&&bX-BALL_R>=2&&bY>=pY&&bY<=pY+padH){
      bX=4+PAD_W+BALL_R;const h=(bY-(pY+padH/2))/(padH/2),s=Math.sqrt(bVX*bVX+bVY*bVY)*1.04;
      bVX=Math.abs(Math.cos(h*0.9)*s);bVY=Math.sin(h*0.9)*s;
    }
    if(bX+BALL_R>=W-4-PAD_W&&bX+BALL_R<=W-2&&bY>=aY&&bY<=aY+padH){
      bX=W-4-PAD_W-BALL_R;const h=(bY-(aY+padH/2))/(padH/2),s=Math.sqrt(bVX*bVX+bVY*bVY)*1.02;
      bVX=-Math.abs(Math.cos(h*0.9)*s);bVY=Math.sin(h*0.9)*s;
    }
    if(bX-BALL_R<=0){
      aScore++;
      document.getElementById('aiScore').textContent=aScore;
      if(aScore>=12){
        running=false;
        document.getElementById('pongHint').textContent='AI wins! Click or tap to play again.';
        pScore=0;aScore=0;
        document.getElementById('playerScore').textContent=0;
        document.getElementById('aiScore').textContent=0;
        resetPos();return;
      }
      resetPos();
    }
    if(bX+BALL_R>=W){
      pScore++;
      document.getElementById('playerScore').textContent=pScore;
      if(pScore>=12){
        running=false;
        document.getElementById('pongHint').textContent='You win! Click or tap to play again.';
        pScore=0;aScore=0;
        document.getElementById('playerScore').textContent=0;
        document.getElementById('aiScore').textContent=0;
        resetPos();return;
      }
      resetPos();
    }
  }
  function loop(){update();draw();requestAnimationFrame(loop);}
  function start(){if(running)return;running=true;document.getElementById('pongHint').textContent='Mouse / drag to move your paddle';requestAnimationFrame(loop);}
  canvas.addEventListener('mousemove',e=>{const r=canvas.getBoundingClientRect();pY=Math.max(0,Math.min(H-padH,e.clientY-r.top-padH/2));});
  canvas.addEventListener('touchmove',e=>{e.preventDefault();const r=canvas.getBoundingClientRect();pY=Math.max(0,Math.min(H-padH,e.touches[0].clientY-r.top-padH/2));},{passive:false});
  canvas.addEventListener('click',start);
  canvas.addEventListener('touchstart',e=>{e.preventDefault();start();},{passive:false});
  resetPos();draw();
})();
</script>
