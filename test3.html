<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>My Space - Optimized</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0a0a0a;--bg2:#111;--bg3:#181818;
  --border:#1e1e1e;--border2:#2a2a2a;
  --text:#e8e6e1;--text2:#6e6c68;--text3:#3a3835;
  --accent:#4f9eff;--green:#3dba72;--orange:#e88c3a;
  --purple:#a56fd4;--red:#ef4444;--yellow:#fbbf24;
  --glass:rgba(10,10,10,0.85);--glass2:rgba(14,14,14,0.92);
  --gb:rgba(255,255,255,0.055);
  --sh:0 8px 32px rgba(0,0,0,0.72);
  --sh2:0 24px 64px rgba(0,0,0,0.88);
  --r:14px;
  --st:env(safe-area-inset-top,0px);
  --sb:env(safe-area-inset-bottom,0px);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{width:100%;height:100%;overflow:hidden;font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);touch-action:none}

#bg-layer{position:fixed;inset:-60px;z-index:0;background:var(--bg);background-size:cover;background-position:center;transition:filter .4s;pointer-events:none;will-change:transform}
#bg-ov{position:absolute;inset:0;pointer-events:none;transition:background .3s}
#cvp{position:fixed;inset:0;z-index:1;overflow:hidden;touch-action:none}
#cv{position:absolute;top:0;left:0;width:2000px;height:2000px;transform-origin:0 0;will-change:transform}
#snap-grid{position:absolute;inset:0;width:2000px;height:2000px;background-image:linear-gradient(rgba(255,255,255,.022) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.022) 1px,transparent 1px);background-size:20px 20px;pointer-events:none;display:none;z-index:0}
#snap-grid.on{display:block}
#draw-cv{position:absolute;top:0;left:0;width:2000px;height:2000px;pointer-events:none;z-index:50}
#draw-cv.on{pointer-events:all;cursor:crosshair}
#conn-svg{position:absolute;top:0;left:0;width:2000px;height:2000px;pointer-events:none;z-index:1;overflow:visible}
.cline{stroke:var(--accent);stroke-width:1.5;fill:none;opacity:.45;stroke-dasharray:5 3;cursor:pointer;pointer-events:stroke}
.cline:hover{opacity:.9;stroke:var(--red)}
#ui{position:fixed;inset:0;z-index:1000;pointer-events:none}
#ui>*{pointer-events:all}

.widget{position:absolute;border:1px solid var(--gb);border-radius:var(--r);backdrop-filter:blur(18px) saturate(1.3);-webkit-backdrop-filter:blur(18px) saturate(1.3);background:var(--glass);box-shadow:var(--sh),inset 0 1px 0 rgba(255,255,255,.04);overflow:hidden;user-select:none;-webkit-user-select:none;transition:box-shadow .18s,border-color .18s;will-change:transform}
.widget.sel{border-color:var(--accent);box-shadow:var(--sh),0 0 0 1px var(--accent),0 0 18px rgba(79,158,255,.12)}
.widget.drag{box-shadow:var(--sh2),0 0 0 1px var(--accent);transition:none}

.wh-bar{position:absolute;top:0;left:0;right:0;height:30px;cursor:grab;z-index:5;display:none;align-items:center;padding:0 10px;gap:7px;background:rgba(255,255,255,.02);border-bottom:1px solid var(--gb)}
.wh-bar:active{cursor:grabbing}
.edit-mode .wh-bar{display:flex}
.wh-dots{display:grid;grid-template-columns:repeat(3,1fr);gap:2px;opacity:.3}
.wh-dots span{width:3px;height:3px;border-radius:50%;background:var(--text);display:block}
.wh-sp{flex:1}
.wh-del{width:20px;height:20px;border-radius:5px;border:none;background:none;color:var(--text3);cursor:pointer;font-size:11px;display:flex;align-items:center;justify-content:center;transition:all .12s}
.wh-del:hover,.wh-del:active{background:rgba(239,68,68,.18);color:var(--red)}
.edit-mode .wb{margin-top:30px}
.wb{height:100%;transition:margin .15s}
.wrz{position:absolute;bottom:0;right:0;width:20px;height:20px;cursor:se-resize;z-index:6;display:none;align-items:flex-end;justify-content:flex-end;padding:3px}
.wrz::after{content:'';width:8px;height:8px;border-right:2px solid var(--text2);border-bottom:2px solid var(--text2);border-radius:0 0 2px 0;display:block}
.edit-mode .wrz{display:flex}
.wh{display:flex;align-items:center;gap:7px;padding:9px 11px 7px;border-bottom:1px solid var(--gb);font-size:10px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:var(--text2);flex-shrink:0}
.wh i{font-size:11px}
.whs{flex:1}

.note-widget[data-color=yellow]{background:rgba(251,191,36,.08);border-color:rgba(251,191,36,.2)}
.note-widget[data-color=green]{background:rgba(61,186,114,.07);border-color:rgba(61,186,114,.2)}
.note-widget[data-color=blue]{background:rgba(79,158,255,.07);border-color:rgba(79,158,255,.2)}
.note-widget[data-color=purple]{background:rgba(165,111,212,.07);border-color:rgba(165,111,212,.2)}
.note-widget[data-color=red]{background:rgba(239,68,68,.07);border-color:rgba(239,68,68,.2)}
.note-ta{width:100%;padding:10px 12px;background:none;border:none;outline:none;resize:none;color:var(--text);font-size:13.5px;line-height:1.7;font-family:inherit;display:block;overflow-y:auto}
.note-ta::placeholder{color:var(--text3)}
.note-colors{display:flex;gap:6px;padding:6px 11px 9px;align-items:center;flex-shrink:0}
.nc{width:12px;height:12px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:all .12s;flex-shrink:0}
.nc.on{border-color:rgba(255,255,255,.65);transform:scale(1.25)}
.note-fsz{margin-left:auto;background:none;border:none;color:var(--text2);font-size:10px;cursor:pointer;padding:2px 5px;border-radius:4px;font-family:'DM Sans',sans-serif;transition:background .12s}
.note-fsz:hover{background:var(--bg3);color:var(--text)}

.clock-body{display:flex;flex-direction:column;align-items:center;justify-content:center;height:calc(100% - 30px);padding:10px 12px;gap:4px}
.clk-t{font-family:'DM Mono',monospace;font-weight:500;color:var(--text);letter-spacing:-.02em;line-height:1}
.clk-d{font-family:'DM Mono',monospace;color:var(--text2);letter-spacing:.07em;text-transform:uppercase}
.clk-tz{font-size:10px;color:var(--text3);letter-spacing:.05em;text-align:center;margin-top:2px}
.clock-widget.style-minimal .clk-t{font-size:34px}
.clock-widget.style-minimal .clk-d{font-size:11px;margin-top:4px}
.clock-widget.style-large .clk-t{font-size:48px}
.clock-widget.style-large .clk-d{font-size:13px;margin-top:6px}
.clock-widget.style-compact .clk-t{font-size:24px}
.clock-widget.style-compact .clk-d{font-size:10px;margin-top:3px}
.clock-widget.style-ampm .clk-t{font-size:28px}
.clock-widget.style-ampm .clk-d{font-size:11px;margin-top:4px}

.todo-body{height:calc(100% - 30px);display:flex;flex-direction:column;overflow:hidden}
.todo-list{flex:1;overflow-y:auto;padding:6px 11px}
.todo-list::-webkit-scrollbar{width:3px}
.todo-list::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
.ti{display:flex;align-items:flex-start;gap:8px;padding:6px 0;border-bottom:1px solid var(--border)}
.ti:last-child{border-bottom:none}
.tcb{width:16px;height:16px;border-radius:4px;border:1.5px solid var(--border2);display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;margin-top:2px;transition:all .12s}
.tcb.dn{background:var(--green);border-color:var(--green)}
.tcb.dn::after{content:'✓';font-size:9px;color:#fff;font-weight:700}
.ttx{flex:1;font-size:12.5px;color:var(--text);line-height:1.5;outline:none;word-break:break-word}
.ttx.dn{text-decoration:line-through;color:var(--text2)}
.tdl{width:18px;height:18px;border-radius:4px;border:none;background:none;color:var(--text3);cursor:pointer;font-size:11px;display:flex;align-items:center;justify-content:center;opacity:0;transition:all .12s;flex-shrink:0}
.ti:hover .tdl,.ti:focus-within .tdl{opacity:1}
.tdl:hover{background:rgba(239,68,68,.14);color:var(--red)}
.todo-add{display:flex;align-items:center;gap:7px;padding:7px 11px;border-top:1px solid var(--border);flex-shrink:0}
.todo-add input{flex:1;background:none;border:none;outline:none;font-size:12.5px;color:var(--text2);font-family:'DM Sans',sans-serif}
.todo-add input::placeholder{color:var(--text3)}
.ta-btn{width:20px;height:20px;border-radius:5px;background:var(--bg3);border:1px solid var(--border2);color:var(--text2);cursor:pointer;font-size:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .12s}
.ta-btn:hover,.ta-btn:active{background:var(--accent);border-color:var(--accent);color:#fff}

.img-body{width:100%;height:100%;border-radius:calc(var(--r) - 1px);overflow:hidden;display:flex;align-items:center;justify-content:center}
.img-body img{width:100%;height:100%;object-fit:cover;display:block;transition:transform .3s}
.img-body:hover img{transform:scale(1.02)}
.img-ph{width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;color:var(--text3);font-size:12px;cursor:pointer}
.img-ph i{font-size:24px}

.quote-body{height:calc(100% - 30px);display:flex;flex-direction:column;justify-content:center;padding:14px 16px;gap:10px}
.qt{font-family:'DM Serif Display',Georgia,serif;font-size:15px;line-height:1.7;color:var(--text);font-style:italic;outline:none;word-break:break-word}
.qa{font-size:11px;color:var(--text2);letter-spacing:.06em;text-transform:uppercase;outline:none}

.music-body{height:100%}
.music-body iframe{width:100%;height:100%;border:none;display:block;border-radius:calc(var(--r)-1px)}
.music-setup{height:calc(100% - 30px);display:flex;flex-direction:column;justify-content:center;gap:9px;padding:12px}
.music-in{background:var(--bg3);border:1px solid var(--border2);border-radius:8px;padding:8px 10px;color:var(--text);font-size:12px;outline:none;font-family:'DM Mono',monospace;width:100%}
.music-in::placeholder{color:var(--text3)}
.music-in:focus{border-color:var(--accent)}
.music-go{padding:8px;border-radius:8px;background:#1DB954;border:none;color:#fff;font-size:12.5px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif}

.yt-body{height:100%}
.yt-body iframe{width:100%;height:100%;border:none;display:block;border-radius:calc(var(--r)-1px)}
.yt-setup{height:calc(100% - 30px);display:flex;flex-direction:column;justify-content:center;gap:9px;padding:12px}
.yt-in{background:var(--bg3);border:1px solid var(--border2);border-radius:8px;padding:8px 10px;color:var(--text);font-size:12px;outline:none;font-family:'DM Mono',monospace;width:100%}
.yt-in::placeholder{color:var(--text3)}
.yt-in:focus{border-color:#ff0000}
.yt-go{padding:8px;border-radius:8px;background:#ff0000;border:none;color:#fff;font-size:12.5px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif}

.pdf-body{height:100%;display:flex;flex-direction:column}
.pdf-body iframe{flex:1;width:100%;border:none;display:block}
.pdf-setup{height:calc(100% - 30px);display:flex;flex-direction:column;justify-content:center;align-items:center;gap:12px;padding:16px}
.pdf-setup i{font-size:32px;color:var(--text3)}
.pdf-setup p{font-size:12px;color:var(--text2);text-align:center}
.pdf-upload-btn{padding:8px 16px;border-radius:8px;background:var(--accent);border:none;color:#fff;font-size:12.5px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif}
.pdf-nav{display:flex;align-items:center;justify-content:space-between;padding:8px 10px 12px;border-top:1px solid var(--border);flex-shrink:0;gap:6px;background:rgba(0,0,0,.2)}
.pdf-pg{font-family:'DM Mono',monospace;font-size:11px;color:var(--text2);flex:1;text-align:center}

.audio-body{height:calc(100% - 30px);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;padding:16px}
.audio-ph{display:flex;flex-direction:column;align-items:center;gap:10px;color:var(--text3)}
.audio-ph i{font-size:28px}
.audio-ph p{font-size:12px}
.audio-upload-btn{padding:8px 16px;border-radius:8px;background:var(--orange);border:none;color:#fff;font-size:12.5px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif}
.audio-player{width:100%;display:flex;flex-direction:column;gap:10px;align-items:center}
.audio-title{font-size:12px;color:var(--text2);text-align:center;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;width:100%}
.audio-controls{display:flex;align-items:center;gap:10px}
.aplay-btn{width:40px;height:40px;border-radius:50%;background:var(--orange);border:none;color:#fff;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s}
.aplay-btn:hover{transform:scale(1.08)}
.audio-progress{width:100%;height:4px;background:var(--border2);border-radius:2px;cursor:pointer;position:relative;overflow:hidden}
.audio-prog-fill{height:100%;background:var(--orange);border-radius:2px;transition:width .1s linear;pointer-events:none}
.audio-time{font-family:'DM Mono',monospace;font-size:10px;color:var(--text2)}

.pomo-body{height:calc(100% - 30px);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;padding:12px}
.pomo-ring{position:relative;width:90px;height:90px}
.pomo-ring svg{transform:rotate(-90deg)}
.pomo-ring circle{fill:none;stroke-width:4}
.pbg{stroke:var(--border2)}
.ppr{stroke:var(--red);stroke-linecap:round;transition:stroke-dashoffset .5s linear}
.ptime{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-family:'DM Mono',monospace;font-size:18px;color:var(--text);font-weight:500}
.plbl{font-size:10px;color:var(--text2);letter-spacing:.07em;text-transform:uppercase}
.pbtns{display:flex;gap:8px}
.pbtn{width:30px;height:30px;border-radius:8px;border:1px solid var(--border2);background:var(--bg3);color:var(--text2);cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;transition:all .12s}
.pbtn:hover{background:var(--border2);color:var(--text)}
.pbtn.on{background:var(--red);border-color:var(--red);color:#fff}
.pbtn:disabled{opacity:.3;cursor:not-allowed}
.pcfg{display:flex;gap:8px;align-items:center;font-size:11px;color:var(--text2)}
.pcfg input{width:38px;background:var(--bg3);border:1px solid var(--border2);border-radius:5px;padding:3px 5px;color:var(--text);font-size:11px;outline:none;text-align:center}

.habit-body{height:calc(100% - 30px);overflow-y:auto;padding:6px 11px 10px}
.habit-body::-webkit-scrollbar{width:3px}
.habit-body::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
.habit-row{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--border)}
.habit-row:last-child{border-bottom:none}
.hname{flex:1;font-size:12px;color:var(--text);outline:none;min-width:0}
.hdots{display:flex;gap:3px;flex-shrink:0}
.hdot{width:14px;height:14px;border-radius:3px;background:var(--bg3);border:1px solid var(--border2);cursor:pointer;transition:all .12s;flex-shrink:0}
.hdot.on{background:var(--green);border-color:var(--green)}
.hadd{display:flex;gap:7px;padding:7px 0 0;border-top:1px solid var(--border);margin-top:3px}
.hadd input{flex:1;background:none;border:none;outline:none;font-size:12px;color:var(--text2);font-family:'DM Sans',sans-serif}
.hadd input::placeholder{color:var(--text3)}

.cal-body{height:calc(100% - 30px);padding:8px 11px;overflow:hidden}
.cal-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.cal-mo{font-size:12px;font-weight:600;color:var(--text)}
.cal-nav{width:20px;height:20px;border-radius:4px;border:none;background:none;color:var(--text2);cursor:pointer;font-size:12px;display:flex;align-items:center;justify-content:center;transition:background .12s}
.cal-nav:hover{background:var(--bg3)}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
.cal-dl{font-size:9px;color:var(--text2);text-align:center;padding:2px 0;font-weight:600}
.cal-day{font-size:10px;text-align:center;padding:4px 2px;border-radius:4px;cursor:pointer;color:var(--text2);transition:all .12s}
.cal-day:hover{background:var(--bg3);color:var(--text)}
.cal-day.today{background:var(--accent);color:#fff;font-weight:600}
.cal-day.other{opacity:.3}

.amb-body{height:calc(100% - 30px);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;padding:12px}
.amb-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px;width:100%}
.amb-item{display:flex;flex-direction:column;align-items:center;gap:5px;padding:12px 8px;background:var(--bg3);border:1px solid var(--border2);border-radius:10px;cursor:pointer;transition:all .15s;font-size:11px;color:var(--text2);text-align:center}
.amb-item i{font-size:20px}
.amb-item.on{background:rgba(79,158,255,.1);border-color:var(--accent);color:var(--accent)}

.rem-body{height:calc(100% - 30px);overflow-y:auto;padding:6px 11px}
.rem-body::-webkit-scrollbar{width:3px}
.ritem{display:flex;align-items:flex-start;gap:8px;padding:6px 0;border-bottom:1px solid var(--border)}
.ritem:last-child{border-bottom:none}
.rico{font-size:14px;flex-shrink:0;margin-top:1px}
.rinfo{flex:1;min-width:0}
.rtitle{font-size:12px;color:var(--text);margin-bottom:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.rtime{font-size:10px;color:var(--text2);font-family:'DM Mono',monospace}
.rdel{width:18px;height:18px;border-radius:4px;border:none;background:none;color:var(--text3);cursor:pointer;font-size:11px;display:flex;align-items:center;justify-content:center;transition:all .12s}
.rdel:hover{background:rgba(239,68,68,.14);color:var(--red)}
.radd{display:flex;flex-direction:column;gap:5px;padding:7px 0 0;border-top:1px solid var(--border)}
.radd input{background:none;border:none;outline:none;font-size:12px;color:var(--text2);font-family:'DM Sans',sans-serif}
.radd input::placeholder{color:var(--text3)}
.radd input[type=datetime-local]{font-family:'DM Mono',monospace;font-size:11px;color-scheme:dark}
.radd-btn{align-self:flex-end;padding:5px 12px;border-radius:7px;background:var(--accent);border:none;color:#fff;font-size:11px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif}

#spaces-bar{position:absolute;top:calc(var(--st) + 10px);left:12px;display:flex;align-items:center;gap:5px;background:var(--glass2);border:1px solid var(--gb);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-radius:20px;padding:5px 8px;z-index:10;max-width:calc(60vw);overflow-x:auto}
#spaces-bar::-webkit-scrollbar{display:none}
.spc-tab{padding:5px 13px;border-radius:13px;background:none;border:none;cursor:pointer;font-size:12px;font-weight:500;color:var(--text2);white-space:nowrap;flex-shrink:0;transition:all .15s;font-family:'DM Sans',sans-serif}
.spc-tab.on{background:var(--accent);color:#fff}
.spc-tab:not(.on):hover{background:var(--bg3);color:var(--text)}
.spc-add{width:26px;height:26px;border-radius:13px;background:none;border:1px solid var(--border2);cursor:pointer;color:var(--text2);font-size:13px;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s}
.spc-add:hover{background:var(--bg3);color:var(--text);border-color:var(--text2)}
.spc-add:disabled{opacity:.3;cursor:not-allowed}
.spc-add:disabled:hover{background:none;border-color:var(--border2);color:var(--text2)}

#io-bar{position:absolute;top:calc(var(--st) + 10px);right:12px;display:flex;align-items:center;gap:7px;z-index:10}
.io-btn{padding:6px 12px;border-radius:13px;background:var(--glass2);border:1px solid var(--gb);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);color:var(--text2);font-size:12px;font-weight:500;cursor:pointer;transition:all .15s;font-family:'DM Sans',sans-serif;display:flex;align-items:center;gap:6px}
.io-btn:hover{background:var(--bg3);color:var(--text);border-color:var(--border2)}

#draw-bar{position:absolute;top:calc(var(--st) + 10px);left:50%;transform:translateX(-50%);background:var(--glass2);border:1px solid var(--gb);border-radius:20px;backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);display:none;align-items:center;gap:4px;padding:5px 8px;box-shadow:var(--sh);z-index:10}
#draw-bar.on{display:flex}
.drbtn{width:34px;height:34px;border-radius:10px;border:none;background:none;color:var(--text2);cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;transition:all .12s}
.drbtn:hover{background:var(--bg3);color:var(--text)}
.drbtn.on{background:rgba(79,158,255,.15);color:var(--accent)}

<script>
'use strict';

// ============ PERFORMANCE UTILITIES ============

// Throttle function to limit execution frequency
function throttle(fn, limit) {
  let inThrottle;
  return function(...args) {
    if (!inThrottle) {
      fn.apply(this, args);
      inThrottle = true;
      setTimeout(() => inThrottle = false, limit);
    }
  };
}

// Debounce function for expensive operations
function debounce(fn, delay) {
  let timer;
  return function(...args) {
    clearTimeout(timer);
    timer = setTimeout(() => fn.apply(this, args), delay);
  };
}

// RequestAnimationFrame wrapper for smooth animations
function rafThrottle(fn) {
  let ticking = false;
  return function(...args) {
    if (!ticking) {
      requestAnimationFrame(() => {
        fn.apply(this, args);
        ticking = false;
      });
      ticking = true;
    }
  };
}

// Safe localStorage with size limits
const SafeStorage = {
  MAX_SIZE: 4 * 1024 * 1024, // 4MB limit
  get(key) {
    try { return localStorage.getItem(key); } catch (e) { return null; }
  },
  set(key, value) {
    try {
      if (value.length > this.MAX_SIZE) {
        console.warn('Data too large for localStorage, using IndexedDB fallback');
        return IndexedDBStorage.set(key, value);
      }
      localStorage.setItem(key, value);
      return true;
    } catch (e) {
      console.error('localStorage error:', e);
      return IndexedDBStorage.set(key, value);
    }
  },
  remove(key) {
    try { localStorage.removeItem(key); } catch (e) {}
    IndexedDBStorage.remove(key);
  }
};

// IndexedDB fallback for large data
const IndexedDBStorage = {
  db: null,
  async init() {
    if (this.db) return this.db;
    return new Promise((resolve, reject) => {
      const req = indexedDB.open('MySpaceDB', 1);
      req.onerror = () => reject(req.error);
      req.onsuccess = () => { this.db = req.result; resolve(this.db); };
      req.onupgradeneeded = (e) => {
        e.target.result.createObjectStore('data', { keyPath: 'key' });
      };
    });
  },
  async set(key, value) {
    try {
      const db = await this.init();
      return new Promise((resolve, reject) => {
        const tx = db.transaction(['data'], 'readwrite');
        const store = tx.objectStore('data');
        const req = store.put({ key, value, timestamp: Date.now() });
        req.onsuccess = () => resolve(true);
        req.onerror = () => reject(req.error);
      });
    } catch (e) { return false; }
  },
  async get(key) {
    try {
      const db = await this.init();
      return new Promise((resolve) => {
        const tx = db.transaction(['data'], 'readonly');
        const store = tx.objectStore('data');
        const req = store.get(key);
        req.onsuccess = () => resolve(req.result?.value || null);
        req.onerror = () => resolve(null);
      });
    } catch (e) { return null; }
  },
  async remove(key) {
    try {
      const db = await this.init();
      const tx = db.transaction(['data'], 'readwrite');
      tx.objectStore('data').delete(key);
    } catch (e) {}
  }
};

// Resource cleanup manager
const CleanupManager = {
  registry: new Map(),
  register(id, cleanupFn) {
    this.registry.set(id, cleanupFn);
  },
  cleanup(id) {
    const fn = this.registry.get(id);
    if (fn) {
      try { fn(); } catch (e) {}
      this.registry.delete(id);
    }
  },
  cleanupAll() {

// ============ TIMER MANAGER (Prevents memory leaks) ============
const TimerManager = {
  timers: new Map(),
  intervals: new Map(),
  
  setTimeout(id, fn, delay) {
    this.clearTimeout(id);
    const timer = setTimeout(fn, delay);
    this.timers.set(id, timer);
    return timer;
  },
  
  clearTimeout(id) {
    const timer = this.timers.get(id);
    if (timer) {
      clearTimeout(timer);
      this.timers.delete(id);
    }
  },
  
  setInterval(id, fn, delay) {
    this.clearInterval(id);
    const interval = setInterval(fn, delay);
    this.intervals.set(id, interval);
    return interval;
  },
  
  clearInterval(id) {
    const interval = this.intervals.get(id);
    if (interval) {
      clearInterval(interval);
      this.intervals.delete(id);
    }
  },
  
  clearAll() {
    this.timers.forEach(t => clearTimeout(t));
    this.intervals.forEach(i => clearInterval(i));
    this.timers.clear();
    this.intervals.clear();
  },
  
  clearForWidget(widgetId) {
    // Clear all timers related to a specific widget
    for (const [key, timer] of this.timers) {
      if (key.includes(widgetId)) {
        clearTimeout(timer);
        this.timers.delete(key);
      }
    }
    for (const [key, interval] of this.intervals) {
      if (key.includes(widgetId)) {
        clearInterval(interval);
        this.intervals.delete(key);
      }
    }
  }
};

// ============ AUDIO MANAGER (Prevents memory leaks) ============
const AudioManager = {
  players: new Map(),
  
  get(id) {
    return this.players.get(id);
  },
  
  create(id, src) {
    this.destroy(id); // Clean up existing
    const audio = new Audio();
    audio.preload = 'metadata';
    if (src) audio.src = src;
    this.players.set(id, audio);
    return audio;
  },
  
  destroy(id) {
    const audio = this.players.get(id);
    if (audio) {
      audio.pause();
      audio.src = '';
      audio.load(); // Force release
      this.players.delete(id);
    }
  },
  
  destroyAll() {
    this.players.forEach(audio => {
      audio.pause();
      audio.src = '';
      audio.load();
    });
    this.players.clear();
  },
  
  pauseAll() {
    this.players.forEach(audio => audio.pause());
  }
};

// ============ CROP ============
const Crop = {
  _resolve: null,
  _src: null,
  _sx: 0, _sy: 0, _sw: 0, _sh: 0,
  _dragging: false, _ox: 0, _oy: 0,
  _iw: 0, _ih: 0,
  
  open(src, cb) {
    this._src = src;
    this._resolve = cb;
    this._sx = 0; this._sy = 0; this._sw = 0; this._sh = 0;
    const ov = document.getElementById('crop-ov');
    const img = document.getElementById('crop-img');
    const sel = document.getElementById('crop-sel');
    sel.style.cssText = 'display:none';
    img.onload = () => {
      this._iw = img.naturalWidth;
      this._ih = img.naturalHeight;
      ov.classList.add('on');
    };
    img.src = src;
  },
  
  _rect() { return document.getElementById('crop-img').getBoundingClientRect(); },
  
  _updateSel() {
    const sel = document.getElementById('crop-sel');
    const r = this._rect();
    const scaleX = r.width / this._iw, scaleY = r.height / this._ih;
    sel.style.display = 'block';
    sel.style.left = (this._sx * scaleX) + 'px';
    sel.style.top = (this._sy * scaleY) + 'px';
    sel.style.width = (this._sw * scaleX) + 'px';
    sel.style.height = (this._sh * scaleY) + 'px';
  },
  
  apply() {
    const sw = this._sw || this._iw, sh = this._sh || this._ih;
    const sx = this._sx, sy = this._sy;
    const canvas = document.createElement('canvas');
    // Limit max dimensions to prevent memory issues
    const maxDim = 1920;
    let cw = sw, ch = sh;
    if (cw > maxDim || ch > maxDim) {
      const ratio = Math.min(maxDim / cw, maxDim / ch);
      cw *= ratio; ch *= ratio;
    }
    canvas.width = cw;
    canvas.height = ch;
    const ctx = canvas.getContext('2d');
    const img2 = new Image();
    img2.onload = () => {
      ctx.drawImage(img2, sx, sy, sw, sh, 0, 0, cw, ch);
      const out = canvas.toDataURL('image/jpeg', 0.85);
      document.getElementById('crop-ov').classList.remove('on');
      if (this._resolve) this._resolve(out);
    };
    img2.src = this._src;
  },
  
  cancel() { document.getElementById('crop-ov').classList.remove('on'); },
  
  _attach() {
    const wrap = document.getElementById('crop-wrap');
    const evPos = (e) => {
      const t = e.touches ? e.touches[0] : e;
      const r = document.getElementById('crop-img').getBoundingClientRect();
      const scaleX = this._iw / r.width, scaleY = this._ih / r.height;
      return { x: clamp((t.clientX - r.left) * scaleX, 0, this._iw), y: clamp((t.clientY - r.top) * scaleY, 0, this._ih) };
    };
    const start = (e) => {
      if (!e.target.closest('#crop-img') && !e.target.closest('#crop-sel')) return;
      const p = evPos(e);
      this._ox = p.x; this._oy = p.y; this._dragging = true;
      this._sx = p.x; this._sy = p.y; this._sw = 0; this._sh = 0;
      document.getElementById('crop-sel').style.display = 'block';
    };
    const move = (e) => {
      if (!this._dragging) return;
      e.preventDefault();
      const p = evPos(e);
      const x1 = Math.min(this._ox, p.x), y1 = Math.min(this._oy, p.y);
      const x2 = Math.max(this._ox, p.x), y2 = Math.max(this._oy, p.y);
      this._sx = x1; this._sy = y1; this._sw = x2 - x1; this._sh = y2 - y1;
      this._updateSel();
    };
    const end = () => { this._dragging = false; };
    wrap.addEventListener('mousedown', start);
    document.addEventListener('mousemove', move);
    document.addEventListener('mouseup', end);
    wrap.addEventListener('touchstart', start, { passive: true });
    document.addEventListener('touchmove', move, { passive: false });
    document.addEventListener('touchend', end);
  }
};

document.getElementById('crop-ok').addEventListener('click', () => Crop.apply());
document.getElementById('crop-cancel').addEventListener('click', () => Crop.cancel());

// ============ VIEWPORT ============
const VP = (function() {
  let tx = 0, ty = 0, sc = 1;
  const MIN = 0.2, MAX = 3.5;
  const cv = () => document.getElementById('cv');
  
  function apply(anim) {
    const e = cv();
    e.style.transition = anim ? 'transform .25s ease' : 'none';
    e.style.transform = `translate(${tx}px,${ty}px) scale(${sc})`;
  }
  
  function constrain() {
    const W = window.innerWidth, H = window.innerHeight;
    tx = clamp(tx, -(CANVAS_SIZE * sc) + (W * .15), W * .85);
    ty = clamp(ty, -(CANVAS_SIZE * sc) + (H * .15), H * .85);
  }
  
  function zoomAt(cx, cy, delta) {
    const ns = clamp(sc * delta, MIN, MAX), r = ns / sc;
    tx = cx - r * (cx - tx);
    ty = cy - r * (cy - ty);
    sc = ns;
    constrain();
    apply(false);
  }
  
  function reset() {
    sc = 1;
    tx = window.innerWidth / 2 - CANVAS_SIZE / 2;
    ty = 80;
    constrain();
    apply(true);
  }
  
  // Throttled wheel handler
  const throttledWheel = throttle((e) => {
    e.preventDefault();
    const d = e.ctrlKey ? (1 - e.deltaY * .01) : (e.deltaY < 0 ? 1.08 : 1 / 1.08);
    zoomAt(e.clientX, e.clientY, d);
  }, 16); // ~60fps
  
  document.getElementById('cvp').addEventListener('wheel', throttledWheel, { passive: false });
  
  // Mouse pan
  let mp = false, mpx, mpy;
  document.getElementById('cvp').addEventListener('mousedown', (e) => {
    if (G.drawMode) return;
    if (e.button === 1 || (e.button === 0 && !e.target.closest('.widget'))) {
      mp = true; mpx = e.clientX - tx; mpy = e.clientY - ty; e.preventDefault();
    }
  });
  
  const throttledMouseMove = rafThrottle((e) => {
    if (!mp) return;
    tx = e.clientX - mpx;
    ty = e.clientY - mpy;
    constrain();
    apply(false);
  });
  document.addEventListener('mousemove', throttledMouseMove);
  document.addEventListener('mouseup', () => { mp = false; });
  
  // Touch handling
  let pts = {}, pinchDist = null, pinchMid = null, panStart = null, panTx, panTy;
  document.getElementById('cvp').addEventListener('touchstart', (e) => {
    if (G.drawMode) return;
    for (let i = 0; i < e.touches.length; i++) {
      const t = e.touches[i];
      pts[t.identifier] = { x: t.clientX, y: t.clientY };
    }
    if (e.touches.length === 1) {
      const t = e.touches[0];
      const tgt = document.elementFromPoint(t.clientX, t.clientY);
      if (!tgt || !tgt.closest('.widget') || !G.editMode) {
        panStart = { x: t.clientX, y: t.clientY };
        panTx = tx; panTy = ty;
      } else panStart = null;
    } else panStart = null;
    if (e.touches.length === 2) {
      const a = e.touches[0], b = e.touches[1];
      pinchDist = Math.hypot(b.clientX - a.clientX, b.clientY - a.clientY);
      pinchMid = { x: (a.clientX + b.clientX) / 2, y: (a.clientY + b.clientY) / 2 };
    }
  }, { passive: true });
  
  const throttledTouchMove = rafThrottle((e) => {
    if (G.drawMode) return;
    e.preventDefault();
    for (let i = 0; i < e.touches.length; i++) {
      const t = e.touches[i];
      pts[t.identifier] = { x: t.clientX, y: t.clientY };
    }
    if (e.touches.length === 1 && panStart) {
      const t = e.touches[0];
      tx = panTx + (t.clientX - panStart.x);
      ty = panTy + (t.clientY - panStart.y);
      constrain();
      apply(false);
    }
    if (e.touches.length === 2) {
      const a = e.touches[0], b = e.touches[1];
      const dist = Math.hypot(b.clientX - a.clientX, b.clientY - a.clientY);
      const mid = { x: (a.clientX + b.clientX) / 2, y: (a.clientY + b.clientY) / 2 };
      if (pinchDist) {
        zoomAt(mid.x, mid.y, dist / pinchDist);
        tx += mid.x - pinchMid.x;
        ty += mid.y - pinchMid.y;
        constrain();
        apply(false);
      }
      pinchDist = dist; pinchMid = mid;
    }
  });
  document.getElementById('cvp').addEventListener('touchmove', throttledTouchMove, { passive: false });
  
  document.getElementById('cvp').addEventListener('touchend', (e) => {
    if (G.drawMode) return;
    for (let i = 0; i < e.changedTouches.length; i++) delete pts[e.changedTouches[i].identifier];
    if (e.touches.length < 2) { pinchDist = null; pinchMid = null; }
    if (e.touches.length === 0) panStart = null;
  }, { passive: true });
  
  return {
    reset,
    zoomAt,
    toCanvas: (vx, vy) => ({ x: (vx - tx) / sc, y: (vy - ty) / sc }),
    get scale() { return sc; },
    get tx() { return tx; },
    get ty() { return ty; }
  };
})();


// ============ BACKGROUND ============
const BG = (function() {
  let parOn = false;
  let parallaxRAF = null;
  
  function apply() {
    const bg = G.space.bg;
    const l = document.getElementById('bg-layer'), o = document.getElementById('bg-ov');
    if (bg.type === 'gradient') {
      l.style.background = bg.value;
      l.style.backgroundSize = '';
    } else {
      l.style.background = `url('${bg.value}') center/cover no-repeat`;
    }
    l.style.filter = `blur(${bg.blur || 0}px) brightness(${bg.brightness || 100}%)`;
    o.style.background = `rgba(0,0,0,${(bg.dim || 0) / 100})`;
    document.getElementById('bg-blur').value = bg.blur || 0;
    document.getElementById('bg-bright').value = bg.brightness || 100;
    document.getElementById('bg-dim').value = bg.dim || 0;
    document.getElementById('bg-par').checked = bg.parallax || false;
    if (bg.parallax) startPar(); else stopPar();
  }
  
  function renderPresets() {
    const g = document.getElementById('preset-grid');
    g.innerHTML = '';
    BG_PRESETS.forEach(v => {
      const sw = document.createElement('div');
      sw.className = 'psw' + (G.space.bg.value === v ? ' on' : '');
      sw.style.background = v;
      sw.addEventListener('click', () => {
        document.querySelectorAll('.psw').forEach(s => s.classList.remove('on'));
        sw.classList.add('on');
        G.space.bg.type = 'gradient';
        G.space.bg.value = v;
        apply();
        G.save();
      });
      g.appendChild(sw);
    });
  }
  
  function startPar() {
    if (parOn) return;
    parOn = true;
    if (window.DeviceOrientationEvent && typeof DeviceOrientationEvent.requestPermission === 'function') {
      DeviceOrientationEvent.requestPermission().then(r => {
        if (r === 'granted') window.addEventListener('deviceorientation', gyro, { passive: true });
      });
    } else if ('ontouchstart' in window) {
      window.addEventListener('deviceorientation', gyro, { passive: true });
    } else {
      window.addEventListener('mousemove', mouse);
    }
  }
  
  function stopPar() {
    parOn = false;
    window.removeEventListener('deviceorientation', gyro);
    window.removeEventListener('mousemove', mouse);
    if (parallaxRAF) cancelAnimationFrame(parallaxRAF);
    document.getElementById('bg-layer').style.transform = '';
  }
  
  function gyro(e) {
    const x = clamp(e.gamma || 0, -15, 15), y = clamp((e.beta || 0) - 45, -15, 15);
    if (parallaxRAF) cancelAnimationFrame(parallaxRAF);
    parallaxRAF = requestAnimationFrame(() => {
      document.getElementById('bg-layer').style.transform = `translate(${x * .5}px,${y * .5}px) scale(1.05)`;
    });
  }
  
  const throttledMouse = throttle((e) => {
    const cx = window.innerWidth / 2, cy = window.innerHeight / 2;
    const dx = (e.clientX - cx) / cx, dy = (e.clientY - cy) / cy;
    document.getElementById('bg-layer').style.transform = `translate(${dx * -15}px,${dy * -15}px) scale(1.05)`;
  }, 16);
  
  function mouse(e) { throttledMouse(e); }
  
  document.getElementById('bg-blur').addEventListener('input', debounce((e) => {
    G.space.bg.blur = parseInt(e.target.value);
    apply();
    G.save();
  }, 100));
  
  document.getElementById('bg-bright').addEventListener('input', debounce((e) => {
    G.space.bg.brightness = parseInt(e.target.value);
    apply();
    G.save();
  }, 100));
  
  document.getElementById('bg-dim').addEventListener('input', debounce((e) => {
    G.space.bg.dim = parseInt(e.target.value);
    apply();
    G.save();
  }, 100));
  
  document.getElementById('bg-par').addEventListener('change', (e) => {
    G.space.bg.parallax = e.target.checked;
    G.save();
    if (e.target.checked) startPar(); else stopPar();
  });
  
  document.getElementById('bg-file').addEventListener('change', (e) => {
    const f = e.target.files[0];
    if (!f) return;
    // Check file size (limit to 2MB)
    if (f.size > 2 * 1024 * 1024) {
      toast('Image too large (max 2MB)');
      e.target.value = '';
      return;
    }
    const r = new FileReader();
    r.onload = (ev) => {
      Crop.open(ev.target.result, (cropped) => {
        G.space.bg.type = 'image';
        G.space.bg.value = cropped;
        apply();
        G.save();
        renderPresets();
      });
    };
    r.readAsDataURL(f);
    e.target.value = '';
  });
  
  return { apply, renderPresets };
})();

      btn.addEventListener('click', (e) => { e.stopPropagation(); Spaces.to(i); });
      bar.insertBefore(btn, addBtn);
    });
    this.updateAddBtn();
  },
  
  renderSheet() {
    const l = document.getElementById('spc-list');
    l.innerHTML = '';
    G.spaces.forEach((s, i) => {
      const row = document.createElement('div');
      row.style.cssText = 'display:flex;align-items:center;gap:10px;padding:12px 14px;background:var(--bg3);border:1px solid var(--border2);border-radius:11px;cursor:pointer;margin-bottom:6px;' + (i === G.cur ? 'border-color:var(--accent)' : '');
      const nm = document.createElement('div');
      nm.style.cssText = 'flex:1;font-size:14px;color:var(--text);outline:none';
      nm.textContent = s.name;
      nm.addEventListener('dblclick', (e) => {
        e.stopPropagation();
        nm.contentEditable = 'true';
        nm.focus();
        const rng = document.createRange();
        rng.selectNodeContents(nm);
        const sel = window.getSelection();
        sel.removeAllRanges();
        sel.addRange(rng);
      });
      nm.addEventListener('blur', () => {
        nm.contentEditable = 'false';
        s.name = nm.textContent.trim() || ('Space ' + (i + 1));
        Spaces.renderBar();
        G.save();
      });
      nm.addEventListener('keydown', (e) => { if (e.key === 'Enter') { e.preventDefault(); nm.blur(); } });
      const meta = document.createElement('span');
      meta.style.cssText = 'font-size:11px;color:var(--text2)';
      meta.textContent = s.widgets.length + 'w';
      const del = document.createElement('button');
      del.style.cssText = 'width:24px;height:24px;border-radius:6px;border:none;background:none;color:var(--text3);cursor:pointer;font-size:12px;display:' + (G.spaces.length > 1 ? 'flex' : 'none') + ';align-items:center;justify-content:center';
      del.innerHTML = '<i class="fas fa-times"></i>';
      del.addEventListener('click', (e) => { e.stopPropagation(); Spaces.del(i); });
      row.appendChild(nm);
      row.appendChild(meta);
      row.appendChild(del);
      row.addEventListener('click', (e) => { if (e.target === nm && nm.contentEditable === 'true') return; Spaces.to(i); Sheets.closeAll(); });
      l.appendChild(row);
    });
    const notice = document.getElementById('spc-list').parentElement.querySelector('.spc-limit-note');
    if (notice) notice.remove();
    if (G.spaces.length >= MAX_SPACES) {
      const n = document.createElement('div');
      n.className = 'spc-limit-note';
      n.style.cssText = 'font-size:11px;color:var(--text2);text-align:center;padding:6px 0';
      n.textContent = 'Maximum ' + MAX_SPACES + ' spaces reached';
      document.getElementById('spc-list').after(n);
    }
  },
  
  to(i) {
    // Clean up before switching
    TimerManager.clearAll();
    AudioManager.pauseAll();
    G.cur = i;
    Spaces.renderBar();
    Render.all();
    BG.apply();
    Conn.render();
    Draw.load();
    G.save();
  },
  
  add() {
    if (G.spaces.length >= MAX_SPACES) { toast('Maximum ' + MAX_SPACES + ' spaces reached'); return; }
    G.spaces.push(G.defSpace('Space ' + (G.spaces.length + 1)));
    this.to(G.spaces.length - 1);
    this.renderSheet();
    this.updateAddBtn();
  },
  
  del(i) {
    if (G.spaces.length <= 1) return toast('Cannot delete last space');
    G.spaces.splice(i, 1);
    if (G.cur >= G.spaces.length) G.cur = G.spaces.length - 1;
    this.to(G.cur);
    this.renderSheet();
    this.updateAddBtn();
    G.save();
  }
};

// ============ CONTEXT MENU ============
const Ctx = {
  w: null,
  show(x, y, w) {
    this.w = w;
    document.getElementById('ctx-lock').textContent = w.locked ? 'Unlock' : 'Lock';
    const m = document.getElementById('ctx');
    m.style.display = 'block';
    m.style.left = x + 'px';
    m.style.top = y + 'px';
    const r = m.getBoundingClientRect();
    if (r.right > window.innerWidth) m.style.left = (x - r.width) + 'px';
    if (r.bottom > window.innerHeight) m.style.top = (y - r.height) + 'px';
  },
  hide() { document.getElementById('ctx').style.display = 'none'; this.w = null; },
  do(act) {
    const w = this.w;
    this.hide();
    if (!w) return;
    const el = document.querySelector('.widget[data-id="' + w.id + '"]');
    if (act === 'del') delWidget(w.id);
    else if (act === 'dup') dupWidget(w);
    else if (act === 'fwd') {
      const all = G.space.widgets.slice().sort((a, b) => (a.z || 1) - (b.z || 1));
      const idx = all.indexOf(w);
      if (idx < all.length - 1) {
        const above = all[idx + 1];
        const tmp = w.z; w.z = above.z; above.z = tmp;
        const elA = document.querySelector('.widget[data-id="' + above.id + '"]');
        if (el) el.style.zIndex = w.z;
        if (elA) elA.style.zIndex = above.z;
      } else {
        w.z = ++G.zCtr;
        if (el) el.style.zIndex = w.z;
      }
      G.save();
    } else if (act === 'bk') {
      const all = G.space.widgets.slice().sort((a, b) => (a.z || 1) - (b.z || 1));
      const idx = all.indexOf(w);
      if (idx > 0) {
        const below = all[idx - 1];
        const tmp = w.z; w.z = below.z; below.z = tmp;
        const elB = document.querySelector('.widget[data-id="' + below.id + '"]');
        if (el) el.style.zIndex = w.z;
        if (elB) elB.style.zIndex = below.z;
      } else {
        w.z = Math.max(1, (w.z || 10) - 1);
        if (el) el.style.zIndex = w.z;
      }
      G.save();
    } else if (act === 'lock') { w.locked = !w.locked; G.save(); }
    else if (act === 'connect') { G.connectMode = true; G.connectSrc = w.id; toast('Tap another widget to connect'); }
  }
};

document.querySelectorAll('.ci').forEach(el => {
  el.addEventListener('click', function() { Ctx.do(this.dataset.a); });
});
document.addEventListener('click', (e) => { if (!e.target.closest('#ctx')) Ctx.hide(); });
document.addEventListener('touchstart', (e) => { if (!e.target.closest('#ctx')) Ctx.hide(); }, { passive: true });

// ============ WIDGET HELPERS ============
function findW(id) { return G.space.widgets.find(w => w.id === id); }
function updW(id, patch) {
  const w = findW(id);
  if (!w) return;
  Object.assign(w, patch);
  G.save();
}

function spawnPos(w, h) {
  const cx = (window.innerWidth / 2 - VP.tx) / VP.scale;
  const cy = (120 - VP.ty) / VP.scale;
  return { x: snap(cx - w / 2 + (Math.random() - .5) * 40), y: snap(Math.max(10, cy + (Math.random() - .5) * 20)) };
}

function addWidget(type) {
  const m = WMETA[type], pos = spawnPos(m.w, m.h);
  const w = { id: uid(), type: type, x: pos.x, y: pos.y, width: m.w, height: m.h, z: ++G.zCtr, color: 'yellow', font: 'DM Sans', content: '', locked: false, createdAt: Date.now() };
  if (type === 'todo') w.items = [];
  if (type === 'habit') w.habits = [];
  if (type === 'reminder') w.reminders = [];
  if (type === 'pomodoro') { w.pomWork = 25; w.pomBreak = 5; w.pomLeft = 1500; w.pomSess = 'work'; }
  if (type === 'calendar') { w.calY = new Date().getFullYear(); w.calM = new Date().getMonth(); }
  if (type === 'ambient') w.playing = null;
  if (type === 'clock') { w.clkStyle = 'style-minimal'; w.clkTz = 'local'; w.clkLabel = ''; }
  if (type === 'pdf') w.pdfPage = 1;
  G.space.widgets.push(w);
  const el = buildEl(w);
  document.getElementById('cv').appendChild(el);
  if (!G.editMode) G.toggleEdit();
  G.save();
  return w;
}

// Cleanup function for widget resources
function cleanupWidget(id) {
  // Clear timers
  TimerManager.clearForWidget(id);
  // Destroy audio
  AudioManager.destroy(id);
  // Remove from cleanup registry
  CleanupManager.cleanup(id);
}

function delWidget(id) {
  // Clean up resources first
  cleanupWidget(id);
  
  G.space.widgets = G.space.widgets.filter(w => w.id !== id);
  const el = document.querySelector('.widget[data-id="' + id + '"]');
  if (el) {
    el.style.animation = 'wout .18s ease forwards';
    setTimeout(() => el.remove(), 180);
  }
  G.space.connections = (G.space.connections || []).filter(c => c.a !== id && c.b !== id);
  Conn.render();
  G.save();
}

function dupWidget(w) {
  const n = JSON.parse(JSON.stringify(w));
  n.id = uid();
  n.x = snap(w.x + 24);
  n.y = snap(w.y + 24);
  n.z = ++G.zCtr;
  G.space.widgets.push(n);
  document.getElementById('cv').appendChild(buildEl(n));
  G.save();
}


// ============ BUILD ELEMENT ============
function buildEl(w) {
  const el = document.createElement('div');
  el.className = 'widget ' + w.type + '-widget';
  if (w.type === 'clock' && w.clkStyle) el.classList.add(w.clkStyle);
  el.dataset.id = w.id;
  el.style.left = w.x + 'px';
  el.style.top = w.y + 'px';
  el.style.width = w.width + 'px';
  el.style.height = w.height + 'px';
  el.style.zIndex = w.z || 10;
  if (w.type === 'youtube' && w.ytEmbedUrl) { el.style.zIndex = 9000 + (w.z || 10); }
  const mx = WMAXSIZE[w.type];
  if (mx) { el.style.maxWidth = mx.w + 'px'; el.style.maxHeight = mx.h + 'px'; }
  
  const dh = document.createElement('div');
  dh.className = 'wh-bar';
  dh.innerHTML = '<div class="wh-dots"><span></span><span></span><span></span><span></span><span></span><span></span></div><div class="wh-sp"></div><button class="wh-del"><i class="fas fa-trash-alt"></i></button>';
  dh.querySelector('.wh-del').addEventListener('click', (e) => { e.stopPropagation(); delWidget(w.id); });
  el.appendChild(dh);
  
  const body = document.createElement('div');
  body.className = 'wb';
  body.style.height = '100%';
  body.appendChild(buildInner(w));
  el.appendChild(body);
  
  const rh = document.createElement('div');
  rh.className = 'wrz';
  el.appendChild(rh);
  
  el.addEventListener('click', () => {
    if (!G.connectMode) return;
    if (G.connectSrc === w.id) { G.connectMode = false; G.connectSrc = null; return; }
    if (!G.space.connections) G.space.connections = [];
    const ex = G.space.connections.find(c => (c.a === G.connectSrc && c.b === w.id) || (c.a === w.id && c.b === G.connectSrc));
    if (!ex) { G.space.connections.push({ a: G.connectSrc, b: w.id }); Conn.render(); G.save(); toast('Connected!'); }
    G.connectMode = false; G.connectSrc = null;
  });
  
  el.addEventListener('contextmenu', (e) => { e.preventDefault(); G.selectW(el, w); Ctx.show(e.clientX, e.clientY, w); });
  el.addEventListener('mousedown', () => { G.selectW(el, w); });
  el.addEventListener('touchstart', () => { G.selectW(el, w); }, { passive: true });
  el.addEventListener('mousemove', () => { if (G.selId === w.id) G.resetSel(); });
  
  attachDrag(dh, el, w);
  attachResize(rh, el, w);
  attachLP(el, w);
  if (!G.editMode) el.classList.add('locked');
  return el;
}

// ============ INNER CONTENT BUILDERS ============
function buildInner(w) {
  const wrap = document.createElement('div');
  wrap.style.height = '100%';
  const id = w.id;
  
  if (w.type === 'note') {
    const taH = 'calc(100% - 70px)';
    let html = '<div class="wh"><i class="fas fa-sticky-note"></i>Note<span class="whs"></span><select class="note-fsz">';
    NFONTS.forEach(f => { html += '<option' + (w.font === f ? ' selected' : '') + '>' + f + '</option>'; });
    html += '</select></div>';
    html += '<textarea class="note-ta" placeholder="Write something…" style="font-family:' + (w.font || 'DM Sans') + ';height:' + taH + ';overflow-y:auto">' + (w.content || '') + '</textarea>';
    html += '<div class="note-colors">';
    NCOLORS.forEach(c => { html += '<div class="nc' + (w.color === c ? ' on' : '') + '" style="background:' + CMAP[c] + '" data-c="' + c + '"></div>'; });
    html += '</div>';
    wrap.innerHTML = html;
    const ta = wrap.querySelector('textarea');
    ta.addEventListener('input', debounce(() => { updW(id, { content: ta.value }); G.resetSel(); }, 300));
    ta.addEventListener('touchstart', (e) => { e.stopPropagation(); }, { passive: true });
    ta.addEventListener('mousedown', (e) => { if (G.editMode) e.stopPropagation(); });
    wrap.querySelector('.note-fsz').addEventListener('change', function() {
      updW(id, { font: this.value });
      const t = document.querySelector('.widget[data-id="' + id + '"] .note-ta');
      if (t) t.style.fontFamily = this.value;
    });
    wrap.querySelectorAll('.nc').forEach(dot => {
      dot.addEventListener('click', () => { setNoteColor(id, dot.dataset.c); });
    });
  }
  
  else if (w.type === 'clock') { buildClock(w, wrap); }
  
  else if (w.type === 'todo') {
    let html = '<div class="wh"><i class="fas fa-check-square"></i>To-Do</div><div class="todo-body"><div class="todo-list" id="tdl-' + id + '">';
    (w.items || []).forEach(i => { html += tiHTML(id, i); });
    html += '</div><div class="todo-add"><input placeholder="Add item…"><button class="ta-btn"><i class="fas fa-plus"></i></button></div></div>';
    wrap.innerHTML = html;
    const inp = wrap.querySelector('.todo-add input'), btn = wrap.querySelector('.ta-btn');
    inp.addEventListener('keydown', (e) => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); addTI(id, inp); } });
    inp.addEventListener('touchstart', (e) => { e.stopPropagation(); }, { passive: true });
    inp.addEventListener('mousedown', (e) => { if (G.editMode) e.stopPropagation(); });
    btn.addEventListener('click', () => { addTI(id, inp); });
    wrap.querySelector('.todo-body').addEventListener('touchstart', (e) => { e.stopPropagation(); }, { passive: true });
    attachTIListeners(id, wrap);
  }
  
  else if (w.type === 'image') {
    const has = w.url && w.url.length;
    wrap.innerHTML = '<div class="img-body">' + (has ? '<img src="' + w.url + '" alt="" loading="lazy">' : '<div class="img-ph"><i class="fas fa-image"></i><span>Tap to add</span></div>') + '</div><input type="file" id="iu-' + id + '" accept="image/*" style="display:none">';
    const fi = wrap.querySelector('#iu-' + id);
    fi.addEventListener('change', (e) => {
      const f = e.target.files[0];
      if (!f) return;
      if (f.size > 2 * 1024 * 1024) { toast('Image too large (max 2MB)'); e.target.value = ''; return; }
      const r = new FileReader();
      r.onload = (ev) => {
        Crop.open(ev.target.result, (cropped) => { updW(id, { url: cropped }); Render.one(id); G.save(); });
      };
      r.readAsDataURL(f);
      e.target.value = '';
    });
    wrap.querySelector('.img-body').addEventListener('click', () => { if (G.editMode || !has) fi.click(); });
  }
  
  else if (w.type === 'quote') {
    wrap.innerHTML = '<div class="wh"><i class="fas fa-quote-right"></i>Quote</div><div class="quote-body"><div class="qt" contenteditable="true">' + (w.content || 'Your quote here…') + '</div><div class="qa" contenteditable="true">— ' + (w.author || 'Author') + '</div></div>';
    wrap.querySelector('.qt').addEventListener('blur', debounce(function() { updW(id, { content: this.textContent }); }, 300));
    wrap.querySelector('.qa').addEventListener('blur', debounce(function() { updW(id, { author: this.textContent }); }, 300));
    wrap.querySelectorAll('[contenteditable]').forEach(ce => {
      ce.addEventListener('touchstart', (e) => { e.stopPropagation(); }, { passive: true });
      ce.addEventListener('mousedown', (e) => { if (G.editMode) e.stopPropagation(); });
    });
  }
  
  else if (w.type === 'music') {
    if (w.embedUrl) {
      wrap.innerHTML = '<div class="music-body"><iframe src="' + w.embedUrl + '" allow="autoplay;clipboard-write;encrypted-media;fullscreen;picture-in-picture" loading="lazy"></iframe></div>';
    } else {
      wrap.innerHTML = '<div class="wh"><i class="fab fa-spotify" style="color:#1DB954"></i>Music</div><div class="music-setup"><div style="font-size:11px;color:var(--text2)">Paste Spotify URL:</div><input class="music-in" id="ms-' + id + '" placeholder="https://open.spotify.com/…" inputmode="url"><button class="music-go">Load</button></div>';
      wrap.querySelector('#ms-' + id).addEventListener('touchstart', (e) => { e.stopPropagation(); }, { passive: true });
      wrap.querySelector('#ms-' + id).addEventListener('mousedown', (e) => { if (G.editMode) e.stopPropagation(); });
      wrap.querySelector('.music-go').addEventListener('click', () => { loadMusic(id); });
    }
  }
  
  else if (w.type === 'youtube') { buildYouTube(w, wrap); }
  else if (w.type === 'pdf') { buildPDF(w, wrap); }
  else if (w.type === 'audio') { buildAudio(w, wrap); }
  else if (w.type === 'pomodoro') buildPomo(w, wrap);
  else if (w.type === 'habit') buildHabit(w, wrap);
  else if (w.type === 'calendar') buildCal(w, wrap);
  else if (w.type === 'ambient') buildAmbient(w, wrap);
  else if (w.type === 'reminder') buildReminder(w, wrap);
  
  return wrap;
}

// ============ PDF BUILDER ============
function buildPDF(w, wrap) {
  if (!w.pdfPage) w.pdfPage = 1;
  const widgetId = w.id;
  if (w.pdfData) {
    wrap.innerHTML =
      '<div class="wh"><i class="fas fa-file-pdf" style="color:#ef4444"></i>' +
      '<span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1;font-size:10px">' + (w.pdfName || 'PDF') + '</span>' +
      '<button class="note-fsz" id="pdf-change-' + widgetId + '"><i class="fas fa-sync-alt"></i></button></div>' +
      '<div style="flex:1;overflow:hidden;display:flex;flex-direction:column;height:calc(100% - 68px)">' +
        '<iframe id="pdff-' + widgetId + '" src="' + w.pdfData + '#page=' + (w.pdfPage || 1) + '" ' +
        'style="width:100%;flex:1;border:none;display:block" type="application/pdf" loading="lazy"></iframe>' +
      '</div>' +
      '<div class="pdf-nav">' +
        '<button class="pbtn pdf-prev-btn" data-wid="' + widgetId + '"' + (w.pdfPage <= 1 ? ' disabled' : '') + '>' +
          '<i class="fas fa-chevron-left"></i></button>' +
        '<span class="pdf-pg" id="pdf-pg-' + widgetId + '">Page ' + (w.pdfPage || 1) + '</span>' +
        '<button class="pbtn pdf-next-btn" data-wid="' + widgetId + '"><i class="fas fa-chevron-right"></i></button>' +
      '</div>' +
      '<input type="file" id="pfu-' + widgetId + '" accept="application/pdf" style="display:none">';
    
    // Use event delegation on the wrap element for better reliability
    wrap.addEventListener('click', (e) => {
      const btn = e.target.closest('.pdf-prev-btn');
      if (btn) {
        e.stopPropagation();
        const wid = btn.dataset.wid;
        const widget = findW(wid);
        if (!widget || !widget.pdfData) return;
        if ((widget.pdfPage || 1) <= 1) return;
        widget.pdfPage = (widget.pdfPage || 1) - 1;
        
        // Update UI
        const pgEl = wrap.querySelector('#pdf-pg-' + wid);
        const frEl = wrap.querySelector('#pdff-' + wid);
        if (pgEl) pgEl.textContent = 'Page ' + widget.pdfPage;
        if (frEl) frEl.src = widget.pdfData + '#page=' + widget.pdfPage;
        btn.disabled = widget.pdfPage <= 1;
        G.save();
        return;
      }
      
      const nextBtn = e.target.closest('.pdf-next-btn');
      if (nextBtn) {
        e.stopPropagation();
        const wid = nextBtn.dataset.wid;
        const widget = findW(wid);
        if (!widget || !widget.pdfData) return;
        widget.pdfPage = (widget.pdfPage || 1) + 1;
        
        // Update UI
        const pgEl = wrap.querySelector('#pdf-pg-' + wid);
        const frEl = wrap.querySelector('#pdff-' + wid);
        const prevBtn = wrap.querySelector('.pdf-prev-btn');
        if (pgEl) pgEl.textContent = 'Page ' + widget.pdfPage;
        if (frEl) frEl.src = widget.pdfData + '#page=' + widget.pdfPage;
        if (prevBtn) prevBtn.disabled = false;
        G.save();
        return;
      }
      
      const changeBtn = e.target.closest('#pdf-change-' + widgetId);
      if (changeBtn) {
        e.stopPropagation();
        wrap.querySelector('#pfu-' + widgetId).click();
      }
    });
  } else {
    wrap.innerHTML =
      '<div class="wh"><i class="fas fa-file-pdf" style="color:#ef4444"></i>PDF</div>' +
      '<div class="pdf-setup"><i class="fas fa-file-pdf"></i><p>Upload a PDF file</p>' +
      '<button class="pdf-upload-btn">Choose PDF</button></div>' +
      '<input type="file" id="pfu-' + widgetId + '" accept="application/pdf" style="display:none">';
    wrap.querySelector('.pdf-upload-btn').addEventListener('click', () => { wrap.querySelector('#pfu-' + widgetId).click(); });
  }
  const fi = wrap.querySelector('#pfu-' + widgetId);
  if (fi) {
    fi.addEventListener('change', (e) => {
      const f = e.target.files[0];
      if (!f) return;
      if (f.size > 5 * 1024 * 1024) { toast('PDF too large (max 5MB)'); e.target.value = ''; return; }
      const r = new FileReader();
      r.onload = (ev) => { updW(widgetId, { pdfData: ev.target.result, pdfName: f.name, pdfPage: 1 }); Render.one(widgetId); G.save(); };
      r.readAsDataURL(f);
      e.target.value = '';
    });
  }
}

// ============ AUDIO BUILDER (Optimized) ============
function buildAudio(w, wrap) {
  const id = w.id;
  if (w.audioData) {
    wrap.innerHTML =
      '<div class="wh"><i class="fas fa-headphones" style="color:var(--orange)"></i>' +
      '<span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:10px">' + (w.audioName || 'Audio') + '</span>' +
      '<button class="note-fsz" id="ach-' + id + '"><i class="fas fa-sync-alt"></i></button></div>' +
      '<div class="audio-body">' +
        '<div class="audio-player">' +
          '<div class="audio-title">' + (w.audioName || 'Audio file') + '</div>' +
          '<div class="audio-controls">' +
            '<button class="aplay-btn" id="apl-' + id + '"><i class="fas fa-play" id="apli-' + id + '"></i></button>' +
            '<div class="audio-time" id="att-' + id + '">0:00</div>' +
          '</div>' +
          '<div class="audio-progress" id="apr-' + id + '"><div class="audio-prog-fill" id="apf-' + id + '" style="width:0%"></div></div>' +
        '</div>' +
      '</div>' +
      '<input type="file" id="afu-' + id + '" accept="audio/*" style="display:none">';
    
    // Use AudioManager instead of global audioEls
    const audio = AudioManager.create(id, w.audioData);
    let playing = false;
    const playBtn = wrap.querySelector('#apl-' + id);
    const icon = wrap.querySelector('#apli-' + id);
    const timeEl = wrap.querySelector('#att-' + id);
    const progBar = wrap.querySelector('#apr-' + id);
    const progFill = wrap.querySelector('#apf-' + id);
    
    const fmt = (s) => Math.floor(s / 60) + ':' + String(Math.floor(s % 60)).padStart(2, '0');
    
    playBtn.addEventListener('click', () => {
      if (playing) { audio.pause(); icon.className = 'fas fa-play'; playing = false; }
      else { audio.play().catch(() => {}); icon.className = 'fas fa-pause'; playing = true; }
    });
    
    // Use single shared timeupdate handler with throttling
    const updateProgress = throttle(() => {
      if (!audio.duration) return;
      progFill.style.width = ((audio.currentTime / audio.duration) * 100) + '%';
      timeEl.textContent = fmt(audio.currentTime) + '/' + fmt(audio.duration);
    }, 100);
    
    audio.addEventListener('timeupdate', updateProgress);
    audio.addEventListener('ended', () => {
      icon.className = 'fas fa-play';
      playing = false;
      progFill.style.width = '0%';
      audio.currentTime = 0;
    });
    
    progBar.addEventListener('click', (e) => {
      if (!audio.duration) return;
      const r = progBar.getBoundingClientRect();
      audio.currentTime = ((e.clientX - r.left) / r.width) * audio.duration;
    });
    
    wrap.querySelector('#ach-' + id).addEventListener('click', (e) => {
      e.stopPropagation();
      wrap.querySelector('#afu-' + id).click();
    });
    
    const ab = wrap.querySelector('.audio-body');
    if (ab) {
      ab.addEventListener('touchstart', (e) => { e.stopPropagation(); }, { passive: true });
      ab.addEventListener('mousedown', (e) => { if (G.editMode) e.stopPropagation(); });
    }
  } else {
    wrap.innerHTML =
      '<div class="wh"><i class="fas fa-headphones" style="color:var(--orange)"></i>Audio</div>' +
      '<div class="audio-body"><div class="audio-ph"><i class="fas fa-music"></i><p>Upload an audio file</p></div>' +
      '<button class="audio-upload-btn">Choose Audio</button></div>' +
      '<input type="file" id="afu-' + id + '" accept="audio/*" style="display:none">';
    wrap.querySelector('.audio-upload-btn').addEventListener('click', () => { wrap.querySelector('#afu-' + id).click(); });
  }
  const fi = wrap.querySelector('#afu-' + id);
  if (fi) {
    fi.addEventListener('change', (e) => {
      const f = e.target.files[0];
      if (!f) return;
      if (f.size > 10 * 1024 * 1024) { toast('Audio too large (max 10MB)'); e.target.value = ''; return; }
      const r = new FileReader();
      r.onload = (ev) => {
        AudioManager.destroy(id);
        updW(id, { audioData: ev.target.result, audioName: f.name });
        Render.one(id);
        G.save();
      };
      r.readAsDataURL(f);
      e.target.value = '';
    });
  }
}

let clkModalId = null;
function buildClock(w, wrap) {
  wrap.innerHTML =
    '<div class="wh"><i class="fas fa-clock"></i>' + (w.clkLabel || 'Clock') +

    (w.clkTz && w.clkTz !== 'local' ? '<div class="clk-tz">' + w.clkTz.split('/').pop().replace('_', ' ') + '</div>' : '') +
    '</div>';
  wrap.querySelector('#cfg-' + w.id).addEventListener('click', (e) => { e.stopPropagation(); openClkModal(w.id); });

function openClkModal(id) {
  const w = findW(id);
  if (!w) return;
  clkModalId = id;
  document.getElementById('cm-style').value = w.clkStyle || 'style-minimal';
  document.getElementById('cm-tz').value = w.clkTz || 'local';
  document.getElementById('cm-label').value = w.clkLabel || '';
  document.getElementById('clock-modal').classList.add('on');
  document.getElementById('modal-ov').classList.add('on');
}

document.getElementById('cm-cancel').addEventListener('click', () => {
  document.getElementById('clock-modal').classList.remove('on');
  document.getElementById('modal-ov').classList.remove('on');
  clkModalId = null;
});
document.getElementById('modal-ov').addEventListener('click', () => {
  document.getElementById('clock-modal').classList.remove('on');
  document.getElementById('modal-ov').classList.remove('on');
  clkModalId = null;
});
document.getElementById('cm-ok').addEventListener('click', () => {
  if (!clkModalId) return;
  const w = findW(clkModalId);
  if (!w) return;
  w.clkStyle = document.getElementById('cm-style').value;
  w.clkTz = document.getElementById('cm-tz').value;
  w.clkLabel = document.getElementById('cm-label').value;

  const el = document.querySelector('.widget[data-id="' + clkModalId + '"]');
  if (el) {
    ['style-minimal', 'style-large', 'style-compact', 'style-ampm'].forEach(c => el.classList.remove(c));

    body.innerHTML = '';
    body.appendChild(buildInner(w));
  }
  document.getElementById('clock-modal').classList.remove('on');
  document.getElementById('modal-ov').classList.remove('on');
  clkModalId = null;
});

function tickClock(id) {
  // Clear existing interval for this clock
  TimerManager.clearInterval('clock-' + id);
  
  const upd = () => {
    const el = document.getElementById('clk-' + id);
    if (!el) {
      TimerManager.clearInterval('clock-' + id);
      return;
    }
    const w = findW(id);
    const now = new Date();
    const tz = w && w.clkTz && w.clkTz !== 'local' ? w.clkTz : null;
    const use12 = w && w.clkStyle === 'style-ampm';
    let tStr, dStr;
    if (tz) {
      try {
        tStr = now.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: use12, timeZone: tz });
        dStr = now.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric', timeZone: tz });
      } catch (e2) { tStr = '--:--'; dStr = ''; }
    } else {
      if (use12) {
        tStr = now.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: true });
      } else {
        tStr = [now.getHours(), now.getMinutes(), now.getSeconds()].map(n => String(n).padStart(2, '0')).join(':');
      }
      dStr = now.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });
    }
    el.textContent = tStr;
    const de = document.getElementById('clkd-' + id);
    if (de) de.textContent = dStr || '';
  };
  upd();
  TimerManager.setInterval('clock-' + id, upd, 1000);
}

}

// ============ POMODORO WIDGET (Optimized) ============
function buildPomo(w, wrap) {
  const r = 42, c = 2 * Math.PI * r;
  wrap.innerHTML = '<div class="wh"><i class="fas fa-stopwatch"></i>Pomodoro</div><div class="pomo-body"><div class="pomo-ring"><svg width="90" height="90" viewBox="0 0 90 90"><circle class="pbg" cx="45" cy="45" r="' + r + '"/><circle class="ppr" id="pr-' + w.id + '" cx="45" cy="45" r="' + r + '" stroke-dasharray="' + c + '" stroke-dashoffset="0"/></svg><div class="ptime" id="pt-' + w.id + '">--:--</div></div><div class="plbl" id="pl-' + w.id + '">' + (w.pomSess || 'work') + '</div><div class="pbtns"><button class="pbtn" id="pst-' + w.id + '"><i class="fas fa-play"></i></button><button class="pbtn" id="ppau-' + w.id + '"><i class="fas fa-pause"></i></button><button class="pbtn" id="prs-' + w.id + '"><i class="fas fa-redo"></i></button></div><div class="pcfg">Work <input type="number" min="1" max="60" value="' + (w.pomWork || 25) + '"> Break <input type="number" min="1" max="30" value="' + (w.pomBreak || 5) + '"></div></div>';
  
  const ins = wrap.querySelectorAll('.pcfg input');
  ins[0].addEventListener('change', debounce(function() { updW(w.id, { pomWork: +this.value }); }, 300));
  ins[1].addEventListener('change', debounce(function() { updW(w.id, { pomBreak: +this.value }); }, 300));
  
  wrap.querySelector('#pst-' + w.id).addEventListener('click', () => { pomoAct(w.id, 'start'); });
  wrap.querySelector('#ppau-' + w.id).addEventListener('click', () => { pomoAct(w.id, 'pause'); });
  wrap.querySelector('#prs-' + w.id).addEventListener('click', () => { pomoAct(w.id, 'reset'); });
  
  pomoUpd(w.id);
}

function pomoAct(id, act) {
  const w = findW(id);
  if (!w) return;
  
  if (act === 'start') {
    TimerManager.clearInterval('pomo-' + id);
    const btn = document.getElementById('pst-' + id);
    if (btn) btn.classList.add('on');
    
    TimerManager.setInterval('pomo-' + id, () => {
      w.pomLeft--;
      if (w.pomLeft <= 0) {
        TimerManager.clearInterval('pomo-' + id);
        const btn2 = document.getElementById('pst-' + id);
        if (btn2) btn2.classList.remove('on');
        w.pomSess = w.pomSess === 'work' ? 'break' : 'work';
        w.pomLeft = (w.pomSess === 'work' ? w.pomWork : w.pomBreak) * 60;
        toast('Pomodoro: ' + w.pomSess + ' time!');
      }
      pomoUpd(id);
      G.save();
    }, 1000);
  } else if (act === 'pause') {
    TimerManager.clearInterval('pomo-' + id);
    const btn = document.getElementById('pst-' + id);
    if (btn) btn.classList.remove('on');
  } else {
    TimerManager.clearInterval('pomo-' + id);
    const btn = document.getElementById('pst-' + id);
    if (btn) btn.classList.remove('on');
    w.pomLeft = (w.pomWork || 25) * 60;
    w.pomSess = 'work';
    pomoUpd(id);
    G.save();
  }
}

function pomoUpd(id) {
  const w = findW(id);
  if (!w) return;
  const te = document.getElementById('pt-' + id);
  if (!te) return;
  const m = Math.floor(w.pomLeft / 60), s = w.pomLeft % 60;
  te.textContent = String(m).padStart(2, '0') + ':' + String(s).padStart(2, '0');
  const le = document.getElementById('pl-' + id);
  if (le) le.textContent = w.pomSess || 'work';
  const re = document.getElementById('pr-' + id);
  if (!re) return;
  const r = 42, c = 2 * Math.PI * r;
  const tot = (w.pomSess === 'work' ? w.pomWork : w.pomBreak) * 60 || 1500;
  re.style.strokeDashoffset = c * (1 - w.pomLeft / tot);
}

// ============ HABIT WIDGET ============
function buildHabit(w, wrap) {
  let html = '<div class="wh"><i class="fas fa-seedling"></i>Habits</div><div class="habit-body" id="hb-' + w.id + '">';
  (w.habits || []).forEach(h => { html += hRowHTML(w.id, h); });

  wrap.innerHTML = html;
  const inp = wrap.querySelector('.hadd input'), btn = wrap.querySelector('.hadd .ta-btn');
  inp.addEventListener('keydown', (e) => { if (e.key === 'Enter') addHabit(w.id, inp); });
  inp.addEventListener('touchstart', (e) => { e.stopPropagation(); }, { passive: true });
  inp.addEventListener('mousedown', (e) => { if (G.editMode) e.stopPropagation(); });
  btn.addEventListener('click', () => { addHabit(w.id, inp); });
  wrap.querySelector('.habit-body').addEventListener('touchstart', (e) => { e.stopPropagation(); }, { passive: true });
  attachHabitL(w.id, wrap);

function hRowHTML(wid, h) {
  const ds = ['S', 'M', 'T', 'W', 'T', 'F', 'S'];
  let html = '<div class="habit-row" data-hid="' + h.id + '"><div class="hname" contenteditable="true">' + h.name + '</div><div class="hdots">';
  ds.forEach((d, i) => { html += '<div class="hdot' + ((h.done || [])[i] ? ' on' : '') + '" data-day="' + i + '" title="' + d + '"></div>'; });
  return html + '</div></div>';
}

function attachHabitL(wid, wrap) {
  wrap.querySelectorAll('.habit-row').forEach(row => {
    const hid = row.dataset.hid, nm = row.querySelector('.hname');
    nm.addEventListener('blur', debounce(() => {
      const w = findW(wid);
      const h = w && w.habits && w.habits.find(x => x.id === hid);
      if (h) { h.name = nm.textContent.trim(); G.save(); }
    }, 300));
    nm.addEventListener('touchstart', (e) => { e.stopPropagation(); }, { passive: true });
    nm.addEventListener('mousedown', (e) => { if (G.editMode) e.stopPropagation(); });
    
    row.querySelectorAll('.hdot').forEach(dot => {
      dot.addEventListener('click', () => {
        const day = parseInt(dot.dataset.day);
        const w = findW(wid);
        const h = w && w.habits && w.habits.find(x => x.id === hid);
        if (!h) return;
        if (!h.done) h.done = Array(7).fill(false);
        h.done[day] = !h.done[day];
        dot.classList.toggle('on', h.done[day]);
        G.save();
      });
    });
  });
}

function addHabit(wid, inp) {
  const t = inp.value.trim();
  if (!t) return;
  const w = findW(wid);
  if (!w) return;
  if (!w.habits) w.habits = [];
  const h = { id: uid(), name: t, done: Array(7).fill(false) };
  w.habits.push(h);
  inp.value = '';
  const body = document.getElementById('hb-' + wid);
  if (body) {
    const d = document.createElement('div');

// ============ CALENDAR WIDGET ============
function buildCal(w, wrap) {
  const now = new Date(), y = w.calY || now.getFullYear(), m = w.calM != null ? w.calM : now.getMonth();
  const first = new Date(y, m, 1).getDay(), dim = new Date(y, m + 1, 0).getDate();
  let cells = '';
  for (let i = 0; i < first; i++) cells += '<div class="cal-day other">' + new Date(y, m, -(first - i - 1)).getDate() + '</div>';
  for (let d = 1; d <= dim; d++) {
    const today = d === now.getDate() && m === now.getMonth() && y === now.getFullYear();
    cells += '<div class="cal-day' + (today ? ' today' : '') + '">' + d + '</div>';
  }
  wrap.innerHTML = '<div class="wh"><i class="fas fa-calendar-alt"></i>Calendar</div><div class="cal-body"><div class="cal-hdr"><button class="cal-nav" data-d="-1"><i class="fas fa-chevron-left"></i></button><span class="cal-mo">' + MONTHS[m] + ' ' + y + '</span><button class="cal-nav" data-d="1"><i class="fas fa-chevron-right"></i></button></div><div class="cal-grid">' + DAYS.map(d => '<div class="cal-dl">' + d + '</div>').join('') + cells + '</div></div>';
  
  wrap.querySelectorAll('.cal-nav').forEach(btn => {
    btn.addEventListener('click', () => {
      const dir = parseInt(btn.dataset.d);
      let nm = (w.calM != null ? w.calM : now.getMonth()) + dir, ny = w.calY || now.getFullYear();
      if (nm < 0) { nm = 11; ny--; }
      if (nm > 11) { nm = 0; ny++; }
      updW(w.id, { calM: nm, calY: ny });
      Render.one(w.id);
    });
  });
}

  const titleEl = document.getElementById('rt-' + wid);

// ============ DRAG HANDLER ============
function attachDrag(handle, el, w) {
  handle.addEventListener('mousedown', (e) => {
    if (!G.editMode) return;
    e.preventDefault();
    e.stopPropagation();
    G.selectW(el, w);
    el.classList.add('drag');
    const sx = e.clientX - w.x * VP.scale, sy = e.clientY - w.y * VP.scale;
    
    const mm = rafThrottle((ev) => {
      w.x = snap(Math.max(0, (ev.clientX - sx) / VP.scale));
      w.y = snap(Math.max(0, (ev.clientY - sy) / VP.scale));
      el.style.left = w.x + 'px';
      el.style.top = w.y + 'px';
      Conn.render();
      G.resetSel();
    });
    
    const mu = () => {
      el.classList.remove('drag');
      document.removeEventListener('mousemove', mm);
      document.removeEventListener('mouseup', mu);
      G.save();
    };
    
    document.addEventListener('mousemove', mm);
    document.addEventListener('mouseup', mu);
  });
  
  handle.addEventListener('touchstart', (e) => {
    if (!G.editMode) return;
    e.stopPropagation();
    const t = e.touches[0];
    G.selectW(el, w);
    el.classList.add('drag');
    const sx = t.clientX - w.x * VP.scale, sy = t.clientY - w.y * VP.scale;
    
    const mm = (ev) => {
      ev.preventDefault();
      const t2 = ev.touches[0];
      w.x = snap(Math.max(0, (t2.clientX - sx) / VP.scale));
      w.y = snap(Math.max(0, (t2.clientY - sy) / VP.scale));
      el.style.left = w.x + 'px';
      el.style.top = w.y + 'px';
      Conn.render();
      G.resetSel();
    };
    
    const mu = () => {
      el.classList.remove('drag');
      document.removeEventListener('touchmove', mm);
      document.removeEventListener('touchend', mu);
      G.save();
    };
    
    document.addEventListener('touchmove', mm, { passive: false });
    document.addEventListener('touchend', mu);
  }, { passive: true });
}
