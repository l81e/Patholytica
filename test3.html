<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>My Space</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════
   CSS VARIABLES & RESET
   ═══════════════════════════════════════ */
:root {
  --bg: #0a0a0a; --bg2: #111; --bg3: #181818; --bg4: #202020;
  --border: #1e1e1e; --border2: #2a2a2a; --border3: #363636;
  --text: #e8e6e1; --text2: #6e6c68; --text3: #3a3835;
  --accent: #4f9eff; --accent-h: #3a8ae8;
  --green: #3dba72; --orange: #e88c3a; --purple: #a56fd4;
  --red: #ef4444; --yellow: #fbbf24;
  --glass: rgba(10,10,10,0.84); --glass2: rgba(14,14,14,0.9);
  --glass-b: rgba(255,255,255,0.055);
  --shadow: 0 8px 32px rgba(0,0,0,0.72);
  --shadow2: 0 24px 64px rgba(0,0,0,0.88);
  --r: 15px;
  --safe-t: env(safe-area-inset-top,0px);
  --safe-b: env(safe-area-inset-bottom,0px);
  --topbar: 48px; --toolbar: 56px;
}
*,*::before,*::after { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
html,body { width:100%; height:100%; overflow:hidden; font-family:'DM Sans',sans-serif; background:var(--bg); color:var(--text); touch-action:none; }

/* ═══════════════════════════════════════
   LAYER STRUCTURE
   1. bg-layer   (background image/gradient)
   2. canvas-vp  (pan+zoom viewport)
      └ canvas   (3000×3000 infinite canvas)
   3. ui-layer   (fixed HUD)
   ═══════════════════════════════════════ */
#bg-layer {
  position:fixed; inset:-60px; z-index:0;
  background:var(--bg); background-size:cover; background-position:center;
  transition:filter .4s; pointer-events:none; will-change:transform;
}
#bg-overlay { position:absolute; inset:0; pointer-events:none; transition:background .3s; }

#canvas-vp {
  position:fixed; inset:0; z-index:1; overflow:hidden; touch-action:none;
}
#canvas {
  position:absolute; top:0; left:0;
  width:3000px; height:3000px;
  transform-origin:0 0; will-change:transform;
}

/* snap grid */
#snap-grid {
  position:absolute; inset:0; width:3000px; height:3000px;
  background-image:
    linear-gradient(rgba(255,255,255,.022) 1px,transparent 1px),
    linear-gradient(90deg,rgba(255,255,255,.022) 1px,transparent 1px);
  background-size:20px 20px;
  pointer-events:none; display:none; z-index:0;
}
#snap-grid.show { display:block; }

/* drawing canvas */
#draw-canvas {
  position:absolute; top:0; left:0;
  width:3000px; height:3000px;
  pointer-events:none; z-index:50;
}
#draw-canvas.drawing { pointer-events:all; cursor:crosshair; }

/* connection lines */
#conn-svg {
  position:absolute; top:0; left:0;
  width:3000px; height:3000px;
  pointer-events:none; z-index:1; overflow:visible;
}
.conn-line { stroke:var(--accent); stroke-width:1.5; fill:none; opacity:.45; stroke-dasharray:5 3; cursor:pointer; pointer-events:stroke; }
.conn-line:hover { opacity:.9; stroke:var(--red); }

#ui-layer { position:fixed; inset:0; z-index:1000; pointer-events:none; }
#ui-layer > * { pointer-events:all; }

/* ═══════════════════════════════════════
   WIDGET BASE
   ═══════════════════════════════════════ */
.widget {
  position:absolute; min-width:140px; min-height:70px;
  border:1px solid var(--glass-b); border-radius:var(--r);
  backdrop-filter:blur(18px) saturate(1.3);
  -webkit-backdrop-filter:blur(18px) saturate(1.3);
  background:var(--glass);
  box-shadow:var(--shadow), inset 0 1px 0 rgba(255,255,255,.04);
  overflow:hidden; user-select:none; -webkit-user-select:none;
  transition:box-shadow .18s, border-color .18s;
  will-change:transform;
}
.widget.selected { border-color:var(--accent); box-shadow:var(--shadow),0 0 0 1px var(--accent),0 0 20px rgba(79,158,255,.12); }
.widget.dragging { box-shadow:var(--shadow2),0 0 0 1px var(--accent); transition:none; }

/* drag handle (shown in edit mode) */
.w-handle {
  position:absolute; top:0; left:0; right:0; height:30px;
  cursor:grab; z-index:5; display:none;
  align-items:center; padding:0 10px; gap:7px;
  background:rgba(255,255,255,.018); border-bottom:1px solid var(--glass-b);
}
.w-handle:active { cursor:grabbing; }
.edit-mode .w-handle { display:flex; }
.handle-dots { display:grid; grid-template-columns:1fr 1fr 1fr; gap:2px; opacity:.3; }
.handle-dots span { width:3px; height:3px; border-radius:50%; background:var(--text); display:block; }
.handle-spacer { flex:1; }
.handle-btn {
  width:20px; height:20px; border-radius:5px; border:none;
  background:none; color:var(--text3); cursor:pointer; font-size:11px;
  display:flex; align-items:center; justify-content:center; transition:all .12s;
}
.handle-btn:hover { background:rgba(255,255,255,.07); color:var(--text); }
.handle-btn.del:hover { background:rgba(239,68,68,.18); color:var(--red); }

/* body padding in edit mode */
.edit-mode .w-body { margin-top:30px; }
.w-body { height:100%; transition:margin .15s; }

/* resize corner */
.w-resize {
  position:absolute; bottom:0; right:0;
  width:20px; height:20px; cursor:se-resize; z-index:6;
  display:none; align-items:flex-end; justify-content:flex-end; padding:3px;
}
.w-resize::after {
  content:''; width:8px; height:8px;
  border-right:2px solid var(--text2); border-bottom:2px solid var(--text2);
  border-radius:0 0 2px 0; display:block;
}
.edit-mode .w-resize { display:flex; }

/* faded (memory mode) */
.widget.faded { opacity:.42; filter:grayscale(.4); transition:opacity 1s; }

/* tags */
.w-tags { position:absolute; bottom:4px; left:8px; display:flex; gap:4px; flex-wrap:wrap; z-index:4; pointer-events:none; }
.w-tag { font-size:9px; padding:2px 6px; border-radius:8px; background:rgba(79,158,255,.12); color:var(--accent); font-weight:600; }

/* widget-type header */
.wh {
  display:flex; align-items:center; gap:7px;
  padding:9px 11px 7px; border-bottom:1px solid var(--glass-b);
  font-size:10px; font-weight:600; letter-spacing:.07em;
  text-transform:uppercase; color:var(--text2); flex-shrink:0;
}
.wh i { font-size:11px; }
.wh-sp { flex:1; }

/* ═══════════════════════════════════════
   NOTE WIDGET
   ═══════════════════════════════════════ */
.note-widget[data-color="yellow"] { background:rgba(251,191,36,.08); border-color:rgba(251,191,36,.2); }
.note-widget[data-color="green"]  { background:rgba(61,186,114,.07); border-color:rgba(61,186,114,.2); }
.note-widget[data-color="blue"]   { background:rgba(79,158,255,.07); border-color:rgba(79,158,255,.2); }
.note-widget[data-color="purple"] { background:rgba(165,111,212,.07); border-color:rgba(165,111,212,.2); }
.note-widget[data-color="red"]    { background:rgba(239,68,68,.07); border-color:rgba(239,68,68,.2); }

.note-ta {
  width:100%; height:calc(100% - 58px);
  padding:10px 12px; background:none; border:none; outline:none; resize:none;
  color:var(--text); font-size:13.5px; line-height:1.7; font-family:inherit; display:block;
}
.note-ta::placeholder { color:var(--text3); }
.note-colors { display:flex; gap:6px; padding:6px 11px 9px; align-items:center; }
.nc { width:12px; height:12px; border-radius:50%; cursor:pointer; border:2px solid transparent; transition:all .12s; flex-shrink:0; }
.nc.on { border-color:rgba(255,255,255,.65); transform:scale(1.25); }
.note-font {
  margin-left:auto; background:none; border:none; color:var(--text2);
  font-size:10px; cursor:pointer; padding:2px 5px; border-radius:4px;
  transition:background .12s; font-family:'DM Sans',sans-serif;
}
.note-font:hover { background:var(--bg3); color:var(--text); }

/* ═══════════════════════════════════════
   CLOCK
   ═══════════════════════════════════════ */
.clock-body { display:flex; flex-direction:column; align-items:center; justify-content:center; height:calc(100% - 30px); padding:12px; }
.clock-t { font-family:'DM Mono',monospace; font-size:34px; font-weight:500; color:var(--text); letter-spacing:-.02em; line-height:1; }
.clock-d { font-family:'DM Mono',monospace; font-size:11px; color:var(--text2); letter-spacing:.07em; text-transform:uppercase; margin-top:5px; }

/* ═══════════════════════════════════════
   TODO
   ═══════════════════════════════════════ */
.todo-body { height:calc(100% - 30px); display:flex; flex-direction:column; overflow:hidden; }
.todo-list { flex:1; overflow-y:auto; padding:6px 11px; }
.todo-list::-webkit-scrollbar { width:3px; }
.todo-list::-webkit-scrollbar-thumb { background:var(--border2); border-radius:2px; }
.todo-item { display:flex; align-items:flex-start; gap:8px; padding:6px 0; border-bottom:1px solid var(--border); }
.todo-item:last-child { border-bottom:none; }
.todo-cb { width:16px; height:16px; border-radius:4px; border:1.5px solid var(--border2); display:flex; align-items:center; justify-content:center; cursor:pointer; flex-shrink:0; margin-top:2px; transition:all .12s; }
.todo-cb.done { background:var(--green); border-color:var(--green); }
.todo-cb.done::after { content:'✓'; font-size:9px; color:#fff; font-weight:700; }
.todo-txt { flex:1; font-size:12.5px; color:var(--text); line-height:1.5; outline:none; word-break:break-word; }
.todo-txt.done { text-decoration:line-through; color:var(--text2); }
.todo-del { width:18px; height:18px; border-radius:4px; border:none; background:none; color:var(--text3); cursor:pointer; font-size:11px; display:flex; align-items:center; justify-content:center; opacity:0; transition:all .12s; }
.todo-item:hover .todo-del { opacity:1; }
.todo-del:hover { background:rgba(239,68,68,.14); color:var(--red); }
.todo-add { display:flex; align-items:center; gap:7px; padding:7px 11px; border-top:1px solid var(--border); flex-shrink:0; }
.todo-add input { flex:1; background:none; border:none; outline:none; font-size:12.5px; color:var(--text2); font-family:'DM Sans',sans-serif; }
.todo-add input::placeholder { color:var(--text3); }
.todo-add-btn { width:20px; height:20px; border-radius:5px; background:var(--bg3); border:1px solid var(--border2); color:var(--text2); cursor:pointer; font-size:12px; display:flex; align-items:center; justify-content:center; flex-shrink:0; transition:all .12s; }
.todo-add-btn:hover,.todo-add-btn:active { background:var(--accent); border-color:var(--accent); color:#fff; }

/* ═══════════════════════════════════════
   IMAGE
   ═══════════════════════════════════════ */
.img-body { width:100%; height:100%; border-radius:calc(var(--r) - 1px); overflow:hidden; display:flex; align-items:center; justify-content:center; }
.img-body img { width:100%; height:100%; object-fit:cover; display:block; transition:transform .3s; }
.img-body:hover img { transform:scale(1.02); }
.img-ph { width:100%; height:100%; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:8px; color:var(--text3); font-size:12px; cursor:pointer; }
.img-ph i { font-size:24px; }

/* ═══════════════════════════════════════
   QUOTE
   ═══════════════════════════════════════ */
.quote-body { height:calc(100% - 30px); display:flex; flex-direction:column; justify-content:center; padding:14px 16px; gap:10px; }
.quote-t { font-family:'Playfair Display',Georgia,serif; font-size:15px; line-height:1.7; color:var(--text); font-style:italic; outline:none; word-break:break-word; }
.quote-a { font-size:11px; color:var(--text2); letter-spacing:.06em; text-transform:uppercase; outline:none; }

/* ═══════════════════════════════════════
   MUSIC
   ═══════════════════════════════════════ */
.music-body { height:100%; }
.music-body iframe { width:100%; height:100%; border:none; display:block; border-radius:calc(var(--r)-1px); }
.music-setup { height:calc(100% - 30px); display:flex; flex-direction:column; justify-content:center; gap:9px; padding:12px; }
.music-in { background:var(--bg3); border:1px solid var(--border2); border-radius:8px; padding:8px 10px; color:var(--text); font-size:12px; outline:none; font-family:'DM Mono',monospace; width:100%; }
.music-in::placeholder { color:var(--text3); }
.music-in:focus { border-color:var(--accent); }
.music-go { padding:8px; border-radius:8px; background:#1DB954; border:none; color:#fff; font-size:12.5px; font-weight:600; cursor:pointer; font-family:'DM Sans',sans-serif; }
.music-go:hover { background:#17a349; }

/* ═══════════════════════════════════════
   POMODORO
   ═══════════════════════════════════════ */
.pomo-body { height:calc(100% - 30px); display:flex; flex-direction:column; align-items:center; justify-content:center; gap:10px; padding:12px; }
.pomo-ring { position:relative; width:90px; height:90px; }
.pomo-ring svg { transform:rotate(-90deg); }
.pomo-ring circle { fill:none; stroke-width:4; }
.pomo-bg { stroke:var(--border2); }
.pomo-prog { stroke:var(--red); stroke-linecap:round; transition:stroke-dashoffset .5s linear; }
.pomo-time { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); font-family:'DM Mono',monospace; font-size:18px; color:var(--text); font-weight:500; }
.pomo-lbl { font-size:10px; color:var(--text2); letter-spacing:.07em; text-transform:uppercase; }
.pomo-btns { display:flex; gap:8px; }
.pomo-btn { width:30px; height:30px; border-radius:8px; border:1px solid var(--border2); background:var(--bg3); color:var(--text2); cursor:pointer; font-size:13px; display:flex; align-items:center; justify-content:center; transition:all .12s; }
.pomo-btn:hover { background:var(--border2); color:var(--text); }
.pomo-btn.on { background:var(--red); border-color:var(--red); color:#fff; }
.pomo-cfg { display:flex; gap:8px; align-items:center; font-size:11px; color:var(--text2); }
.pomo-cfg input { width:38px; background:var(--bg3); border:1px solid var(--border2); border-radius:5px; padding:3px 5px; color:var(--text); font-size:11px; outline:none; text-align:center; }

/* ═══════════════════════════════════════
   HABIT TRACKER
   ═══════════════════════════════════════ */
.habit-body { height:calc(100% - 30px); overflow-y:auto; padding:6px 11px 10px; }
.habit-body::-webkit-scrollbar { width:3px; }
.habit-body::-webkit-scrollbar-thumb { background:var(--border2); border-radius:2px; }
.habit-row { display:flex; align-items:center; gap:8px; padding:6px 0; border-bottom:1px solid var(--border); }
.habit-row:last-child { border-bottom:none; }
.habit-name { flex:1; font-size:12px; color:var(--text); outline:none; min-width:0; }
.habit-dots { display:flex; gap:3px; flex-shrink:0; }
.habit-dot { width:14px; height:14px; border-radius:3px; background:var(--bg3); border:1px solid var(--border2); cursor:pointer; transition:all .12s; flex-shrink:0; }
.habit-dot.on { background:var(--green); border-color:var(--green); }
.hadd-row { display:flex; gap:7px; padding:7px 0 0; border-top:1px solid var(--border); margin-top:3px; }
.hadd-row input { flex:1; background:none; border:none; outline:none; font-size:12px; color:var(--text2); font-family:'DM Sans',sans-serif; }
.hadd-row input::placeholder { color:var(--text3); }

/* ═══════════════════════════════════════
   CALENDAR
   ═══════════════════════════════════════ */
.cal-body { height:calc(100% - 30px); padding:8px 11px; overflow:hidden; }
.cal-hdr { display:flex; align-items:center; justify-content:space-between; margin-bottom:8px; }
.cal-month { font-size:12px; font-weight:600; color:var(--text); }
.cal-nav { width:20px; height:20px; border-radius:4px; border:none; background:none; color:var(--text2); cursor:pointer; font-size:12px; display:flex; align-items:center; justify-content:center; transition:background .12s; }
.cal-nav:hover { background:var(--bg3); }
.cal-grid { display:grid; grid-template-columns:repeat(7,1fr); gap:2px; }
.cal-lbl { font-size:9px; color:var(--text2); text-align:center; padding:2px 0; font-weight:600; }
.cal-day { font-size:10px; text-align:center; padding:4px 2px; border-radius:4px; cursor:pointer; color:var(--text2); transition:all .12s; }
.cal-day:hover { background:var(--bg3); color:var(--text); }
.cal-day.today { background:var(--accent); color:#fff; font-weight:600; }
.cal-day.other { opacity:.3; }

/* ═══════════════════════════════════════
   AMBIENT
   ═══════════════════════════════════════ */
.amb-body { height:calc(100% - 30px); display:flex; flex-direction:column; align-items:center; justify-content:center; gap:10px; padding:12px; }
.amb-grid { display:grid; grid-template-columns:1fr 1fr; gap:7px; width:100%; }
.amb-item { display:flex; flex-direction:column; align-items:center; gap:5px; padding:12px 8px; background:var(--bg3); border:1px solid var(--border2); border-radius:10px; cursor:pointer; transition:all .15s; font-size:11px; color:var(--text2); text-align:center; }
.amb-item i { font-size:20px; }
.amb-item.on { background:rgba(79,158,255,.1); border-color:var(--accent); color:var(--accent); }

/* ═══════════════════════════════════════
   REMINDER
   ═══════════════════════════════════════ */
.rem-body { height:calc(100% - 30px); overflow-y:auto; padding:6px 11px; }
.rem-body::-webkit-scrollbar { width:3px; }
.rem-item { display:flex; align-items:flex-start; gap:8px; padding:6px 0; border-bottom:1px solid var(--border); }
.rem-item:last-child { border-bottom:none; }
.rem-ico { font-size:14px; flex-shrink:0; margin-top:1px; }
.rem-info { flex:1; min-width:0; }
.rem-title { font-size:12px; color:var(--text); margin-bottom:2px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.rem-time { font-size:10px; color:var(--text2); font-family:'DM Mono',monospace; }
.rem-del { width:18px; height:18px; border-radius:4px; border:none; background:none; color:var(--text3); cursor:pointer; font-size:11px; display:flex; align-items:center; justify-content:center; transition:all .12s; }
.rem-del:hover { background:rgba(239,68,68,.14); color:var(--red); }
.rem-add { display:flex; flex-direction:column; gap:5px; padding:7px 0 0; border-top:1px solid var(--border); }
.rem-add input { background:none; border:none; outline:none; font-size:12px; color:var(--text2); font-family:'DM Sans',sans-serif; }
.rem-add input::placeholder { color:var(--text3); }
.rem-add input[type=datetime-local] { font-family:'DM Mono',monospace; font-size:11px; color-scheme:dark; }
.rem-add-btn { align-self:flex-end; padding:5px 12px; border-radius:7px; background:var(--accent); border:none; color:#fff; font-size:11px; font-weight:600; cursor:pointer; font-family:'DM Sans',sans-serif; }

/* ═══════════════════════════════════════
   TOPBAR
   ═══════════════════════════════════════ */
#topbar {
  position:absolute; top:0; left:0; right:0;
  height:calc(var(--safe-t) + var(--topbar));
  padding-top:var(--safe-t);
  background:var(--glass2); border-bottom:1px solid var(--glass-b);
  backdrop-filter:blur(22px) saturate(1.4);
  -webkit-backdrop-filter:blur(22px) saturate(1.4);
  display:flex; align-items:flex-end;
}
.tb-inner { width:100%; height:var(--topbar); display:flex; align-items:center; padding:0 12px; gap:7px; }
#spc-btn { font-family:'DM Serif Display',serif; font-size:18px; color:var(--text); background:none; border:none; cursor:pointer; padding:4px 8px; border-radius:8px; transition:background .12s; max-width:160px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; flex-shrink:0; }
#spc-btn:hover { background:rgba(255,255,255,.05); }
.tb-sp { flex:1; }
#zoom-lbl { font-family:'DM Mono',monospace; font-size:11px; color:var(--text2); background:var(--bg3); border:1px solid var(--border2); border-radius:7px; padding:3px 8px; pointer-events:none; }
#edit-badge { font-size:10px; font-weight:600; letter-spacing:.06em; text-transform:uppercase; color:var(--accent); background:rgba(79,158,255,.12); border:1px solid rgba(79,158,255,.25); border-radius:8px; padding:4px 9px; display:none; align-items:center; gap:5px; }
#edit-badge.show { display:flex; }
#edit-badge i { font-size:8px; }
.top-btn { width:34px; height:34px; border-radius:10px; background:none; border:none; color:var(--text2); cursor:pointer; font-size:15px; display:flex; align-items:center; justify-content:center; transition:all .15s; flex-shrink:0; }
.top-btn:hover,.top-btn:active { background:var(--bg3); color:var(--text); }
.top-btn.on { background:rgba(79,158,255,.15); color:var(--accent); }

/* ═══════════════════════════════════════
   BOTTOM TOOLBAR
   ═══════════════════════════════════════ */
#toolbar {
  position:absolute; bottom:0; left:0; right:0;
  height:calc(var(--safe-b) + var(--toolbar));
  padding-bottom:var(--safe-b);
  background:var(--glass2); border-top:1px solid var(--glass-b);
  backdrop-filter:blur(22px) saturate(1.4);
  -webkit-backdrop-filter:blur(22px) saturate(1.4);
  display:flex; align-items:flex-start;
}
@media(min-width:600px){
  #toolbar { bottom:20px; left:50%; right:auto; transform:translateX(-50%); border-radius:26px; border:1px solid var(--glass-b); padding-bottom:0; width:auto; height:auto; box-shadow:0 12px 48px rgba(0,0,0,.8),inset 0 1px 0 rgba(255,255,255,.05); }
  .toolbar-inner { height:50px; padding:6px 10px; gap:2px; width:auto; }
  .tb-btn { flex:none; width:38px; max-width:none; height:38px; font-size:15px; }
}
.toolbar-inner { width:100%; height:var(--toolbar); display:flex; align-items:center; justify-content:space-around; padding:0 8px; gap:3px; }
.tb-btn { flex:1; max-width:50px; height:42px; border-radius:12px; background:none; border:none; cursor:pointer; color:var(--text2); font-size:16px; display:flex; align-items:center; justify-content:center; transition:all .15s; }
.tb-btn:hover,.tb-btn:active { background:var(--bg3); color:var(--text); }
.tb-btn.on { color:var(--accent); }
.tb-sep { width:1px; height:20px; background:var(--border2); flex-shrink:0; }

/* ═══════════════════════════════════════
   SHEETS
   ═══════════════════════════════════════ */
.sov { position:absolute; inset:0; background:rgba(0,0,0,.55); backdrop-filter:blur(3px); -webkit-backdrop-filter:blur(3px); z-index:500; display:none; cursor:pointer; }
.sov.show { display:block; }

.sheet {
  position:absolute; left:0; right:0; bottom:0;
  background:#111; border-top:1px solid var(--border2);
  border-radius:20px 20px 0 0; padding-bottom:calc(var(--safe-b)+6px);
  z-index:501; display:none; max-height:88vh; overflow-y:auto;
  animation:sheetUp .3s cubic-bezier(.4,0,.2,1);
}
.sheet.show { display:block; }
.sheet::-webkit-scrollbar { display:none; }
@keyframes sheetUp { from{transform:translateY(100%)}to{transform:none} }
@media(min-width:600px){
  .sheet { bottom:auto; left:50%; top:50%; right:auto; transform:translate(-50%,-50%); width:min(460px,94vw); border-radius:18px; max-height:88vh; padding-bottom:0; border:1px solid var(--border2); animation:modalIn .2s cubic-bezier(.4,0,.2,1); }
  @keyframes modalIn { from{opacity:0;transform:translate(-50%,-50%) scale(.96)}to{opacity:1;transform:translate(-50%,-50%) scale(1)} }
}
.sh-handle { width:34px; height:4px; background:var(--border2); border-radius:2px; margin:10px auto 0; }
@media(min-width:600px){ .sh-handle{display:none} }
.sh-hdr { display:flex; align-items:center; justify-content:space-between; padding:14px 18px 10px; border-bottom:1px solid var(--border); }
.sh-title { font-size:14px; font-weight:600; color:var(--text); }
.sh-close { width:26px; height:26px; border-radius:50%; border:none; background:none; color:var(--text2); cursor:pointer; font-size:17px; display:flex; align-items:center; justify-content:center; transition:background .12s; }
.sh-close:hover { background:var(--bg3); }
.sh-body { padding:14px 18px 16px; display:flex; flex-direction:column; gap:14px; }
.sh-lbl { font-size:10px; font-weight:600; letter-spacing:.08em; text-transform:uppercase; color:var(--text2); }
.sh-row { display:flex; align-items:center; gap:10px; }
.sh-row label { font-size:13px; color:var(--text2); min-width:76px; }
.sh-row input[type=range] { flex:1; accent-color:var(--accent); cursor:pointer; }
.sh-upload { width:100%; padding:10px; border-radius:10px; background:var(--bg3); border:1px dashed var(--border2); color:var(--text2); font-size:13px; cursor:pointer; font-family:'DM Sans',sans-serif; display:flex; align-items:center; justify-content:center; gap:7px; transition:all .15s; }
.sh-upload:hover { border-color:var(--accent); color:var(--text); }
.sh-tog-row { display:flex; align-items:center; gap:10px; padding:10px 12px; background:var(--bg3); border:1px solid var(--border2); border-radius:10px; }
.sh-tog-lbl { flex:1; font-size:13px; color:var(--text); }

/* iOS toggle */
.ios { position:relative; width:40px; height:23px; flex-shrink:0; }
.ios input { opacity:0; width:0; height:0; }
.ios-t { position:absolute; inset:0; background:var(--border2); border-radius:12px; transition:.25s; cursor:pointer; }
.ios-t::before { content:''; position:absolute; width:17px; height:17px; left:3px; top:3px; background:#fff; border-radius:50%; transition:.25s; }
.ios input:checked + .ios-t { background:var(--accent); }
.ios input:checked + .ios-t::before { transform:translateX(17px); }

/* Preset grid */
.preset-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:8px; }
.preset-sw { aspect-ratio:1; border-radius:10px; cursor:pointer; border:2px solid transparent; transition:all .15s; }
.preset-sw.on { border-color:var(--accent); }
.preset-sw:active { transform:scale(.93); }

/* Add widget grid */
.add-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:9px; }
@media(min-width:360px){ .add-grid{grid-template-columns:repeat(4,1fr)} }
@media(min-width:500px){ .add-grid{grid-template-columns:repeat(5,1fr)} }
.add-item { display:flex; flex-direction:column; align-items:center; gap:6px; padding:14px 6px; background:var(--bg3); border:1px solid var(--border2); border-radius:12px; cursor:pointer; transition:all .15s; font-size:11px; font-weight:500; color:var(--text2); text-align:center; }
.add-item i { font-size:19px; }
.add-item:hover,.add-item:active { background:var(--border2); transform:scale(.96); color:var(--text); }

/* Spaces */
.spc-row { display:flex; align-items:center; gap:10px; padding:12px 14px; background:var(--bg3); border:1px solid var(--border2); border-radius:11px; cursor:pointer; transition:all .15s; margin-bottom:6px; }
.spc-row:hover,.spc-row:active { background:var(--border2); }
.spc-row.on { border-color:var(--accent); background:rgba(79,158,255,.07); }
.spc-name { flex:1; font-size:14px; color:var(--text); outline:none; }
.spc-meta { font-size:11px; color:var(--text2); }
.spc-del { width:24px; height:24px; border-radius:6px; border:none; background:none; color:var(--text3); cursor:pointer; font-size:12px; display:flex; align-items:center; justify-content:center; transition:all .12s; }
.spc-del:hover { background:rgba(239,68,68,.14); color:var(--red); }
.sh-add-btn { width:100%; padding:11px; border-radius:10px; background:none; border:1px dashed var(--border2); color:var(--text2); font-size:13px; cursor:pointer; font-family:'DM Sans',sans-serif; display:flex; align-items:center; justify-content:center; gap:7px; transition:all .15s; }
.sh-add-btn:hover { border-color:var(--accent); color:var(--accent); }

/* Search */
.srch-wrap { position:relative; }
.srch-in { width:100%; padding:10px 12px 10px 36px; background:var(--bg3); border:1px solid var(--border2); border-radius:10px; color:var(--text); font-size:13px; outline:none; font-family:'DM Sans',sans-serif; }
.srch-in::placeholder { color:var(--text3); }
.srch-in:focus { border-color:var(--accent); }
.srch-ico { position:absolute; left:12px; top:50%; transform:translateY(-50%); color:var(--text2); font-size:13px; pointer-events:none; }
.srch-res { display:flex; flex-direction:column; gap:4px; max-height:220px; overflow-y:auto; }
.srch-item { padding:9px 11px; background:var(--bg3); border-radius:8px; cursor:pointer; font-size:13px; color:var(--text); transition:background .12s; display:flex; align-items:center; gap:8px; }
.srch-item:hover { background:var(--border2); }
.srch-item i { color:var(--text2); font-size:12px; width:14px; text-align:center; }

/* ═══════════════════════════════════════
   CONTEXT MENU
   ═══════════════════════════════════════ */
#ctx {
  position:fixed; background:#141414; border:1px solid var(--border2);
  border-radius:13px; padding:5px; box-shadow:var(--shadow2);
  z-index:2000; display:none; min-width:168px;
  animation:ctxIn .13s cubic-bezier(.4,0,.2,1);
}
@keyframes ctxIn { from{opacity:0;transform:scale(.94) translateY(-3px)}to{opacity:1;transform:none} }
.ci { display:flex; align-items:center; gap:9px; padding:9px 11px; border-radius:8px; cursor:pointer; font-size:13px; color:var(--text); transition:background .1s; }
.ci:hover,.ci:active { background:var(--bg3); }
.ci i { width:13px; text-align:center; color:var(--text2); font-size:12px; }
.ci.danger { color:var(--red); }
.ci.danger i { color:var(--red); }
.ctx-sep { height:1px; background:var(--border); margin:3px 0; }

/* ═══════════════════════════════════════
   DRAWING TOOLBAR
   ═══════════════════════════════════════ */
#draw-bar {
  position:absolute; top:calc(var(--safe-t) + var(--topbar) + 10px); left:50%; transform:translateX(-50%);
  background:var(--glass2); border:1px solid var(--glass-b); border-radius:20px;
  backdrop-filter:blur(20px); -webkit-backdrop-filter:blur(20px);
  display:none; align-items:center; gap:4px; padding:5px 8px; box-shadow:var(--shadow);
}
#draw-bar.show { display:flex; }
.dr-btn { width:34px; height:34px; border-radius:10px; border:none; background:none; color:var(--text2); cursor:pointer; font-size:14px; display:flex; align-items:center; justify-content:center; transition:all .12s; }
.dr-btn:hover { background:var(--bg3); color:var(--text); }
.dr-btn.on { background:rgba(79,158,255,.15); color:var(--accent); }
.dr-col { width:20px; height:20px; border-radius:50%; cursor:pointer; border:2px solid transparent; transition:all .12s; flex-shrink:0; }
.dr-col.on { border-color:#fff; transform:scale(1.2); }
#draw-sz { width:60px; accent-color:var(--accent); cursor:pointer; }

/* ═══════════════════════════════════════
   UNDO BAR (side)
   ═══════════════════════════════════════ */
#undo-bar { position:absolute; top:calc(var(--safe-t) + var(--topbar) + 10px); right:10px; display:flex; flex-direction:column; gap:4px; }
.undo-btn { width:32px; height:32px; border-radius:9px; border:1px solid var(--border2); background:var(--glass2); backdrop-filter:blur(12px); color:var(--text2); cursor:pointer; font-size:13px; display:flex; align-items:center; justify-content:center; transition:all .12s; }
.undo-btn:hover { background:var(--bg3); color:var(--text); }
.undo-btn:disabled { opacity:.25; pointer-events:none; }

/* ═══════════════════════════════════════
   TOAST
   ═══════════════════════════════════════ */
#toast {
  position:absolute; top:calc(var(--safe-t) + var(--topbar) + 8px); left:50%; transform:translateX(-50%);
  background:#111; border:1px solid var(--border2); border-radius:12px;
  padding:9px 18px; font-size:13px; color:var(--text); z-index:900;
  display:none; white-space:nowrap; box-shadow:var(--shadow); pointer-events:none;
  animation:toastIn .2s ease;
}
@keyframes toastIn { from{opacity:0;transform:translateX(-50%) translateY(-6px)}to{opacity:1;transform:translateX(-50%) translateY(0)} }

/* ═══════════════════════════════════════
   MISC
   ═══════════════════════════════════════ */
.widget { animation:wIn .2s cubic-bezier(.4,0,.2,1); }
@keyframes wIn { from{opacity:0;transform:scale(.88) translateY(8px)}to{opacity:1;transform:none} }
@keyframes wOut { to{opacity:0;transform:scale(.88)} }
::-webkit-scrollbar { width:4px; height:4px; }
::-webkit-scrollbar-track { background:transparent; }
::-webkit-scrollbar-thumb { background:var(--border2); border-radius:2px; }
</style>
</head>
<body>

<!-- ═══ LAYER 1: Background ═══ -->
<div id="bg-layer"><div id="bg-overlay"></div></div>

<!-- ═══ LAYER 2: Infinite Canvas ═══ -->
<div id="canvas-vp">
  <div id="canvas">
    <svg id="conn-svg"></svg>
    <div id="snap-grid"></div>
    <canvas id="draw-canvas" width="3000" height="3000"></canvas>
  </div>
</div>

<!-- ═══ LAYER 3: HUD / UI ═══ -->
<div id="ui-layer">

  <div id="toast"></div>

  <!-- Topbar -->
  <div id="topbar">
    <div class="tb-inner">
      <button id="spc-btn" onclick="UI.openSpaces()">Main</button>
      <div id="edit-badge"><i class="fas fa-circle"></i> EDITING</div>
      <div class="tb-sp"></div>
      <div id="zoom-lbl">100%</div>
      <button class="top-btn" onclick="UI.openSearch()"><i class="fas fa-search"></i></button>
      <button class="top-btn" id="undo-top" onclick="Hist.undo()" title="Undo"><i class="fas fa-undo"></i></button>
      <button class="top-btn" id="redo-top" onclick="Hist.redo()" title="Redo"><i class="fas fa-redo"></i></button>
    </div>
  </div>

  <!-- Side undo (mobile) -->
  <div id="undo-bar">
    <button class="undo-btn" id="undo-s" onclick="Hist.undo()"><i class="fas fa-undo"></i></button>
    <button class="undo-btn" id="redo-s" onclick="Hist.redo()"><i class="fas fa-redo"></i></button>
  </div>

  <!-- Drawing toolbar -->
  <div id="draw-bar">
    <button class="dr-btn on" id="dr-pen" onclick="Draw.tool('pen')"><i class="fas fa-pen"></i></button>
    <button class="dr-btn" id="dr-era" onclick="Draw.tool('eraser')"><i class="fas fa-eraser"></i></button>
    <div class="tb-sep"></div>
    <div class="dr-col on" style="background:#4f9eff" data-c="#4f9eff" onclick="Draw.color(this)"></div>
    <div class="dr-col" style="background:#fbbf24" data-c="#fbbf24" onclick="Draw.color(this)"></div>
    <div class="dr-col" style="background:#ef4444" data-c="#ef4444" onclick="Draw.color(this)"></div>
    <div class="dr-col" style="background:#3dba72" data-c="#3dba72" onclick="Draw.color(this)"></div>
    <div class="dr-col" style="background:#e8e6e1" data-c="#e8e6e1" onclick="Draw.color(this)"></div>
    <div class="tb-sep"></div>
    <input type="range" id="draw-sz" min="1" max="20" value="3">
    <button class="dr-btn" onclick="Draw.clear()"><i class="fas fa-trash"></i></button>
  </div>

  <!-- Toolbar -->
  <div id="toolbar">
    <div class="toolbar-inner">
      <button class="tb-btn" id="edit-btn" onclick="App.toggleEdit()"><i class="fas fa-pen-to-square"></i></button>
      <div class="tb-sep"></div>
      <button class="tb-btn" onclick="UI.openAdd()"><i class="fas fa-plus-circle"></i></button>
      <button class="tb-btn" onclick="UI.openBg()"><i class="fas fa-image"></i></button>
      <button class="tb-btn" id="draw-btn" onclick="Draw.toggle()"><i class="fas fa-paint-brush"></i></button>
      <div class="tb-sep"></div>
      <button class="tb-btn" id="snap-btn" onclick="App.toggleSnap()"><i class="fas fa-th"></i></button>
      <button class="tb-btn" onclick="UI.openOpts()"><i class="fas fa-ellipsis"></i></button>
    </div>
  </div>

  <!-- Sheet overlay -->
  <div class="sov" id="sov" onclick="UI.closeAll()"></div>

  <!-- Add sheet -->
  <div class="sheet" id="sh-add">
    <div class="sh-handle"></div>
    <div class="sh-hdr"><span class="sh-title">Add Widget</span><button class="sh-close" onclick="UI.closeAll()">×</button></div>
    <div class="sh-body"><div class="add-grid" id="add-grid"></div></div>
  </div>

  <!-- BG sheet -->
  <div class="sheet" id="sh-bg">
    <div class="sh-handle"></div>
    <div class="sh-hdr"><span class="sh-title">Background</span><button class="sh-close" onclick="UI.closeAll()">×</button></div>
    <div class="sh-body">
      <div><div class="sh-lbl" style="margin-bottom:8px">Presets</div><div class="preset-grid" id="preset-grid"></div></div>
      <label class="sh-upload" for="bg-file"><i class="fas fa-upload"></i>Upload Image<input type="file" id="bg-file" accept="image/*" style="display:none"></label>
      <div>
        <div class="sh-lbl" style="margin-bottom:10px">Adjustments</div>
        <div style="display:flex;flex-direction:column;gap:11px">
          <div class="sh-row"><label>Blur</label><input type="range" id="bg-blur" min="0" max="20" value="0"></div>
          <div class="sh-row"><label>Brightness</label><input type="range" id="bg-bright" min="20" max="150" value="100"></div>
          <div class="sh-row"><label>Dim</label><input type="range" id="bg-dim" min="0" max="90" value="0"></div>

      <div class="sh-tog-row">
        <span class="sh-tog-lbl">Parallax (mouse / gyro)</span>
        <label class="ios"><input type="checkbox" id="bg-par"><span class="ios-t"></span></label>

  <!-- Spaces sheet -->
  <div class="sheet" id="sh-spc">

    <div class="sh-hdr"><span class="sh-title">Spaces</span><button class="sh-close" onclick="UI.closeAll()">×</button></div>

      <div id="spc-list"></div>
      <button class="sh-add-btn" onclick="Spaces.add()"><i class="fas fa-plus"></i>New Space</button>

  <!-- Options sheet -->
  <div class="sheet" id="sh-opts">
    <div class="sh-handle"></div>
    <div class="sh-hdr"><span class="sh-title">Options</span><button class="sh-close" onclick="UI.closeAll()">×</button></div>
    <div class="sh-body" id="opts-body"></div>
  </div>

  <!-- Search sheet -->
  <div class="sheet" id="sh-srch">
    <div class="sh-handle"></div>
    <div class="sh-hdr"><span class="sh-title">Search</span><button class="sh-close" onclick="UI.closeAll()">×</button></div>
    <div class="sh-body">
      <div class="srch-wrap"><i class="fas fa-search srch-ico"></i><input type="search" class="srch-in" id="srch-in" placeholder="Search notes, widgets…" oninput="Search.run(this.value)"></div>
      <div class="srch-res" id="srch-res"></div>

  </div>

</div><!-- /ui-layer -->

<script>
'use strict';

// ═══════════════════════════════════════════════════════════
// CONSTANTS
// ═══════════════════════════════════════════════════════════
const GRID = 20;
const IS_TOUCH = 'ontouchstart' in window || navigator.maxTouchPoints > 0;
const CW = 3000, CH = 3000;

const WMETA = {
  note:     { icon:'fas fa-sticky-note',  label:'Note',     w:240, h:210 },
  clock:    { icon:'fas fa-clock',         label:'Clock',    w:200, h:120 },
  todo:     { icon:'fas fa-check-square',  label:'To-Do',    w:260, h:280 },
  image:    { icon:'fas fa-image',         label:'Image',    w:240, h:200 },
  quote:    { icon:'fas fa-quote-right',   label:'Quote',    w:280, h:180 },
  music:    { icon:'fab fa-spotify',       label:'Music',    w:300, h:180 },
  pomodoro: { icon:'fas fa-stopwatch',     label:'Pomodoro', w:190, h:230 },
  habit:    { icon:'fas fa-seedling',      label:'Habits',   w:260, h:260 },
  calendar: { icon:'fas fa-calendar-alt', label:'Calendar', w:240, h:240 },
  ambient:  { icon:'fas fa-cloud-rain',   label:'Ambient',  w:200, h:200 },
  reminder: { icon:'fas fa-bell',         label:'Reminders',w:250, h:260 },
};

const BG_PRESETS = [
  'linear-gradient(135deg,#0a0a0a,#111)',
  'linear-gradient(135deg,#0a1628,#0d2a4a,#072040)',
  'linear-gradient(135deg,#0a1a0f,#0f2a18,#081508)',
  'linear-gradient(135deg,#1a0a1e,#2a0d3a,#1a0828)',
  'linear-gradient(135deg,#1a0800,#2d1100,#1a0600)',
  'linear-gradient(135deg,#0d1117,#161b22)',
  'linear-gradient(135deg,#131619,#1c2028)',
  'linear-gradient(160deg,#050505,#0c0c0c)',
];

const NOTE_COLORS  = ['yellow','green','blue','purple','red'];
const COLOR_MAP    = {yellow:'#fbbf24',green:'#3dba72',blue:'#4f9eff',purple:'#a56fd4',red:'#ef4444'};
const NOTE_FONTS   = ['DM Sans','Playfair Display','DM Mono'];

// ═══════════════════════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════════════════════
const uid  = () => Math.random().toString(36).slice(2,11);
const snap = v  => App.snapOn ? Math.round(v/GRID)*GRID : v;
const clamp= (v,lo,hi) => Math.max(lo,Math.min(hi,v));
const chex = c  => COLOR_MAP[c]||c;

function toast(msg,ms=2200){
  const el=document.getElementById('toast');
  el.textContent=msg; el.style.display='block';
  clearTimeout(el._t); el._t=setTimeout(()=>el.style.display='none',ms);
}

// ═══════════════════════════════════════════════════════════
// APP STATE
// ═══════════════════════════════════════════════════════════
const App = {
  spaces:[], curSpace:0, editMode:false, snapOn:false, drawMode:false,
  connectMode:false, connectSrc:null, zCtr:10,

  get space(){ return this.spaces[this.curSpace]; },

  init(){
    try{
      const d=JSON.parse(localStorage.getItem('msp_v5')||'{}');
      this.spaces=d.spaces||[];
      this.curSpace=d.curSpace||0;
      this.zCtr=d.zCtr||10;
    }catch(e){}
    if(!this.spaces.length) this.spaces=[this._defSpace('Main')];
    if(this.curSpace>=this.spaces.length) this.curSpace=0;
  },

  _defSpace(name){
    return {
      id:uid(), name,
      widgets:[],
      bg:{type:'gradient',value:BG_PRESETS[0],blur:0,brightness:100,dim:0,parallax:false},
      drawData:null,
      connections:[],
    };
  },

  save(){
    try{ localStorage.setItem('msp_v5',JSON.stringify({spaces:this.spaces,curSpace:this.curSpace,zCtr:this.zCtr})); }catch(e){}
  },

  toggleEdit(){
    this.editMode=!this.editMode;

// ═══════════════════════════════════════════════════════════
// VIEWPORT — pan + pinch zoom
// ═══════════════════════════════════════════════════════════
const VP = (() => {
  let tx=0, ty=0, sc=1;
  const MIN=0.2, MAX=3.5;
  const cvp = ()=>document.getElementById('canvas');

  function apply(anim=false){
    const el=cvp();
    el.style.transition=anim?'transform .25s ease':'none';
    el.style.transform=`translate(${tx}px,${ty}px) scale(${sc})`;
    document.getElementById('zoom-lbl').textContent=Math.round(sc*100)+'%';
  }

  function constrain(){
    const W=window.innerWidth, H=window.innerHeight;
    tx=clamp(tx,-(CW*sc)+(W*.15), W*.85);
    ty=clamp(ty,-(CH*sc)+(H*.15), H*.85);
  }

  function zoomAt(cx,cy,delta){
    const ns=clamp(sc*delta,MIN,MAX);
    const r=ns/sc;
    tx=cx-r*(cx-tx); ty=cy-r*(cy-ty);
    sc=ns; constrain(); apply();
  }

  function panBy(dx,dy){ tx+=dx; ty+=dy; constrain(); apply(); }

  function reset(){
    const tb=parseInt(getComputedStyle(document.documentElement).getPropertyValue('--topbar'))||48;
    tx=20; ty=tb+10; sc=1; apply(true);
  }

  function toCanvas(vx,vy){ return {x:(vx-tx)/sc, y:(vy-ty)/sc}; }

  // ── Mouse wheel ──────────────────────────────────────────
  document.getElementById('canvas-vp').addEventListener('wheel',e=>{
    e.preventDefault();
    const d=e.ctrlKey?(1-e.deltaY*.01):(e.deltaY<0?1.08:1/1.08);
    zoomAt(e.clientX,e.clientY,d);
  },{passive:false});

  // ── Touch pinch + pan ────────────────────────────────────
  let pts={}, pinchDist=null, pinchMid=null, panStart=null, panTx, panTy;

  document.getElementById('canvas-vp').addEventListener('touchstart',e=>{
    for(const t of e.touches) pts[t.identifier]={x:t.clientX,y:t.clientY};

    if(e.touches.length===1){
      const t=e.touches[0];
      const tgt=document.elementFromPoint(t.clientX,t.clientY);
      // Pan if touching bg OR widget in view mode
      if(!tgt?.closest('.w-handle') && (!tgt?.closest('.widget') || !App.editMode)){
        panStart={x:t.clientX,y:t.clientY}; panTx=tx; panTy=ty;
      } else { panStart=null; }
    } else { panStart=null; }

    if(e.touches.length===2){
      const [a,b]=[e.touches[0],e.touches[1]];
      pinchDist=Math.hypot(b.clientX-a.clientX,b.clientY-a.clientY);
      pinchMid={(a.clientX+b.clientX)/2,(y:(a.clientY+b.clientY)/2)};
      // fix object literal syntax
      pinchMid={x:(a.clientX+b.clientX)/2,y:(a.clientY+b.clientY)/2};
    }
  },{passive:true});

  document.getElementById('canvas-vp').addEventListener('touchmove',e=>{
    e.preventDefault();
    for(const t of e.touches) pts[t.identifier]={x:t.clientX,y:t.clientY};

    if(e.touches.length===1 && panStart){
      const t=e.touches[0];
      tx=panTx+(t.clientX-panStart.x);
      ty=panTy+(t.clientY-panStart.y);
      constrain(); apply();
    }

    if(e.touches.length===2){
      const [a,b]=[e.touches[0],e.touches[1]];
      const dist=Math.hypot(b.clientX-a.clientX,b.clientY-a.clientY);
      const mid={x:(a.clientX+b.clientX)/2,y:(a.clientY+b.clientY)/2};
      if(pinchDist){
        zoomAt(mid.x,mid.y,dist/pinchDist);
        panBy(mid.x-pinchMid.x,mid.y-pinchMid.y);
      }
      pinchDist=dist; pinchMid=mid;
    }
  },{passive:false});

  document.getElementById('canvas-vp').addEventListener('touchend',e=>{
    for(const t of e.changedTouches) delete pts[t.identifier];
    if(e.touches.length<2){pinchDist=null;pinchMid=null;}
    if(e.touches.length===0) panStart=null;
  },{passive:true});

  // ── Mouse pan (bg drag) ──────────────────────────────────
  let mpan=false, mpStart;
  document.getElementById('canvas-vp').addEventListener('mousedown',e=>{
    if(e.button===1||(e.button===0&&!e.target.closest('.widget'))){
      mpan=true; mpStart={x:e.clientX-tx,y:e.clientY-ty}; e.preventDefault();
    }
  });
  window.addEventListener('mousemove',e=>{ if(!mpan)return; tx=e.clientX-mpStart.x; ty=e.clientY-mpStart.y; constrain(); apply(); });
  window.addEventListener('mouseup',()=>{ mpan=false; });

  return { apply, reset, toCanvas, zoomAt, panBy,
    get scale(){return sc;}, get tx(){return tx;}, get ty(){return ty;} };
})();

// ═══════════════════════════════════════════════════════════
// HISTORY — undo/redo (20 steps)
// ═══════════════════════════════════════════════════════════
const Hist = (() => {
  const MAX=20; let stack=[], ptr=-1;

  function push(){
    const s=JSON.parse(JSON.stringify(App.space.widgets));
    if(ptr<stack.length-1) stack=stack.slice(0,ptr+1);
    stack.push(s); if(stack.length>MAX) stack.shift();
    ptr=stack.length-1; _upd();
  }
  function undo(){ if(ptr<=0)return toast('Nothing to undo'); ptr--; _restore(); toast('Undo'); }
  function redo(){ if(ptr>=stack.length-1)return toast('Nothing to redo'); ptr++; _restore(); toast('Redo'); }
  function reset(){ stack=[]; ptr=-1; push(); _upd(); }
  function _restore(){ App.space.widgets=JSON.parse(JSON.stringify(stack[ptr])); Render.all(); App.save(); _upd(); }
  function _upd(){
    ['undo-s','undo-top'].forEach(id=>{ const b=document.getElementById(id); if(b) b.disabled=ptr<=0; });
    ['redo-s','redo-top'].forEach(id=>{ const b=document.getElementById(id); if(b) b.disabled=ptr>=stack.length-1; });
  }
  return {push,undo,redo,reset};
})();

// ═══════════════════════════════════════════════════════════
// BACKGROUND
// ═══════════════════════════════════════════════════════════
const BG = (() => {
  let parOn=false;

  function apply(){
    const bg=App.space.bg;
    const l=document.getElementById('bg-layer'), o=document.getElementById('bg-overlay');
    if(bg.type==='gradient'){l.style.background=bg.value;l.style.backgroundSize='';}
    else{l.style.background=`url('${bg.value}') center/cover no-repeat`;}
    l.style.filter=`blur(${bg.blur||0}px) brightness(${bg.brightness||100}%)`;
    o.style.background=`rgba(0,0,0,${(bg.dim||0)/100})`;
    document.getElementById('bg-blur').value=bg.blur||0;
    document.getElementById('bg-bright').value=bg.brightness||100;
    document.getElementById('bg-dim').value=bg.dim||0;
    document.getElementById('bg-par').checked=bg.parallax||false;
    if(bg.parallax) startPar(); else stopPar();
  }

  function renderPresets(){
    const g=document.getElementById('preset-grid'); g.innerHTML='';
    BG_PRESETS.forEach(v=>{
      const sw=document.createElement('div');
      sw.className='preset-sw'+(App.space.bg.value===v?' on':'');
      sw.style.background=v;
      sw.addEventListener('click',()=>{
        document.querySelectorAll('.preset-sw').forEach(s=>s.classList.remove('on'));
        sw.classList.add('on');
        const bg=App.space.bg; bg.type='gradient'; bg.value=v;
        apply(); App.save();
      });
      g.appendChild(sw);
    });
  }

  function startPar(){
    if(parOn) return; parOn=true;
    if(IS_TOUCH && typeof DeviceOrientationEvent!=='undefined'){
      const req=DeviceOrientationEvent.requestPermission;
      if(typeof req==='function') req().then(r=>{if(r==='granted')window.addEventListener('deviceorientation',_gyro,{passive:true});});
      else window.addEventListener('deviceorientation',_gyro,{passive:true});
    } else { window.addEventListener('mousemove',_mouse); }
  }
  function stopPar(){
    parOn=false;
    window.removeEventListener('deviceorientation',_gyro);
    window.removeEventListener('mousemove',_mouse);
    document.getElementById('bg-layer').style.transform='';
  }
  function _gyro(e){ const x=clamp(e.gamma||0,-15,15),y=clamp((e.beta||0)-45,-15,15); document.getElementById('bg-layer').style.transform=`translate(${x*.5}px,${y*.5}px) scale(1.05)`; }
  function _mouse(e){ const cx=window.innerWidth/2,cy=window.innerHeight/2,dx=(e.clientX-cx)/cx,dy=(e.clientY-cy)/cy; document.getElementById('bg-layer').style.transform=`translate(${dx*-15}px,${dy*-15}px) scale(1.05)`; }

  ['bg-blur','bg-bright','bg-dim'].forEach(id=>{
    document.getElementById(id).addEventListener('input',e=>{
      const k={'bg-blur':'blur','bg-bright':'brightness','bg-dim':'dim'}[id];
      App.space.bg[k]=parseInt(e.target.value); apply(); App.save();
    });
  });
  document.getElementById('bg-par').addEventListener('change',e=>{
    App.space.bg.parallax=e.target.checked; App.save();
    if(e.target.checked) startPar(); else stopPar();
  });
  document.getElementById('bg-file').addEventListener('change',e=>{
    const f=e.target.files[0]; if(!f) return;
    const r=new FileReader(); r.onload=ev=>{
      const bg=App.space.bg; bg.type='image'; bg.value=ev.target.result;
      apply(); App.save(); renderPresets();
    }; r.readAsDataURL(f);
  });

  return {apply,renderPresets};
})();

// ═══════════════════════════════════════════════════════════
// WIDGET FACTORY
// ═══════════════════════════════════════════════════════════
function findW(id){ return App.space.widgets.find(w=>w.id===id); }
function updW(id,p){ const w=findW(id); if(!w)return; Object.assign(w,p); App.save(); }

function addWidget(type){
  const m=WMETA[type];
  const cx=(window.innerWidth/2-VP.tx)/VP.scale;
  const cy=(window.innerHeight/2-VP.ty)/VP.scale;
  const w={
    id:uid(), type,
    x:snap(cx-m.w/2+(Math.random()-.5)*60),
    y:snap(cy-m.h/2+(Math.random()-.5)*60),
    width:m.w, height:m.h, z:++App.zCtr,
    color:'yellow', font:'DM Sans', content:'', tags:[], locked:false,
    createdAt:Date.now(),
    ...(type==='todo'?{items:[]}:{}),
    ...(type==='habit'?{habits:[]}:{}),
    ...(type==='reminder'?{reminders:[]}:{}),
    ...(type==='pomodoro'?{pomWork:25,pomBreak:5,pomLeft:1500,pomSess:'work',pomState:'idle'}:{}),
    ...(type==='calendar'?{calY:new Date().getFullYear(),calM:new Date().getMonth()}:{}),
    ...(type==='ambient'?{playing:null}:{}),
  };
  Hist.push();
  App.space.widgets.push(w);
  const el=buildEl(w);
  document.getElementById('canvas').appendChild(el);
  if(!App.editMode) App.toggleEdit();
  App.save(); return w;
}

function delWidget(id){
  Hist.push();
  App.space.widgets=App.space.widgets.filter(w=>w.id!==id);
  const el=document.querySelector(`.widget[data-id="${id}"]`);
  if(el){el.style.animation='wOut .18s ease forwards';setTimeout(()=>el.remove(),180);}
  App.space.connections=(App.space.connections||[]).filter(c=>c.a!==id&&c.b!==id);
  Conn.render(); App.save();
}

function dupWidget(w){
  Hist.push();
  const n=JSON.parse(JSON.stringify(w));
  n.id=uid(); n.x=snap(w.x+24); n.y=snap(w.y+24); n.z=++App.zCtr;
  App.space.widgets.push(n);
  document.getElementById('canvas').appendChild(buildEl(n));
  App.save();
}

// ═══════════════════════════════════════════════════════════
// BUILD WIDGET ELEMENT
// ═══════════════════════════════════════════════════════════
function buildEl(w){
  const el=document.createElement('div');
  el.className='widget '+w.type+'-widget';
  el.dataset.id=w.id;
  el.style.cssText=`left:${w.x}px;top:${w.y}px;width:${w.width}px;height:${w.height}px;z-index:${w.z||10}`;
  if(w.color) el.dataset.color=w.color;
  if(w.faded) el.classList.add('faded');

  // Tags
  if(w.tags?.length){
    const tb=document.createElement('div'); tb.className='w-tags';
    w.tags.forEach(t=>{const s=document.createElement('span');s.className='w-tag';s.textContent='#'+t;tb.appendChild(s);});
    el.appendChild(tb);
  }

  // Drag handle
  const dh=document.createElement('div'); dh.className='w-handle';
  dh.innerHTML=`<div class="handle-dots">${Array(6).fill('<span></span>').join('')}</div><div class="handle-spacer"></div><button class="handle-btn del" onclick="delWidget('${w.id}')"><i class="fas fa-trash-alt"></i></button>`;
  el.appendChild(dh);

  // Body
  const body=document.createElement('div'); body.className='w-body'; body.style.height='100%';
  body.appendChild(buildInner(w));
  el.appendChild(body);

  // Resize
  const rh=document.createElement('div'); rh.className='w-resize'; el.appendChild(rh);

  attachDrag(dh,el,w);
  attachResize(rh,el,w);
  attachLongPress(el,w);
  el.addEventListener('mousedown',()=>{if(App.editMode)selW(el,w);});
  el.addEventListener('touchstart',()=>{if(App.editMode)selW(el,w);},{passive:true});
  el.addEventListener('contextmenu',e=>{e.preventDefault();Ctx.show(e.clientX,e.clientY,w);});

  // Connect mode tap
  el.addEventListener('click',()=>{
    if(!App.connectMode) return;
    if(App.connectSrc===w.id){App.connectMode=false;App.connectSrc=null;return;}
    const c=App.space.connections||(App.space.connections=[]);
    const ex=c.find(x=>(x.a===App.connectSrc&&x.b===w.id)||(x.a===w.id&&x.b===App.connectSrc));
    if(!ex){c.push({a:App.connectSrc,b:w.id});Conn.render();App.save();toast('Connected!');}
    App.connectMode=false; App.connectSrc=null;
  });

  if(!App.editMode) el.classList.add('locked');
  return el;
}

// ═══════════════════════════════════════════════════════════
// WIDGET INNER CONTENT
// ═══════════════════════════════════════════════════════════
function buildInner(w){

  if(w.type==='note'){
    wrap.innerHTML=`
      <div class="wh"><i class="${WMETA.note.icon}"></i>Note<span class="wh-sp"></span>
        <select class="note-font" onchange="updW('${w.id}',{font:this.value});this.closest('.widget').querySelector('.note-ta').style.fontFamily=this.value">
          ${NOTE_FONTS.map(f=>`<option${w.font===f?' selected':''}>${f}</option>`).join('')}
        </select>
      </div>
      <textarea class="note-ta" placeholder="Write something…" style="font-family:${w.font||'DM Sans'}">${w.content||''}</textarea>
      <div class="note-colors">
        ${NOTE_COLORS.map(c=>`<div class="nc${w.color===c?' on':''}" style="background:${chex(c)}" onclick="setNoteColor('${w.id}','${c}')"></div>`).join('')}
      </div>`;
    const ta=wrap.querySelector('textarea');
    ta.addEventListener('input',()=>updW(w.id,{content:ta.value}));
    ta.addEventListener('touchstart',e=>e.stopPropagation(),{passive:true});
    ta.addEventListener('mousedown',e=>{if(App.editMode)e.stopPropagation();});
  }

  else if(w.type==='clock'){
    wrap.innerHTML=`<div class="wh"><i class="${WMETA.clock.icon}"></i>Clock</div><div class="clock-body"><div class="clock-t" id="clk-${w.id}">--:--:--</div><div class="clock-d" id="clkd-${w.id}"></div></div>`;
    tickClock(w.id);
  }

  else if(w.type==='todo'){
    wrap.innerHTML=`
      <div class="wh"><i class="${WMETA.todo.icon}"></i>To-Do</div>
      <div class="todo-body">
        <div class="todo-list" id="tdl-${w.id}">${(w.items||[]).map(i=>todoHTML(w.id,i)).join('')}</div>
        <div class="todo-add">
          <input placeholder="Add item…"
            onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();addTodo('${w.id}',this)}"
            ontouchstart="event.stopPropagation()" onmousedown="if(App.editMode)event.stopPropagation()">
          <button class="todo-add-btn" onclick="addTodo('${w.id}',this.previousElementSibling)"><i class="fas fa-plus"></i></button>
        </div>
      </div>`;
    wrap.querySelector('.todo-body').addEventListener('touchstart',e=>e.stopPropagation(),{passive:true});
  }

  else if(w.type==='image'){
    const has=w.url&&w.url.length;
    wrap.innerHTML=`<div class="img-body">${has?`<img src="${w.url}" alt="">`:
      `<div class="img-ph" onclick="imgUpload('${w.id}')"><i class="fas fa-image"></i><span>Tap to add</span></div>`}</div>
      <input type="file" id="iu-${w.id}" accept="image/*" style="display:none">`;
    wrap.querySelector(`#iu-${w.id}`).addEventListener('change',e=>{
      const f=e.target.files[0]; if(!f)return;
      const r=new FileReader(); r.onload=ev=>{updW(w.id,{url:ev.target.result});Render.one(w.id);App.save();}; r.readAsDataURL(f);
    });
    if(has) wrap.querySelector('.img-body').addEventListener('click',()=>{if(App.editMode)imgUpload(w.id);});
  }

  else if(w.type==='quote'){
    wrap.innerHTML=`<div class="wh"><i class="${WMETA.quote.icon}"></i>Quote</div>
      <div class="quote-body">
        <div class="quote-t" contenteditable="true"
          onblur="updW('${w.id}',{content:this.textContent})"
          ontouchstart="event.stopPropagation()" onmousedown="if(App.editMode)event.stopPropagation()">${w.content||'Your quote here…'}</div>
        <div class="quote-a" contenteditable="true"
          onblur="updW('${w.id}',{author:this.textContent})"
          ontouchstart="event.stopPropagation()" onmousedown="if(App.editMode)event.stopPropagation()">— ${w.author||'Author'}</div>
      </div>`;
  }

  else if(w.type==='music'){
    if(w.embedUrl){
      wrap.innerHTML=`<div class="music-body"><iframe src="${w.embedUrl}" allow="autoplay;clipboard-write;encrypted-media;fullscreen;picture-in-picture" loading="lazy"></iframe></div>`;
    } else {
      wrap.innerHTML=`<div class="wh"><i class="${WMETA.music.icon}" style="color:#1DB954"></i>Music</div>
        <div class="music-setup">
          <div style="font-size:11px;color:var(--text2)">Paste Spotify / YouTube URL:</div>
          <input class="music-in" placeholder="https://open.spotify.com/…" id="ms-${w.id}"
            inputmode="url" ontouchstart="event.stopPropagation()" onmousedown="if(App.editMode)event.stopPropagation()">
          <button class="music-go" onclick="loadMusic('${w.id}')">Load</button>
        </div>`;
    }
  }

  else if(w.type==='pomodoro'){
    buildPomo(w,wrap);
  }

  else if(w.type==='habit'){
    buildHabit(w,wrap);
  }

  else if(w.type==='calendar'){
    buildCal(w,wrap);
  }

  else if(w.type==='ambient'){
    buildAmbient(w,wrap);
  }

  else if(w.type==='reminder'){
    buildReminder(w,wrap);
  }

  return wrap;
}

      </div>
    </div>`;
  pomoUpd(w.id);
}

window.pomoAct=function(id,act){
  const w=findW(id); if(!w)return;
  if(act==='start'){
    clearInterval(pomoTimers[id]);
    pomoTimers[id]=setInterval(()=>{
      w.pomLeft--; if(w.pomLeft<=0){
        clearInterval(pomoTimers[id]);
        w.pomSess=w.pomSess==='work'?'break':'work';
        w.pomLeft=(w.pomSess==='work'?w.pomWork:w.pomBreak)*60;
        toast(`Pomodoro: ${w.pomSess} time!`);
      }
      pomoUpd(id); App.save();
    },1000);
    document.getElementById('ps-'+id)?.classList.add('on');
  } else if(act==='pause'){
    clearInterval(pomoTimers[id]);
    document.getElementById('ps-'+id)?.classList.remove('on');
  } else {
    clearInterval(pomoTimers[id]);
    w.pomLeft=(w.pomWork||25)*60; w.pomSess='work';
    pomoUpd(id); App.save();
    document.getElementById('ps-'+id)?.classList.remove('on');
  }
};

function pomoUpd(id){
  const w=findW(id); if(!w)return;
  const te=document.getElementById('pt-'+id); if(!te)return;
  const m=Math.floor(w.pomLeft/60),s=w.pomLeft%60;
  te.textContent=`${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  const le=document.getElementById('pl-'+id); if(le) le.textContent=w.pomSess||'work';
  const re=document.getElementById('pr-'+id); if(!re)return;
  const r=42,c=2*Math.PI*r;
  const tot=(w.pomSess==='work'?w.pomWork:w.pomBreak)*60||1500;
  re.style.strokeDashoffset=c*(1-w.pomLeft/tot);
}

function buildCal(w,wrap){
  const MONTHS=['January','February','March','April','May','June','July','August','September','October','November','December'];
  const now=new Date(),y=w.calY||now.getFullYear(),m=w.calM??now.getMonth();
  const first=new Date(y,m,1).getDay(), dim=new Date(y,m+1,0).getDate();
  let cells='';
  for(let i=0;i<first;i++) cells+=`<div class="cal-day other">${new Date(y,m,-(first-i-1)).getDate()}</div>`;
  for(let d=1;d<=dim;d++){
    const today=d===now.getDate()&&m===now.getMonth()&&y===now.getFullYear();
    cells+=`<div class="cal-day${today?' today':''}">${d}</div>`;
  }
  wrap.innerHTML=`
    <div class="wh"><i class="${WMETA.calendar.icon}"></i>Calendar</div>
    <div class="cal-body">
      <div class="cal-hdr">
        <button class="cal-nav" onclick="calNav('${w.id}',-1)"><i class="fas fa-chevron-left"></i></button>
        <span class="cal-month">${MONTHS[m]} ${y}</span>
        <button class="cal-nav" onclick="calNav('${w.id}',1)"><i class="fas fa-chevron-right"></i></button>
      </div>
      <div class="cal-grid">${['Su','Mo','Tu','We','Th','Fr','Sa'].map(d=>`<div class="cal-lbl">${d}</div>`).join('')}${cells}</div>
    </div>`;
}

window.calNav=function(id,dir){
  const w=findW(id); if(!w)return;
  let m=(w.calM??new Date().getMonth())+dir, y=w.calY||new Date().getFullYear();
  if(m<0){m=11;y--;} if(m>11){m=0;y++;}
  updW(id,{calM:m,calY:y}); Render.one(id);
};

  } else {
    Object.values(ambAudios).forEach(a=>a?.pause());
    // Users can swap these for real audio URLs
    const urls={rain:'',cafe:'',forest:'',waves:''};
    if(urls[key]){
      if(!ambAudios[key]){ambAudios[key]=new Audio(urls[key]);ambAudios[key].loop=true;}

    el.classList.toggle('on',el.id===`ai-${wid}-${w.playing}`);

};

// DRAG & RESIZE
// ═══════════════════════════════════════════════════════════
function attachDrag(handle,el,w){
  function start(clientX,clientY){
    if(!App.editMode)return null;
    selW(el,w);
    const sx=clientX-w.x*VP.scale, sy=clientY-w.y*VP.scale;
    return (cx,cy)=>{
      w.x=snap(Math.max(0,(cx-sx)/VP.scale));
      w.y=snap(Math.max(0,(cy-sy)/VP.scale));
      el.style.left=w.x+'px'; el.style.top=w.y+'px';
      Conn.render();
    };
  }
  handle.addEventListener('mousedown',e=>{
    if(!App.editMode)return;
    e.preventDefault();e.stopPropagation();
    el.classList.add('dragging');
    const mv=start(e.clientX,e.clientY);if(!mv)return;
    const mm=ev=>mv(ev.clientX,ev.clientY);
    const mu=()=>{el.classList.remove('dragging');document.removeEventListener('mousemove',mm);document.removeEventListener('mouseup',mu);App.save();Hist.push();};
    document.addEventListener('mousemove',mm);document.addEventListener('mouseup',mu);
  });
  handle.addEventListener('touchstart',e=>{
    if(!App.editMode)return;e.stopPropagation();
    const t=e.touches[0];el.classList.add('dragging');
    const mv=start(t.clientX,t.clientY);if(!mv)return;
    const mm=ev=>{ev.preventDefault();const t2=ev.touches[0];mv(t2.clientX,t2.clientY);};
    const mu=()=>{el.classList.remove('dragging');document.removeEventListener('touchmove',mm);document.removeEventListener('touchend',mu);App.save();Hist.push();};
    document.addEventListener('touchmove',mm,{passive:false});document.addEventListener('touchend',mu);
  },{passive:true});
}

function attachResize(handle,el,w){
  function start(cx,cy){
    const sw=w.width,sh=w.height;
    return (x,y)=>{
      w.width=snap(Math.max(140,sw+(x-cx)/VP.scale));
      w.height=snap(Math.max(70,sh+(y-cy)/VP.scale));
      el.style.width=w.width+'px';el.style.height=w.height+'px';
    };
  }
  handle.addEventListener('mousedown',e=>{
    if(!App.editMode)return;e.preventDefault();e.stopPropagation();
    const mv=start(e.clientX,e.clientY);
    const mm=ev=>mv(ev.clientX,ev.clientY);
    const mu=()=>{document.removeEventListener('mousemove',mm);document.removeEventListener('mouseup',mu);App.save();Hist.push();};
    document.addEventListener('mousemove',mm);document.addEventListener('mouseup',mu);
  });
  handle.addEventListener('touchstart',e=>{
    if(!App.editMode)return;e.preventDefault();e.stopPropagation();
    const t=e.touches[0];const mv=start(t.clientX,t.clientY);
    const mm=ev=>{ev.preventDefault();const t2=ev.touches[0];mv(t2.clientX,t2.clientY);};
    const mu=()=>{document.removeEventListener('touchmove',mm);document.removeEventListener('touchend',mu);App.save();Hist.push();};
    document.addEventListener('touchmove',mm,{passive:false});document.addEventListener('touchend',mu);
  },{passive:false});
}

function attachLongPress(el,w){
  let t;
  el.addEventListener('touchstart',e=>{t=setTimeout(()=>{const p=e.touches[0];Ctx.show(p.clientX,p.clientY,w);},550);},{passive:true});
  ['touchmove','touchend'].forEach(ev=>el.addEventListener(ev,()=>clearTimeout(t),{passive:true}));

const Ctx={
  w:null,
  show(x,y,w){
    this.w=w;
    document.getElementById('ctx-lock').textContent=w.locked?'Unlock':'Lock';
    const m=document.getElementById('ctx');
    m.style.display='block';m.style.left=x+'px';m.style.top=y+'px';
    const r=m.getBoundingClientRect();
    if(r.right>window.innerWidth)m.style.left=(x-r.width)+'px';
    if(r.bottom>window.innerHeight)m.style.top=(y-r.height)+'px';
  },
  hide(){ document.getElementById('ctx').style.display='none';this.w=null; },
  do(act){
    const w=this.w;this.hide();if(!w)return;
    const el=document.querySelector(`.widget[data-id="${w.id}"]`);
    if(act==='del') delWidget(w.id);
    else if(act==='dup') dupWidget(w);
    else if(act==='fwd'){w.z=++App.zCtr;if(el)el.style.zIndex=w.z;App.save();}
    else if(act==='bk'){w.z=Math.max(1,(w.z||10)-2);if(el)el.style.zIndex=w.z;App.save();}
    else if(act==='lock'){w.locked=!w.locked;if(el)el.classList.toggle('locked-note',w.locked);App.save();}
    else if(act==='connect'){
      App.connectMode=true;App.connectSrc=w.id;toast('Tap another widget to connect');
    }
  }
};

document.addEventListener('touchstart',e=>{ if(!e.target.closest('#ctx'))Ctx.hide(); },{passive:true});

// DRAWING LAYER
// ═══════════════════════════════════════════════════════════
const Draw=(() => {
  let ctx2,drawing=false,tool='pen',col='#4f9eff',sz=3;
  const dc=()=>document.getElementById('draw-canvas');

  function init(){
    ctx2=dc().getContext('2d');
    ctx2.lineCap='round';ctx2.lineJoin='round';
    load();
  }
  function load(){
    if(!ctx2)return;
    ctx2.clearRect(0,0,3000,3000);
    const d=App.space.drawData;
    if(d){const img=new Image();img.onload=()=>ctx2.drawImage(img,0,0);img.src=d;}
  }
  function save2(){App.space.drawData=dc().toDataURL();App.save();}
  function tool_(t){ tool=t; document.getElementById('dr-pen').classList.toggle('on',t==='pen'); document.getElementById('dr-era').classList.toggle('on',t==='eraser'); }
  function color_(el){ col=el.dataset.c; document.querySelectorAll('.dr-col').forEach(d=>d.classList.toggle('on',d===el)); }
  function clear_(){ ctx2.clearRect(0,0,3000,3000); save2(); }

  function toggle(){
    const on=!dc().classList.contains('drawing');
    dc().classList.toggle('drawing',on);
    document.getElementById('draw-btn').classList.toggle('on',on);
    document.getElementById('draw-bar').classList.toggle('show',on);
    App.drawMode=on;
  }

  function pos(e,touch=false){
    const t=touch?e.touches[0]:e;
    return {x:(t.clientX-VP.tx)/VP.scale,y:(t.clientY-VP.ty)/VP.scale};
  }

  dc().addEventListener('mousedown',e=>{if(App.drawMode){const p=pos(e);drawing=true;ctx2.beginPath();ctx2.moveTo(p.x,p.y);}});
  dc().addEventListener('mousemove',e=>{
    if(!App.drawMode||!drawing)return;
    const p=pos(e);
    if(tool==='eraser'){ctx2.clearRect(p.x-sz*3,p.y-sz*3,sz*6,sz*6);return;}
    ctx2.strokeStyle=col;ctx2.lineWidth=sz;ctx2.lineTo(p.x,p.y);ctx2.stroke();ctx2.beginPath();ctx2.moveTo(p.x,p.y);
  });
  dc().addEventListener('mouseup',()=>{if(drawing){drawing=false;save2();}});

  dc().addEventListener('touchstart',e=>{if(App.drawMode){e.preventDefault();const p=pos(e,true);drawing=true;ctx2.beginPath();ctx2.moveTo(p.x,p.y);}},{passive:false});
  dc().addEventListener('touchmove',e=>{
    if(!App.drawMode||!drawing)return;e.preventDefault();
    const p=pos(e,true);
    if(tool==='eraser'){ctx2.clearRect(p.x-sz*3,p.y-sz*3,sz*6,sz*6);return;}
    ctx2.strokeStyle=col;ctx2.lineWidth=sz;ctx2.lineTo(p.x,p.y);ctx2.stroke();ctx2.beginPath();ctx2.moveTo(p.x,p.y);
  },{passive:false});
  dc().addEventListener('touchend',()=>{if(drawing){drawing=false;save2();}});

  document.getElementById('draw-sz').addEventListener('input',e=>sz=parseInt(e.target.value));

  return {init,toggle,load,tool:tool_,color:color_,clear:clear_};
})();

// ═══════════════════════════════════════════════════════════
// SEARCH
// ═══════════════════════════════════════════════════════════
const Search={
  run(q){
    const res=document.getElementById('srch-res');res.innerHTML='';
    if(!q.trim())return;
    const hits=App.space.widgets.filter(w=>{
      const c=(w.content||'').toLowerCase();
      const it=(w.items||[]).map(i=>i.text).join(' ').toLowerCase();
      return c.includes(q.toLowerCase())||it.includes(q.toLowerCase())||w.type.includes(q.toLowerCase());
    });
    if(!hits.length){res.innerHTML=`<div style="font-size:13px;color:var(--text2);padding:8px">No results</div>`;return;}
    hits.forEach(w=>{
      const m=WMETA[w.type];
      const d=document.createElement('div');d.className='srch-item';
      d.innerHTML=`<i class="${m.icon}"></i><span>${w.content?w.content.slice(0,50):m.label}</span>`;
      d.addEventListener('click',()=>{
        UI.closeAll();
        // Pan viewport to widget
        const nvx=window.innerWidth/2-w.x*VP.scale-w.width*VP.scale/2;
        const nvy=window.innerHeight/2-w.y*VP.scale-w.height*VP.scale/2;
        const cv=document.getElementById('canvas');
        cv.style.transition='transform .4s ease';
        cv.style.transform=`translate(${nvx}px,${nvy}px) scale(${VP.scale})`;
        setTimeout(()=>cv.style.transition='',400);
      });
      res.appendChild(d);
    });
  }
};

// ═══════════════════════════════════════════════════════════
// UI CONTROLLER
// ═══════════════════════════════════════════════════════════
const UI={
  openAdd(){
    this._o('sh-add');
    const g=document.getElementById('add-grid');g.innerHTML='';
    Object.entries(WMETA).forEach(([type,m])=>{
      const d=document.createElement('div');d.className='add-item';
      d.innerHTML=`<i class="${m.icon}"></i><span>${m.label}</span>`;
      d.addEventListener('click',()=>{addWidget(type);this.closeAll();});
      g.appendChild(d);
    });
  },
  openBg(){ BG.renderPresets(); this._o('sh-bg'); },
  openSpaces(){ Spaces.render(); this._o('sh-spc'); },
  openSearch(){ this._o('sh-srch'); setTimeout(()=>document.getElementById('srch-in').focus(),200); },
  openOpts(){
    this._o('sh-opts');
    const b=document.getElementById('opts-body');b.innerHTML='';
    const items=[
      {i:'fas fa-download',t:'Export Layout',s:'Save JSON',a:()=>{IO.exp();this.closeAll();}},
      {i:'fas fa-upload',t:'Import Layout',s:'Load JSON',a:()=>{document.getElementById('import-file').click();this.closeAll();}},
      {i:'fas fa-history',t:'Version History',s:'Restore a save',a:()=>{IO.hist();this.closeAll();}},
      {i:'fas fa-broom',t:'Clear Space',s:'Remove all widgets',a:()=>{if(confirm('Clear all?')){Hist.push();App.space.widgets=[];Render.all();App.save();this.closeAll();}}},
    ];
    items.forEach(item=>{
      const d=document.createElement('div');
      d.style.cssText='display:flex;align-items:center;gap:12px;padding:13px 14px;background:var(--bg3);border:1px solid var(--border2);border-radius:11px;cursor:pointer;margin-bottom:7px';
      d.innerHTML=`<i class="${item.i}" style="color:var(--text2);width:18px;text-align:center;font-size:15px"></i><div><div style="font-size:14px;font-weight:500;color:var(--text)">${item.t}</div><div style="font-size:11px;color:var(--text2)">${item.s}</div></div>`;
      d.addEventListener('click',item.a);b.appendChild(d);
    });
  },
  _o(id){ this.closeAll(true); document.getElementById(id).classList.add('show'); document.getElementById('sov').classList.add('show'); },
  closeAll(keep=false){
    if(!keep)document.getElementById('sov').classList.remove('show');
    ['sh-add','sh-bg','sh-spc','sh-opts','sh-srch'].forEach(id=>document.getElementById(id).classList.remove('show'));
  }
};

// Swipe-down to close
['sh-add','sh-bg','sh-spc','sh-opts','sh-srch'].forEach(id=>{
  const el=document.getElementById(id);
  let sy=0;
  el.addEventListener('touchstart',e=>sy=e.touches[0].clientY,{passive:true});
  el.addEventListener('touchmove',e=>{const dy=e.touches[0].clientY-sy;if(dy>0)el.style.transform=`translateY(${dy}px)`;},{passive:true});
  el.addEventListener('touchend',e=>{el.style.transform='';if(e.changedTouches[0].clientY-sy>70)UI.closeAll();});
});

// ═══════════════════════════════════════════════════════════
// IO — export / import / version history
// ═══════════════════════════════════════════════════════════
const IO={
  exp(){
    const blob=new Blob([JSON.stringify({spaces:App.spaces,curSpace:App.curSpace},null,2)],{type:'application/json'});
    const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='myspace.json';a.click();toast('Exported!');
  },
  imp(file){
    const r=new FileReader();r.onload=ev=>{
      try{const d=JSON.parse(ev.target.result);App.spaces=d.spaces||[];App.curSpace=d.curSpace||0;Spaces.to(App.curSpace);App.save();toast('Imported!');}catch(e){toast('Invalid file');}
    };r.readAsText(file);
  },
  _saves:[],
  push(){
    this._saves.push(JSON.stringify({spaces:App.spaces,ts:Date.now()}));
    if(this._saves.length>5)this._saves.shift();
    localStorage.setItem('msp_hist',JSON.stringify(this._saves));
  },
  load(){ try{this._saves=JSON.parse(localStorage.getItem('msp_hist')||'[]');}catch(e){} },
  hist(){
    if(!this._saves.length)return toast('No history yet');
    const sel=prompt(`Restore version:\n${this._saves.map((v,i)=>`${i+1}: ${new Date(JSON.parse(v).ts).toLocaleString()}`).join('\n')}\n\nEnter number:`);
    if(!sel)return;
    const idx=parseInt(sel)-1;if(isNaN(idx)||idx<0||idx>=this._saves.length)return toast('Invalid');
    const d=JSON.parse(this._saves[idx]);App.spaces=d.spaces;App.curSpace=0;Spaces.to(0);App.save();toast('Restored!');
  }
};
setInterval(()=>IO.push(),120000);
document.getElementById('import-file').addEventListener('change',e=>{const f=e.target.files[0];if(f)IO.imp(f);});

// ═══════════════════════════════════════════════════════════
// KEYBOARD SHORTCUTS
// ═══════════════════════════════════════════════════════════
document.addEventListener('keydown',e=>{
  if(e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA'||e.target.isContentEditable)return;
  const cmd=e.metaKey||e.ctrlKey;
  if(cmd&&e.key==='e'){e.preventDefault();App.toggleEdit();}
  if(cmd&&e.key==='z'){e.preventDefault();e.shiftKey?Hist.redo():Hist.undo();}
  if(cmd&&e.key==='d'){e.preventDefault();const s=document.querySelector('.widget.selected');if(s){const w=findW(s.dataset.id);if(w)dupWidget(w);}}
  if(e.key==='Delete'||e.key==='Backspace'){const s=document.querySelector('.widget.selected');if(s)delWidget(s.dataset.id);}
  if(e.key==='Escape'){Ctx.hide();UI.closeAll();App.connectMode=false;}
  if(cmd&&e.key==='0'){e.preventDefault();VP.reset();}
  if(cmd&&e.key==='='){e.preventDefault();VP.zoomAt(window.innerWidth/2,window.innerHeight/2,1.15);}
  if(cmd&&e.key==='-'){e.preventDefault();VP.zoomAt(window.innerWidth/2,window.innerHeight/2,1/1.15);}
});

// ═══════════════════════════════════════════════════════════
// MEMORY MODE — fade notes older than 7 days
// ═══════════════════════════════════════════════════════════
function memMode(){
  const WEEK=7*24*60*60*1000;
  App.space.widgets.forEach(w=>{
    if(w.type==='note'&&w.createdAt&&Date.now()-w.createdAt>WEEK){
      w.faded=true;
      document.querySelector(`.widget[data-id="${w.id}"]`)?.classList.add('faded');
    }
  });
}

// ═══════════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════════
App.init();
IO.load();
VP.reset();
Spaces.to(App.curSpace);
Draw.init();
BG.apply();
Conn.render();
Hist.reset();
memMode();

    {id:uid(),text:'Add a Pomodoro timer',done:false},

toast('My Space ready ✓');
