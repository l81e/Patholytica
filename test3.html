<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>My Space</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0a0a0a; --bg2:#111; --bg3:#181818;
  --border:#1e1e1e; --border2:#2a2a2a;
  --text:#e8e6e1; --text2:#6e6c68; --text3:#3a3835;
  --accent:#4f9eff; --green:#3dba72; --orange:#e88c3a;
  --purple:#a56fd4; --red:#ef4444; --yellow:#fbbf24;
  --glass:rgba(10,10,10,0.85); --glass2:rgba(14,14,14,0.92);
  --gb:rgba(255,255,255,0.055);
  --sh:0 8px 32px rgba(0,0,0,0.72);
  --sh2:0 24px 64px rgba(0,0,0,0.88);
  --r:14px;
  --st:env(safe-area-inset-top,0px);
  --sb:env(safe-area-inset-bottom,0px);
  --tbh:48px; --barh:56px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{width:100%;height:100%;overflow:hidden;font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);touch-action:none}

/* LAYERS */
#bg-layer{position:fixed;inset:-60px;z-index:0;background:var(--bg);background-size:cover;background-position:center;transition:filter .4s;pointer-events:none;will-change:transform}
#bg-ov{position:absolute;inset:0;pointer-events:none;transition:background .3s}
#cvp{position:fixed;inset:0;z-index:1;overflow:hidden;touch-action:none}
#cv{position:absolute;top:0;left:0;width:4000px;height:4000px;transform-origin:0 0;will-change:transform}
#snap-grid{position:absolute;inset:0;width:4000px;height:4000px;background-image:linear-gradient(rgba(255,255,255,.022) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.022) 1px,transparent 1px);background-size:20px 20px;pointer-events:none;display:none;z-index:0}
#snap-grid.on{display:block}
#draw-cv{position:absolute;top:0;left:0;width:4000px;height:4000px;pointer-events:none;z-index:50}
#draw-cv.on{pointer-events:all;cursor:crosshair}
#conn-svg{position:absolute;top:0;left:0;width:4000px;height:4000px;pointer-events:none;z-index:1;overflow:visible}
.cline{stroke:var(--accent);stroke-width:1.5;fill:none;opacity:.45;stroke-dasharray:5 3;cursor:pointer;pointer-events:stroke}
.cline:hover{opacity:.9;stroke:var(--red)}
#ui{position:fixed;inset:0;z-index:1000;pointer-events:none}
#ui>*{pointer-events:all}

/* WIDGETS */
.widget{
  position:absolute;min-width:140px;min-height:70px;
  border:1px solid var(--gb);border-radius:var(--r);
  backdrop-filter:blur(18px) saturate(1.3);
  -webkit-backdrop-filter:blur(18px) saturate(1.3);
  background:var(--glass);
  box-shadow:var(--sh),inset 0 1px 0 rgba(255,255,255,.04);
  overflow:hidden;user-select:none;-webkit-user-select:none;
  transition:box-shadow .18s,border-color .18s;will-change:transform
}
.widget.sel{border-color:var(--accent);box-shadow:var(--sh),0 0 0 1px var(--accent),0 0 18px rgba(79,158,255,.12)}
.widget.drag{box-shadow:var(--sh2),0 0 0 1px var(--accent);transition:none}
.widget.faded{opacity:.42;filter:grayscale(.4)}

.wh-bar{position:absolute;top:0;left:0;right:0;height:30px;cursor:grab;z-index:5;display:none;align-items:center;padding:0 10px;gap:7px;background:rgba(255,255,255,.02);border-bottom:1px solid var(--gb)}
.wh-bar:active{cursor:grabbing}
.edit-mode .wh-bar{display:flex}
.wh-dots{display:grid;grid-template-columns:repeat(3,1fr);gap:2px;opacity:.3}
.wh-dots span{width:3px;height:3px;border-radius:50%;background:var(--text);display:block}
.wh-sp{flex:1}
.wh-del{width:20px;height:20px;border-radius:5px;border:none;background:none;color:var(--text3);cursor:pointer;font-size:11px;display:flex;align-items:center;justify-content:center;transition:all .12s}
.wh-del:hover,.wh-del:active{background:rgba(239,68,68,.18);color:var(--red)}

.edit-mode .wb{margin-top:30px}
.wb{height:100%;transition:margin .15s}

.wrz{position:absolute;bottom:0;right:0;width:20px;height:20px;cursor:se-resize;z-index:6;display:none;align-items:flex-end;justify-content:flex-end;padding:3px}
.wrz::after{content:'';width:8px;height:8px;border-right:2px solid var(--text2);border-bottom:2px solid var(--text2);border-radius:0 0 2px 0;display:block}
.edit-mode .wrz{display:flex}

.wh{display:flex;align-items:center;gap:7px;padding:9px 11px 7px;border-bottom:1px solid var(--gb);font-size:10px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:var(--text2);flex-shrink:0}
.wh i{font-size:11px}
.whs{flex:1}

/* NOTE */
.note-widget[data-color=yellow]{background:rgba(251,191,36,.08);border-color:rgba(251,191,36,.2)}
.note-widget[data-color=green]{background:rgba(61,186,114,.07);border-color:rgba(61,186,114,.2)}
.note-widget[data-color=blue]{background:rgba(79,158,255,.07);border-color:rgba(79,158,255,.2)}
.note-widget[data-color=purple]{background:rgba(165,111,212,.07);border-color:rgba(165,111,212,.2)}
.note-widget[data-color=red]{background:rgba(239,68,68,.07);border-color:rgba(239,68,68,.2)}
.note-ta{width:100%;height:calc(100% - 58px);padding:10px 12px;background:none;border:none;outline:none;resize:none;color:var(--text);font-size:13.5px;line-height:1.7;font-family:inherit;display:block}
.note-ta::placeholder{color:var(--text3)}
.note-colors{display:flex;gap:6px;padding:6px 11px 9px;align-items:center}
.nc{width:12px;height:12px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:all .12s;flex-shrink:0}
.nc.on{border-color:rgba(255,255,255,.65);transform:scale(1.25)}
.note-fsz{margin-left:auto;background:none;border:none;color:var(--text2);font-size:10px;cursor:pointer;padding:2px 5px;border-radius:4px;font-family:'DM Sans',sans-serif;transition:background .12s}
.note-fsz:hover{background:var(--bg3);color:var(--text)}

/* CLOCK */
.clock-body{display:flex;flex-direction:column;align-items:center;justify-content:center;height:calc(100% - 30px);padding:12px}
.clk-t{font-family:'DM Mono',monospace;font-size:34px;font-weight:500;color:var(--text);letter-spacing:-.02em;line-height:1}
.clk-d{font-family:'DM Mono',monospace;font-size:11px;color:var(--text2);letter-spacing:.07em;text-transform:uppercase;margin-top:5px}

/* TODO */
.todo-body{height:calc(100% - 30px);display:flex;flex-direction:column;overflow:hidden}
.todo-list{flex:1;overflow-y:auto;padding:6px 11px}
.todo-list::-webkit-scrollbar{width:3px}
.todo-list::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
.ti{display:flex;align-items:flex-start;gap:8px;padding:6px 0;border-bottom:1px solid var(--border)}
.ti:last-child{border-bottom:none}
.tcb{width:16px;height:16px;border-radius:4px;border:1.5px solid var(--border2);display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;margin-top:2px;transition:all .12s}
.tcb.dn{background:var(--green);border-color:var(--green)}
.tcb.dn::after{content:'✓';font-size:9px;color:#fff;font-weight:700}
.ttx{flex:1;font-size:12.5px;color:var(--text);line-height:1.5;outline:none;word-break:break-word}
.ttx.dn{text-decoration:line-through;color:var(--text2)}
.tdl{width:18px;height:18px;border-radius:4px;border:none;background:none;color:var(--text3);cursor:pointer;font-size:11px;display:flex;align-items:center;justify-content:center;opacity:0;transition:all .12s;flex-shrink:0}
.ti:hover .tdl,.ti:focus-within .tdl{opacity:1}
.tdl:hover{background:rgba(239,68,68,.14);color:var(--red)}
.todo-add{display:flex;align-items:center;gap:7px;padding:7px 11px;border-top:1px solid var(--border);flex-shrink:0}
.todo-add input{flex:1;background:none;border:none;outline:none;font-size:12.5px;color:var(--text2);font-family:'DM Sans',sans-serif}
.todo-add input::placeholder{color:var(--text3)}
.ta-btn{width:20px;height:20px;border-radius:5px;background:var(--bg3);border:1px solid var(--border2);color:var(--text2);cursor:pointer;font-size:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .12s}
.ta-btn:hover,.ta-btn:active{background:var(--accent);border-color:var(--accent);color:#fff}

/* IMAGE */
.img-body{width:100%;height:100%;border-radius:calc(var(--r) - 1px);overflow:hidden;display:flex;align-items:center;justify-content:center}
.img-body img{width:100%;height:100%;object-fit:cover;display:block;transition:transform .3s}
.img-body:hover img{transform:scale(1.02)}
.img-ph{width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;color:var(--text3);font-size:12px;cursor:pointer}
.img-ph i{font-size:24px}

/* QUOTE */
.quote-body{height:calc(100% - 30px);display:flex;flex-direction:column;justify-content:center;padding:14px 16px;gap:10px}
.qt{font-family:'DM Serif Display',Georgia,serif;font-size:15px;line-height:1.7;color:var(--text);font-style:italic;outline:none;word-break:break-word}
.qa{font-size:11px;color:var(--text2);letter-spacing:.06em;text-transform:uppercase;outline:none}

/* MUSIC */
.music-body{height:100%}
.music-body iframe{width:100%;height:100%;border:none;display:block;border-radius:calc(var(--r)-1px)}
.music-setup{height:calc(100% - 30px);display:flex;flex-direction:column;justify-content:center;gap:9px;padding:12px}
.music-in{background:var(--bg3);border:1px solid var(--border2);border-radius:8px;padding:8px 10px;color:var(--text);font-size:12px;outline:none;font-family:'DM Mono',monospace;width:100%}
.music-in::placeholder{color:var(--text3)}
.music-in:focus{border-color:var(--accent)}
.music-go{padding:8px;border-radius:8px;background:#1DB954;border:none;color:#fff;font-size:12.5px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif}
.music-go:hover{background:#17a349}

/* POMODORO */
.pomo-body{height:calc(100% - 30px);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;padding:12px}
.pomo-ring{position:relative;width:90px;height:90px}
.pomo-ring svg{transform:rotate(-90deg)}
.pomo-ring circle{fill:none;stroke-width:4}
.pbg{stroke:var(--border2)}
.ppr{stroke:var(--red);stroke-linecap:round;transition:stroke-dashoffset .5s linear}
.ptime{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-family:'DM Mono',monospace;font-size:18px;color:var(--text);font-weight:500}
.plbl{font-size:10px;color:var(--text2);letter-spacing:.07em;text-transform:uppercase}
.pbtns{display:flex;gap:8px}
.pbtn{width:30px;height:30px;border-radius:8px;border:1px solid var(--border2);background:var(--bg3);color:var(--text2);cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;transition:all .12s}
.pbtn:hover{background:var(--border2);color:var(--text)}
.pbtn.on{background:var(--red);border-color:var(--red);color:#fff}
.pcfg{display:flex;gap:8px;align-items:center;font-size:11px;color:var(--text2)}
.pcfg input{width:38px;background:var(--bg3);border:1px solid var(--border2);border-radius:5px;padding:3px 5px;color:var(--text);font-size:11px;outline:none;text-align:center}

/* HABIT */
.habit-body{height:calc(100% - 30px);overflow-y:auto;padding:6px 11px 10px}
.habit-body::-webkit-scrollbar{width:3px}
.habit-body::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
.habit-row{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--border)}
.habit-row:last-child{border-bottom:none}
.hname{flex:1;font-size:12px;color:var(--text);outline:none;min-width:0}
.hdots{display:flex;gap:3px;flex-shrink:0}
.hdot{width:14px;height:14px;border-radius:3px;background:var(--bg3);border:1px solid var(--border2);cursor:pointer;transition:all .12s;flex-shrink:0}
.hdot.on{background:var(--green);border-color:var(--green)}
.hadd{display:flex;gap:7px;padding:7px 0 0;border-top:1px solid var(--border);margin-top:3px}
.hadd input{flex:1;background:none;border:none;outline:none;font-size:12px;color:var(--text2);font-family:'DM Sans',sans-serif}
.hadd input::placeholder{color:var(--text3)}

/* CALENDAR */
.cal-body{height:calc(100% - 30px);padding:8px 11px;overflow:hidden}
.cal-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.cal-mo{font-size:12px;font-weight:600;color:var(--text)}
.cal-nav{width:20px;height:20px;border-radius:4px;border:none;background:none;color:var(--text2);cursor:pointer;font-size:12px;display:flex;align-items:center;justify-content:center;transition:background .12s}
.cal-nav:hover{background:var(--bg3)}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
.cal-dl{font-size:9px;color:var(--text2);text-align:center;padding:2px 0;font-weight:600}
.cal-day{font-size:10px;text-align:center;padding:4px 2px;border-radius:4px;cursor:pointer;color:var(--text2);transition:all .12s}
.cal-day:hover{background:var(--bg3);color:var(--text)}
.cal-day.today{background:var(--accent);color:#fff;font-weight:600}
.cal-day.other{opacity:.3}

/* AMBIENT */
.amb-body{height:calc(100% - 30px);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;padding:12px}
.amb-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px;width:100%}
.amb-item{display:flex;flex-direction:column;align-items:center;gap:5px;padding:12px 8px;background:var(--bg3);border:1px solid var(--border2);border-radius:10px;cursor:pointer;transition:all .15s;font-size:11px;color:var(--text2);text-align:center}
.amb-item i{font-size:20px}
.amb-item.on{background:rgba(79,158,255,.1);border-color:var(--accent);color:var(--accent)}

/* REMINDER */
.rem-body{height:calc(100% - 30px);overflow-y:auto;padding:6px 11px}
.rem-body::-webkit-scrollbar{width:3px}
.ritem{display:flex;align-items:flex-start;gap:8px;padding:6px 0;border-bottom:1px solid var(--border)}
.ritem:last-child{border-bottom:none}
.rico{font-size:14px;flex-shrink:0;margin-top:1px}
.rinfo{flex:1;min-width:0}
.rtitle{font-size:12px;color:var(--text);margin-bottom:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.rtime{font-size:10px;color:var(--text2);font-family:'DM Mono',monospace}
.rdel{width:18px;height:18px;border-radius:4px;border:none;background:none;color:var(--text3);cursor:pointer;font-size:11px;display:flex;align-items:center;justify-content:center;transition:all .12s}
.rdel:hover{background:rgba(239,68,68,.14);color:var(--red)}
.radd{display:flex;flex-direction:column;gap:5px;padding:7px 0 0;border-top:1px solid var(--border)}
.radd input{background:none;border:none;outline:none;font-size:12px;color:var(--text2);font-family:'DM Sans',sans-serif}
.radd input::placeholder{color:var(--text3)}
.radd input[type=datetime-local]{font-family:'DM Mono',monospace;font-size:11px;color-scheme:dark}
.radd-btn{align-self:flex-end;padding:5px 12px;border-radius:7px;background:var(--accent);border:none;color:#fff;font-size:11px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif}

/* TOPBAR */
#topbar{position:absolute;top:0;left:0;right:0;height:calc(var(--st) + var(--tbh));padding-top:var(--st);background:var(--glass2);border-bottom:1px solid var(--gb);backdrop-filter:blur(22px) saturate(1.4);-webkit-backdrop-filter:blur(22px) saturate(1.4);display:flex;align-items:flex-end;z-index:10}
.tbi{width:100%;height:var(--tbh);display:flex;align-items:center;padding:0 12px;gap:7px}
#spc-btn{font-family:'DM Serif Display',serif;font-size:18px;color:var(--text);background:none;border:none;cursor:pointer;padding:4px 8px;border-radius:8px;transition:background .12s;max-width:160px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex-shrink:0}
#spc-btn:hover{background:rgba(255,255,255,.05)}
.tsp{flex:1}
#zoom-lbl{font-family:'DM Mono',monospace;font-size:11px;color:var(--text2);background:var(--bg3);border:1px solid var(--border2);border-radius:7px;padding:3px 8px;pointer-events:none;flex-shrink:0}
#edit-badge{font-size:10px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--accent);background:rgba(79,158,255,.12);border:1px solid rgba(79,158,255,.25);border-radius:8px;padding:4px 9px;display:none;align-items:center;gap:5px;flex-shrink:0}
#edit-badge.on{display:flex}
#edit-badge i{font-size:8px}
.tbtn{width:34px;height:34px;border-radius:10px;background:none;border:none;color:var(--text2);cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0}
.tbtn:hover,.tbtn:active{background:var(--bg3);color:var(--text)}
.tbtn.on{background:rgba(79,158,255,.15);color:var(--accent)}

/* TOOLBAR */
#toolbar{position:absolute;bottom:0;left:0;right:0;height:calc(var(--sb) + var(--barh));padding-bottom:var(--sb);background:var(--glass2);border-top:1px solid var(--gb);backdrop-filter:blur(22px) saturate(1.4);-webkit-backdrop-filter:blur(22px) saturate(1.4);display:flex;align-items:flex-start;z-index:10}
@media(min-width:600px){
  #toolbar{bottom:20px;left:50%;right:auto;transform:translateX(-50%);border-radius:26px;border:1px solid var(--gb);padding-bottom:0;width:auto;height:auto;box-shadow:0 12px 48px rgba(0,0,0,.8),inset 0 1px 0 rgba(255,255,255,.05)}
  .bari{height:50px;padding:6px 10px;gap:2px;width:auto}
  .bbtn{flex:none;width:38px;max-width:none;height:38px;font-size:15px}
}
.bari{width:100%;height:var(--barh);display:flex;align-items:center;justify-content:space-around;padding:0 8px;gap:3px}
.bbtn{flex:1;max-width:50px;height:42px;border-radius:12px;background:none;border:none;cursor:pointer;color:var(--text2);font-size:16px;display:flex;align-items:center;justify-content:center;transition:all .15s}
.bbtn:hover,.bbtn:active{background:var(--bg3);color:var(--text)}
.bbtn.on{color:var(--accent)}
.bsep{width:1px;height:20px;background:var(--border2);flex-shrink:0}

/* SHEETS */
.sov{position:absolute;inset:0;background:rgba(0,0,0,.55);backdrop-filter:blur(3px);-webkit-backdrop-filter:blur(3px);z-index:20;display:none;cursor:pointer}
.sov.on{display:block}
.sheet{position:absolute;left:0;right:0;bottom:0;background:#111;border-top:1px solid var(--border2);border-radius:20px 20px 0 0;padding-bottom:calc(var(--sb) + 6px);z-index:21;display:none;max-height:88vh;overflow-y:auto;animation:shup .3s cubic-bezier(.4,0,.2,1)}
.sheet.on{display:block}
.sheet::-webkit-scrollbar{display:none}
@keyframes shup{from{transform:translateY(100%)}to{transform:none}}
@media(min-width:600px){
  .sheet{bottom:auto;left:50%;top:50%;right:auto;transform:translate(-50%,-50%);width:min(460px,94vw);border-radius:18px;max-height:88vh;padding-bottom:0;border:1px solid var(--border2);animation:min .2s cubic-bezier(.4,0,.2,1)}
  @keyframes min{from{opacity:0;transform:translate(-50%,-50%) scale(.96)}to{opacity:1;transform:translate(-50%,-50%) scale(1)}}
}
.sh{width:34px;height:4px;background:var(--border2);border-radius:2px;margin:10px auto 0}
@media(min-width:600px){.sh{display:none}}
.shhdr{display:flex;align-items:center;justify-content:space-between;padding:14px 18px 10px;border-bottom:1px solid var(--border)}
.shtitle{font-size:14px;font-weight:600;color:var(--text)}
.shclose{width:26px;height:26px;border-radius:50%;border:none;background:none;color:var(--text2);cursor:pointer;font-size:17px;display:flex;align-items:center;justify-content:center;transition:background .12s}
.shclose:hover{background:var(--bg3)}
.shbody{padding:14px 18px 16px;display:flex;flex-direction:column;gap:14px}
.shlbl{font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--text2)}
.shrow{display:flex;align-items:center;gap:10px}
.shrow label{font-size:13px;color:var(--text2);min-width:76px}
.shrow input[type=range]{flex:1;accent-color:var(--accent);cursor:pointer}
.shup{width:100%;padding:10px;border-radius:10px;background:var(--bg3);border:1px dashed var(--border2);color:var(--text2);font-size:13px;cursor:pointer;font-family:'DM Sans',sans-serif;display:flex;align-items:center;justify-content:center;gap:7px;transition:all .15s}
.shup:hover{border-color:var(--accent);color:var(--text)}
.shtog{display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--bg3);border:1px solid var(--border2);border-radius:10px}
.shtog span{flex:1;font-size:13px;color:var(--text)}
.ios{position:relative;width:40px;height:23px;flex-shrink:0}
.ios input{opacity:0;width:0;height:0}
.iosk{position:absolute;inset:0;background:var(--border2);border-radius:12px;transition:.25s;cursor:pointer}
.iosk::before{content:'';position:absolute;width:17px;height:17px;left:3px;top:3px;background:#fff;border-radius:50%;transition:.25s}
.ios input:checked+.iosk{background:var(--accent)}
.ios input:checked+.iosk::before{transform:translateX(17px)}
.pgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.psw{aspect-ratio:1;border-radius:10px;cursor:pointer;border:2px solid transparent;transition:all .15s}
.psw.on{border-color:var(--accent)}
.psw:active{transform:scale(.93)}
.agrid{display:grid;grid-template-columns:repeat(3,1fr);gap:9px}
@media(min-width:360px){.agrid{grid-template-columns:repeat(4,1fr)}}
@media(min-width:500px){.agrid{grid-template-columns:repeat(5,1fr)}}
.aitem{display:flex;flex-direction:column;align-items:center;gap:6px;padding:14px 6px;background:var(--bg3);border:1px solid var(--border2);border-radius:12px;cursor:pointer;transition:all .15s;font-size:11px;font-weight:500;color:var(--text2);text-align:center}
.aitem i{font-size:19px}
.aitem:hover,.aitem:active{background:var(--border2);transform:scale(.96);color:var(--text)}
.srow{display:flex;align-items:center;gap:10px;padding:12px 14px;background:var(--bg3);border:1px solid var(--border2);border-radius:11px;cursor:pointer;transition:all .15s;margin-bottom:6px}
.srow:hover,.srow:active{background:var(--border2)}
.srow.on{border-color:var(--accent);background:rgba(79,158,255,.07)}
.srname{flex:1;font-size:14px;color:var(--text);outline:none}
.srmeta{font-size:11px;color:var(--text2)}
.srdel{width:24px;height:24px;border-radius:6px;border:none;background:none;color:var(--text3);cursor:pointer;font-size:12px;display:flex;align-items:center;justify-content:center;transition:all .12s}
.srdel:hover{background:rgba(239,68,68,.14);color:var(--red)}
.shaddbtn{width:100%;padding:11px;border-radius:10px;background:none;border:1px dashed var(--border2);color:var(--text2);font-size:13px;cursor:pointer;font-family:'DM Sans',sans-serif;display:flex;align-items:center;justify-content:center;gap:7px;transition:all .15s}
.shaddbtn:hover{border-color:var(--accent);color:var(--accent)}
.srch-w{position:relative}
.srchin{width:100%;padding:10px 12px 10px 36px;background:var(--bg3);border:1px solid var(--border2);border-radius:10px;color:var(--text);font-size:13px;outline:none;font-family:'DM Sans',sans-serif}
.srchin::placeholder{color:var(--text3)}
.srchin:focus{border-color:var(--accent)}
.srchio{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--text2);font-size:13px;pointer-events:none}
.srch-res{display:flex;flex-direction:column;gap:4px;max-height:220px;overflow-y:auto}
.srchitem{padding:9px 11px;background:var(--bg3);border-radius:8px;cursor:pointer;font-size:13px;color:var(--text);transition:background .12s;display:flex;align-items:center;gap:8px}
.srchitem:hover{background:var(--border2)}
.srchitem i{color:var(--text2);font-size:12px;width:14px;text-align:center}

/* CONTEXT MENU */
#ctx{position:fixed;background:#141414;border:1px solid var(--border2);border-radius:13px;padding:5px;box-shadow:var(--sh2);z-index:2000;display:none;min-width:168px;animation:ctxin .13s cubic-bezier(.4,0,.2,1)}
@keyframes ctxin{from{opacity:0;transform:scale(.94) translateY(-3px)}to{opacity:1;transform:none}}
.ci{display:flex;align-items:center;gap:9px;padding:9px 11px;border-radius:8px;cursor:pointer;font-size:13px;color:var(--text);transition:background .1s}
.ci:hover,.ci:active{background:var(--bg3)}
.ci i{width:13px;text-align:center;color:var(--text2);font-size:12px}
.ci.d{color:var(--red)}
.ci.d i{color:var(--red)}
.csep{height:1px;background:var(--border);margin:3px 0}

/* DRAW BAR */
#draw-bar{position:absolute;top:calc(var(--st) + var(--tbh) + 10px);left:50%;transform:translateX(-50%);background:var(--glass2);border:1px solid var(--gb);border-radius:20px;backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);display:none;align-items:center;gap:4px;padding:5px 8px;box-shadow:var(--sh);z-index:10}
#draw-bar.on{display:flex}
.drbtn{width:34px;height:34px;border-radius:10px;border:none;background:none;color:var(--text2);cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;transition:all .12s}
.drbtn:hover{background:var(--bg3);color:var(--text)}
.drbtn.on{background:rgba(79,158,255,.15);color:var(--accent)}
.drcol{width:20px;height:20px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:all .12s;flex-shrink:0}
.drcol.on{border-color:#fff;transform:scale(1.2)}

/* UNDO BAR */
#undo-bar{position:absolute;top:calc(var(--st) + var(--tbh) + 10px);right:10px;display:flex;flex-direction:column;gap:4px;z-index:10}
.ubtn{width:32px;height:32px;border-radius:9px;border:1px solid var(--border2);background:var(--glass2);backdrop-filter:blur(12px);color:var(--text2);cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;transition:all .12s}
.ubtn:hover{background:var(--bg3);color:var(--text)}
.ubtn:disabled{opacity:.25;pointer-events:none}

/* TOAST */
#toast{position:absolute;top:calc(var(--st) + var(--tbh) + 8px);left:50%;transform:translateX(-50%);background:#111;border:1px solid var(--border2);border-radius:12px;padding:9px 18px;font-size:13px;color:var(--text);z-index:900;display:none;white-space:nowrap;box-shadow:var(--sh);pointer-events:none;animation:tin .2s ease}
@keyframes tin{from{opacity:0;transform:translateX(-50%) translateY(-6px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}

/* MISC */
.widget{animation:win .2s cubic-bezier(.4,0,.2,1)}
@keyframes win{from{opacity:0;transform:scale(.88) translateY(8px)}to{opacity:1;transform:none}}
@keyframes wout{to{opacity:0;transform:scale(.88)}}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
</style>
</head>

<script>
// ════════════════════════════════════════════════════════
// UTILS
// ════════════════════════════════════════════════════════
const uid = () => Math.random().toString(36).slice(2,11);
const clamp = (v,lo,hi) => Math.max(lo,Math.min(hi,v));
const snap = v => G.snapOn ? Math.round(v/20)*20 : v;
const CMAP = {yellow:'#fbbf24',green:'#3dba72',blue:'#4f9eff',purple:'#a56fd4',red:'#ef4444'};
const NCOLORS = ['yellow','green','blue','purple','red'];
const NFONTS = ['DM Sans','DM Serif Display','DM Mono'];
const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];
const DAYS = ['Su','Mo','Tu','We','Th','Fr','Sa'];

const WMETA = {
  note:     {icon:'fas fa-sticky-note',  label:'Note',     w:240,h:210},
  clock:    {icon:'fas fa-clock',         label:'Clock',    w:200,h:118},
  todo:     {icon:'fas fa-check-square',  label:'To-Do',    w:260,h:280},
  image:    {icon:'fas fa-image',         label:'Image',    w:240,h:200},
  quote:    {icon:'fas fa-quote-right',   label:'Quote',    w:280,h:180},
  music:    {icon:'fab fa-spotify',       label:'Music',    w:300,h:180},
  pomodoro: {icon:'fas fa-stopwatch',     label:'Pomodoro', w:190,h:230},
  habit:    {icon:'fas fa-seedling',      label:'Habits',   w:260,h:260},
  calendar: {icon:'fas fa-calendar-alt', label:'Calendar', w:240,h:240},
  ambient:  {icon:'fas fa-cloud-rain',   label:'Ambient',  w:200,h:200},
  reminder: {icon:'fas fa-bell',         label:'Reminders',w:250,h:260},
};

const BG_PRESETS = [
  'linear-gradient(135deg,#0a0a0a,#111)',
  'linear-gradient(135deg,#0a1628,#0d2a4a,#072040)',
  'linear-gradient(135deg,#0a1a0f,#0f2a18,#081508)',
  'linear-gradient(135deg,#1a0a1e,#2a0d3a,#1a0828)',
  'linear-gradient(135deg,#1a0800,#2d1100,#1a0600)',
  'linear-gradient(135deg,#0d1117,#161b22)',
  'linear-gradient(135deg,#131619,#1c2028)',
  'linear-gradient(160deg,#050505,#0c0c0c)',
];

function toast(msg, ms=2200) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.style.display = 'block';
  clearTimeout(el._t); el._t = setTimeout(() => el.style.display='none', ms);
}

// ════════════════════════════════════════════════════════
// GLOBAL STATE
// ════════════════════════════════════════════════════════
const G = {
  spaces:[], cur:0, editMode:false, snapOn:false, drawMode:false,
  connectMode:false, connectSrc:null, zCtr:10,
  get space(){ return this.spaces[this.cur]; },

  defSpace(name){
    return {
      id:uid(), name,
      widgets:[],
      bg:{type:'gradient',value:BG_PRESETS[0],blur:0,brightness:100,dim:0,parallax:false},
      drawData:null, connections:[]
    };
  },

  init(){
    try {
      const d = JSON.parse(localStorage.getItem('msp6')||'null');
      if(d){ this.spaces=d.spaces; this.cur=d.cur||0; this.zCtr=d.zCtr||10; }
    } catch(e){}
    if(!this.spaces||!this.spaces.length) this.spaces=[this.defSpace('Main')];
    if(this.cur>=this.spaces.length) this.cur=0;
  },

  save(){
    try{ localStorage.setItem('msp6',JSON.stringify({spaces:this.spaces,cur:this.cur,zCtr:this.zCtr})); }catch(e){}
  },

  toggleEdit(){
    this.editMode = !this.editMode;
    document.getElementById('cv').classList.toggle('edit-mode',this.editMode);
    document.getElementById('edit-btn').classList.toggle('on',this.editMode);
    document.getElementById('edit-badge').classList.toggle('on',this.editMode);
    document.querySelectorAll('.widget').forEach(el=>el.classList.toggle('locked',!this.editMode));
    if(!this.editMode && this.drawMode) Draw.toggle();
  },

  toggleSnap(){
    this.snapOn=!this.snapOn;
    document.getElementById('snap-btn').classList.toggle('on',this.snapOn);
    document.getElementById('snap-grid').classList.toggle('on',this.snapOn);
  }
};

// ════════════════════════════════════════════════════════
// VIEWPORT — pan + pinch zoom
// ════════════════════════════════════════════════════════
const VP = (function(){
  let tx=0, ty=0, sc=1;
  const MIN=0.2, MAX=3.5;
  const el = () => document.getElementById('cv');

  function apply(anim){
    const e = el();
    e.style.transition = anim ? 'transform .25s ease' : 'none';
    e.style.transform = 'translate('+tx+'px,'+ty+'px) scale('+sc+')';
    document.getElementById('zoom-lbl').textContent = Math.round(sc*100)+'%';
  }

  function constrain(){
    const W=window.innerWidth, H=window.innerHeight;
    tx = clamp(tx, -(4000*sc)+(W*.15), W*.85);
    ty = clamp(ty, -(4000*sc)+(H*.15), H*.85);
  }

  function zoomAt(cx,cy,delta){
    const ns = clamp(sc*delta, MIN, MAX);
    const r = ns/sc;
    tx = cx - r*(cx-tx);
    ty = cy - r*(cy-ty);
    sc = ns; constrain(); apply(false);
  }

  function reset(){
    tx=20; ty=60; sc=1; apply(true);
  }

  // Mouse wheel
  document.getElementById('cvp').addEventListener('wheel', function(e){
    e.preventDefault();
    const d = e.ctrlKey ? (1-e.deltaY*.01) : (e.deltaY<0?1.08:1/1.08);
    zoomAt(e.clientX, e.clientY, d);
  }, {passive:false});

  // Mouse pan (background)
  let mp=false, mpx, mpy;
  document.getElementById('cvp').addEventListener('mousedown', function(e){
    if(e.button===1 || (e.button===0 && !e.target.closest('.widget'))){
      mp=true; mpx=e.clientX-tx; mpy=e.clientY-ty; e.preventDefault();
    }
  });
  document.addEventListener('mousemove', function(e){
    if(!mp) return;
    tx=e.clientX-mpx; ty=e.clientY-mpy; constrain(); apply(false);
  });
  document.addEventListener('mouseup', function(){ mp=false; });

  // Touch
  let touches={}, pinchDist=null, pinchMid=null, panStart=null, panTx, panTy;

  document.getElementById('cvp').addEventListener('touchstart', function(e){
    for(var i=0;i<e.touches.length;i++){
      var t=e.touches[i]; touches[t.identifier]={x:t.clientX,y:t.clientY};
    }
    if(e.touches.length===1){
      var t=e.touches[0];
      var tgt=document.elementFromPoint(t.clientX,t.clientY);
      var onWidget = tgt && tgt.closest('.widget');
      if(!onWidget || !G.editMode){
        panStart={x:t.clientX,y:t.clientY}; panTx=tx; panTy=ty;
      } else { panStart=null; }
    } else { panStart=null; }
    if(e.touches.length===2){
      var a=e.touches[0], b=e.touches[1];
      pinchDist=Math.hypot(b.clientX-a.clientX,b.clientY-a.clientY);
      pinchMid={x:(a.clientX+b.clientX)/2,y:(a.clientY+b.clientY)/2};
    }
  },{passive:true});

  document.getElementById('cvp').addEventListener('touchmove', function(e){
    e.preventDefault();
    for(var i=0;i<e.touches.length;i++){
      var t=e.touches[i]; touches[t.identifier]={x:t.clientX,y:t.clientY};
    }
    if(e.touches.length===1 && panStart){
      var t=e.touches[0];
      tx=panTx+(t.clientX-panStart.x);
      ty=panTy+(t.clientY-panStart.y);
      constrain(); apply(false);
    }
    if(e.touches.length===2){
      var a=e.touches[0], b=e.touches[1];
      var dist=Math.hypot(b.clientX-a.clientX,b.clientY-a.clientY);
      var mid={x:(a.clientX+b.clientX)/2,y:(a.clientY+b.clientY)/2};
      if(pinchDist){
        zoomAt(mid.x,mid.y,dist/pinchDist);
        tx+=mid.x-pinchMid.x; ty+=mid.y-pinchMid.y; constrain(); apply(false);
      }
      pinchDist=dist; pinchMid=mid;
    }
  },{passive:false});

  document.getElementById('cvp').addEventListener('touchend', function(e){
    for(var i=0;i<e.changedTouches.length;i++) delete touches[e.changedTouches[i].identifier];
    if(e.touches.length<2){pinchDist=null; pinchMid=null;}
    if(e.touches.length===0) panStart=null;
  },{passive:true});

  return {
    reset, zoomAt,
    toCanvas: function(vx,vy){ return {x:(vx-tx)/sc, y:(vy-ty)/sc}; },
    get scale(){ return sc; },
    get tx(){ return tx; },
    get ty(){ return ty; }
  };
})();

// ════════════════════════════════════════════════════════
// HISTORY
// ════════════════════════════════════════════════════════
const Hist = (function(){
  var stack=[], ptr=-1, MAX=20;

  function push(){
    var s=JSON.parse(JSON.stringify(G.space.widgets));
    if(ptr<stack.length-1) stack=stack.slice(0,ptr+1);
    stack.push(s); if(stack.length>MAX) stack.shift();
    ptr=stack.length-1; upd();
  }
  function undo(){ if(ptr<=0)return toast('Nothing to undo'); ptr--; restore(); toast('Undo'); }
  function redo(){ if(ptr>=stack.length-1)return toast('Nothing to redo'); ptr++; restore(); toast('Redo'); }
  function reset(){ stack=[]; ptr=-1; push(); upd(); }
  function restore(){ G.space.widgets=JSON.parse(JSON.stringify(stack[ptr])); Render.all(); G.save(); upd(); }
  function upd(){
    ['undo-s','undo-t'].forEach(function(id){ var b=document.getElementById(id); if(b) b.disabled=ptr<=0; });
    ['redo-s','redo-t'].forEach(function(id){ var b=document.getElementById(id); if(b) b.disabled=ptr>=stack.length-1; });
  }
  return {push,undo,redo,reset};
})();

// ════════════════════════════════════════════════════════
// BACKGROUND
// ════════════════════════════════════════════════════════
const BG = (function(){
  var parOn=false;

  function apply(){
    var bg=G.space.bg;
    var l=document.getElementById('bg-layer'), o=document.getElementById('bg-ov');
    if(bg.type==='gradient'){ l.style.background=bg.value; l.style.backgroundSize=''; }
    else { l.style.background="url('"+bg.value+"') center/cover no-repeat"; }
    l.style.filter='blur('+(bg.blur||0)+'px) brightness('+(bg.brightness||100)+'%)';
    o.style.background='rgba(0,0,0,'+((bg.dim||0)/100)+')';
    document.getElementById('bg-blur').value=bg.blur||0;
    document.getElementById('bg-bright').value=bg.brightness||100;
    document.getElementById('bg-dim').value=bg.dim||0;
    document.getElementById('bg-par').checked=bg.parallax||false;
    if(bg.parallax) startPar(); else stopPar();
  }

  function renderPresets(){
    var g=document.getElementById('preset-grid'); g.innerHTML='';
    BG_PRESETS.forEach(function(v){
      var sw=document.createElement('div');
      sw.className='psw'+(G.space.bg.value===v?' on':'');
      sw.style.background=v;
      sw.addEventListener('click',function(){
        document.querySelectorAll('.psw').forEach(function(s){s.classList.remove('on');});
        sw.classList.add('on');
        G.space.bg.type='gradient'; G.space.bg.value=v;
        apply(); G.save();
      });
      g.appendChild(sw);
    });
  }

  function startPar(){
    if(parOn) return; parOn=true;
    if(window.DeviceOrientationEvent && typeof DeviceOrientationEvent.requestPermission==='function'){
      DeviceOrientationEvent.requestPermission().then(function(r){ if(r==='granted') window.addEventListener('deviceorientation',gyro,{passive:true}); });
    } else if('ontouchstart' in window){ window.addEventListener('deviceorientation',gyro,{passive:true}); }
    else { window.addEventListener('mousemove',mouse); }
  }
  function stopPar(){
    parOn=false;
    window.removeEventListener('deviceorientation',gyro);
    window.removeEventListener('mousemove',mouse);
    document.getElementById('bg-layer').style.transform='';
  }
  function gyro(e){ var x=clamp(e.gamma||0,-15,15),y=clamp((e.beta||0)-45,-15,15); document.getElementById('bg-layer').style.transform='translate('+x*.5+'px,'+y*.5+'px) scale(1.05)'; }
  function mouse(e){ var cx=window.innerWidth/2,cy=window.innerHeight/2,dx=(e.clientX-cx)/cx,dy=(e.clientY-cy)/cy; document.getElementById('bg-layer').style.transform='translate('+dx*-15+'px,'+dy*-15+'px) scale(1.05)'; }

  document.getElementById('bg-blur').addEventListener('input',function(e){ G.space.bg.blur=parseInt(e.target.value); apply(); G.save(); });
  document.getElementById('bg-bright').addEventListener('input',function(e){ G.space.bg.brightness=parseInt(e.target.value); apply(); G.save(); });
  document.getElementById('bg-dim').addEventListener('input',function(e){ G.space.bg.dim=parseInt(e.target.value); apply(); G.save(); });
  document.getElementById('bg-par').addEventListener('change',function(e){ G.space.bg.parallax=e.target.checked; G.save(); if(e.target.checked)startPar();else stopPar(); });
  document.getElementById('bg-file').addEventListener('change',function(e){
    var f=e.target.files[0]; if(!f) return;
    var r=new FileReader(); r.onload=function(ev){ G.space.bg.type='image'; G.space.bg.value=ev.target.result; apply(); G.save(); renderPresets(); }; r.readAsDataURL(f);
  });

  return {apply,renderPresets};
})();

const Ctx = {
  w:null,
  show(x,y,w){
    this.w=w;
    document.getElementById('ctx-lock').textContent=w.locked?'Unlock':'Lock';
    var m=document.getElementById('ctx');
    m.style.display='block'; m.style.left=x+'px'; m.style.top=y+'px';
    var r=m.getBoundingClientRect();
    if(r.right>window.innerWidth) m.style.left=(x-r.width)+'px';
    if(r.bottom>window.innerHeight) m.style.top=(y-r.height)+'px';
  },
  hide(){ document.getElementById('ctx').style.display='none'; this.w=null; },
  do(act){
    var w=this.w; this.hide(); if(!w) return;
    var el=document.querySelector('.widget[data-id="'+w.id+'"]');
    if(act==='del') delWidget(w.id);
    else if(act==='dup') dupWidget(w);
    else if(act==='fwd'){ w.z=++G.zCtr; if(el) el.style.zIndex=w.z; G.save(); }
    else if(act==='bk'){ w.z=Math.max(1,(w.z||10)-2); if(el) el.style.zIndex=w.z; G.save(); }
    else if(act==='lock'){ w.locked=!w.locked; if(el) el.classList.toggle('locked-note',w.locked); G.save(); }
    else if(act==='connect'){ G.connectMode=true; G.connectSrc=w.id; toast('Tap another widget to connect'); }
  }
};
document.querySelectorAll('.ci').forEach(function(el){
  el.addEventListener('click',function(){ Ctx.do(this.dataset.a); });
});
document.addEventListener('click',function(e){ if(!e.target.closest('#ctx')) Ctx.hide(); });
document.addEventListener('touchstart',function(e){ if(!e.target.closest('#ctx')) Ctx.hide(); },{passive:true});

// ════════════════════════════════════════════════════════
// WIDGET HELPERS
// ════════════════════════════════════════════════════════
function findW(id){ return G.space.widgets.find(function(w){ return w.id===id; }); }
function updW(id,patch){ var w=findW(id); if(!w)return; Object.assign(w,patch); G.save(); }

function addWidget(type){
  var m=WMETA[type];
  var cx=(window.innerWidth/2-VP.tx)/VP.scale;
  var cy=(window.innerHeight/2-VP.ty)/VP.scale;
  var w={
    id:uid(), type:type,
    x:snap(cx-m.w/2+(Math.random()-.5)*60),
    y:snap(cy-m.h/2+(Math.random()-.5)*60),
    width:m.w, height:m.h, z:++G.zCtr,
    color:'yellow', font:'DM Sans', content:'', tags:[], locked:false,
    createdAt:Date.now()
  };
  if(type==='todo') w.items=[];
  if(type==='habit') w.habits=[];
  if(type==='reminder') w.reminders=[];
  if(type==='pomodoro'){ w.pomWork=25; w.pomBreak=5; w.pomLeft=1500; w.pomSess='work'; }
  if(type==='calendar'){ w.calY=new Date().getFullYear(); w.calM=new Date().getMonth(); }
  if(type==='ambient') w.playing=null;
  Hist.push();
  G.space.widgets.push(w);
  var el=buildEl(w);
  document.getElementById('cv').appendChild(el);
  if(!G.editMode) G.toggleEdit();
  G.save(); return w;
}

function delWidget(id){
  Hist.push();
  G.space.widgets=G.space.widgets.filter(function(w){ return w.id!==id; });
  var el=document.querySelector('.widget[data-id="'+id+'"]');
  if(el){ el.style.animation='wout .18s ease forwards'; setTimeout(function(){ el.remove(); },180); }
  G.space.connections=(G.space.connections||[]).filter(function(c){ return c.a!==id&&c.b!==id; });
  Conn.render(); G.save();
}

function dupWidget(w){
  Hist.push();
  var n=JSON.parse(JSON.stringify(w));
  n.id=uid(); n.x=snap(w.x+24); n.y=snap(w.y+24); n.z=++G.zCtr;
  G.space.widgets.push(n);
  document.getElementById('cv').appendChild(buildEl(n));
  G.save();
}

function selW(el,w){
  document.querySelectorAll('.widget.sel').forEach(function(e){ e.classList.remove('sel'); });
  el.classList.add('sel'); w.z=++G.zCtr; el.style.zIndex=w.z;
}

// ════════════════════════════════════════════════════════
// BUILD WIDGET ELEMENT
// ════════════════════════════════════════════════════════
function buildEl(w){
  var el=document.createElement('div');
  el.className='widget '+w.type+'-widget';
  el.dataset.id=w.id;
  el.style.left=w.x+'px'; el.style.top=w.y+'px';
  el.style.width=w.width+'px'; el.style.height=w.height+'px';
  el.style.zIndex=w.z||10;
  if(w.color) el.dataset.color=w.color;
  if(w.faded) el.classList.add('faded');

  // Drag handle
  var dh=document.createElement('div'); dh.className='wh-bar';
  dh.innerHTML='<div class="wh-dots"><span></span><span></span><span></span><span></span><span></span><span></span></div><div class="wh-sp"></div><button class="wh-del" title="Delete"><i class="fas fa-trash-alt"></i></button>';
  dh.querySelector('.wh-del').addEventListener('click',function(e){ e.stopPropagation(); delWidget(w.id); });
  el.appendChild(dh);

  // Body
  var body=document.createElement('div'); body.className='wb'; body.style.height='100%';
  body.appendChild(buildInner(w));
  el.appendChild(body);

  // Resize
  var rh=document.createElement('div'); rh.className='wrz'; el.appendChild(rh);

  // Connect mode click
  el.addEventListener('click',function(){
    if(!G.connectMode) return;
    if(G.connectSrc===w.id){ G.connectMode=false; G.connectSrc=null; return; }
    if(!G.space.connections) G.space.connections=[];
    var ex=G.space.connections.find(function(c){ return (c.a===G.connectSrc&&c.b===w.id)||(c.a===w.id&&c.b===G.connectSrc); });
    if(!ex){ G.space.connections.push({a:G.connectSrc,b:w.id}); Conn.render(); G.save(); toast('Connected! Click line to remove.'); }
    G.connectMode=false; G.connectSrc=null;
  });

  // Drag
  attachDrag(dh,el,w);
  // Resize
  attachResize(rh,el,w);
  // Long press
  attachLP(el,w);
  // Select
  el.addEventListener('mousedown',function(){ if(G.editMode) selW(el,w); });
  el.addEventListener('touchstart',function(){ if(G.editMode) selW(el,w); },{passive:true});
  // Right-click
  el.addEventListener('contextmenu',function(e){ e.preventDefault(); Ctx.show(e.clientX,e.clientY,w); });

  if(!G.editMode) el.classList.add('locked');
  return el;
}

// ════════════════════════════════════════════════════════
// WIDGET INNER CONTENT
// ════════════════════════════════════════════════════════
function buildInner(w){
  var wrap=document.createElement('div'); wrap.style.height='100%';
  var id=w.id;

  if(w.type==='note'){
    var html='<div class="wh"><i class="'+WMETA.note.icon+'"></i>Note<span class="whs"></span><select class="note-fsz">';
    NFONTS.forEach(function(f){ html+='<option'+(w.font===f?' selected':'')+'>'+f+'</option>'; });
    html+='</select></div><textarea class="note-ta" placeholder="Write something…" style="font-family:'+( w.font||'DM Sans')+'">'+( w.content||'')+'</textarea><div class="note-colors">';
    NCOLORS.forEach(function(c){ html+='<div class="nc'+(w.color===c?' on':'')+'" style="background:'+CMAP[c]+'" data-c="'+c+'"></div>'; });
    html+='</div>';
    wrap.innerHTML=html;
    var ta=wrap.querySelector('.note-ta');
    ta.addEventListener('input',function(){ updW(id,{content:ta.value}); });
    ta.addEventListener('touchstart',function(e){ e.stopPropagation(); },{passive:true});
    ta.addEventListener('mousedown',function(e){ if(G.editMode) e.stopPropagation(); });
    wrap.querySelector('.note-fsz').addEventListener('change',function(){
      updW(id,{font:this.value});
      var t=document.querySelector('.widget[data-id="'+id+'"] .note-ta');
      if(t) t.style.fontFamily=this.value;
    });
    wrap.querySelectorAll('.nc').forEach(function(dot){
      dot.addEventListener('click',function(){ setNoteColor(id,this.dataset.c); });
    });
  }

  else if(w.type==='clock'){
    wrap.innerHTML='<div class="wh"><i class="'+WMETA.clock.icon+'"></i>Clock</div><div class="clock-body"><div class="clk-t" id="clk-'+id+'">--:--:--</div><div class="clk-d" id="clkd-'+id+'"></div></div>';
    tickClock(id);
  }

  else if(w.type==='todo'){
    var items=w.items||[];
    var html='<div class="wh"><i class="'+WMETA.todo.icon+'"></i>To-Do</div><div class="todo-body"><div class="todo-list" id="tdl-'+id+'">';
    items.forEach(function(i){ html+=todoItemHTML(id,i); });
    html+='</div><div class="todo-add"><input placeholder="Add item…"><button class="ta-btn"><i class="fas fa-plus"></i></button></div></div>';
    wrap.innerHTML=html;
    var inp=wrap.querySelector('.todo-add input');
    var btn=wrap.querySelector('.ta-btn');
    inp.addEventListener('keydown',function(e){ if(e.key==='Enter'&&!e.shiftKey){ e.preventDefault(); addTodoItem(id,inp); } });
    inp.addEventListener('touchstart',function(e){ e.stopPropagation(); },{passive:true});
    inp.addEventListener('mousedown',function(e){ if(G.editMode) e.stopPropagation(); });
    btn.addEventListener('click',function(){ addTodoItem(id,inp); });
    wrap.querySelector('.todo-body').addEventListener('touchstart',function(e){ e.stopPropagation(); },{passive:true});
  }

  else if(w.type==='image'){
    var has=w.url&&w.url.length;
    wrap.innerHTML='<div class="img-body">'+(has?'<img src="'+w.url+'" alt="">':'<div class="img-ph"><i class="fas fa-image"></i><span>Tap to add</span></div>')+'</div><input type="file" id="iu-'+id+'" accept="image/*" style="display:none">';
    var finp=wrap.querySelector('#iu-'+id);
    finp.addEventListener('change',function(e){
      var f=e.target.files[0]; if(!f) return;
      var r=new FileReader(); r.onload=function(ev){ updW(id,{url:ev.target.result}); Render.one(id); G.save(); }; r.readAsDataURL(f);
    });
    var ib=wrap.querySelector('.img-body');
    ib.addEventListener('click',function(){ if(G.editMode||!has) finp.click(); });
  }

  else if(w.type==='quote'){
    wrap.innerHTML='<div class="wh"><i class="'+WMETA.quote.icon+'"></i>Quote</div><div class="quote-body"><div class="qt" contenteditable="true">'+( w.content||'Your quote here…')+'</div><div class="qa" contenteditable="true">— '+(w.author||'Author')+'</div></div>';
    wrap.querySelector('.qt').addEventListener('blur',function(){ updW(id,{content:this.textContent}); });
    wrap.querySelector('.qa').addEventListener('blur',function(){ updW(id,{author:this.textContent}); });
    wrap.querySelectorAll('[contenteditable]').forEach(function(ce){
      ce.addEventListener('touchstart',function(e){ e.stopPropagation(); },{passive:true});
      ce.addEventListener('mousedown',function(e){ if(G.editMode) e.stopPropagation(); });
    });
  }

  else if(w.type==='music'){
    if(w.embedUrl){
      wrap.innerHTML='<div class="music-body"><iframe src="'+w.embedUrl+'" allow="autoplay;clipboard-write;encrypted-media;fullscreen;picture-in-picture" loading="lazy"></iframe></div>';
    } else {
      wrap.innerHTML='<div class="wh"><i class="'+WMETA.music.icon+'" style="color:#1DB954"></i>Music</div><div class="music-setup"><div style="font-size:11px;color:var(--text2)">Paste Spotify URL:</div><input class="music-in" id="ms-'+id+'" placeholder="https://open.spotify.com/…" inputmode="url"><button class="music-go">Load</button></div>';
      var mi=wrap.querySelector('#ms-'+id);
      mi.addEventListener('touchstart',function(e){ e.stopPropagation(); },{passive:true});
      mi.addEventListener('mousedown',function(e){ if(G.editMode) e.stopPropagation(); });
      wrap.querySelector('.music-go').addEventListener('click',function(){ loadMusic(id); });
    }
  }

  else if(w.type==='pomodoro'){ buildPomo(w,wrap); }
  else if(w.type==='habit'){ buildHabit(w,wrap); }
  else if(w.type==='calendar'){ buildCal(w,wrap); }
  else if(w.type==='ambient'){ buildAmbient(w,wrap); }
  else if(w.type==='reminder'){ buildReminder(w,wrap); }

  return wrap;
}

var pomoTimers={};
function buildPomo(w,wrap){
  var r=42, c=2*Math.PI*r;
  wrap.innerHTML='<div class="wh"><i class="'+WMETA.pomodoro.icon+'"></i>Pomodoro</div><div class="pomo-body"><div class="pomo-ring"><svg width="90" height="90" viewBox="0 0 90 90"><circle class="pbg" cx="45" cy="45" r="'+r+'"/><circle class="ppr" id="pr-'+w.id+'" cx="45" cy="45" r="'+r+'" stroke-dasharray="'+c+'" stroke-dashoffset="0"/></svg><div class="ptime" id="pt-'+w.id+'">--:--</div></div><div class="plbl" id="pl-'+w.id+'">'+( w.pomSess||'work')+'</div><div class="pbtns"><button class="pbtn" id="pst-'+w.id+'"><i class="fas fa-play"></i></button><button class="pbtn" id="ppau-'+w.id+'"><i class="fas fa-pause"></i></button><button class="pbtn" id="prs-'+w.id+'"><i class="fas fa-redo"></i></button></div><div class="pcfg">Work <input type="number" min="1" max="60" value="'+(w.pomWork||25)+'"> Break <input type="number" min="1" max="30" value="'+(w.pomBreak||5)+'"></div></div>';
  var inputs=wrap.querySelectorAll('.pcfg input');
  inputs[0].addEventListener('change',function(){ updW(w.id,{pomWork:+this.value}); });
  inputs[1].addEventListener('change',function(){ updW(w.id,{pomBreak:+this.value}); });
  wrap.querySelector('#pst-'+w.id).addEventListener('click',function(){ pomoAct(w.id,'start'); });
  wrap.querySelector('#ppau-'+w.id).addEventListener('click',function(){ pomoAct(w.id,'pause'); });
  wrap.querySelector('#prs-'+w.id).addEventListener('click',function(){ pomoAct(w.id,'reset'); });
  pomoUpd(w.id);
}
function pomoAct(id,act){
  var w=findW(id); if(!w) return;
  if(act==='start'){
    clearInterval(pomoTimers[id]);
    document.getElementById('pst-'+id)&&document.getElementById('pst-'+id).classList.add('on');
    pomoTimers[id]=setInterval(function(){
      w.pomLeft--; if(w.pomLeft<=0){
        clearInterval(pomoTimers[id]);
        document.getElementById('pst-'+id)&&document.getElementById('pst-'+id).classList.remove('on');
        w.pomSess=w.pomSess==='work'?'break':'work';
        w.pomLeft=(w.pomSess==='work'?w.pomWork:w.pomBreak)*60;
        toast('Pomodoro: '+w.pomSess+' time!');
      }
      pomoUpd(id); G.save();
    },1000);
  } else if(act==='pause'){
    clearInterval(pomoTimers[id]);
    document.getElementById('pst-'+id)&&document.getElementById('pst-'+id).classList.remove('on');
  } else {
    clearInterval(pomoTimers[id]);
    document.getElementById('pst-'+id)&&document.getElementById('pst-'+id).classList.remove('on');
    w.pomLeft=(w.pomWork||25)*60; w.pomSess='work'; pomoUpd(id); G.save();
  }
}
function pomoUpd(id){
  var w=findW(id); if(!w) return;
  var te=document.getElementById('pt-'+id); if(!te) return;
  var m=Math.floor(w.pomLeft/60),s=w.pomLeft%60;
  te.textContent=String(m).padStart(2,'0')+':'+String(s).padStart(2,'0');
  var le=document.getElementById('pl-'+id); if(le) le.textContent=w.pomSess||'work';
  var re=document.getElementById('pr-'+id); if(!re) return;
  var r=42,c=2*Math.PI*r, tot=(w.pomSess==='work'?w.pomWork:w.pomBreak)*60||1500;
  re.style.strokeDashoffset=c*(1-w.pomLeft/tot);
}

function buildCal(w,wrap){
  var now=new Date(), y=w.calY||now.getFullYear(), m=w.calM!=null?w.calM:now.getMonth();
  var first=new Date(y,m,1).getDay(), dim=new Date(y,m+1,0).getDate();
  var cells='';
  for(var i=0;i<first;i++) cells+='<div class="cal-day other">'+new Date(y,m,-(first-i-1)).getDate()+'</div>';
  for(var d=1;d<=dim;d++){
    var today=d===now.getDate()&&m===now.getMonth()&&y===now.getFullYear();
    cells+='<div class="cal-day'+(today?' today':'')+'">'+ d+'</div>';
  }
  wrap.innerHTML='<div class="wh"><i class="'+WMETA.calendar.icon+'"></i>Calendar</div><div class="cal-body"><div class="cal-hdr"><button class="cal-nav" data-d="-1"><i class="fas fa-chevron-left"></i></button><span class="cal-mo">'+MONTHS[m]+' '+y+'</span><button class="cal-nav" data-d="1"><i class="fas fa-chevron-right"></i></button></div><div class="cal-grid">'+DAYS.map(function(d){return '<div class="cal-dl">'+d+'</div>';}).join('')+cells+'</div></div>';
  wrap.querySelectorAll('.cal-nav').forEach(function(btn){
    btn.addEventListener('click',function(){
      var dir=parseInt(this.dataset.d);
      var nm=(w.calM!=null?w.calM:new Date().getMonth())+dir;
      var ny=w.calY||new Date().getFullYear();
      if(nm<0){nm=11;ny--;} if(nm>11){nm=0;ny++;}
      updW(w.id,{calM:nm,calY:ny}); Render.one(w.id);
    });
  });
}

var clkTimers={};
function tickClock(id){
  clearInterval(clkTimers[id]);
  function upd(){
    var el=document.getElementById('clk-'+id); if(!el){clearInterval(clkTimers[id]);return;}
    var now=new Date();
    el.textContent=[now.getHours(),now.getMinutes(),now.getSeconds()].map(function(n){return String(n).padStart(2,'0');}).join(':');
    var de=document.getElementById('clkd-'+id);

  }
  upd(); clkTimers[id]=setInterval(upd,1000);
}

// ════════════════════════════════════════════════════════
// DRAG & RESIZE
// ════════════════════════════════════════════════════════
function attachDrag(handle,el,w){
  // Mouse
  handle.addEventListener('mousedown',function(e){
    if(!G.editMode) return;
    e.preventDefault(); e.stopPropagation();
    selW(el,w); el.classList.add('drag');
    var sx=e.clientX-w.x*VP.scale, sy=e.clientY-w.y*VP.scale;
    function mm(ev){
      w.x=snap(Math.max(0,(ev.clientX-sx)/VP.scale));
      w.y=snap(Math.max(0,(ev.clientY-sy)/VP.scale));
      el.style.left=w.x+'px'; el.style.top=w.y+'px';
      Conn.render();
    }
    function mu(){ el.classList.remove('drag'); document.removeEventListener('mousemove',mm); document.removeEventListener('mouseup',mu); G.save(); Hist.push(); }
    document.addEventListener('mousemove',mm); document.addEventListener('mouseup',mu);
  });
  // Touch
  handle.addEventListener('touchstart',function(e){
    if(!G.editMode) return;
    e.stopPropagation();
    var t=e.touches[0]; selW(el,w); el.classList.add('drag');
    var sx=t.clientX-w.x*VP.scale, sy=t.clientY-w.y*VP.scale;
    function mm(ev){
      ev.preventDefault();
      var t2=ev.touches[0];
      w.x=snap(Math.max(0,(t2.clientX-sx)/VP.scale));
      w.y=snap(Math.max(0,(t2.clientY-sy)/VP.scale));
      el.style.left=w.x+'px'; el.style.top=w.y+'px';
      Conn.render();
    }
    function mu(){ el.classList.remove('drag'); document.removeEventListener('touchmove',mm); document.removeEventListener('touchend',mu); G.save(); Hist.push(); }
    document.addEventListener('touchmove',mm,{passive:false}); document.addEventListener('touchend',mu);
  },{passive:true});
}

function attachResize(handle,el,w){
  handle.addEventListener('mousedown',function(e){
    if(!G.editMode) return;
    e.preventDefault(); e.stopPropagation();
    var sw=w.width,sh=w.height,sx=e.clientX,sy=e.clientY;
    function mm(ev){
      w.width=snap(Math.max(140,sw+(ev.clientX-sx)/VP.scale));
      w.height=snap(Math.max(70,sh+(ev.clientY-sy)/VP.scale));
      el.style.width=w.width+'px'; el.style.height=w.height+'px';
    }
    function mu(){ document.removeEventListener('mousemove',mm); document.removeEventListener('mouseup',mu); G.save(); Hist.push(); }
    document.addEventListener('mousemove',mm); document.addEventListener('mouseup',mu);
  });
  handle.addEventListener('touchstart',function(e){
    if(!G.editMode) return;
    e.preventDefault(); e.stopPropagation();
    var t=e.touches[0],sw=w.width,sh=w.height,sx=t.clientX,sy=t.clientY;
    function mm(ev){
      ev.preventDefault();
      var t2=ev.touches[0];
      w.width=snap(Math.max(140,sw+(t2.clientX-sx)/VP.scale));
      w.height=snap(Math.max(70,sh+(t2.clientY-sy)/VP.scale));
      el.style.width=w.width+'px'; el.style.height=w.height+'px';
    }
    function mu(){ document.removeEventListener('touchmove',mm); document.removeEventListener('touchend',mu); G.save(); Hist.push(); }
    document.addEventListener('touchmove',mm,{passive:false}); document.addEventListener('touchend',mu);
  },{passive:false});
}

function attachLP(el,w){
  var t;
  el.addEventListener('touchstart',function(e){ t=setTimeout(function(){ var p=e.touches[0]; Ctx.show(p.clientX,p.clientY,w); },550); },{passive:true});
  el.addEventListener('touchmove',function(){ clearTimeout(t); },{passive:true});

// DRAWING
// ════════════════════════════════════════════════════════
const Draw = (function(){
  var ctx2, drawing=false, tool='pen', col='#4f9eff', sz=3;

  function init(){
    ctx2=document.getElementById('draw-cv').getContext('2d');
    ctx2.lineCap='round'; ctx2.lineJoin='round';
    load();
  }
  function load(){
    if(!ctx2) return;
    ctx2.clearRect(0,0,4000,4000);
    var d=G.space.drawData;
    if(d){ var img=new Image(); img.onload=function(){ctx2.drawImage(img,0,0);}; img.src=d; }
  }
  function save2(){ G.space.drawData=document.getElementById('draw-cv').toDataURL(); G.save(); }
  function toggle(){
    var on=!document.getElementById('draw-cv').classList.contains('on');
    document.getElementById('draw-cv').classList.toggle('on',on);
    document.getElementById('draw-btn').classList.toggle('on',on);
    document.getElementById('draw-bar').classList.toggle('on',on);
    G.drawMode=on;
  }
  function pos(e,touch){
    var t=touch?e.touches[0]:e;
    return {x:(t.clientX-VP.tx)/VP.scale, y:(t.clientY-VP.ty)/VP.scale};
  }
  var dc=document.getElementById('draw-cv');
  dc.addEventListener('mousedown',function(e){ if(!G.drawMode)return; var p=pos(e); drawing=true; ctx2.beginPath(); ctx2.moveTo(p.x,p.y); });
  dc.addEventListener('mousemove',function(e){ if(!G.drawMode||!drawing)return; var p=pos(e); if(tool==='eraser'){ctx2.clearRect(p.x-sz*3,p.y-sz*3,sz*6,sz*6);return;} ctx2.strokeStyle=col; ctx2.lineWidth=sz; ctx2.lineTo(p.x,p.y); ctx2.stroke(); ctx2.beginPath(); ctx2.moveTo(p.x,p.y); });
  dc.addEventListener('mouseup',function(){ if(drawing){drawing=false;save2();} });
  dc.addEventListener('touchstart',function(e){ if(!G.drawMode)return; e.preventDefault(); var p=pos(e,true); drawing=true; ctx2.beginPath(); ctx2.moveTo(p.x,p.y); },{passive:false});
  dc.addEventListener('touchmove',function(e){ if(!G.drawMode||!drawing)return; e.preventDefault(); var p=pos(e,true); if(tool==='eraser'){ctx2.clearRect(p.x-sz*3,p.y-sz*3,sz*6,sz*6);return;} ctx2.strokeStyle=col; ctx2.lineWidth=sz; ctx2.lineTo(p.x,p.y); ctx2.stroke(); ctx2.beginPath(); ctx2.moveTo(p.x,p.y); },{passive:false});
  dc.addEventListener('touchend',function(){ if(drawing){drawing=false;save2();} });

  // Draw bar buttons
  document.getElementById('dr-pen').addEventListener('click',function(){
    tool='pen'; this.classList.add('on'); document.getElementById('dr-era').classList.remove('on');
  });
  document.getElementById('dr-era').addEventListener('click',function(){
    tool='eraser'; this.classList.add('on'); document.getElementById('dr-pen').classList.remove('on');
  });
  document.getElementById('dr-clr').addEventListener('click',function(){
    ctx2.clearRect(0,0,4000,4000); save2();
  });
  document.getElementById('dr-sz').addEventListener('input',function(){ sz=parseInt(this.value); });
  document.querySelectorAll('.drcol').forEach(function(el){
    el.addEventListener('click',function(){
      col=this.dataset.c;
      document.querySelectorAll('.drcol').forEach(function(d){d.classList.remove('on');});
      this.classList.add('on');
    });
  });

  return {init,toggle,load};
})();

// ════════════════════════════════════════════════════════
// IO
// ════════════════════════════════════════════════════════
const IO = {
  _hist:[],
  exp(){
    var blob=new Blob([JSON.stringify({spaces:G.spaces,cur:G.cur},null,2)],{type:'application/json'});
    var a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='myspace.json'; a.click(); toast('Exported!');
  },
  imp(file){
    var r=new FileReader(); r.onload=function(ev){
      try{ var d=JSON.parse(ev.target.result); G.spaces=d.spaces||[]; G.cur=d.cur||0; Spaces.to(G.cur); G.save(); toast('Imported!'); }
      catch(e){ toast('Invalid file'); }
    }; r.readAsText(file);
  },
  push(){
    this._hist.push(JSON.stringify({spaces:G.spaces,ts:Date.now()}));
    if(this._hist.length>5) this._hist.shift();
    localStorage.setItem('msp6_hist',JSON.stringify(this._hist));
  },
  load(){ try{this._hist=JSON.parse(localStorage.getItem('msp6_hist')||'[]');}catch(e){} },
  hist(){
    if(!this._hist.length) return toast('No history yet');
    var msg='Restore version:\n';
    this._hist.forEach(function(v,i){ msg+=(i+1)+': '+new Date(JSON.parse(v).ts).toLocaleString()+'\n'; });
    var sel=prompt(msg+'Enter number:');
    if(!sel) return;
    var idx=parseInt(sel)-1;
    if(isNaN(idx)||idx<0||idx>=this._hist.length) return toast('Invalid');
    var d=JSON.parse(this._hist[idx]); G.spaces=d.spaces; G.cur=0; Spaces.to(0); G.save(); toast('Restored!');
  }
};
document.getElementById('import-file').addEventListener('change',function(e){ var f=e.target.files[0]; if(f) IO.imp(f); });
setInterval(function(){ IO.push(); },120000);

// ════════════════════════════════════════════════════════
// KEYBOARD SHORTCUTS
// ════════════════════════════════════════════════════════
document.addEventListener('keydown',function(e){
  if(e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA'||e.target.isContentEditable) return;
  var cmd=e.metaKey||e.ctrlKey;
  if(cmd&&e.key==='e'){ e.preventDefault(); G.toggleEdit(); }
  if(cmd&&e.key==='z'){ e.preventDefault(); e.shiftKey?Hist.redo():Hist.undo(); }
  if(cmd&&e.key==='d'){ e.preventDefault(); var s=document.querySelector('.widget.sel'); if(s){var w=findW(s.dataset.id);if(w)dupWidget(w);} }
  if(e.key==='Delete'||e.key==='Backspace'){ var s=document.querySelector('.widget.sel'); if(s) delWidget(s.dataset.id); }
  if(e.key==='Escape'){ Ctx.hide(); Sheets.closeAll(); G.connectMode=false; }
  if(cmd&&e.key==='0'){ e.preventDefault(); VP.reset(); }
});

// ════════════════════════════════════════════════════════
// INIT
// ════════════════════════════════════════════════════════
G.init();
IO.load();
VP.reset();
Spaces.to(G.cur);
Draw.init();
BG.apply();
Conn.render();
Hist.reset();

// Notification permission
if('Notification' in window) Notification.requestPermission();

// Default welcome widgets
if(G.space.widgets.length===0){
  var n=addWidget('note');
  n.x=60; n.y=80; n.width=270; n.height=230;
  n.content='Welcome to My Space 🌙\n\nPinch to zoom · drag background to pan\nTap ✏️ to edit · + to add widgets\nLong-press widget for options';

  var cl=addWidget('clock');
  cl.x=360; cl.y=80; cl.width=200; cl.height=118;

  var td=addWidget('todo');
  td.x=360; td.y=226; td.width=240; td.height=240;
  td.items=[{id:uid(),text:'Try the background panel',done:false},{id:uid(),text:'Add a Pomodoro timer',done:false},{id:uid(),text:'Enable drawing mode',done:false}];

  var q=addWidget('quote');
  q.x=60; q.y=340; q.width=270; q.height=160;
  q.content="Design is not just what it looks like — it's how it works.";
  q.author='Steve Jobs';

  G.save(); Render.all();
}

document.getElementById('spc-btn').textContent=G.space.name;
toast('My Space ready ✓');
</script>
