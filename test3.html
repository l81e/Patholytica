<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Patholytica — Create Article</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg-color: #1f1f1f;
            --text-primary: #fff;
            --text-secondary: #aaa;
            --card-bg: #1f1f1f;
            --hover-bg: #2a2a2a;
            --border-color: #303030;
            --accent: #3ea6ff;
            --accent-hover: #2d8ed6;
            --success: #2ecc71;
            --error: #e74c3c;
            --warning: #f39c12;
        }

        body.light-theme {
            --bg-color: #f9f9f9;
            --text-primary: #0f0f0f;
            --text-secondary: #606060;
            --card-bg: #f9f9f9;
            --hover-bg: #f0f0f0;
            --border-color: #e5e5e5;
            --accent: #065fd4;
            --accent-hover: #0448a3;
            --success: #27ae60;
            --error: #c0392b;
            --warning: #e67e22;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-color);
            color: var(--text-primary);
            transition: background 0.2s ease, color 0.2s ease;
        }

        .app-container {
            position: fixed;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            max-width: 450px;
            height: 100vh;
            background: var(--bg-color);
            overflow-y: auto;
        }

        .app-container::-webkit-scrollbar { width: 4px; }
        .app-container::-webkit-scrollbar-track { background: var(--border-color); }
        .app-container::-webkit-scrollbar-thumb { background: var(--text-secondary); border-radius: 2px; }

        .header-bar {
            position: sticky;
            top: 0;
            background: var(--bg-color);
            border-bottom: 1px solid var(--border-color);
            padding: 12px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            z-index: 50;
        }

        .back-btn {
            width: 36px; height: 36px;
            border-radius: 50%;
            background: var(--hover-bg);
            border: none;
            color: var(--text-primary);
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            font-size: 18px;
            transition: background 0.2s ease;
        }
        .back-btn:hover { background: var(--border-color); }

        .header-actions { display: flex; gap: 12px; }

        .icon-btn {
            width: 36px; height: 36px;
            border-radius: 50%;
            background: var(--hover-bg);
            border: none;
            color: var(--text-primary);
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            font-size: 16px;
            transition: background 0.2s ease;
        }
        .icon-btn:hover { background: var(--border-color); }

        .publish-btn {
            padding: 8px 20px;
            border-radius: 24px;
            background: var(--accent);
            color: white;
            border: none;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.2s ease;
        }
        .publish-btn:hover { background: var(--accent-hover); }
        .publish-btn:disabled { opacity: 0.5; cursor: not-allowed; }

        .editor-wrapper {
            padding: 20px;
            padding-bottom: 100px;
        }

        .title-wrapper { position: relative; margin-bottom: 16px; }

        .article-title-input {
            font-size: 32px;
            font-weight: 700;
            color: var(--text-primary);
            line-height: 1.2;
            border: none;
            outline: none;
            background: transparent;
            width: 100%;
            resize: none;
            overflow: hidden;
            padding: 0;
            font-family: inherit;
        }
        .article-title-input::placeholder { color: var(--text-secondary); opacity: 0.5; }
        .article-title-input.over-limit { color: var(--error); }

        .char-counter {
            font-size: 12px;
            color: var(--text-secondary);
            text-align: right;
            margin-top: 4px;
            transition: color 0.2s ease;
        }
        .char-counter.warning { color: var(--warning); }
        .char-counter.over { color: var(--error); font-weight: 600; }

        .content-item { margin-bottom: 14px; }

        .content-line {
            font-size: 16px;
            line-height: 1.6;
            position: relative;
            display: flex;
            align-items: flex-start;
            gap: 8px;
        }

        .content-block { flex: 1; }

        .content-editable {
            outline: none;
            min-height: 1.6em;
            word-wrap: break-word;
            overflow-wrap: break-word;
            width: 100%;
            cursor: text;
            color: var(--text-primary);
        }
        .content-editable:empty::before {
            content: 'Start writing...';
            color: var(--text-secondary);
            opacity: 0.5;
        }
        .content-editable:focus {
            background: var(--hover-bg);
            padding: 4px 8px;
            margin: -4px -8px;
            border-radius: 4px;
        }
        .content-editable.over-limit { border-bottom: 2px solid var(--error); }

        .block-footer {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            gap: 8px;
            margin-top: 4px;
        }

        .block-char-counter {
            font-size: 11px;
            color: var(--text-secondary);
            transition: color 0.2s ease;
        }
        .block-char-counter.warning { color: var(--warning); }
        .block-char-counter.over { color: var(--error); font-weight: 600; }

        .line-actions { display: flex; gap: 4px; }

        .line-btn {
            width: 28px; height: 28px; min-width: 28px;
            border-radius: 50%;
            background: var(--hover-bg);
            border: 1px solid var(--border-color);
            color: var(--text-secondary);
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            font-size: 12px;
            transition: all 0.2s ease;
            flex-shrink: 0;
        }
        .line-btn:hover { background: var(--border-color); color: var(--accent); }

        .media-embed {
            margin: 16px 0;
            max-width: 100%;
            position: relative;
        }
        .media-embed img {
            width: 100%;
            max-width: 100%;
            height: auto;
            border-radius: 8px;
            display: block;
        }
        .media-caption {
            font-size: 13px;
            color: var(--text-secondary);
            margin-top: 6px;
            font-style: italic;
            outline: none;
            cursor: text;
        }
        .media-caption:empty::before { content: 'Add a caption...'; opacity: 0.5; }

        .remove-media-btn {
            position: absolute;
            top: 8px; right: 8px;
            width: 32px; height: 32px;
            border-radius: 50%;
            background: rgba(0,0,0,0.7);
            color: white;
            border: none;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            opacity: 0;
            transition: opacity 0.2s ease;
            z-index: 10;
        }
        .media-embed:hover .remove-media-btn { opacity: 1; }
        .remove-media-btn:hover { background: var(--error); }

        .media-limit-badge {
            position: absolute;
            top: 8px; left: 8px;
            background: rgba(0,0,0,0.7);
            color: white;
            font-size: 11px;
            padding: 3px 8px;
            border-radius: 12px;
            font-weight: 600;
        }

        /* ── PDF embed ── */
        .pdf-embed-block {
            background: var(--hover-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            overflow: hidden;
        }
        .pdf-embed-block iframe {
            width: 100%;
            height: 320px;
            border: none;
            display: block;
        }
        .pdf-embed-header {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px 14px;
            border-bottom: 1px solid var(--border-color);
        }
        .pdf-embed-header i {
            color: #e74c3c;
            font-size: 18px;
        }
        .pdf-embed-name {
            font-size: 13px;
            font-weight: 500;
            flex: 1;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            color: var(--text-primary);
        }
        .pdf-size-badge {
            font-size: 11px;
            color: var(--text-secondary);
            background: var(--border-color);
            padding: 2px 8px;
            border-radius: 10px;
            flex-shrink: 0;
        }

        /* ── YouTube embed ── */
        .yt-embed-block {
            background: var(--hover-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            overflow: hidden;
        }
        .yt-embed-block iframe {
            width: 100%;
            aspect-ratio: 16/9;
            border: none;
            display: block;
        }
        .yt-embed-header {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 14px;
            border-bottom: 1px solid var(--border-color);
        }
        .yt-embed-header i { color: #ff0000; font-size: 16px; }
        .yt-embed-title {
            font-size: 13px;
            font-weight: 500;
            flex: 1;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            color: var(--text-primary);
        }

        /* ── YouTube URL modal ── */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.6);
            z-index: 200;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .modal-overlay.show { display: flex; }
        .modal-box {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 24px;
            width: 100%;
            max-width: 400px;
        }
        .modal-title {
            font-size: 16px;
            font-weight: 700;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .modal-title i { color: #ff0000; }
        .modal-input {
            width: 100%;
            background: var(--hover-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 12px 14px;
            font-size: 14px;
            color: var(--text-primary);
            outline: none;
            font-family: inherit;
            margin-bottom: 16px;
        }
        .modal-input:focus { border-color: var(--accent); }
        .modal-input::placeholder { color: var(--text-secondary); }
        .modal-actions { display: flex; gap: 10px; }
        .modal-cancel {
            flex: 1;
            padding: 10px;
            border-radius: 8px;
            background: var(--hover-bg);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
        }
        .modal-confirm {
            flex: 1;
            padding: 10px;
            border-radius: 8px;
            background: #ff0000;
            border: none;
            color: white;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
        }
        .modal-confirm:hover { background: #cc0000; }

        /* ── Audio player ── */
        .custom-audio-player {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            max-width: 100%;
            border: 1px solid var(--border-color);
        }

        .play-btn {
            width: 44px; height: 44px;
            border-radius: 50%;
            background: var(--accent);
            border: none;
            color: white;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            font-size: 16px;
            transition: all 0.2s ease;
            flex-shrink: 0;
        }
        .play-btn:hover { background: var(--accent-hover); transform: scale(1.05); }

        .audio-info { flex: 1; min-width: 0; overflow: hidden; }

        .audio-title {
            font-size: 13px; font-weight: 500;
            margin-bottom: 8px;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
            color: var(--text-primary);
        }

        .waveform-container {
            position: relative;
            height: 32px;
            background: var(--hover-bg);
            border-radius: 4px;
            margin-bottom: 6px;
            cursor: pointer;
            overflow: hidden;
        }
        .waveform-progress {
            position: absolute; top: 0; left: 0;
            height: 100%;
            background: var(--accent);
            opacity: 0.3;
            transition: width 0.1s linear;
        }
        .waveform-bars {
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100%;
            display: flex; align-items: center; justify-content: space-around;
            padding: 0 4px;
        }
        .waveform-bar {
            width: 2px;
            background: var(--text-secondary);
            border-radius: 2px;
            opacity: 0.6;
        }
        .audio-time {
            display: flex; justify-content: space-between;
            font-size: 11px; color: var(--text-secondary);
        }

        /* ── Action bar ── */
        .action-bar {
            position: fixed;
            bottom: 0;
            left: 50%; transform: translateX(-50%);
            width: 100%; max-width: 450px;
            background: var(--card-bg);
            border-top: 1px solid var(--border-color);
            padding: 10px 16px;
            padding-bottom: calc(10px + env(safe-area-inset-bottom));
            display: flex;
            gap: 8px;
            z-index: 100;
            overflow-x: auto;
        }
        .action-bar::-webkit-scrollbar { display: none; }

        .action-btn {
            flex: 1;
            min-width: 60px;
            display: flex; align-items: center; justify-content: center; gap: 6px;
            background: var(--hover-bg);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            padding: 9px 12px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 13px; font-weight: 600;
            color: var(--text-primary);
            white-space: nowrap;
        }
        .action-btn:active { transform: scale(0.95); }
        .action-btn svg {
            width: 18px; height: 18px;
            stroke: var(--text-primary);
            fill: none; stroke-width: 2;
            flex-shrink: 0;
        }
        .action-btn i { font-size: 15px; }

        .divider { width: 1px; min-width: 1px; height: 24px; background: var(--border-color); align-self: center; }

        .notification {
            position: fixed;
            top: 70px;
            left: 50%; transform: translateX(-50%);
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 16px 20px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.3);
            z-index: 1000;
            display: none; align-items: center; gap: 12px;
            min-width: 300px; max-width: 400px;
        }
        .notification.show { display: flex; animation: slideDown 0.3s ease; }
        .notification.success { border-left: 4px solid var(--success); }
        .notification.error { border-left: 4px solid var(--error); }
        .notification.warning { border-left: 4px solid var(--warning); }

        @keyframes slideDown {
            from { transform: translateX(-50%) translateY(-100px); opacity: 0; }
            to { transform: translateX(-50%) translateY(0); opacity: 1; }
        }

        @media (max-width: 768px) {
            .editor-wrapper { padding: 16px; }
            .article-title-input { font-size: 28px; }
            .notification { left: 16px; right: 16px; transform: none; min-width: auto; max-width: none; }
            .notification.show { animation: slideDownMobile 0.3s ease; }
            @keyframes slideDownMobile {
                from { transform: translateY(-100px); opacity: 0; }
                to { transform: translateY(0); opacity: 1; }
            }
        }
    </style>
</head>
<body>

<div class="app-container" id="appContainer">
    <div class="header-bar">
        <button class="back-btn" onclick="goBack()">
            <i class="fas fa-arrow-left"></i>
        </button>
        <div class="header-actions">
            <button class="icon-btn" onclick="toggleTheme()" title="Toggle theme">
                <i class="fas fa-circle-half-stroke"></i>
            </button>
            <button class="publish-btn" id="publishBtn" onclick="publishArticle()">
                Publish
            </button>
        </div>
    </div>

    <div class="editor-wrapper" id="editorContainer">
        <div class="title-wrapper">
            <textarea class="article-title-input" id="articleTitle" placeholder="Article Title" rows="1"
                oninput="autoResizeTitle(this); updateTitleCounter()"></textarea>
            <div class="char-counter" id="titleCounter">0 / 60</div>
        </div>

        <div id="contentItems">
            <div class="content-item">
                <div class="content-line" data-line="1">
                    <div class="content-block">
                        <div class="content-editable" contenteditable="true"
                            oninput="updateBlockCounter(this)"></div>
                        <div class="block-footer">
                            <span class="block-char-counter">0 / 200</span>
                            <button class="line-btn" onclick="deleteLine(this)" title="Delete line">
                                <i class="fas fa-trash"></i>
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Action bar — now with PDF & YouTube -->
<div class="action-bar">
    <button class="action-btn" onclick="addNewParagraph()" title="Add text">
        <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
        <span>Text</span>
    </button>
    <div class="divider"></div>
    <label class="action-btn" title="Upload image">
        <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><polyline points="21 15 16 10 5 21"></polyline></svg>
        <span>Image</span>
        <input type="file" accept="image/*" onchange="handleImageUpload(event)" style="display:none;">
    </label>
    <label class="action-btn" title="Upload audio">
        <svg viewBox="0 0 24 24"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"></path><path d="M19 10v2a7 7 0 0 1-14 0v-2"></path><line x1="12" y1="19" x2="12" y2="23"></line><line x1="8" y1="23" x2="16" y2="23"></line></svg>
        <span>Audio</span>
        <input type="file" accept="audio/*" onchange="handleAudioUpload(event)" style="display:none;">
    </label>
    <label class="action-btn" title="Upload PDF">
        <i class="fas fa-file-pdf" style="color:#e74c3c;"></i>
        <span>PDF</span>
        <input type="file" accept="application/pdf" onchange="handlePdfUpload(event)" style="display:none;">
    </label>
    <button class="action-btn" onclick="openYouTubeModal()" title="Embed YouTube">
        <i class="fab fa-youtube" style="color:#ff0000;"></i>
        <span>YouTube</span>
    </button>
</div>

<!-- YouTube URL modal -->
<div class="modal-overlay" id="ytModal">
    <div class="modal-box">
        <div class="modal-title">
            <i class="fab fa-youtube"></i>
            Embed YouTube Video
        </div>
        <input class="modal-input" id="ytUrlInput" type="url"
            placeholder="https://www.youtube.com/watch?v=...">
        <div class="modal-actions">
            <button class="modal-cancel" onclick="closeYouTubeModal()">Cancel</button>
            <button class="modal-confirm" onclick="embedYouTube()">Embed</button>
        </div>
    </div>
</div>

<div class="notification" id="notification">
    <i class="fas fa-check-circle" style="font-size: 20px;"></i>
    <span id="notificationText"></span>
</div>

<script>
const TITLE_MAX    = 60;
const BLOCK_MAX    = 200;
const IMAGE_MAX_MB = 2;
const PDF_MAX_MB   = 10;
const AUDIO_MAX_SEC = 30;

let lineCounter = 1;

// ── Navigation / Theme ────────────────────────────────────
function goBack() {
    if (document.referrer && document.referrer.includes(window.location.host)) {
        window.history.back();
    } else {
        window.location.href = 'index.html';
    }
}

function toggleTheme() {
    document.body.classList.toggle('light-theme');
    localStorage.setItem("theme", document.body.classList.contains("light-theme") ? "light" : "dark");
}
if (localStorage.getItem("theme") === "light") document.body.classList.add("light-theme");

// ── Auto-resize ───────────────────────────────────────────
function autoResizeTitle(textarea) {
    textarea.style.height = 'auto';
    textarea.style.height = textarea.scrollHeight + 'px';
}

// ── Title counter ─────────────────────────────────────────
function updateTitleCounter() {
    const input   = document.getElementById('articleTitle');
    const counter = document.getElementById('titleCounter');
    if (input.value.length > TITLE_MAX) input.value = input.value.slice(0, TITLE_MAX);
    const len = input.value.length;
    counter.textContent = `${len} / ${TITLE_MAX}`;
    counter.className   = 'char-counter' + (len >= TITLE_MAX ? ' over' : len >= TITLE_MAX * 0.85 ? ' warning' : '');
    input.classList.toggle('over-limit', len >= TITLE_MAX);
    autoResizeTitle(input);
}

// ── Block counter ─────────────────────────────────────────
function updateBlockCounter(editable) {
    const len = editable.textContent.length;
    const footer = editable.closest('.content-block').querySelector('.block-char-counter');
    if (len > BLOCK_MAX) {
        editable.textContent = editable.textContent.slice(0, BLOCK_MAX);
        const sel = window.getSelection();
        const range = document.createRange();
        range.selectNodeContents(editable);
        range.collapse(false);
        sel.removeAllRanges();
        sel.addRange(range);
    }
    const current = Math.min(len, BLOCK_MAX);
    footer.textContent = `${current} / ${BLOCK_MAX}`;
    footer.className   = 'block-char-counter' + (current >= BLOCK_MAX ? ' over' : current >= BLOCK_MAX * 0.85 ? ' warning' : '');
    editable.classList.toggle('over-limit', current >= BLOCK_MAX);
}

// ── Lines ─────────────────────────────────────────────────
function addNewParagraph() {
    lineCounter++;
    const item = document.createElement('div');
    item.className = 'content-item';
    item.innerHTML = `
        <div class="content-line" data-line="${lineCounter}">
            <div class="content-block">
                <div class="content-editable" contenteditable="true" oninput="updateBlockCounter(this)"></div>
                <div class="block-footer">
                    <span class="block-char-counter">0 / ${BLOCK_MAX}</span>
                    <button class="line-btn" onclick="deleteLine(this)" title="Delete line">
                        <i class="fas fa-trash"></i>
                    </button>
                </div>
            </div>
        </div>`;
    document.getElementById('contentItems').appendChild(item);
    item.querySelector('.content-editable').focus();
}

function deleteLine(btn) {
    const item  = btn.closest('.content-item');
    const all   = document.querySelectorAll('.content-item .content-line');
    if (all.length > 1) item.remove();
    else showNotification('Cannot delete the last line', 'error');
}

// ── Image ─────────────────────────────────────────────────
function handleImageUpload(event) {
    const file = event.target.files[0];
    if (!file) return;
    if (file.size > IMAGE_MAX_MB * 1024 * 1024) {
        showNotification(`Images must be under ${IMAGE_MAX_MB} MB`, 'error');
        event.target.value = '';
        return;
    }
    const reader = new FileReader();
    reader.onload = function(e) {
        const sizeText = file.size >= 1024 * 1024
            ? `${(file.size / 1024 / 1024).toFixed(1)} MB`
            : `${(file.size / 1024).toFixed(0)} KB`;
        const item = document.createElement('div');
        item.className = 'content-item';
        item.innerHTML = `
            <div class="media-embed">
                <button class="remove-media-btn" onclick="removeMedia(this)"><i class="fas fa-times"></i></button>
                <span class="media-limit-badge"><i class="fas fa-image"></i> ${sizeText}</span>
                <img src="${e.target.result}" alt="Uploaded image">
                <div class="media-caption" contenteditable="true"></div>
            </div>`;
        document.getElementById('contentItems').appendChild(item);
    };
    reader.readAsDataURL(file);
    event.target.value = '';
}

// ── Audio ─────────────────────────────────────────────────
function handleAudioUpload(event) {
    const file = event.target.files[0];
    if (!file) return;
    const tempUrl   = URL.createObjectURL(file);
    const tempAudio = new Audio(tempUrl);
    tempAudio.addEventListener('loadedmetadata', function() {
        URL.revokeObjectURL(tempUrl);
        if (tempAudio.duration > AUDIO_MAX_SEC) {
            showNotification(`Audio must be ${AUDIO_MAX_SEC}s or less (yours is ${Math.round(tempAudio.duration)}s)`, 'error');
            event.target.value = '';
            return;
        }
        const reader = new FileReader();
        reader.onload = function(e) {
            const audioId = 'audio-' + Math.random().toString(36).substr(2, 9);
            const dur  = Math.floor(tempAudio.duration);
            const dStr = `${Math.floor(dur/60)}:${(dur%60).toString().padStart(2,'0')}`;
            const item = document.createElement('div');
            item.className = 'content-item';
            item.innerHTML = `
                <div class="media-embed">
                    <button class="remove-media-btn" onclick="removeMedia(this)"><i class="fas fa-times"></i></button>
                    <div class="custom-audio-player">
                        <button class="play-btn" onclick="toggleAudio(this,'${audioId}')"><i class="fas fa-play"></i></button>
                        <div class="audio-info">
                            <div class="audio-title">${file.name}</div>
                            <div class="waveform-container" onclick="seekAudio(event,this,'${audioId}')">
                                <div class="waveform-progress"></div>
                                <div class="waveform-bars">
                                    ${Array(15).fill(0).map(()=>`<div class="waveform-bar" style="height:${Math.random()*60+20}%"></div>`).join('')}
                                </div>
                            </div>
                            <div class="audio-time">
                                <span class="current-time">0:00</span>
                                <span class="duration">${dStr}</span>
                            </div>
                        </div>
                        <audio id="${audioId}" src="${e.target.result}" style="display:none;"></audio>
                    </div>
                    <div class="media-caption" contenteditable="true"></div>
                </div>`;
            document.getElementById('contentItems').appendChild(item);
        };
        reader.readAsDataURL(file);
        event.target.value = '';
    });
    tempAudio.addEventListener('error', function() {
        showNotification('Could not read audio file', 'error');
        event.target.value = '';
    });
}

// ── PDF ───────────────────────────────────────────────────
function handlePdfUpload(event) {
    const file = event.target.files[0];
    if (!file) return;
    if (file.size > PDF_MAX_MB * 1024 * 1024) {
        showNotification(`PDFs must be under ${PDF_MAX_MB} MB`, 'error');
        event.target.value = '';
        return;
    }
    const reader = new FileReader();
    reader.onload = function(e) {
        const sizeText = file.size >= 1024 * 1024
            ? `${(file.size / 1024 / 1024).toFixed(1)} MB`
            : `${(file.size / 1024).toFixed(0)} KB`;
        const item = document.createElement('div');
        item.className = 'content-item';
        item.innerHTML = `
            <div class="media-embed">
                <button class="remove-media-btn" onclick="removeMedia(this)"><i class="fas fa-times"></i></button>
                <div class="pdf-embed-block">
                    <div class="pdf-embed-header">
                        <i class="fas fa-file-pdf"></i>
                        <span class="pdf-embed-name">${file.name}</span>
                        <span class="pdf-size-badge">${sizeText}</span>
                    </div>
                    <iframe src="${e.target.result}" title="${file.name}"></iframe>
                </div>
                <div class="media-caption" contenteditable="true"></div>
            </div>`;
        document.getElementById('contentItems').appendChild(item);
    };
    reader.readAsDataURL(file);
    event.target.value = '';
}

// ── YouTube ───────────────────────────────────────────────
function openYouTubeModal() {
    document.getElementById('ytUrlInput').value = '';
    document.getElementById('ytModal').classList.add('show');
    setTimeout(() => document.getElementById('ytUrlInput').focus(), 100);
}

function closeYouTubeModal() {
    document.getElementById('ytModal').classList.remove('show');
}

function extractYouTubeId(url) {
    // Handles: youtube.com/watch?v=ID, youtu.be/ID, youtube.com/embed/ID, youtube.com/shorts/ID
    const patterns = [
        /(?:youtube\.com\/watch\?v=|youtu\.be\/|youtube\.com\/embed\/|youtube\.com\/shorts\/)([A-Za-z0-9_-]{11})/
    ];
    for (const p of patterns) {
        const m = url.match(p);
        if (m) return m[1];
    }
    return null;
}

function embedYouTube() {
    const url = document.getElementById('ytUrlInput').value.trim();
    const videoId = extractYouTubeId(url);
    if (!videoId) {
        showNotification('Please enter a valid YouTube URL', 'error');
        return;
    }
    closeYouTubeModal();

    const item = document.createElement('div');
    item.className = 'content-item';
    item.innerHTML = `
        <div class="media-embed">
            <button class="remove-media-btn" onclick="removeMedia(this)"><i class="fas fa-times"></i></button>
            <div class="yt-embed-block">
                <div class="yt-embed-header">
                    <i class="fab fa-youtube"></i>
                    <span class="yt-embed-title">youtube.com/watch?v=${videoId}</span>
                </div>
                <iframe
                    src="https://www.youtube.com/embed/${videoId}"
                    title="YouTube video"
                    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
                    allowfullscreen>
                </iframe>
            </div>
            <div class="media-caption" contenteditable="true"></div>
        </div>`;
    document.getElementById('contentItems').appendChild(item);
    showNotification('YouTube video embedded', 'success');
}

// Close modal on overlay click
document.getElementById('ytModal').addEventListener('click', function(e) {
    if (e.target === this) closeYouTubeModal();
});

// Confirm on Enter key
document.getElementById('ytUrlInput')?.addEventListener('keydown', function(e) {
    if (e.key === 'Enter') embedYouTube();
});

// ── Shared media helpers ──────────────────────────────────
function removeMedia(btn) {
    btn.closest('.content-item').remove();
}

function toggleAudio(btn, audioId) {
    const player = btn.closest('.custom-audio-player');
    const audio  = document.getElementById(audioId);
    const icon   = btn.querySelector('i');
    if (audio.paused) {
        audio.play();
        icon.className = 'fas fa-pause';
        audio.ontimeupdate = function() {
            const pct = (audio.currentTime / audio.duration) * 100;
            player.querySelector('.waveform-progress').style.width = pct + '%';
            const m = Math.floor(audio.currentTime / 60);
            const s = Math.floor(audio.currentTime % 60);
            player.querySelector('.current-time').textContent = `${m}:${s.toString().padStart(2,'0')}`;
        };
        audio.onended = function() {
            icon.className = 'fas fa-play';
            player.querySelector('.waveform-progress').style.width = '0%';
            player.querySelector('.current-time').textContent = '0:00';
        };
    } else {
        audio.pause();
        icon.className = 'fas fa-play';
    }
}

function seekAudio(event, container, audioId) {
    const audio = document.getElementById(audioId);
    const rect  = container.getBoundingClientRect();
    audio.currentTime = ((event.clientX - rect.left) / rect.width) * audio.duration;
}

// ── Notification ──────────────────────────────────────────
function showNotification(message, type = 'success') {
    const el   = document.getElementById('notification');
    const text = document.getElementById('notificationText');
    const icon = el.querySelector('i');
    text.textContent = message;
    el.className = `notification ${type} show`;
    icon.className = type === 'success' ? 'fas fa-check-circle'
                   : type === 'warning' ? 'fas fa-exclamation-triangle'
                   : 'fas fa-exclamation-circle';
    setTimeout(() => el.classList.remove('show'), 4000);
}
</script>
