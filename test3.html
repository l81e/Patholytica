// ============ CONNECTIONS (Throttled) ============
const Conn = {
  _pendingRender: false,
  
  render() {
    if (this._pendingRender) return;
    this._pendingRender = true;
    
    requestAnimationFrame(() => {
      this._pendingRender = false;
      const svg = document.getElementById('conn-svg');
      svg.innerHTML = '';
      
      const fragment = document.createDocumentFragment();
      (G.space.connections || []).forEach(c => {
        const a = findW(c.a), b = findW(c.b);
        if (!a || !b) return;
        const ax = a.x + a.width / 2, ay = a.y + a.height / 2;
        const bx = b.x + b.width / 2, by = b.y + b.height / 2;
        const mx = (ax + bx) / 2;
        
        const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
        path.setAttribute('d', 'M' + ax + ',' + ay + ' C' + mx + ',' + ay + ' ' + mx + ',' + by + ' ' + bx + ',' + by);
        path.setAttribute('class', 'cline');
        path.addEventListener('click', () => {
          G.space.connections = G.space.connections.filter(x => !(x.a === c.a && x.b === c.b));
          Conn.render();
          G.save();
          toast('Connection removed');
        });
        fragment.appendChild(path);
      });
      
      svg.appendChild(fragment);
    });
  }
};

// ============ DRAW SYSTEM (Optimized) ============
const Draw = (function() {
  let ctx2, drawing = false, tool = 'pen', col = '#4f9eff', sz = 3;
  let undoStack = [], redoStack = [];
  const MAX_HISTORY = 15; // Reduced from 30
  let saveTimeout = null;
  
  function init() {
    ctx2 = document.getElementById('draw-cv').getContext('2d');
    ctx2.lineCap = 'round';
    ctx2.lineJoin = 'round';
    load();
  }
  
  function load() {
    if (!ctx2) return;
    ctx2.clearRect(0, 0, CANVAS_SIZE, CANVAS_SIZE);
    undoStack = [];
    redoStack = [];
    const d = G.space.drawData;
    if (d) {
      const img = new Image();
      img.onload = () => {
        ctx2.drawImage(img, 0, 0);
        pushUndo();
      };
      img.src = d;
    } else {
      pushUndo();
    }
    updateBtns();
  }
  
  function save2() {
    // Debounce save to prevent excessive storage writes
    if (saveTimeout) clearTimeout(saveTimeout);
    saveTimeout = setTimeout(() => {
      G.space.drawData = document.getElementById('draw-cv').toDataURL('image/png');
      G.save();
    }, 500);
  }
  
  function pushUndo() {
    const data = document.getElementById('draw-cv').toDataURL('image/png');
    undoStack.push(data);
    if (undoStack.length > MAX_HISTORY) undoStack.shift();
    redoStack = [];
    updateBtns();
  }
  
  function undo() {
    if (undoStack.length <= 1) return;
    redoStack.push(undoStack.pop());
    const prev = undoStack[undoStack.length - 1];
    const img = new Image();
    img.onload = () => {
      ctx2.clearRect(0, 0, CANVAS_SIZE, CANVAS_SIZE);
      ctx2.drawImage(img, 0, 0);
      save2();
    };
    img.src = prev;
    updateBtns();
  }
  
  function redo() {
    if (!redoStack.length) return;
    const next = redoStack.pop();
    undoStack.push(next);
    const img = new Image();
    img.onload = () => {
      ctx2.clearRect(0, 0, CANVAS_SIZE, CANVAS_SIZE);
      ctx2.drawImage(img, 0, 0);
      save2();
    };
    img.src = next;
    updateBtns();
  }
  
  function updateBtns() {
    const ub = document.getElementById('dr-undo'), rb = document.getElementById('dr-redo');
    if (ub) ub.disabled = undoStack.length <= 1;
    if (rb) rb.disabled = redoStack.length === 0;
  }
  
  function toggle() {
    const on = !document.getElementById('draw-cv').classList.contains('on');
    document.getElementById('draw-cv').classList.toggle('on', on);
    document.getElementById('draw-btn').classList.toggle('on', on);
    document.getElementById('draw-bar').classList.toggle('on', on);
    G.drawMode = on;
    if (on) updateBtns();
  }
  
  function pos(e, touch) {
    const t = touch ? e.touches[0] : e;
    return { x: (t.clientX - VP.tx) / VP.scale, y: (t.clientY - VP.ty) / VP.scale };
  }
  
  const dc = document.getElementById('draw-cv');
  
  dc.addEventListener('mousedown', (e) => {
    if (!G.drawMode) return;
    const p = pos(e);
    drawing = true;
    ctx2.beginPath();
    ctx2.moveTo(p.x, p.y);
  });
  
  dc.addEventListener('mousemove', (e) => {
    if (!G.drawMode || !drawing) return;
    const p = pos(e);
    if (tool === 'eraser') {
      ctx2.clearRect(p.x - sz * 3, p.y - sz * 3, sz * 6, sz * 6);
      return;
    }
    ctx2.strokeStyle = col;
    ctx2.lineWidth = sz;
    ctx2.lineTo(p.x, p.y);
    ctx2.stroke();
    ctx2.beginPath();
    ctx2.moveTo(p.x, p.y);
  });
  
  dc.addEventListener('mouseup', () => {
    if (drawing) {
      drawing = false;
      pushUndo();
      save2();
    }
  });
  
  dc.addEventListener('touchstart', (e) => {
    if (!G.drawMode) return;
    e.preventDefault();
    const p = pos(e, true);
    drawing = true;
    ctx2.beginPath();
    ctx2.moveTo(p.x, p.y);
  }, { passive: false });
  
  dc.addEventListener('touchmove', (e) => {
    if (!G.drawMode || !drawing) return;
    e.preventDefault();
    const p = pos(e, true);
    if (tool === 'eraser') {
      ctx2.clearRect(p.x - sz * 3, p.y - sz * 3, sz * 6, sz * 6);
      return;
    }
    ctx2.strokeStyle = col;
    ctx2.lineWidth = sz;
    ctx2.lineTo(p.x, p.y);
    ctx2.stroke();
    ctx2.beginPath();
    ctx2.moveTo(p.x, p.y);
  }, { passive: false });
  
  dc.addEventListener('touchend', () => {
    if (drawing) {
      drawing = false;
      pushUndo();
      save2();
    }
  });
  
  document.getElementById('dr-pen').addEventListener('click', function() {
    tool = 'pen';
    this.classList.add('on');
    document.getElementById('dr-era').classList.remove('on');
  });
  
  document.getElementById('dr-era').addEventListener('click', function() {
    tool = 'eraser';
    this.classList.add('on');
    document.getElementById('dr-pen').classList.remove('on');
  });
  
  document.getElementById('dr-clr').addEventListener('click', () => {
    ctx2.clearRect(0, 0, CANVAS_SIZE, CANVAS_SIZE);
    pushUndo();
    save2();
  });
  
  document.getElementById('dr-undo').addEventListener('click', () => undo());
  document.getElementById('dr-redo').addEventListener('click', () => redo());
  document.getElementById('dr-sz').addEventListener('input', function() { sz = parseInt(this.value); });
  
  document.querySelectorAll('.drcol').forEach(el => {
    el.addEventListener('click', function() {
      col = this.dataset.c;
      document.querySelectorAll('.drcol').forEach(d => d.classList.remove('on'));
      this.classList.add('on');
    });
  });
  
  return { init, toggle, load, undo, redo };
})();

// ============ IO ============
const IO = {
  _hist: [],
  MAX_FILE_SIZE: 50 * 1024 * 1024, // 50MB max import
  MAX_EMBEDDED_SIZE: 5 * 1024 * 1024, // 5MB max per embedded file
  
  exp() {
    const data = JSON.stringify({ spaces: G.spaces, cur: G.cur }, null, 2);
    const blob = new Blob([data], { type: 'application/json' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'myspace.json';
    a.click();
    toast('Exported!');
  },
  
  // Strip oversized embedded data from widgets to prevent crashes
  stripLargeData(spaces) {
    let strippedCount = 0;
    const processedSpaces = JSON.parse(JSON.stringify(spaces));
    
    processedSpaces.forEach(space => {
      if (space.widgets) {
        space.widgets.forEach(w => {
          // Strip large image data
          if (w.url && w.url.length > this.MAX_EMBEDDED_SIZE) {
            w.url = null;
            strippedCount++;
          }
          // Strip large audio data
          if (w.audioData && w.audioData.length > this.MAX_EMBEDDED_SIZE) {
            w.audioData = null;
            w.audioName = null;
            strippedCount++;
          }
          // Strip large PDF data
          if (w.pdfData && w.pdfData.length > this.MAX_EMBEDDED_SIZE) {
            w.pdfData = null;
            w.pdfName = null;
            strippedCount++;
          }
        });
      }
      // Strip large background image
      if (space.bg && space.bg.type === 'image' && space.bg.value && space.bg.value.length > this.MAX_EMBEDDED_SIZE) {
        space.bg.type = 'gradient';
        space.bg.value = 'linear-gradient(135deg,#0a0a0a,#111)';
        strippedCount++;
      }
      // Strip large draw data
      if (space.drawData && space.drawData.length > this.MAX_EMBEDDED_SIZE) {
        space.drawData = null;
        strippedCount++;
      }
    });
    
    return { spaces: processedSpaces, strippedCount };
  },
  
  async imp(file) {
    // Check file size first
    if (file.size > this.MAX_FILE_SIZE) {
      toast('File too large (max 50MB). Try removing large images/audio.');
      return;
    }
    
    toast('Importing... please wait');
    
    // Use setTimeout to allow UI to update before heavy processing
    setTimeout(() => {
      const r = new FileReader();
      
      r.onprogress = (e) => {
        if (e.lengthComputable) {
          const percent = Math.round((e.loaded / e.total) * 100);
          if (percent % 25 === 0) {
            toast('Loading... ' + percent + '%');
          }
        }
      };
      
      r.onload = (ev) => {
        try {
          toast('Processing data...');
          
          // Parse in chunks to avoid blocking
          let d;
          try {
            d = JSON.parse(ev.target.result);
          } catch (parseErr) {
            toast('Invalid JSON file');
            return;
          }
          
          if (!d.spaces || !Array.isArray(d.spaces)) {
            toast('Invalid file format');
            return;
          }
          
          // Strip large embedded data
          const { spaces, strippedCount } = this.stripLargeData(d.spaces);
          
          // Clean up before importing
          TimerManager.clearAll();
          AudioManager.destroyAll();
          
          // Process import in chunks
          G.spaces = spaces;
          G.cur = d.cur || 0;
          
          // Validate and fix data
          G.spaces.forEach(space => {
            if (!space.widgets) space.widgets = [];
            if (!space.bg) space.bg = { type: 'gradient', value: 'linear-gradient(135deg,#0a0a0a,#111)', blur: 0, brightness: 100, dim: 0, parallax: false };
            if (!space.connections) space.connections = [];
          });
          
          if (G.cur >= G.spaces.length) G.cur = 0;
          
          Spaces.to(G.cur);
          Spaces.renderBar();
          G.save();
          
          if (strippedCount > 0) {
            toast('Imported! ' + strippedCount + ' large file(s) removed (re-upload them).');
          } else {
            toast('Imported successfully!');
          }
        } catch (e) {
          console.error('Import error:', e);
          toast('Import failed: ' + (e.message || 'Unknown error'));
        }
      };
      
      r.onerror = () => {
        toast('Failed to read file');
      };
      
      r.readAsText(file);
    }, 100);
  },
  
  push() {
    this._hist.push(JSON.stringify({ spaces: G.spaces, ts: Date.now() }));
    if (this._hist.length > 5) this._hist.shift();
    SafeStorage.set('msp8_hist', JSON.stringify(this._hist));
  },
  
  async load() {
    try {
      const d = await SafeStorage.get('msp8_hist');
      if (d) this._hist = JSON.parse(d);
    } catch (e) { this._hist = []; }
  },
  
  hist() {
    if (!this._hist.length) return toast('No history yet');
    let msg = 'Restore version:\n';
    this._hist.forEach((v, i) => {
      msg += (i + 1) + ': ' + new Date(JSON.parse(v).ts).toLocaleString() + '\n';
    });
    const sel = prompt(msg + 'Enter number:');
    if (!sel) return;
    const idx = parseInt(sel) - 1;
    if (isNaN(idx) || idx < 0 || idx >= this._hist.length) return toast('Invalid');
    const d = JSON.parse(this._hist[idx]);
    TimerManager.clearAll();
    AudioManager.destroyAll();
    G.spaces = d.spaces;
    G.cur = 0;
    Spaces.to(0);
    Spaces.renderBar();
    G.save();
    toast('Restored!');
  }
};

// Push history every 2 minutes
TimerManager.setInterval('history', () => { IO.push(); }, 120000);

// ============ KEYBOARD SHORTCUTS ============
document.addEventListener('keydown', (e) => {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA' || e.target.isContentEditable) return;
  const cmd = e.metaKey || e.ctrlKey;
  if (cmd && e.key === 'e') { e.preventDefault(); G.toggleEdit(); }
  if (cmd && e.key === 'd') {
    e.preventDefault();
    const s = document.querySelector('.widget.sel');
    if (s) {
      const w = findW(s.dataset.id);
      if (w) dupWidget(w);
    }
  }
  if (e.key === 'Delete' || e.key === 'Backspace') {
    const s = document.querySelector('.widget.sel');
    if (s) delWidget(s.dataset.id);
  }
  if (e.key === 'Escape') {
    Ctx.hide();
    Sheets.closeAll();
    G.connectMode = false;
    document.querySelectorAll('.widget.sel').forEach(e => e.classList.remove('sel'));
    TimerManager.clearTimeout('selTimer');
  }
  if (cmd && e.key === '0') { e.preventDefault(); VP.reset(); }
  if (G.drawMode) {
    if (cmd && !e.shiftKey && e.key === 'z') { e.preventDefault(); Draw.undo(); }
    if (cmd && (e.shiftKey && e.key === 'z' || e.key === 'y')) { e.preventDefault(); Draw.redo(); }
  }
});

document.getElementById('cvp').addEventListener('mousedown', (e) => {
  if (!e.target.closest('.widget')) {
    document.querySelectorAll('.widget.sel').forEach(e => e.classList.remove('sel'));
    TimerManager.clearTimeout('selTimer');
    G.selId = null;
  }
});

// ============ INITIALIZATION ============
async function init() {
  await G.init();
  await IO.load();
  Crop._attach();
  VP.reset();
  Spaces.to(G.cur);
  Spaces.renderBar();
  Draw.init();
  BG.apply();
  Conn.render();
  
  if ('Notification' in window) Notification.requestPermission();
  
  // Create default widgets if empty
  if (G.space.widgets.length === 0) {
    const VCX = CANVAS_SIZE / 2, TOP = 100;
    const n = addWidget('note');
    n.x = snap(VCX - 260);
    n.y = TOP;
    n.width = 240;
    n.height = 220;
    n.content = 'Welcome to My Space 🌙\n\nPinch to zoom · drag to pan\nTap ✏️ to edit · + to add widgets';
    
    const cl = addWidget('clock');
    cl.x = snap(VCX + 10);
    cl.y = TOP;
    cl.width = 200;
    cl.height = 130;
    cl.clkStyle = 'style-minimal';
    cl.clkTz = 'local';
    cl.clkLabel = '';
    
    const td = addWidget('todo');
    td.x = snap(VCX + 10);
    td.y = TOP + 160;
    td.width = 240;
    td.height = 240;
    td.items = [
      { id: uid(), text: 'Try pinch-to-zoom', done: false },
      { id: uid(), text: 'Customize the background', done: false },
      { id: uid(), text: 'Add a Pomodoro timer', done: false }
    ];
    
    const q = addWidget('quote');
    q.x = snap(VCX - 260);
    q.y = TOP + 250;
    q.width = 260;
    q.height = 160;
    q.content = 'The space between who you are and who you want to be is where the magic happens.';
    q.author = 'Unknown';
    
    G.save();
    Render.all();
  }
}

// Start the app
init();

// Cleanup on page unload
window.addEventListener('beforeunload', () => {
  TimerManager.clearAll();
  AudioManager.destroyAll();
  CleanupManager.cleanupAll();
});

// Handle visibility change (pause expensive operations when tab is hidden)
document.addEventListener('visibilitychange', () => {
  if (document.hidden) {
    // Pause non-essential timers when tab is hidden
    AudioManager.pauseAll();
  }
});
