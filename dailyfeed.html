<!DOCTYPE html>

<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
    <title>Article Scroller - Patholytica</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg-color: #1f1f1f;
            --text-primary: #fff;
            --text-secondary: #aaa;
            --card-bg: #1f1f1f;
            --hover-bg: #2a2a2a;
            --border-color: #303030;
            --accent: #f1d19e;
            --accent-hover: #d9b87a;
        }

    body.light-theme {
        --bg-color: #f9f9f9;
        --text-primary: #0f0f0f;
        --text-secondary: #606060;
        --card-bg: #f9f9f9;
        --hover-bg: #f0f0f0;
        --border-color: #e5e5e5;
        --accent: #c49a3c;
        --accent-hover: #a07c28;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        background: var(--bg-color);
        color: var(--text-primary);
        overflow: hidden;
        transition: background 0.2s ease, color 0.2s ease;
        position: fixed;
        width: 100%;
        height: 100%;
    }

    .app-container {
        position: fixed;
        top: 0;
        left: 50%;
        transform: translateX(-50%);
        width: 100%;
        max-width: 450px;
        height: 100vh;
        background: var(--bg-color);
        visibility: hidden;
        opacity: 0;
    }
    .app-container.visible {
        visibility: visible;
        opacity: 1;
        transition: opacity 0.35s ease;
    }

    .scroller-container {
        position: relative;
        width: 100%;
        height: 100vh;
        background: var(--bg-color);
        overflow: hidden;
    }

    .posts-wrapper {
        height: 100%;
        overflow-y: scroll;
        scroll-snap-type: y mandatory;
        scrollbar-width: none;
    }

    .posts-wrapper::-webkit-scrollbar { display: none; }

    .article-card {
        position: relative;
        height: 100vh;
        scroll-snap-align: start;
        scroll-snap-stop: always;
        background: var(--bg-color);
        padding: 8px 20px 100px;
        padding-top: calc(16px + env(safe-area-inset-top));
        display: flex;
        flex-direction: column;
    }

    .card-top-line {
        width: calc(100% + 40px);
        margin-left: -20px;
        height: 1px;
        background: var(--border-color);
        flex-shrink: 0;
        margin-bottom: 14px;
    }

    .article-header {
        display: flex;
        align-items: center;
        gap: 12px;
        flex-shrink: 0;
        position: relative;
        z-index: 50;
    }

    .author-avatar {
        width: 44px; height: 44px;
        border-radius: 50%;
        background: var(--accent);
        display: flex; align-items: center; justify-content: center;
        font-size: 18px; font-weight: bold;
        color: #1f1f1f;
        overflow: hidden; flex-shrink: 0;
    }
    .author-avatar img { width: 100%; height: 100%; object-fit: cover; }
    .author-info { flex: 1; }
    .author-name { color: var(--text-primary); font-weight: 600; font-size: 17px; margin-bottom: 2px; }
    .article-date { color: var(--text-secondary); font-size: 12px; }

    .header-bottom-line {
        width: calc(100% + 40px);
        margin-left: -20px;
        height: 1px;
        background: var(--border-color);
        flex-shrink: 0;
        margin-top: 14px;
        margin-bottom: 14px;
    }

    .article-title {
        font-size: 22px; font-weight: 700;
        color: var(--text-primary);
        margin-bottom: 10px; line-height: 1.25;
        flex-shrink: 0;
    }

    .article-stats {
        display: flex; align-items: center;
        gap: 14px; margin-bottom: 12px; flex-shrink: 0;
    }
    .stat-item { display: flex; align-items: center; gap: 5px; font-size: 13px; color: var(--text-secondary); }
    .stat-item.views i { color: var(--accent); }
    .stat-item.likes i { color: #ef4444; }

    .article-content {
        color: var(--text-primary);
        font-size: 16px; line-height: 1.6;
        flex: 1; overflow-y: auto;
        padding-right: 60px;
    }
    .article-content::-webkit-scrollbar { width: 4px; }
    .article-content::-webkit-scrollbar-track { background: var(--border-color); }
    .article-content::-webkit-scrollbar-thumb { background: var(--text-secondary); border-radius: 2px; }
    .content-paragraph { margin-bottom: 14px; }

    /* ── MCQ ── */
    .mcq-card {
        position: relative;
        height: 100vh;
        scroll-snap-align: start;
        scroll-snap-stop: always;
        background: var(--bg-color);
        padding: 8px 20px 100px;
        padding-top: calc(16px + env(safe-area-inset-top));
        display: flex;
        flex-direction: column;
        overflow: hidden;
    }

    .mcq-badge {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        border: 1px solid var(--border-color);
        border-radius: 4px;
        padding: 3px 10px;
        font-size: 10px;
        font-weight: 700;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        color: var(--text-secondary);
        margin-bottom: 16px;
        flex-shrink: 0;
        align-self: flex-start;
    }

    .mcq-question {
        font-size: 20px;
        font-weight: 700;
        color: var(--text-primary);
        line-height: 1.35;
        margin-bottom: 14px;
        flex-shrink: 0;
        padding-right: 50px;
    }

    .mcq-media {
        padding-right: 60px;
        flex-shrink: 0;
        margin-bottom: 14px;
    }

    .mcq-scroll-area {
        flex: 1;
        overflow-y: auto;
        padding-right: 60px;
        display: flex;
        flex-direction: column;
        gap: 0;
    }
    .mcq-scroll-area::-webkit-scrollbar { width: 3px; }
    .mcq-scroll-area::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 2px; }

    .mcq-options {
        display: flex;
        flex-direction: column;
        gap: 10px;
    }

    .mcq-option {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 14px 16px;
        border-radius: 10px;
        border: 1px solid var(--border-color);
        background: var(--hover-bg);
        cursor: pointer;
        transition: border-color 0.15s ease, background 0.15s ease;
        text-align: left;
        font-size: 15px;
        font-weight: 500;
        color: var(--text-primary);
        line-height: 1.4;
        -webkit-tap-highlight-color: transparent;
        width: 100%;
    }

    .mcq-option:hover:not(:disabled) { border-color: var(--accent); }

    .mcq-option .opt-letter {
        width: 26px; height: 26px;
        border-radius: 50%;
        border: 1.5px solid var(--border-color);
        display: flex; align-items: center; justify-content: center;
        font-size: 11px; font-weight: 800;
        flex-shrink: 0;
        color: var(--text-secondary);
        transition: all 0.15s ease;
    }

    .mcq-option .opt-text { flex: 1; }
    .mcq-option:disabled { cursor: default; }

    .mcq-option.selected-correct { border-color: #4ade80; background: rgba(74,222,128,0.08); }
    .mcq-option.selected-correct .opt-letter { background: #4ade80; border-color: #4ade80; color: #1a1a1a; }
    .mcq-option.selected-wrong { border-color: #ef4444; background: rgba(239,68,68,0.07); }
    .mcq-option.selected-wrong .opt-letter { background: #ef4444; border-color: #ef4444; color: #fff; }
    .mcq-option.reveal-correct { border-color: rgba(74,222,128,0.5); }
    .mcq-option.reveal-correct .opt-letter { border-color: #4ade80; color: #4ade80; }

    .mcq-result-msg {
        font-size: 13px;
        font-weight: 600;
        margin-top: 14px;
        min-height: 20px;
        color: var(--text-secondary);
        flex-shrink: 0;
    }
    .mcq-result-msg.correct { color: #4ade80; }
    .mcq-result-msg.wrong   { color: #ef4444; }

    /* ── Action buttons ── */
    .action-buttons {
        position: absolute;
        right: 16px;
        bottom: 143px;
        display: flex;
        flex-direction: column;
        gap: 20px;
        z-index: 10;
    }
    .action-btn {
        display: flex; flex-direction: column; align-items: center; gap: 3px;
        background: none; border: none; cursor: pointer; transition: transform 0.1s;
    }
    .action-btn:active { transform: scale(0.9); }
    .action-btn svg { width: 28px; height: 28px; stroke: var(--text-primary); fill: none; stroke-width: 2; }
    .action-btn.liked svg { fill: #ef4444; stroke: #ef4444; }
    .action-btn span { color: var(--text-primary); font-size: 11px; font-weight: 600; }

    /* ── Media ── */
    .media-embed { margin: 16px 0; max-width: 100%; }
    .media-embed img { width: 100%; max-width: 100%; height: auto; border-radius: 8px; display: block; }
    .media-caption { font-size: 13px; color: var(--text-secondary); margin-top: 6px; font-style: italic; }

    .custom-audio-player {
        background: var(--card-bg); border-radius: 12px; padding: 16px;
        display: flex; align-items: center; gap: 12px; max-width: 100%;
        border: 1px solid var(--border-color);
    }
    .play-btn {
        width: 44px; height: 44px; border-radius: 50%;
        background: var(--accent); border: none; color: #1f1f1f;
        cursor: pointer; display: flex; align-items: center; justify-content: center;
        font-size: 16px; transition: background 0.2s ease; flex-shrink: 0;
    }
    .play-btn:hover { background: var(--accent-hover); }
    .audio-info { flex: 1; min-width: 0; overflow: hidden; }
    .audio-title { font-size: 13px; font-weight: 500; margin-bottom: 8px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: var(--text-primary); }
    .waveform-container { position: relative; height: 32px; background: var(--hover-bg); border-radius: 4px; margin-bottom: 6px; cursor: pointer; overflow: hidden; }
    .waveform-progress { position: absolute; top: 0; left: 0; height: 100%; background: var(--accent); opacity: 0.3; transition: width 0.1s linear; }
    .waveform-bars { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; align-items: center; justify-content: space-around; padding: 0 4px; }
    .waveform-bar { width: 2px; background: var(--text-secondary); border-radius: 2px; opacity: 0.6; }
    .audio-time { display: flex; justify-content: space-between; font-size: 11px; color: var(--text-secondary); }

    /* ── Comments ── */
    .comments-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 199; opacity: 0; pointer-events: none; transition: opacity 0.3s ease; }
    .comments-overlay.active { opacity: 1; pointer-events: all; }
    .comments-popup {
        position: fixed; top: 50%; left: 50%;
        transform: translate(-50%, -50%) scale(0.9);
        width: calc(100% - 40px); max-width: 500px;
        height: 70vh; max-height: 600px;
        background: var(--card-bg); border-radius: 16px; z-index: 200;
        opacity: 0; pointer-events: none;
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        display: flex; flex-direction: column;
        box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }
    .comments-popup.active { opacity: 1; pointer-events: all; transform: translate(-50%, -50%) scale(1); }
    .comments-header { display: flex; align-items: center; justify-content: space-between; padding: 16px 20px; border-bottom: 1px solid var(--border-color); }
    .comments-header h3 { font-size: 16px; font-weight: 600; }
    .close-comments { background: none; border: none; color: var(--text-primary); font-size: 24px; cursor: pointer; width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; border-radius: 50%; transition: background 0.2s ease; }
    .close-comments:hover { background: var(--hover-bg); }
    .comments-list { flex: 1; overflow-y: auto; padding: 16px 20px; }
    .comments-list::-webkit-scrollbar { width: 6px; }
    .comments-list::-webkit-scrollbar-track { background: transparent; }
    .comments-list::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 3px; }
    .comment-item { display: flex; gap: 12px; margin-bottom: 20px; }
    .comment-avatar { width: 32px; height: 32px; border-radius: 50%; background: var(--accent); display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: bold; color: #1f1f1f; flex-shrink: 0; overflow: hidden; }
    .comment-avatar img { width: 100%; height: 100%; object-fit: cover; }
    .comment-content { flex: 1; }
    .comment-author { font-weight: 600; font-size: 13px; margin-bottom: 4px; }
    .comment-text { font-size: 14px; line-height: 1.4; margin-bottom: 6px; }
    .comment-time { font-size: 11px; color: var(--text-secondary); }
    .comment-input-wrapper { padding: 12px 20px; border-top: 1px solid var(--border-color); background: var(--bg-color); border-radius: 0 0 16px 16px; }
    .comment-input-container { display: flex; gap: 8px; align-items: center; }
    .comment-input { flex: 1; background: var(--hover-bg); border: 1px solid var(--border-color); border-radius: 20px; padding: 10px 16px; color: var(--text-primary); font-size: 14px; outline: none; }
    .comment-input:focus { border-color: var(--accent); }
    .send-comment-btn { width: 36px; height: 36px; border-radius: 50%; background: var(--accent); border: none; color: #1f1f1f; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 16px; transition: background 0.2s ease; }
    .send-comment-btn:hover { background: var(--accent-hover); }
    .send-comment-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .no-comments { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; color: var(--text-secondary); gap: 12px; }
    .no-comments i { font-size: 48px; opacity: 0.5; }
    .loading-container { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; color: var(--text-primary); gap: 16px; }
    .spinner { width: 48px; height: 48px; border: 3px solid var(--border-color); border-top-color: var(--accent); border-radius: 50%; animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Skeleton ── */
    @keyframes shimmer { 0% { background-position: -400px 0; } 100% { background-position: 400px 0; } }
    .skeleton-base {
        background: linear-gradient(90deg, var(--hover-bg) 25%, var(--border-color) 50%, var(--hover-bg) 75%);
        background-size: 800px 100%; animation: shimmer 1.4s infinite linear; border-radius: 6px;
    }
    .skeleton-card { position: relative; height: 100vh; scroll-snap-align: start; scroll-snap-stop: always; background: var(--bg-color); padding: 8px 20px 100px; padding-top: calc(16px + env(safe-area-inset-top)); display: flex; flex-direction: column; }
    .skeleton-card .card-top-line { width: calc(100% + 40px); margin-left: -20px; height: 1px; background: var(--border-color); flex-shrink: 0; margin-bottom: 14px; }
    .skeleton-header { display: flex; align-items: center; gap: 12px; flex-shrink: 0; }
    .skeleton-avatar { width: 44px; height: 44px; border-radius: 50%; flex-shrink: 0; }
    .skeleton-author-block { flex: 1; display: flex; flex-direction: column; gap: 6px; }
    .skeleton-name { height: 14px; width: 120px; }
    .skeleton-date { height: 10px; width: 70px; }
    .skeleton-divider { width: calc(100% + 40px); margin-left: -20px; height: 1px; background: var(--border-color); flex-shrink: 0; margin-top: 14px; margin-bottom: 14px; }
    .skeleton-title { height: 22px; width: 85%; margin-bottom: 8px; }
    .skeleton-title-short { height: 22px; width: 60%; margin-bottom: 10px; }
    .skeleton-stats { display: flex; gap: 12px; margin-bottom: 14px; flex-shrink: 0; }
    .skeleton-stat { height: 13px; width: 52px; }
    .skeleton-line { height: 13px; margin-bottom: 10px; width: 100%; }
    .skeleton-line.w90 { width: 90%; } .skeleton-line.w75 { width: 75%; }
    .skeleton-line.w80 { width: 80%; } .skeleton-line.w65 { width: 65%; }
    .skeleton-line.w95 { width: 95%; }

    /* ── Footer ── */
    .footer-bar { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 450px; background: var(--card-bg); border-top: 1px solid var(--border-color); padding: 8px 24px; padding-bottom: calc(8px + env(safe-area-inset-bottom)); display: flex; justify-content: space-around; align-items: center; z-index: 100; }
    .footer-btn { display: flex; flex-direction: column; align-items: center; gap: 2px; background: none; border: none; color: var(--text-secondary); cursor: pointer; transition: color 0.2s ease; padding: 6px 12px; }
    .footer-btn:hover { color: var(--text-primary); }
    .footer-btn.active { color: var(--accent); }
    .footer-btn i { font-size: 20px; }
    .footer-btn span { font-size: 10px; font-weight: 500; }
    @media (max-width: 768px) {
        .footer-bar { padding: 8px 16px; padding-bottom: calc(8px + env(safe-area-inset-bottom)); }
        .footer-btn { padding: 6px 8px; }
        .footer-btn i { font-size: 18px; }
        .footer-btn span { font-size: 9px; }
    }

    /* ── Library Picker Overlay ── */
    #libraryPicker {
        position: fixed;
        inset: 0;
        background: var(--bg-color);
        z-index: 9999;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: flex-start;
        padding: 0 24px;
        padding-top: calc(48px + env(safe-area-inset-top));
        padding-bottom: calc(32px + env(safe-area-inset-bottom));
        overflow-y: auto;
    }
    #libraryPicker .lp-logo {
        margin-bottom: 24px;
    }
    #libraryPicker .lp-logo img {
        height: 36px;
        width: auto;
        object-fit: contain;
    }
    #libraryPicker h2 {
        font-size: 24px;
        font-weight: 800;
        color: var(--text-primary);
        text-align: center;
        margin-bottom: 6px;
        line-height: 1.2;
    }
    #libraryPicker .lp-sub {
        font-size: 14px;
        color: var(--text-secondary);
        text-align: center;
        margin-bottom: 20px;
        line-height: 1.5;
    }

    /* ── ID Search ── */
    .lp-id-search {
        width: 100%;
        max-width: 400px;
        margin-bottom: 20px;
    }
    .lp-id-search-label {
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: var(--text-secondary);
        margin-bottom: 8px;
        display: block;
    }
    .lp-id-search-row {
        display: flex;
        gap: 8px;
        align-items: center;
    }
    .lp-id-input {
        flex: 1;
        background: var(--hover-bg);
        border: 1px solid var(--border-color);
        border-radius: 10px;
        padding: 11px 14px;
        color: var(--text-primary);
        font-size: 14px;
        outline: none;
        transition: border-color 0.15s ease;
    }
    .lp-id-input:focus { border-color: var(--accent); }
    .lp-id-input::placeholder { color: var(--text-secondary); }
    .lp-id-go-btn {
        padding: 11px 18px;
        border-radius: 10px;
        background: var(--accent);
        color: #1a1a1a;
        font-size: 13px;
        font-weight: 700;
        border: none;
        cursor: pointer;
        transition: background 0.15s ease;
        white-space: nowrap;
        flex-shrink: 0;
    }
    .lp-id-go-btn:hover { background: var(--accent-hover); }
    .lp-id-go-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .lp-id-error {
        font-size: 12px;
        color: #ef4444;
        margin-top: 6px;
        min-height: 16px;
    }

    .lp-divider {
        width: 100%;
        max-width: 400px;
        display: flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 20px;
    }
    .lp-divider-line {
        flex: 1;
        height: 1px;
        background: var(--border-color);
    }
    .lp-divider-text {
        font-size: 11px;
        font-weight: 600;
        color: var(--text-secondary);
        letter-spacing: 0.08em;
        text-transform: uppercase;
        white-space: nowrap;
    }

    #libraryPicker .lp-count-hint {
        font-size: 12px;
        color: var(--text-secondary);
        text-align: center;
        margin-bottom: 16px;
        font-weight: 500;
        width: 100%;
        max-width: 400px;
        text-align: left;
    }
    .lp-grid {
        width: 100%;
        max-width: 400px;
        display: flex;
        flex-direction: column;
        gap: 10px;
        margin-bottom: 28px;
    }
    .lp-item {
        display: flex;
        align-items: center;
        gap: 14px;
        padding: 14px 16px;
        border-radius: 12px;
        border: 1.5px solid var(--border-color);
        background: var(--hover-bg);
        cursor: pointer;
        transition: border-color 0.15s ease, background 0.15s ease;
        -webkit-tap-highlight-color: transparent;
    }
    .lp-item.selected {
        border-color: var(--accent);
        background: rgba(241,209,158,0.06);
    }
    .lp-item .lp-check {
        width: 22px; height: 22px;
        border-radius: 50%;
        border: 1.5px solid var(--border-color);
        display: flex; align-items: center; justify-content: center;
        flex-shrink: 0;
        transition: all 0.15s ease;
        font-size: 12px;
        color: transparent;
    }
    .lp-item.selected .lp-check {
        background: var(--accent);
        border-color: var(--accent);
        color: #1a1a1a;
    }
    .lp-item .lp-info { flex: 1; min-width: 0; }
    .lp-item .lp-name { font-size: 15px; font-weight: 600; color: var(--text-primary); margin-bottom: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .lp-item .lp-meta { font-size: 12px; color: var(--text-secondary); }
    .lp-item .lp-article-count {
        font-size: 12px;
        font-weight: 700;
        color: var(--accent);
        background: rgba(241,209,158,0.1);
        border: 1px solid rgba(241,209,158,0.2);
        border-radius: 20px;
        padding: 2px 10px;
        flex-shrink: 0;
        white-space: nowrap;
    }
    .lp-loading {
        display: flex; flex-direction: column; align-items: center; gap: 12px;
        color: var(--text-secondary); font-size: 14px; padding: 32px 0;
    }
    .lp-btn-row {
        width: 100%; max-width: 400px;

<script>
    (function() {
        const canvas = document.getElementById('confettiCanvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        let animFrame = null;

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        const COLORS = ['#f1d19e','#4ade80','#60a5fa','#f472b6','#facc15','#a78bfa'];

        function spawnParticles(x, y) {
            for (let i = 0; i < 80; i++) {
                const angle = Math.random() * Math.PI * 2;
                const speed = Math.random() * 6 + 2;
                particles.push({
                    x: x ?? canvas.width / 2,
                    y: y ?? canvas.height * 0.4,
                    vx: Math.cos(angle) * speed,
                    vy: Math.sin(angle) * speed - 3,
                    size: Math.random() * 7 + 3,
                    color: COLORS[Math.floor(Math.random() * COLORS.length)],
                    alpha: 1,
                    rotation: Math.random() * Math.PI * 2,
                    rotSpeed: (Math.random() - 0.5) * 0.2,
                    shape: Math.random() > 0.5 ? 'rect' : 'circle'
                });
            }
            if (!animFrame) animate();
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles = particles.filter(p => p.alpha > 0.01);
            particles.forEach(p => {
                p.x += p.vx;
                p.y += p.vy;
                p.vy += 0.15;
                p.vx *= 0.99;
                p.alpha -= 0.018;
                p.rotation += p.rotSpeed;
                ctx.save();
                ctx.globalAlpha = Math.max(0, p.alpha);
                ctx.translate(p.x, p.y);
                ctx.rotate(p.rotation);
                ctx.fillStyle = p.color;
                if (p.shape === 'rect') {
                    ctx.fillRect(-p.size / 2, -p.size / 4, p.size, p.size / 2);
                } else {
                    ctx.beginPath();
                    ctx.arc(0, 0, p.size / 2, 0, Math.PI * 2);
                    ctx.fill();
                }
                ctx.restore();
            });
            if (particles.length > 0) {
                animFrame = requestAnimationFrame(animate);
            } else {
                animFrame = null;
                ctx.clearRect(0, 0, canvas.width, canvas.height);
            }
        }

        window.launchConfetti = function(targetEl) {
            if (targetEl) {
                const rect = targetEl.getBoundingClientRect();
                spawnParticles(rect.left + rect.width / 2, rect.top + rect.height / 2);
            } else {
                spawnParticles();
            }
        };
    })();
</script>

                idError.textContent = 'Error checking article ID.';

    function dismissPicker(articleIds) {

    // ── MCQ helpers ──────────────────────────────────────────
    function isMCQ(content) {
        return typeof content === 'string' && content.trimStart().startsWith('❔');
    }

    function parseMCQ(content) {
        const lines = content.trim().split('\n').map(l => l.trim()).filter(Boolean);
        const questionLine = lines[0].replace(/^❔/, '').trim();
        const options = lines.slice(1).map(line => {
            const correct = line.startsWith('✅');
            const label   = line.replace(/^✅/, '').trim();
            return { label, correct };
        });
        for (let i = options.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [options[i], options[j]] = [options[j], options[i]];
        }
        return { question: questionLine, options };
    }

    function escHtml(str) {
        return String(str)
            .replace(/&/g,'&amp;')
            .replace(/</g,'&lt;')
            .replace(/>/g,'&gt;');
    }

    // ── Media renderer ───────────────────────────────────────
    function createMediaElement(m) {
        const d = document.createElement('div');
        d.className = 'media-embed';

        if (m.type === 'image') {
            d.innerHTML = `<img src="${m.url}" alt="${m.caption || ''}">${m.caption ? `<div class="media-caption">${m.caption}</div>` : ''}`;

        } else if (m.type === 'audio') {
            const aid = 'audio-' + Math.random().toString(36).substr(2, 9);
            const bars = Array(15).fill(0).map(() => `<div class="waveform-bar" style="height:${Math.random()*60+20}%"></div>`).join('');
            d.innerHTML = `
                <div class="custom-audio-player">
                    <button class="play-btn" onclick="toggleAudio(this,'${aid}')"><i class="fas fa-play"></i></button>
                    <div class="audio-info">
                        <div class="audio-title">${m.caption || 'Audio'}</div>
                        <div class="waveform-container" onclick="seekAudio(event,this,'${aid}')">
                            <div class="waveform-progress"></div>
                            <div class="waveform-bars">${bars}</div>
                        </div>
                        <div class="audio-time"><span class="current-time">0:00</span><span class="duration">0:00</span></div>
                    </div>
                    <audio id="${aid}" src="${m.url}" style="display:none;"></audio>
                </div>`;
            setTimeout(() => {
                const audio = document.getElementById(aid);
                if (audio) {
                    audio.addEventListener('loadedmetadata', () => {
                        const dur = Math.floor(audio.duration);
                        const dEl = audio.closest('.custom-audio-player')?.querySelector('.duration');
                        if (dEl) dEl.textContent = `${Math.floor(dur/60)}:${(dur%60).toString().padStart(2,'0')}`;
                    });
                }
            }, 100);

        } else if (m.type === 'pdf') {
            d.innerHTML = `<div style="background:var(--hover-bg);border:1px solid var(--border-color);border-radius:12px;overflow:hidden;margin:4px 0;">
                <div style="display:flex;align-items:center;gap:10px;padding:12px 14px;border-bottom:1px solid var(--border-color);">
                    <i class="fas fa-file-pdf" style="color:#e74c3c;font-size:18px;flex-shrink:0;"></i>
                    <span style="font-size:13px;font-weight:600;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--text-primary);">${m.caption || 'Document'}</span>
                    <a href="${m.url}" target="_blank" rel="noopener" style="font-size:11px;font-weight:700;color:var(--accent);background:rgba(241,209,158,0.1);border:1px solid rgba(241,209,158,0.2);border-radius:8px;padding:4px 10px;text-decoration:none;white-space:nowrap;flex-shrink:0;">Open PDF</a>
                </div>
                <iframe src="${m.url}" style="width:100%;height:220px;border:none;display:block;"></iframe>
            </div>`;

        } else if (m.type === 'youtube') {
            const ytMatch = m.url.match(/embed\/([A-Za-z0-9_-]{11})/);
            const videoId = ytMatch ? ytMatch[1] : '';
            const label = m.caption || (videoId ? `youtube.com/watch?v=${videoId}` : 'YouTube Video');
            d.innerHTML = `<div style="background:var(--hover-bg);border:1px solid var(--border-color);border-radius:12px;overflow:hidden;margin:4px 0;">
                <div style="display:flex;align-items:center;gap:10px;padding:10px 14px;border-bottom:1px solid var(--border-color);">
                    <i class="fab fa-youtube" style="color:#ff0000;font-size:16px;flex-shrink:0;"></i>
                    <span style="font-size:13px;font-weight:600;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--text-primary);">${label}</span>
                    ${videoId ? `<a href="https://www.youtube.com/watch?v=${videoId}" target="_blank" rel="noopener" style="font-size:11px;font-weight:700;color:#ff0000;background:rgba(255,0,0,0.1);border:1px solid rgba(255,0,0,0.2);border-radius:8px;padding:4px 10px;text-decoration:none;white-space:nowrap;flex-shrink:0;">Watch</a>` : ''}
                </div>
                <iframe src="${m.url}" title="${label}" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen style="width:100%;aspect-ratio:16/9;border:none;display:block;"></iframe>
            </div>`;
        }
        return d;
    }

    // ── MCQ card builder ─────────────────────────────────────
    function buildMCQCard(article, index) {
        const { question, options } = parseMCQ(article.content);
        const isLiked = userLikes.has(String(article.id));
        const avatarContent = getAvatarContent(article);
        const letters = ['A','B','C','D','E','F'];

        const card = document.createElement('div');
        card.className = 'mcq-card';
        card.dataset.index = index;
        card.dataset.articleId = article.id;

        card.innerHTML = `
            <div class="card-top-line"></div>
            <div class="article-header">
                <div class="author-avatar">${avatarContent}</div>
                <div class="author-info">
                    <div class="author-name">${article.author}</div>
                    <div class="article-date">${formatDate(new Date(article.created_at))}</div>
                </div>
            </div>
            <div class="header-bottom-line"></div>
            <div class="mcq-badge">❔ Quick Question</div>
            <div class="mcq-question">${escHtml(question)}</div>
            <div class="mcq-media" id="mcq-media-${article.id}"></div>
            <div class="mcq-scroll-area">
                <div class="mcq-options" id="mcq-opts-${article.id}"></div>
                <div class="mcq-result-msg" id="mcq-msg-${article.id}"></div>
            </div>
            <div class="action-buttons">
                <button class="action-btn like-btn ${isLiked ? 'liked' : ''}" data-id="${article.id}">
                    <svg viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path></svg>
                    <span class="like-count">${formatNumber(article.likes || 0)}</span>
                </button>
                <button class="action-btn comment-btn" data-id="${article.id}">
                    <svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg>
                    <span class="comment-count">0</span>
                </button>
                <button class="action-btn expand-btn" data-id="${article.id}">
                    <svg viewBox="0 0 24 24"><polyline points="15 3 21 3 21 9"></polyline><polyline points="9 21 3 21 3 15"></polyline><line x1="21" y1="3" x2="14" y2="10"></line><line x1="3" y1="21" x2="10" y2="14"></line></svg>
                    <span>Open</span>
                </button>
            </div>
        `;

        if (article.media && article.media.length > 0) {
            const mediaContainer = card.querySelector(`#mcq-media-${article.id}`);
            article.media.forEach(m => mediaContainer.appendChild(createMediaElement(m)));
        }

        const optsContainer = card.querySelector(`#mcq-opts-${article.id}`);
        const msgEl         = card.querySelector(`#mcq-msg-${article.id}`);
        let answered = false;

        options.forEach((opt, i) => {
            const btn = document.createElement('button');
            btn.className = 'mcq-option';
            btn.innerHTML = `<span class="opt-letter">${letters[i] || i + 1}</span><span class="opt-text">${escHtml(opt.label)}</span>`;
            btn.addEventListener('click', () => {
                if (answered) return;
                answered = true;
                optsContainer.querySelectorAll('.mcq-option').forEach(b => b.disabled = true);
                if (opt.correct) {
                    btn.classList.add('selected-correct');
                    msgEl.textContent = '✓ Correct!';
                    msgEl.className = 'mcq-result-msg correct';
                    window.launchConfetti(btn);
                } else {
                    btn.classList.add('selected-wrong');
                    msgEl.className = 'mcq-result-msg wrong';
                    const correctIdx = options.findIndex(o => o.correct);
                    if (correctIdx !== -1) {
                        optsContainer.querySelectorAll('.mcq-option')[correctIdx].classList.add('reveal-correct');
                        msgEl.textContent = `✗ The answer was: ${options[correctIdx].label}`;
                    } else {
                        msgEl.textContent = '✗ Incorrect';
                    }
                }
            });
            optsContainer.appendChild(btn);
        });

        return card;
    }

    // ── Helpers ──────────────────────────────────────────────
    function formatNumber(num) {
        if (num >= 1000000) return (num / 1000000).toFixed(1) + 'M';
        if (num >= 1000)    return (num / 1000).toFixed(1) + 'K';
        return (num || 0).toString();
    }

    function formatDate(date) {
        const now = new Date(), ms = now - date;
        const mins = Math.floor(ms/60000), hrs = Math.floor(ms/3600000), days = Math.floor(ms/86400000);
        if (mins < 60) return `${mins}m ago`;
        if (hrs < 24)  return `${hrs}h ago`;
        if (days < 7)  return `${days}d ago`;
        return date.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
    }

    function getAvatarContent(article) {
        if (article.authorPfp) return `<img src="${article.authorPfp}" alt="${article.author}">`;
        let letter = 'A';
        if (article.authorUsername) {
            letter = article.authorUsername.charAt(0).toUpperCase();
        } else if (article.author) {
            const atIdx = article.author.indexOf('@');
            letter = atIdx !== -1 && article.author.length > atIdx + 1
                ? article.author.charAt(atIdx + 1).toUpperCase()
                : article.author.charAt(0).toUpperCase();
        }
        return letter;
    }

    function skeletonCardHTML() {
        return `
            <div class="card-top-line"></div>
            <div class="skeleton-header">
                <div class="skeleton-avatar skeleton-base"></div>
                <div class="skeleton-author-block">
                    <div class="skeleton-name skeleton-base"></div>
                    <div class="skeleton-date skeleton-base"></div>
                </div>
            </div>
            <div class="skeleton-divider"></div>
            <div class="skeleton-title skeleton-base"></div>
            <div class="skeleton-title-short skeleton-base"></div>
            <div class="skeleton-stats">
                <div class="skeleton-stat skeleton-base"></div>
                <div class="skeleton-stat skeleton-base"></div>
            </div>
            <div class="skeleton-line skeleton-base"></div>
            <div class="skeleton-line w90 skeleton-base"></div>
            <div class="skeleton-line w95 skeleton-base"></div>
            <div class="skeleton-line w80 skeleton-base"></div>
            <div class="skeleton-line skeleton-base"></div>
            <div class="skeleton-line w75 skeleton-base"></div>
            <div class="skeleton-line w90 skeleton-base"></div>
            <div class="skeleton-line w65 skeleton-base"></div>
        `;
    }

    // ── Auth ─────────────────────────────────────────────────
    async function getCurrentUser() {
        try {
            const firebaseUser = auth.currentUser;
            if (!firebaseUser) return null;
            const { data, error } = await supabase
                .from('users').select('user_id, firebase_uid, username')
                .eq('firebase_uid', firebaseUser.uid).single();
            if (error) return null;
            return data;
        } catch (e) { return null; }
    }

    onAuthStateChanged(auth, async (user) => {
        if (user) {
            currentUser = await getCurrentUser();
            if (currentUser) await loadUserLikes();
        } else {
            currentUser = null;
            userLikes.clear();
        }
    });

    // ── Likes ─────────────────────────────────────────────────
    async function loadUserLikes() {
        if (!currentUser) return;
        try {
            const { data: likes } = await supabase
                .from('likes').select('article_id').eq('user_id', currentUser.user_id);
            userLikes.clear();
            (likes || []).forEach(l => userLikes.add(String(l.article_id)));
            updateLikeButtons();
        } catch(e) {}
    }

    function updateLikeButtons() {
        document.querySelectorAll('.like-btn').forEach(btn => {
            btn.classList.toggle('liked', userLikes.has(String(btn.dataset.id)));
        });
    }

    async function handleLike(e) {
        const btn = e.currentTarget;
        const id  = String(btn.dataset.id);
        const countSpan = btn.querySelector('.like-count');

        if (!currentUser) {
            alert('Please log in to like articles');
            window.location.href = 'https://patholytica.com/login';
            return;
        }
        if (btn.dataset.processing === 'true') return;
        btn.dataset.processing = 'true';

        const wasLiked = userLikes.has(id);
        const artIdx   = articles.findIndex(a => String(a.id) === id);
        const prevRealCount = artIdx !== -1 ? (articles[artIdx].likes || 0) : 0;
        const newCount = wasLiked ? Math.max(0, prevRealCount - 1) : prevRealCount + 1;

        if (wasLiked) { userLikes.delete(id); btn.classList.remove('liked'); }
        else          { userLikes.add(id);    btn.classList.add('liked'); }
        countSpan.textContent = formatNumber(newCount);
        const card = btn.closest('.article-card, .mcq-card');
        if (card) { const s = card.querySelector('.stat-item.likes span'); if (s) s.textContent = formatNumber(newCount); }
        if (artIdx !== -1) articles[artIdx].likes = newCount;

        try {
            if (wasLiked) {
                await supabase.from('likes').delete().eq('article_id', parseInt(id)).eq('user_id', currentUser.user_id);
                const { error: rpcErr } = await supabase.rpc('decrement_likes', { article_id: parseInt(id) });
                if (rpcErr) {
                    const { data: fresh } = await supabase.from('articles').select('likes').eq('id', id).single();
                    await supabase.from('articles').update({ likes: Math.max(0, (fresh?.likes || 1) - 1) }).eq('id', id);
                }
            } else {
                const { error: insErr } = await supabase.from('likes').insert([{ article_id: parseInt(id), user_id: currentUser.user_id }]);
                if (insErr && insErr.code !== '23505') throw insErr;
                const { error: rpcErr } = await supabase.rpc('increment_likes', { article_id: parseInt(id) });
                if (rpcErr) {
                    const { data: fresh } = await supabase.from('articles').select('likes').eq('id', id).single();
                    await supabase.from('articles').update({ likes: (fresh?.likes || 0) + 1 }).eq('id', id);
                }
            }
        } catch (err) {
            console.error(err);
            if (wasLiked) { userLikes.add(id); btn.classList.add('liked'); }
            else          { userLikes.delete(id); btn.classList.remove('liked'); }
            countSpan.textContent = formatNumber(prevRealCount);
            if (card) { const s = card.querySelector('.stat-item.likes span'); if (s) s.textContent = formatNumber(prevRealCount); }
            if (artIdx !== -1) articles[artIdx].likes = prevRealCount;
        } finally {
            btn.dataset.processing = 'false';
        }
    }

    // ── Load articles ─────────────────────────────────────────
    async function loadArticles(isInitial = true) {
        if (isLoading || (!isInitial && !hasMore)) return;
        isLoading = true;
        try {
            let query = supabase
                .from('articles')
                .select('*')
                .order('created_at', { ascending: false })
                .range(offset, offset + LIMIT - 1);

            // If anchoring to a specific article ID, fetch that article first
            if (isInitial && anchorArticleId !== null) {
                // Fetch the anchor article
                const { data: anchorArt, error: anchorErr } = await supabase
                    .from('articles')
                    .select('*')
                    .eq('id', anchorArticleId)
                    .single();

                if (anchorErr || !anchorArt) {
                    anchorArticleId = null;
                } else {
                    // Then fetch the next LIMIT-1 articles after it (by created_at)
                    const { data: rest } = await supabase
                        .from('articles')
                        .select('*')
                        .order('created_at', { ascending: false })
                        .lt('created_at', anchorArt.created_at)
                        .limit(LIMIT - 1);

                    const combined = [anchorArt, ...(rest || [])];
                    await enrichAndRender(combined, isInitial);
                    // Set offset for subsequent loads based on the last article
                    offset = LIMIT;
                    isLoading = false;
                    return;
                }
            }

            // Library filter
            if (filteredArticleIds !== null) {
                if (filteredArticleIds.length === 0) {
                    document.getElementById('postsWrapper').innerHTML =
                        `<div class="loading-container"><i class="fas fa-inbox" style="font-size:48px;"></i><div>No articles in selected libraries</div></div>`;
                    isLoading = false;
                    return;
                }
                query = query.in('id', filteredArticleIds);
            }

            const { data: articlesData, error } = await query;

            if (error) throw error;

            if (!articlesData || articlesData.length === 0) {
                if (isInitial) {
                    document.getElementById('postsWrapper').innerHTML =
                        `<div class="loading-container"><i class="fas fa-inbox" style="font-size:48px;"></i><div>No articles found</div></div>`;
                }
                hasMore = false; isLoading = false; return;
            }

            if (articlesData.length < LIMIT) hasMore = false;
            offset += articlesData.length;

            await enrichAndRender(articlesData, isInitial);
            isLoading = false;
        } catch(e) {
            console.error('Error loading articles:', e);
            if (isInitial) {
                document.getElementById('postsWrapper').innerHTML =
                    `<div class="loading-container"><i class="fas fa-exclamation-triangle" style="font-size:48px;"></i><div>Failed to load articles</div></div>`;
            }
            isLoading = false;
        }
    }

    async function enrichAndRender(articlesData, isInitial) {
        const userIds = [...new Set(articlesData.map(a => a.firebase_user_id).filter(Boolean))];
        let usersData = [];
        if (userIds.length > 0) {
            const { data: users } = await supabase
                .from('users').select('firebase_uid, username, full_name, pfp')
                .in('firebase_uid', userIds);
            usersData = users || [];
        }

        const articleIds = articlesData.map(a => a.id);
        const { data: mediaData } = await supabase
            .from('media').select('*').in('article_id', articleIds)
            .order('display_order', { ascending: true });

        const newArticles = articlesData.map(article => {
            const user = usersData.find(u => u.firebase_uid === article.firebase_user_id);
            return {
                ...article,
                author:         user?.username ? `@${user.username}` : (user?.full_name || 'Anonymous'),
                authorPfp:      user?.pfp || null,
                authorUsername: user?.username || null,
                media: (mediaData || []).filter(m => m.article_id === article.id)
            };
        });

        articles = [...articles, ...newArticles];
        renderArticles(isInitial);
    }

    // ── Render ────────────────────────────────────────────────
    function renderArticles(isInitial = true) {
        const wrapper = document.getElementById('postsWrapper');

        if (isInitial) {
            wrapper.innerHTML = '';
        } else {
            const last = wrapper.lastElementChild;
            if (last && last.classList.contains('skeleton-card')) last.remove();
        }

        const startIndex = isInitial ? 0 : articles.length - LIMIT;

        for (let index = startIndex; index < articles.length; index++) {
            const article = articles[index];

            if (isMCQ(article.content)) {
                wrapper.appendChild(buildMCQCard(article, index));
            } else {
                const articleDiv = document.createElement('div');
                articleDiv.className = 'article-card';
                articleDiv.dataset.index = index;
                articleDiv.dataset.articleId = article.id;

                const contentDiv = document.createElement('div');
                contentDiv.className = 'article-content';
                const paragraphs = (article.content || 'No content available').split('\n\n');
                paragraphs.forEach((paragraph, pIndex) => {
                    if (paragraph.trim()) {
                        const p = document.createElement('div');
                        p.className = 'content-paragraph';
                        p.textContent = paragraph.trim();
                        contentDiv.appendChild(p);
                        if (article.media?.length > 0) {
                            article.media.filter(m => m.display_order === pIndex)
                                .forEach(m => contentDiv.appendChild(createMediaElement(m)));
                        }
                    }
                });
                if (article.media) {
                    article.media.filter(m => m.display_order >= paragraphs.length)
                        .forEach(m => contentDiv.appendChild(createMediaElement(m)));
                }

                const isLiked = userLikes.has(String(article.id));
                const avatarContent = getAvatarContent(article);

                articleDiv.innerHTML = `
                    <div class="card-top-line"></div>
                    <div class="article-header">
                        <div class="author-avatar">${avatarContent}</div>
                        <div class="author-info">
                            <div class="author-name">${article.author}</div>
                            <div class="article-date">${formatDate(new Date(article.created_at))}</div>
                        </div>
                    </div>
                    <div class="header-bottom-line"></div>
                    <div class="article-title">${article.title || 'Untitled'}</div>
                    <div class="article-stats">
                        <div class="stat-item views"><i class="fas fa-eye"></i><span>${formatNumber(article.views || 0)}</span></div>
                        <div class="stat-item likes"><i class="fas fa-heart"></i><span>${formatNumber(article.likes || 0)}</span></div>
                    </div>
                    <div class="action-buttons">
                        <button class="action-btn like-btn ${isLiked ? 'liked' : ''}" data-id="${article.id}">
                            <svg viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path></svg>
                            <span class="like-count">${formatNumber(article.likes || 0)}</span>
                        </button>
                        <button class="action-btn comment-btn" data-id="${article.id}">
                            <svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg>
                            <span class="comment-count">0</span>
                        </button>
                        <button class="action-btn expand-btn" data-id="${article.id}">
                            <svg viewBox="0 0 24 24"><polyline points="15 3 21 3 21 9"></polyline><polyline points="9 21 3 21 3 15"></polyline><line x1="21" y1="3" x2="14" y2="10"></line><line x1="3" y1="21" x2="10" y2="14"></line></svg>
                            <span>Open</span>
                        </button>
                    </div>
                `;
                articleDiv.querySelector('.article-stats').insertAdjacentElement('afterend', contentDiv);
                wrapper.appendChild(articleDiv);
            }
        }

        if (hasMore) {
            const skDiv = document.createElement('div');
            skDiv.className = 'skeleton-card';
            skDiv.innerHTML = skeletonCardHTML();
            wrapper.appendChild(skDiv);
        }

        document.querySelectorAll('.like-btn').forEach(btn => btn.addEventListener('click', handleLike));
        document.querySelectorAll('.comment-btn').forEach(btn => btn.addEventListener('click', handleComments));
        document.querySelectorAll('.expand-btn').forEach(btn => btn.addEventListener('click', handleExpand));

        if (isInitial) {
            wrapper.addEventListener('scroll', handleScroll);
            loadCommentCounts();
            setupIntersectionObserver();
        } else {
            setupIntersectionObserverForNew(startIndex);
            loadCommentCounts();
        }
    }

    // ── Intersection / view tracking ──────────────────────────
    function setupIntersectionObserver() {
        const obs = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                const id = entry.target.dataset.articleId; if (!id) return;
                if (entry.isIntersecting && entry.intersectionRatio >= 0.75) startViewTimer(id);
                else clearViewTimer(id);
            });
        }, { threshold: [0.75] });
        document.querySelectorAll('.article-card, .mcq-card').forEach(c => { if (c.dataset.articleId) obs.observe(c); });
    }

    function setupIntersectionObserverForNew(startIndex) {
        const obs = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                const id = entry.target.dataset.articleId; if (!id) return;
                if (entry.isIntersecting && entry.intersectionRatio >= 0.75) startViewTimer(id);
                else clearViewTimer(id);
            });
        }, { threshold: [0.75] });
        document.querySelectorAll('.article-card, .mcq-card').forEach(c => {
            if (c.dataset.index >= startIndex && c.dataset.articleId) obs.observe(c);
        });
    }

    function startViewTimer(id) {
        if (viewedArticles.has(id) || viewTimers[id]) return;
        viewTimers[id] = setTimeout(async () => { await incrementView(id); }, 5000);
    }
    function clearViewTimer(id) {
        if (viewTimers[id]) { clearTimeout(viewTimers[id]); delete viewTimers[id]; }
    }
    async function incrementView(id) {
        if (viewedArticles.has(id)) return;
        try {
            viewedArticles.add(id);
            const { data: a } = await supabase.from('articles').select('views').eq('id', id).single();
            const nv = (a.views || 0) + 1;
            await supabase.from('articles').update({ views: nv }).eq('id', id);
            const idx = articles.findIndex(a => a.id === id);
            if (idx !== -1) articles[idx].views = nv;
            const card = document.querySelector(`.article-card[data-article-id="${id}"], .mcq-card[data-article-id="${id}"]`);
            if (card) { const s = card.querySelector('.stat-item.views span'); if (s) s.textContent = formatNumber(nv); }
        } catch(e) { viewedArticles.delete(id); }
    }

    // ── Comments ──────────────────────────────────────────────
    async function loadCommentCounts() {
        try {
            const { data: comments } = await supabase.from('comments').select('article_id');
            const counts = {};
            (comments || []).forEach(c => { counts[c.article_id] = (counts[c.article_id] || 0) + 1; });
            document.querySelectorAll('.comment-btn').forEach(btn => {
                btn.querySelector('.comment-count').textContent = counts[btn.dataset.id] || 0;
            });
        } catch(e) {}
    }

    async function handleComments(e) {
        currentArticleId = e.currentTarget.dataset.id;
        await loadComments(currentArticleId);
        openComments();
    }

    async function loadComments(articleId) {
        const list = document.getElementById('commentsList');
        list.innerHTML = '<div class="loading-container"><div class="spinner" style="width:32px;height:32px;border-width:3px;"></div></div>';
        try {
            const { data: comments } = await supabase.from('comments').select('*').eq('article_id', articleId).order('created_at', { ascending: true });
            if (!comments || !comments.length) {
                list.innerHTML = `<div class="no-comments"><i class="fas fa-comments"></i><div>No comments yet</div><div style="font-size:12px;">Be the first to comment!</div></div>`;
                return;
            }
            const uids = [...new Set(comments.map(c => c.user_id).filter(Boolean))];
            let usersMap = {};
            if (uids.length > 0) {
                const { data: users } = await supabase.from('users').select('user_id, username, full_name, pfp').in('user_id', uids);
                if (users) users.forEach(u => { usersMap[u.user_id] = u; });
            }
            list.innerHTML = comments.map(c => {
                const u = usersMap[c.user_id], author = u?.username ? `@${u.username}` : (u?.full_name || 'Anonymous');
                const av = u?.pfp ? `<img src="${u.pfp}" alt="${author}">` : (u?.username || 'A')[0].toUpperCase();
                return `<div class="comment-item"><div class="comment-avatar">${av}</div><div class="comment-content"><div class="comment-author">${author}</div><div class="comment-text">${c.comment_text}</div><div class="comment-time">${formatDate(new Date(c.created_at))}</div></div></div>`;
            }).join('');
        } catch(e) {
            list.innerHTML = `<div class="no-comments"><i class="fas fa-exclamation-triangle"></i><div>Failed to load comments</div></div>`;
        }
    }

    window.openComments = () => {
        document.getElementById('commentsPopup').classList.add('active');
        document.getElementById('commentsOverlay').classList.add('active');
        document.body.style.overflow = 'hidden';
    };
    window.closeComments = () => {
        document.getElementById('commentsPopup').classList.remove('active');
        document.getElementById('commentsOverlay').classList.remove('active');
        document.body.style.overflow = '';
    };
    window.sendComment = async function() {
        const input = document.getElementById('commentInput'), text = input.value.trim();
        if (!text || !currentArticleId) return;
        const sendBtn = document.getElementById('sendCommentBtn'); sendBtn.disabled = true;
        try {
            if (!currentUser) currentUser = await getCurrentUser();
            if (!currentUser) { window.location.href = 'https://patholytica.com/login'; return; }
            await supabase.from('comments').insert([{ article_id: currentArticleId, user_id: currentUser.user_id, comment_text: text }]);
            input.value = ''; await loadComments(currentArticleId);
            const cb = document.querySelector(`.comment-btn[data-id="${currentArticleId}"]`);
            if (cb) { const cs = cb.querySelector('.comment-count'); cs.textContent = parseInt(cs.textContent) + 1; }
        } catch(e) { alert('Failed to post comment.'); } finally { sendBtn.disabled = false; }
    };

    document.getElementById('commentInput').addEventListener('keypress', e => { if (e.key === 'Enter') window.sendComment(); });

    function handleExpand(e) { window.location.href = `article.html?id=${e.currentTarget.dataset.id}`; }

    function handleScroll(e) {
        const c = e.target;
        if (c.scrollTop + c.clientHeight >= c.scrollHeight * 0.8 && hasMore && !isLoading) loadArticles(false);
    }

    initLibraryPicker();
</script>

<script>
    window.toggleAudio = function(btn, audioId) {
        const player = btn.closest('.custom-audio-player');
        const audio  = document.getElementById(audioId);
        const icon   = btn.querySelector('i');
        if (audio.paused) {
            audio.play();
            icon.className = 'fas fa-pause';
            audio.ontimeupdate = function() {
                const progress = (audio.currentTime / audio.duration) * 100;
                const prog = player.querySelector('.waveform-progress');
                if (prog) prog.style.width = progress + '%';
                const ct = player.querySelector('.current-time');
                if (ct) {
                    const m = Math.floor(audio.currentTime / 60), s = Math.floor(audio.currentTime % 60);
                    ct.textContent = `${m}:${s.toString().padStart(2,'0')}`;
                }
            };
            audio.onended = function() {
                icon.className = 'fas fa-play';
                const prog = player.querySelector('.waveform-progress');
                if (prog) prog.style.width = '0%';
                const ct = player.querySelector('.current-time');
                if (ct) ct.textContent = '0:00';
            };
        } else {
            audio.pause();
            icon.className = 'fas fa-play';
        }
    };

    window.seekAudio = function(event, container, audioId) {
        const audio = document.getElementById(audioId);
        if (!audio || !audio.duration) return;
        const rect = container.getBoundingClientRect();
        audio.currentTime = ((event.clientX - rect.left) / rect.width) * audio.duration;
    };
</script>
