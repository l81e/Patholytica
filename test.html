<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Patholytica — Profile</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root {
  --bg-color: #0d0d0d;
  --bg-secondary: #141414;
  --text-primary: #e8e6e1;
  --text-secondary: #7a7875;
  --card-bg: #141414;
  --hover-bg: #1c1c1c;
  --border-color: #242424;
  --accent: #4f9eff;
  --accent-hover: #3a8ae8;
  --accent-green: #3dba72;
  --accent-purple: #a56fd4;
  --accent-orange: #e88c3a;
  --header-height: 53px;
}
body.light-theme {
  --bg-color: #f9f9f9;
  --bg-secondary: #ffffff;
  --text-primary: #0f0f0f;
  --text-secondary: #606060;
  --card-bg: #ffffff;
  --hover-bg: #f0f0f0;
  --border-color: #e5e5e5;
  --accent: #065fd4;
  --accent-hover: #0448a3;
}
* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; min-height: 100%; font-family: "Roboto", Arial, sans-serif; overflow-x: hidden; max-width: 100vw; }
body { background: var(--bg-color); color: var(--text-primary); transition: background 0.2s, color 0.2s; }

/* ── Header ── */
.header-wrapper {
  position: fixed; top: 0; left: 0; right: 0;
  background: var(--bg-color);
  padding-top: env(safe-area-inset-top);
  border-bottom: 1px solid var(--border-color);
  z-index: 40; width: 100%;
}
.header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px 24px; max-width: 100%; margin: 0 auto;
}
.logo-img { height: 28px; width: auto; cursor: pointer; transition: opacity 0.2s ease; }
body.light-theme .logo-img { filter: invert(1); }
.logo-img:hover { opacity: 0.8; }
.header-actions { display: flex; align-items: center; gap: 16px; }

.auth-buttons { display: none; gap: 12px; }
.auth-buttons.show { display: flex; }
.btn-login {
  padding: 7px 18px; border-radius: 20px; font-size: 14px; font-weight: 500;
  cursor: pointer; transition: all 0.2s ease; text-decoration: none; border: none;
  background: transparent; color: var(--text-primary); border: 1px solid var(--border-color);
}
.btn-login:hover { background: var(--hover-bg); border-color: var(--text-secondary); }

.user-welcome { display: none; align-items: center; gap: 12px; font-size: 14px; color: var(--text-primary); }
.user-welcome.show { display: flex; }
.welcome-text {
  font-weight: 500; cursor: pointer; transition: all 0.2s ease;
  padding: 6px 14px; border-radius: 20px; border: 1px solid var(--border-color); color: var(--text-primary);
}
.welcome-text:hover { color: var(--accent); border-color: var(--accent); background: rgba(79,158,255,0.06); }

/* ── User Popup ── */
.user-popup-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 200; }
.user-popup-overlay.show { display: block; }
.user-popup {
  position: fixed;
  top: calc(var(--header-height) + 8px); right: 16px;
  width: 300px; background: var(--card-bg);
  border: 1px solid var(--border-color); border-radius: 16px;
  box-shadow: 0 16px 48px rgba(0,0,0,0.7); z-index: 201;
  overflow: hidden; display: none; animation: popupIn 0.2s ease;
}
.user-popup.show { display: block; }
@keyframes popupIn {
  from { opacity: 0; transform: translateY(-8px) scale(0.97); }
  to   { opacity: 1; transform: translateY(0) scale(1); }
}
.popup-profile-section { padding: 20px; display: flex; align-items: center; gap: 14px; border-bottom: 1px solid var(--border-color); }
.popup-avatar { width: 52px; height: 52px; border-radius: 50%; background: var(--accent); display: flex; align-items: center; justify-content: center; font-size: 22px; font-weight: 700; color: white; flex-shrink: 0; overflow: hidden; }
.popup-avatar img { width: 100%; height: 100%; object-fit: cover; }
.popup-user-info { flex: 1; min-width: 0; }
.popup-username { font-weight: 700; font-size: 15px; margin-bottom: 2px; color: var(--text-primary); }
.popup-stats { font-size: 12px; color: var(--text-secondary); }
.popup-menu-item { display: flex; align-items: center; gap: 12px; padding: 14px 20px; cursor: pointer; transition: background 0.15s ease; font-size: 14px; color: var(--text-primary); border: none; background: none; width: 100%; text-align: left; }
.popup-menu-item:hover { background: var(--hover-bg); }
.popup-menu-item i { width: 18px; text-align: center; color: var(--text-secondary); font-size: 15px; }
.popup-menu-item.danger { color: #ff5555; }
.popup-menu-item.danger i { color: #ff5555; }
.popup-divider { height: 1px; background: var(--border-color); margin: 4px 0; }

/* ── Page content offset ── */
.page-content {
  padding-top: var(--header-height);
  min-height: 100vh;
  padding-bottom: calc(60px + env(safe-area-inset-bottom));
}

/* ── Loading / Error ── */
.loading-state {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  padding: 80px 24px; color: var(--text-secondary); gap: 16px;
}
.loading-spinner {
  width: 32px; height: 32px;
  border: 3px solid var(--border-color); border-top-color: var(--accent);
  border-radius: 50%; animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.error-state {
  text-align: center; padding: 80px 24px;
  color: #ff5555; font-size: 15px;
}

/* ── Profile Hero ── */
.profile-hero {
  background: var(--bg-color);
  border-bottom: 1px solid var(--border-color);
  padding: 32px 24px 28px;
}
.hero-inner {
  max-width: 900px; margin: 0 auto;
  display: flex; align-items: center; gap: 24px;
}
.profile-avatar-large {
  width: 88px; height: 88px; border-radius: 50%;
  background: var(--accent);
  display: flex; align-items: center; justify-content: center;
  font-size: 36px; font-weight: 700; color: white;
  flex-shrink: 0; overflow: hidden;
  border: 2px solid var(--border-color);
}
.profile-avatar-large img { width: 100%; height: 100%; object-fit: cover; }
.hero-info { flex: 1; min-width: 0; }
.profile-username-hero {
  font-size: 22px; font-weight: 700;
  margin: 0 0 10px 0; color: var(--text-primary);
}
.profile-stats-compact {
  display: flex; align-items: center; gap: 20px;
  margin-bottom: 10px; flex-wrap: wrap;
}
.compact-stat { display: flex; align-items: center; gap: 5px; font-size: 13px; color: var(--text-secondary); }
.compact-stat-value { font-weight: 700; color: var(--text-primary); font-size: 14px; }
.profile-meta-row { display: flex; align-items: center; gap: 14px; font-size: 12px; color: var(--text-secondary); flex-wrap: wrap; }
.meta-item { display: flex; align-items: center; gap: 5px; }

/* ── Profile Container ── */
.profile-container {
  max-width: 900px; margin: 0 auto;
  padding: 20px 24px 40px;
}

/* ── Bio Card ── */
.bio-card {
  background: var(--card-bg);
  border: 1px solid var(--border-color);
  border-radius: 12px;
  padding: 16px 18px;
  margin-bottom: 16px;
}
.bio-label {
  font-size: 10px; font-weight: 700; letter-spacing: 0.08em;
  text-transform: uppercase; color: var(--text-secondary);
  opacity: 0.7; margin-bottom: 8px;
}
.bio-content { font-size: 14px; line-height: 1.6; color: var(--text-primary); }
.bio-empty { font-size: 13px; color: var(--text-secondary); font-style: italic; }

/* ── Action Buttons ── */
.profile-actions {
  display: flex; gap: 10px; margin-bottom: 20px;
}
.btn-edit, .btn-logout {
  flex: 1; padding: 10px 20px; border-radius: 24px;
  font-size: 13px; font-weight: 600; cursor: pointer;
  transition: all 0.2s ease; border: none;
  display: flex; align-items: center; justify-content: center; gap: 7px;
}
.btn-edit {
  background: var(--accent); color: white;
}
.btn-edit:hover { background: var(--accent-hover); }
.btn-logout {
  background: transparent; color: var(--text-primary);
  border: 1px solid var(--border-color);
}
.btn-logout:hover { background: var(--hover-bg); border-color: var(--text-secondary); }

/* ── Section ── */
.section-block {
  background: var(--card-bg);
  border: 1px solid var(--border-color);
  border-radius: 12px;
  margin-bottom: 16px;
  overflow: hidden;
}
.section-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 18px;
  border-bottom: 1px solid var(--border-color);
}
.section-title {
  font-size: 13px; font-weight: 700; color: var(--text-primary);
  margin: 0;
}
.count-badge {
  padding: 3px 9px; border-radius: 10px; font-size: 10px; font-weight: 700;
  background: rgba(165,111,212,0.12); color: var(--accent-purple);
}
.article-count-badge {
  padding: 3px 9px; border-radius: 10px; font-size: 10px; font-weight: 700;
  background: rgba(79,158,255,0.12); color: var(--accent);
}

/* ── Library Items ── */
.library-item {
  display: flex; align-items: center; gap: 14px;
  padding: 14px 18px;
  border-bottom: 1px solid var(--border-color);
  cursor: pointer; transition: background 0.15s ease;
}
.library-item:last-child { border-bottom: none; }
.library-item:hover { background: var(--hover-bg); }
.library-icon-wrap {
  width: 40px; height: 40px; border-radius: 10px; flex-shrink: 0;
  background: rgba(165,111,212,0.15);
  display: flex; align-items: center; justify-content: center;
}
.library-icon-wrap i { color: var(--accent-purple); font-size: 16px; }
.library-item-content { flex: 1; min-width: 0; }
.library-item-title {
  font-size: 14px; font-weight: 600; color: var(--text-primary);
  margin: 0 0 3px 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.library-item-sub { font-size: 12px; color: var(--text-secondary); margin: 0; }
.library-item-arrow { color: var(--text-secondary); font-size: 12px; flex-shrink: 0; }

/* ── Article Items ── */
.article-item {
  display: flex; align-items: flex-start; gap: 14px;
  padding: 14px 18px;
  border-bottom: 1px solid var(--border-color);
  cursor: pointer; transition: background 0.15s ease;
}
.article-item:last-child { border-bottom: none; }
.article-item:hover { background: var(--hover-bg); }
.article-icon-wrap {
  width: 40px; height: 40px; border-radius: 10px; flex-shrink: 0;
  background: rgba(79,158,255,0.12);
  display: flex; align-items: center; justify-content: center;
  margin-top: 1px;
}
.article-icon-wrap i { color: var(--accent); font-size: 15px; }
.article-item-content { flex: 1; min-width: 0; }
.article-item-title {
  font-size: 14px; font-weight: 600; color: var(--text-primary);
  margin: 0 0 5px 0; line-height: 1.35;
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
}
.article-item-meta { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
.article-meta-chip {
  display: flex; align-items: center; gap: 4px;
  font-size: 11px; color: var(--text-secondary);
}
.article-meta-chip i { font-size: 10px; }
.article-item-arrow { color: var(--text-secondary); font-size: 12px; flex-shrink: 0; margin-top: 3px; }

/* ── Empty State ── */
.empty-state {
  text-align: center; padding: 40px 20px; color: var(--text-secondary);
}
.empty-state i { font-size: 36px; margin-bottom: 12px; opacity: 0.3; display: block; }
.empty-state h3 { font-size: 15px; margin: 0 0 6px 0; color: var(--text-primary); font-weight: 600; }
.empty-state p { font-size: 13px; margin: 0; }

/* ── Modal ── */
.modal-overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,0.8); z-index: 500;
  align-items: center; justify-content: center; padding: 20px;
}
.modal-overlay.show { display: flex; }
.modal-content {
  background: var(--card-bg); border-radius: 16px;
  width: 100%; max-width: 480px; max-height: 90vh;
  overflow-y: auto; border: 1px solid var(--border-color);
  box-shadow: 0 24px 72px rgba(0,0,0,0.8);
  animation: popupIn 0.2s ease;
}
.modal-header {
  padding: 20px 24px; border-bottom: 1px solid var(--border-color);
  display: flex; align-items: center; justify-content: space-between;
}
.modal-title { font-size: 16px; font-weight: 700; margin: 0; color: var(--text-primary); }
.modal-close {
  width: 32px; height: 32px; border-radius: 50%; background: transparent;
  border: none; color: var(--text-primary); cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px; transition: background 0.2s ease;
}
.modal-close:hover { background: var(--hover-bg); }
.modal-body { padding: 24px; }
.form-group { margin-bottom: 22px; }
.form-label {
  display: block; font-size: 10px; font-weight: 700;
  color: var(--text-secondary); text-transform: uppercase;
  letter-spacing: 0.08em; opacity: 0.7; margin-bottom: 8px;
}
.form-input, .form-textarea {
  width: 100%; padding: 11px 14px;
  border: 1px solid var(--border-color); border-radius: 10px;
  background: var(--bg-secondary); color: var(--text-primary);
  font-size: 14px; font-family: inherit; transition: border-color 0.2s ease;
  outline: none;
}
.form-input:focus, .form-textarea:focus { border-color: var(--accent); background: var(--hover-bg); }
.form-textarea { resize: vertical; min-height: 100px; }
.avatar-upload { display: flex; align-items: center; gap: 18px; }
.avatar-preview {
  width: 72px; height: 72px; border-radius: 50%;
  background: var(--accent); display: flex; align-items: center; justify-content: center;
  font-size: 28px; font-weight: 700; color: white;
  overflow: hidden; border: 2px solid var(--border-color); flex-shrink: 0;
}
.avatar-preview img { width: 100%; height: 100%; object-fit: cover; }
.avatar-upload-btn { display: flex; flex-direction: column; gap: 8px; flex: 1; }
.btn-upload, .btn-remove {
  padding: 9px 16px; border-radius: 24px; font-size: 13px; font-weight: 600;
  cursor: pointer; transition: all 0.2s ease;
  border: 1px solid var(--border-color); background: transparent;
  color: var(--text-primary);
  display: flex; align-items: center; justify-content: center; gap: 6px;
}
.btn-upload:hover { background: var(--hover-bg); border-color: var(--accent); }
.btn-remove { color: #ff5555; border-color: #ff5555; }
.btn-remove:hover { background: rgba(255,85,85,0.08); }
.file-input { display: none; }
.upload-hint { font-size: 11px; color: var(--text-secondary); }
.modal-footer {
  padding: 16px 24px; border-top: 1px solid var(--border-color);
  display: flex; gap: 10px; justify-content: flex-end;
}
.btn-cancel, .btn-save {
  padding: 9px 22px; border-radius: 24px; font-size: 13px; font-weight: 600;
  cursor: pointer; transition: all 0.2s ease; border: none;
}
.btn-cancel {
  background: transparent; color: var(--text-primary);
  border: 1px solid var(--border-color);
}
.btn-cancel:hover { background: var(--hover-bg); }
.btn-save { background: var(--accent); color: white; }
.btn-save:hover { background: var(--accent-hover); }
.btn-save:disabled { opacity: 0.4; cursor: not-allowed; }

/* ── Footer Nav ── */
.footer-bar {
  position: fixed; bottom: 0; left: 0; right: 0;
  background: var(--bg-color); border-top: 1px solid var(--border-color);
  padding: 8px 0; padding-bottom: calc(8px + env(safe-area-inset-bottom));
  display: flex; justify-content: space-around; align-items: center; z-index: 50;
}
.footer-btn {
  display: flex; flex-direction: column; align-items: center; gap: 3px;
  background: none; border: none; color: var(--text-secondary);
  cursor: pointer; transition: color 0.2s ease; padding: 4px 16px;
}
.footer-btn:hover { color: var(--text-primary); }
.footer-btn.active { color: var(--accent); }
.footer-btn i { font-size: 19px; }
.footer-btn span { font-size: 10px; font-weight: 500; }

@media (max-width: 600px) {
  .hero-inner { gap: 16px; }
  .profile-avatar-large { width: 72px; height: 72px; font-size: 28px; }
  .profile-username-hero { font-size: 18px; }
  .profile-stats-compact { gap: 14px; }
  .profile-container { padding: 16px 16px 40px; }
  .profile-hero { padding: 24px 16px 20px; }
  .profile-actions { flex-direction: column; }
  .modal-footer { flex-direction: column; }
  .btn-cancel, .btn-save { width: 100%; }
  .avatar-upload { flex-direction: column; align-items: flex-start; }
  .avatar-upload-btn { width: 100%; }
  .btn-upload, .btn-remove { width: 100%; }
}
</style>
</head>
<body>
<script>
if (localStorage.getItem('theme') === 'light') document.body.classList.add('light-theme');
function updateHeaderHeight() {
  const h = document.getElementById('headerWrapper'); if (!h) return;
  document.documentElement.style.setProperty('--header-height', h.offsetHeight + 'px');
}
document.addEventListener('DOMContentLoaded', updateHeaderHeight);
window.addEventListener('resize', updateHeaderHeight);
</script>

<!-- Header -->
<div class="header-wrapper" id="headerWrapper">
  <div class="header">
    <img src="IMG_0696.png" class="logo-img" alt="Patholytica Logo" onclick="window.location.href='index.html'">
    <div class="header-actions">
      <div class="auth-buttons" id="authButtons"><a href="login.html" class="btn-login">Log In</a></div>
      <div class="user-welcome" id="userWelcome">
        <span class="welcome-text" id="welcomeText" onclick="toggleUserPopup()">@username</span>
      </div>
    </div>
  </div>
</div>

<!-- User Popup -->
<div class="user-popup-overlay" id="userPopupOverlay" onclick="closeUserPopup()"></div>
<div class="user-popup" id="userPopup">
  <div class="popup-profile-section">
    <div class="popup-avatar" id="popupAvatar">?</div>
    <div class="popup-user-info">
      <div class="popup-username" id="popupUsername">@username</div>
      <div class="popup-stats" id="popupStats">Loading...</div>
    </div>
  </div>
  <button class="popup-menu-item" onclick="closeUserPopup(); window.location.href='profile.html'"><i class="fas fa-user"></i> My Profile</button>
  <div class="popup-divider"></div>
  <button class="popup-menu-item" onclick="toggleTheme()"><i class="fas fa-circle-half-stroke" id="themeIcon"></i><span id="themeLabel">Light Mode</span></button>
  <div class="popup-divider"></div>
  <button class="popup-menu-item danger" onclick="closeUserPopup(); logOut()"><i class="fas fa-sign-out-alt"></i> Log Out</button>
</div>

<!-- Page Content -->
<div class="page-content">
  <div id="profileContent">
    <div class="loading-state">
      <div class="loading-spinner"></div>
      <div>Loading profile...</div>
    </div>
  </div>
</div>

<!-- Edit Profile Modal -->
<div class="modal-overlay" id="editModal">
  <div class="modal-content">
    <div class="modal-header">
      <h2 class="modal-title">Edit Profile</h2>
      <button class="modal-close" onclick="closeEditModal()"><i class="fas fa-times"></i></button>
    </div>
    <div class="modal-body">
      <form id="editForm">
        <div class="form-group">
          <label class="form-label">Profile Picture</label>
          <div class="avatar-upload">
            <div class="avatar-preview" id="avatarPreview"><i class="fas fa-user"></i></div>
            <div class="avatar-upload-btn">
              <button type="button" class="btn-upload" onclick="document.getElementById('fileInput').click()">
                <i class="fas fa-upload"></i> Choose Image
              </button>
              <button type="button" class="btn-remove" id="removeBtn" onclick="removeImage()" style="display:none;">
                <i class="fas fa-trash"></i> Remove
              </button>
              <input type="file" id="fileInput" class="file-input" accept="image/*" onchange="handleImageSelect(event)">
              <span class="upload-hint">JPG, PNG or GIF · max 2MB</span>
            </div>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label" for="bioInput">Bio</label>
          <textarea id="bioInput" class="form-textarea" placeholder="Tell us about yourself..." maxlength="500"></textarea>
        </div>
      </form>
    </div>
    <div class="modal-footer">
      <button class="btn-cancel" onclick="closeEditModal()">Cancel</button>
      <button class="btn-save" id="saveBtn" onclick="saveProfile()">Save Changes</button>
    </div>
  </div>
</div>

<!-- Footer Nav -->
<div class="footer-bar">
  <button class="footer-btn" onclick="window.location.href='index.html'">
    <i class="fas fa-home"></i><span>Home</span>
  </button>
  <button class="footer-btn" onclick="window.location.href='https://patholytica.com/dailyfeed'">
    <i class="fas fa-scroll"></i><span>Feed</span>
  </button>
  <button class="footer-btn" onclick="window.location.href='explore.html'">
    <i class="fas fa-search"></i><span>Explore</span>
  </button>
  <button class="footer-btn active" onclick="window.location.href='profile.html'">
    <i class="fas fa-user"></i><span>Profile</span>
  </button>
</div>

<script type="module">

import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

  apiKey: "AIzaSyBs6V0yY14cuLBXB1nciZ-X0eyAiodC-Ak",
  authDomain: "patholytica.firebaseapp.com",
  databaseURL: "https://patholytica-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "patholytica",
  storageBucket: "patholytica.firebasestorage.app",
  messagingSenderId: "738430635282",
  appId: "1:738430635282:web:8451ef380447c7611137cb"
};
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

// ── Theme ──
window.toggleTheme = function() {
  const isLight = document.body.classList.toggle('light-theme');
  localStorage.setItem('theme', isLight ? 'light' : 'dark');
  document.getElementById('themeLabel').textContent = isLight ? 'Dark Mode' : 'Light Mode';
  document.getElementById('themeIcon').className = isLight ? 'fas fa-moon' : 'fas fa-circle-half-stroke';
};

// ── User Popup ──
window.toggleUserPopup = function() {
  const popup = document.getElementById('userPopup'), overlay = document.getElementById('userPopupOverlay');
  if (popup.classList.contains('show')) closeUserPopup();
  else { popup.classList.add('show'); overlay.classList.add('show'); }
};
window.closeUserPopup = function() {
  document.getElementById('userPopup').classList.remove('show');
  document.getElementById('userPopupOverlay').classList.remove('show');
};
async function populateUserPopup(user) {
  try {
    const { data: ud } = await supabase.from('users').select('*').eq('firebase_uid', user.uid).single();
    if (!ud) return;
    document.getElementById('welcomeText').textContent = `@${ud.username}`;
    document.getElementById('popupUsername').textContent = `@${ud.username}`;
    const pa = document.getElementById('popupAvatar');
    pa.innerHTML = ud.pfp ? `<img src="${ud.pfp}" alt="${ud.username}">` : (ud.username||'U')[0].toUpperCase();
    const [ar, lr] = await Promise.all([
      supabase.from('articles').select('id, views').eq('firebase_user_id', user.uid),
      supabase.from('playlists').select('id').eq('user_id', ud.user_id)
    ]);
    const arts = ar.data||[], libs = lr.data||[];
    const totalViews = arts.reduce((s,a) => s+(a.views||0), 0);
    document.getElementById('popupStats').textContent = `${arts.length} articles · ${libs.length} libraries · ${totalViews} views`;
  } catch(e) { console.error(e); }
}

// ── Auth ──
window.logOut = async function() {
  try { await signOut(auth); window.location.href = 'index.html'; }
  catch(e) { alert('Error logging out.'); }
};

function getUrlParameter(name) {
  return new URLSearchParams(window.location.search).get(name);
}

function formatNumber(n) {
  if (n >= 1000000) return (n/1000000).toFixed(1) + 'M';
  if (n >= 1000) return (n/1000).toFixed(1) + 'K';
  return (n||0).toString();
}

// ── Load Profile ──
async function loadProfile(loggedInUser) {
  const profileContent = document.getElementById('profileContent');
  currentUser = loggedInUser;
  const usernameParam = getUrlParameter('username');

  try {
    let userData, userFirebaseId, userId;

    if (usernameParam) {
      const { data: profileUser, error } = await supabase.from('users').select('*').eq('username', usernameParam).single();
      if (error || !profileUser) { profileContent.innerHTML = '<div class="error-state">User not found</div>'; return; }
      userData = profileUser; userFirebaseId = profileUser.firebase_uid; userId = profileUser.user_id;
      isOwnProfile = loggedInUser && loggedInUser.uid === userFirebaseId;
    } else {
      if (!loggedInUser) {
        profileContent.innerHTML = '<div class="error-state">Please log in to view your profile</div>';
        setTimeout(() => window.location.href = 'login.html', 1500); return;
      }
      const { data: ownUserData, error } = await supabase.from('users').select('*').eq('firebase_uid', loggedInUser.uid).single();
      if (error) { profileContent.innerHTML = '<div class="error-state">Error loading profile</div>'; return; }
      userData = ownUserData; userFirebaseId = loggedInUser.uid; userId = ownUserData.user_id;
      currentUserData = userData; isOwnProfile = true;
    }

    const [articlesResult, librariesResult] = await Promise.all([
      supabase.from('articles').select('*').eq('firebase_user_id', userFirebaseId).order('created_at', { ascending: false }),
      supabase.from('playlists').select('*').eq('user_id', userId).order('created_at', { ascending: false })
    ]);

    const articles = articlesResult.data || [];
    const libraries = librariesResult.data || [];
    const articleCount = articles.length;
    const libraryCount = libraries.length;
    const totalViews = articles.reduce((s, a) => s + (a.views||0), 0);
    const totalLikes = articles.reduce((s, a) => s + (a.likes||0), 0);

    const joinedDate = userData.created_at ? new Date(userData.created_at) : null;
    const joinedText = joinedDate ? joinedDate.toLocaleDateString('en-US', { year: 'numeric', month: 'short' }) : 'Unknown';

    const avatarInitial = (userData.username||'U')[0].toUpperCase();
    const avatarHTML = userData.pfp ? `<img src="${userData.pfp}" alt="pfp">` : avatarInitial;

    let html = `
      <div class="profile-hero">
        <div class="hero-inner">
          <div class="profile-avatar-large">${avatarHTML}</div>
          <div class="hero-info">
            <div class="profile-username-hero">@${userData.username || 'User'}</div>
            <div class="profile-stats-compact">
              <div class="compact-stat"><span class="compact-stat-value">${formatNumber(articleCount)}</span><span>articles</span></div>
              <div class="compact-stat"><span class="compact-stat-value">${formatNumber(totalViews)}</span><span>views</span></div>
              <div class="compact-stat"><span class="compact-stat-value">${formatNumber(libraryCount)}</span><span>libraries</span></div>
              <div class="compact-stat"><span class="compact-stat-value">${formatNumber(totalLikes)}</span><span>likes</span></div>
            </div>
            <div class="profile-meta-row">
              <div class="meta-item"><i class="fas fa-calendar-alt"></i><span>Joined ${joinedText}</span></div>
            </div>
          </div>
        </div>
      </div>
      <div class="profile-container">
    `;

    // Bio
    if (userData.bio || isOwnProfile) {
      html += `
        <div class="bio-card">
          <div class="bio-label">About</div>
          ${userData.bio
            ? `<div class="bio-content">${userData.bio}</div>`
            : `<div class="bio-empty">No bio yet${isOwnProfile ? ' — add one by editing your profile' : ''}</div>`}
        </div>
      `;
    }

    // Actions
    if (isOwnProfile) {
      html += `
        <div class="profile-actions">
          <button class="btn-edit" onclick="openEditModal()"><i class="fas fa-pen"></i> Edit Profile</button>
          <button class="btn-logout" onclick="logOut()"><i class="fas fa-sign-out-alt"></i> Log Out</button>
        </div>
      `;
    }

    // Libraries
    const librariesTitle = isOwnProfile ? 'Your Libraries' : `Libraries by @${userData.username}`;
    html += `
      <div class="section-block">
        <div class="section-header">
          <span class="section-title">${librariesTitle}</span>
          ${libraryCount > 0 ? `<span class="count-badge">${libraryCount}</span>` : ''}
        </div>
    `;
    if (libraries.length > 0) {
      libraries.forEach(lib => {
        const date = new Date(lib.created_at).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
        const desc = lib.description || 'No description';
        html += `
          <div class="library-item" onclick="openLibrary('${lib.id}')">
            <div class="library-icon-wrap"><i class="fas fa-bookmark"></i></div>
            <div class="library-item-content">
              <div class="library-item-title">${lib.name}</div>
              <div class="library-item-sub">${desc} · ${date}</div>
            </div>
            <i class="fas fa-chevron-right library-item-arrow"></i>
          </div>
        `;
      });
    } else {
      const msg = isOwnProfile ? "You haven't created any libraries yet" : "No libraries yet";
      html += `<div class="empty-state"><i class="fas fa-bookmark"></i><h3>No libraries yet</h3><p>${msg}</p></div>`;
    }
    html += `</div>`;

    // Articles
    const articlesTitle = isOwnProfile ? 'Your Articles' : `Articles by @${userData.username}`;
    html += `
      <div class="section-block">
        <div class="section-header">
          <span class="section-title">${articlesTitle}</span>
          ${articleCount > 0 ? `<span class="article-count-badge">${articleCount}</span>` : ''}
        </div>
    `;
    if (articles.length > 0) {
      articles.forEach(article => {
        const date = new Date(article.created_at).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
        html += `
          <div class="article-item" onclick="openArticle('${article.id}')">
            <div class="article-icon-wrap"><i class="fas fa-file-lines"></i></div>
            <div class="article-item-content">
              <div class="article-item-title">${article.title}</div>
              <div class="article-item-meta">
                <div class="article-meta-chip"><i class="fas fa-calendar"></i>${date}</div>
                <div class="article-meta-chip"><i class="fas fa-eye"></i>${formatNumber(article.views||0)}</div>
                <div class="article-meta-chip"><i class="fas fa-heart"></i>${formatNumber(article.likes||0)}</div>
              </div>
            </div>
            <i class="fas fa-chevron-right article-item-arrow"></i>
          </div>
        `;
      });
    } else {
      const msg = isOwnProfile ? "You haven't written any articles yet" : "No articles yet";
      html += `<div class="empty-state"><i class="fas fa-file-alt"></i><h3>No articles yet</h3><p>${msg}</p></div>`;
    }
    html += `</div></div>`;

    profileContent.innerHTML = html;

  } catch(err) {
    console.error(err);
    profileContent.innerHTML = '<div class="error-state">An unexpected error occurred</div>';
  }
}

// ── Modal ──
window.openEditModal = function() {
  if (!isOwnProfile) return;
  const bioInput = document.getElementById('bioInput');
  const avatarPreview = document.getElementById('avatarPreview');
  const removeBtn = document.getElementById('removeBtn');
  bioInput.value = currentUserData.bio || '';
  if (currentUserData.pfp) {
    avatarPreview.innerHTML = `<img src="${currentUserData.pfp}" alt="pfp">`;
    removeBtn.style.display = 'flex';
  } else {
    avatarPreview.innerHTML = `<i class="fas fa-user"></i>`;
    removeBtn.style.display = 'none';
  }
  selectedImageDataUrl = null;
  document.getElementById('editModal').classList.add('show');
};
window.closeEditModal = function() {
  document.getElementById('editModal').classList.remove('show');
  selectedImageDataUrl = null;
  document.getElementById('fileInput').value = '';
};
window.handleImageSelect = function(event) {
  const file = event.target.files[0]; if (!file) return;
  if (file.size > 2 * 1024 * 1024) { alert('File size must be less than 2MB'); event.target.value = ''; return; }
  if (!file.type.startsWith('image/')) { alert('Please select an image file'); event.target.value = ''; return; }
  const reader = new FileReader();
  reader.onload = e => {
    selectedImageDataUrl = e.target.result;
    document.getElementById('avatarPreview').innerHTML = `<img src="${selectedImageDataUrl}" alt="Preview">`;
    document.getElementById('removeBtn').style.display = 'flex';
  };
  reader.readAsDataURL(file);
};
window.removeImage = function() {
  selectedImageDataUrl = '';
  document.getElementById('avatarPreview').innerHTML = `<i class="fas fa-user"></i>`;
  document.getElementById('removeBtn').style.display = 'none';
  document.getElementById('fileInput').value = '';
};
window.saveProfile = async function() {
  if (!isOwnProfile || !currentUser) return;
  const saveBtn = document.getElementById('saveBtn');
  const bioInput = document.getElementById('bioInput');
  saveBtn.disabled = true; saveBtn.textContent = 'Saving...';
  try {
    const updateData = { bio: bioInput.value.trim() };
    if (selectedImageDataUrl !== null) updateData.pfp = selectedImageDataUrl || null;
    const { error } = await supabase.from('users').update(updateData).eq('firebase_uid', currentUser.uid);
    if (error) { alert('Error saving profile. Please try again.'); saveBtn.disabled = false; saveBtn.textContent = 'Save Changes'; return; }
    const { data: refreshed } = await supabase.from('users').select('*').eq('firebase_uid', currentUser.uid).single();
    if (refreshed) currentUserData = refreshed;
    await loadProfile(currentUser);
    closeEditModal();
  } catch(err) { alert('An unexpected error occurred.'); }
  saveBtn.disabled = false; saveBtn.textContent = 'Save Changes';
};

window.openLibrary = id => window.location.href = `playlist.html?id=${id}`;
window.openArticle = id => window.location.href = `article.html?id=${id}`;

document.getElementById('editModal').addEventListener('click', e => { if (e.target === e.currentTarget) closeEditModal(); });

// ── Auth State ──
const usernameParam = getUrlParameter('username');
if (usernameParam) loadProfile(null);

onAuthStateChanged(auth, async user => {
  const ab = document.getElementById('authButtons'), uw = document.getElementById('userWelcome');
  if (user) {
    ab.classList.remove('show'); uw.classList.add('show');
    await populateUserPopup(user);
    if (!usernameParam) {
      loadProfile(user);
    } else {
      const { data: profileUser } = await supabase.from('users').select('firebase_uid').eq('username', usernameParam).single();
      if (profileUser && profileUser.firebase_uid === user.uid) loadProfile(user);
    }
  } else {
    ab.classList.add('show'); uw.classList.remove('show');
    if (!usernameParam) {
      document.getElementById('profileContent').innerHTML = '<div class="error-state">Please log in to view your profile</div>';
      setTimeout(() => window.location.href = 'login.html', 1500);
    }
  }
  setTimeout(updateHeaderHeight, 50);
});
