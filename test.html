<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Patholytica — Profile</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root {
  --bg-color: #1f1f1f;
  --text-primary: #fff;
  --text-secondary: #aaa;
  --card-bg: #1f1f1f;
  --hover-bg: #2a2a2a;
  --border-color: #303030;
  --accent: #f1d19e;
  --accent-hover: #d9b87a;
  --success: #4ade80;
  --error: #ef4444;
  --warning: #f59e0b;
}
body.light-theme {
  --bg-color: #f9f9f9;
  --text-primary: #0f0f0f;
  --text-secondary: #606060;
  --card-bg: #f9f9f9;
  --hover-bg: #f0f0f0;
  --border-color: #e5e5e5;
  --accent: #c49a3c;
  --accent-hover: #a07c28;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: var(--bg-color); color: var(--text-primary);
  overflow: hidden; height: 100vh; position: fixed; width: 100%;
  transition: background .2s, color .2s;
}
.app {
  position: fixed; top: 0; left: 50%; transform: translateX(-50%);
  width: 100%; max-width: 450px; height: 100vh;
  background: var(--bg-color); display: flex; flex-direction: column;
  overflow: hidden;
}

/* ── Header ── */
.header {
  padding: 12px 18px;
  padding-top: calc(10px + env(safe-area-inset-top));
  border-bottom: 1px solid var(--border-color);
  display: flex; align-items: center; gap: 12px;
  flex-shrink: 0; background: var(--bg-color); z-index: 40;
}
.icon-btn {
  width: 34px; height: 34px; border-radius: 50%;
  background: var(--hover-bg); border: 1px solid var(--border-color);
  color: var(--text-primary); cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 13px; transition: border-color .2s; flex-shrink: 0;
}
.icon-btn:hover { border-color: var(--accent); color: var(--accent); }
.header-title { font-size: 15px; font-weight: 700; flex: 1; }
.header-sub { font-size: 10px; color: var(--text-secondary); margin-top: 1px; }

/* ── Profile Hero ── */
.profile-hero {
  flex-shrink: 0; padding: 14px 18px;
  border-bottom: 1px solid var(--border-color);
  background: var(--bg-color);
}
.hero-inner { display: flex; align-items: center; gap: 14px; }
.profile-avatar {
  width: 54px; height: 54px; border-radius: 50%;
  background: var(--accent); display: flex; align-items: center; justify-content: center;
  font-size: 20px; font-weight: 700; color: #1a1a1a;
  flex-shrink: 0; overflow: hidden; border: 2px solid var(--border-color);
}
.profile-avatar img { width: 100%; height: 100%; object-fit: cover; }
.hero-info { flex: 1; min-width: 0; }
.hero-username { font-size: 15px; font-weight: 700; margin-bottom: 2px; }
.hero-bio {
  font-size: 11px; color: var(--text-secondary); line-height: 1.4;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 6px;
}
.hero-stats { display: flex; gap: 14px; flex-wrap: wrap; }
.hero-stat { font-size: 11px; color: var(--text-secondary); }
.hero-stat-val { font-weight: 700; color: var(--text-primary); }
.hero-actions { display: flex; gap: 8px; flex-shrink: 0; }
.btn-edit {
  padding: 7px 14px; border-radius: 20px; font-size: 12px; font-weight: 700;
  cursor: pointer; background: var(--accent); color: #1a1a1a;
  border: none; transition: background .2s;
  display: flex; align-items: center; gap: 5px;
}
.btn-edit:hover { background: var(--accent-hover); }

/* ── Hero skeleton ── */
.hero-skeleton { flex-shrink: 0; padding: 14px 18px; border-bottom: 1px solid var(--border-color); display: flex; align-items: center; gap: 14px; }
.hero-sk-av { width: 54px; height: 54px; border-radius: 50%; flex-shrink: 0; }
.hero-sk-info { flex: 1; display: flex; flex-direction: column; gap: 7px; }
.hero-sk-name { height: 13px; width: 110px; border-radius: 4px; }
.hero-sk-stats { display: flex; gap: 14px; }
.hero-sk-stat { height: 10px; width: 55px; border-radius: 4px; }

/* ── Tabs ── */
.tabs {
  flex-shrink: 0; display: flex;
  border-bottom: 1px solid var(--border-color);
  background: var(--bg-color);
}
.tab-btn {
  flex: 1; padding: 11px 0; font-size: 12px; font-weight: 700;
  letter-spacing: .04em; text-transform: uppercase;
  background: none; border: none; color: var(--text-secondary);
  cursor: pointer; transition: color .15s; position: relative;
}
.tab-btn.active { color: var(--accent); }
.tab-btn.active::after {
  content: ''; position: absolute; bottom: 0; left: 20%; right: 20%;
  height: 2px; background: var(--accent); border-radius: 2px 2px 0 0;
}
.tab-btn i { margin-right: 5px; font-size: 11px; }

/* ── Tab Content ── */
.tab-content { flex: 1; overflow: hidden; display: flex; flex-direction: column; min-height: 0; }
.tab-panel { flex: 1; overflow-y: auto; display: none; flex-direction: column; }
.tab-panel.active { display: flex; }
.tab-panel::-webkit-scrollbar { width: 3px; }
.tab-panel::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 2px; }

/* ── Selection bar ── */
.selection-bar {
  position: sticky; top: 0; z-index: 20;
  background: var(--bg-color); border-bottom: 1px solid var(--border-color);
  padding: 8px 14px; display: none; align-items: center; gap: 10px;
}
.selection-bar.show { display: flex; }
.sel-count { font-size: 12px; font-weight: 700; color: var(--accent); flex: 1; }
.sel-btn {
  padding: 6px 12px; border-radius: 8px; font-size: 11px; font-weight: 700;
  cursor: pointer; transition: all .15s; border: none;
}
.sel-btn-all { background: var(--hover-bg); color: var(--text-primary); border: 1px solid var(--border-color); }
.sel-btn-all:hover { border-color: var(--accent); color: var(--accent); }
.sel-btn-del { background: rgba(239,68,68,.15); color: #f87171; border: 1px solid rgba(239,68,68,.25); }
.sel-btn-del:hover { background: rgba(239,68,68,.25); }
.sel-btn-cancel { background: transparent; color: var(--text-secondary); border: 1px solid var(--border-color); }

/* ── Article list item ── */
.article-item {
  display: flex; align-items: flex-start; gap: 12px;
  padding: 13px 16px; border-bottom: 1px solid var(--border-color);
  cursor: pointer; transition: background .15s; position: relative;
  -webkit-tap-highlight-color: transparent;
}
.article-item:hover { background: var(--hover-bg); }
.article-item.selected { background: rgba(241,209,158,.05); border-left: 3px solid var(--accent); padding-left: 13px; }

.article-select-box {
  width: 20px; height: 20px; border-radius: 50%;
  border: 1.5px solid var(--border-color);
  display: none; align-items: center; justify-content: center;
  font-size: 10px; flex-shrink: 0; margin-top: 2px;
  color: transparent; transition: all .15s;
}
.selection-mode .article-select-box { display: flex; }
.article-item.selected .article-select-box {
  background: var(--accent); border-color: var(--accent); color: #1a1a1a;
}

.article-item-body { flex: 1; min-width: 0; }
.article-item-title {
  font-size: 14px; font-weight: 700; line-height: 1.3;
  margin-bottom: 5px; color: var(--text-primary);
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
}
.article-item-meta { display: flex; gap: 12px; flex-wrap: wrap; }
.article-item-stat { font-size: 11px; color: var(--text-secondary); display: flex; align-items: center; gap: 4px; }
.article-item-stat i { font-size: 10px; }
.article-item-date { font-size: 11px; color: var(--text-secondary); }

.article-item-actions {
  display: flex; flex-direction: column; gap: 6px; flex-shrink: 0;
  opacity: 0; transition: opacity .15s;
}
.article-item:hover .article-item-actions { opacity: 1; }
.selection-mode .article-item-actions { display: none; }

.item-action-btn {
  width: 28px; height: 28px; border-radius: 6px;
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; cursor: pointer; border: none; transition: all .15s;
}
.item-action-btn.edit { background: rgba(241,209,158,.12); color: var(--accent); }
.item-action-btn.edit:hover { background: rgba(241,209,158,.22); }
.item-action-btn.del { background: rgba(239,68,68,.1); color: #f87171; }
.item-action-btn.del:hover { background: rgba(239,68,68,.2); }

/* MCQ badge on item */
.mcq-badge-sm {
  display: inline-block; font-size: 9px; font-weight: 700;
  background: rgba(74,222,128,.12); color: #4ade80;
  padding: 1px 6px; border-radius: 4px; margin-bottom: 4px;
  letter-spacing: .06em; text-transform: uppercase;
}

/* ── Library list item ── */
.library-item {
  display: flex; align-items: center; gap: 12px;
  padding: 13px 16px; border-bottom: 1px solid var(--border-color);
  cursor: pointer; transition: background .15s; position: relative;
  -webkit-tap-highlight-color: transparent;
}
.library-item:hover { background: var(--hover-bg); }
.library-item.selected { background: rgba(241,209,158,.05); border-left: 3px solid var(--accent); padding-left: 13px; }
.library-select-box {
  width: 20px; height: 20px; border-radius: 50%;
  border: 1.5px solid var(--border-color);
  display: none; align-items: center; justify-content: center;
  font-size: 10px; flex-shrink: 0; color: transparent; transition: all .15s;
}
.selection-mode-lib .library-select-box { display: flex; }
.library-item.selected .library-select-box { background: var(--accent); border-color: var(--accent); color: #1a1a1a; }
.library-icon {
  width: 40px; height: 40px; border-radius: 10px;
  background: rgba(241,209,158,.1); border: 1px solid rgba(241,209,158,.2);
  display: flex; align-items: center; justify-content: center;
  font-size: 16px; flex-shrink: 0; color: var(--accent);
}
.library-item-body { flex: 1; min-width: 0; }
.library-item-name {
  font-size: 14px; font-weight: 700; margin-bottom: 3px;
  color: var(--text-primary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.library-item-desc { font-size: 11px; color: var(--text-secondary); margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.library-item-count { font-size: 11px; font-weight: 700; color: var(--accent); }
.library-item-actions {
  display: flex; gap: 6px; flex-shrink: 0;
  opacity: 0; transition: opacity .15s;
}
.library-item:hover .library-item-actions { opacity: 1; }
.selection-mode-lib .library-item-actions { display: none; }

/* ── Empty / Loading states ── */
.feed-empty {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  flex: 1; gap: 12px; color: var(--text-secondary); padding: 40px 20px; text-align: center;
}
.feed-empty i { font-size: 40px; opacity: 0.3; }
.feed-empty h3 { font-size: 15px; color: var(--text-primary); margin: 0; }
.feed-empty p { font-size: 12px; margin: 0; }
.loading-wrap {
  display: flex; align-items: center; justify-content: center;
  flex: 1; gap: 12px; color: var(--text-secondary); font-size: 13px;
}
.spinner {
  width: 28px; height: 28px; border: 3px solid var(--border-color);
  border-top-color: var(--accent); border-radius: 50%;
  animation: spin .8s linear infinite; flex-shrink: 0;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ── Skeleton items ── */
@keyframes shimmer { 0% { background-position: -400px 0; } 100% { background-position: 400px 0; } }
.skeleton-base {
  background: linear-gradient(90deg, var(--hover-bg) 25%, var(--border-color) 50%, var(--hover-bg) 75%);
  background-size: 800px 100%; animation: shimmer 1.4s infinite linear; border-radius: 4px;
}
.sk-item { padding: 13px 16px; border-bottom: 1px solid var(--border-color); display: flex; flex-direction: column; gap: 8px; }
.sk-title { height: 13px; width: 80%; }
.sk-title-short { height: 13px; width: 55%; }
.sk-meta { display: flex; gap: 10px; }
.sk-stat { height: 10px; width: 50px; }

/* ── Sheets ── */
.sheet-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,.75);
  z-index: 200; display: none; align-items: flex-end; justify-content: center;
}
.sheet-overlay.show { display: flex; }
.sheet {
  background: var(--bg-color); border-radius: 20px 20px 0 0;
  border: 1px solid var(--border-color); border-bottom: none;
  width: 100%; max-width: 450px; max-height: 85vh;
  display: flex; flex-direction: column;
  animation: slideUp .3s cubic-bezier(.4,0,.2,1);
  padding-bottom: env(safe-area-inset-bottom);
}
@keyframes slideUp { from { transform: translateY(100%); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
.sheet-handle { width: 36px; height: 4px; background: var(--border-color); border-radius: 2px; margin: 12px auto 0; flex-shrink: 0; }
.sheet-header {
  padding: 12px 18px 10px; display: flex; align-items: center; justify-content: space-between;
  border-bottom: 1px solid var(--border-color); flex-shrink: 0;
}
.sheet-title { font-size: 14px; font-weight: 700; }
.sheet-close {
  width: 28px; height: 28px; border-radius: 50%;
  background: var(--hover-bg); border: 1px solid var(--border-color);
  color: var(--text-primary); cursor: pointer;
  display: flex; align-items: center; justify-content: center; font-size: 11px;
}
.sheet-body { flex: 1; overflow-y: auto; padding: 18px; display: flex; flex-direction: column; gap: 14px; }
.sheet-body::-webkit-scrollbar { width: 3px; }
.sheet-body::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 2px; }
.sheet-footer { padding: 10px 18px; border-top: 1px solid var(--border-color); display: flex; gap: 8px; flex-shrink: 0; }

/* Form elements */
.form-field label {
  display: block; font-size: 10px; font-weight: 700; letter-spacing: .08em;
  text-transform: uppercase; color: var(--text-secondary); margin-bottom: 7px;
}
.form-input {
  width: 100%; padding: 10px 13px;
  background: var(--hover-bg); border: 1px solid var(--border-color);
  border-radius: 10px; color: var(--text-primary);
  font-size: 14px; outline: none; font-family: inherit; transition: border-color .2s;
}
.form-input:focus { border-color: var(--accent); }
.form-input::placeholder { color: var(--text-secondary); opacity: .5; }
.form-textarea {
  width: 100%; padding: 10px 13px;
  background: var(--hover-bg); border: 1px solid var(--border-color);
  border-radius: 10px; color: var(--text-primary);
  font-size: 13px; outline: none; resize: none; font-family: inherit;
  line-height: 1.5; transition: border-color .2s; min-height: 80px;
}
.form-textarea:focus { border-color: var(--accent); }
.form-textarea::placeholder { color: var(--text-secondary); opacity: .5; }
.char-count { font-size: 10px; color: var(--text-secondary); text-align: right; margin-top: 4px; }

/* Avatar upload */
.avatar-upload-row { display: flex; align-items: center; gap: 16px; }
.avatar-preview-circle {
  width: 64px; height: 64px; border-radius: 50%;
  background: var(--accent); display: flex; align-items: center; justify-content: center;
  font-size: 24px; font-weight: 700; color: #1a1a1a;
  overflow: hidden; border: 2px solid var(--border-color); flex-shrink: 0;
}
.avatar-preview-circle img { width: 100%; height: 100%; object-fit: cover; }
.avatar-btns { display: flex; flex-direction: column; gap: 7px; flex: 1; }
.btn-upload-av, .btn-remove-av {
  padding: 8px 14px; border-radius: 8px; font-size: 12px; font-weight: 600;
  cursor: pointer; transition: all .15s;
  display: flex; align-items: center; justify-content: center; gap: 6px;
}
.btn-upload-av { background: var(--hover-bg); border: 1px solid var(--border-color); color: var(--text-primary); }
.btn-upload-av:hover { border-color: var(--accent); color: var(--accent); }
.btn-remove-av { background: rgba(239,68,68,.08); border: 1px solid rgba(239,68,68,.25); color: #f87171; }
.btn-remove-av:hover { background: rgba(239,68,68,.16); }
.upload-hint { font-size: 10px; color: var(--text-secondary); }

/* Sheet buttons */
.btn {
  flex: 1; padding: 11px 8px; border-radius: 10px; border: none;
  font-size: 12px; font-weight: 700; cursor: pointer; transition: all .2s;
  display: flex; align-items: center; justify-content: center; gap: 6px;
}
.btn-secondary { background: var(--hover-bg); color: var(--text-primary); border: 1px solid var(--border-color); }
.btn-secondary:hover { border-color: var(--accent); color: var(--accent); }
.btn-primary { background: var(--accent); color: #1a1a1a; }
.btn-primary:hover { background: var(--accent-hover); }
.btn-danger { background: rgba(239,68,68,.15); color: #f87171; border: 1px solid rgba(239,68,68,.25); }
.btn-danger:hover { background: rgba(239,68,68,.25); }
.btn:disabled { opacity: .35; cursor: not-allowed; }

/* Confirm sheet */
.confirm-icon { display: flex; align-items: center; justify-content: center; margin-bottom: 4px; }
.confirm-icon i { font-size: 32px; color: #f87171; }
.confirm-title { font-size: 15px; font-weight: 800; text-align: center; margin-bottom: 6px; }
.confirm-msg { font-size: 12px; color: var(--text-secondary); text-align: center; line-height: 1.5; }

/* Notif */
.notif {
  position: fixed; top: calc(64px + env(safe-area-inset-top)); left: 50%; transform: translateX(-50%);
  background: var(--hover-bg); border: 1px solid var(--border-color);
  border-radius: 10px; padding: 11px 16px;
  box-shadow: 0 8px 32px rgba(0,0,0,.4);
  z-index: 500; display: none; align-items: center; gap: 9px;
  min-width: 220px; max-width: 320px;
}
.notif.show { display: flex; animation: notifIn .25s ease; }
.notif.success { border-left: 3px solid var(--success); }
.notif.error   { border-left: 3px solid var(--error); }
.notif.warning { border-left: 3px solid var(--warning); }
.notif i { font-size: 14px; }
.notif.success i { color: var(--success); }
.notif.error   i { color: var(--error); }
.notif.warning i { color: var(--warning); }
.notif span { font-size: 12px; font-weight: 500; }
@keyframes notifIn {
  from { transform: translateX(-50%) translateY(-12px); opacity: 0; }
  to   { transform: translateX(-50%) translateY(0); opacity: 1; }
}
</style>
</head>
<body>
<script>if (localStorage.getItem('theme') === 'light') document.body.classList.add('light-theme');</script>

<div class="app">

  <!-- Header -->
  <div class="header" id="mainHeader">
    <button class="icon-btn" onclick="goBack()"><i class="fas fa-arrow-left"></i></button>
    <div style="flex:1;">
      <div class="header-title" id="headerTitle">Profile</div>
      <div class="header-sub" id="headerSub">Loading…</div>
    </div>
    <button class="icon-btn" onclick="toggleTheme()" title="Toggle theme"><i class="fas fa-circle-half-stroke"></i></button>
  </div>

  <!-- Hero: skeleton then real -->
  <div id="heroArea">
    <div class="hero-skeleton" id="heroSkeleton">
      <div class="hero-sk-av skeleton-base"></div>
      <div class="hero-sk-info">
        <div class="hero-sk-name skeleton-base"></div>
        <div class="hero-sk-stats">
          <div class="hero-sk-stat skeleton-base"></div>
          <div class="hero-sk-stat skeleton-base"></div>
          <div class="hero-sk-stat skeleton-base"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- Tabs -->
  <div class="tabs" id="tabsBar" style="display:none;">
    <button class="tab-btn active" id="tabArticles" onclick="switchTab('articles')">
      <i class="fas fa-file-alt"></i>Articles
    </button>
    <button class="tab-btn" id="tabLibraries" onclick="switchTab('libraries')">
      <i class="fas fa-book-open"></i>Libraries
    </button>
  </div>

  <!-- Tab content -->
  <div class="tab-content">

    <!-- Articles panel -->
    <div class="tab-panel active" id="panelArticles">
      <!-- Selection bar -->
      <div class="selection-bar" id="selBarArticles">
        <span class="sel-count" id="selCountArticles">0 selected</span>
        <button class="sel-btn sel-btn-all" onclick="selectAllArticles()">All</button>
        <button class="sel-btn sel-btn-del" onclick="confirmBulkDeleteArticles()">
          <i class="fas fa-trash"></i> Delete
        </button>
        <button class="sel-btn sel-btn-cancel" onclick="exitSelectionModeArticles()">Cancel</button>
      </div>
      <div id="articlesList"></div>
    </div>

    <!-- Libraries panel -->
    <div class="tab-panel" id="panelLibraries">
      <!-- Selection bar -->
      <div class="selection-bar" id="selBarLibraries">
        <span class="sel-count" id="selCountLibraries">0 selected</span>
        <button class="sel-btn sel-btn-all" onclick="selectAllLibraries()">All</button>
        <button class="sel-btn sel-btn-del" onclick="confirmBulkDeleteLibraries()">
          <i class="fas fa-trash"></i> Delete
        </button>
        <button class="sel-btn sel-btn-cancel" onclick="exitSelectionModeLibraries()">Cancel</button>
      </div>
      <div id="librariesList"></div>
    </div>

  </div>
</div>

<!-- Edit Profile Sheet -->
<div class="sheet-overlay" id="editProfileSheet">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-header">
      <span class="sheet-title">Edit Profile</span>
      <button class="sheet-close" onclick="closeEditProfile()"><i class="fas fa-times"></i></button>
    </div>
    <div class="sheet-body">
      <div class="form-field">
        <label>Profile Picture</label>
        <div class="avatar-upload-row">
          <div class="avatar-preview-circle" id="avatarPreviewCircle">
            <i class="fas fa-user"></i>
          </div>
          <div class="avatar-btns">
            <button class="btn-upload-av" onclick="document.getElementById('fileInputAvatar').click()">
              <i class="fas fa-upload"></i> Choose Image
            </button>
            <button class="btn-remove-av" id="removeAvatarBtn" style="display:none;" onclick="removeAvatar()">
              <i class="fas fa-trash"></i> Remove
            </button>

/* ── Helpers ── */
function getUrlParam(n) { return new URLSearchParams(window.location.search).get(n); }
function fmt(n) {
  if (n>=1e6) return (n/1e6).toFixed(1)+'M';
  if (n>=1000) return (n/1000).toFixed(1)+'K';
  return (n||0).toString();
}
function fmtDate(d) {
  const now=new Date(), ms=now-d, mins=Math.floor(ms/60000), hrs=Math.floor(ms/3600000), days=Math.floor(ms/86400000);
  if (mins<60) return `${mins}m ago`;
  if (hrs<24) return `${hrs}h ago`;
  if (days<7) return `${days}d ago`;
  return d.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
}
function isMCQ(content) { return typeof content==='string' && content.trimStart().startsWith('❔'); }
function escHtml(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

/* ── Load ── */
async function loadProfile(loggedInUser) {
  currentUser = loggedInUser;
  const usernameParam = getUrlParam('username');

  try {
    let ud, userFirebaseId;

    if (usernameParam) {
      const { data: pu, error } = await supabase.from('users').select('*').eq('username', usernameParam).single();
      if (error || !pu) {
        showEmpty('articles', 'User not found', "This profile doesn't exist.");
        document.getElementById('heroArea').innerHTML = '';
        return;
      }
      ud = pu; userFirebaseId = pu.firebase_uid;
      isOwnProfile = loggedInUser && loggedInUser.uid === userFirebaseId;
    } else {
      if (!loggedInUser) { setTimeout(()=>location.href='login.html', 1200); return; }
      const { data: own } = await supabase.from('users').select('*').eq('firebase_uid', loggedInUser.uid).single();
      if (!own) { showEmpty('articles','Error loading profile','Please try again.'); return; }
      ud = own; userFirebaseId = loggedInUser.uid; currentUserData = ud; isOwnProfile = true;
    }

    viewingUserData = ud;

    // Fetch articles
    const { data: arts } = await supabase.from('articles').select('*')
      .eq('firebase_user_id', userFirebaseId).order('created_at', { ascending: false });
    articles = arts || [];

    renderHero(ud);
    renderArticlesList();

    // Fetch libraries
    const { data: libs } = await supabase.from('playlists').select('*')
      .eq('user_id', ud.user_id).order('name', { ascending: true });
    libraries = libs || [];

    // Article counts per library
    if (libraries.length > 0) {
      const { data: piRows } = await supabase.from('playlist_items').select('playlist_id');
      libArticleCounts = {};
      (piRows||[]).forEach(r => { libArticleCounts[r.playlist_id] = (libArticleCounts[r.playlist_id]||0)+1; });
    }
    renderLibrariesList();

  } catch(err) {
    console.error(err);
    showEmpty('articles','Something went wrong','Please refresh and try again.');
  }
}

/* ── Render Articles ── */
function renderArticlesList() {
  const el = document.getElementById('articlesList');
  if (!articles.length) {
    el.innerHTML = `<div class="feed-empty"><i class="fas fa-file-alt"></i><h3>No articles yet</h3><p>${isOwnProfile?"You haven't written any articles yet.":"No articles from this user."}</p></div>`;
    return;
  }
  el.innerHTML = '';
  articles.forEach(a => {
    const div = document.createElement('div');
    div.className = 'article-item';
    div.dataset.id = a.id;
    const mcq = isMCQ(a.content);
    div.innerHTML = `
      <div class="article-select-box"><i class="fas fa-check"></i></div>
      <div class="article-item-body">
        ${mcq ? '<div class="mcq-badge-sm">MCQ</div>' : ''}
        <div class="article-item-title">${escHtml(a.title||'Untitled')}</div>
        <div class="article-item-meta">
          <span class="article-item-stat"><i class="fas fa-eye"></i>${fmt(a.views||0)}</span>
          <span class="article-item-stat"><i class="fas fa-heart"></i>${fmt(a.likes||0)}</span>
          <span class="article-item-date">${fmtDate(new Date(a.created_at))}</span>
        </div>
      </div>
      ${isOwnProfile ? `
        <div class="article-item-actions">
          <button class="item-action-btn edit" title="Edit" onclick="openEditArticle(event,${a.id})"><i class="fas fa-pen"></i></button>
          <button class="item-action-btn del"  title="Delete" onclick="confirmDeleteArticle(event,${a.id})"><i class="fas fa-trash"></i></button>
        </div>` : ''}`;

    // Long-press for selection mode
    if (isOwnProfile) {
      let pressTimer;
      div.addEventListener('pointerdown', () => {
        pressTimer = setTimeout(()=>{ enterSelectionModeArticles(); toggleArticleSelect(a.id); }, 500);
      });
      div.addEventListener('pointerup',   ()=>clearTimeout(pressTimer));
      div.addEventListener('pointerleave',()=>clearTimeout(pressTimer));
      div.addEventListener('click', () => {
        if (inSelModeArt) { toggleArticleSelect(a.id); return; }
        location.href = `article.html?id=${a.id}`;
      });
    } else {
      div.addEventListener('click', ()=>{ location.href = `article.html?id=${a.id}`; });
    }

    el.appendChild(div);
  });
}

/* ── Article selection ── */
function enterSelectionModeArticles() {

}
window.exitSelectionModeArticles = function() {
  inSelModeArt = false;
  selectedArticles.clear();
  document.getElementById('articlesList').classList.remove('selection-mode');
  document.getElementById('selBarArticles').classList.remove('show');
  document.querySelectorAll('#articlesList .article-item').forEach(el=>el.classList.remove('selected'));
  updateSelCountArticles();
};
function toggleArticleSelect(id) {
  const el = document.querySelector(`#articlesList .article-item[data-id="${id}"]`);
  if (!el) return;
  if (selectedArticles.has(id)) { selectedArticles.delete(id); el.classList.remove('selected'); }
  else { selectedArticles.add(id); el.classList.add('selected'); }
  updateSelCountArticles();
}
function updateSelCountArticles() {
  document.getElementById('selCountArticles').textContent = `${selectedArticles.size} selected`;
}
window.selectAllArticles = function() {
  if (!inSelModeArt) enterSelectionModeArticles();

    selectedArticles.add(a.id);
    const el = document.querySelector(`#articlesList .article-item[data-id="${a.id}"]`);
    if (el) el.classList.add('selected');

};

/* ── Confirm sheet ── */
let _confirmCallback = null;
function openConfirmSheet(title, msg, callback) {
  document.getElementById('confirmTitle').textContent = title;
  document.getElementById('confirmMsg').textContent   = msg;
  _confirmCallback = callback;
  document.getElementById('confirmActionBtn').onclick = async () => {
    document.getElementById('confirmActionBtn').disabled = true;
    document.getElementById('confirmActionBtn').innerHTML = '<i class="fas fa-spinner fa-spin"></i> Deleting…';
    await callback();
    document.getElementById('confirmActionBtn').disabled = false;
    document.getElementById('confirmActionBtn').innerHTML = '<i class="fas fa-trash"></i> Delete';
    closeConfirmSheet();
  };
  document.getElementById('confirmSheet').classList.add('show');
}
window.closeConfirmSheet = function() {
  document.getElementById('confirmSheet').classList.remove('show');
  _confirmCallback = null;
};
document.getElementById('confirmSheet').addEventListener('click', e=>{if(e.target===e.currentTarget)closeConfirmSheet();});

/* ── Delete single article ── */
window.confirmDeleteArticle = function(e, id) {
  e.stopPropagation();
  const art = articles.find(a=>a.id===id);
  openConfirmSheet(
    'Delete Article',
    `"${art?.title?.slice(0,60)||'This article'}" will be permanently deleted.`,
    async () => {
      try {
        await supabase.from('media').delete().eq('article_id', id);
        await supabase.from('comments').delete().eq('article_id', id);
        await supabase.from('likes').delete().eq('article_id', id);
        await supabase.from('playlist_items').delete().eq('article_id', id);
        await supabase.from('saved_articles').delete().eq('article_id', id);
        const { error } = await supabase.from('articles').delete().eq('id', id);
        if (error) throw error;
        articles = articles.filter(a=>a.id!==id);
        renderArticlesList();
        renderHero(viewingUserData);
        showNotif('Article deleted', 'success');
      } catch(err) { console.error(err); showNotif('Failed to delete article', 'error'); }
    }
  );
};

/* ── Bulk delete articles ── */
window.confirmBulkDeleteArticles = function() {
  if (!selectedArticles.size) { showNotif('No articles selected','warning'); return; }
  const n = selectedArticles.size;
  openConfirmSheet(
    `Delete ${n} Article${n>1?'s':''}`,
    `${n} article${n>1?'s':''} will be permanently deleted. This cannot be undone.`,
    async () => {
      try {
        const ids = [...selectedArticles];
        await supabase.from('media').delete().in('article_id', ids);
        await supabase.from('comments').delete().in('article_id', ids);
        await supabase.from('likes').delete().in('article_id', ids);
        await supabase.from('playlist_items').delete().in('article_id', ids);
        await supabase.from('saved_articles').delete().in('article_id', ids);
        const { error } = await supabase.from('articles').delete().in('id', ids);
        if (error) throw error;
        articles = articles.filter(a=>!ids.includes(a.id));
        exitSelectionModeArticles();
        renderArticlesList();
        renderHero(viewingUserData);
        showNotif(`${n} article${n>1?'s':''} deleted`, 'success');
      } catch(err) { console.error(err); showNotif('Failed to delete articles', 'error'); }
    }
  );
};

/* ── Delete single library ── */
window.confirmDeleteLibrary = function(e, id) {
  e.stopPropagation();
  const lib = libraries.find(l=>l.id===id);
  openConfirmSheet(
    'Delete Library',
    `"${lib?.name?.slice(0,60)||'This library'}" will be deleted. Articles inside won't be deleted.`,
    async () => {
      try {
        await supabase.from('playlist_items').delete().eq('playlist_id', id);
        const { error } = await supabase.from('playlists').delete().eq('id', id);
        if (error) throw error;
        libraries = libraries.filter(l=>l.id!==id);
        delete libArticleCounts[id];
        renderLibrariesList();
        showNotif('Library deleted', 'success');
      } catch(err) { console.error(err); showNotif('Failed to delete library', 'error'); }
    }
  );
};

/* ── Bulk delete libraries ── */
window.confirmBulkDeleteLibraries = function() {
  if (!selectedLibraries.size) { showNotif('No libraries selected','warning'); return; }
  const n = selectedLibraries.size;
  openConfirmSheet(
    `Delete ${n} Librar${n>1?'ies':'y'}`,
    `${n} librar${n>1?'ies':'y'} will be deleted. Articles inside won't be affected.`,
    async () => {
      try {
        const ids = [...selectedLibraries];
        await supabase.from('playlist_items').delete().in('playlist_id', ids);

    }

};

/* ── Edit Article ── */
window.openEditArticle = function(e, id) {
  e.stopPropagation();
  const art = articles.find(a=>a.id===id);
  if (!art) return;
  editingArticleId = id;
  document.getElementById('editArticleTitle').value   = art.title || '';
  document.getElementById('editArticleContent').value = art.content || '';
  document.getElementById('editArticleSheet').classList.add('show');
};
window.closeEditArticle = function() {
  document.getElementById('editArticleSheet').classList.remove('show');
  editingArticleId = null;
};
window.saveArticle = async function() {
  if (!editingArticleId) return;
  const title   = document.getElementById('editArticleTitle').value.trim();
  const content = document.getElementById('editArticleContent').value.trim();
  if (!title) { showNotif('Title is required','warning'); return; }
  const btn = document.getElementById('saveArticleBtn');
  btn.disabled = true; btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Saving…';
  try {
    const { error } = await supabase.from('articles').update({ title, content }).eq('id', editingArticleId);
    if (error) throw error;
    const idx = articles.findIndex(a=>a.id===editingArticleId);
    if (idx!==-1) { articles[idx].title=title; articles[idx].content=content; }
    closeEditArticle();
    renderArticlesList();
    showNotif('Article updated','success');
  } catch(err) { console.error(err); showNotif('Failed to save','error'); }
  btn.disabled=false; btn.innerHTML='<i class="fas fa-check"></i> Save';
};
document.getElementById('editArticleSheet').addEventListener('click',e=>{if(e.target===e.currentTarget)closeEditArticle();});

/* ── Edit Library ── */
window.openEditLibrary = function(e, id) {
  e.stopPropagation();
  const lib = libraries.find(l=>l.id===id);
  if (!lib) return;
  editingLibraryId = id;
  document.getElementById('editLibraryName').value = lib.name || '';
  document.getElementById('editLibraryDesc').value = lib.description || '';
  document.getElementById('editLibrarySheet').classList.add('show');
};
window.closeEditLibrary = function() {
  document.getElementById('editLibrarySheet').classList.remove('show');
  editingLibraryId = null;
};
window.saveLibrary = async function() {
  if (!editingLibraryId) return;
  const name = document.getElementById('editLibraryName').value.trim();
  const desc = document.getElementById('editLibraryDesc').value.trim();
  if (!name) { showNotif('Library name is required','warning'); return; }
  const btn = document.getElementById('saveLibraryBtn');
  btn.disabled=true; btn.innerHTML='<i class="fas fa-spinner fa-spin"></i> Saving…';
  try {
    const { error } = await supabase.from('playlists').update({ name, description: desc||null }).eq('id', editingLibraryId);
    if (error) throw error;
    const idx = libraries.findIndex(l=>l.id===editingLibraryId);
    if (idx!==-1) { libraries[idx].name=name; libraries[idx].description=desc; }
    closeEditLibrary();
    renderLibrariesList();
    showNotif('Library updated','success');
  } catch(err) { console.error(err); showNotif('Failed to save','error'); }
  btn.disabled=false; btn.innerHTML='<i class="fas fa-check"></i> Save';
};
document.getElementById('editLibrarySheet').addEventListener('click',e=>{if(e.target===e.currentTarget)closeEditLibrary();});

/* ── Edit Profile ── */
window.openEditProfile = function() {
  if (!currentUserData) return;
  const bio = currentUserData.bio || '';
  document.getElementById('bioInputEdit').value = bio;
  document.getElementById('bioCharCount').textContent = `${bio.length}/300`;
  const prev = document.getElementById('avatarPreviewCircle');
  const removeBtn = document.getElementById('removeAvatarBtn');
  if (currentUserData.pfp) {
    prev.innerHTML = `<img src="${currentUserData.pfp}" alt="pfp">`;
    removeBtn.style.display = 'flex';
  } else {
    prev.innerHTML = `<i class="fas fa-user"></i>`;
    removeBtn.style.display = 'none';
  }
  selectedAvatarDataUrl = null;
  document.getElementById('editProfileSheet').classList.add('show');
};
window.closeEditProfile = function() {
  document.getElementById('editProfileSheet').classList.remove('show');
  selectedAvatarDataUrl = null;
  document.getElementById('fileInputAvatar').value = '';
};
window.handleAvatarSelect = function(event) {
  const file = event.target.files[0]; if (!file) return;
  if (file.size > 2*1024*1024) { showNotif('Max 2MB','warning'); event.target.value=''; return; }
  const reader = new FileReader();
  reader.onload = e => {
    selectedAvatarDataUrl = e.target.result;
    document.getElementById('avatarPreviewCircle').innerHTML = `<img src="${selectedAvatarDataUrl}" alt="Preview">`;
    document.getElementById('removeAvatarBtn').style.display = 'flex';
  };
  reader.readAsDataURL(file);
};
window.removeAvatar = function() {
  selectedAvatarDataUrl = '';
  document.getElementById('avatarPreviewCircle').innerHTML = `<i class="fas fa-user"></i>`;
  document.getElementById('removeAvatarBtn').style.display = 'none';
  document.getElementById('fileInputAvatar').value = '';
};
window.saveProfile = async function() {
  if (!currentUser || !isOwnProfile) return;
  const btn = document.getElementById('saveProfileBtn');
  btn.disabled=true; btn.innerHTML='<i class="fas fa-spinner fa-spin"></i> Saving…';
  try {
    const updateData = { bio: document.getElementById('bioInputEdit').value.trim() };
    if (selectedAvatarDataUrl !== null) updateData.pfp = selectedAvatarDataUrl || null;
    const { error } = await supabase.from('users').update(updateData).eq('firebase_uid', currentUser.uid);
    if (error) throw error;
    const { data: refreshed } = await supabase.from('users').select('*').eq('firebase_uid', currentUser.uid).single();
    if (refreshed) { currentUserData = refreshed; viewingUserData = refreshed; }
    closeEditProfile();
    renderHero(currentUserData);
    showNotif('Profile updated','success');
  } catch(err) { console.error(err); showNotif('Failed to save profile','error'); }
  btn.disabled=false; btn.innerHTML='<i class="fas fa-check"></i> Save';
};
document.getElementById('editProfileSheet').addEventListener('click',e=>{if(e.target===e.currentTarget)closeEditProfile();});

/* ── Auth ── */
const usernameParam = getUrlParam('username');
if (usernameParam) loadProfile(null);

onAuthStateChanged(auth, async user => {
  if (user) {
    currentUser = user;
    if (!usernameParam) {
      await loadProfile(user);
    } else {
      // Check if viewing own profile via username param
      const { data: pu } = await supabase.from('users').select('firebase_uid').eq('username', usernameParam).single();
      if (pu && pu.firebase_uid === user.uid) {
        await loadProfile(user);
      }
    }
  } else {
    if (!usernameParam) {
      setTimeout(()=>location.href='login.html', 1200);
    }
  }
});
</script>
