<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Patholytica — Profile</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root {
  --bg-color: #0d0d0d;
  --bg-secondary: #141414;
  --text-primary: #e8e6e1;
  --text-secondary: #7a7875;
  --card-bg: #141414;
  --hover-bg: #1c1c1c;
  --border-color: #242424;
  --accent: #4f9eff;
  --accent-hover: #3a8ae8;
  --accent-green: #3dba72;
  --accent-purple: #a56fd4;
  --accent-orange: #e88c3a;
  --header-height: 53px;
}
body.light-theme {
  --bg-color: #f9f9f9;
  --bg-secondary: #ffffff;
  --text-primary: #0f0f0f;
  --text-secondary: #606060;
  --card-bg: #ffffff;
  --hover-bg: #f0f0f0;
  --border-color: #e5e5e5;
  --accent: #065fd4;
  --accent-hover: #0448a3;
}
* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; min-height: 100%; font-family: "Roboto", Arial, sans-serif; overflow-x: hidden; max-width: 100vw; }
body { background: var(--bg-color); color: var(--text-primary); transition: background 0.2s, color 0.2s; }

/* ── Header ── */
.header-wrapper {
  position: fixed; top: 0; left: 0; right: 0;
  background: var(--bg-color);
  padding-top: env(safe-area-inset-top);
  border-bottom: 1px solid var(--border-color);
  z-index: 40; width: 100%;
}
.header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px 24px;
}
.logo-img { height: 28px; width: auto; cursor: pointer; transition: opacity 0.2s ease; }
body.light-theme .logo-img { filter: invert(1); }
.logo-img:hover { opacity: 0.8; }
.header-actions { display: flex; align-items: center; gap: 16px; }

.auth-buttons { display: none; gap: 12px; }
.auth-buttons.show { display: flex; }
.btn-login {
  padding: 7px 18px; border-radius: 20px; font-size: 14px; font-weight: 500;
  cursor: pointer; transition: all 0.2s ease; text-decoration: none;
  background: transparent; color: var(--text-primary); border: 1px solid var(--border-color);
}
.btn-login:hover { background: var(--hover-bg); border-color: var(--text-secondary); }

.user-welcome { display: none; align-items: center; gap: 12px; font-size: 14px; }
.user-welcome.show { display: flex; }
.welcome-text {
  font-weight: 500; cursor: pointer; transition: all 0.2s ease;
  padding: 6px 14px; border-radius: 20px; border: 1px solid var(--border-color); color: var(--text-primary);
}
.welcome-text:hover { color: var(--accent); border-color: var(--accent); background: rgba(79,158,255,0.06); }

/* ── User Popup ── */
.user-popup-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 200; }
.user-popup-overlay.show { display: block; }
.user-popup {
  position: fixed;
  top: calc(var(--header-height) + 8px); right: 16px;
  width: 300px; background: var(--card-bg);
  border: 1px solid var(--border-color); border-radius: 16px;
  box-shadow: 0 16px 48px rgba(0,0,0,0.7); z-index: 201;
  overflow: hidden; display: none; animation: popupIn 0.2s ease;
}
.user-popup.show { display: block; }
@keyframes popupIn {
  from { opacity: 0; transform: translateY(-8px) scale(0.97); }
  to   { opacity: 1; transform: translateY(0) scale(1); }
}
.popup-profile-section { padding: 20px; display: flex; align-items: center; gap: 14px; border-bottom: 1px solid var(--border-color); }
.popup-avatar { width: 52px; height: 52px; border-radius: 50%; background: var(--accent); display: flex; align-items: center; justify-content: center; font-size: 22px; font-weight: 700; color: white; flex-shrink: 0; overflow: hidden; }
.popup-avatar img { width: 100%; height: 100%; object-fit: cover; }
.popup-user-info { flex: 1; min-width: 0; }
.popup-username { font-weight: 700; font-size: 15px; margin-bottom: 2px; color: var(--text-primary); }
.popup-stats { font-size: 12px; color: var(--text-secondary); }
.popup-menu-item { display: flex; align-items: center; gap: 12px; padding: 14px 20px; cursor: pointer; transition: background 0.15s ease; font-size: 14px; color: var(--text-primary); border: none; background: none; width: 100%; text-align: left; }
.popup-menu-item:hover { background: var(--hover-bg); }
.popup-menu-item i { width: 18px; text-align: center; color: var(--text-secondary); font-size: 15px; }
.popup-menu-item.danger { color: #ff5555; }
.popup-menu-item.danger i { color: #ff5555; }
.popup-divider { height: 1px; background: var(--border-color); margin: 4px 0; }

/* ── Profile Hero (sticky above feed) ── */
.profile-hero {
  position: fixed;
  top: var(--header-height);
  left: 0; right: 0;
  background: var(--bg-color);
  border-bottom: 1px solid var(--border-color);
  z-index: 30;
  padding: 16px 20px;
}
.hero-inner {
  display: flex; align-items: center; gap: 16px;
}
.profile-avatar-large {
  width: 56px; height: 56px; border-radius: 50%;
  background: var(--accent);
  display: flex; align-items: center; justify-content: center;
  font-size: 22px; font-weight: 700; color: white;
  flex-shrink: 0; overflow: hidden;
  border: 2px solid var(--border-color);
}
.profile-avatar-large img { width: 100%; height: 100%; object-fit: cover; }
.hero-info { flex: 1; min-width: 0; }
.profile-username-hero {
  font-size: 16px; font-weight: 700;
  margin: 0 0 6px 0; color: var(--text-primary);
}
.profile-stats-compact {
  display: flex; align-items: center; gap: 16px; flex-wrap: wrap;
}
.compact-stat { display: flex; align-items: center; gap: 4px; font-size: 12px; color: var(--text-secondary); }
.compact-stat-value { font-weight: 700; color: var(--text-primary); }
.hero-actions { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
.btn-edit-small {
  padding: 7px 16px; border-radius: 20px; font-size: 13px; font-weight: 600;
  cursor: pointer; transition: all 0.2s ease; border: none;
  background: var(--accent); color: white; display: flex; align-items: center; gap: 6px;
}
.btn-edit-small:hover { background: var(--accent-hover); }

/* ── Feed ── */
.feed-container {
  position: fixed;
  left: 0; right: 0; bottom: 0;
  overflow: hidden;
}
.posts-wrapper {
  height: 100%;
  overflow-y: scroll;
  scroll-snap-type: y mandatory;
  scrollbar-width: none;
}
.posts-wrapper::-webkit-scrollbar { display: none; }

.article-card {
  position: relative;
  scroll-snap-align: start;
  scroll-snap-stop: always;
  background: var(--bg-color);
  padding: 16px 20px 20px;
  display: flex; flex-direction: column;
  border-bottom: 1px solid var(--border-color);
}
.article-header { display: flex; align-items: center; gap: 12px; flex-shrink: 0; }
.article-date-line { color: var(--text-secondary); font-size: 12px; }
.header-bottom-line {
  width: calc(100% + 40px); margin-left: -20px;
  height: 1px; background: var(--border-color);
  flex-shrink: 0; margin-top: 12px; margin-bottom: 12px;
}
.article-title {
  font-size: 20px; font-weight: 700; color: var(--text-primary);
  margin-bottom: 8px; line-height: 1.25; flex-shrink: 0;
}
.article-stats { display: flex; align-items: center; gap: 14px; margin-bottom: 10px; flex-shrink: 0; }
.stat-item { display: flex; align-items: center; gap: 5px; font-size: 13px; color: var(--text-secondary); }
.stat-item.views i { color: var(--accent); }
.stat-item.likes i { color: #ef4444; }
.article-content {
  color: var(--text-primary); font-size: 15px; line-height: 1.75;
  flex: 1; overflow-y: auto; padding-right: 56px;
  font-family: "Merriweather", Georgia, serif;
}
.article-content::-webkit-scrollbar { width: 4px; }
.article-content::-webkit-scrollbar-track { background: transparent; }
.article-content::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 2px; }
.content-paragraph { margin-bottom: 14px; }

.action-buttons {
  position: absolute; right: 14px; bottom: 60px;
  display: flex; flex-direction: column; gap: 18px; z-index: 10;
}
.action-btn {
  display: flex; flex-direction: column; align-items: center; gap: 3px;
  background: none; border: none; cursor: pointer; transition: transform 0.1s;
}
.action-btn:active { transform: scale(0.9); }
.action-btn svg { width: 26px; height: 26px; stroke: var(--text-primary); fill: none; stroke-width: 2; }
.action-btn.liked svg { fill: #ef4444; stroke: #ef4444; }
.action-btn span { color: var(--text-primary); font-size: 11px; font-weight: 600; }

/* ── Skeleton ── */
@keyframes shimmer { 0% { background-position: -400px 0; } 100% { background-position: 400px 0; } }
.skeleton-base {
  background: linear-gradient(90deg, var(--hover-bg) 25%, #1e1e1e 50%, var(--hover-bg) 75%);
  background-size: 800px 100%; animation: shimmer 1.4s infinite linear; border-radius: 6px;
}
body.light-theme .skeleton-base { background: linear-gradient(90deg, #e8e8e8 25%, #d0d0d0 50%, #e8e8e8 75%); background-size: 800px 100%; }

.skeleton-card {
  position: relative;
  scroll-snap-align: start; scroll-snap-stop: always;
  background: var(--bg-color); padding: 16px 20px 20px;
  display: flex; flex-direction: column; border-bottom: 1px solid var(--border-color);
}
.skeleton-header { display: flex; align-items: center; gap: 12px; flex-shrink: 0; }
.skeleton-date { height: 10px; width: 80px; }
.skeleton-divider { width: calc(100% + 40px); margin-left: -20px; height: 1px; background: var(--border-color); flex-shrink: 0; margin-top: 12px; margin-bottom: 12px; }
.skeleton-title { height: 20px; width: 85%; margin-bottom: 8px; }
.skeleton-title-short { height: 20px; width: 55%; margin-bottom: 10px; }
.skeleton-stats { display: flex; gap: 12px; margin-bottom: 12px; flex-shrink: 0; }
.skeleton-stat { height: 13px; width: 52px; }
.skeleton-line { height: 13px; margin-bottom: 10px; width: 100%; }
.skeleton-line.w90 { width: 90%; }
.skeleton-line.w75 { width: 75%; }
.skeleton-line.w80 { width: 80%; }
.skeleton-line.w65 { width: 65%; }
.skeleton-line.w95 { width: 95%; }

/* ── Hero skeleton ── */
.hero-skeleton {
  position: fixed;
  top: var(--header-height);
  left: 0; right: 0;
  background: var(--bg-color);
  border-bottom: 1px solid var(--border-color);
  z-index: 30;
  padding: 16px 20px;
  display: flex; align-items: center; gap: 16px;
}
.hero-sk-avatar { width: 56px; height: 56px; border-radius: 50%; flex-shrink: 0; }
.hero-sk-info { flex: 1; display: flex; flex-direction: column; gap: 8px; }
.hero-sk-name { height: 14px; width: 120px; }
.hero-sk-stats { display: flex; gap: 16px; }
.hero-sk-stat { height: 11px; width: 60px; }

/* ── Empty / Error ── */
.feed-empty {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  height: 100%; color: var(--text-secondary); gap: 14px; text-align: center; padding: 40px;
}
.feed-empty i { font-size: 44px; opacity: 0.3; }
.feed-empty h3 { font-size: 17px; margin: 0 0 6px 0; color: var(--text-primary); }
.feed-empty p { font-size: 13px; margin: 0; }

/* ── Bio strip (inside hero) ── */
.hero-bio {
  font-size: 12px; color: var(--text-secondary);
  margin-top: 5px; line-height: 1.4;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  max-width: 100%;
}

/* ── Modal ── */
.modal-overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,0.85); z-index: 500;
  align-items: center; justify-content: center; padding: 20px;
}
.modal-overlay.show { display: flex; }
.modal-content {
  background: var(--card-bg); border-radius: 16px;
  width: 100%; max-width: 480px; max-height: 90vh;
  overflow-y: auto; border: 1px solid var(--border-color);
  box-shadow: 0 24px 72px rgba(0,0,0,0.9);
  animation: popupIn 0.2s ease;
}
.modal-header {
  padding: 20px 24px; border-bottom: 1px solid var(--border-color);
  display: flex; align-items: center; justify-content: space-between;
}
.modal-title { font-size: 16px; font-weight: 700; margin: 0; color: var(--text-primary); }
.modal-close {
  width: 32px; height: 32px; border-radius: 50%; background: transparent;
  border: none; color: var(--text-primary); cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px; transition: background 0.2s ease;
}
.modal-close:hover { background: var(--hover-bg); }
.modal-body { padding: 24px; }
.form-group { margin-bottom: 22px; }
.form-label {
  display: block; font-size: 10px; font-weight: 700;
  color: var(--text-secondary); text-transform: uppercase;
  letter-spacing: 0.08em; opacity: 0.7; margin-bottom: 8px;
}
.form-textarea {
  width: 100%; padding: 11px 14px;
  border: 1px solid var(--border-color); border-radius: 10px;
  background: var(--bg-secondary); color: var(--text-primary);
  font-size: 14px; font-family: inherit; transition: border-color 0.2s ease;
  outline: none; resize: vertical; min-height: 100px;
}
.form-textarea:focus { border-color: var(--accent); background: var(--hover-bg); }
.avatar-upload { display: flex; align-items: center; gap: 18px; }
.avatar-preview {
  width: 72px; height: 72px; border-radius: 50%;
  background: var(--accent); display: flex; align-items: center; justify-content: center;
  font-size: 28px; font-weight: 700; color: white;
  overflow: hidden; border: 2px solid var(--border-color); flex-shrink: 0;
}
.avatar-preview img { width: 100%; height: 100%; object-fit: cover; }
.avatar-upload-btn { display: flex; flex-direction: column; gap: 8px; flex: 1; }
.btn-upload, .btn-remove {
  padding: 9px 16px; border-radius: 24px; font-size: 13px; font-weight: 600;
  cursor: pointer; transition: all 0.2s ease;
  border: 1px solid var(--border-color); background: transparent;
  color: var(--text-primary);
  display: flex; align-items: center; justify-content: center; gap: 6px;
}
.btn-upload:hover { background: var(--hover-bg); border-color: var(--accent); }
.btn-remove { color: #ff5555; border-color: #ff5555; }
.btn-remove:hover { background: rgba(255,85,85,0.08); }
.file-input { display: none; }
.upload-hint { font-size: 11px; color: var(--text-secondary); }
.modal-footer {
  padding: 16px 24px; border-top: 1px solid var(--border-color);
  display: flex; gap: 10px; justify-content: flex-end;
}
.btn-cancel, .btn-save {
  padding: 9px 22px; border-radius: 24px; font-size: 13px; font-weight: 600;
  cursor: pointer; transition: all 0.2s ease; border: none;
}
.btn-cancel { background: transparent; color: var(--text-primary); border: 1px solid var(--border-color); }
.btn-cancel:hover { background: var(--hover-bg); }
.btn-save { background: var(--accent); color: white; }
.btn-save:hover { background: var(--accent-hover); }
.btn-save:disabled { opacity: 0.4; cursor: not-allowed; }

/* ── Comments ── */
.comments-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 199; opacity: 0; pointer-events: none; transition: opacity 0.3s ease; }
.comments-overlay.active { opacity: 1; pointer-events: all; }
.comments-popup {
  position: fixed; top: 50%; left: 50%;
  transform: translate(-50%, -50%) scale(0.9);
  width: calc(100% - 40px); max-width: 500px;
  height: 70vh; max-height: 600px;
  background: var(--card-bg); border-radius: 16px; z-index: 200;
  opacity: 0; pointer-events: none;
  transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  display: flex; flex-direction: column;
  box-shadow: 0 24px 72px rgba(0,0,0,0.8); border: 1px solid var(--border-color);
}
.comments-popup.active { opacity: 1; pointer-events: all; transform: translate(-50%, -50%) scale(1); }
.comments-header { display: flex; align-items: center; justify-content: space-between; padding: 16px 20px; border-bottom: 1px solid var(--border-color); }
.comments-header h3 { font-size: 16px; font-weight: 600; margin: 0; color: var(--text-primary); }
.close-comments { background: none; border: none; color: var(--text-primary); font-size: 24px; cursor: pointer; padding: 0; width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; border-radius: 50%; transition: background 0.2s ease; }
.close-comments:hover { background: var(--hover-bg); }
.comments-list { flex: 1; overflow-y: auto; padding: 16px 20px; }
.comment-item { display: flex; gap: 12px; margin-bottom: 20px; }
.comment-avatar { width: 32px; height: 32px; border-radius: 50%; background: var(--accent); display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: bold; color: white; flex-shrink: 0; overflow: hidden; }
.comment-avatar img { width: 100%; height: 100%; object-fit: cover; }
.comment-content { flex: 1; }
.comment-author { font-weight: 600; font-size: 13px; margin-bottom: 4px; color: var(--text-primary); }
.comment-text { font-size: 14px; line-height: 1.5; margin-bottom: 6px; color: var(--text-primary); }
.comment-time { font-size: 11px; color: var(--text-secondary); }
.comment-input-wrapper { padding: 12px 20px; border-top: 1px solid var(--border-color); background: var(--bg-secondary); border-radius: 0 0 16px 16px; }
.comment-input-container { display: flex; gap: 8px; align-items: center; }
.comment-input { flex: 1; background: var(--hover-bg); border: 1px solid var(--border-color); border-radius: 20px; padding: 10px 16px; color: var(--text-primary); font-size: 14px; outline: none; }
.comment-input::placeholder { color: var(--text-secondary); }
.comment-input:focus { border-color: var(--accent); }
.send-comment-btn { width: 36px; height: 36px; border-radius: 50%; background: var(--accent); border: none; color: white; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 16px; transition: all 0.2s ease; }
.send-comment-btn:hover { background: var(--accent-hover); }
.send-comment-btn:disabled { opacity: 0.4; cursor: not-allowed; }
.no-comments { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; color: var(--text-secondary); gap: 12px; }
.no-comments i { font-size: 48px; opacity: 0.4; }

@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<script>
if (localStorage.getItem('theme') === 'light') document.body.classList.add('light-theme');
function updateHeaderHeight() {
  const h = document.getElementById('headerWrapper'); if (!h) return;
  document.documentElement.style.setProperty('--header-height', h.offsetHeight + 'px');
}
document.addEventListener('DOMContentLoaded', updateHeaderHeight);
window.addEventListener('resize', updateHeaderHeight);
</script>

<!-- Header -->
<div class="header-wrapper" id="headerWrapper">
  <div class="header">
    <img src="IMG_0696.png" class="logo-img" alt="Patholytica Logo" onclick="window.location.href='index.html'">
    <div class="header-actions">
      <div class="auth-buttons" id="authButtons"><a href="login.html" class="btn-login">Log In</a></div>
      <div class="user-welcome" id="userWelcome">
        <span class="welcome-text" id="welcomeText" onclick="toggleUserPopup()">@username</span>
      </div>
    </div>
  </div>
</div>

<!-- User Popup -->
<div class="user-popup-overlay" id="userPopupOverlay" onclick="closeUserPopup()"></div>
<div class="user-popup" id="userPopup">
  <div class="popup-profile-section">
    <div class="popup-avatar" id="popupAvatar">?</div>
    <div class="popup-user-info">
      <div class="popup-username" id="popupUsername">@username</div>
      <div class="popup-stats" id="popupStats">Loading...</div>
    </div>
  </div>
  <button class="popup-menu-item" onclick="closeUserPopup(); window.location.href='profile.html'"><i class="fas fa-user"></i> My Profile</button>
  <div class="popup-divider"></div>
  <button class="popup-menu-item" onclick="toggleTheme()"><i class="fas fa-circle-half-stroke" id="themeIcon"></i><span id="themeLabel">Light Mode</span></button>
  <div class="popup-divider"></div>
  <button class="popup-menu-item danger" onclick="closeUserPopup(); logOut()"><i class="fas fa-sign-out-alt"></i> Log Out</button>
</div>

<!-- Profile Hero (shown while loading as skeleton, then replaced) -->
<div id="heroArea">
  <div class="hero-skeleton" id="heroSkeleton">
    <div class="hero-sk-avatar skeleton-base"></div>
    <div class="hero-sk-info">
      <div class="hero-sk-name skeleton-base"></div>
      <div class="hero-sk-stats">
        <div class="hero-sk-stat skeleton-base"></div>
        <div class="hero-sk-stat skeleton-base"></div>
        <div class="hero-sk-stat skeleton-base"></div>
      </div>
    </div>
  </div>
</div>

<!-- Feed -->
<div class="feed-container" id="feedContainer">
  <div class="posts-wrapper" id="postsWrapper">
    <div class="skeleton-card" id="sk1">
      <div class="skeleton-header"><div class="skeleton-date skeleton-base"></div></div>
      <div class="skeleton-divider"></div>
      <div class="skeleton-title skeleton-base"></div><div class="skeleton-title-short skeleton-base"></div>
      <div class="skeleton-stats"><div class="skeleton-stat skeleton-base"></div><div class="skeleton-stat skeleton-base"></div></div>
      <div class="skeleton-line skeleton-base"></div><div class="skeleton-line w90 skeleton-base"></div><div class="skeleton-line w95 skeleton-base"></div><div class="skeleton-line w80 skeleton-base"></div><div class="skeleton-line skeleton-base"></div><div class="skeleton-line w75 skeleton-base"></div>
    </div>
    <div class="skeleton-card" id="sk2">
      <div class="skeleton-header"><div class="skeleton-date skeleton-base"></div></div>
      <div class="skeleton-divider"></div>
      <div class="skeleton-title skeleton-base"></div><div class="skeleton-title-short skeleton-base"></div>
      <div class="skeleton-stats"><div class="skeleton-stat skeleton-base"></div><div class="skeleton-stat skeleton-base"></div></div>
      <div class="skeleton-line skeleton-base"></div><div class="skeleton-line w90 skeleton-base"></div><div class="skeleton-line w80 skeleton-base"></div><div class="skeleton-line w65 skeleton-base"></div>
    </div>
  </div>

      <div style="flex:1;min-width:0;"><div style="font-size:13px;font-weight:500;margin-bottom:6px;color:var(--text-primary);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${m.caption||'Audio'}</div></div>
      <audio id="${aid}" src="${m.url}" style="display:none;"></audio>
    </div>`;
  } else if (m.type === 'pdf') {
    d.innerHTML = `<div style="background:var(--bg-secondary);border:1px solid var(--border-color);border-radius:12px;overflow:hidden;margin:12px 0;">

        <a href="${m.url}" target="_blank" rel="noopener" style="font-size:11px;font-weight:700;color:var(--accent);background:rgba(79,158,255,0.1);border:1px solid rgba(79,158,255,0.2);border-radius:8px;padding:4px 10px;text-decoration:none;white-space:nowrap;flex-shrink:0;">Open PDF</a>

    const ytMatch = m.url.match(/embed\/([A-Za-z0-9_-]{11})/);

    const label = m.caption || (videoId ? `youtube.com/watch?v=${videoId}` : 'YouTube Video');

        <span style="font-size:13px;font-weight:600;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--text-primary);">${label}</span>
        ${videoId?`<a href="https://www.youtube.com/watch?v=${videoId}" target="_blank" rel="noopener" style="font-size:11px;font-weight:700;color:#ff0000;background:rgba(255,0,0,0.1);border:1px solid rgba(255,0,0,0.2);border-radius:8px;padding:4px 10px;text-decoration:none;white-space:nowrap;flex-shrink:0;">Watch</a>`:''}

// ── Likes ──
async function getCurrentUserForLike() {
  try { const fu = auth.currentUser; if (!fu) return null; const { data } = await supabase.from('users').select('user_id, firebase_uid').eq('firebase_uid', fu.uid).single(); return data||null; } catch(e) { return null; }
}
async function loadUserLikes(userId) {
  try { const { data } = await supabase.from('likes').select('article_id').eq('user_id', userId); userLikes.clear(); (data||[]).forEach(l => userLikes.add(String(l.article_id))); updateLikeButtons(); } catch(e) {}
}
function updateLikeButtons() { document.querySelectorAll('.like-btn').forEach(btn => btn.classList.toggle('liked', userLikes.has(String(btn.dataset.id)))); }

async function handleLike(e) {
  const btn = e.currentTarget, id = String(btn.dataset.id), countSpan = btn.querySelector('.like-count');
  let likeUser = await getCurrentUserForLike();
  if (!likeUser) { alert('Please log in to like articles'); window.location.href = 'login.html'; return; }
  if (btn.dataset.processing === 'true') return;
  btn.dataset.processing = 'true';
  const wasLiked = userLikes.has(id), prevCount = parseInt(countSpan.textContent?.replace(/[KM]/,''))||0;
  const artIdx = articles.findIndex(a => String(a.id) === id);
  const prevRealCount = artIdx !== -1 ? (articles[artIdx].likes||0) : 0;
  const newCount = wasLiked ? Math.max(0, prevRealCount-1) : prevRealCount+1;
  if (wasLiked) { userLikes.delete(id); btn.classList.remove('liked'); } else { userLikes.add(id); btn.classList.add('liked'); }
  countSpan.textContent = formatNumber(newCount);
  const card = btn.closest('.article-card');
  if (card) { const s = card.querySelector('.stat-item.likes span'); if (s) s.textContent = formatNumber(newCount); }
  if (artIdx !== -1) articles[artIdx].likes = newCount;
  try {
    if (wasLiked) {
      await supabase.from('likes').delete().eq('article_id', id).eq('user_id', likeUser.user_id);
      const { error: rpcErr } = await supabase.rpc('decrement_likes', { article_id: parseInt(id) });
      if (rpcErr) { const { data: fresh } = await supabase.from('articles').select('likes').eq('id', id).single(); await supabase.from('articles').update({ likes: Math.max(0,(fresh?.likes||1)-1) }).eq('id', id); }
    } else {
      const { error: insErr } = await supabase.from('likes').insert([{ article_id: parseInt(id), user_id: likeUser.user_id }]);
      if (insErr && insErr.code !== '23505') throw insErr;
      const { error: rpcErr } = await supabase.rpc('increment_likes', { article_id: parseInt(id) });
      if (rpcErr) { const { data: fresh } = await supabase.from('articles').select('likes').eq('id', id).single(); await supabase.from('articles').update({ likes: (fresh?.likes||0)+1 }).eq('id', id); }
    }
  } catch(err) {
    console.error(err);
    if (wasLiked) { userLikes.add(id); btn.classList.add('liked'); } else { userLikes.delete(id); btn.classList.remove('liked'); }
    countSpan.textContent = formatNumber(prevRealCount);
    if (card) { const s = card.querySelector('.stat-item.likes span'); if (s) s.textContent = formatNumber(prevRealCount); }
    if (artIdx !== -1) articles[artIdx].likes = prevRealCount;
  } finally { btn.dataset.processing = 'false'; }
}

// ── Comments ──
async function handleComments(e) { const id = e.currentTarget.dataset.id; currentArticleId = id; await loadComments(id); openComments(); }
async function loadComments(id) {
  const list = document.getElementById('commentsList');
  list.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:80px;"><div style="width:28px;height:28px;border:3px solid var(--border-color);border-top-color:var(--accent);border-radius:50%;animation:spin 0.8s linear infinite;"></div></div>';
  try {
    const { data: comments } = await supabase.from('comments').select('*').eq('article_id', id).order('created_at', { ascending: true });
    if (!comments || comments.length === 0) { list.innerHTML = '<div class="no-comments"><i class="fas fa-comments"></i><div>No comments yet</div></div>'; return; }
    const uids = [...new Set(comments.map(c => c.user_id).filter(Boolean))]; let umap = {};
    if (uids.length > 0) { const { data: u } = await supabase.from('users').select('user_id, username, pfp').in('user_id', uids); if (u) u.forEach(u => { umap[u.user_id] = u; }); }
    list.innerHTML = comments.map(c => {
      const u = umap[c.user_id], author = u?.username ? `@${u.username}` : 'Anonymous';
      const av = u?.pfp ? `<img src="${u.pfp}" alt="${author}">` : (u?.username||'A')[0].toUpperCase();
      return `<div class="comment-item"><div class="comment-avatar">${av}</div><div class="comment-content"><div class="comment-author">${author}</div><div class="comment-text">${c.comment_text}</div><div class="comment-time">${formatDate(new Date(c.created_at))}</div></div></div>`;
    }).join('');
  } catch(e) { list.innerHTML = '<div class="no-comments"><i class="fas fa-exclamation-triangle"></i><div>Failed to load</div></div>'; }
}
async function loadCommentCounts() {
  try {
    const ids = articles.map(a => a.id);
    if (!ids.length) return;
    const { data } = await supabase.from('comments').select('article_id').in('article_id', ids);
    const counts = {}; (data||[]).forEach(c => { counts[c.article_id] = (counts[c.article_id]||0)+1; });
    document.querySelectorAll('.comment-btn').forEach(btn => { btn.querySelector('.comment-count').textContent = counts[btn.dataset.id]||0; });
  } catch(e) {}
}
window.openComments  = () => { document.getElementById('commentsPopup').classList.add('active'); document.getElementById('commentsOverlay').classList.add('active'); };
window.closeComments = () => { document.getElementById('commentsPopup').classList.remove('active'); document.getElementById('commentsOverlay').classList.remove('active'); };
window.sendComment = async function() {
  const input = document.getElementById('commentInput'), text = input.value.trim();
  if (!text || !currentArticleId) return;
  const btn = document.getElementById('sendCommentBtn'); btn.disabled = true;
  try {
    const fu = auth.currentUser; if (!fu) { window.location.href = 'login.html'; return; }
    const { data: ud } = await supabase.from('users').select('user_id').eq('firebase_uid', fu.uid).single();
    if (!ud) return;
    await supabase.from('comments').insert([{ article_id: currentArticleId, user_id: ud.user_id, comment_text: text }]);
    input.value = ''; await loadComments(currentArticleId);
    const cb = document.querySelector(`.comment-btn[data-id="${currentArticleId}"]`);
    if (cb) { const cs = cb.querySelector('.comment-count'); cs.textContent = parseInt(cs.textContent)+1; }
  } catch(e) { alert('Failed to post comment.'); } finally { btn.disabled = false; }
};
document.getElementById('commentInput').addEventListener('keypress', e => { if (e.key==='Enter') window.sendComment(); });

// ── View tracking ──
function setupIntersectionObserver() {
  const obs = new IntersectionObserver(entries => entries.forEach(e => {
    const id = e.target.dataset.articleId; if (!id) return;
    if (e.isIntersecting && e.intersectionRatio >= 0.75) startViewTimer(id);
    else clearViewTimer(id);
  }), { threshold: [0.75] });
  document.querySelectorAll('.article-card').forEach(c => { if (c.dataset.articleId) obs.observe(c); });
}
function startViewTimer(id) { if (viewedArticles.has(id) || viewTimers[id]) return; viewTimers[id] = setTimeout(async () => { await incrementView(id); }, 5000); }
function clearViewTimer(id) { if (viewTimers[id]) { clearTimeout(viewTimers[id]); delete viewTimers[id]; } }
async function incrementView(id) {
  if (viewedArticles.has(id)) return;
  try {
    viewedArticles.add(id);
    const { data: a } = await supabase.from('articles').select('views').eq('id', id).single();
    const nv = (a.views||0)+1;
    await supabase.from('articles').update({ views: nv }).eq('id', id);
    const idx = articles.findIndex(a => a.id === id); if (idx !== -1) articles[idx].views = nv;
    const card = document.querySelector(`.article-card[data-article-id="${id}"]`);
    if (card) { const s = card.querySelector('.stat-item.views span'); if (s) s.textContent = formatNumber(nv); }
  } catch(e) { viewedArticles.delete(id); }
}

// ── Edit Modal ──
window.openEditModal = function() {
  if (!isOwnProfile || !currentUserData) return;
  const bioInput = document.getElementById('bioInput');
  const avatarPreview = document.getElementById('avatarPreview');
  const removeBtn = document.getElementById('removeBtn');
  bioInput.value = currentUserData.bio || '';
  if (currentUserData.pfp) {
    avatarPreview.innerHTML = `<img src="${currentUserData.pfp}" alt="pfp">`;
    removeBtn.style.display = 'flex';
  } else {
    avatarPreview.innerHTML = `<i class="fas fa-user"></i>`;
    removeBtn.style.display = 'none';
  }
  selectedImageDataUrl = null;
  document.getElementById('editModal').classList.add('show');
};
window.closeEditModal = function() {
  document.getElementById('editModal').classList.remove('show');
  selectedImageDataUrl = null;
  document.getElementById('fileInput').value = '';
};
window.handleImageSelect = function(event) {
  const file = event.target.files[0]; if (!file) return;
  if (file.size > 2 * 1024 * 1024) { alert('Max 2MB'); event.target.value = ''; return; }
  if (!file.type.startsWith('image/')) { alert('Please select an image file'); event.target.value = ''; return; }
  const reader = new FileReader();
  reader.onload = e => {
    selectedImageDataUrl = e.target.result;
    document.getElementById('avatarPreview').innerHTML = `<img src="${selectedImageDataUrl}" alt="Preview">`;
    document.getElementById('removeBtn').style.display = 'flex';
  };
  reader.readAsDataURL(file);
};
window.removeImage = function() {
  selectedImageDataUrl = '';
  document.getElementById('avatarPreview').innerHTML = `<i class="fas fa-user"></i>`;
  document.getElementById('removeBtn').style.display = 'none';
  document.getElementById('fileInput').value = '';
};
window.saveProfile = async function() {
  if (!isOwnProfile || !currentUser) return;
  const saveBtn = document.getElementById('saveBtn');
  saveBtn.disabled = true; saveBtn.textContent = 'Saving...';
  try {
    const updateData = { bio: document.getElementById('bioInput').value.trim() };
    if (selectedImageDataUrl !== null) updateData.pfp = selectedImageDataUrl || null;
    const { error } = await supabase.from('users').update(updateData).eq('firebase_uid', currentUser.uid);
    if (error) { alert('Error saving. Please try again.'); saveBtn.disabled = false; saveBtn.textContent = 'Save Changes'; return; }
    const { data: refreshed } = await supabase.from('users').select('*').eq('firebase_uid', currentUser.uid).single();
    if (refreshed) { currentUserData = refreshed; }
    closeEditModal();
    // Re-render hero only
    const totalViews = articles.reduce((s,a) => s+(a.views||0), 0);
    const totalLikes = articles.reduce((s,a) => s+(a.likes||0), 0);
    renderHero(currentUserData, articles.length, totalViews, totalLikes);
  } catch(err) { alert('An unexpected error occurred.'); }
  saveBtn.disabled = false; saveBtn.textContent = 'Save Changes';
};
document.getElementById('editModal').addEventListener('click', e => { if (e.target === e.currentTarget) closeEditModal(); });

// ── Auth state ──
const usernameParam = getUrlParameter('username');
if (usernameParam) loadProfile(null);

onAuthStateChanged(auth, async user => {
  const ab = document.getElementById('authButtons'), uw = document.getElementById('userWelcome');
  if (user) {
    ab.classList.remove('show'); uw.classList.add('show');
    await populateUserPopup(user);
    if (!usernameParam) {
      await loadProfile(user);
    } else {
      const { data: profileUser } = await supabase.from('users').select('firebase_uid, user_id').eq('username', usernameParam).single();
      if (profileUser && profileUser.firebase_uid === user.uid) {
        await loadProfile(user);
      }
      // Load likes for own user regardless
      const { data: ud } = await supabase.from('users').select('user_id').eq('firebase_uid', user.uid).single();
      if (ud) await loadUserLikes(ud.user_id);
    }
  } else {
    ab.classList.add('show'); uw.classList.remove('show');
    if (!usernameParam) {
      document.getElementById('heroArea').innerHTML = '';
      document.getElementById('postsWrapper').innerHTML = `<div class="feed-empty"><i class="fas fa-lock"></i><h3>Not logged in</h3><p>Please log in to view your profile.</p></div>`;
      positionFeed();
      setTimeout(() => window.location.href = 'login.html', 1500);
    }
  }
  setTimeout(() => { updateHeaderHeight(); positionFeed(); }, 50);
});

window.addEventListener('resize', () => { updateHeaderHeight(); setTimeout(positionFeed, 50); });
</script>

<script>
window.toggleAudio = function(btn, aid) {
  const audio = document.getElementById(aid), icon = btn.querySelector('i');
  if (audio.paused) { audio.play(); icon.className = 'fas fa-pause'; audio.onended = () => { icon.className = 'fas fa-play'; }; }
  else { audio.pause(); icon.className = 'fas fa-play'; }
};
</script>
