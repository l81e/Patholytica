<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>My Space</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root {
  --bg:#0a0a0a;--bg2:#111;--bg3:#181818;
  --border:#1e1e1e;--border2:#2a2a2a;
  --text:#e8e6e1;--text2:#6e6c68;--text3:#3a3835;
  --accent:#f1d19e;--green:#3dba72;--orange:#e88c3a;
  --purple:#a56fd4;--red:#ef4444;--yellow:#fbbf24;
  --glass:rgba(10,10,10,0.85);--glass2:rgba(14,14,14,0.92);
  --gb:rgba(255,255,255,0.055);
  --sh:0 8px 32px rgba(0,0,0,0.72);
  --sh2:0 24px 64px rgba(0,0,0,0.88);
  --r:14px;
  --st:env(safe-area-inset-top,0px);
  --sb:env(safe-area-inset-bottom,0px);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{width:100%;height:100%;overflow:hidden;font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);touch-action:none}

#bg-layer{position:fixed;inset:-60px;z-index:0;background:var(--bg);background-size:cover;background-position:center;transition:filter .4s;pointer-events:none;will-change:transform}
#bg-ov{position:absolute;inset:0;pointer-events:none;transition:background .3s}
#cvp{position:fixed;inset:0;z-index:1;overflow:hidden;touch-action:none}
#cv{position:absolute;top:0;left:0;width:4000px;height:4000px;transform-origin:0 0;will-change:transform}
#snap-grid{position:absolute;inset:0;width:4000px;height:4000px;background-image:linear-gradient(rgba(255,255,255,.022) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.022) 1px,transparent 1px);background-size:20px 20px;pointer-events:none;display:none;z-index:0}
#snap-grid.on{display:block}
#draw-cv{position:absolute;top:0;left:0;width:4000px;height:4000px;pointer-events:none;z-index:99999}
#draw-cv.on{pointer-events:all;cursor:crosshair}
#conn-svg{position:absolute;top:0;left:0;width:4000px;height:4000px;pointer-events:none;z-index:1;overflow:visible}
.cline{stroke:var(--accent);stroke-width:1.5;fill:none;opacity:.45;stroke-dasharray:5 3;cursor:pointer;pointer-events:stroke}
.cline:hover{opacity:.9;stroke:var(--red)}
#ui{position:fixed;inset:0;z-index:1000;pointer-events:none}
#ui>*{pointer-events:all}

.widget{position:absolute;border:1px solid var(--gb);border-radius:var(--r);backdrop-filter:blur(18px) saturate(1.3);-webkit-backdrop-filter:blur(18px) saturate(1.3);background:var(--glass);box-shadow:var(--sh),inset 0 1px 0 rgba(255,255,255,.04);overflow:hidden;user-select:none;-webkit-user-select:none;transition:box-shadow .18s,border-color .18s;will-change:transform}
.widget.sel{border-color:var(--accent);box-shadow:var(--sh),0 0 0 1px var(--accent),0 0 18px rgba(241,209,158,.12)}
.widget.drag{box-shadow:var(--sh2),0 0 0 1px var(--accent);transition:none}
.widget.pinned{border-color:rgba(241,209,158,.45)!important}

.wh-bar{position:absolute;top:0;left:0;right:0;height:30px;cursor:grab;z-index:5;display:none;align-items:center;padding:0 10px;gap:7px;background:rgba(255,255,255,.02);border-bottom:1px solid var(--gb)}
.wh-bar:active{cursor:grabbing}
.edit-mode .wh-bar{display:flex}
.wh-dots{display:grid;grid-template-columns:repeat(3,1fr);gap:2px;opacity:.3}
.wh-dots span{width:3px;height:3px;border-radius:50%;background:var(--text);display:block}
.wh-sp{flex:1}
.wh-pin{width:20px;height:20px;border-radius:5px;border:none;background:none;color:var(--text3);cursor:pointer;font-size:10px;display:flex;align-items:center;justify-content:center;transition:all .12s}
.wh-pin:hover,.wh-pin:active{background:rgba(241,209,158,.18);color:var(--accent)}
.wh-pin.on{color:var(--accent);opacity:1}
.wh-del{width:20px;height:20px;border-radius:5px;border:none;background:none;color:var(--text3);cursor:pointer;font-size:11px;display:flex;align-items:center;justify-content:center;transition:all .12s}
.wh-del:hover,.wh-del:active{background:rgba(239,68,68,.18);color:var(--red)}
.edit-mode .wb{margin-top:30px}
.wb{height:100%;transition:margin .15s}
.wrz{position:absolute;bottom:0;right:0;width:20px;height:20px;cursor:se-resize;z-index:6;display:none;align-items:flex-end;justify-content:flex-end;padding:3px}
.wrz::after{content:'';width:8px;height:8px;border-right:2px solid var(--text2);border-bottom:2px solid var(--text2);border-radius:0 0 2px 0;display:block}
.edit-mode .wrz{display:flex}
.wh{display:flex;align-items:center;gap:7px;padding:9px 11px 7px;border-bottom:1px solid var(--gb);font-size:10px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:var(--text2);flex-shrink:0}
.wh i{font-size:11px}
.whs{flex:1}

.note-widget[data-color=yellow]{background:rgba(251,191,36,.08);border-color:rgba(251,191,36,.2)}
.note-widget[data-color=green]{background:rgba(61,186,114,.07);border-color:rgba(61,186,114,.2)}
.note-widget[data-color=blue]{background:rgba(241,209,158,.07);border-color:rgba(241,209,158,.2)}
.note-widget[data-color=purple]{background:rgba(165,111,212,.07);border-color:rgba(165,111,212,.2)}
.note-widget[data-color=red]{background:rgba(239,68,68,.07);border-color:rgba(239,68,68,.2)}
.note-ta{width:100%;padding:10px 12px;background:none;border:none;outline:none;resize:none;color:var(--text);font-size:13.5px;line-height:1.7;font-family:inherit;display:block;overflow-y:auto}
.note-ta::placeholder{color:var(--text3)}
.note-colors{display:flex;gap:6px;padding:6px 11px 9px;align-items:center;flex-shrink:0}
.nc{width:12px;height:12px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:all .12s;flex-shrink:0}
.nc.on{border-color:rgba(255,255,255,.65);transform:scale(1.25)}
.note-fsz{margin-left:auto;background:none;border:none;color:var(--text2);font-size:10px;cursor:pointer;padding:2px 5px;border-radius:4px;font-family:'DM Sans',sans-serif;transition:background .12s}
.note-fsz:hover{background:var(--bg3);color:var(--text)}

.clock-body{display:flex;flex-direction:column;align-items:center;justify-content:center;height:calc(100% - 30px);padding:10px 12px;gap:4px}
.clk-t{font-family:'DM Mono',monospace;font-weight:500;color:var(--text);letter-spacing:-.02em;line-height:1}
.clk-d{font-family:'DM Mono',monospace;color:var(--text2);letter-spacing:.07em;text-transform:uppercase}
.clk-tz{font-size:10px;color:var(--text3);letter-spacing:.05em;text-align:center;margin-top:2px}
.clock-widget.style-minimal .clk-t{font-size:34px}
.clock-widget.style-minimal .clk-d{font-size:11px;margin-top:4px}
.clock-widget.style-large .clk-t{font-size:48px}
.clock-widget.style-large .clk-d{font-size:13px;margin-top:6px}
.clock-widget.style-compact .clk-t{font-size:24px}
.clock-widget.style-compact .clk-d{font-size:10px;margin-top:3px}
.clock-widget.style-ampm .clk-t{font-size:28px}
.clock-widget.style-ampm .clk-d{font-size:11px;margin-top:4px}

.todo-body{height:calc(100% - 30px);display:flex;flex-direction:column;overflow:hidden}
.todo-list{flex:1;overflow-y:auto;padding:6px 11px}
.todo-list::-webkit-scrollbar{width:3px}
.todo-list::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
.ti{display:flex;align-items:flex-start;gap:8px;padding:6px 0;border-bottom:1px solid var(--border)}
.ti:last-child{border-bottom:none}
.tcb{width:16px;height:16px;border-radius:4px;border:1.5px solid var(--border2);display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;margin-top:2px;transition:all .12s}
.tcb.dn{background:var(--green);border-color:var(--green)}
.tcb.dn::after{content:'✓';font-size:9px;color:#fff;font-weight:700}
.ttx{flex:1;font-size:12.5px;color:var(--text);line-height:1.5;outline:none;word-break:break-word}
.ttx.dn{text-decoration:line-through;color:var(--text2)}
.tdl{width:18px;height:18px;border-radius:4px;border:none;background:none;color:var(--text3);cursor:pointer;font-size:11px;display:flex;align-items:center;justify-content:center;opacity:0;transition:all .12s;flex-shrink:0}
.ti:hover .tdl,.ti:focus-within .tdl{opacity:1}
.tdl:hover{background:rgba(239,68,68,.14);color:var(--red)}
.todo-add{display:flex;align-items:center;gap:7px;padding:7px 11px;border-top:1px solid var(--border);flex-shrink:0}
.todo-add input{flex:1;background:none;border:none;outline:none;font-size:12.5px;color:var(--text2);font-family:'DM Sans',sans-serif}
.todo-add input::placeholder{color:var(--text3)}
.ta-btn{width:20px;height:20px;border-radius:5px;background:var(--bg3);border:1px solid var(--border2);color:var(--text2);cursor:pointer;font-size:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .12s}
.ta-btn:hover,.ta-btn:active{background:var(--accent);border-color:var(--accent);color:#1a1a1a}

.img-body{width:100%;height:100%;border-radius:calc(var(--r) - 1px);overflow:hidden;display:flex;align-items:center;justify-content:center}
.img-body img{width:100%;height:100%;object-fit:cover;display:block;transition:transform .3s}
.img-body:hover img{transform:scale(1.02)}
.img-ph{width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;color:var(--text3);font-size:12px;cursor:pointer}
.img-ph i{font-size:24px}

.quote-body{height:calc(100% - 30px);display:flex;flex-direction:column;justify-content:center;padding:14px 16px;gap:10px}
.qt{font-family:'DM Serif Display',Georgia,serif;font-size:15px;line-height:1.7;color:var(--text);font-style:italic;outline:none;word-break:break-word}
.qa{font-size:11px;color:var(--text2);letter-spacing:.06em;text-transform:uppercase;outline:none}

.music-body{height:100%}
.music-body iframe{width:100%;height:100%;border:none;display:block;border-radius:calc(var(--r)-1px)}
.music-setup{height:calc(100% - 30px);display:flex;flex-direction:column;justify-content:center;gap:9px;padding:12px}
.music-in{background:var(--bg3);border:1px solid var(--border2);border-radius:8px;padding:8px 10px;color:var(--text);font-size:12px;outline:none;font-family:'DM Mono',monospace;width:100%}
.music-in::placeholder{color:var(--text3)}
.music-in:focus{border-color:var(--accent)}
.music-go{padding:8px;border-radius:8px;background:#1DB954;border:none;color:#fff;font-size:12.5px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif}

.yt-body{height:100%}
.yt-body iframe{width:100%;height:100%;border:none;display:block;border-radius:calc(var(--r)-1px)}
.yt-setup{height:calc(100% - 30px);display:flex;flex-direction:column;justify-content:center;gap:9px;padding:12px}
.yt-in{background:var(--bg3);border:1px solid var(--border2);border-radius:8px;padding:8px 10px;color:var(--text);font-size:12px;outline:none;font-family:'DM Mono',monospace;width:100%}
.yt-in::placeholder{color:var(--text3)}
.yt-in:focus{border-color:#ff0000}
.yt-go{padding:8px;border-radius:8px;background:#ff0000;border:none;color:#fff;font-size:12.5px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif}

.pdf-body{height:100%;display:flex;flex-direction:column}
.pdf-body iframe{flex:1;width:100%;border:none;display:block}
.pdf-setup{height:calc(100% - 30px);display:flex;flex-direction:column;justify-content:center;align-items:center;gap:12px;padding:16px}
.pdf-setup i{font-size:32px;color:var(--text3)}
.pdf-setup p{font-size:12px;color:var(--text2);text-align:center}
.pdf-upload-btn{padding:8px 16px;border-radius:8px;background:var(--accent);border:none;color:#1a1a1a;font-size:12.5px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif}
.pdf-nav{display:flex;align-items:center;justify-content:space-between;padding:6px 10px;border-top:1px solid var(--border);flex-shrink:0;gap:6px;background:rgba(0,0,0,.2)}
.pdf-pg{font-family:'DM Mono',monospace;font-size:11px;color:var(--text2);flex:1;text-align:center}

.audio-body{height:calc(100% - 30px);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;padding:16px}
.audio-ph{display:flex;flex-direction:column;align-items:center;gap:10px;color:var(--text3)}
.audio-ph i{font-size:28px}
.audio-ph p{font-size:12px}
.audio-upload-btn{padding:8px 16px;border-radius:8px;background:var(--orange);border:none;color:#fff;font-size:12.5px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif}
.audio-player{width:100%;display:flex;flex-direction:column;gap:10px;align-items:center}
.audio-title{font-size:12px;color:var(--text2);text-align:center;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;width:100%}
.audio-controls{display:flex;align-items:center;gap:10px}
.aplay-btn{width:40px;height:40px;border-radius:50%;background:var(--orange);border:none;color:#fff;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s}
.aplay-btn:hover{transform:scale(1.08)}
.audio-progress{width:100%;height:4px;background:var(--border2);border-radius:2px;cursor:pointer;position:relative;overflow:hidden}
.audio-prog-fill{height:100%;background:var(--orange);border-radius:2px;transition:width .1s linear;pointer-events:none}
.audio-time{font-family:'DM Mono',monospace;font-size:10px;color:var(--text2)}

.pomo-body{height:calc(100% - 30px);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;padding:12px}
.pomo-ring{position:relative;width:90px;height:90px}
.pomo-ring svg{transform:rotate(-90deg)}
.pomo-ring circle{fill:none;stroke-width:4}
.pbg{stroke:var(--border2)}
.ppr{stroke:var(--red);stroke-linecap:round;transition:stroke-dashoffset .5s linear}
.ptime{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-family:'DM Mono',monospace;font-size:18px;color:var(--text);font-weight:500}
.plbl{font-size:10px;color:var(--text2);letter-spacing:.07em;text-transform:uppercase}
.pbtns{display:flex;gap:8px}
.pbtn{width:30px;height:30px;border-radius:8px;border:1px solid var(--border2);background:var(--bg3);color:var(--text2);cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;transition:all .12s}
.pbtn:hover{background:var(--border2);color:var(--text)}
.pbtn.on{background:var(--red);border-color:var(--red);color:#fff}
.pbtn:disabled{opacity:.3;cursor:not-allowed}
.pcfg{display:flex;gap:8px;align-items:center;font-size:11px;color:var(--text2)}
.pcfg input{width:38px;background:var(--bg3);border:1px solid var(--border2);border-radius:5px;padding:3px 5px;color:var(--text);font-size:11px;outline:none;text-align:center}

.habit-body{height:calc(100% - 30px);overflow-y:auto;padding:6px 11px 10px}
.habit-body::-webkit-scrollbar{width:3px}
.habit-body::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
.habit-row{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--border)}
.habit-row:last-child{border-bottom:none}
.hname{flex:1;font-size:12px;color:var(--text);outline:none;min-width:0}
.hdots{display:flex;gap:3px;flex-shrink:0}
.hdot{width:14px;height:14px;border-radius:3px;background:var(--bg3);border:1px solid var(--border2);cursor:pointer;transition:all .12s;flex-shrink:0}
.hdot.on{background:var(--green);border-color:var(--green)}
.hadd{display:flex;gap:7px;padding:7px 0 0;border-top:1px solid var(--border);margin-top:3px}
.hadd input{flex:1;background:none;border:none;outline:none;font-size:12px;color:var(--text2);font-family:'DM Sans',sans-serif}
.hadd input::placeholder{color:var(--text3)}

.cal-body{height:calc(100% - 30px);padding:8px 11px;overflow:hidden}
.cal-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.cal-mo{font-size:12px;font-weight:600;color:var(--text)}
.cal-nav{width:20px;height:20px;border-radius:4px;border:none;background:none;color:var(--text2);cursor:pointer;font-size:12px;display:flex;align-items:center;justify-content:center;transition:background .12s}
.cal-nav:hover{background:var(--bg3)}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
.cal-dl{font-size:9px;color:var(--text2);text-align:center;padding:2px 0;font-weight:600}
.cal-day{font-size:10px;text-align:center;padding:4px 2px;border-radius:4px;cursor:pointer;color:var(--text2);transition:all .12s}
.cal-day:hover{background:var(--bg3);color:var(--text)}
.cal-day.today{background:var(--accent);color:#1a1a1a;font-weight:600}
.cal-day.other{opacity:.3}

.amb-body{height:calc(100% - 30px);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;padding:12px}
.amb-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px;width:100%}
.amb-item{display:flex;flex-direction:column;align-items:center;gap:5px;padding:12px 8px;background:var(--bg3);border:1px solid var(--border2);border-radius:10px;cursor:pointer;transition:all .15s;font-size:11px;color:var(--text2);text-align:center}
.amb-item i{font-size:20px}
.amb-item.on{background:rgba(241,209,158,.1);border-color:var(--accent);color:var(--accent)}

.rem-body{height:calc(100% - 30px);overflow-y:auto;padding:6px 11px}
.rem-body::-webkit-scrollbar{width:3px}
.ritem{display:flex;align-items:flex-start;gap:8px;padding:6px 0;border-bottom:1px solid var(--border)}
.ritem:last-child{border-bottom:none}
.rico{font-size:14px;flex-shrink:0;margin-top:1px}
.rinfo{flex:1;min-width:0}
.rtitle{font-size:12px;color:var(--text);margin-bottom:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.rtime{font-size:10px;color:var(--text2);font-family:'DM Mono',monospace}
.rdel{width:18px;height:18px;border-radius:4px;border:none;background:none;color:var(--text3);cursor:pointer;font-size:11px;display:flex;align-items:center;justify-content:center;transition:all .12s}
.rdel:hover{background:rgba(239,68,68,.14);color:var(--red)}
.radd{display:flex;flex-direction:column;gap:5px;padding:7px 0 0;border-top:1px solid var(--border)}
.radd input{background:none;border:none;outline:none;font-size:12px;color:var(--text2);font-family:'DM Sans',sans-serif}
.radd input::placeholder{color:var(--text3)}
.radd input[type=datetime-local]{font-family:'DM Mono',monospace;font-size:11px;color-scheme:dark}
.radd-btn{align-self:flex-end;padding:5px 12px;border-radius:7px;background:var(--accent);border:none;color:#1a1a1a;font-size:11px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif}

#spaces-bar{position:absolute;top:calc(var(--st) + 10px);left:12px;display:flex;align-items:center;gap:5px;background:var(--glass2);border:1px solid var(--gb);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-radius:20px;padding:5px 8px;z-index:10;max-width:calc(60vw);overflow-x:auto}
#spaces-bar::-webkit-scrollbar{display:none}
.spc-tab{padding:5px 13px;border-radius:13px;background:none;border:none;cursor:pointer;font-size:12px;font-weight:500;color:var(--text2);white-space:nowrap;flex-shrink:0;transition:all .15s;font-family:'DM Sans',sans-serif}
.spc-tab.on{background:var(--accent);color:#1a1a1a}
.spc-tab:not(.on):hover{background:var(--bg3);color:var(--text)}

#io-bar{position:absolute;top:calc(var(--st) + 10px);right:12px;display:flex;align-items:center;gap:7px;z-index:10}
.io-btn{padding:6px 12px;border-radius:13px;background:var(--glass2);border:1px solid var(--gb);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);color:var(--text2);font-size:12px;font-weight:500;cursor:pointer;transition:all .15s;font-family:'DM Sans',sans-serif;display:flex;align-items:center;gap:6px}
.io-btn:hover{background:var(--bg3);color:var(--text);border-color:var(--border2)}

/* ── Save to Feed button ── */
#save-feed-btn{padding:6px 12px;border-radius:13px;background:var(--glass2);border:1px solid rgba(241,209,158,0.3);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);color:var(--accent);font-size:12px;font-weight:600;cursor:pointer;transition:all .15s;font-family:'DM Sans',sans-serif;display:flex;align-items:center;gap:6px;white-space:nowrap}
#save-feed-btn:hover{background:rgba(241,209,158,0.1);border-color:rgba(241,209,158,0.5)}
#save-feed-btn.saving{opacity:0.5;pointer-events:none}
#save-feed-btn.done{background:rgba(61,186,114,0.15);border-color:rgba(61,186,114,0.4);color:var(--green)}

/* ── Publish modal ── */
#pub-modal-ov{position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:4000;display:none;backdrop-filter:blur(4px);align-items:center;justify-content:center}
#pub-modal-ov.on{display:flex}
#pub-modal{background:#111;border:1px solid var(--border2);border-radius:18px;padding:24px;width:min(360px,92vw);box-shadow:var(--sh2);display:flex;flex-direction:column;gap:16px}
#pub-modal h3{font-size:15px;font-weight:700;color:var(--text);display:flex;align-items:center;gap:8px}

.pub-field{display:flex;flex-direction:column;gap:6px}
.pub-label{font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--text2)}
.pub-input{background:var(--bg3);border:1px solid var(--border2);border-radius:9px;padding:10px 12px;color:var(--text);font-size:13px;outline:none;font-family:'DM Sans',sans-serif;width:100%;transition:border-color .15s}
.pub-input:focus{border-color:var(--accent)}
.pub-input::placeholder{color:var(--text3)}
textarea.pub-input{resize:none;height:80px;line-height:1.6}
.pub-thumb-preview{width:100%;aspect-ratio:16/9;border-radius:10px;overflow:hidden;border:1px solid var(--border2);background:var(--bg3);display:flex;align-items:center;justify-content:center;position:relative}
.pub-thumb-preview img{width:100%;height:100%;object-fit:cover;border-radius:10px}
.pub-thumb-placeholder{display:flex;flex-direction:column;align-items:center;gap:6px;color:var(--text3);font-size:11px}
.pub-thumb-placeholder i{font-size:22px}
.pub-thumb-label{position:absolute;bottom:0;left:0;right:0;padding:6px 10px;background:rgba(0,0,0,0.6);font-size:10px;color:var(--text2);display:flex;align-items:center;justify-content:space-between}
.pub-choose-btn{font-size:10px;font-weight:600;color:var(--accent);background:none;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;padding:0}
.pub-btns{display:flex;gap:8px}
.pub-btn{flex:1;padding:11px;border-radius:10px;border:none;font-size:13px;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .15s}
.pub-btn.ok{background:var(--accent);color:#1a1a1a}
.pub-btn.ok:hover{background:#e8c278}
.pub-btn.ok:disabled{opacity:0.5;pointer-events:none}
.pub-btn.cancel{background:var(--bg3);color:var(--text2);border:1px solid var(--border2)}

#draw-bar{position:absolute;top:calc(var(--st) + 10px);left:50%;transform:translateX(-50%);background:var(--glass2);border:1px solid var(--gb);border-radius:20px;backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);display:none;align-items:center;gap:4px;padding:5px 8px;box-shadow:var(--sh);z-index:10}
#draw-bar.on{display:flex}
.drbtn{width:34px;height:34px;border-radius:10px;border:none;background:none;color:var(--text2);cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;transition:all .12s}
.drbtn:hover{background:var(--bg3);color:var(--text)}
.drbtn.on{background:rgba(241,209,158,.15);color:var(--accent)}
.drbtn:disabled{opacity:.25;cursor:not-allowed}
.drcol{width:20px;height:20px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:all .12s;flex-shrink:0}
.drcol.on{border-color:#fff;transform:scale(1.2)}

#crop-ov{position:fixed;inset:0;z-index:3500;background:rgba(0,0,0,.92);display:none;flex-direction:column;align-items:center;justify-content:center;gap:16px}
#crop-ov.on{display:flex}
#crop-wrap{position:relative;overflow:hidden;background:#111;cursor:crosshair;max-width:90vw;max-height:65vh;border-radius:10px}
#crop-img{display:block;max-width:90vw;max-height:65vh;object-fit:contain;user-select:none;-webkit-user-select:none;border-radius:10px}
#crop-sel{position:absolute;border:2px solid var(--accent);background:rgba(241,209,158,.12);pointer-events:none;border-radius:2px}
.crop-btns{display:flex;gap:10px}
.crop-btn{padding:10px 22px;border-radius:10px;border:none;font-size:13px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif}
.crop-btn.ok{background:var(--accent);color:#1a1a1a}
.crop-btn.cancel{background:var(--bg3);color:var(--text2);border:1px solid var(--border2)}
.crop-hint{font-size:12px;color:var(--text2);text-align:center}

#toolbar{position:fixed;bottom:28px;left:50%;transform:translateX(-50%);height:52px;background:var(--glass2);border:1px solid var(--gb);border-radius:26px;backdrop-filter:blur(24px) saturate(1.6);-webkit-backdrop-filter:blur(24px) saturate(1.6);box-shadow:0 12px 48px rgba(0,0,0,.8),inset 0 1px 0 rgba(255,255,255,.07);display:flex;align-items:center;gap:2px;padding:6px 8px;z-index:1000;pointer-events:all;transition:opacity .2s,transform .2s}
#toolbar.hidden{opacity:0;transform:translateX(-50%) translateY(12px);pointer-events:none}
.tb-sep{width:1px;height:24px;background:var(--border2);margin:0 4px;flex-shrink:0}
.tb-btn{width:40px;height:40px;border-radius:20px;background:none;border:none;cursor:pointer;color:var(--text2);font-size:15px;display:flex;align-items:center;justify-content:center;transition:all .18s;position:relative;flex-shrink:0}
.tb-btn:hover{background:var(--bg3);color:var(--text)}
.tb-btn.on{background:var(--accent);color:#1a1a1a}
@media(min-width:600px){
  .tb-btn[data-tip]:hover::after{content:attr(data-tip);position:absolute;bottom:calc(100% + 10px);left:50%;transform:translateX(-50%);background:var(--bg3);border:1px solid var(--border2);color:var(--text);font-size:11px;white-space:nowrap;padding:5px 10px;border-radius:6px;pointer-events:none;font-family:'DM Sans',sans-serif;animation:tipIn .12s ease}
  @keyframes tipIn{from{opacity:0;transform:translateX(-50%) translateY(3px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
}

.sov{position:absolute;inset:0;background:rgba(0,0,0,.55);backdrop-filter:blur(3px);-webkit-backdrop-filter:blur(3px);z-index:20;display:none;cursor:pointer}
.sov.on{display:block}
.sheet{position:absolute;left:0;right:0;bottom:0;background:#111;border-top:1px solid var(--border2);border-radius:20px 20px 0 0;padding-bottom:calc(var(--sb) + 6px);z-index:21;display:none;max-height:88vh;overflow-y:auto;animation:shup .3s cubic-bezier(.4,0,.2,1)}
.sheet.on{display:block}
.sheet::-webkit-scrollbar{display:none}
@keyframes shup{from{transform:translateY(100%)}to{transform:none}}
@media(min-width:600px){
  .sheet{bottom:auto;left:50%;top:50%;right:auto;transform:translate(-50%,-50%);width:min(460px,94vw);border-radius:18px;max-height:88vh;padding-bottom:0;border:1px solid var(--border2);animation:modalIn .2s cubic-bezier(.4,0,.2,1)}
  @keyframes modalIn{from{opacity:0;transform:translate(-50%,-50%) scale(.96)}to{opacity:1;transform:translate(-50%,-50%) scale(1)}}
}
.sh{width:34px;height:4px;background:var(--border2);border-radius:2px;margin:10px auto 0}
@media(min-width:600px){.sh{display:none}}
.shhdr{display:flex;align-items:center;justify-content:space-between;padding:14px 18px 10px;border-bottom:1px solid var(--border)}
.shtitle{font-size:14px;font-weight:600;color:var(--text)}
.shclose{width:26px;height:26px;border-radius:50%;border:none;background:none;color:var(--text2);cursor:pointer;font-size:17px;display:flex;align-items:center;justify-content:center;transition:background .12s}
.shclose:hover{background:var(--bg3)}
.shbody{padding:14px 18px 16px;display:flex;flex-direction:column;gap:14px}
.shlbl{font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--text2)}
.shrow{display:flex;align-items:center;gap:10px}
.shrow label{font-size:13px;color:var(--text2);min-width:76px}
.shrow input[type=range]{flex:1;accent-color:var(--accent);cursor:pointer}
.shup{width:100%;padding:10px;border-radius:10px;background:var(--bg3);border:1px dashed var(--border2);color:var(--text2);font-size:13px;cursor:pointer;font-family:'DM Sans',sans-serif;display:flex;align-items:center;justify-content:center;gap:7px;transition:all .15s}
.shup:hover{border-color:var(--accent);color:var(--text)}
.shtog{display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--bg3);border:1px solid var(--border2);border-radius:10px}
.shtog span{flex:1;font-size:13px;color:var(--text)}
.ios{position:relative;width:40px;height:23px;flex-shrink:0}
.ios input{opacity:0;width:0;height:0}
.iosk{position:absolute;inset:0;background:var(--border2);border-radius:12px;transition:.25s;cursor:pointer}
.iosk::before{content:'';position:absolute;width:17px;height:17px;left:3px;top:3px;background:#fff;border-radius:50%;transition:.25px}
.ios input:checked+.iosk{background:var(--accent)}
.ios input:checked+.iosk::before{transform:translateX(17px)}
.pgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.psw{aspect-ratio:1;border-radius:10px;cursor:pointer;border:2px solid transparent;transition:all .15s}
.psw.on{border-color:var(--accent)}
.psw:active{transform:scale(.93)}
.agrid{display:grid;grid-template-columns:repeat(3,1fr);gap:9px}
@media(min-width:360px){.agrid{grid-template-columns:repeat(4,1fr)}}
@media(min-width:500px){.agrid{grid-template-columns:repeat(5,1fr)}}
.aitem{display:flex;flex-direction:column;align-items:center;gap:6px;padding:14px 6px;background:var(--bg3);border:1px solid var(--border2);border-radius:12px;cursor:pointer;transition:all .15s;font-size:11px;font-weight:500;color:var(--text2);text-align:center}
.aitem i{font-size:19px}
.aitem:hover,.aitem:active{background:var(--border2);transform:scale(.96);color:var(--text)}

#ctx{position:fixed;background:#141414;border:1px solid var(--border2);border-radius:13px;padding:5px;box-shadow:var(--sh2);z-index:2000;display:none;min-width:168px;animation:ctxin .13s cubic-bezier(.4,0,.2,1)}
@keyframes ctxin{from{opacity:0;transform:scale(.94) translateY(-3px)}to{opacity:1;transform:none}}
.ci{display:flex;align-items:center;gap:9px;padding:9px 11px;border-radius:8px;cursor:pointer;font-size:13px;color:var(--text);transition:background .1s}
.ci:hover,.ci:active{background:var(--bg3)}
.ci i{width:13px;text-align:center;color:var(--text2);font-size:12px}
.ci.d{color:var(--red)}
.ci.d i{color:var(--red)}
.csep{height:1px;background:var(--border);margin:3px 0}

#modal-ov{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:2999;display:none;backdrop-filter:blur(2px)}
#modal-ov.on{display:block}
#clock-modal{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:#111;border:1px solid var(--border2);border-radius:16px;padding:20px;z-index:3000;display:none;width:min(340px,90vw);box-shadow:var(--sh2)}
#clock-modal.on{display:block}
#clock-modal h3{font-size:14px;font-weight:600;margin-bottom:14px;color:var(--text)}
.cm-row{display:flex;flex-direction:column;gap:5px;margin-bottom:12px}
.cm-row label{font-size:11px;color:var(--text2);letter-spacing:.06em;text-transform:uppercase}
.cm-sel,.cm-inp{background:var(--bg3);border:1px solid var(--border2);border-radius:8px;padding:8px 10px;color:var(--text);font-size:13px;outline:none;font-family:'DM Sans',sans-serif;width:100%}
.cm-sel{cursor:pointer;-webkit-appearance:none}
.cm-sel:focus,.cm-inp:focus{border-color:var(--accent)}
.cm-inp::placeholder{color:var(--text3)}
.cm-btns{display:flex;gap:8px;margin-top:4px}
.cm-btn{flex:1;padding:9px;border-radius:9px;border:none;font-size:13px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif}
.cm-btn.ok{background:var(--accent);color:#1a1a1a}
.cm-btn.cancel{background:var(--bg3);color:var(--text2);border:1px solid var(--border2)}

#toast{position:fixed;top:calc(var(--st) + 8px);left:50%;transform:translateX(-50%);background:#111;border:1px solid var(--border2);border-radius:12px;padding:9px 18px;font-size:13px;color:var(--text);z-index:9000;display:none;white-space:nowrap;box-shadow:var(--sh);pointer-events:none;animation:tin .2s ease}
@keyframes tin{from{opacity:0;transform:translateX(-50%) translateY(-6px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}

.widget{animation:win .2s cubic-bezier(.4,0,.2,1)}
@keyframes win{from{opacity:0;transform:scale(.88) translateY(8px)}to{opacity:1;transform:none}}
@keyframes wout{to{opacity:0;transform:scale(.88)}}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}

#edit-badge{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);font-size:10px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--accent);background:rgba(241,209,158,.12);border:1px solid rgba(241,209,158,.25);border-radius:8px;padding:4px 9px;display:none;align-items:center;gap:5px;z-index:999;pointer-events:none}
#edit-badge.on{display:flex}
#edit-badge i{font-size:8px}
</style>
</head>
<body>

<canvas id="confettiCanvas" style="display:none"></canvas>

<div id="bg-layer"><div id="bg-ov"></div></div>
<div id="cvp">
  <div id="cv">
    <svg id="conn-svg"></svg>
    <div id="snap-grid"></div>
    <canvas id="draw-cv" width="4000" height="4000"></canvas>
  </div>
</div>

<!-- CROP OVERLAY -->
<div id="crop-ov">
  <div class="crop-hint">Drag to select crop area</div>
  <div id="crop-wrap">
    <img id="crop-img" alt="">
    <div id="crop-sel"></div>
  </div>
  <div class="crop-btns">
    <button class="crop-btn cancel" id="crop-cancel">Cancel</button>
    <button class="crop-btn ok" id="crop-ok">Apply Crop</button>
  </div>
</div>

<!-- PUBLISH MODAL -->
<div id="pub-modal-ov">
  <div id="pub-modal">
    <h3><i class="fas fa-paper-plane"></i> Publish to Feed</h3>
    <div class="pub-field">
      <div class="pub-label">Title</div>
      <input class="pub-input" id="pub-title" placeholder="Give your space a name…" maxlength="80">
    </div>
    <div class="pub-field">
      <div class="pub-label">Description</div>
      <textarea class="pub-input" id="pub-desc" placeholder="What's on this canvas? (optional)" maxlength="240"></textarea>
    </div>
    <div class="pub-field">
      <div class="pub-label">Snapshot</div>
      <div class="pub-thumb-preview" id="pubThumbPreview">
        <div class="pub-thumb-placeholder" id="pubThumbPlaceholder">
          <i class="fas fa-image"></i>
          <span>No image chosen</span>
        </div>
        <div class="pub-thumb-label" id="pubThumbLabel" style="display:none">
          <span id="pubThumbName">snapshot.jpg</span>
          <button class="pub-choose-btn" id="pubChangeBtn">Change</button>
        </div>
      </div>
      <input type="file" id="pub-file" accept="image/*" style="display:none">
      <button class="pub-btn cancel" id="pubPickBtn" style="margin-top:8px;flex:none;width:100%;padding:9px">
        <i class="fas fa-upload"></i> Choose Image
      </button>
    </div>
    <div class="pub-btns">
      <button class="pub-btn cancel" id="pub-cancel">Cancel</button>
      <button class="pub-btn ok" id="pub-ok" disabled>Publish</button>
    </div>
  </div>
</div>

<div id="ui">
  <div id="toast"></div>
  <div id="edit-badge"><i class="fas fa-circle"></i> EDIT</div>

  <div id="spaces-bar">
    <button class="spc-tab on" data-idx="0">Main</button>
  </div>

  <div id="io-bar">
    <button class="io-btn" id="export-btn"><i class="fas fa-download"></i> Export</button>
    <label class="io-btn" style="cursor:pointer"><i class="fas fa-upload"></i> Import<input type="file" id="import-file" accept=".json" style="display:none"></label>
    <button id="save-feed-btn"><i class="fas fa-paper-plane"></i> Publish</button>
  </div>

  <div id="draw-bar">
    <button class="drbtn on" id="dr-pen"><i class="fas fa-pen"></i></button>
    <button class="drbtn" id="dr-era"><i class="fas fa-eraser"></i></button>
    <div class="tb-sep"></div>
    <button class="drbtn" id="dr-undo" title="Undo"><i class="fas fa-undo"></i></button>
    <button class="drbtn" id="dr-redo" title="Redo"><i class="fas fa-redo"></i></button>
    <div class="tb-sep"></div>
    <div class="drcol on" style="background:#f1d19e" data-c="#f1d19e"></div>
    <div class="drcol" style="background:#fbbf24" data-c="#fbbf24"></div>
    <div class="drcol" style="background:#ef4444" data-c="#ef4444"></div>
    <div class="drcol" style="background:#3dba72" data-c="#3dba72"></div>
    <div class="drcol" style="background:#e8e6e1" data-c="#e8e6e1"></div>
    <div class="tb-sep"></div>
    <input type="range" id="dr-sz" min="1" max="20" value="3" style="width:55px;accent-color:var(--accent)">
    <button class="drbtn" id="dr-clr"><i class="fas fa-trash"></i></button>
  </div>

  <div id="toolbar">
    <button class="tb-btn" id="edit-btn" data-tip="Edit Mode"><i class="fas fa-pen-to-square"></i></button>
    <div class="tb-sep"></div>
    <button class="tb-btn" id="add-btn" data-tip="Add Widget"><i class="fas fa-plus-circle"></i></button>
    <button class="tb-btn" id="bg-btn" data-tip="Background"><i class="fas fa-image"></i></button>
    <button class="tb-btn" id="draw-btn" data-tip="Draw"><i class="fas fa-paint-brush"></i></button>
    <div class="tb-sep"></div>
    <button class="tb-btn" id="snap-btn" data-tip="Snap Grid"><i class="fas fa-th"></i></button>
    <button class="tb-btn" id="opts-btn" data-tip="Options"><i class="fas fa-ellipsis"></i></button>
  </div>

  <div class="sov" id="sov"></div>

  <div class="sheet" id="sh-add">
    <div class="sh"></div>
    <div class="shhdr"><span class="shtitle">Add Widget</span><button class="shclose">×</button></div>
    <div class="shbody"><div class="agrid" id="add-grid"></div></div>
  </div>

  <div class="sheet" id="sh-opts">
    <div class="sh"></div>
    <div class="shhdr"><span class="shtitle">Options</span><button class="shclose">×</button></div>
    <div class="shbody" id="opts-body"></div>
  </div>

  <div class="sheet" id="sh-bg">
    <div class="sh"></div>
    <div class="shhdr"><span class="shtitle">Background</span><button class="shclose">×</button></div>
    <div class="shbody">
      <div><div class="shlbl" style="margin-bottom:8px">Presets</div><div class="pgrid" id="preset-grid"></div></div>
      <label class="shup" for="bg-file"><i class="fas fa-upload"></i> Upload Image<input type="file" id="bg-file" accept="image/*" style="display:none"></label>
      <div>
        <div class="shlbl" style="margin-bottom:10px">Adjustments</div>
        <div style="display:flex;flex-direction:column;gap:11px">
          <div class="shrow"><label>Blur</label><input type="range" id="bg-blur" min="0" max="20" value="0"></div>
          <div class="shrow"><label>Brightness</label><input type="range" id="bg-bright" min="20" max="150" value="100"></div>
          <div class="shrow"><label>Dim</label><input type="range" id="bg-dim" min="0" max="90" value="0"></div>
        </div>
      </div>

  <div id="ctx">

    <div class="ci" data-a="connect"><i class="fas fa-link"></i>Connect</div>
    <div class="csep"></div>
    <div class="ci d" data-a="del"><i class="fas fa-trash"></i>Delete</div>
  </div>

  <div id="modal-ov"></div>
  <div id="clock-modal">
    <h3>Clock Settings</h3>
    <div class="cm-row"><label>Style</label>
      <select class="cm-sel" id="cm-style">
        <option value="style-minimal">Minimal</option>
        <option value="style-large">Large</option>
        <option value="style-compact">Compact</option>
        <option value="style-ampm">12h AM/PM</option>
      </select>
    </div>
    <div class="cm-row"><label>Timezone</label>
      <select class="cm-sel" id="cm-tz">
        <option value="local">Local Time</option>
        <option value="UTC">UTC</option>
        <option value="America/New_York">New York (EST)</option>
        <option value="America/Chicago">Chicago (CST)</option>
        <option value="America/Los_Angeles">Los Angeles (PST)</option>
        <option value="America/Toronto">Toronto (EST)</option>
        <option value="America/Vancouver">Vancouver (PST)</option>
        <option value="America/Sao_Paulo">São Paulo (BRT)</option>
        <option value="Europe/London">London (GMT)</option>
        <option value="Europe/Paris">Paris (CET)</option>
        <option value="Europe/Berlin">Berlin (CET)</option>

var Crop={
  _resolve:null,_src:null,
  _sx:0,_sy:0,_sw:0,_sh:0,
  _dragging:false,_ox:0,_oy:0,
  _iw:0,_ih:0,
  open:function(src,cb){
    var self=this;self._src=src;self._resolve=cb;
    self._sx=0;self._sy=0;self._sw=0;self._sh=0;
    var ov=document.getElementById('crop-ov');
    var img=document.getElementById('crop-img');
    var sel=document.getElementById('crop-sel');

    img.onload=function(){self._iw=img.naturalWidth;self._ih=img.naturalHeight;ov.classList.add('on');};
    img.src=src;
  },
  _rect:function(){return document.getElementById('crop-img').getBoundingClientRect();},
  _updateSel:function(){
    var sel=document.getElementById('crop-sel');
    var r=this._rect();
    var scaleX=r.width/this._iw,scaleY=r.height/this._ih;
    sel.style.display='block';
    sel.style.left=(this._sx*scaleX)+'px';sel.style.top=(this._sy*scaleY)+'px';
    sel.style.width=(this._sw*scaleX)+'px';sel.style.height=(this._sh*scaleY)+'px';
  },
  apply:function(){
    var self=this;
    var sw=self._sw||self._iw,sh=self._sh||self._ih,sx=self._sx,sy=self._sy;
    var canvas=document.createElement('canvas');canvas.width=sw;canvas.height=sh;
    var ctx=canvas.getContext('2d');var img2=new Image();
    img2.onload=function(){
      ctx.drawImage(img2,sx,sy,sw,sh,0,0,sw,sh);
      var out=canvas.toDataURL('image/jpeg',0.92);
      document.getElementById('crop-ov').classList.remove('on');
      if(self._resolve)self._resolve(out);
    };img2.src=self._src;
  },
  cancel:function(){document.getElementById('crop-ov').classList.remove('on');},
  _attach:function(){
    var self=this;var wrap=document.getElementById('crop-wrap');
    function evPos(e){var t=e.touches?e.touches[0]:e;var r=document.getElementById('crop-img').getBoundingClientRect();var scaleX=self._iw/r.width,scaleY=self._ih/r.height;return{x:clamp((t.clientX-r.left)*scaleX,0,self._iw),y:clamp((t.clientY-r.top)*scaleY,0,self._ih)};}
    function start(e){if(!e.target.closest('#crop-img')&&!e.target.closest('#crop-sel'))return;var p=evPos(e);self._ox=p.x;self._oy=p.y;self._dragging=true;self._sx=p.x;self._sy=p.y;self._sw=0;self._sh=0;document.getElementById('crop-sel').style.display='block';}
    function move(e){if(!self._dragging)return;e.preventDefault();var p=evPos(e);var x1=Math.min(self._ox,p.x),y1=Math.min(self._oy,p.y);var x2=Math.max(self._ox,p.x),y2=Math.max(self._oy,p.y);self._sx=x1;self._sy=y1;self._sw=x2-x1;self._sh=y2-y1;self._updateSel();}
    function end(){self._dragging=false;}
    wrap.addEventListener('mousedown',start);document.addEventListener('mousemove',move);document.addEventListener('mouseup',end);
    wrap.addEventListener('touchstart',start,{passive:true});document.addEventListener('touchmove',move,{passive:false});document.addEventListener('touchend',end);
  }
};

var VP=(function(){
  var tx=0,ty=0,sc=1;var MIN=0.2,MAX=3.5;
  function cv(){return document.getElementById('cv');}
  function apply(anim){var e=cv();e.style.transition=anim?'transform .25s ease':'none';e.style.transform='translate('+tx+'px,'+ty+'px) scale('+sc+')';}
  function constrain(){var W=window.innerWidth,H=window.innerHeight;tx=clamp(tx,-(4000*sc)+(W*.15),W*.85);ty=clamp(ty,-(4000*sc)+(H*.15),H*.85);}
  function zoomAt(cx,cy,delta){var ns=clamp(sc*delta,MIN,MAX),r=ns/sc;tx=cx-r*(cx-tx);ty=cy-r*(cy-ty);sc=ns;constrain();apply(false);}
  function reset(){sc=1;tx=window.innerWidth/2-2000;ty=80;constrain();apply(true);}
  document.getElementById('cvp').addEventListener('wheel',function(e){e.preventDefault();var d=e.ctrlKey?(1-e.deltaY*.01):(e.deltaY<0?1.08:1/1.08);zoomAt(e.clientX,e.clientY,d);},{passive:false});

  document.addEventListener('mousemove',function(e){if(!mp)return;tx=e.clientX-mpx;ty=e.clientY-mpy;constrain();apply(false);});
  document.addEventListener('mouseup',function(){mp=false;});

  document.getElementById('cvp').addEventListener('touchstart',function(e){if(G.drawMode)return;for(var i=0;i<e.touches.length;i++){var t=e.touches[i];pts[t.identifier]={x:t.clientX,y:t.clientY};}if(e.touches.length===1){var t=e.touches[0];var tgt=document.elementFromPoint(t.clientX,t.clientY);if(!tgt||!tgt.closest('.widget')||!G.editMode){panStart={x:t.clientX,y:t.clientY};panTx=tx;panTy=ty;}else panStart=null;}else panStart=null;if(e.touches.length===2){var a=e.touches[0],b=e.touches[1];pinchDist=Math.hypot(b.clientX-a.clientX,b.clientY-a.clientY);pinchMid={x:(a.clientX+b.clientX)/2,y:(a.clientY+b.clientY)/2};}},{passive:true});
  document.getElementById('cvp').addEventListener('touchmove',function(e){if(G.drawMode)return;e.preventDefault();for(var i=0;i<e.touches.length;i++){var t=e.touches[i];pts[t.identifier]={x:t.clientX,y:t.clientY};}if(e.touches.length===1&&panStart){var t=e.touches[0];tx=panTx+(t.clientX-panStart.x);ty=panTy+(t.clientY-panStart.y);constrain();apply(false);}if(e.touches.length===2){var a=e.touches[0],b=e.touches[1];var dist=Math.hypot(b.clientX-a.clientX,b.clientY-a.clientY);var mid={x:(a.clientX+b.clientX)/2,y:(a.clientY+b.clientY)/2};if(pinchDist){zoomAt(mid.x,mid.y,dist/pinchDist);tx+=mid.x-pinchMid.x;ty+=mid.y-pinchMid.y;constrain();apply(false);}pinchDist=dist;pinchMid=mid;}},{passive:false});
  document.getElementById('cvp').addEventListener('touchend',function(e){if(G.drawMode)return;for(var i=0;i<e.changedTouches.length;i++)delete pts[e.changedTouches[i].identifier];if(e.touches.length<2){pinchDist=null;pinchMid=null;}if(e.touches.length===0)panStart=null;},{passive:true});
  return{reset:reset,zoomAt:zoomAt,toCanvas:function(vx,vy){return{x:(vx-tx)/sc,y:(vy-ty)/sc};},get scale(){return sc;},get tx(){return tx;},get ty(){return ty;}};
})();

/* ── BACKGROUND ── */
var BG=(function(){
  var parOn=false;
  function apply(){var bg=G.space.bg;var l=document.getElementById('bg-layer'),o=document.getElementById('bg-ov');if(bg.type==='gradient'){l.style.background=bg.value;l.style.backgroundSize='';}else{l.style.background="url('"+bg.value+"') center/cover no-repeat";}l.style.filter='blur('+(bg.blur||0)+'px) brightness('+(bg.brightness||100)+'%)';o.style.background='rgba(0,0,0,'+((bg.dim||0)/100)+')';document.getElementById('bg-blur').value=bg.blur||0;document.getElementById('bg-bright').value=bg.brightness||100;document.getElementById('bg-dim').value=bg.dim||0;document.getElementById('bg-par').checked=bg.parallax||false;if(bg.parallax)startPar();else stopPar();}

function updW(id,patch){var w=findW(id);if(!w)return;Object.assign(w,patch);G.save();}
function spawnPos(w,h){var cx=(window.innerWidth/2-VP.tx)/VP.scale;var cy=(120-VP.ty)/VP.scale;return{x:snap(cx-w/2+(Math.random()-.5)*40),y:snap(Math.max(10,cy+(Math.random()-.5)*20))};}
function addWidget(type){var m=WMETA[type],pos=spawnPos(m.w,m.h);var w={id:uid(),type:type,x:pos.x,y:pos.y,width:m.w,height:m.h,z:++G.zCtr,color:'yellow',font:'DM Sans',content:'',locked:false,pinned:false,createdAt:Date.now()};if(type==='todo')w.items=[];if(type==='habit')w.habits=[];if(type==='reminder')w.reminders=[];if(type==='pomodoro'){w.pomWork=25;w.pomBreak=5;w.pomLeft=1500;w.pomSess='work';}if(type==='calendar'){w.calY=new Date().getFullYear();w.calM=new Date().getMonth();}if(type==='ambient')w.playing=null;if(type==='clock'){w.clkStyle='style-minimal';w.clkTz='local';w.clkLabel='';}if(type==='pdf')w.pdfPage=1;G.space.widgets.push(w);var el=buildEl(w);document.getElementById('cv').appendChild(el);if(!G.editMode)G.toggleEdit();G.save();return w;}
function delWidget(id){G.space.widgets=G.space.widgets.filter(function(w){return w.id!==id;});var el=document.querySelector('.widget[data-id="'+id+'"]');if(el){el.style.animation='wout .18s ease forwards';setTimeout(function(){el.remove();},180);}G.space.connections=(G.space.connections||[]).filter(function(c){return c.a!==id&&c.b!==id;});Conn.render();G.save();}
function dupWidget(w){var n=JSON.parse(JSON.stringify(w));n.id=uid();n.x=snap(w.x+24);n.y=snap(w.y+24);n.z=++G.zCtr;n.pinned=false;G.space.widgets.push(n);document.getElementById('cv').appendChild(buildEl(n));G.save();}

/* ── BUILD ELEMENT ── */
function buildEl(w){
  var el=document.createElement('div');el.className='widget '+w.type+'-widget';if(w.type==='clock'&&w.clkStyle)el.classList.add(w.clkStyle);if(w.pinned)el.classList.add('pinned');el.dataset.id=w.id;el.style.left=w.x+'px';el.style.top=w.y+'px';el.style.width=w.width+'px';el.style.height=w.height+'px';if(w.pinned){el.style.zIndex=99990;}else if(w.type==='youtube'&&w.ytEmbedUrl){el.style.zIndex=9000+(w.z||10);}else{el.style.zIndex=w.z||10;}var mx=WMAXSIZE[w.type];if(mx){el.style.maxWidth=mx.w+'px';el.style.maxHeight=mx.h+'px';}
  var dh=document.createElement('div');dh.className='wh-bar';dh.innerHTML='<div class="wh-dots"><span></span><span></span><span></span><span></span><span></span><span></span></div><div class="wh-sp"></div><button class="wh-pin'+(w.pinned?' on':'')+'" title="Pin to surface"><i class="fas fa-thumbtack"></i></button><button class="wh-del"><i class="fas fa-trash-alt"></i></button>';
  dh.querySelector('.wh-del').addEventListener('click',function(e){e.stopPropagation();delWidget(w.id);});
  dh.querySelector('.wh-pin').addEventListener('click',function(e){e.stopPropagation();w.pinned=!w.pinned;this.classList.toggle('on',w.pinned);el.classList.toggle('pinned',w.pinned);el.style.zIndex=w.pinned?99990:w.z;G.save();toast(w.pinned?'📌 Pinned to surface':'Unpinned');});
  el.appendChild(dh);
  var body=document.createElement('div');body.className='wb';body.style.height='100%';body.appendChild(buildInner(w));el.appendChild(body);
  var rh=document.createElement('div');rh.className='wrz';el.appendChild(rh);
  el.addEventListener('click',function(){if(!G.connectMode)return;if(G.connectSrc===w.id){G.connectMode=false;G.connectSrc=null;return;}if(!G.space.connections)G.space.connections=[];var ex=G.space.connections.find(function(c){return(c.a===G.connectSrc&&c.b===w.id)||(c.a===w.id&&c.b===G.connectSrc);});if(!ex){G.space.connections.push({a:G.connectSrc,b:w.id});Conn.render();G.save();toast('Connected!');}G.connectMode=false;G.connectSrc=null;});
  el.addEventListener('contextmenu',function(e){e.preventDefault();G.selectW(el,w);Ctx.show(e.clientX,e.clientY,w);});
  el.addEventListener('mousedown',function(){G.selectW(el,w);});
  el.addEventListener('touchstart',function(){G.selectW(el,w);},{passive:true});
  el.addEventListener('mousemove',function(){if(G.selId===w.id)G.resetSel();});
  attachDrag(dh,el,w);attachResize(rh,el,w);attachLP(el,w);
  if(!G.editMode)el.classList.add('locked');
  return el;
}

/* ── INNER CONTENT ── */
function buildInner(w){
  var wrap=document.createElement('div');wrap.style.height='100%';var id=w.id;
  if(w.type==='note'){var taH='calc(100% - 70px)';var html='<div class="wh"><i class="fas fa-sticky-note"></i>Note<span class="whs"></span><select class="note-fsz">';NFONTS.forEach(function(f){html+='<option'+(w.font===f?' selected':'')+'>'+f+'</option>';});html+='</select></div>';html+='<textarea class="note-ta" placeholder="Write something…" style="font-family:'+(w.font||'DM Sans')+';height:'+taH+';overflow-y:auto">'+(w.content||'')+'</textarea>';html+='<div class="note-colors">';NCOLORS.forEach(function(c){html+='<div class="nc'+(w.color===c?' on':'')+'" style="background:'+CMAP[c]+'" data-c="'+c+'"></div>';});html+='</div>';wrap.innerHTML=html;var ta=wrap.querySelector('textarea');ta.addEventListener('input',function(){updW(id,{content:ta.value});G.resetSel();});ta.addEventListener('touchstart',function(e){e.stopPropagation();},{passive:true});ta.addEventListener('mousedown',function(e){if(G.editMode)e.stopPropagation();});wrap.querySelector('.note-fsz').addEventListener('change',function(){updW(id,{font:this.value});var t=document.querySelector('.widget[data-id="'+id+'"] .note-ta');if(t)t.style.fontFamily=this.value;});wrap.querySelectorAll('.nc').forEach(function(dot){dot.addEventListener('click',function(){setNoteColor(id,this.dataset.c);});});}
  else if(w.type==='clock'){buildClock(w,wrap);}
  else if(w.type==='todo'){var html='<div class="wh"><i class="fas fa-check-square"></i>To-Do</div><div class="todo-body"><div class="todo-list" id="tdl-'+id+'">';(w.items||[]).forEach(function(i){html+=tiHTML(id,i);});html+='</div><div class="todo-add"><input placeholder="Add item…"><button class="ta-btn"><i class="fas fa-plus"></i></button></div></div>';wrap.innerHTML=html;var inp=wrap.querySelector('.todo-add input'),btn=wrap.querySelector('.ta-btn');inp.addEventListener('keydown',function(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();addTI(id,inp);}});inp.addEventListener('touchstart',function(e){e.stopPropagation();},{passive:true});inp.addEventListener('mousedown',function(e){if(G.editMode)e.stopPropagation();});btn.addEventListener('click',function(){addTI(id,inp);});wrap.querySelector('.todo-body').addEventListener('touchstart',function(e){e.stopPropagation();},{passive:true});attachTIListeners(id,wrap);}
  else if(w.type==='image'){var has=w.url&&w.url.length;wrap.innerHTML='<div class="img-body">'+(has?'<img src="'+w.url+'" alt="">':'<div class="img-ph"><i class="fas fa-image"></i><span>Tap to add</span></div>')+'</div><input type="file" id="iu-'+id+'" accept="image/*" style="display:none">';var fi=wrap.querySelector('#iu-'+id);fi.addEventListener('change',function(e){var f=e.target.files[0];if(!f)return;var r=new FileReader();r.onload=function(ev){Crop.open(ev.target.result,function(cropped){updW(id,{url:cropped});Render.one(id);G.save();});};r.readAsDataURL(f);e.target.value='';});wrap.querySelector('.img-body').addEventListener('click',function(){if(G.editMode||!has)fi.click();});}
  else if(w.type==='quote'){wrap.innerHTML='<div class="wh"><i class="fas fa-quote-right"></i>Quote</div><div class="quote-body"><div class="qt" contenteditable="true">'+(w.content||'Your quote here…')+'</div><div class="qa" contenteditable="true">— '+(w.author||'Author')+'</div></div>';wrap.querySelector('.qt').addEventListener('blur',function(){updW(id,{content:this.textContent});});wrap.querySelector('.qa').addEventListener('blur',function(){updW(id,{author:this.textContent});});wrap.querySelectorAll('[contenteditable]').forEach(function(ce){ce.addEventListener('touchstart',function(e){e.stopPropagation();},{passive:true});ce.addEventListener('mousedown',function(e){if(G.editMode)e.stopPropagation();});})}
  else if(w.type==='music'){if(w.embedUrl){wrap.innerHTML='<div class="music-body"><iframe src="'+w.embedUrl+'" allow="autoplay;clipboard-write;encrypted-media;fullscreen;picture-in-picture" loading="lazy"></iframe></div>';}else{wrap.innerHTML='<div class="wh"><i class="fab fa-spotify" style="color:#1DB954"></i>Music</div><div class="music-setup"><div style="font-size:11px;color:var(--text2)">Paste Spotify URL:</div><input class="music-in" id="ms-'+id+'" placeholder="https://open.spotify.com/…" inputmode="url"><button class="music-go">Load</button></div>';wrap.querySelector('#ms-'+id).addEventListener('touchstart',function(e){e.stopPropagation();},{passive:true});wrap.querySelector('#ms-'+id).addEventListener('mousedown',function(e){if(G.editMode)e.stopPropagation();});wrap.querySelector('.music-go').addEventListener('click',function(){loadMusic(id);});}}
  else if(w.type==='youtube'){buildYouTube(w,wrap);}
  else if(w.type==='pdf'){buildPDF(w,wrap);}
  else if(w.type==='audio'){buildAudio(w,wrap);}
  else if(w.type==='pomodoro')buildPomo(w,wrap);
  else if(w.type==='habit')buildHabit(w,wrap);
  else if(w.type==='calendar')buildCal(w,wrap);
  else if(w.type==='ambient')buildAmbient(w,wrap);
  else if(w.type==='reminder')buildReminder(w,wrap);
  return wrap;
}

/* ── PDF ── */
function buildPDF(w,wrap){if(!w.pdfPage)w.pdfPage=1;var id=w.id;if(w.pdfData){wrap.innerHTML='<div class="wh"><i class="fas fa-file-pdf" style="color:#ef4444"></i><span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1;font-size:10px">'+(w.pdfName||'PDF')+'</span><button class="note-fsz" id="pdf-change-'+id+'"><i class="fas fa-sync-alt"></i></button></div><div style="flex:1;overflow:hidden;display:flex;flex-direction:column;height:calc(100% - 64px)"><iframe id="pdff-'+id+'" src="'+w.pdfData+'#page='+(w.pdfPage||1)+'" style="width:100%;flex:1;border:none;display:block" type="application/pdf"></iframe></div><div class="pdf-nav"><button class="pbtn" id="pdf-prev-'+id+'"'+(w.pdfPage<=1?' disabled':'')+'>< i class="fas fa-chevron-left"></i></button><span class="pdf-pg" id="pdf-pg-'+id+'">Page '+(w.pdfPage||1)+'</span><button class="pbtn" id="pdf-next-'+id+'"><i class="fas fa-chevron-right"></i></button></div><input type="file" id="pfu-'+id+'" accept="application/pdf" style="display:none">';wrap.querySelector('#pdf-change-'+id).addEventListener('click',function(e){e.stopPropagation();wrap.querySelector('#pfu-'+id).click();});wrap.querySelector('#pdf-prev-'+id).addEventListener('click',function(){if((w.pdfPage||1)<=1)return;w.pdfPage=(w.pdfPage||1)-1;var pg=document.getElementById('pdf-pg-'+id);if(pg)pg.textContent='Page '+w.pdfPage;var fr=document.getElementById('pdff-'+id);if(fr)fr.src=w.pdfData+'#page='+w.pdfPage;this.disabled=w.pdfPage<=1;G.save();});wrap.querySelector('#pdf-next-'+id).addEventListener('click',function(){w.pdfPage=(w.pdfPage||1)+1;var pg=document.getElementById('pdf-pg-'+id);if(pg)pg.textContent='Page '+w.pdfPage;var fr=document.getElementById('pdff-'+id);if(fr)fr.src=w.pdfData+'#page='+w.pdfPage;var prevBtn=document.getElementById('pdf-prev-'+id);if(prevBtn)prevBtn.disabled=false;G.save();});}else{wrap.innerHTML='<div class="wh"><i class="fas fa-file-pdf" style="color:#ef4444"></i>PDF</div><div class="pdf-setup"><i class="fas fa-file-pdf"></i><p>Upload a PDF file</p><button class="pdf-upload-btn">Choose PDF</button></div><input type="file" id="pfu-'+id+'" accept="application/pdf" style="display:none">';wrap.querySelector('.pdf-upload-btn').addEventListener('click',function(){wrap.querySelector('#pfu-'+id).click();});}var fi=wrap.querySelector('#pfu-'+id);if(fi){fi.addEventListener('change',function(e){var f=e.target.files[0];if(!f)return;var r=new FileReader();r.onload=function(ev){updW(id,{pdfData:ev.target.result,pdfName:f.name,pdfPage:1});Render.one(id);G.save();};r.readAsDataURL(f);e.target.value='';});}}

/* ── AUDIO ── */
var audioEls={};
function buildAudio(w,wrap){var id=w.id;if(w.audioData){wrap.innerHTML='<div class="wh"><i class="fas fa-headphones" style="color:var(--orange)"></i><span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:10px">'+(w.audioName||'Audio')+'</span><button class="note-fsz" id="ach-'+id+'"><i class="fas fa-sync-alt"></i></button></div><div class="audio-body"><div class="audio-player"><div class="audio-title">'+(w.audioName||'Audio file')+'</div><div class="audio-controls"><button class="aplay-btn" id="apl-'+id+'"><i class="fas fa-play" id="apli-'+id+'"></i></button><div class="audio-time" id="att-'+id+'">0:00</div></div><div class="audio-progress" id="apr-'+id+'"><div class="audio-prog-fill" id="apf-'+id+'" style="width:0%"></div></div></div></div><input type="file" id="afu-'+id+'" accept="audio/*" style="display:none">';var audio=audioEls[id];if(!audio){audio=new Audio();audioEls[id]=audio;}audio.src=w.audioData;var playing=false;var playBtn=wrap.querySelector('#apl-'+id);var icon=wrap.querySelector('#apli-'+id);var timeEl=wrap.querySelector('#att-'+id);var progBar=wrap.querySelector('#apr-'+id);var progFill=wrap.querySelector('#apf-'+id);function fmt(s){return Math.floor(s/60)+':'+String(Math.floor(s%60)).padStart(2,'0');}playBtn.addEventListener('click',function(){if(playing){audio.pause();icon.className='fas fa-play';playing=false;}else{audio.play().catch(function(){});icon.className='fas fa-pause';playing=true;}});audio.addEventListener('timeupdate',function(){if(!audio.duration)return;progFill.style.width=((audio.currentTime/audio.duration)*100)+'%';timeEl.textContent=fmt(audio.currentTime)+'/'+fmt(audio.duration);});audio.addEventListener('ended',function(){icon.className='fas fa-play';playing=false;progFill.style.width='0%';audio.currentTime=0;});progBar.addEventListener('click',function(e){if(!audio.duration)return;var r=progBar.getBoundingClientRect();audio.currentTime=((e.clientX-r.left)/r.width)*audio.duration;});wrap.querySelector('#ach-'+id).addEventListener('click',function(e){e.stopPropagation();wrap.querySelector('#afu-'+id).click();});var ab=wrap.querySelector('.audio-body');if(ab){ab.addEventListener('touchstart',function(e){e.stopPropagation();},{passive:true});ab.addEventListener('mousedown',function(e){if(G.editMode)e.stopPropagation();});}}else{wrap.innerHTML='<div class="wh"><i class="fas fa-headphones" style="color:var(--orange)"></i>Audio</div><div class="audio-body"><div class="audio-ph"><i class="fas fa-music"></i><p>Upload an audio file</p></div><button class="audio-upload-btn">Choose Audio</button></div><input type="file" id="afu-'+id+'" accept="audio/*" style="display:none">';wrap.querySelector('.audio-upload-btn').addEventListener('click',function(){wrap.querySelector('#afu-'+id).click();});}var fi=wrap.querySelector('#afu-'+id);if(fi){fi.addEventListener('change',function(e){var f=e.target.files[0];if(!f)return;var r=new FileReader();r.onload=function(ev){if(audioEls[id]){audioEls[id].pause();delete audioEls[id];}updW(id,{audioData:ev.target.result,audioName:f.name});Render.one(id);G.save();};r.readAsDataURL(f);e.target.value='';});}}

/* ── CLOCK ── */
var clkTimers={},clkModalId=null;
function buildClock(w,wrap){wrap.innerHTML='<div class="wh"><i class="fas fa-clock"></i>'+(w.clkLabel||'Clock')+'<span class="whs"></span><button class="note-fsz" id="cfg-'+w.id+'"><i class="fas fa-cog"></i></button></div><div class="clock-body"><div class="clk-t" id="clk-'+w.id+'">--:--:--</div><div class="clk-d" id="clkd-'+w.id+'"></div>'+(w.clkTz&&w.clkTz!=='local'?'<div class="clk-tz">'+w.clkTz.split('/').pop().replace('_',' ')+'</div>':'')+' </div>';wrap.querySelector('#cfg-'+w.id).addEventListener('click',function(e){e.stopPropagation();openClkModal(w.id);});tickClock(w.id);}
function openClkModal(id){var w=findW(id);if(!w)return;clkModalId=id;document.getElementById('cm-style').value=w.clkStyle||'style-minimal';document.getElementById('cm-tz').value=w.clkTz||'local';document.getElementById('cm-label').value=w.clkLabel||'';document.getElementById('clock-modal').classList.add('on');document.getElementById('modal-ov').classList.add('on');}
document.getElementById('cm-cancel').addEventListener('click',function(){document.getElementById('clock-modal').classList.remove('on');document.getElementById('modal-ov').classList.remove('on');clkModalId=null;});
document.getElementById('modal-ov').addEventListener('click',function(){document.getElementById('clock-modal').classList.remove('on');document.getElementById('modal-ov').classList.remove('on');clkModalId=null;});
document.getElementById('cm-ok').addEventListener('click',function(){if(!clkModalId)return;var w=findW(clkModalId);if(!w)return;w.clkStyle=document.getElementById('cm-style').value;w.clkTz=document.getElementById('cm-tz').value;w.clkLabel=document.getElementById('cm-label').value;G.save();var el=document.querySelector('.widget[data-id="'+clkModalId+'"]');if(el){['style-minimal','style-large','style-compact','style-ampm'].forEach(function(c){el.classList.remove(c);});el.classList.add(w.clkStyle);var body=el.querySelector('.wb');body.innerHTML='';body.appendChild(buildInner(w));}document.getElementById('clock-modal').classList.remove('on');document.getElementById('modal-ov').classList.remove('on');clkModalId=null;});
function tickClock(id){clearInterval(clkTimers[id]);function upd(){var el=document.getElementById('clk-'+id);if(!el){clearInterval(clkTimers[id]);return;}var w=findW(id);var now=new Date();var tz=w&&w.clkTz&&w.clkTz!=='local'?w.clkTz:null;var use12=w&&w.clkStyle==='style-ampm';var tStr,dStr;if(tz){try{tStr=now.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit',second:'2-digit',hour12:use12,timeZone:tz});dStr=now.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric',timeZone:tz});}catch(e2){tStr='--:--';dStr='';}}else{if(use12){tStr=now.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit',second:'2-digit',hour12:true});}else{tStr=[now.getHours(),now.getMinutes(),now.getSeconds()].map(function(n){return String(n).padStart(2,'0');}).join(':');}dStr=now.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'});}el.textContent=tStr;var de=document.getElementById('clkd-'+id);if(de)de.textContent=dStr||'';}upd();clkTimers[id]=setInterval(upd,1000);}

function setNoteColor(id,color){var w=findW(id);if(!w)return;w.color=color;var el=document.querySelector('.widget[data-id="'+id+'"]');if(el){el.dataset.color=color;el.querySelectorAll('.nc').forEach(function(d,i){d.classList.toggle('on',NCOLORS[i]===color);});}G.save();}
function loadMusic(id){var inp=document.getElementById('ms-'+id);if(!inp)return;var url=inp.value.trim();if(!url)return;var m=url.match(/open\.spotify\.com\/(track|album|playlist|episode)\/([A-Za-z0-9]+)/);var embed=m?'https://open.spotify.com/embed/'+m[1]+'/'+m[2]+'?utm_source=generator':url;updW(id,{embedUrl:embed});Render.one(id);G.save();}
function buildYouTube(w,wrap){if(w.ytEmbedUrl){wrap.innerHTML='<div class="yt-body"><iframe src="'+w.ytEmbedUrl+'" allow="accelerometer;autoplay;clipboard-write;encrypted-media;gyroscope;picture-in-picture" allowfullscreen loading="lazy"></iframe></div>';}else{wrap.innerHTML='<div class="wh"><i class="fab fa-youtube" style="color:#ff0000"></i>YouTube</div><div class="yt-setup"><div style="font-size:11px;color:var(--text2)">Paste YouTube URL:</div><input class="yt-in" id="yt-'+w.id+'" placeholder="https://youtube.com/watch?v=…" inputmode="url"><button class="yt-go">Load</button></div>';var inp=wrap.querySelector('#yt-'+w.id);inp.addEventListener('touchstart',function(e){e.stopPropagation();},{passive:true});inp.addEventListener('mousedown',function(e){if(G.editMode)e.stopPropagation();});wrap.querySelector('.yt-go').addEventListener('click',function(){loadYouTube(w.id);});inp.addEventListener('keydown',function(e){if(e.key==='Enter'){e.preventDefault();loadYouTube(w.id);}});}}
function loadYouTube(id){var inp=document.getElementById('yt-'+id);if(!inp)return;var url=inp.value.trim();if(!url)return toast('Paste a YouTube URL');var m=url.match(/(?:v=|youtu\.be\/|embed\/|shorts\/)([A-Za-z0-9_-]{11})/);if(!m)return toast('Could not find video ID');var embed='https://www.youtube.com/embed/'+m[1]+'?rel=0';updW(id,{ytEmbedUrl:embed});var ytW=findW(id);if(ytW){ytW.z=9000+(ytW.z||10);var ytEl=document.querySelector('.widget[data-id="'+id+'"]');if(ytEl)ytEl.style.zIndex=ytW.z;}Render.one(id);G.save();}

function tiHTML(wid,item){return '<div class="ti" data-tid="'+item.id+'"><div class="tcb'+(item.done?' dn':'')+'"></div><div class="ttx'+(item.done?' dn':'')+'" contenteditable="true">'+item.text+'</div><button class="tdl"><i class="fas fa-times"></i></button></div>';}

var Draw=(function(){
  var ctx2,drawing=false,tool='pen',col='#f1d19e',sz=3;
  var undoStack=[],redoStack=[];var MAX_HISTORY=30;
  function init(){ctx2=document.getElementById('draw-cv').getContext('2d');ctx2.lineCap='round';ctx2.lineJoin='round';load();}

  function updateBtns(){var ub=document.getElementById('dr-undo'),rb=document.getElementById('dr-redo');if(ub)ub.disabled=undoStack.length<=1;if(rb)rb.disabled=redoStack.length===0;}

  function pos(e,touch){var t=touch?e.touches[0]:e;return{x:(t.clientX-VP.tx)/VP.scale,y:(t.clientY-VP.ty)/VP.scale};}

  dc.addEventListener('touchmove',function(e){if(!G.drawMode||!drawing)return;e.preventDefault();var p=pos(e,true);if(tool==='eraser'){ctx2.clearRect(p.x-sz*3,p.y-sz*3,sz*6,sz*6);return;}ctx2.strokeStyle=col;ctx2.lineWidth=sz;ctx2.lineTo(p.x,p.y);ctx2.stroke();ctx2.beginPath();ctx2.moveTo(p.x,p.y);},{passive:false});
  dc.addEventListener('touchend',function(){if(drawing){drawing=false;pushUndo();save2();}});
  document.getElementById('dr-pen').addEventListener('click',function(){tool='pen';this.classList.add('on');document.getElementById('dr-era').classList.remove('on');});
  document.getElementById('dr-era').addEventListener('click',function(){tool='eraser';this.classList.add('on');document.getElementById('dr-pen').classList.remove('on');});

})();

document.addEventListener('keydown',function(e){if(e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA'||e.target.isContentEditable)return;var cmd=e.metaKey||e.ctrlKey;if(cmd&&e.key==='e'){e.preventDefault();G.toggleEdit();}if(cmd&&e.key==='d'){e.preventDefault();var s=document.querySelector('.widget.sel');if(s){var w=findW(s.dataset.id);if(w)dupWidget(w);}}if(e.key==='Delete'||e.key==='Backspace'){var s=document.querySelector('.widget.sel');if(s)delWidget(s.dataset.id);}if(e.key==='Escape'){Ctx.hide();Sheets.closeAll();G.connectMode=false;document.querySelectorAll('.widget.sel').forEach(function(e){e.classList.remove('sel');});clearTimeout(G.selTimer);}if(cmd&&e.key==='0'){e.preventDefault();VP.reset();}if(G.drawMode){if(cmd&&!e.shiftKey&&e.key==='z'){e.preventDefault();Draw.undo();}if(cmd&&(e.shiftKey&&e.key==='z'||e.key==='y')){e.preventDefault();Draw.redo();}}});
document.getElementById('cvp').addEventListener('mousedown',function(e){if(!e.target.closest('.widget')){document.querySelectorAll('.widget.sel').forEach(function(e){e.classList.remove('sel');});clearTimeout(G.selTimer);G.selId=null;}});

/* ── INIT ── */
G.init();VP.reset();
Spaces.to(G.cur);Spaces.renderBar();
Draw.init();BG.apply();Conn.render();
if('Notification' in window)Notification.requestPermission();

if(G.space.widgets.length===0){
  var VCX=2000,TOP=100;
  var n=addWidget('note');n.x=snap(VCX-260);n.y=TOP;n.width=240;n.height=220;
  n.content='Welcome to My Space 🌙\n\nPinch to zoom · drag to pan\nTap ✏️ to edit · + to add widgets';
  var cl=addWidget('clock');cl.x=snap(VCX+10);cl.y=TOP;cl.width=200;cl.height=130;cl.clkStyle='style-minimal';cl.clkTz='local';cl.clkLabel='';
  var td=addWidget('todo');td.x=snap(VCX+10);td.y=TOP+160;td.width=240;td.height=240;
  td.items=[{id:uid(),text:'Try pinch-to-zoom',done:false},{id:uid(),text:'Customize the background',done:false},{id:uid(),text:'Add a Pomodoro timer',done:false}];
  var q=addWidget('quote');q.x=snap(VCX-260);q.y=TOP+250;q.width=260;q.height=160;
  q.content='The space between who you are and who you want to be is where the magic happens.';q.author='Unknown';

}

<!-- ── PUBLISH SYSTEM ── -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

const firebaseConfig = {
    apiKey: "AIzaSyBs6V0yY14cuLBXB1nciZ-X0eyAiodC-Ak",
    authDomain: "patholytica.firebaseapp.com",
    databaseURL: "https://patholytica-default-rtdb.europe-west1.firebasedatabase.app",
    projectId: "patholytica",
    storageBucket: "patholytica.firebasestorage.app",
    messagingSenderId: "738430635282",
    appId: "1:738430635282:web:8451ef380447c7611137cb"
};

const fbApp = initializeApp(firebaseConfig);
const auth  = getAuth(fbApp);

const sb = window.supabase.createClient(
    "https://vduqewqyvszfquntmark.supabase.co",
    "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZkdXFld3F5dnN6ZnF1bnRtYXJrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njk2MTg3MjgsImV4cCI6MjA4NTE5NDcyOH0.V2JellFmUGgYhKfW-D4CBdcBHyPztOlcgLCBdhnXj7c"
);

let currentFbUser = null;
let pendingFile   = null;

onAuthStateChanged(auth, user => { currentFbUser = user; });

// ── Open publish modal ──────────────────────────────────────
document.getElementById('save-feed-btn').addEventListener('click', () => {
    if (!currentFbUser) { alert('Please log in first.'); return; }
    pendingFile = null;
    document.getElementById('pub-title').value = '';
    document.getElementById('pub-desc').value  = '';
    document.getElementById('pub-ok').disabled  = true;
    resetThumbPreview();
    document.getElementById('pub-modal-ov').classList.add('on');
});

document.getElementById('pub-cancel').addEventListener('click', closePubModal);
document.getElementById('pub-modal-ov').addEventListener('click', e => {
    if (e.target === document.getElementById('pub-modal-ov')) closePubModal();
});

function closePubModal() {
    document.getElementById('pub-modal-ov').classList.remove('on');
    pendingFile = null;
}

// ── File picker ─────────────────────────────────────────────
function openFilePicker() {
    document.getElementById('pub-file').click();
}
document.getElementById('pubPickBtn').addEventListener('click', openFilePicker);
document.getElementById('pubChangeBtn').addEventListener('click', openFilePicker);

document.getElementById('pub-file').addEventListener('change', e => {
    const file = e.target.files[0];
    if (!file) return;
    pendingFile = file;
    const url = URL.createObjectURL(file);
    const preview = document.getElementById('pubThumbPreview');
    let img = preview.querySelector('img');
    if (!img) { img = document.createElement('img'); preview.appendChild(img); }
    img.src = url;
    document.getElementById('pubThumbPlaceholder').style.display = 'none';
    document.getElementById('pubThumbLabel').style.display = 'flex';
    document.getElementById('pubThumbName').textContent = file.name;
    document.getElementById('pubPickBtn').style.display = 'none';
    maybeEnablePublish();
    e.target.value = '';
});

function resetThumbPreview() {
    const preview = document.getElementById('pubThumbPreview');
    const img = preview.querySelector('img');
    if (img) img.remove();
    document.getElementById('pubThumbPlaceholder').style.display = 'flex';
    document.getElementById('pubThumbLabel').style.display = 'none';
    document.getElementById('pubPickBtn').style.display = 'block';
}

function maybeEnablePublish() {
    const title = document.getElementById('pub-title').value.trim();
    document.getElementById('pub-ok').disabled = !(title && pendingFile);
}

document.getElementById('pub-title').addEventListener('input', maybeEnablePublish);

// ── Publish ─────────────────────────────────────────────────
document.getElementById('pub-ok').addEventListener('click', async () => {
    if (!currentFbUser || !pendingFile) return;

    const title = document.getElementById('pub-title').value.trim();
    const desc  = document.getElementById('pub-desc').value.trim();
    if (!title) return;

    const btn = document.getElementById('pub-ok');
    btn.disabled = true;
    btn.textContent = 'Publishing…';

    try {
        // 1. Resolve Supabase user_id
        const { data: userData, error: userErr } = await sb
            .from('users')
            .select('user_id')
            .eq('firebase_uid', currentFbUser.uid)
            .single();
        if (userErr || !userData) throw new Error('Could not resolve user');

        // 2. Upload screenshot to Storage
        const ext      = pendingFile.type === 'image/png' ? 'png' : 'jpg';
        const filePath = `${currentFbUser.uid}/space.${ext}`;
        const { error: uploadErr } = await sb.storage
            .from('spaces')
            .upload(filePath, pendingFile, { contentType: pendingFile.type, upsert: true });
        if (uploadErr) throw uploadErr;

        const { data: urlData } = sb.storage.from('spaces').getPublicUrl(filePath);
        const screenshotUrl = urlData.publicUrl + '?t=' + Date.now();

        // 3. Grab layout JSON from localStorage
        let layoutJson = null;
        try { layoutJson = JSON.parse(localStorage.getItem('msp8') || 'null'); } catch(_) {}

        // 4. Upsert spaces row
        const { error: upsertErr } = await sb.from('spaces').upsert({
            user_id:        userData.user_id,
            name:           'My Space',
            title:          title,
            description:    desc || null,
            screenshot_url: screenshotUrl,
            layout_json:    layoutJson
        }, { onConflict: 'user_id,name' });
        if (upsertErr) throw upsertErr;

        closePubModal();
        // Show success toast via the global toast function
        window.dispatchEvent(new CustomEvent('sp-toast', { detail: '✅ Published to Feed!' }));

    } catch (err) {
        console.error('Publish failed:', err);
        btn.disabled = false;
        btn.textContent = 'Publish';
        alert('Publish failed. Check console for details.');
    }
});

window.addEventListener('sp-toast', e => {
    // The global toast fn lives outside the module so we call it via the btn approach
    const el = document.getElementById('toast');
    el.textContent = e.detail;
    el.style.display = 'block';
    clearTimeout(el._t);
    el._t = setTimeout(() => { el.style.display = 'none'; }, 3000);
});
</script>
