<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Patholytica — Explore</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Merriweather:ital,wght@0,400;0,700;1,400&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root {
  --bg-color: #0a0a0a;
  --bg-secondary: #111111;
  --text-primary: #e7e9ea;
  --text-secondary: #71767b;
  --card-bg: #111111;
  --hover-bg: #16181c;
  --border-color: #2f3336;
  --accent: #4a90d9;
  --accent-hover: #3a7bc8;
  --accent-green: #2ea043;
  --accent-purple: #9061c2;
  --accent-orange: #d4820a;
  --header-height: 53px;
}
body.light-theme {
  --bg-color: #ffffff;
  --bg-secondary: #f7f9f9;
  --text-primary: #0f1419;
  --text-secondary: #536471;
  --card-bg: #ffffff;
  --hover-bg: #f7f9f9;
  --border-color: #eff3f4;
  --accent: #1d6fa4;
  --accent-hover: #1a5f8e;
}
* { box-sizing: border-box; }
html, body {
  margin: 0; padding: 0; min-height: 100%;
  font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  overflow-x: hidden; max-width: 100vw;
}
body { background: var(--bg-color); color: var(--text-primary); transition: background 0.2s, color 0.2s; }

/* ── Header ── */
.header-wrapper {
  position: fixed; top: 0; left: 0; right: 0;
  background: rgba(10,10,10,0.88);
  backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
  padding-top: env(safe-area-inset-top);
  border-bottom: 1px solid var(--border-color);
  z-index: 40; width: 100%;
}
body.light-theme .header-wrapper { background: rgba(255,255,255,0.88); }
.header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 10px 20px; max-width: 600px; margin: 0 auto;
}
.logo-img { height: 26px; width: auto; cursor: pointer; transition: opacity 0.2s; }
body.light-theme .logo-img { filter: invert(1); }
.logo-img:hover { opacity: 0.75; }
.header-actions { display: flex; align-items: center; gap: 10px; }

/* ── Auth ── */
.auth-buttons { display: none; gap: 8px; }
.auth-buttons.show { display: flex; }
.btn-login {
  padding: 6px 16px; border-radius: 9999px; font-size: 14px; font-weight: 600;
  cursor: pointer; transition: all 0.15s; text-decoration: none; border: 1px solid var(--border-color);
  background: transparent; color: var(--text-primary);
}
.btn-login:hover { background: var(--hover-bg); }
.user-welcome { display: none; align-items: center; gap: 10px; }
.user-welcome.show { display: flex; }
.welcome-text {
  font-weight: 700; font-size: 14px; cursor: pointer; transition: all 0.15s;
  padding: 6px 14px; border-radius: 9999px; border: 1px solid var(--border-color); color: var(--text-primary);
}
.welcome-text:hover { background: var(--hover-bg); }

/* ── User popup ── */
.user-popup-overlay { display: none; position: fixed; inset: 0; z-index: 200; }
.user-popup-overlay.show { display: block; }
.user-popup {
  position: fixed;
  top: calc(var(--header-height) + 6px); right: 12px;
  width: 288px; background: var(--bg-color);
  border: 1px solid var(--border-color); border-radius: 16px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.7); z-index: 201;
  overflow: hidden; display: none; animation: popupIn 0.18s ease;
}
.user-popup.show { display: block; }
@keyframes popupIn {
  from { opacity: 0; transform: translateY(-6px) scale(0.98); }
  to   { opacity: 1; transform: translateY(0) scale(1); }
}
.popup-profile-section {
  padding: 16px; display: flex; align-items: center; gap: 12px;
  border-bottom: 1px solid var(--border-color);
}
.popup-avatar {
  width: 44px; height: 44px; border-radius: 50%;
  background: var(--accent); display: flex; align-items: center; justify-content: center;
  font-size: 18px; font-weight: 700; color: white; flex-shrink: 0; overflow: hidden;
}
.popup-avatar img { width: 100%; height: 100%; object-fit: cover; }
.popup-user-info { flex: 1; min-width: 0; }
.popup-username { font-weight: 700; font-size: 14px; margin-bottom: 3px; color: var(--text-primary); }
.popup-stats { font-size: 12px; color: var(--text-secondary); line-height: 1.5; }
.popup-menu-item {
  display: flex; align-items: center; gap: 14px; padding: 13px 16px;
  cursor: pointer; transition: background 0.12s; font-size: 15px; font-weight: 500;
  color: var(--text-primary); border: none; background: none; width: 100%; text-align: left;
}
.popup-menu-item:hover { background: var(--hover-bg); }
.popup-menu-item i { width: 18px; text-align: center; color: var(--text-secondary); font-size: 15px; }
.popup-menu-item.danger { color: #f4212e; }
.popup-menu-item.danger i { color: #f4212e; }
.popup-divider { height: 1px; background: var(--border-color); }

/* ── Tab bar ── */
.tab-bar {
  position: fixed; top: var(--header-height); left: 0; right: 0;
  background: rgba(10,10,10,0.88);
  backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
  border-bottom: 1px solid var(--border-color);
  z-index: 36; display: flex;
}
body.light-theme .tab-bar { background: rgba(255,255,255,0.88); }
.tab-bar-inner { display: flex; width: 100%; max-width: 600px; margin: 0 auto; }
.tab-btn {
  flex: 1; padding: 14px 0; background: none; border: none;
  color: var(--text-secondary); font-size: 14px; font-weight: 600;
  cursor: pointer; border-bottom: 2px solid transparent; transition: all 0.15s;
  letter-spacing: 0.01em;
}
.tab-btn.active { color: var(--text-primary); border-bottom-color: var(--accent); }
.tab-btn:hover { color: var(--text-primary); background: var(--hover-bg); }

/* ── Search ── */
.search-container {
  position: fixed;
  top: calc(var(--header-height) + 49px);
  left: 0; right: 0;
  background: var(--bg-color); padding: 12px 16px 0;
  z-index: 35; border-bottom: 1px solid var(--border-color); display: none;
}
.search-container.active { display: block; }
.search-bar { max-width: 568px; margin: 0 auto; }
.search-input-wrapper { position: relative; display: flex; align-items: center; }
.search-icon { position: absolute; left: 14px; color: var(--text-secondary); font-size: 14px; pointer-events: none; }
.search-input {
  width: 100%; padding: 10px 42px; border: 1px solid transparent;
  border-radius: 9999px; background: var(--hover-bg); color: var(--text-primary);
  font-size: 15px; outline: none; transition: all 0.15s; font-family: inherit;
}
.search-input::placeholder { color: var(--text-secondary); }
.search-input:focus { border-color: var(--accent); background: var(--bg-secondary); }
.clear-search {
  position: absolute; right: 10px; width: 24px; height: 24px;
  border-radius: 50%; background: var(--accent); border: none; color: white;
  cursor: pointer; display: none; align-items: center; justify-content: center;
  font-size: 11px; transition: background 0.15s;
}
.clear-search.show { display: flex; }
.clear-search:hover { background: var(--accent-hover); }
.filter-tabs {
  display: flex; gap: 0; overflow-x: auto; scrollbar-width: none;
  margin: 10px -16px 0; max-width: none;
}
.filter-tabs::-webkit-scrollbar { display: none; }
.filter-tab {
  padding: 12px 16px; border-radius: 0; background: transparent; border: none;
  border-bottom: 2px solid transparent; color: var(--text-secondary);
  font-size: 14px; font-weight: 600; cursor: pointer; white-space: nowrap;
  transition: all 0.15s; font-family: inherit;
}
.filter-tab:hover { color: var(--text-primary); background: var(--hover-bg); }
.filter-tab.active { color: var(--accent); border-bottom-color: var(--accent); }

/* ── Search results ── */
.content-container {
  max-width: 600px; width: 100%; margin: 0 auto;
  padding: 0 0 60px;
  padding-top: calc(var(--header-height) + 49px + 112px);
  display: none;
}
.content-container.active { display: block; }
.results-list { list-style: none; margin: 0; padding: 0; }

/* Standard result item */
.result-item {
  padding: 14px 16px;
  border-bottom: 1px solid var(--border-color);
  cursor: pointer; transition: background 0.12s;
  display: flex; align-items: flex-start; gap: 12px;
}
.result-item:hover { background: var(--hover-bg); }

.result-avatar {
  width: 42px; height: 42px; border-radius: 50%;
  background: var(--accent); display: flex; align-items: center; justify-content: center;
  font-size: 17px; font-weight: 700; color: white; flex-shrink: 0; overflow: hidden; margin-top: 1px;
}
.result-avatar img { width: 100%; height: 100%; object-fit: cover; }
.result-avatar.article { background: var(--accent-green); border-radius: 10px; }
.result-avatar.playlist { background: var(--accent-purple); border-radius: 10px; }

.result-content { flex: 1; min-width: 0; }
.result-title { font-size: 15px; font-weight: 700; margin: 0 0 2px 0; color: var(--text-primary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.result-subtitle { font-size: 13px; color: var(--text-secondary); margin: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.result-type-badge {
  padding: 2px 8px; border-radius: 9999px; font-size: 11px; font-weight: 600;
  flex-shrink: 0; align-self: flex-start; margin-top: 2px;
}
.result-type-badge.user { background: rgba(74,144,217,0.12); color: var(--accent); }
.result-type-badge.article { background: rgba(46,160,67,0.12); color: var(--accent-green); }
.result-type-badge.playlist { background: rgba(144,97,194,0.12); color: var(--accent-purple); }

/* Content result card */
.content-result-card {
  margin: 0;
  background: transparent;
  border-bottom: 1px solid var(--border-color);
  cursor: pointer; transition: background 0.12s;
  padding: 14px 16px;
}
.content-result-card:hover { background: var(--hover-bg); }
.content-card-header { display: flex; align-items: flex-start; gap: 12px; margin-bottom: 6px; }
.content-card-icon {
  width: 42px; height: 42px; border-radius: 10px;
  background: rgba(212,130,10,0.15);
  display: flex; align-items: center; justify-content: center; flex-shrink: 0;
}
.content-card-icon i { color: var(--accent-orange); font-size: 16px; }
.content-card-meta { flex: 1; min-width: 0; }
.content-card-title { font-size: 15px; font-weight: 700; color: var(--text-primary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 2px; }
.content-card-author { font-size: 13px; color: var(--text-secondary); }
.content-card-badge { padding: 2px 8px; border-radius: 9999px; font-size: 11px; font-weight: 600; background: rgba(212,130,10,0.12); color: var(--accent-orange); flex-shrink: 0; margin-top: 2px; }
.content-card-excerpt {
  font-size: 14px; line-height: 1.6; color: var(--text-secondary);
  display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden;
  padding-left: 54px; font-family: "Merriweather", Georgia, serif; font-size: 13px;
}
.content-card-excerpt mark { background: rgba(212,130,10,0.2); color: var(--text-primary); padding: 1px 2px; border-radius: 2px; font-style: normal; }
.content-card-footer {
  padding-left: 54px; margin-top: 8px;
}
.content-card-arrow { font-size: 12px; color: var(--accent); font-weight: 600; display: inline-flex; align-items: center; gap: 4px; }

.results-section-label {
  font-size: 11px; font-weight: 700; letter-spacing: 0.08em;
  text-transform: uppercase; color: var(--text-secondary);
  padding: 14px 16px 10px; border-bottom: 1px solid var(--border-color);
  display: block;
}

.load-more-container { text-align: center; padding: 20px; display: none; }
.load-more-container.show { display: block; }
.btn-load-more {
  padding: 9px 24px; border-radius: 9999px; background: transparent;
  border: 1px solid var(--border-color); color: var(--text-primary);
  font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.15s; font-family: inherit;
}
.btn-load-more:hover { background: var(--hover-bg); }
.btn-load-more:disabled { opacity: 0.4; cursor: not-allowed; }

.empty-state { text-align: center; padding: 56px 24px; color: var(--text-secondary); }
.empty-state i { font-size: 36px; margin-bottom: 14px; opacity: 0.4; display: block; }
.empty-state h3 { font-size: 20px; font-weight: 800; margin: 0 0 6px 0; color: var(--text-primary); }
.empty-state p { font-size: 14px; margin: 0; }
.loading-spinner { display: inline-block; width: 20px; height: 20px; border: 2px solid var(--border-color); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

@keyframes shimmer { 0% { background-position: -400px 0; } 100% { background-position: 400px 0; } }
.skeleton-base {
  background: linear-gradient(90deg, var(--hover-bg) 25%, #1e2025 50%, var(--hover-bg) 75%);
  background-size: 800px 100%; animation: shimmer 1.4s infinite linear; border-radius: 6px;
}
body.light-theme .skeleton-base {
  background: linear-gradient(90deg, #e8e8e8 25%, #d0d0d0 50%, #e8e8e8 75%);
  background-size: 800px 100%;
}
.skeleton-result-item { padding: 14px 16px; border-bottom: 1px solid var(--border-color); display: flex; align-items: center; gap: 12px; }
.skeleton-result-avatar { width: 42px; height: 42px; border-radius: 50%; flex-shrink: 0; }
.skeleton-result-content { flex: 1; display: flex; flex-direction: column; gap: 8px; }
.skeleton-result-title { height: 14px; width: 52%; }
.skeleton-result-sub { height: 12px; width: 34%; }
.skeleton-result-badge { width: 48px; height: 20px; border-radius: 9999px; flex-shrink: 0; }

/* ── Feed scroller ── */
.scroller-container {
  position: fixed; top: calc(var(--header-height) + 49px); left: 0; right: 0; bottom: 0;
  display: none; overflow: hidden;
}
.scroller-container.active { display: block; }
.posts-wrapper { height: 100%; overflow-y: scroll; scroll-snap-type: y mandatory; scrollbar-width: none; }
.posts-wrapper::-webkit-scrollbar { display: none; }

/* ── Article card ── */
.article-card {
  position: relative;
  height: calc(100vh - var(--header-height) - 49px);
  scroll-snap-align: start; scroll-snap-stop: always;
  background: var(--bg-color);
  padding: 0;
  display: flex; flex-direction: column;
  border-bottom: 1px solid var(--border-color);
  max-width: 600px; margin: 0 auto; width: 100%;
}

/* Card top meta strip */
.article-card-meta {
  display: flex; align-items: center; gap: 10px;
  padding: 14px 16px 12px; flex-shrink: 0;
  border-bottom: 1px solid var(--border-color);
}
.author-avatar {
  width: 38px; height: 38px; border-radius: 50%;
  background: var(--accent); display: flex; align-items: center; justify-content: center;
  font-size: 15px; font-weight: 700; color: white; overflow: hidden; flex-shrink: 0;
}
.author-avatar img { width: 100%; height: 100%; object-fit: cover; }
.author-info { flex: 1; }
.author-name { color: var(--text-primary); font-weight: 700; font-size: 15px; line-height: 1.2; }
.article-date { color: var(--text-secondary); font-size: 13px; margin-top: 1px; }

/* Card body */
.article-card-body {
  flex: 1; overflow-y: auto; padding: 14px 16px 14px;
  padding-right: 64px;
}
.article-card-body::-webkit-scrollbar { width: 3px; }
.article-card-body::-webkit-scrollbar-track { background: transparent; }
.article-card-body::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 2px; }

.article-title {
  font-size: 19px; font-weight: 800; color: var(--text-primary);
  margin: 0 0 10px 0; line-height: 1.3;
  font-family: "Inter", sans-serif; letter-spacing: -0.02em;
}
.article-stats {
  display: flex; align-items: center; gap: 16px; margin-bottom: 14px; flex-shrink: 0;
}
.stat-item { display: flex; align-items: center; gap: 5px; font-size: 13px; color: var(--text-secondary); }
.stat-item.views i { color: var(--accent); }
.stat-item.likes i { color: #f4212e; }

.article-content {
  color: var(--text-primary); font-size: 15px; line-height: 1.75;
  font-family: "Merriweather", Georgia, serif;
}
.content-paragraph { margin-bottom: 16px; }

/* ── Media embeds ── */
.media-embed { margin: 14px 0; }
.media-embed img { width: 100%; max-width: 100%; height: auto; border-radius: 12px; display: block; border: 1px solid var(--border-color); }
.media-caption { font-size: 12px; color: var(--text-secondary); margin-top: 6px; font-style: italic; }

.pdf-embed-feed { background: var(--bg-secondary); border: 1px solid var(--border-color); border-radius: 12px; overflow: hidden; }
.pdf-embed-feed-header { display: flex; align-items: center; gap: 10px; padding: 12px 14px; border-bottom: 1px solid var(--border-color); }
.pdf-embed-feed-header i { color: #e74c3c; font-size: 18px; flex-shrink: 0; }
.pdf-embed-feed-name { font-size: 13px; font-weight: 600; flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: var(--text-primary); }
.pdf-open-btn { font-size: 11px; font-weight: 700; color: var(--accent); background: rgba(74,144,217,0.1); border: 1px solid rgba(74,144,217,0.2); border-radius: 9999px; padding: 4px 12px; text-decoration: none; white-space: nowrap; flex-shrink: 0; transition: background 0.15s; }
.pdf-open-btn:hover { background: rgba(74,144,217,0.2); }
.pdf-embed-feed iframe { width: 100%; height: 260px; border: none; display: block; }

.yt-embed-feed { background: var(--bg-secondary); border: 1px solid var(--border-color); border-radius: 12px; overflow: hidden; }
.yt-embed-feed-header { display: flex; align-items: center; gap: 10px; padding: 10px 14px; border-bottom: 1px solid var(--border-color); }
.yt-embed-feed-header i { color: #ff0000; font-size: 16px; flex-shrink: 0; }
.yt-embed-feed-title { font-size: 13px; font-weight: 600; flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: var(--text-primary); }
.yt-watch-btn { font-size: 11px; font-weight: 700; color: #ff0000; background: rgba(255,0,0,0.1); border: 1px solid rgba(255,0,0,0.2); border-radius: 9999px; padding: 4px 12px; text-decoration: none; white-space: nowrap; flex-shrink: 0; transition: background 0.15s; }
.yt-watch-btn:hover { background: rgba(255,0,0,0.2); }
.yt-embed-feed iframe { width: 100%; aspect-ratio: 16/9; border: none; display: block; }

.custom-audio-player { background: var(--bg-secondary); border-radius: 12px; padding: 14px; display: flex; align-items: center; gap: 12px; border: 1px solid var(--border-color); }
.play-btn { width: 38px; height: 38px; border-radius: 50%; background: var(--accent); border: none; color: white; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 14px; transition: all 0.15s; flex-shrink: 0; }
.play-btn:hover { background: var(--accent-hover); }
.audio-info { flex: 1; min-width: 0; overflow: hidden; }
.audio-title { font-size: 13px; font-weight: 600; margin-bottom: 8px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: var(--text-primary); }
.waveform-container { position: relative; height: 26px; background: var(--hover-bg); border-radius: 4px; margin-bottom: 6px; cursor: pointer; overflow: hidden; }
.waveform-progress { position: absolute; top: 0; left: 0; height: 100%; background: var(--accent); opacity: 0.25; transition: width 0.1s linear; }
.waveform-bars { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; align-items: center; justify-content: space-around; padding: 0 4px; }
.waveform-bar { width: 2px; background: var(--text-secondary); border-radius: 2px; opacity: 0.5; }
.audio-time { display: flex; justify-content: space-between; font-size: 11px; color: var(--text-secondary); }

/* ── Action buttons (right rail) ── */
.action-buttons {
  position: absolute; right: 14px; bottom: 60px;
  display: flex; flex-direction: column; gap: 20px; z-index: 10;
}
.action-btn { display: flex; flex-direction: column; align-items: center; gap: 3px; background: none; border: none; cursor: pointer; transition: transform 0.1s; padding: 0; }
.action-btn:active { transform: scale(0.88); }
.action-btn svg { width: 24px; height: 24px; stroke: var(--text-primary); fill: none; stroke-width: 2; transition: stroke 0.15s, fill 0.15s; }
.action-btn.liked svg { fill: #f4212e; stroke: #f4212e; }
.action-btn span { color: var(--text-secondary); font-size: 12px; font-weight: 600; }

/* ── Skeleton feed cards ── */
.skeleton-card {
  position: relative;
  height: calc(100vh - var(--header-height) - 49px);
  scroll-snap-align: start; scroll-snap-stop: always;
  background: var(--bg-color);
  display: flex; flex-direction: column;
  border-bottom: 1px solid var(--border-color);
  max-width: 600px; margin: 0 auto; width: 100%;
}
.skeleton-card-meta { display: flex; align-items: center; gap: 10px; padding: 14px 16px 12px; border-bottom: 1px solid var(--border-color); }
.skeleton-avatar { width: 38px; height: 38px; border-radius: 50%; flex-shrink: 0; }
.skeleton-author-block { flex: 1; display: flex; flex-direction: column; gap: 6px; }
.skeleton-name  { height: 13px; width: 120px; }
.skeleton-date  { height: 11px; width: 70px; }
.skeleton-card-body { flex: 1; padding: 14px 16px; display: flex; flex-direction: column; gap: 10px; }
.skeleton-title       { height: 22px; width: 88%; }
.skeleton-title-short { height: 22px; width: 62%; }
.skeleton-stats { display: flex; gap: 14px; }
.skeleton-stat  { height: 13px; width: 52px; }
.skeleton-line          { height: 13px; width: 100%; }
.skeleton-line.w90      { width: 90%; }
.skeleton-line.w75      { width: 75%; }
.skeleton-line.w80      { width: 80%; }
.skeleton-line.w65      { width: 65%; }
.skeleton-line.w95      { width: 95%; }

/* ── Comments popup ── */

<script type="module">

);

// ── Theme ──
window.toggleTheme = function() {
  const isLight = document.body.classList.toggle('light-theme');
  localStorage.setItem('theme', isLight ? 'light' : 'dark');
  document.getElementById('themeLabel').textContent = isLight ? 'Dark Mode' : 'Light Mode';

// ── Tab switching ──
let feedLoaded = false;
window.switchTab = function(tab) {

// ── User popup ──
window.toggleUserPopup = function() {
  const popup = document.getElementById('userPopup'), overlay = document.getElementById('userPopupOverlay');
  if (popup.classList.contains('show')) closeUserPopup();
  else { popup.classList.add('show'); overlay.classList.add('show'); }
};
window.closeUserPopup = function() {
  document.getElementById('userPopup').classList.remove('show');
  document.getElementById('userPopupOverlay').classList.remove('show');
};
async function populateUserPopup(user) {
  try {
    const { data: ud } = await supabase.from('users').select('*').eq('firebase_uid', user.uid).single();
    if (!ud) return;
    document.getElementById('welcomeText').textContent = `@${ud.username}`;
    document.getElementById('popupUsername').textContent = `@${ud.username}`;
    const pa = document.getElementById('popupAvatar');
    pa.innerHTML = ud.pfp ? `<img src="${ud.pfp}" alt="${ud.username}">` : (ud.username||'U')[0].toUpperCase();
    const [ar, lr] = await Promise.all([
      supabase.from('articles').select('id, views, likes').eq('firebase_uid', user.uid),
      supabase.from('playlists').select('id').eq('user_id', ud.user_id)
    ]);
    const arts = ar.data||[], libs = lr.data||[];
    const totalViews = arts.reduce((s,a) => s+(a.views||0), 0);
    document.getElementById('popupStats').textContent = `${arts.length} articles · ${libs.length} libraries · ${totalViews} views`;
  } catch(e) { console.error(e); }
}

// ── Auth ──
window.logOut = async function() { try { await signOut(auth); window.location.reload(); } catch(e) { alert('Error logging out.'); } };
onAuthStateChanged(auth, async (user) => {
  const ab = document.getElementById('authButtons'), uw = document.getElementById('userWelcome');
  if (user) {

  setTimeout(updateHeaderHeight, 50);
});

// ── Search ──
let currentFilter = 'all', searchTimeout, currentQuery = '', currentOffset = 0, hasMoreSearch = false;
const RESULTS_PER_PAGE = 10;
const searchInput = document.getElementById('searchInput');
const clearSearchBtn = document.getElementById('clearSearch');
const resultsList = document.getElementById('resultsList');
const initialState = document.getElementById('initialState');
const filterTabs = document.querySelectorAll('.filter-tab');
const loadMoreContainer = document.getElementById('loadMoreContainer');
const loadMoreBtn = document.getElementById('loadMoreBtn');

filterTabs.forEach(tab => tab.addEventListener('click', () => {
  filterTabs.forEach(t => t.classList.remove('active')); tab.classList.add('active');
  currentFilter = tab.dataset.filter;
  const q = searchInput.value.trim();
  if (q) { currentOffset = 0; performSearch(q, true); }
}));

clearSearchBtn.addEventListener('click', () => {
  searchInput.value = ''; clearSearchBtn.classList.remove('show');
  resultsList.innerHTML = ''; resultsList.appendChild(initialState);
  initialState.style.display = 'block'; loadMoreContainer.classList.remove('show');
  currentOffset = 0; currentQuery = ''; searchInput.focus();
});

searchInput.addEventListener('input', (e) => {
  const q = e.target.value.trim();
  if (q) clearSearchBtn.classList.add('show');
  else {
    clearSearchBtn.classList.remove('show'); resultsList.innerHTML = '';
    resultsList.appendChild(initialState); initialState.style.display = 'block';
    loadMoreContainer.classList.remove('show'); currentOffset = 0; currentQuery = ''; return;
  }
  clearTimeout(searchTimeout);
  searchTimeout = setTimeout(() => { currentOffset = 0; performSearch(q, true); }, 300);
});

loadMoreBtn.addEventListener('click', () => { if (currentQuery) performSearch(currentQuery, false); });

function escapeHtml(t) { const d = document.createElement('div'); d.textContent = t; return d.innerHTML; }
function highlightText(text, query) {
  if (!text || !query) return escapeHtml(text);
  const escaped = escapeHtml(text);
  return escaped.replace(new RegExp(`(${query.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')})`, 'gi'), '<mark>$1</mark>');
}

function showSearchSkeleton() {
  resultsList.innerHTML = '';
  for (let i = 0; i < 5; i++) {
    const li = document.createElement('li'); li.className = 'skeleton-result-item';
    li.innerHTML = `<div class="skeleton-result-avatar skeleton-base"></div><div class="skeleton-result-content"><div class="skeleton-result-title skeleton-base"></div><div class="skeleton-result-sub skeleton-base"></div></div><div class="skeleton-result-badge skeleton-base"></div>`;
    resultsList.appendChild(li);
  }
}

async function performSearch(query, isNewSearch = true) {
  if (!query) return;
  if (isNewSearch) {
    currentQuery = query; currentOffset = 0;
    initialState.style.display = 'none'; showSearchSkeleton();
    loadMoreContainer.classList.remove('show');
  } else {
    loadMoreBtn.disabled = true;
    loadMoreBtn.innerHTML = '<div class="loading-spinner" style="margin:0 auto;"></div>';
  }
  try {
    let results = [], grandTotal = 0;
    if (currentFilter === 'all') {
      const perType = Math.ceil(RESULTS_PER_PAGE / 3), typeOffset = Math.floor(currentOffset / 3);
      const [usersRes, articlesRes, playlistsRes] = await Promise.all([
        supabase.from('users').select('*', { count: 'exact' }).ilike('username', `%${query}%`).range(typeOffset, typeOffset + perType - 1),
        supabase.from('articles').select('*', { count: 'exact' }).ilike('title', `%${query}%`).range(typeOffset, typeOffset + perType - 1),
        supabase.from('playlists').select('*', { count: 'exact' }).ilike('name', `%${query}%`).range(typeOffset, typeOffset + perType - 1)
      ]);
      const uids = [...new Set((articlesRes.data||[]).map(a => a.firebase_user_id).filter(Boolean))];
      let userMap = {};
      if (uids.length > 0) { const { data: uData } = await supabase.from('users').select('firebase_uid, username').in('firebase_uid', uids); if (uData) uData.forEach(u => { userMap[u.firebase_uid] = u; }); }
      const articleIds = (articlesRes.data||[]).map(a => a.id);
      let mediaMap = {};
      if (articleIds.length > 0) { const { data: mData } = await supabase.from('media').select('*').in('article_id', articleIds).order('display_order', { ascending: true }); if (mData) mData.forEach(m => { if (!mediaMap[m.article_id]) mediaMap[m.article_id] = m; }); }
      if (usersRes.data) results.push(...usersRes.data.map(u => ({ ...u, type: 'user' })));
      if (articlesRes.data) results.push(...articlesRes.data.map(a => ({ ...a, type: 'article', authorUsername: userMap[a.firebase_user_id]?.username||'Unknown', firstMedia: mediaMap[a.id]||null })));
      if (playlistsRes.data) results.push(...playlistsRes.data.map(p => ({ ...p, type: 'playlist' })));
      grandTotal = (usersRes.count||0) + (articlesRes.count||0) + (playlistsRes.count||0);
      results = results.slice(0, RESULTS_PER_PAGE);
    } else if (currentFilter === 'users') {
      const { data, count } = await supabase.from('users').select('*', { count: 'exact' }).ilike('username', `%${query}%`).range(currentOffset, currentOffset + RESULTS_PER_PAGE - 1);
      results = (data||[]).map(u => ({ ...u, type: 'user' })); grandTotal = count||0;
    } else if (currentFilter === 'articles') {
      const { data, count } = await supabase.from('articles').select('*', { count: 'exact' }).ilike('title', `%${query}%`).range(currentOffset, currentOffset + RESULTS_PER_PAGE - 1);
      const uids = [...new Set((data||[]).map(a => a.firebase_user_id).filter(Boolean))];
      let userMap = {};
      if (uids.length > 0) { const { data: uData } = await supabase.from('users').select('firebase_uid, username').in('firebase_uid', uids); if (uData) uData.forEach(u => { userMap[u.firebase_uid] = u; }); }
      const articleIds = (data||[]).map(a => a.id);
      let mediaMap = {};
      if (articleIds.length > 0) { const { data: mData } = await supabase.from('media').select('*').in('article_id', articleIds).order('display_order', { ascending: true }); if (mData) mData.forEach(m => { if (!mediaMap[m.article_id]) mediaMap[m.article_id] = m; }); }
      results = (data||[]).map(a => ({ ...a, type: 'article', authorUsername: userMap[a.firebase_user_id]?.username||'Unknown', firstMedia: mediaMap[a.id]||null }));
      grandTotal = count||0;
    } else if (currentFilter === 'article-content') {
      const { data, count } = await supabase.from('articles').select('*', { count: 'exact' }).ilike('content', `%${query}%`).range(currentOffset, currentOffset + RESULTS_PER_PAGE - 1);
      const uids = [...new Set((data||[]).map(a => a.firebase_user_id).filter(Boolean))];
      let userMap = {};
      if (uids.length > 0) { const { data: uData } = await supabase.from('users').select('firebase_uid, username').in('firebase_uid', uids); if (uData) uData.forEach(u => { userMap[u.firebase_uid] = u; }); }
      results = (data||[]).map(a => {
        let excerpt = '';
        if (a.content) {
          const idx = a.content.toLowerCase().indexOf(query.toLowerCase());
          const start = Math.max(0, idx - 40), end = Math.min(a.content.length, idx + query.length + 100);
          excerpt = (start > 0 ? '…' : '') + a.content.substring(start, end) + (end < a.content.length ? '…' : '');
        }
        return { ...a, type: 'article-content', authorUsername: userMap[a.firebase_user_id]?.username||'Unknown', excerpt };
      });
      grandTotal = count||0;
    } else if (currentFilter === 'playlists') {
      const { data, count } = await supabase.from('playlists').select('*', { count: 'exact' }).ilike('name', `%${query}%`).range(currentOffset, currentOffset + RESULTS_PER_PAGE - 1);
      results = (data||[]).map(p => ({ ...p, type: 'playlist' })); grandTotal = count||0;
    }
    hasMoreSearch = (currentOffset + results.length) < grandTotal;
    displayResults(results, query, isNewSearch);
    currentOffset += results.length;
    if (hasMoreSearch && results.length > 0) {
      loadMoreContainer.classList.add('show'); loadMoreBtn.disabled = false;
      loadMoreBtn.textContent = 'Show more';
    } else { loadMoreContainer.classList.remove('show'); }
  } catch(err) {
    console.error('Search error:', err);
    if (isNewSearch) resultsList.innerHTML = `<li class="empty-state"><i class="fas fa-exclamation-circle"></i><h3>Something went wrong</h3><p>Please try again.</p></li>`;
    else { loadMoreBtn.disabled = false; loadMoreBtn.textContent = 'Show more'; }
  }
}

function displayResults(results, query, isNewSearch) {
  if (results.length === 0 && isNewSearch) {
    resultsList.innerHTML = `<li class="empty-state"><i class="fas fa-search"></i><h3>No results for "${query}"</h3><p>Try different keywords</p></li>`;
    return;
  }
  if (isNewSearch) resultsList.innerHTML = '';
  const contentResults = results.filter(r => r.type === 'article-content');
  const otherResults   = results.filter(r => r.type !== 'article-content');

  otherResults.forEach(result => {
    const li = document.createElement('li'); li.className = 'result-item';
    const avatarDiv = document.createElement('div');
    if (result.type === 'user') {
      avatarDiv.className = 'result-avatar';
      if (result.pfp) { const img = document.createElement('img'); img.src = result.pfp; img.alt = result.username||'User'; img.onerror = () => { img.remove(); avatarDiv.textContent = (result.username||'U')[0].toUpperCase(); }; avatarDiv.appendChild(img); }
      else avatarDiv.textContent = (result.username||'U')[0].toUpperCase();
    } else if (result.type === 'article') {
      avatarDiv.className = 'result-avatar article';
      if (result.firstMedia && result.firstMedia.type === 'image' && result.firstMedia.url) {
        const img = document.createElement('img'); img.src = result.firstMedia.url; img.alt = result.title||'Article';
        img.onerror = () => { img.remove(); avatarDiv.textContent = (result.title||'A')[0].toUpperCase(); };
        avatarDiv.appendChild(img);
      } else avatarDiv.textContent = (result.title||'A')[0].toUpperCase();
    } else if (result.type === 'playlist') {
      avatarDiv.className = 'result-avatar playlist';
      avatarDiv.textContent = (result.name||'L')[0].toUpperCase();
    }
    const contentDiv = document.createElement('div'); contentDiv.className = 'result-content';
    if (result.type === 'user') {
      contentDiv.innerHTML = `<h3 class="result-title">@${result.username||'Unknown'}</h3><p class="result-subtitle">${result.bio||'No bio available'}</p>`;
      li.onclick = () => window.location.href = `profile.html?username=${result.username}`;
    } else if (result.type === 'article') {
      const date = new Date(result.created_at).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
      contentDiv.innerHTML = `<h3 class="result-title">${result.title||'Untitled'}</h3><p class="result-subtitle">@${result.authorUsername} · ${date}</p>`;
      li.onclick = () => window.location.href = `article.html?id=${result.id}`;
    } else if (result.type === 'playlist') {
      const count = result.article_count||0;
      contentDiv.innerHTML = `<h3 class="result-title">${result.name||'Untitled'}</h3><p class="result-subtitle">${count} article${count!==1?'s':''}</p>`;
      li.onclick = () => window.location.href = `playlist.html?id=${result.id}`;
    }
    const badge = document.createElement('span');
    badge.className = `result-type-badge ${result.type}`;
    badge.textContent = result.type === 'playlist' ? 'Library' : result.type.charAt(0).toUpperCase() + result.type.slice(1);
    li.appendChild(avatarDiv); li.appendChild(contentDiv); li.appendChild(badge);
    resultsList.appendChild(li);
  });

  if (contentResults.length > 0) {
    if (otherResults.length > 0 || !isNewSearch) {
      const lbl = document.createElement('li'); lbl.className = 'results-section-label';
      lbl.textContent = 'Found in article content'; resultsList.appendChild(lbl);
    }
    contentResults.forEach(result => {
      const li = document.createElement('li');
      const date = new Date(result.created_at).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
      li.innerHTML = `
        <div class="content-result-card">
          <div class="content-card-header">
            <div class="content-card-icon"><i class="fas fa-file-lines"></i></div>
            <div class="content-card-meta">
              <div class="content-card-title">${result.title||'Untitled'}</div>
              <div class="content-card-author">@${result.authorUsername} · ${date}</div>
            </div>
            <span class="content-card-badge">Content</span>
          </div>
          ${result.excerpt ? `<div class="content-card-excerpt">${highlightText(result.excerpt, query)}</div>` : ''}
          <div class="content-card-footer">
            <span class="content-card-arrow">Read article <i class="fas fa-arrow-right" style="font-size:10px;"></i></span>
          </div>
        </div>`;
      li.onclick = () => window.location.href = `article.html?id=${result.id}`;
      resultsList.appendChild(li);
    });
  }
}

// ── Feed ──
let articles = [], userLikes = new Set(), currentArticleId = null;
let isLoading = false, hasMore = true, offset = 0;
const LIMIT = 10;
let currentUser = null, viewTimers = {}, viewedArticles = new Set();

function formatNumber(n) { if (n>=1000000) return (n/1000000).toFixed(1)+'M'; if (n>=1000) return (n/1000).toFixed(1)+'K'; return (n||0).toString(); }
function formatDate(d) {
  const now = new Date(), ms = now-d, mins = Math.floor(ms/60000), hrs = Math.floor(ms/3600000), days = Math.floor(ms/86400000);
  if (mins < 60) return `${mins}m`; if (hrs < 24) return `${hrs}h`; if (days < 7) return `${days}d`;
  return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
}

async function getCurrentUser() {
  try { const fu = auth.currentUser; if (!fu) return null; const { data } = await supabase.from('users').select('user_id, firebase_uid, username').eq('firebase_uid', fu.uid).single(); return data||null; }
  catch(e) { return null; }
}
async function loadUserLikes() {
  if (!currentUser) return;
  try { const { data: likes } = await supabase.from('likes').select('article_id').eq('user_id', currentUser.user_id); userLikes.clear(); (likes||[]).forEach(l => userLikes.add(String(l.article_id))); updateLikeButtons(); }
  catch(e) {}
}
function updateLikeButtons() { document.querySelectorAll('.like-btn').forEach(btn => btn.classList.toggle('liked', userLikes.has(String(btn.dataset.id)))); }

function skeletonCardHTML() {
  return `<div class="skeleton-card-meta"><div class="skeleton-avatar skeleton-base"></div><div class="skeleton-author-block"><div class="skeleton-name skeleton-base"></div><div class="skeleton-date skeleton-base"></div></div></div><div class="skeleton-card-body"><div class="skeleton-title skeleton-base"></div><div class="skeleton-title-short skeleton-base"></div><div class="skeleton-stats"><div class="skeleton-stat skeleton-base"></div><div class="skeleton-stat skeleton-base"></div></div><div class="skeleton-line skeleton-base"></div><div class="skeleton-line w90 skeleton-base"></div><div class="skeleton-line w95 skeleton-base"></div><div class="skeleton-line w80 skeleton-base"></div><div class="skeleton-line skeleton-base"></div><div class="skeleton-line w75 skeleton-base"></div></div>`;
}

async function loadArticles(isInitial = true) {
  if (isLoading || (!isInitial && !hasMore)) return;
  isLoading = true;
  try {
    const { data: articlesData, error } = await supabase.from('articles').select('*').order('created_at', { ascending: false }).range(offset, offset + LIMIT - 1);
    if (error) throw error;
    if (!articlesData || articlesData.length === 0) {
      if (isInitial) document.getElementById('postsWrapper').innerHTML = `<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:var(--text-secondary);gap:16px;"><i class="fas fa-inbox" style="font-size:40px;opacity:0.35;"></i><div style="font-weight:700;">No articles yet</div></div>`;
      hasMore = false; isLoading = false; return;
    }
    if (articlesData.length < LIMIT) hasMore = false;
    offset += articlesData.length;
    const uids = [...new Set(articlesData.map(a => a.firebase_user_id).filter(Boolean))];
    let usersData = [];
    if (uids.length > 0) { const { data: u } = await supabase.from('users').select('firebase_uid, username, full_name, pfp').in('firebase_uid', uids); usersData = u||[]; }
    const aIds = articlesData.map(a => a.id);
    const { data: mediaData } = await supabase.from('media').select('*').in('article_id', aIds).order('display_order', { ascending: true });
    const newArticles = articlesData.map(a => {
      const u = usersData.find(u => u.firebase_uid === a.firebase_user_id);
      return { ...a, author: u?.username ? `@${u.username}` : (u?.full_name||'Anonymous'), authorPfp: u?.pfp||null, authorUsername: u?.username||null, media: (mediaData||[]).filter(m => m.article_id === a.id) };
    });
    articles = [...articles, ...newArticles];
    renderArticles(isInitial);
    isLoading = false;
  } catch(e) {
    console.error(e);
    if (isInitial) document.getElementById('postsWrapper').innerHTML = `<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:var(--text-secondary);gap:16px;"><i class="fas fa-exclamation-triangle" style="font-size:40px;opacity:0.35;"></i><div style="font-weight:700;">Failed to load</div></div>`;
    isLoading = false;
  }
}

function createMediaElement(m) {
  const d = document.createElement('div'); d.className = 'media-embed';
  if (m.type === 'image') {
    d.innerHTML = `<img src="${m.url}" alt="${m.caption||''}">${m.caption?`<div class="media-caption">${m.caption}</div>`:''}`;
  } else if (m.type === 'audio') {
    const aid = 'audio-'+Math.random().toString(36).substr(2,9);
    d.innerHTML = `<div class="custom-audio-player"><button class="play-btn" onclick="toggleAudio(this,'${aid}')"><i class="fas fa-play"></i></button><div class="audio-info"><div class="audio-title">${m.caption||'Audio'}</div><div class="waveform-container" onclick="seekAudio(event,this,'${aid}')"><div class="waveform-progress"></div><div class="waveform-bars">${Array(15).fill(0).map(()=>`<div class="waveform-bar" style="height:${Math.random()*60+20}%"></div>`).join('')}</div></div><div class="audio-time"><span class="current-time">0:00</span><span class="duration">0:00</span></div></div><audio id="${aid}" src="${m.url}" style="display:none;"></audio></div>${m.caption?`<div class="media-caption">${m.caption}</div>`:''}`;
    setTimeout(() => { const audio = document.getElementById(aid); if (audio) audio.addEventListener('loadedmetadata', () => { const s = Math.floor(audio.duration), mn = Math.floor(s/60), sc = s%60; const span = audio.closest('.custom-audio-player')?.querySelector('.duration'); if (span) span.textContent = `${mn}:${sc.toString().padStart(2,'0')}`; }); }, 100);
  } else if (m.type === 'pdf') {
    d.innerHTML = `<div class="pdf-embed-feed"><div class="pdf-embed-feed-header"><i class="fas fa-file-pdf"></i><span class="pdf-embed-feed-name">${m.caption||'Document'}</span><a class="pdf-open-btn" href="${m.url}" target="_blank" rel="noopener">Open PDF</a></div><iframe src="${m.url}" title="${m.caption||'Document'}"></iframe></div>${m.caption?`<div class="media-caption">${m.caption}</div>`:''}`;
  } else if (m.type === 'youtube') {
    const ytMatch = m.url.match(/embed\/([A-Za-z0-9_-]{11})/), videoId = ytMatch ? ytMatch[1] : '';
    const label = m.caption || (videoId ? `youtube.com/watch?v=${videoId}` : 'YouTube Video');
    d.innerHTML = `<div class="yt-embed-feed"><div class="yt-embed-feed-header"><i class="fab fa-youtube"></i><span class="yt-embed-feed-title">${label}</span>${videoId?`<a class="yt-watch-btn" href="https://www.youtube.com/watch?v=${videoId}" target="_blank" rel="noopener">Watch</a>`:''}</div><iframe src="${m.url}" title="${label}" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe></div>${m.caption?`<div class="media-caption">${m.caption}</div>`:''}`;
  }
  return d;
}

function getAvatarContent(article) {
  if (article.authorPfp) return `<img src="${article.authorPfp}" alt="${article.author}">`;
  let l = 'A';
  if (article.authorUsername) l = article.authorUsername.charAt(0).toUpperCase();
  else if (article.author) { const i = article.author.indexOf('@'); l = i !== -1 && article.author.length > i+1 ? article.author.charAt(i+1).toUpperCase() : article.author.charAt(0).toUpperCase(); }
  return l;
}

function renderArticles(isInitial = true) {
  const wrapper = document.getElementById('postsWrapper');
  if (isInitial) wrapper.innerHTML = '';
  else { const last = wrapper.lastElementChild; if (last && last.classList.contains('skeleton-card')) last.remove(); }
  const start = isInitial ? 0 : articles.length - LIMIT;
  for (let i = start; i < articles.length; i++) {
    const article = articles[i];
    const div = document.createElement('div');
    div.className = 'article-card'; div.dataset.index = i; div.dataset.articleId = article.id;

    // Meta strip
    const metaDiv = document.createElement('div'); metaDiv.className = 'article-card-meta';
    metaDiv.innerHTML = `<div class="author-avatar">${getAvatarContent(article)}</div><div class="author-info"><div class="author-name">${article.author}</div><div class="article-date">${formatDate(new Date(article.created_at))}</div></div>`;
    div.appendChild(metaDiv);

    // Body
    const bodyDiv = document.createElement('div'); bodyDiv.className = 'article-card-body';
    const titleEl = document.createElement('div'); titleEl.className = 'article-title'; titleEl.textContent = article.title||'Untitled';
    bodyDiv.appendChild(titleEl);
    const statsEl = document.createElement('div'); statsEl.className = 'article-stats';
    statsEl.innerHTML = `<div class="stat-item views"><i class="fas fa-eye"></i><span>${formatNumber(article.views||0)}</span></div><div class="stat-item likes"><i class="fas fa-heart"></i><span>${formatNumber(article.likes||0)}</span></div>`;
    bodyDiv.appendChild(statsEl);
    const contentDiv = document.createElement('div'); contentDiv.className = 'article-content';
    const paragraphs = (article.content||'No content available').split('\n\n');
    paragraphs.forEach((p, pi) => {
      if (p.trim()) {
        const el = document.createElement('div'); el.className = 'content-paragraph'; el.textContent = p.trim();
        contentDiv.appendChild(el);
        if (article.media?.length > 0) article.media.filter(m => m.display_order === pi).forEach(m => contentDiv.appendChild(createMediaElement(m)));
      }
    });
    if (article.media) article.media.filter(m => m.display_order >= paragraphs.length).forEach(m => contentDiv.appendChild(createMediaElement(m)));
    bodyDiv.appendChild(contentDiv);
    div.appendChild(bodyDiv);

    // Action buttons
    const isLiked = userLikes.has(String(article.id));
    const actionsDiv = document.createElement('div'); actionsDiv.className = 'action-buttons';
    actionsDiv.innerHTML = `
      <button class="action-btn like-btn ${isLiked?'liked':''}" data-id="${article.id}">
        <svg viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path></svg>
        <span class="like-count">${article.likes||0}</span>
      </button>
      <button class="action-btn comment-btn" data-id="${article.id}">
        <svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg>
        <span class="comment-count">0</span>
      </button>
      <button class="action-btn expand-btn" data-id="${article.id}">
        <svg viewBox="0 0 24 24"><polyline points="15 3 21 3 21 9"></polyline><polyline points="9 21 3 21 3 15"></polyline><line x1="21" y1="3" x2="14" y2="10"></line><line x1="3" y1="21" x2="10" y2="14"></line></svg>
        <span>Open</span>
      </button>`;
    div.appendChild(actionsDiv);
    wrapper.appendChild(div);
  }
  if (hasMore) { const sk = document.createElement('div'); sk.className = 'skeleton-card'; sk.innerHTML = skeletonCardHTML(); wrapper.appendChild(sk); }
  document.querySelectorAll('.like-btn').forEach(btn => btn.addEventListener('click', handleLike));
  document.querySelectorAll('.comment-btn').forEach(btn => btn.addEventListener('click', handleComments));
  document.querySelectorAll('.expand-btn').forEach(btn => btn.addEventListener('click', e => window.location.href = `article.html?id=${e.currentTarget.dataset.id}`));
  if (isInitial) { wrapper.addEventListener('scroll', handleScroll); loadCommentCounts(); setupIO(); }
  else { setupIOForNew(start); loadCommentCounts(); }
}

function setupIO() {
  const obs = new IntersectionObserver(entries => entries.forEach(e => { const id = e.target.dataset.articleId; if (!id) return; if (e.isIntersecting && e.intersectionRatio >= 0.75) startViewTimer(id); else clearViewTimer(id); }), { threshold: [0.75] });
  document.querySelectorAll('.article-card').forEach(c => { if (c.dataset.articleId) obs.observe(c); });
}
function setupIOForNew(startIndex) {
  const obs = new IntersectionObserver(entries => entries.forEach(e => { const id = e.target.dataset.articleId; if (!id) return; if (e.isIntersecting && e.intersectionRatio >= 0.75) startViewTimer(id); else clearViewTimer(id); }), { threshold: [0.75] });
  document.querySelectorAll('.article-card').forEach(c => { if (parseInt(c.dataset.index) >= startIndex && c.dataset.articleId) obs.observe(c); });
}
function startViewTimer(id) { if (viewedArticles.has(id) || viewTimers[id]) return; viewTimers[id] = setTimeout(async () => { await incrementView(id); }, 5000); }
function clearViewTimer(id) { if (viewTimers[id]) { clearTimeout(viewTimers[id]); delete viewTimers[id]; } }
async function incrementView(id) {
  if (viewedArticles.has(id)) return;
  try {
    viewedArticles.add(id);
    const { data: a } = await supabase.from('articles').select('views').eq('id', id).single();
    const nv = (a.views||0)+1;
    await supabase.from('articles').update({ views: nv }).eq('id', id);
    const idx = articles.findIndex(a => a.id === id); if (idx !== -1) articles[idx].views = nv;
    const card = document.querySelector(`.article-card[data-article-id="${id}"]`);
    if (card) { const s = card.querySelector('.stat-item.views span'); if (s) s.textContent = formatNumber(nv); }
  } catch(e) { viewedArticles.delete(id); }
}

async function loadCommentCounts() {
  try {
    const { data } = await supabase.from('comments').select('article_id');
    const counts = {}; (data||[]).forEach(c => { counts[c.article_id] = (counts[c.article_id]||0)+1; });
    document.querySelectorAll('.comment-btn').forEach(btn => { btn.querySelector('.comment-count').textContent = counts[btn.dataset.id]||0; });
  } catch(e) {}
}

async function handleLike(e) {
  const btn = e.currentTarget, id = String(btn.dataset.id), countSpan = btn.querySelector('.like-count');
  if (!currentUser) { currentUser = await getCurrentUser(); if (!currentUser) { alert('Please log in to like articles'); window.location.href = 'login.html'; return; } }
  if (btn.dataset.processing === 'true') return;
  btn.dataset.processing = 'true';
  const wasLiked = userLikes.has(id), prevCount = parseInt(countSpan.textContent)||0, newCount = wasLiked ? Math.max(0, prevCount-1) : prevCount+1;
  if (wasLiked) { userLikes.delete(id); btn.classList.remove('liked'); } else { userLikes.add(id); btn.classList.add('liked'); }
  countSpan.textContent = newCount;
  const card = btn.closest('.article-card');
  if (card) { const s = card.querySelector('.stat-item.likes span'); if (s) s.textContent = formatNumber(newCount); }
  const artIdx = articles.findIndex(a => String(a.id) === id);
  if (artIdx !== -1) articles[artIdx].likes = newCount;
  try {
    if (wasLiked) {
      const { error: delErr } = await supabase.from('likes').delete().eq('article_id', id).eq('user_id', currentUser.user_id);
      if (delErr) throw delErr;
      const { error: rpcErr } = await supabase.rpc('decrement_likes', { article_id: parseInt(id) });
      if (rpcErr) { const { data: fresh } = await supabase.from('articles').select('likes').eq('id', id).single(); await supabase.from('articles').update({ likes: Math.max(0,(fresh?.likes||1)-1) }).eq('id', id); }
    } else {
      const { error: insErr } = await supabase.from('likes').insert([{ article_id: parseInt(id), user_id: currentUser.user_id }]);
      if (insErr && insErr.code !== '23505') throw insErr;
      const { error: rpcErr } = await supabase.rpc('increment_likes', { article_id: parseInt(id) });
      if (rpcErr) { const { data: fresh } = await supabase.from('articles').select('likes').eq('id', id).single(); await supabase.from('articles').update({ likes: (fresh?.likes||0)+1 }).eq('id', id); }
    }
  } catch(err) {
    console.error('Like error:', err);
    if (wasLiked) { userLikes.add(id); btn.classList.add('liked'); } else { userLikes.delete(id); btn.classList.remove('liked'); }
    countSpan.textContent = prevCount;
    if (card) { const s = card.querySelector('.stat-item.likes span'); if (s) s.textContent = formatNumber(prevCount); }
    if (artIdx !== -1) articles[artIdx].likes = prevCount;
  } finally { btn.dataset.processing = 'false'; }
}

async function handleComments(e) { const id = e.currentTarget.dataset.id; currentArticleId = id; await loadComments(id); openComments(); }

async function loadComments(id) {
  const list = document.getElementById('commentsList');
  list.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:80px;"><div style="width:24px;height:24px;border:2px solid var(--border-color);border-top-color:var(--accent);border-radius:50%;animation:spin 0.8s linear infinite;"></div></div>';
  try {
    const { data: comments } = await supabase.from('comments').select('*').eq('article_id', id).order('created_at', { ascending: true });
    if (!comments || comments.length === 0) { list.innerHTML = '<div class="no-comments"><i class="fas fa-comments"></i><div>No replies yet</div></div>'; return; }
    const uids = [...new Set(comments.map(c => c.user_id).filter(Boolean))]; let umap = {};
    if (uids.length > 0) { const { data: u } = await supabase.from('users').select('user_id, username, full_name, pfp').in('user_id', uids); if (u) u.forEach(u => { umap[u.user_id] = u; }); }
    list.innerHTML = comments.map(c => {
      const u = umap[c.user_id], author = u?.username ? `@${u.username}` : (u?.full_name||'Anonymous');
      const av = u?.pfp ? `<img src="${u.pfp}" alt="${author}">` : (u?.username||'A')[0].toUpperCase();
      return `<div class="comment-item"><div class="comment-avatar">${av}</div><div class="comment-content"><div class="comment-author">${author}</div><div class="comment-text">${c.comment_text}</div><div class="comment-time">${formatDate(new Date(c.created_at))}</div></div></div>`;
    }).join('');
  } catch(e) { list.innerHTML = '<div class="no-comments"><i class="fas fa-exclamation-triangle"></i><div>Failed to load</div></div>'; }
}

window.openComments  = () => { document.getElementById('commentsPopup').classList.add('active'); document.getElementById('commentsOverlay').classList.add('active'); };
window.closeComments = () => { document.getElementById('commentsPopup').classList.remove('active'); document.getElementById('commentsOverlay').classList.remove('active'); };

window.sendComment = async function() {
  const input = document.getElementById('commentInput'), text = input.value.trim();
  if (!text || !currentArticleId) return;
  const btn = document.getElementById('sendCommentBtn'); btn.disabled = true;
  try {
    if (!currentUser) currentUser = await getCurrentUser();
    if (!currentUser) { window.location.href = 'login.html'; return; }
    await supabase.from('comments').insert([{ article_id: currentArticleId, user_id: currentUser.user_id, comment_text: text }]);
    input.value = ''; await loadComments(currentArticleId);
    const cb = document.querySelector(`.comment-btn[data-id="${currentArticleId}"]`);
    if (cb) { const cs = cb.querySelector('.comment-count'); cs.textContent = parseInt(cs.textContent)+1; }
  } catch(e) { alert('Failed to post reply.'); } finally { btn.disabled = false; }
};
document.getElementById('commentInput').addEventListener('keypress', e => { if (e.key==='Enter') window.sendComment(); });

function handleScroll(e) { const c = e.target; if (c.scrollTop + c.clientHeight >= c.scrollHeight * 0.8 && hasMore && !isLoading) loadArticles(false); }

feedLoaded = true;
loadArticles(true);
</script>

<script>
window.toggleAudio = function(btn, aid) {
  const player = btn.closest('.custom-audio-player'), audio = document.getElementById(aid), icon = btn.querySelector('i');
  if (audio.paused) {
    audio.play(); icon.className = 'fas fa-pause';
    audio.ontimeupdate = () => {
      const p = (audio.currentTime/audio.duration)*100;
      player.querySelector('.waveform-progress').style.width = p+'%';
      const m = Math.floor(audio.currentTime/60), s = Math.floor(audio.currentTime%60);
      player.querySelector('.current-time').textContent = `${m}:${s.toString().padStart(2,'0')}`;
    };
    audio.onended = () => { icon.className='fas fa-play'; player.querySelector('.waveform-progress').style.width='0%'; player.querySelector('.current-time').textContent='0:00'; };
  } else { audio.pause(); icon.className='fas fa-play'; }
};
window.seekAudio = function(e, container, aid) {
  const audio = document.getElementById(aid), rect = container.getBoundingClientRect();
  audio.currentTime = ((e.clientX-rect.left)/rect.width)*audio.duration;
};
</script>
</body>
