<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Patholytica — Login</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root {
  --bg: #0a0a0a;
  --bg2: #111;
  --bg3: #181818;
  --border: #1e1e1e;
  --border2: #2a2a2a;
  --text: #e8e6e1;
  --text2: #6e6c68;
  --text3: #3a3835;
  --accent: #c8a96e;
  --accent-dim: rgba(200,169,110,0.12);
  --accent-glow: rgba(200,169,110,0.18);
  --green: #3dba72;
  --red: #ef4444;
  --glass: rgba(14,14,14,0.88);
  --glass2: rgba(10,10,10,0.92);
  --gb: rgba(255,255,255,0.055);
  --sh: 0 8px 32px rgba(0,0,0,0.72);
  --sh2: 0 24px 64px rgba(0,0,0,0.88);
  --r: 14px;
  --st: env(safe-area-inset-top, 0px);
  --sb: env(safe-area-inset-bottom, 0px);
}

body.light-theme {
  --bg: #f5f3ef;
  --bg2: #eeebe6;
  --bg3: #e6e3dd;
  --border: #dedad3;
  --border2: #ccc8c0;
  --text: #1a1814;
  --text2: #7a7570;
  --text3: #b0aa9f;
  --accent: #a07840;
  --accent-dim: rgba(160,120,64,0.1);
  --accent-glow: rgba(160,120,64,0.15);
  --glass: rgba(245,243,239,0.92);
  --glass2: rgba(240,237,232,0.96);
  --gb: rgba(0,0,0,0.06);
  --sh: 0 8px 32px rgba(0,0,0,0.1);
  --sh2: 0 24px 64px rgba(0,0,0,0.18);
}

*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
  -webkit-tap-highlight-color: transparent;
}

html, body {
  width: 100%;
  min-height: 100%;
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  overflow-x: hidden;
}

body {
  display: flex;
  flex-direction: column;
  transition: background 0.3s ease, color 0.3s ease;
}

/* ── BACKGROUND LAYER ── */
.bg-layer {
  position: fixed;
  inset: 0;
  z-index: 0;
  pointer-events: none;
  background:
    radial-gradient(ellipse 60% 50% at 20% 20%, rgba(200,169,110,0.05) 0%, transparent 60%),
    radial-gradient(ellipse 50% 60% at 80% 80%, rgba(200,169,110,0.04) 0%, transparent 60%),
    var(--bg);
}

body.light-theme .bg-layer {
  background:
    radial-gradient(ellipse 60% 50% at 20% 20%, rgba(160,120,64,0.06) 0%, transparent 60%),
    radial-gradient(ellipse 50% 60% at 80% 80%, rgba(160,120,64,0.05) 0%, transparent 60%),
    var(--bg);
}

/* ── HEADER ── */
.header-wrapper {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  z-index: 40;
  padding-top: var(--st);
}

.header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 24px;
}

.logo-wrap {
  display: flex;
  align-items: center;
  gap: 10px;
  cursor: pointer;
  text-decoration: none;
}

.logo-img {
  height: 26px;
  width: auto;
  transition: opacity 0.2s ease;
}

body.light-theme .logo-img {
  filter: invert(1) sepia(0.2) saturate(0.8);
}

.logo-name {
  font-family: 'DM Serif Display', Georgia, serif;
  font-size: 17px;
  color: var(--text);
  letter-spacing: 0.01em;
}

.icon-btn {
  width: 36px;
  height: 36px;
  border-radius: 18px;
  background: var(--glass);
  border: 1px solid var(--gb);
  color: var(--text2);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
  transition: all 0.18s ease;
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
}

.icon-btn:hover {
  background: var(--bg3);
  color: var(--text);
  border-color: var(--border2);
}

/* ── MAIN LAYOUT ── */
.page {
  position: relative;
  z-index: 1;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 100px 20px 40px;
}

/* ── LOGIN CARD ── */
.login-card {
  width: 100%;
  max-width: 420px;
  background: var(--glass);
  border: 1px solid var(--gb);
  border-radius: 20px;
  padding: 40px 36px;
  backdrop-filter: blur(24px) saturate(1.4);
  -webkit-backdrop-filter: blur(24px) saturate(1.4);
  box-shadow: var(--sh2), inset 0 1px 0 rgba(255,255,255,0.05);
}

body.light-theme .login-card {
  box-shadow: var(--sh2), inset 0 1px 0 rgba(255,255,255,0.7);
}

/* ── CARD HEADER ── */
.card-header {
  text-align: center;
  margin-bottom: 32px;
}

.card-icon {
  width: 52px;
  height: 52px;
  border-radius: 16px;
  background: var(--accent-dim);
  border: 1px solid rgba(200,169,110,0.2);
  display: flex;
  align-items: center;
  justify-content: center;
  margin: 0 auto 16px;
  font-size: 20px;
  color: var(--accent);
}

.card-title {
  font-family: 'DM Serif Display', Georgia, serif;
  font-size: 26px;
  font-weight: 400;
  color: var(--text);
  margin-bottom: 6px;
  letter-spacing: -0.01em;
}

.card-subtitle {
  font-size: 13px;
  color: var(--text2);
  letter-spacing: 0.01em;
}

/* ── MESSAGES ── */
.msg {
  padding: 11px 14px;
  border-radius: 10px;
  font-size: 13px;
  margin-bottom: 20px;
  display: none;
  align-items: center;
  gap: 9px;
  line-height: 1.4;
}

.msg.show { display: flex; }

.msg-error {
  background: rgba(239,68,68,0.1);
  border: 1px solid rgba(239,68,68,0.2);
  color: #f87171;
}

.msg-success {
  background: rgba(61,186,114,0.1);
  border: 1px solid rgba(61,186,114,0.2);
  color: #4ade80;
}

.msg i { font-size: 12px; flex-shrink: 0; }

/* ── FORM ── */
.form-group {
  margin-bottom: 16px;
}

.form-label {
  display: block;
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.07em;
  text-transform: uppercase;
  color: var(--text2);
  margin-bottom: 7px;
}

.input-wrap {
  position: relative;
}

.input-icon {
  position: absolute;
  left: 13px;
  top: 50%;
  transform: translateY(-50%);
  font-size: 13px;
  color: var(--text3);
  pointer-events: none;
  transition: color 0.15s;
}

.form-input {
  width: 100%;
  padding: 11px 14px 11px 38px;
  font-size: 14px;
  font-family: 'DM Sans', sans-serif;
  border: 1px solid var(--border2);
  border-radius: 10px;
  background: var(--bg2);
  color: var(--text);
  transition: border-color 0.18s ease, box-shadow 0.18s ease, background 0.18s ease;
  outline: none;
}

.form-input:focus {
  border-color: var(--accent);
  background: var(--bg3);
  box-shadow: 0 0 0 3px var(--accent-glow);
}

.form-input:focus ~ .input-icon,
.input-wrap:focus-within .input-icon {
  color: var(--accent);
}

.form-input::placeholder { color: var(--text3); }

.forgot-link {
  display: block;
  text-align: right;
  font-size: 11px;
  color: var(--text2);
  text-decoration: none;
  margin-top: 6px;
  transition: color 0.15s;
  letter-spacing: 0.02em;
}

.forgot-link:hover { color: var(--accent); }

/* ── BUTTONS ── */
.btn-primary {
  width: 100%;
  padding: 12px 20px;
  font-size: 14px;
  font-weight: 600;
  font-family: 'DM Sans', sans-serif;
  letter-spacing: 0.02em;
  border: none;
  border-radius: 10px;
  cursor: pointer;
  background: var(--accent);
  color: #0a0a0a;
  transition: all 0.18s ease;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  margin-bottom: 12px;
  position: relative;
  overflow: hidden;
}

body.light-theme .btn-primary { color: #fff; }

.btn-primary::after {
  content: '';
  position: absolute;
  inset: 0;
  background: rgba(255,255,255,0);
  transition: background 0.15s;
}

.btn-primary:hover::after { background: rgba(255,255,255,0.08); }
.btn-primary:active::after { background: rgba(0,0,0,0.08); }

.btn-primary:disabled {
  opacity: 0.5;
  cursor: not-allowed;
}

.btn-secondary {
  width: 100%;
  padding: 11px 20px;
  font-size: 13.5px;
  font-weight: 500;
  font-family: 'DM Sans', sans-serif;
  border: 1px solid var(--border2);
  border-radius: 10px;
  cursor: pointer;
  background: var(--bg2);
  color: var(--text);
  transition: all 0.18s ease;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 9px;
}

.btn-secondary:hover {
  background: var(--bg3);
  border-color: var(--text3);
}

.btn-secondary .g-icon {
  width: 16px;
  height: 16px;
  flex-shrink: 0;
}

/* ── DIVIDER ── */
.divider {
  display: flex;
  align-items: center;
  gap: 12px;
  margin: 20px 0;
  color: var(--text3);
  font-size: 11px;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  font-weight: 600;
}

.divider::before,
.divider::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--border);
}

/* ── FOOTER ── */
.card-footer {
  text-align: center;
  margin-top: 22px;
  font-size: 13px;
  color: var(--text2);
}

.card-footer a {
  color: var(--accent);
  text-decoration: none;
  font-weight: 500;
  transition: opacity 0.15s;
}

.card-footer a:hover { opacity: 0.8; }

/* ── SIGNUP EXTRA ── */
.signup-extra { display: none; }
.signup-extra.show { display: block; }

/* ── SPINNER ── */
@keyframes spin {
  to { transform: rotate(360deg); }
}

.spinner {
  width: 15px;
  height: 15px;
  border: 2px solid rgba(0,0,0,0.2);
  border-top-color: rgba(0,0,0,0.7);
  border-radius: 50%;
  animation: spin 0.6s linear infinite;
  flex-shrink: 0;
}

body.light-theme .spinner {
  border-color: rgba(255,255,255,0.3);
  border-top-color: rgba(255,255,255,0.9);
}

/* ── RESPONSIVE ── */
@media (max-width: 480px) {
  .page {
    padding: 80px 14px 30px;
    align-items: flex-start;
    padding-top: 90px;
  }

  .login-card {
    padding: 32px 24px;
    border-radius: 16px;
  }

  .card-title { font-size: 22px; }
}
</style>
</head>
<body>

<div class="bg-layer"></div>

<div class="header-wrapper">
  <div class="header">
    <a class="logo-wrap" href="#">
      <img src="IMG_0696.png" class="logo-img" alt="Patholytica">
      <span class="logo-name">Patholytica</span>
    </a>
    <button class="icon-btn" onclick="toggleTheme()" title="Toggle theme">
      <i class="fas fa-circle-half-stroke"></i>
    </button>
  </div>
</div>

<div class="page">
  <div class="login-card">

    <div class="card-header">
      <div class="card-icon">
        <i class="fas fa-dna"></i>
      </div>
      <h1 class="card-title" id="cardTitle">Welcome back</h1>
      <p class="card-subtitle" id="cardSubtitle">Sign in to Patholytica Library</p>
    </div>

    <div id="errorMessage" class="msg msg-error">
      <i class="fas fa-circle-exclamation"></i>
      <span id="errorText"></span>
    </div>
    <div id="successMessage" class="msg msg-success">
      <i class="fas fa-circle-check"></i>
      <span id="successText"></span>
    </div>

    <form id="loginForm" autocomplete="on">

      <div class="form-group signup-extra" id="fullNameGroup">
        <label class="form-label" for="fullName">Full Name</label>
        <div class="input-wrap">
          <input type="text" id="fullName" class="form-input" placeholder="John Doe" autocomplete="name">
          <i class="fas fa-user input-icon"></i>
        </div>
      </div>

      <div class="form-group signup-extra" id="usernameGroup">
        <label class="form-label" for="username">Username</label>
        <div class="input-wrap">
          <input type="text" id="username" class="form-input" placeholder="johndoe" autocomplete="username">
          <i class="fas fa-at input-icon"></i>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label" for="email">Email</label>
        <div class="input-wrap">
          <input type="email" id="email" class="form-input" placeholder="your@email.com" autocomplete="email" required>
          <i class="fas fa-envelope input-icon"></i>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label" for="password">Password</label>
        <div class="input-wrap">
          <input type="password" id="password" class="form-input" placeholder="Enter your password" autocomplete="current-password" required>
          <i class="fas fa-lock input-icon"></i>
        </div>
        <a href="#" class="forgot-link" id="forgotPasswordLink" onclick="forgotPassword(); return false;">Forgot password?</a>
      </div>

      <button type="submit" class="btn-primary" id="submitBtn">
        <span id="submitLabel">Sign In</span>
      </button>

    </form>

    <div class="divider"><span>or</span></div>

    <button class="btn-secondary" onclick="signInWithGoogle()">
      <svg class="g-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
        <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
      </svg>
      <span>Continue with Google</span>
    </button>

    <p class="card-footer" id="cardFooter">
      Don't have an account? <a href="#" onclick="toggleSignUpMode(); return false;">Sign up</a>
    </p>

  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
  getAuth,
  signInWithEmailAndPassword,
  signInWithPopup,
  GoogleAuthProvider,
  sendPasswordResetEmail,
  createUserWithEmailAndPassword
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyBs6V0yY14cuLBXB1nciZ-X0eyAiodC-Ak",
  authDomain: "patholytica.firebaseapp.com",
  databaseURL: "https://patholytica-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "patholytica",
  storageBucket: "patholytica.firebasestorage.app",
  messagingSenderId: "738430635282",
  appId: "1:738430635282:web:8451ef380447c7611137cb"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const googleProvider = new GoogleAuthProvider();

const supabase = window.supabase.createClient(
  "https://vduqewqyvszfquntmark.supabase.co",
  "sb_publishable_YseP73aoHam8YT6B0b9EQQ_iAUEWARI"
);

async function createUserInSupabase(firebaseUser, fullName = null, username = null) {
  try {
    const { data: existingUserByUid } = await supabase
      .from('users').select('*').eq('firebase_uid', firebaseUser.uid).maybeSingle();
    if (existingUserByUid) {
      await supabase.from('users').update({ updated_at: new Date().toISOString() }).eq('firebase_uid', firebaseUser.uid);
      return existingUserByUid;
    }
    const { data: existingUserByEmail } = await supabase
      .from('users').select('*').eq('email', firebaseUser.email).maybeSingle();
    if (existingUserByEmail) {
      const { data: updated } = await supabase
        .from('users').update({ firebase_uid: firebaseUser.uid, updated_at: new Date().toISOString() })
        .eq('email', firebaseUser.email).select();
      return updated[0];
    }
    const userData = {
      firebase_uid: firebaseUser.uid, email: firebaseUser.email,
      username: username || firebaseUser.email.split('@')[0],
      full_name: fullName || firebaseUser.displayName || null,
      created_at: new Date().toISOString(), updated_at: new Date().toISOString()
    };
    const { data, error } = await supabase.from('users').insert([userData]).select();
    if (error) throw error;
    return data[0];
  } catch (error) { console.error("Error in createUserInSupabase:", error); throw error; }
}

async function updateUserInSupabase(firebaseUid) {
  try {
    await supabase.from('users').update({ updated_at: new Date().toISOString() }).eq('firebase_uid', firebaseUid);
  } catch (error) { console.error("Error updating user:", error); }
}

window.signInWithGoogle = async function() {
  try {
    const result = await signInWithPopup(auth, googleProvider);
    await createUserInSupabase(result.user);
    showSuccess("Signed in successfully!");
    setTimeout(() => { window.location.href = "index.html"; }, 1000);
  } catch (error) { showError(getErrorMessage(error.code)); }
};

window.forgotPassword = async function() {
  const email = document.getElementById('email').value;
  if (!email) { showError("Enter your email address first"); return; }
  try {
    await sendPasswordResetEmail(auth, email);
    showSuccess("Reset link sent — check your inbox.");
  } catch (error) { showError(getErrorMessage(error.code)); }
};

window.toggleSignUpMode = function() {
  const title = document.getElementById('cardTitle');
  const subtitle = document.getElementById('cardSubtitle');
  const submitLabel = document.getElementById('submitLabel');
  const footer = document.getElementById('cardFooter');
  const signupFields = document.querySelectorAll('.signup-extra');
  const forgotLink = document.getElementById('forgotPasswordLink');
  const fullNameInput = document.getElementById('fullName');
  const usernameInput = document.getElementById('username');
  const icon = document.querySelector('.card-icon i');
  const isLogin = title.textContent === "Welcome back";
  if (isLogin) {
    title.textContent = "Create account";
    subtitle.textContent = "Join Patholytica Library";
    submitLabel.textContent = "Sign Up";
    footer.innerHTML = 'Already have an account? <a href="#" onclick="toggleSignUpMode(); return false;">Sign in</a>';
    signupFields.forEach(f => f.classList.add('show'));
    forgotLink.style.display = 'none';
    fullNameInput.required = true;
    usernameInput.required = true;
    icon.className = 'fas fa-flask';
  } else {
    title.textContent = "Welcome back";
    subtitle.textContent = "Sign in to Patholytica Library";
    submitLabel.textContent = "Sign In";
    footer.innerHTML = "Don't have an account? <a href=\"#\" onclick=\"toggleSignUpMode(); return false;\">Sign up</a>";
    signupFields.forEach(f => f.classList.remove('show'));
    forgotLink.style.display = 'block';
    fullNameInput.required = false;
    usernameInput.required = false;
    icon.className = 'fas fa-dna';
  }
};

document.getElementById('loginForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const email = document.getElementById('email').value;
  const password = document.getElementById('password').value;
  const fullName = document.getElementById('fullName').value;
  const username = document.getElementById('username').value;
  const isSignUp = document.getElementById('cardTitle').textContent === "Create account";
  const btn = document.getElementById('submitBtn');
  const label = document.getElementById('submitLabel');
  btn.disabled = true;
  btn.innerHTML = '<div class="spinner"></div>';
  try {
    if (isSignUp) {
      const result = await createUserWithEmailAndPassword(auth, email, password);
      await createUserInSupabase(result.user, fullName, username);
      showSuccess("Account created!");
      setTimeout(() => { window.location.href = "index.html"; }, 1000);
    } else {
      const result = await signInWithEmailAndPassword(auth, email, password);
      await updateUserInSupabase(result.user.uid);
      showSuccess("Signed in!");
      setTimeout(() => { window.location.href = "index.html"; }, 1000);
    }
  } catch (error) {
    showError(getErrorMessage(error.code));
    btn.disabled = false;
    btn.innerHTML = '<span id="submitLabel">' + (isSignUp ? "Sign Up" : "Sign In") + '</span>';
  }
});

function showError(message) {
  document.getElementById('successMessage').classList.remove('show');
  document.getElementById('errorText').textContent = message;
  document.getElementById('errorMessage').classList.add('show');
  setTimeout(() => document.getElementById('errorMessage').classList.remove('show'), 5000);
}

function showSuccess(message) {
  document.getElementById('errorMessage').classList.remove('show');
  document.getElementById('successText').textContent = message;
  document.getElementById('successMessage').classList.add('show');
  setTimeout(() => document.getElementById('successMessage').classList.remove('show'), 3000);
}

function getErrorMessage(code) {
  const m = {
    'auth/invalid-email': 'Invalid email address',
    'auth/user-disabled': 'This account has been disabled',
    'auth/user-not-found': 'No account found with this email',
    'auth/wrong-password': 'Incorrect password',
    'auth/email-already-in-use': 'An account with this email already exists',
    'auth/weak-password': 'Password must be at least 6 characters',
    'auth/popup-closed-by-user': 'Sign-in popup was closed',
    'auth/cancelled-popup-request': 'Sign-in cancelled',
  };
  return m[code] || 'Something went wrong. Please try again.';
}
</script>

<script>
function toggleTheme() {
  document.body.classList.toggle('light-theme');
  localStorage.setItem("theme", document.body.classList.contains("light-theme") ? "light" : "dark");
}
if (localStorage.getItem("theme") === "light") {
  document.body.classList.add("light-theme");
}
</script>
