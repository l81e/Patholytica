<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Patholytica — Article</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root {
  --bg-color: #0d0d0d;
  --bg-secondary: #141414;
  --text-primary: #e8e6e1;
  --text-secondary: #7a7875;
  --card-bg: #141414;
  --hover-bg: #1c1c1c;
  --border-color: #242424;
  --accent: #4f9eff;
  --accent-hover: #3a8ae8;
  --accent-green: #3dba72;
  --accent-purple: #a56fd4;
  --accent-orange: #e88c3a;
  --header-height: 53px;
}
body.light-theme {
  --bg-color: #f9f9f9;
  --bg-secondary: #ffffff;
  --text-primary: #0f0f0f;
  --text-secondary: #606060;
  --card-bg: #ffffff;
  --hover-bg: #f0f0f0;
  --border-color: #e5e5e5;
  --accent: #065fd4;
  --accent-hover: #0448a3;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { min-height: 100%; font-family: "Roboto", Arial, sans-serif; overflow-x: hidden; }
body { background: var(--bg-color); color: var(--text-primary); transition: background 0.2s, color 0.2s; }

/* ── Header ── */
.header-wrapper {
  position: fixed; top: 0; left: 0; right: 0;
  background: var(--bg-color);
  padding-top: env(safe-area-inset-top);
  border-bottom: 1px solid var(--border-color);
  z-index: 40;
}
.header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px 20px;
}
.back-btn {
  width: 36px; height: 36px; border-radius: 50%;
  background: transparent; border: none;
  color: var(--text-primary); cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px; transition: background 0.2s ease;
}
.back-btn:hover { background: var(--hover-bg); }
.header-actions { display: flex; align-items: center; gap: 8px; }
.icon-btn {
  width: 36px; height: 36px; border-radius: 50%;
  background: transparent; border: none;
  color: var(--text-secondary); cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px; transition: all 0.2s ease;
}
.icon-btn:hover { color: var(--text-primary); background: var(--hover-bg); }

/* ── Page scroll container ── */
.page-scroll {
  padding-top: var(--header-height);
  padding-bottom: calc(72px + env(safe-area-inset-bottom));
  min-height: 100vh;
}

/* ── Loading / Error ── */
.loading-state {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  min-height: calc(100vh - var(--header-height));
  color: var(--text-secondary); gap: 16px;
}
.loading-spinner {
  width: 32px; height: 32px;
  border: 3px solid var(--border-color); border-top-color: var(--accent);
  border-radius: 50%; animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.error-state {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  min-height: calc(100vh - var(--header-height));
  gap: 16px; text-align: center; padding: 40px;
  color: var(--text-secondary);
}
.error-state i { font-size: 48px; opacity: 0.3; }
.error-state p { font-size: 15px; }
.error-btn {
  padding: 9px 24px; background: var(--accent); color: white;
  border: none; border-radius: 24px; font-size: 13px; font-weight: 600;
  cursor: pointer; transition: background 0.2s ease;
}
.error-btn:hover { background: var(--accent-hover); }

/* ── Article ── */
.article-wrapper { padding: 20px 20px 0; max-width: 720px; margin: 0 auto; }

.article-author-row {
  display: flex; align-items: center; gap: 12px;
  padding: 16px 0 14px;
  border-bottom: 1px solid var(--border-color);
  margin-bottom: 16px;
}
.author-avatar {
  width: 40px; height: 40px; border-radius: 50%;
  background: var(--accent);
  display: flex; align-items: center; justify-content: center;
  font-size: 16px; font-weight: 700; color: white;
  overflow: hidden; flex-shrink: 0; cursor: pointer;
}
.author-avatar img { width: 100%; height: 100%; object-fit: cover; }
.author-info { flex: 1; min-width: 0; }
.author-name {
  font-size: 14px; font-weight: 600; color: var(--text-primary);
  cursor: pointer; transition: color 0.2s ease;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.author-name:hover { color: var(--accent); }
.article-date { font-size: 12px; color: var(--text-secondary); margin-top: 2px; }

.article-stats-row {
  display: flex; align-items: center; gap: 16px;
  margin-bottom: 16px;
}
.stat-chip {
  display: flex; align-items: center; gap: 5px;
  font-size: 12px; color: var(--text-secondary);
}
.stat-chip.views i { color: var(--accent); }
.stat-chip.likes i { color: #ef4444; }

.article-title {
  font-family: "Merriweather", Georgia, serif;
  font-size: 26px; font-weight: 700; line-height: 1.25;
  color: var(--text-primary); margin-bottom: 20px;
}

.article-body {
  font-family: "Merriweather", Georgia, serif;
  font-size: 15px; line-height: 1.8; color: var(--text-primary);
}
.content-paragraph { margin-bottom: 16px; }

/* ── Media ── */
.media-embed { margin: 16px 0; }
.media-embed img { width: 100%; height: auto; border-radius: 10px; display: block; }
.media-caption { font-size: 12px; color: var(--text-secondary); margin-top: 6px; font-style: italic; }

.pdf-embed-block {
  background: var(--bg-secondary); border: 1px solid var(--border-color);
  border-radius: 12px; overflow: hidden;
}
.pdf-embed-header {
  display: flex; align-items: center; gap: 10px;
  padding: 12px 14px; border-bottom: 1px solid var(--border-color);
}
.pdf-embed-header i { color: #e74c3c; font-size: 18px; flex-shrink: 0; }
.pdf-embed-name { font-size: 13px; font-weight: 600; flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: var(--text-primary); }
.pdf-open-link {
  font-size: 11px; font-weight: 700; color: var(--accent);
  background: rgba(79,158,255,0.1); border: 1px solid rgba(79,158,255,0.2);
  border-radius: 8px; padding: 4px 10px; text-decoration: none; white-space: nowrap; flex-shrink: 0;
}
.pdf-open-link:hover { background: rgba(79,158,255,0.2); }
.pdf-embed-block iframe { width: 100%; height: 300px; border: none; display: block; }

.yt-embed-block {
  background: var(--bg-secondary); border: 1px solid var(--border-color);
  border-radius: 12px; overflow: hidden;
}
.yt-embed-header {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 14px; border-bottom: 1px solid var(--border-color);
}
.yt-embed-header i { color: #ff0000; font-size: 16px; flex-shrink: 0; }
.yt-embed-title { font-size: 13px; font-weight: 600; flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: var(--text-primary); }
.yt-watch-link {
  font-size: 11px; font-weight: 700; color: #ff0000;
  background: rgba(255,0,0,0.1); border: 1px solid rgba(255,0,0,0.2);
  border-radius: 8px; padding: 4px 10px; text-decoration: none; white-space: nowrap; flex-shrink: 0;
}
.yt-watch-link:hover { background: rgba(255,0,0,0.2); }
.yt-embed-block iframe { width: 100%; aspect-ratio: 16/9; border: none; display: block; }

.custom-audio-player {
  background: var(--bg-secondary); border-radius: 12px; padding: 14px;
  display: flex; align-items: center; gap: 12px;
  border: 1px solid var(--border-color); margin: 12px 0;
}
.play-btn {
  width: 40px; height: 40px; border-radius: 50%; background: var(--accent);
  border: none; color: white; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 15px; transition: all 0.2s ease; flex-shrink: 0;
}
.play-btn:hover { background: var(--accent-hover); }
.audio-info { flex: 1; min-width: 0; overflow: hidden; }
.audio-title { font-size: 13px; font-weight: 500; margin-bottom: 8px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: var(--text-primary); }
.waveform-container { position: relative; height: 28px; background: var(--hover-bg); border-radius: 4px; margin-bottom: 6px; cursor: pointer; overflow: hidden; }
.waveform-progress { position: absolute; top: 0; left: 0; height: 100%; background: var(--accent); opacity: 0.25; transition: width 0.1s linear; }
.waveform-bars { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; align-items: center; justify-content: space-around; padding: 0 4px; }
.waveform-bar { width: 2px; background: var(--text-secondary); border-radius: 2px; opacity: 0.5; }
.audio-time { display: flex; justify-content: space-between; font-size: 11px; color: var(--text-secondary); }

/* ── Suggested ── */
.suggested-section {
  margin: 32px 0 0;
  border-top: 1px solid var(--border-color);
  padding: 20px 0 0;
  max-width: 720px; margin-left: auto; margin-right: auto;
  padding-left: 20px; padding-right: 20px;
}
.suggested-label {
  font-size: 10px; font-weight: 700; letter-spacing: 0.08em;
  text-transform: uppercase; color: var(--text-secondary);
  opacity: 0.7; margin-bottom: 14px;
}
.suggested-item {
  display: flex; align-items: flex-start; gap: 14px;
  padding: 14px 0;
  border-bottom: 1px solid var(--border-color);
  cursor: pointer; transition: background 0.15s ease;
}
.suggested-item:last-child { border-bottom: none; }
.suggested-item:hover { background: transparent; }
.suggested-item:hover .suggested-item-title { color: var(--accent); }
.suggested-thumb {
  width: 56px; height: 56px; border-radius: 8px; flex-shrink: 0;
  background: var(--hover-bg);
  display: flex; align-items: center; justify-content: center;
  overflow: hidden;
}
.suggested-thumb img { width: 100%; height: 100%; object-fit: cover; }
.suggested-thumb i { font-size: 20px; color: var(--text-secondary); opacity: 0.4; }
.suggested-item-content { flex: 1; min-width: 0; }
.suggested-item-title {
  font-size: 14px; font-weight: 600; color: var(--text-primary);
  margin-bottom: 6px; line-height: 1.35; transition: color 0.2s ease;
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
}
.suggested-item-meta { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
.suggested-meta-chip { display: flex; align-items: center; gap: 4px; font-size: 11px; color: var(--text-secondary); }

/* ── Action bar ── */
.action-bar {
  position: fixed; bottom: 0; left: 0; right: 0;
  background: var(--bg-color); border-top: 1px solid var(--border-color);
  padding: 10px 20px; padding-bottom: calc(10px + env(safe-area-inset-bottom));
  display: none; gap: 10px; z-index: 50;
}
.action-bar.show { display: flex; }
.action-btn {
  flex: 1; display: flex; align-items: center; justify-content: center; gap: 7px;
  background: transparent; border: 1px solid var(--border-color);
  border-radius: 24px; padding: 9px 16px;
  cursor: pointer; transition: all 0.2s ease;
  font-size: 13px; font-weight: 600; color: var(--text-secondary);
}
.action-btn:hover { color: var(--text-primary); border-color: var(--text-secondary); background: var(--hover-bg); }
.action-btn:active { transform: scale(0.97); }
.action-btn svg { width: 18px; height: 18px; stroke: currentColor; fill: none; stroke-width: 2; flex-shrink: 0; }
.action-btn.liked svg { fill: #ef4444; stroke: #ef4444; }
.action-btn.liked { color: #ef4444; border-color: rgba(239,68,68,0.4); background: rgba(239,68,68,0.06); }

/* ── Comments ── */
.comments-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 199; opacity: 0; pointer-events: none; transition: opacity 0.3s ease; }
.comments-overlay.active { opacity: 1; pointer-events: all; }
.comments-popup {
  position: fixed; top: 50%; left: 50%;
  transform: translate(-50%, -50%) scale(0.9);
  width: calc(100% - 40px); max-width: 500px;
  height: 70vh; max-height: 600px;
  background: var(--card-bg); border-radius: 16px; z-index: 200;
  opacity: 0; pointer-events: none;
  transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  display: flex; flex-direction: column;
  box-shadow: 0 24px 72px rgba(0,0,0,0.8); border: 1px solid var(--border-color);
}
.comments-popup.active { opacity: 1; pointer-events: all; transform: translate(-50%, -50%) scale(1); }
.comments-header { display: flex; align-items: center; justify-content: space-between; padding: 16px 20px; border-bottom: 1px solid var(--border-color); }
.comments-header h3 { font-size: 15px; font-weight: 700; margin: 0; color: var(--text-primary); }
.close-comments { background: none; border: none; color: var(--text-primary); font-size: 22px; cursor: pointer; width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; border-radius: 50%; transition: background 0.2s ease; }
.close-comments:hover { background: var(--hover-bg); }
.comments-list { flex: 1; overflow-y: auto; padding: 16px 20px; }
.comment-item { display: flex; gap: 12px; margin-bottom: 20px; }
.comment-avatar { width: 32px; height: 32px; border-radius: 50%; background: var(--accent); display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; color: white; flex-shrink: 0; overflow: hidden; }
.comment-avatar img { width: 100%; height: 100%; object-fit: cover; }
.comment-content { flex: 1; }
.comment-author { font-weight: 600; font-size: 13px; margin-bottom: 4px; color: var(--text-primary); }
.comment-text { font-size: 14px; line-height: 1.5; margin-bottom: 6px; color: var(--text-primary); }
.comment-time { font-size: 11px; color: var(--text-secondary); }
.comment-input-wrapper { padding: 12px 20px; border-top: 1px solid var(--border-color); background: var(--bg-secondary); border-radius: 0 0 16px 16px; }
.comment-input-container { display: flex; gap: 8px; align-items: center; }
.comment-input { flex: 1; background: var(--hover-bg); border: 1px solid var(--border-color); border-radius: 20px; padding: 10px 16px; color: var(--text-primary); font-size: 14px; outline: none; font-family: inherit; }
.comment-input::placeholder { color: var(--text-secondary); }
.comment-input:focus { border-color: var(--accent); }
.send-comment-btn { width: 36px; height: 36px; border-radius: 50%; background: var(--accent); border: none; color: white; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 15px; transition: all 0.2s ease; flex-shrink: 0; }
.send-comment-btn:hover { background: var(--accent-hover); }
.send-comment-btn:disabled { opacity: 0.4; cursor: not-allowed; }
.no-comments { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; color: var(--text-secondary); gap: 12px; text-align: center; }
.no-comments i { font-size: 40px; opacity: 0.3; }
.no-comments p { font-size: 14px; margin: 0; }
.no-comments span { font-size: 12px; opacity: 0.7; }
</style>

<script>
if (localStorage.getItem('theme') === 'light') document.body.classList.add('light-theme');
function updateHeaderHeight() {
  const h = document.getElementById('headerWrapper'); if (!h) return;
  document.documentElement.style.setProperty('--header-height', h.offsetHeight + 'px');
}
document.addEventListener('DOMContentLoaded', updateHeaderHeight);
window.addEventListener('resize', updateHeaderHeight);
</script>

<!-- Header -->

<!-- Action Bar -->
<div class="action-bar" id="actionBar">

<!-- Comments -->
<div class="comments-overlay" id="commentsOverlay" onclick="closeComments()"></div>
<div class="comments-popup" id="commentsPopup">

    <button class="close-comments" onclick="closeComments()">×</button>

      <input type="text" class="comment-input" id="commentInput" placeholder="Add a comment...">

    </div>
  </div>
</div>

<script>
function goBack() {
  if (document.referrer && document.referrer.includes(window.location.host)) window.history.back();
  else window.location.href = 'index.html';
}
function toggleTheme() {
  const isLight = document.body.classList.toggle('light-theme');
  localStorage.setItem('theme', isLight ? 'light' : 'dark');
  document.getElementById('themeIcon').className = isLight ? 'fas fa-moon' : 'fas fa-circle-half-stroke';
}
(function() {
  const isLight = document.body.classList.contains('light-theme');
  const ico = document.getElementById('themeIcon');
  if (ico) ico.className = isLight ? 'fas fa-moon' : 'fas fa-circle-half-stroke';
})();

function openProfile(username) {
  if (username) window.location.href = `profile.html?username=${username.replace('@','')}`;
}

window.toggleAudio = function(btn, audioId) {
  const player = btn.closest('.custom-audio-player');
  const audio = document.getElementById(audioId);
  const icon = btn.querySelector('i');
  if (audio.paused) {
    audio.play(); icon.className = 'fas fa-pause';
    audio.ontimeupdate = function() {
      const p = (audio.currentTime / audio.duration) * 100;
      player.querySelector('.waveform-progress').style.width = p + '%';
      const m = Math.floor(audio.currentTime / 60), s = Math.floor(audio.currentTime % 60);
      player.querySelector('.current-time').textContent = `${m}:${s.toString().padStart(2,'0')}`;
    };
    audio.onended = function() {
      icon.className = 'fas fa-play';
      player.querySelector('.waveform-progress').style.width = '0%';
      player.querySelector('.current-time').textContent = '0:00';
    };
  } else { audio.pause(); icon.className = 'fas fa-play'; }
};
window.seekAudio = function(event, container, audioId) {
  const audio = document.getElementById(audioId);
  const rect = container.getBoundingClientRect();
  audio.currentTime = ((event.clientX - rect.left) / rect.width) * audio.duration;
};

document.getElementById('commentInput').addEventListener('keypress', e => { if (e.key === 'Enter') window.sendComment(); });
</script>

let currentArticle = null;
let userHasLiked = false;
let viewTimer = null;
let hasIncrementedView = false;

function formatNumber(n) {
  if (n >= 1000000) return (n/1000000).toFixed(1)+'M';
  if (n >= 1000) return (n/1000).toFixed(1)+'K';
  return (n||0).toString();
}
function formatDate(d) {
  const now = new Date(), ms = now-d, mins = Math.floor(ms/60000), hrs = Math.floor(ms/3600000), days = Math.floor(ms/86400000);
  if (mins < 60) return `${mins}m ago`;
  if (hrs < 24) return `${hrs}h ago`;
  if (days < 7) return `${days}d ago`;
  return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
}

async function getCurrentUser() {
  try {
    const fu = auth.currentUser; if (!fu) return null;
    const { data } = await supabase.from('users').select('user_id, firebase_uid, username, pfp').eq('firebase_uid', fu.uid).single();
    return data || null;
  } catch(e) { return null; }
}

onAuthStateChanged(auth, async user => {
  if (user) {
    currentUser = await getCurrentUser();
    if (currentUser && currentArticle) await checkIfUserLiked();
  } else { currentUser = null; }
});

function getArticleId() { return new URLSearchParams(window.location.search).get('id'); }

function startViewTimer(id) {
  if (hasIncrementedView) return;
  viewTimer = setTimeout(() => incrementView(id), 5000);
}
function clearViewTimer() { if (viewTimer) { clearTimeout(viewTimer); viewTimer = null; } }

async function incrementView(id) {
  if (hasIncrementedView) return;
  try {
    hasIncrementedView = true;
    const { data: a } = await supabase.from('articles').select('views').eq('id', id).single();
    const nv = (a.views||0)+1;
    await supabase.from('articles').update({ views: nv }).eq('id', id);
    if (currentArticle) { currentArticle.views = nv; document.getElementById('viewCount').textContent = formatNumber(nv); }
  } catch(e) { hasIncrementedView = false; }
}

window.addEventListener('beforeunload', clearViewTimer);
document.addEventListener('visibilitychange', () => {
  if (document.hidden) clearViewTimer();
  else if (!hasIncrementedView && currentArticle) startViewTimer(currentArticle.id);
});

async function loadArticle() {
  const id = getArticleId();
  if (!id) { showError(); return; }
  try {
    const { data: article, error } = await supabase.from('articles').select('*').eq('id', id).single();
    if (error || !article) { showError(); return; }
    currentArticle = article;

    const [authorRes, mediaRes] = await Promise.all([
      supabase.from('users').select('username, full_name, pfp').eq('firebase_uid', article.firebase_user_id).single(),
      supabase.from('media').select('*').eq('article_id', id).order('display_order', { ascending: true })
    ]);

    displayArticle(article, authorRes.data, mediaRes.data);
    if (currentUser) await checkIfUserLiked();
    await Promise.all([loadCommentCount(id), loadSuggested(article.firebase_user_id, id)]);
    startViewTimer(id);
  } catch(e) { console.error(e); showError(); }
}

function displayArticle(article, author, media) {
  document.getElementById('loadingState').style.display = 'none';
  document.getElementById('articleContent').style.display = 'block';
  document.getElementById('actionBar').classList.add('show');

  document.title = `${article.title || 'Article'} — Patholytica`;
  document.getElementById('articleTitle').textContent = article.title || 'Untitled';
  document.getElementById('articleDate').textContent = formatDate(new Date(article.created_at));
  document.getElementById('viewCount').textContent = formatNumber(article.views||0);
  document.getElementById('likeCountStat').textContent = formatNumber(article.likes||0);
  document.getElementById('likeCount').textContent = formatNumber(article.likes||0);

  const authorUsername = author?.username || '';
  const authorDisplay = authorUsername ? `@${authorUsername}` : (author?.full_name || 'Anonymous');

  const nameEl = document.getElementById('authorName');
  nameEl.textContent = authorDisplay;
  if (authorUsername) nameEl.onclick = () => openProfile(authorUsername);

  const avatarEl = document.getElementById('authorAvatar');
  if (author?.pfp) {
    avatarEl.innerHTML = `<img src="${author.pfp}" alt="${authorDisplay}">`;
  } else {
    avatarEl.textContent = (authorUsername || authorDisplay).replace('@','')[0]?.toUpperCase() || 'A';
  }
  if (authorUsername) avatarEl.onclick = () => openProfile(authorUsername);

  const body = document.getElementById('articleBody');
  body.innerHTML = '';
  const paragraphs = (article.content || '').split('\n\n');
  paragraphs.forEach((p, i) => {
    if (p.trim()) {
      const el = document.createElement('div'); el.className = 'content-paragraph'; el.textContent = p.trim();
      body.appendChild(el);
      if (media) media.filter(m => m.display_order === i).forEach(m => body.appendChild(createMediaElement(m)));
    }
  });
  if (media) media.filter(m => m.display_order >= paragraphs.length).forEach(m => body.appendChild(createMediaElement(m)));
}

function createMediaElement(m) {
  const d = document.createElement('div'); d.className = 'media-embed';
  if (m.type === 'image') {
    d.innerHTML = `<img src="${m.url}" alt="${m.caption||''}">${m.caption?`<div class="media-caption">${m.caption}</div>`:''}`;
  } else if (m.type === 'audio') {
    const aid = 'audio-'+Math.random().toString(36).substr(2,9);
    d.innerHTML = `
      <div class="custom-audio-player">
        <button class="play-btn" onclick="toggleAudio(this,'${aid}')"><i class="fas fa-play"></i></button>
        <div class="audio-info">
          <div class="audio-title">${m.caption||'Audio'}</div>
          <div class="waveform-container" onclick="seekAudio(event,this,'${aid}')">
            <div class="waveform-progress"></div>
            <div class="waveform-bars">${Array(15).fill(0).map(()=>`<div class="waveform-bar" style="height:${Math.random()*60+20}%"></div>`).join('')}</div>
          </div>
          <div class="audio-time"><span class="current-time">0:00</span><span class="duration">0:00</span></div>
        </div>
        <audio id="${aid}" src="${m.url}" style="display:none;"></audio>
      </div>${m.caption?`<div class="media-caption">${m.caption}</div>`:''}`;
    setTimeout(() => {
      const audio = document.getElementById(aid);
      if (audio) audio.addEventListener('loadedmetadata', () => {
        const dur = Math.floor(audio.duration);
        const span = audio.closest('.custom-audio-player')?.querySelector('.duration');
        if (span) span.textContent = `${Math.floor(dur/60)}:${(dur%60).toString().padStart(2,'0')}`;
      });
    }, 100);
  } else if (m.type === 'pdf') {
    d.innerHTML = `
      <div class="pdf-embed-block">
        <div class="pdf-embed-header">
          <i class="fas fa-file-pdf"></i>
          <span class="pdf-embed-name">${m.caption||'Document'}</span>
          <a class="pdf-open-link" href="${m.url}" target="_blank" rel="noopener">Open PDF</a>
        </div>
        <iframe src="${m.url}" title="${m.caption||'Document'}"></iframe>
      </div>${m.caption?`<div class="media-caption">${m.caption}</div>`:''}`;
  } else if (m.type === 'youtube') {
    const ytMatch = m.url.match(/embed\/([A-Za-z0-9_-]{11})/);
    const videoId = ytMatch ? ytMatch[1] : '';
    const label = m.caption || (videoId ? `youtube.com/watch?v=${videoId}` : 'YouTube Video');
    d.innerHTML = `
      <div class="yt-embed-block">
        <div class="yt-embed-header">
          <i class="fab fa-youtube"></i>
          <span class="yt-embed-title">${label}</span>
          ${videoId?`<a class="yt-watch-link" href="https://www.youtube.com/watch?v=${videoId}" target="_blank" rel="noopener">Watch</a>`:''}
        </div>
        <iframe src="${m.url}" title="${label}" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
      </div>${m.caption?`<div class="media-caption">${m.caption}</div>`:''}`;
  }
  return d;
}

function showError() {
  document.getElementById('loadingState').style.display = 'none';
  document.getElementById('errorState').style.display = 'flex';
}

async function loadCommentCount(id) {
  try {
    const { data } = await supabase.from('comments').select('id').eq('article_id', id);
    document.getElementById('commentCount').textContent = data?.length || 0;
  } catch(e) {}
}

async function loadSuggested(firebaseUserId, currentId) {
  try {
    const { data } = await supabase.from('articles').select('id, title, created_at, views, likes, media(url)')
      .eq('firebase_user_id', firebaseUserId).neq('id', currentId)
      .order('created_at', { ascending: false }).limit(3);
    if (!data || data.length === 0) return;
    const section = document.getElementById('suggestedSection');
    const list = document.getElementById('suggestedList');
    list.innerHTML = data.map(a => {
      const img = a.media && a.media.length > 0 ? a.media[0].url : null;
      const thumb = img ? `<img src="${img}" alt="${a.title||'Article'}">` : `<i class="fas fa-file-lines"></i>`;
      return `
        <div class="suggested-item" onclick="window.location.href='article.html?id=${a.id}'">
          <div class="suggested-thumb">${thumb}</div>
          <div class="suggested-item-content">
            <div class="suggested-item-title">${a.title||'Untitled'}</div>
            <div class="suggested-item-meta">
              <div class="suggested-meta-chip"><i class="fas fa-eye"></i>${formatNumber(a.views||0)}</div>
              <div class="suggested-meta-chip"><i class="fas fa-heart"></i>${formatNumber(a.likes||0)}</div>
              <div class="suggested-meta-chip">${formatDate(new Date(a.created_at))}</div>
            </div>
          </div>
        </div>`;
    }).join('');
    section.style.display = 'block';
  } catch(e) { console.error(e); }
}

async function checkIfUserLiked() {
  if (!currentUser || !currentArticle) return;
  try {
    const { data } = await supabase.from('likes').select('*')
      .eq('article_id', currentArticle.id).eq('user_id', currentUser.user_id).single();
    userHasLiked = !!data;
    document.getElementById('likeBtn').classList.toggle('liked', userHasLiked);
  } catch(e) {}
}

window.toggleLike = async function() {
  if (!currentUser) { window.location.href = 'login.html'; return; }
  if (!currentArticle) return;
  const likeBtn = document.getElementById('likeBtn');
  const likeCount = document.getElementById('likeCount');
  const likeCountStat = document.getElementById('likeCountStat');
  const wasLiked = userHasLiked;
  const originalCount = currentArticle.likes || 0;
  try {
    if (wasLiked) {
      userHasLiked = false; likeBtn.classList.remove('liked');
      currentArticle.likes = Math.max(0, originalCount - 1);
      await supabase.from('likes').delete().eq('article_id', currentArticle.id).eq('user_id', currentUser.user_id);
    } else {
      userHasLiked = true; likeBtn.classList.add('liked');
      currentArticle.likes = originalCount + 1;
      await supabase.from('likes').insert([{ article_id: currentArticle.id, user_id: currentUser.user_id }]);
    }
    likeCount.textContent = formatNumber(currentArticle.likes);
    likeCountStat.textContent = formatNumber(currentArticle.likes);
    await supabase.from('articles').update({ likes: currentArticle.likes }).eq('id', currentArticle.id);
  } catch(e) {
    console.error(e);
    userHasLiked = wasLiked; currentArticle.likes = originalCount;
    likeBtn.classList.toggle('liked', wasLiked);
    likeCount.textContent = formatNumber(originalCount);
    likeCountStat.textContent = formatNumber(originalCount);
  }
};

window.shareArticle = function() {
  const url = window.location.href;
  const title = currentArticle?.title || 'Check out this article';
  if (navigator.share) navigator.share({ title, url }).catch(console.error);
  else { navigator.clipboard.writeText(url); alert('Link copied!'); }
};

window.openComments = async function() {
  if (!currentArticle) return;
  document.getElementById('commentsPopup').classList.add('active');
  document.getElementById('commentsOverlay').classList.add('active');
  await loadComments(currentArticle.id);
};
window.closeComments = function() {
  document.getElementById('commentsPopup').classList.remove('active');
  document.getElementById('commentsOverlay').classList.remove('active');
};

async function loadComments(id) {
  const list = document.getElementById('commentsList');
  list.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:80px;"><div style="width:28px;height:28px;border:3px solid var(--border-color);border-top-color:var(--accent);border-radius:50%;animation:spin 0.8s linear infinite;"></div></div>';
  try {
    const { data: comments } = await supabase.from('comments').select('*').eq('article_id', id).order('created_at', { ascending: true });
    if (!comments || comments.length === 0) {
      list.innerHTML = '<div class="no-comments"><i class="fas fa-comments"></i><p>No comments yet</p><span>Be the first to comment!</span></div>'; return;
    }
    const uids = [...new Set(comments.map(c => c.user_id).filter(Boolean))]; let umap = {};
    if (uids.length > 0) { const { data: u } = await supabase.from('users').select('user_id, username, pfp').in('user_id', uids); if (u) u.forEach(u => { umap[u.user_id] = u; }); }
    list.innerHTML = comments.map(c => {
      const u = umap[c.user_id], author = u?.username ? `@${u.username}` : 'Anonymous';
      const av = u?.pfp ? `<img src="${u.pfp}" alt="${author}">` : (u?.username||'A')[0].toUpperCase();
      return `<div class="comment-item"><div class="comment-avatar">${av}</div><div class="comment-content"><div class="comment-author">${author}</div><div class="comment-text">${c.comment_text}</div><div class="comment-time">${formatDate(new Date(c.created_at))}</div></div></div>`;
    }).join('');
  } catch(e) { list.innerHTML = '<div class="no-comments"><i class="fas fa-exclamation-triangle"></i><p>Failed to load</p></div>'; }
}

window.sendComment = async function() {
  const input = document.getElementById('commentInput'), text = input.value.trim();
  if (!text || !currentArticle) return;
  const btn = document.getElementById('sendCommentBtn'); btn.disabled = true;
  try {
    if (!currentUser) currentUser = await getCurrentUser();
    if (!currentUser) { window.location.href = 'login.html'; return; }
    await supabase.from('comments').insert([{ article_id: currentArticle.id, user_id: currentUser.user_id, comment_text: text }]);
    input.value = ''; await loadComments(currentArticle.id);
    const cc = document.getElementById('commentCount'); cc.textContent = parseInt(cc.textContent)+1;
  } catch(e) { alert('Failed to post comment.'); } finally { btn.disabled = false; }
};

loadArticle();
</script>
