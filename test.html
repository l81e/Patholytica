<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Patholytica — Batch Create</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg-color: #1f1f1f;
            --text-primary: #fff;
            --text-secondary: #aaa;
            --card-bg: #1f1f1f;
            --hover-bg: #2a2a2a;
            --border-color: #303030;
            --accent: #f1d19e;
            --accent-hover: #d9b87a;
            --success: #4ade80;
            --error: #ef4444;
            --warning: #f59e0b;
        }
        body.light-theme {
            --bg-color: #f9f9f9;
            --text-primary: #0f0f0f;
            --text-secondary: #606060;
            --card-bg: #f9f9f9;
            --hover-bg: #f0f0f0;
            --border-color: #e5e5e5;
            --accent: #c49a3c;
            --accent-hover: #a07c28;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-color);
            color: var(--text-primary);
            transition: background .2s, color .2s;
            overflow: hidden;
            height: 100vh;
            width: 100%;
            position: fixed;
        }

    .app {
        position: fixed; top: 0; left: 50%; transform: translateX(-50%);
        width: 100%; max-width: 450px; height: 100vh;
        background: var(--bg-color);
        display: flex; flex-direction: column;
        overflow: hidden;
    }

    /* Header */
    .header {
        padding: 12px 18px;
        padding-top: calc(12px + env(safe-area-inset-top));
        border-bottom: 1px solid var(--border-color);
        display: flex; align-items: center; justify-content: space-between;
        flex-shrink: 0;
        background: var(--bg-color);
    }
    .header-left { display: flex; align-items: center; gap: 12px; }
    .icon-btn {
        width: 34px; height: 34px; border-radius: 50%;
        background: var(--hover-bg); border: 1px solid var(--border-color);
        color: var(--text-primary); cursor: pointer;
        display: flex; align-items: center; justify-content: center;
        font-size: 13px; transition: border-color .2s;
    }
    .icon-btn:hover { border-color: var(--accent); color: var(--accent); }
    .header-title { font-size: 15px; font-weight: 700; }
    .header-sub { font-size: 10px; color: var(--text-secondary); margin-top: 1px; }

    /* Body */
    .body {
        flex: 1; display: flex; flex-direction: column;
        overflow: hidden; padding: 12px 16px;
        gap: 10px; min-height: 0;
    }

    /* Format hints */
    .format-hints {
        display: flex; flex-direction: column; gap: 6px;
        flex-shrink: 0;
    }
    .format-hint {
        background: var(--hover-bg);
        border: 1px solid var(--border-color);
        border-radius: 10px;
        padding: 8px 12px;
    }
    .format-hint-row {
        display: flex; align-items: center; gap: 8px;
    }
    .format-badge {
        font-size: 9px; font-weight: 700; letter-spacing: .08em;
        text-transform: uppercase; padding: 2px 7px; border-radius: 4px;
        flex-shrink: 0;
    }
    .badge-article { background: rgba(241,209,158,.15); color: var(--accent); }
    .badge-mcq     { background: rgba(74,222,128,.12);  color: #4ade80; }
    .format-hint code {
        font-size: 10px; color: var(--text-secondary);
        font-family: 'SF Mono', 'Fira Code', monospace;
        word-break: break-all; line-height: 1.5;
    }
    .format-hint code em { color: var(--accent); font-style: normal; font-weight: 700; }
    .format-hint code .mcq-em { color: #4ade80; font-style: normal; font-weight: 700; }

    /* Textarea */
    .textarea-wrap { flex: 1; position: relative; min-height: 0; }
    .big-input {
        width: 100%; height: 100%;
        background: var(--hover-bg);
        border: 1px solid var(--border-color);
        border-radius: 12px;
        padding: 14px;
        font-size: 13px; line-height: 1.65;
        color: var(--text-primary);
        font-family: 'SF Mono', 'Fira Code', monospace;
        resize: none; outline: none;
        transition: border-color .2s;
    }
    .big-input:focus { border-color: var(--accent); }
    .big-input::placeholder { color: var(--text-secondary); opacity: .5; font-style: italic; font-size: 12px; }

    .input-meta {
        position: absolute; bottom: 9px; right: 11px;
        font-size: 10px; color: var(--text-secondary);
        pointer-events: none; display: flex; gap: 10px;
    }
    .input-meta .art-ct  { color: var(--accent); font-weight: 700; }
    .input-meta .mcq-ct  { color: #4ade80; font-weight: 700; }

    /* Buttons */
    .btn-row {
        display: flex; gap: 8px; flex-shrink: 0;
        padding-bottom: env(safe-area-inset-bottom);
    }
    .btn {
        flex: 1; padding: 12px;
        border-radius: 10px; border: none;
        font-size: 13px; font-weight: 700;
        cursor: pointer; transition: all .2s;
        display: flex; align-items: center; justify-content: center; gap: 7px;
    }
    .btn-secondary {
        background: var(--hover-bg); color: var(--text-primary);
        border: 1px solid var(--border-color);
    }
    .btn-secondary:hover { border-color: var(--accent); }
    .btn-primary { background: var(--accent); color: #1a1a1a; }
    .btn-primary:hover { background: var(--accent-hover); }
    .btn:disabled { opacity: .35; cursor: not-allowed; }

    /* Preview sheet */
    .preview-overlay {
        position: fixed; inset: 0;
        background: rgba(0,0,0,.75);
        z-index: 200;
        display: none; align-items: flex-end; justify-content: center;

    .preview-overlay.show { display: flex; }
    .preview-sheet {
        background: var(--bg-color);
        border-radius: 20px 20px 0 0;
        border: 1px solid var(--border-color);
        border-bottom: none;
        width: 100%; max-width: 450px;
        max-height: 88vh;
        display: flex; flex-direction: column;
        animation: slideUp .3s cubic-bezier(.4,0,.2,1);
        padding-bottom: env(safe-area-inset-bottom);

    @keyframes slideUp {
        from { transform: translateY(100%); opacity: 0; }
        to   { transform: translateY(0);    opacity: 1; }

    .preview-handle {
        width: 36px; height: 4px; background: var(--border-color);
        border-radius: 2px; margin: 12px auto 0; flex-shrink: 0;
    }
    .preview-header {
        padding: 12px 18px 10px;
        display: flex; align-items: center; justify-content: space-between;
        border-bottom: 1px solid var(--border-color);
        flex-shrink: 0;
    }
    .preview-header-title { font-size: 14px; font-weight: 700; }
    .preview-meta { display: flex; align-items: center; gap: 8px; }
    .preview-pill {
        font-size: 11px; font-weight: 700;
        padding: 3px 10px; border-radius: 20px;
    }
    .pill-art { background: rgba(241,209,158,.2); color: var(--accent); }
    .pill-mcq { background: rgba(74,222,128,.15); color: #4ade80; }
    .close-btn {
        width: 30px; height: 30px; border-radius: 50%;
        background: var(--hover-bg); border: 1px solid var(--border-color);
        color: var(--text-primary); cursor: pointer;
        display: flex; align-items: center; justify-content: center; font-size: 12px;
    }
    .preview-list {
        flex: 1; overflow-y: auto; padding: 12px 14px;
        display: flex; flex-direction: column; gap: 8px;
    }
    .preview-list::-webkit-scrollbar { width: 3px; }
    .preview-list::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 2px; }

    /* Preview cards */
    .preview-card {
        background: var(--hover-bg);
        border: 1px solid var(--border-color);
        border-radius: 10px;
        padding: 12px 14px;

    .preview-card-badge {
        position: absolute; top: 10px; right: 10px;
        font-size: 9px; font-weight: 700; letter-spacing: .06em;
        padding: 2px 7px; border-radius: 6px;
    }
    .badge-art-sm { background: rgba(241,209,158,.15); color: var(--accent); }
    .badge-mcq-sm { background: rgba(74,222,128,.12); color: #4ade80; }
    .preview-card-title {
        font-size: 14px; font-weight: 800;
        line-height: 1.3; margin-bottom: 6px;
        padding-right: 60px; letter-spacing: -.01em;
    }
    .preview-card-body {
        font-size: 12px; line-height: 1.6;
        color: var(--text-secondary);

        font-size: 12px; padding: 5px 10px;

        color: var(--text-secondary);
    }

        border-color: rgba(74,222,128,.4);
        color: #4ade80;
        background: rgba(74,222,128,.06);

    .preview-footer {
        padding: 10px 14px;
        border-top: 1px solid var(--border-color);
        display: flex; gap: 8px; flex-shrink: 0;
    }

    /* Progress overlay */
    .progress-overlay {
        position: fixed; inset: 0;
        background: rgba(0,0,0,.7);
        z-index: 400;
        display: none; align-items: center; justify-content: center;
    }
    .progress-overlay.show { display: flex; }
    .progress-box {
        background: var(--hover-bg); border: 1px solid var(--border-color);
        border-radius: 16px; padding: 28px 24px;
        text-align: center; width: 240px;
    }
    .progress-spinner {
        width: 40px; height: 40px;
        border: 3px solid var(--border-color); border-top-color: var(--accent);

    .progress-label { font-size: 13px; font-weight: 700; margin-bottom: 3px; }
    .progress-sub { font-size: 11px; color: var(--text-secondary); }
    .progress-bar-wrap {
        margin-top: 12px; background: var(--border-color);
        border-radius: 4px; height: 5px; overflow: hidden;
    }
    .progress-bar {
        height: 100%; background: var(--accent);
        border-radius: 4px; transition: width .3s ease; width: 0%;

    /* Notification */
    .notif {

        box-shadow: 0 8px 32px rgba(0,0,0,.4);

        min-width: 240px; max-width: 340px;
    }
    .notif.show { display: flex; animation: notifIn .25s ease; }
    .notif.success { border-left: 3px solid var(--success); }
    .notif.error   { border-left: 3px solid var(--error); }
    .notif.warning { border-left: 3px solid var(--warning); }
    .notif i { font-size: 15px; }
    .notif.success i { color: var(--success); }
    .notif.error   i { color: var(--error); }
    .notif.warning i { color: var(--warning); }
    .notif span { font-size: 12px; font-weight: 500; }
    @keyframes notifIn {
        from { transform: translateX(-50%) translateY(-12px); opacity: 0; }
        to   { transform: translateX(-50%) translateY(0); opacity: 1; }
    }
</style>

<body><div class="app">
    <div class="header">
        <div class="header-left">
            <button class="icon-btn" onclick="goBack()"><i class="fas fa-arrow-left"></i></button>
            <div>
                <div class="header-title">Batch Create</div>
                <div class="header-sub">Articles & MCQs at once</div>
            </div>
        </div>
        <button class="icon-btn" onclick="toggleTheme()"><i class="fas fa-circle-half-stroke"></i></button>

<div class="body">
    <!-- Format hints -->
    <div class="format-hints">
        <div class="format-hint">
            <div class="format-hint-row">
                <span class="format-badge badge-article">Article</span>
                <code><em>art1</em>:[Title]:[Content]::</code>
            </div>
        </div>
        <div class="format-hint">
            <div class="format-hint-row">
                <span class="format-badge badge-mcq">MCQ</span>
                <code><span class="mcq-em">mcqart1</span>:[Question]:[opt1<em>{right}</em>@opt2@opt3]::</code>
            </div>

    </div>

    <!-- Textarea -->
    <div class="textarea-wrap">
        <textarea class="big-input" id="batchInput"

            oninput="onInput()"></textarea>
        <div class="input-meta">

        </button>

</div><script>
function goBack() {
    if (document.referrer && document.referrer.includes(location.host)) history.back();
    else location.href = 'index.html';
}
function toggleTheme() {
    const isLight = document.body.classList.toggle('light-theme');
    localStorage.setItem('theme', isLight ? 'light' : 'dark');
}
if (localStorage.getItem('theme') === 'light') document.body.classList.add('light-theme');

function showNotif(msg, type = 'success') {
    const el = document.getElementById('notif');
    const icon = el.querySelector('i');
    document.getElementById('notifText').textContent = msg;
    el.className = `notif ${type} show`;
    icon.className = type === 'success' ? 'fas fa-check-circle'
                   : type === 'warning' ? 'fas fa-exclamation-triangle'
                   : 'fas fa-exclamation-circle';
    clearTimeout(el._t);
    el._t = setTimeout(() => el.classList.remove('show'), 4000);
}

function setProgress(label, sub, pct) {
    document.getElementById('progressLabel').textContent = label;
    document.getElementById('progressSub').textContent = sub;
    document.getElementById('progressBar').style.width = pct + '%';
}

function escHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

/* ── Parser ── */
function parseInput(raw) {
    const trimmed = raw.trim();
    if (!trimmed) return [];

    const chunks = trimmed.split('::');
    const results = [];

    for (const chunk of chunks) {
        const c = chunk.trim();
        if (!c) continue;

        // MCQ article: mcqartN:[question]:[opt1{right}~opt2~opt3...]
        const mcqMatch = c.match(/^mcqart\d+:([\s\S]+)$/i);
        if (mcqMatch) {
            const rest = mcqMatch[1];
            const firstColon = rest.indexOf(':');
            if (firstColon === -1) continue;
            const question = rest.slice(0, firstColon).trim();
            const optStr   = rest.slice(firstColon + 1).trim();
            const rawOpts  = optStr.split('@').map(o => o.trim()).filter(Boolean);
            if (!question || rawOpts.length === 0) continue;

            const options = rawOpts.map(o => {
                const isRight = o.includes('{right}');
                const label   = o.replace('{right}', '').trim();
                return { label, correct: isRight };
            });
            if (!options.some(o => o.correct)) options[0].correct = true;

            results.push({ type: 'mcq', question, options });
            continue;
        }

        // Regular article: artN:[title]:[content]
        const artMatch = c.match(/^art\d+:([\s\S]+)$/i);
        if (artMatch) {
            const rest = artMatch[1];
            const firstColon = rest.indexOf(':');
            if (firstColon === -1) continue;
            const title   = rest.slice(0, firstColon).trim();
            const content = rest.slice(firstColon + 1).trim();
            if (!title && !content) continue;
            results.push({ type: 'article', title: title || '(no title)', content: content || '(no content)' });
        }
    }

    return results;
}

/* ── Live counter ── */
function onInput() {
    const parsed = parseInput(document.getElementById('batchInput').value);
    const artN = parsed.filter(p => p.type === 'article').length;
    const mcqN = parsed.filter(p => p.type === 'mcq').length;
    document.getElementById('artCount').textContent = artN;
    document.getElementById('mcqCount').textContent = mcqN;

    const hasAny = parsed.length > 0;
    document.getElementById('previewBtn').disabled          = !hasAny;
    document.getElementById('publishBtn').disabled          = !hasAny;
    document.getElementById('previewPublishBtn').disabled   = !hasAny;
}

/* ── Preview ── */
function openPreview() {
    const parsed = parseInput(document.getElementById('batchInput').value);
    if (!parsed.length) { showNotif('No valid articles found', 'warning'); return; }

    const ordered = parsed;
    const artN = parsed.filter(p => p.type === 'article').length;
    const mcqN = parsed.filter(p => p.type === 'mcq').length;

    document.getElementById('pillArt').textContent = artN + ' art';
    document.getElementById('pillMcq').textContent = mcqN + ' mcq';

    const list = document.getElementById('previewList');
    list.innerHTML = '';

    ordered.forEach((item, i) => {
        const card = document.createElement('div');

        if (item.type === 'article') {
            card.className = 'preview-card';
            card.innerHTML = `
                <div class="preview-card-badge badge-art-sm">ARTICLE</div>
                <div class="preview-card-title">${escHtml(item.title)}</div>
                <div class="preview-card-body">${escHtml(item.content.slice(0, 160))}${item.content.length > 160 ? '…' : ''}</div>
            `;
        } else {
            card.className = 'preview-card mcq-card';
            const optsHTML = item.options.map(o => `
                <div class="mcq-option ${o.correct ? 'correct' : ''}">
                    <span class="opt-icon">${o.correct ? '✓' : '○'}</span>
                    ${escHtml(o.label)}
                </div>
            `).join('');
            card.innerHTML = `
                <div class="preview-card-badge badge-mcq-sm">MCQ</div>
                <div class="preview-card-title">❔ ${escHtml(item.question)}</div>
                <div class="mcq-options">${optsHTML}</div>
            `;
        }

        list.appendChild(card);
    });

    document.getElementById('previewOverlay').classList.add('show');
}

function closePreview() {
    document.getElementById('previewOverlay').classList.remove('show');
}

document.getElementById('previewOverlay').addEventListener('click', function(e) {
    if (e.target === this) closePreview();
});

window.publishAll = function() {
    showNotif('Auth not ready yet, try again in a second', 'warning');
};

    }
});

window.publishAll = async function() {
    if (!currentUser) { showNotif('Please log in first', 'error'); return; }

    const parsed = parseInput(document.getElementById('batchInput').value);
    if (!parsed.length) { showNotif('No valid items found', 'warning'); return; }

    const ordered = parsed;

    // Lock UI
    ['publishBtn','previewBtn','previewPublishBtn'].forEach(id => {
        document.getElementById(id).disabled = true;
    });
    document.getElementById('progressOverlay').classList.add('show');

    const results = { ok: 0, fail: 0 };

    for (let i = 0; i < ordered.length; i++) {
        const item = ordered[i];
        const pct  = Math.round((i / ordered.length) * 100);

        if (item.type === 'article') {
            setProgress(
                `Publishing article ${i + 1} of ${ordered.length}`,
                `"${item.title.slice(0, 36)}${item.title.length > 36 ? '…' : ''}"`,
                pct
            );
            try {
                const { data: inserted, error: insErr } = await supabase
                    .from('articles')
                    .insert([{
                        title:            item.title,
                        content:          item.content,
                        firebase_user_id: currentUser.uid,
                        views: 0, likes: 0
                    }])
                    .select().single();
                if (insErr) throw insErr;
                results.ok++;
            } catch (err) {
                console.error(`Article failed:`, err);
                results.fail++;
            }

        } else {
            setProgress(
                `Publishing MCQ ${i + 1} of ${ordered.length}`,
                `"${item.question.slice(0, 36)}${item.question.length > 36 ? '…' : ''}"`,
                pct
            );
            try {
                const contentLines = item.options.map(o =>
                    o.correct ? `✅${o.label}` : o.label
                ).join('\n');
                const fullContent = `❔${item.question}\n${contentLines}`;

                const { error: insErr } = await supabase
                    .from('articles')
                    .insert([{
                        title:            item.question,
                        content:          fullContent,
                        firebase_user_id: currentUser.uid,
                        views: 0, likes: 0
                    }]);
                if (insErr) throw insErr;
                results.ok++;
            } catch (err) {
                console.error(`MCQ failed:`, err);
                results.fail++;
            }
        }
    }

    setProgress('Done!', '', 100);
    await new Promise(r => setTimeout(r, 600));

    document.getElementById('progressOverlay').classList.remove('show');
    ['publishBtn','previewBtn','previewPublishBtn'].forEach(id => {
        document.getElementById(id).disabled = false;
    });

    if (results.fail === 0) {
        showNotif(`${results.ok} item${results.ok !== 1 ? 's' : ''} published!`, 'success');
        document.getElementById('batchInput').value = '';
        document.getElementById('artCount').textContent = '0';
        document.getElementById('mcqCount').textContent = '0';
    } else {
        showNotif(
            `${results.ok} published, ${results.fail} failed`,
            results.ok > 0 ? 'warning' : 'error'
        );
    }
};
