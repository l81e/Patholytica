<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Space</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
/* ── Reset & Root ── */
:root {
  --bg: #0a0a0a;
  --bg2: #111111;
  --bg3: #181818;
  --border: #1e1e1e;
  --border2: #2a2a2a;
  --text: #e8e6e1;
  --text2: #6e6c68;
  --text3: #3a3835;
  --accent: #4f9eff;
  --accent2: #3dba72;
  --accent3: #e88c3a;
  --accent4: #a56fd4;
  --accent5: #ef4444;
  --glass: rgba(14,14,14,0.72);
  --glass-border: rgba(255,255,255,0.06);
  --shadow: 0 8px 32px rgba(0,0,0,0.7);
  --toolbar-h: 52px;
  --grid: 20px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { width: 100%; height: 100%; overflow: hidden; font-family: 'DM Sans', sans-serif; }

/* ── Canvas ── */
#canvas {
  position: fixed; inset: 0;
  background: var(--bg);
  overflow: hidden;
}

/* ── Background Layer ── */
#bg-layer {
  position: absolute; inset: 0;
  transition: filter 0.4s ease;
  background: var(--bg);
  background-size: cover;
  background-position: center;
  will-change: transform;
}
#bg-layer.parallax { will-change: transform; }
#bg-overlay {
  position: absolute; inset: 0;
  background: transparent;
  pointer-events: none;
  transition: background 0.3s ease;
}

/* ── Widgets Layer ── */
#widgets-layer {
  position: absolute; inset: 0;
  pointer-events: none;
}
#widgets-layer.edit-mode { pointer-events: all; }

/* ── Widget Base ── */
.widget {
  position: absolute;
  min-width: 160px; min-height: 80px;
  border: 1px solid var(--glass-border);
  border-radius: 14px;
  backdrop-filter: blur(16px) saturate(1.4);
  -webkit-backdrop-filter: blur(16px) saturate(1.4);
  background: var(--glass);
  box-shadow: var(--shadow), inset 0 1px 0 rgba(255,255,255,0.05);
  overflow: hidden;
  pointer-events: all;
  cursor: default;
  user-select: none;
  transition: box-shadow 0.2s ease, border-color 0.2s ease;
}
.edit-mode .widget { cursor: move; }
.widget:hover { border-color: rgba(255,255,255,0.1); }
.widget.selected {
  border-color: var(--accent);
  box-shadow: var(--shadow), 0 0 0 1px var(--accent), inset 0 1px 0 rgba(255,255,255,0.08);
}
.widget-drag-handle {
  position: absolute; top: 0; left: 0; right: 0;
  height: 28px; cursor: move; z-index: 2;
  display: none;
}
.edit-mode .widget-drag-handle { display: block; }

/* Resize handle */
.resize-handle {
  position: absolute; bottom: 0; right: 0;
  width: 18px; height: 18px;
  cursor: se-resize; z-index: 3;
  display: none;
  align-items: flex-end; justify-content: flex-end;
  padding: 3px;
}
.resize-handle::after {
  content: '';
  display: block; width: 8px; height: 8px;
  border-right: 2px solid var(--text2);
  border-bottom: 2px solid var(--text2);
  border-radius: 0 0 3px 0;
}
.edit-mode .resize-handle { display: flex; }

/* Widget header */
.widget-header {
  display: flex; align-items: center; gap: 8px;
  padding: 10px 12px 8px;
  border-bottom: 1px solid var(--glass-border);
  font-size: 11px; font-weight: 500; letter-spacing: 0.06em;
  text-transform: uppercase; color: var(--text2);
}
.widget-header i { font-size: 12px; }

/* ── Note Widget ── */
.note-widget { background: transparent; }
.note-widget[data-color="yellow"] { background: rgba(255,213,79,0.08); border-color: rgba(255,213,79,0.15); }
.note-widget[data-color="green"]  { background: rgba(61,186,114,0.07); border-color: rgba(61,186,114,0.15); }
.note-widget[data-color="blue"]   { background: rgba(79,158,255,0.07); border-color: rgba(79,158,255,0.15); }
.note-widget[data-color="purple"] { background: rgba(165,111,212,0.07); border-color: rgba(165,111,212,0.15); }
.note-widget[data-color="red"]    { background: rgba(239,68,68,0.07); border-color: rgba(239,68,68,0.15); }

.note-body {
  padding: 12px 14px;
  width: 100%; height: calc(100% - 38px);
  background: transparent; border: none; outline: none; resize: none;
  color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 14px;
  line-height: 1.65; cursor: text;
}
.note-body::placeholder { color: var(--text3); }

/* ── Clock Widget ── */
.clock-widget .clock-display {
  padding: 16px 20px;
  text-align: center;
}
.clock-time {
  font-family: 'DM Mono', monospace; font-size: 36px; font-weight: 500;
  color: var(--text); letter-spacing: -0.02em; line-height: 1;
  margin-bottom: 4px;
}
.clock-date {
  font-size: 12px; color: var(--text2); letter-spacing: 0.08em; text-transform: uppercase;
  font-family: 'DM Mono', monospace;
}

/* ── Todo Widget ── */
.todo-widget .todo-body { padding: 8px 12px 12px; height: calc(100% - 38px); overflow-y: auto; }
.todo-widget .todo-body::-webkit-scrollbar { width: 3px; }
.todo-widget .todo-body::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }
.todo-item {
  display: flex; align-items: flex-start; gap: 10px;
  padding: 7px 0; border-bottom: 1px solid var(--border);
  cursor: default;
}
.todo-item:last-child { border-bottom: none; }
.todo-checkbox {
  width: 16px; height: 16px; border-radius: 4px; border: 1.5px solid var(--border2);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; flex-shrink: 0; margin-top: 2px;
  transition: all 0.15s ease;
}
.todo-checkbox.checked { background: var(--accent2); border-color: var(--accent2); }
.todo-checkbox.checked::after { content: '✓'; font-size: 10px; color: white; font-weight: 700; }
.todo-text {
  flex: 1; font-size: 13px; color: var(--text); line-height: 1.5;
  outline: none; cursor: text; min-height: 18px;
}
.todo-text.done { text-decoration: line-through; color: var(--text2); }
.todo-del {
  opacity: 0; width: 18px; height: 18px; border-radius: 4px;
  background: none; border: none; color: var(--text2);
  cursor: pointer; font-size: 13px; display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; transition: all 0.15s ease;
}
.todo-item:hover .todo-del { opacity: 1; }
.todo-del:hover { background: rgba(239,68,68,0.15); color: var(--accent5); }
.todo-add-row {
  display: flex; align-items: center; gap: 8px;
  padding: 8px 0 0;
}
.todo-add-input {
  flex: 1; background: none; border: none; outline: none;
  font-size: 13px; color: var(--text2); font-family: 'DM Sans', sans-serif;
  cursor: text;
}
.todo-add-input::placeholder { color: var(--text3); }
.todo-add-btn {
  width: 22px; height: 22px; border-radius: 6px;
  background: var(--bg3); border: 1px solid var(--border2);
  color: var(--text2); cursor: pointer; font-size: 13px;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.15s ease;
}
.todo-add-btn:hover { background: var(--accent); border-color: var(--accent); color: white; }

/* ── Image Widget ── */
.image-widget .image-body {
  width: 100%; height: 100%; overflow: hidden; cursor: pointer;
}
.image-widget .image-body img {
  width: 100%; height: 100%; object-fit: cover; display: block;
  transition: transform 0.4s ease;
}
.image-widget:hover .image-body img { transform: scale(1.02); }
.image-widget .image-placeholder {
  width: 100%; height: 100%;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 8px; color: var(--text3); font-size: 12px; cursor: pointer;
  border-radius: 13px;
}
.image-widget .image-placeholder i { font-size: 24px; }
.image-upload-input { display: none; }

/* ── Quote Widget ── */
.quote-widget .quote-body { padding: 16px 18px; height: calc(100% - 38px); display: flex; flex-direction: column; justify-content: center; }
.quote-text {
  font-family: 'DM Serif Display', Georgia, serif;
  font-size: 16px; line-height: 1.6; color: var(--text);
  font-style: italic; margin-bottom: 10px;
  outline: none; cursor: text; min-height: 48px;
}
.quote-author {
  font-size: 12px; color: var(--text2); letter-spacing: 0.06em;
  text-transform: uppercase; outline: none; cursor: text;
}

/* ── Spotify Widget ── */
.spotify-widget iframe { width: 100%; height: 100%; border: none; border-radius: 13px; display: block; }
.spotify-widget .spotify-input-body {
  padding: 14px; height: calc(100% - 38px);
  display: flex; flex-direction: column; gap: 10px; justify-content: center;
}
.spotify-url-input {
  background: var(--bg3); border: 1px solid var(--border2);
  border-radius: 8px; padding: 9px 12px;
  color: var(--text); font-size: 13px; outline: none;
  font-family: 'DM Mono', monospace;
}
.spotify-url-input::placeholder { color: var(--text3); }
.spotify-url-input:focus { border-color: var(--accent); }
.spotify-load-btn {
  padding: 8px 16px; border-radius: 8px;
  background: #1DB954; border: none; color: white;
  font-size: 13px; font-weight: 600; cursor: pointer;
  transition: all 0.2s ease; font-family: 'DM Sans', sans-serif;
}
.spotify-load-btn:hover { background: #17a349; }

/* ── Toolbar ── */
#toolbar {
  position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%);
  height: var(--toolbar-h);
  background: var(--glass);
  border: 1px solid var(--glass-border);
  border-radius: 26px;
  backdrop-filter: blur(24px) saturate(1.6);
  -webkit-backdrop-filter: blur(24px) saturate(1.6);
  box-shadow: 0 12px 48px rgba(0,0,0,0.8), inset 0 1px 0 rgba(255,255,255,0.07);
  display: flex; align-items: center; gap: 2px;
  padding: 6px 8px;
  z-index: 1000;
  transition: all 0.3s cubic-bezier(0.4,0,0.2,1);
}
#toolbar:hover { box-shadow: 0 16px 56px rgba(0,0,0,0.85), inset 0 1px 0 rgba(255,255,255,0.09); }

.tb-sep { width: 1px; height: 24px; background: var(--border2); margin: 0 4px; }

.tb-btn {
  width: 40px; height: 40px; border-radius: 20px;
  background: none; border: none; cursor: pointer;
  color: var(--text2); font-size: 15px;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.18s ease; position: relative;
}
.tb-btn:hover { background: var(--bg3); color: var(--text); }
.tb-btn.active { background: var(--accent); color: white; }
.tb-btn[data-tooltip]:hover::after {
  content: attr(data-tooltip);
  position: absolute; bottom: calc(100% + 10px); left: 50%; transform: translateX(-50%);
  background: var(--bg3); border: 1px solid var(--border2);
  color: var(--text); font-size: 11px; white-space: nowrap;
  padding: 5px 10px; border-radius: 6px; pointer-events: none;
  font-family: 'DM Sans', sans-serif; letter-spacing: 0;
  animation: tooltipIn 0.15s ease;
}
@keyframes tooltipIn { from { opacity:0; transform: translateX(-50%) translateY(4px); } to { opacity:1; transform: translateX(-50%) translateY(0); } }

/* Edit mode indicator */
#edit-pill {
  position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
  background: var(--glass); border: 1px solid var(--glass-border);
  backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
  border-radius: 20px; padding: 7px 16px;
  font-size: 12px; font-weight: 500; color: var(--text2);
  letter-spacing: 0.05em; text-transform: uppercase;
  z-index: 999; display: none; align-items: center; gap: 8px;
  transition: all 0.2s ease;
}
#edit-pill.show { display: flex; }
#edit-pill i { color: var(--accent); font-size: 10px; }

/* ── Context Menu ── */
#ctx-menu {
  position: fixed; display: none;
  background: var(--glass);
  border: 1px solid var(--glass-border);
  backdrop-filter: blur(24px) saturate(1.5);
  -webkit-backdrop-filter: blur(24px) saturate(1.5);
  border-radius: 12px; padding: 6px;
  box-shadow: 0 16px 48px rgba(0,0,0,0.8);
  z-index: 2000; min-width: 170px;
  animation: ctxIn 0.15s cubic-bezier(0.4,0,0.2,1);
}
@keyframes ctxIn { from { opacity:0; transform: scale(0.95) translateY(-4px); } to { opacity:1; transform: scale(1) translateY(0); } }
.ctx-item {
  display: flex; align-items: center; gap: 10px;
  padding: 9px 12px; border-radius: 8px; cursor: pointer;
  font-size: 13px; color: var(--text); transition: background 0.12s ease;
}
.ctx-item:hover { background: var(--bg3); }
.ctx-item i { width: 14px; text-align: center; color: var(--text2); font-size: 13px; }
.ctx-item.danger { color: var(--accent5); }
.ctx-item.danger i { color: var(--accent5); }
.ctx-sep { height: 1px; background: var(--border); margin: 4px 0; }

/* ── Background Panel ── */
#bg-panel {
  position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%) scale(0.95);
  width: min(440px, 92vw);
  background: #111;
  border: 1px solid var(--border2);
  border-radius: 18px;
  box-shadow: 0 24px 72px rgba(0,0,0,0.9);
  z-index: 3000; display: none;
  animation: panelIn 0.22s cubic-bezier(0.4,0,0.2,1) forwards;
  overflow: hidden;
}
@keyframes panelIn { from { opacity:0; transform: translate(-50%,-50%) scale(0.95); } to { opacity:1; transform: translate(-50%,-50%) scale(1); } }
#bg-panel.show { display: block; }
.panel-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 16px 20px; border-bottom: 1px solid var(--border);
}
.panel-title { font-size: 14px; font-weight: 600; color: var(--text); }
.panel-close {
  width: 28px; height: 28px; border-radius: 50%;
  background: none; border: none; color: var(--text2);
  cursor: pointer; font-size: 18px; display: flex; align-items: center; justify-content: center;
  transition: background 0.15s ease;
}
.panel-close:hover { background: var(--bg3); color: var(--text); }
.panel-body { padding: 18px 20px; display: flex; flex-direction: column; gap: 16px; }
.panel-label { font-size: 11px; color: var(--text2); letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 8px; }
.preset-grid {
  display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px;
}
.preset-swatch {
  aspect-ratio: 1; border-radius: 10px; cursor: pointer;
  border: 2px solid transparent; transition: all 0.15s ease;
  position: relative; overflow: hidden;
}
.preset-swatch:hover { transform: scale(1.05); }
.preset-swatch.active { border-color: var(--accent); }
.panel-row { display: flex; align-items: center; gap: 12px; }
.panel-row label { font-size: 13px; color: var(--text2); flex: 1; }
.panel-row input[type=range] { flex: 2; accent-color: var(--accent); }
.panel-row input[type=checkbox] { accent-color: var(--accent); width: 16px; height: 16px; cursor: pointer; }
.panel-upload-btn {
  width: 100%; padding: 10px; border-radius: 10px;
  background: var(--bg3); border: 1px dashed var(--border2);
  color: var(--text2); font-size: 13px; cursor: pointer;
  transition: all 0.15s ease; font-family: 'DM Sans', sans-serif;
  display: flex; align-items: center; justify-content: center; gap: 8px;
}
.panel-upload-btn:hover { border-color: var(--accent); color: var(--text); background: rgba(79,158,255,0.06); }

/* ── Spaces Tab Bar ── */
#spaces-bar {
  position: fixed; top: 20px; left: 20px;
  display: flex; align-items: center; gap: 6px;
  background: var(--glass);
  border: 1px solid var(--glass-border);
  backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
  border-radius: 20px; padding: 5px 8px;
  z-index: 998;
}
.space-tab {
  padding: 6px 14px; border-radius: 14px;
  background: none; border: none; cursor: pointer;
  font-size: 12px; font-weight: 500; color: var(--text2);
  transition: all 0.18s ease; font-family: 'DM Sans', sans-serif;
  white-space: nowrap;
}
.space-tab.active { background: var(--accent); color: white; }
.space-tab:hover:not(.active) { background: var(--bg3); color: var(--text); }
.space-tab-add {
  width: 28px; height: 28px; border-radius: 14px;
  background: none; border: 1px solid var(--border2);
  cursor: pointer; color: var(--text2); font-size: 15px;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.18s ease;
}
.space-tab-add:hover { background: var(--bg3); color: var(--text); border-color: var(--text2); }

/* ── Overlay for modals ── */
#modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.6);
  z-index: 2999; display: none;
  backdrop-filter: blur(2px);
}
#modal-overlay.show { display: block; }

/* ── Scrollbars ── */
::-webkit-scrollbar { width: 4px; height: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

/* ── Snap grid (visual) ── */
.snap-grid-visible #canvas::before {
  content: '';
  position: absolute; inset: 0;
  background-image:
    linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
  background-size: var(--grid) var(--grid);
  pointer-events: none; z-index: 0;
}

/* ── Animations ── */
.widget { animation: widgetIn 0.22s cubic-bezier(0.4,0,0.2,1); }
@keyframes widgetIn {
  from { opacity:0; transform: scale(0.9) translateY(8px); }
  to   { opacity:1; transform: scale(1) translateY(0); }
}

/* ── Export / Import bar ── */
#io-bar {
  position: fixed; top: 20px; right: 20px;
  display: flex; align-items: center; gap: 8px; z-index: 998;
}
.io-btn {
  padding: 7px 14px; border-radius: 14px;
  background: var(--glass); border: 1px solid var(--glass-border);
  backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
  color: var(--text2); font-size: 12px; font-weight: 500; cursor: pointer;
  transition: all 0.18s ease; font-family: 'DM Sans', sans-serif;
  display: flex; align-items: center; gap: 6px;
}
.io-btn:hover { background: var(--bg3); color: var(--text); border-color: var(--border2); }
</style>
</head>
<body>

<!-- Canvas -->
<div id="canvas">
  <div id="bg-layer"><div id="bg-overlay"></div></div>
  <div id="widgets-layer"></div>
</div>

<!-- Spaces Bar -->
<div id="spaces-bar">
  <button class="space-tab active" data-space="0">Main</button>
  <button class="space-tab-add" id="addSpaceBtn" title="New space"><i class="fas fa-plus"></i></button>
</div>

<!-- Top Right IO -->
<div id="io-bar">
  <button class="io-btn" onclick="exportLayout()"><i class="fas fa-download"></i> Export</button>
  <label class="io-btn" style="cursor:pointer;"><i class="fas fa-upload"></i> Import<input type="file" id="importFile" accept=".json" style="display:none"></label>
</div>

<!-- Edit mode pill -->
<div id="edit-pill"><i class="fas fa-circle"></i> Edit Mode</div>

<!-- Toolbar -->
<div id="toolbar">
  <button class="tb-btn" id="editToggle" data-tooltip="Toggle Edit Mode" onclick="toggleEditMode()"><i class="fas fa-pen-to-square"></i></button>
  <div class="tb-sep"></div>
  <button class="tb-btn" data-tooltip="Add Note" onclick="addWidget('note')"><i class="fas fa-sticky-note"></i></button>
  <button class="tb-btn" data-tooltip="Add Clock" onclick="addWidget('clock')"><i class="fas fa-clock"></i></button>
  <button class="tb-btn" data-tooltip="Add To-Do" onclick="addWidget('todo')"><i class="fas fa-check-square"></i></button>
  <button class="tb-btn" data-tooltip="Add Image" onclick="addWidget('image')"><i class="fas fa-image"></i></button>
  <button class="tb-btn" data-tooltip="Add Quote" onclick="addWidget('quote')"><i class="fas fa-quote-right"></i></button>
  <button class="tb-btn" data-tooltip="Add Spotify" onclick="addWidget('spotify')"><i class="fab fa-spotify"></i></button>
  <div class="tb-sep"></div>
  <button class="tb-btn" id="snapToggle" data-tooltip="Snap to Grid" onclick="toggleSnap()"><i class="fas fa-th"></i></button>
  <button class="tb-btn" data-tooltip="Background" onclick="openBgPanel()"><i class="fas fa-image"></i></button>
</div>

<!-- Context Menu -->
<div id="ctx-menu">
  <div class="ctx-item" onclick="ctxAction('duplicate')"><i class="fas fa-copy"></i>Duplicate</div>
  <div class="ctx-item" onclick="ctxAction('forward')"><i class="fas fa-layer-group"></i>Bring Forward</div>
  <div class="ctx-item" onclick="ctxAction('back')"><i class="fas fa-layer-minus"></i>Send Back</div>
  <div class="ctx-sep"></div>
  <div class="ctx-item danger" onclick="ctxAction('delete')"><i class="fas fa-trash"></i>Delete</div>
</div>

<!-- Modal Overlay -->
<div id="modal-overlay" onclick="closeBgPanel()"></div>

<!-- Background Panel -->
<div id="bg-panel">
  <div class="panel-header">
    <span class="panel-title">Background</span>
    <button class="panel-close" onclick="closeBgPanel()">×</button>
  </div>
  <div class="panel-body">
    <div>
      <div class="panel-label">Presets</div>
      <div class="preset-grid" id="presetGrid"></div>
    </div>
    <div>
      <label class="panel-upload-btn" for="bgUpload">
        <i class="fas fa-upload"></i> Upload Image
        <input type="file" id="bgUpload" accept="image/*" style="display:none">
      </label>
    </div>
    <div>
      <div class="panel-label">Adjustments</div>
      <div class="panel-row"><label>Blur</label><input type="range" id="blurSlider" min="0" max="20" value="0"></div>
      <div class="panel-row"><label>Brightness</label><input type="range" id="brightnessSlider" min="20" max="150" value="100"></div>
      <div class="panel-row"><label>Dim Overlay</label><input type="range" id="dimSlider" min="0" max="90" value="0"></div>
    </div>
    <div class="panel-row">
      <label>Parallax Effect</label>
      <input type="checkbox" id="parallaxToggle">
    </div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════════
let spaces = [{ id: 0, name: 'Main', widgets: [], bg: { type: 'gradient', value: 'linear-gradient(135deg,#0a0a0a 0%,#111 100%)', blur: 0, brightness: 100, dim: 0, parallax: false } }];
let currentSpaceIdx = 0;
let editMode = false;
let snapEnabled = false;
let ctxTarget = null;
let dragState = null;
let resizeState = null;
let parallaxEnabled = false;
let zCounter = 10;

// ── Helpers ──────────────────────────────────────────────
const GRID = 20;
function snap(v) { return snapEnabled ? Math.round(v / GRID) * GRID : v; }
function uid() { return Math.random().toString(36).slice(2, 10); }
function currentSpace() { return spaces[currentSpaceIdx]; }

// ── Persistence ──────────────────────────────────────────
function save() {
  try { localStorage.setItem('myspace_v2', JSON.stringify(spaces)); } catch(e) {}
}
function load() {
  try {
    const d = localStorage.getItem('myspace_v2');
    if (d) { spaces = JSON.parse(d); }
  } catch(e) {}
}

// ═══════════════════════════════════════════════════════════
// SPACES
// ═══════════════════════════════════════════════════════════
function renderSpacesBar() {
  const bar = document.getElementById('spaces-bar');
  // Remove old tabs (keep add btn)
  bar.querySelectorAll('.space-tab').forEach(t => t.remove());
  const addBtn = document.getElementById('addSpaceBtn');
  spaces.forEach((s, i) => {
    const btn = document.createElement('button');
    btn.className = 'space-tab' + (i === currentSpaceIdx ? ' active' : '');
    btn.dataset.space = i;
    btn.textContent = s.name;
    btn.addEventListener('click', () => switchSpace(i));
    btn.addEventListener('dblclick', () => renameSpace(i, btn));
    bar.insertBefore(btn, addBtn);
  });
}

function switchSpace(idx) {
  currentSpaceIdx = idx;
  renderSpacesBar();
  renderWidgets();
  applyBg();
  save();
}

function addSpace() {
  const n = spaces.length;
  spaces.push({ id: n, name: `Space ${n + 1}`, widgets: [], bg: { type: 'gradient', value: 'linear-gradient(135deg,#0a0a0a 0%,#111 100%)', blur: 0, brightness: 100, dim: 0, parallax: false } });
  switchSpace(spaces.length - 1);
}

function renameSpace(idx, btn) {
  const old = spaces[idx].name;
  const el = document.createElement('input');
  el.value = old; el.style.cssText = 'background:transparent;border:none;outline:none;font-size:12px;font-weight:500;color:var(--text);font-family:DM Sans,sans-serif;width:80px;';
  btn.innerHTML = ''; btn.appendChild(el); el.focus(); el.select();
  const done = () => { spaces[idx].name = el.value || old; renderSpacesBar(); save(); };
  el.addEventListener('blur', done);
  el.addEventListener('keydown', e => { if (e.key === 'Enter') el.blur(); if (e.key === 'Escape') { el.value = old; el.blur(); } });
}

document.getElementById('addSpaceBtn').addEventListener('click', addSpace);

// ═══════════════════════════════════════════════════════════
// BACKGROUND
// ═══════════════════════════════════════════════════════════
const BG_PRESETS = [
  { label: 'Void', value: 'linear-gradient(135deg,#0a0a0a 0%,#111 100%)' },
  { label: 'Ocean', value: 'linear-gradient(135deg,#0a1628 0%,#0d2a4a 50%,#072040 100%)' },
  { label: 'Forest', value: 'linear-gradient(135deg,#0a1a0f 0%,#0f2a18 50%,#081508 100%)' },
  { label: 'Dusk', value: 'linear-gradient(135deg,#1a0a1e 0%,#2a0d3a 40%,#1a0828 100%)' },
  { label: 'Ember', value: 'linear-gradient(135deg,#1a0800 0%,#2d1100 50%,#1a0600 100%)' },
  { label: 'Steel', value: 'linear-gradient(135deg,#0d1117 0%,#161b22 50%,#0d1117 100%)' },
  { label: 'Slate', value: 'linear-gradient(135deg,#131619 0%,#1c2028 100%)' },
  { label: 'Noir', value: 'linear-gradient(160deg,#050505 0%,#0c0c0c 100%)' },
];

function renderPresets() {
  const grid = document.getElementById('presetGrid');
  grid.innerHTML = '';
  BG_PRESETS.forEach((p, i) => {
    const sw = document.createElement('div');
    sw.className = 'preset-swatch';
    sw.style.background = p.value;
    sw.title = p.label;
    if (currentSpace().bg.value === p.value) sw.classList.add('active');
    sw.addEventListener('click', () => {
      document.querySelectorAll('.preset-swatch').forEach(s => s.classList.remove('active'));
      sw.classList.add('active');
      const bg = currentSpace().bg;
      bg.type = 'gradient'; bg.value = p.value;
      applyBg(); save();
    });
    grid.appendChild(sw);
  });
}

function applyBg() {
  const bg = currentSpace().bg;
  const layer = document.getElementById('bg-layer');
  const overlay = document.getElementById('bg-overlay');
  if (bg.type === 'gradient') {
    layer.style.background = bg.value;
    layer.style.backgroundSize = '';
    layer.style.backgroundPosition = '';
  } else if (bg.type === 'image') {
    layer.style.background = `url('${bg.value}') center/cover no-repeat`;
  }
  layer.style.filter = `blur(${bg.blur||0}px) brightness(${bg.brightness||100}%)`;
  overlay.style.background = `rgba(0,0,0,${(bg.dim||0)/100})`;
  parallaxEnabled = bg.parallax || false;
  document.getElementById('parallaxToggle').checked = parallaxEnabled;
  document.getElementById('blurSlider').value = bg.blur || 0;
  document.getElementById('brightnessSlider').value = bg.brightness || 100;
  document.getElementById('dimSlider').value = bg.dim || 0;
}

function openBgPanel() {
  renderPresets();
  document.getElementById('bg-panel').classList.add('show');
  document.getElementById('modal-overlay').classList.add('show');
}
function closeBgPanel() {
  document.getElementById('bg-panel').classList.remove('show');
  document.getElementById('modal-overlay').classList.remove('show');
}

// Sliders
['blur','brightness','dim'].forEach(type => {
  document.getElementById(type+'Slider').addEventListener('input', e => {
    const bg = currentSpace().bg;
    bg[type] = parseInt(e.target.value);
    applyBg(); save();
  });
});

document.getElementById('parallaxToggle').addEventListener('change', e => {
  currentSpace().bg.parallax = e.target.checked;
  parallaxEnabled = e.target.checked;
  save();
});

// Parallax
document.addEventListener('mousemove', e => {
  if (!parallaxEnabled) return;
  const cx = window.innerWidth / 2, cy = window.innerHeight / 2;
  const dx = (e.clientX - cx) / cx, dy = (e.clientY - cy) / cy;
  document.getElementById('bg-layer').style.transform = `translate(${dx * -12}px, ${dy * -12}px) scale(1.04)`;
});

// BG Upload
document.getElementById('bgUpload').addEventListener('change', e => {
  const file = e.target.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    const bg = currentSpace().bg;
    bg.type = 'image'; bg.value = ev.target.result;
    applyBg(); save();
    renderPresets();
  };
  reader.readAsDataURL(file);
});

// ═══════════════════════════════════════════════════════════
// EDIT MODE
// ═══════════════════════════════════════════════════════════
function toggleEditMode() {
  editMode = !editMode;
  const layer = document.getElementById('widgets-layer');
  layer.classList.toggle('edit-mode', editMode);
  document.getElementById('editToggle').classList.toggle('active', editMode);
  document.getElementById('edit-pill').classList.toggle('show', editMode);
  document.documentElement.classList.toggle('snap-grid-visible', editMode && snapEnabled);
}

function toggleSnap() {
  snapEnabled = !snapEnabled;
  document.getElementById('snapToggle').classList.toggle('active', snapEnabled);
  document.documentElement.classList.toggle('snap-grid-visible', editMode && snapEnabled);
}

// ═══════════════════════════════════════════════════════════
// WIDGET RENDERING
// ═══════════════════════════════════════════════════════════
function renderWidgets() {
  const layer = document.getElementById('widgets-layer');
  layer.innerHTML = '';
  currentSpace().widgets.forEach(w => {
    const el = buildWidgetEl(w);
    if (el) layer.appendChild(el);
  });
  if (editMode) layer.classList.add('edit-mode');
}

function buildWidgetEl(w) {
  const el = document.createElement('div');
  el.className = 'widget ' + w.type + '-widget';
  el.dataset.id = w.id;
  el.style.left = w.x + 'px';
  el.style.top = w.y + 'px';
  el.style.width = w.width + 'px';
  el.style.height = w.height + 'px';
  el.style.zIndex = w.z || 10;
  if (w.color) el.dataset.color = w.color;

  el.innerHTML = `
    <div class="widget-drag-handle"></div>
    <div class="resize-handle"></div>
  `;

  // Build inner content
  const inner = buildWidgetInner(w);
  el.insertBefore(inner, el.querySelector('.resize-handle'));

  // Drag
  const handle = el.querySelector('.widget-drag-handle');
  handle.addEventListener('mousedown', e => startDrag(e, el, w));

  // Resize
  const rh = el.querySelector('.resize-handle');
  rh.addEventListener('mousedown', e => startResize(e, el, w));

  // Context menu
  el.addEventListener('contextmenu', e => {
    e.preventDefault();
    showCtxMenu(e.clientX, e.clientY, w);
  });

  // Select on click in edit mode
  el.addEventListener('mousedown', () => {
    if (editMode) selectWidget(el);
  });

  return el;
}

function buildWidgetInner(w) {
  const wrap = document.createElement('div');

  if (w.type === 'note') {
    wrap.innerHTML = `
      <div class="widget-header">
        <i class="fas fa-sticky-note"></i>Note
        <div style="flex:1"></div>
        <div style="display:flex;gap:5px;">
          ${['yellow','green','blue','purple','red'].map(c =>
            `<div style="width:10px;height:10px;border-radius:50%;background:${colorHex(c)};cursor:pointer;opacity:${w.color===c?1:0.4};transition:opacity .15s"
             onclick="setNoteColor('${w.id}','${c}')"></div>`
          ).join('')}
        </div>
      </div>
      <textarea class="note-body" placeholder="Write something...">${w.content || ''}</textarea>
    `;
    const ta = wrap.querySelector('textarea');
    ta.addEventListener('input', () => { updateWidgetData(w.id, { content: ta.value }); });
    ta.addEventListener('mousedown', e => { if (editMode) e.stopPropagation(); });
  }

  else if (w.type === 'clock') {
    wrap.innerHTML = `
      <div class="widget-header"><i class="fas fa-clock"></i>Clock</div>
      <div class="clock-display">
        <div class="clock-time" id="clock-${w.id}">--:--:--</div>
        <div class="clock-date" id="clockdate-${w.id}"></div>
      </div>
    `;
    tickClock(w.id);
  }

  else if (w.type === 'todo') {
    const items = w.items || [];
    wrap.innerHTML = `
      <div class="widget-header"><i class="fas fa-check-square"></i>To-Do</div>
      <div class="todo-body">
        <div class="todo-items">
          ${items.map(item => `
            <div class="todo-item" data-tid="${item.id}">
              <div class="todo-checkbox${item.done?' checked':''}" onclick="toggleTodo('${w.id}','${item.id}')"></div>
              <div class="todo-text${item.done?' done':''}" contenteditable="true"
                   onblur="editTodo('${w.id}','${item.id}',this.textContent)"
                   onmousedown="if(editMode)event.stopPropagation()">${item.text}</div>
              <button class="todo-del" onclick="deleteTodo('${w.id}','${item.id}')"><i class="fas fa-times"></i></button>
            </div>
          `).join('')}
        </div>
        <div class="todo-add-row">
          <input class="todo-add-input" placeholder="Add item..." data-wid="${w.id}"
                 onkeydown="if(event.key==='Enter')addTodoItem('${w.id}',this)"
                 onmousedown="if(editMode)event.stopPropagation()">
          <button class="todo-add-btn" onclick="addTodoItem('${w.id}',this.previousElementSibling)">
            <i class="fas fa-plus"></i>
          </button>
        </div>
      </div>
    `;
  }

  else if (w.type === 'image') {
    const hasImg = w.url && w.url.length > 0;
    wrap.innerHTML = `
      <div class="image-body" style="height:100%;">
        ${hasImg
          ? `<img src="${w.url}" alt="Image" style="width:100%;height:100%;object-fit:cover;border-radius:13px;">`
          : `<div class="image-placeholder" onclick="triggerImageUpload('${w.id}')">
               <i class="fas fa-image"></i>
               <span>Click to upload image</span>
             </div>`
        }
      </div>
      <input type="file" class="image-upload-input" id="imgup-${w.id}" accept="image/*">
    `;
    const inp = wrap.querySelector(`#imgup-${w.id}`);
    inp.addEventListener('change', e => {
      const f = e.target.files[0]; if (!f) return;
      const r = new FileReader();
      r.onload = ev => { updateWidgetData(w.id, { url: ev.target.result }); renderWidgets(); save(); };
      r.readAsDataURL(f);
    });
    if (hasImg) {
      wrap.querySelector('.image-body').addEventListener('click', () => {
        if (editMode) triggerImageUpload(w.id);
      });
    }
  }

  else if (w.type === 'quote') {
    wrap.innerHTML = `
      <div class="widget-header"><i class="fas fa-quote-right"></i>Quote</div>
      <div class="quote-body">
        <div class="quote-text" contenteditable="true"
             onblur="updateWidgetData('${w.id}',{content:this.textContent})"
             onmousedown="if(editMode)event.stopPropagation()">${w.content || 'Type a quote here...'}</div>
        <div class="quote-author" contenteditable="true"
             onblur="updateWidgetData('${w.id}',{author:this.textContent})"
             onmousedown="if(editMode)event.stopPropagation()">— ${w.author || 'Author'}</div>
      </div>
    `;
  }

  else if (w.type === 'spotify') {
    if (w.embedUrl) {
      wrap.innerHTML = `<iframe src="${w.embedUrl}" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" loading="lazy"></iframe>`;
    } else {
      wrap.innerHTML = `
        <div class="widget-header"><i class="fab fa-spotify" style="color:#1DB954"></i>Spotify</div>
        <div class="spotify-input-body">
          <div style="font-size:12px;color:var(--text2);">Paste a Spotify track or playlist URL:</div>
          <input class="spotify-url-input" placeholder="https://open.spotify.com/..." id="sp-${w.id}"
                 onmousedown="if(editMode)event.stopPropagation()">
          <button class="spotify-load-btn" onclick="loadSpotify('${w.id}')">Load</button>
        </div>
      `;
    }
  }

  return wrap;
}

// Color helper
function colorHex(c) {
  const m = { yellow:'#ffd54f', green:'#4caf50', blue:'#4f9eff', purple:'#a56fd4', red:'#ef4444' };
  return m[c] || '#fff';
}

// ═══════════════════════════════════════════════════════════
// ADD WIDGET
// ═══════════════════════════════════════════════════════════
const DEFAULTS = {
  note:    { width: 240, height: 200, content: '', color: 'yellow' },
  clock:   { width: 220, height: 120 },
  todo:    { width: 260, height: 280, items: [] },
  image:   { width: 240, height: 200, url: '' },
  quote:   { width: 280, height: 180, content: 'Your quote here...', author: 'Author' },
  spotify: { width: 300, height: 180, embedUrl: '' },
};

function addWidget(type) {
  const def = DEFAULTS[type] || {};
  const w = {
    id: uid(), type,
    x: snap(80 + Math.random() * 200),
    y: snap(80 + Math.random() * 200),
    z: ++zCounter,
    ...def,
    ...(def.items ? { items: [] } : {}),
  };
  currentSpace().widgets.push(w);
  const layer = document.getElementById('widgets-layer');
  const el = buildWidgetEl(w);
  if (el) layer.appendChild(el);
  if (!editMode) toggleEditMode();
  save();
}

// ═══════════════════════════════════════════════════════════
// DRAG
// ═══════════════════════════════════════════════════════════
function startDrag(e, el, w) {
  if (!editMode) return;
  e.preventDefault(); e.stopPropagation();
  selectWidget(el);
  const startX = e.clientX - w.x, startY = e.clientY - w.y;
  dragState = { el, w, startX, startY };
  document.addEventListener('mousemove', onDrag);
  document.addEventListener('mouseup', endDrag);
}

function onDrag(e) {
  if (!dragState) return;
  const { el, w, startX, startY } = dragState;
  let nx = snap(e.clientX - startX), ny = snap(e.clientY - startY);
  nx = Math.max(0, Math.min(nx, window.innerWidth - w.width));
  ny = Math.max(0, Math.min(ny, window.innerHeight - w.height));
  el.style.left = nx + 'px'; el.style.top = ny + 'px';
  w.x = nx; w.y = ny;
}

function endDrag() {
  dragState = null;
  document.removeEventListener('mousemove', onDrag);
  document.removeEventListener('mouseup', endDrag);
  save();
}

// ═══════════════════════════════════════════════════════════
// RESIZE
// ═══════════════════════════════════════════════════════════
function startResize(e, el, w) {
  if (!editMode) return;
  e.preventDefault(); e.stopPropagation();
  const startX = e.clientX, startY = e.clientY, startW = w.width, startH = w.height;
  resizeState = { el, w, startX, startY, startW, startH };
  document.addEventListener('mousemove', onResize);
  document.addEventListener('mouseup', endResize);
}

function onResize(e) {
  if (!resizeState) return;
  const { el, w, startX, startY, startW, startH } = resizeState;
  const nw = snap(Math.max(140, startW + e.clientX - startX));
  const nh = snap(Math.max(80, startH + e.clientY - startY));
  el.style.width = nw + 'px'; el.style.height = nh + 'px';
  w.width = nw; w.height = nh;
}

function endResize() {
  resizeState = null;
  document.removeEventListener('mousemove', onResize);
  document.removeEventListener('mouseup', endResize);
  save();
}

// ═══════════════════════════════════════════════════════════
// SELECT / Z-INDEX
// ═══════════════════════════════════════════════════════════
function selectWidget(el) {
  document.querySelectorAll('.widget.selected').forEach(w => w.classList.remove('selected'));
  el.classList.add('selected');
  const wid = el.dataset.id;
  const w = findWidget(wid);
  if (w) { w.z = ++zCounter; el.style.zIndex = w.z; }
}

// ═══════════════════════════════════════════════════════════
// CONTEXT MENU
// ═══════════════════════════════════════════════════════════
function showCtxMenu(x, y, w) {
  ctxTarget = w;
  const menu = document.getElementById('ctx-menu');
  menu.style.left = x + 'px'; menu.style.top = y + 'px';
  menu.style.display = 'block';
  // Adjust if off-screen
  const rect = menu.getBoundingClientRect();
  if (rect.right > window.innerWidth) menu.style.left = (x - rect.width) + 'px';
  if (rect.bottom > window.innerHeight) menu.style.top = (y - rect.height) + 'px';
}

function ctxAction(action) {
  if (!ctxTarget) return;
  const w = ctxTarget;
  if (action === 'delete') deleteWidget(w.id);
  else if (action === 'duplicate') duplicateWidget(w);
  else if (action === 'forward') { w.z = ++zCounter; document.querySelector(`.widget[data-id="${w.id}"]`).style.zIndex = w.z; save(); }
  else if (action === 'back') { w.z = Math.max(1, (w.z||10) - 2); document.querySelector(`.widget[data-id="${w.id}"]`).style.zIndex = w.z; save(); }
  hideCtxMenu();
}

function hideCtxMenu() { document.getElementById('ctx-menu').style.display = 'none'; ctxTarget = null; }
document.addEventListener('click', hideCtxMenu);
document.addEventListener('keydown', e => { if (e.key === 'Escape') hideCtxMenu(); });

// ═══════════════════════════════════════════════════════════
// WIDGET OPERATIONS
// ═══════════════════════════════════════════════════════════
function findWidget(id) { return currentSpace().widgets.find(w => w.id === id); }

function updateWidgetData(id, patch) {
  const w = findWidget(id); if (!w) return;
  Object.assign(w, patch); save();
}

function deleteWidget(id) {
  const sp = currentSpace();
  sp.widgets = sp.widgets.filter(w => w.id !== id);
  const el = document.querySelector(`.widget[data-id="${id}"]`);
  if (el) { el.style.animation = 'widgetOut 0.18s ease forwards'; setTimeout(() => el.remove(), 180); }
  save();
}

function duplicateWidget(w) {
  const newW = JSON.parse(JSON.stringify(w));
  newW.id = uid(); newW.x = snap(w.x + 24); newW.y = snap(w.y + 24); newW.z = ++zCounter;
  currentSpace().widgets.push(newW);
  const el = buildWidgetEl(newW);
  document.getElementById('widgets-layer').appendChild(el);
  save();
}

// Color
window.setNoteColor = function(id, color) {
  const w = findWidget(id); if (!w) return;
  w.color = color;
  const el = document.querySelector(`.widget[data-id="${id}"]`);
  if (el) { el.dataset.color = color; }
  // Re-render header to update opacity dots
  const inner = el.querySelector('.widget-header');
  if (inner) {
    inner.querySelectorAll('div > div').forEach((dot, i) => {
      const c = ['yellow','green','blue','purple','red'][i];
      dot.style.opacity = c === color ? 1 : 0.4;
    });
  }
  save();
};

// Todos
window.toggleTodo = function(wid, tid) {
  const w = findWidget(wid); if (!w || !w.items) return;
  const item = w.items.find(i => i.id === tid); if (!item) return;
  item.done = !item.done;
  const box = document.querySelector(`.todo-item[data-tid="${tid}"] .todo-checkbox`);
  const txt = document.querySelector(`.todo-item[data-tid="${tid}"] .todo-text`);
  if (box) box.classList.toggle('checked', item.done);
  if (txt) txt.classList.toggle('done', item.done);
  save();
};

window.addTodoItem = function(wid, input) {
  const text = input.value.trim(); if (!text) return;
  const w = findWidget(wid); if (!w) return;
  if (!w.items) w.items = [];
  const item = { id: uid(), text, done: false };
  w.items.push(item);
  input.value = '';
  // Inject new item
  const container = input.closest('.todo-body').querySelector('.todo-items');
  const div = document.createElement('div');
  div.className = 'todo-item'; div.dataset.tid = item.id;
  div.innerHTML = `
    <div class="todo-checkbox" onclick="toggleTodo('${wid}','${item.id}')"></div>
    <div class="todo-text" contenteditable="true"
         onblur="editTodo('${wid}','${item.id}',this.textContent)"
         onmousedown="if(editMode)event.stopPropagation()">${item.text}</div>
    <button class="todo-del" onclick="deleteTodo('${wid}','${item.id}')"><i class="fas fa-times"></i></button>
  `;
  container.appendChild(div);
  save();
};

window.editTodo = function(wid, tid, text) {
  const w = findWidget(wid); if (!w || !w.items) return;
  const item = w.items.find(i => i.id === tid); if (!item) return;
  item.text = text.trim(); save();
};

window.deleteTodo = function(wid, tid) {
  const w = findWidget(wid); if (!w || !w.items) return;
  w.items = w.items.filter(i => i.id !== tid);
  const el = document.querySelector(`.todo-item[data-tid="${tid}"]`);
  if (el) el.remove();
  save();
};

// Image upload trigger
window.triggerImageUpload = function(id) {
  const inp = document.getElementById('imgup-' + id);
  if (inp) inp.click();
};

// Spotify
window.loadSpotify = function(id) {
  const inp = document.getElementById('sp-' + id);
  if (!inp) return;
  const url = inp.value.trim(); if (!url) return;
  // Convert share URL to embed URL
  let embedUrl = url;
  const m = url.match(/open\.spotify\.com\/(track|album|playlist|episode)\/([A-Za-z0-9]+)/);
  if (m) embedUrl = `https://open.spotify.com/embed/${m[1]}/${m[2]}?utm_source=generator`;
  updateWidgetData(id, { embedUrl });
  renderWidgets(); save();
};

// ═══════════════════════════════════════════════════════════
// CLOCK TICK
// ═══════════════════════════════════════════════════════════
function tickClock(id) {
  function update() {
    const el = document.getElementById('clock-' + id); if (!el) return;
    const now = new Date();
    const h = String(now.getHours()).padStart(2,'0');
    const m = String(now.getMinutes()).padStart(2,'0');
    const s = String(now.getSeconds()).padStart(2,'0');
    el.textContent = `${h}:${m}:${s}`;
    const de = document.getElementById('clockdate-' + id);
    if (de) de.textContent = now.toLocaleDateString('en-US', { weekday:'short', month:'short', day:'numeric' });
    setTimeout(update, 1000);
  }
  update();
}

// ═══════════════════════════════════════════════════════════
// EXPORT / IMPORT
// ═══════════════════════════════════════════════════════════
window.exportLayout = function() {
  const blob = new Blob([JSON.stringify(spaces, null, 2)], { type: 'application/json' });
  const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
  a.download = 'myspace-layout.json'; a.click();
};

document.getElementById('importFile').addEventListener('change', e => {
  const f = e.target.files[0]; if (!f) return;
  const r = new FileReader();
  r.onload = ev => {
    try {
      spaces = JSON.parse(ev.target.result);
      currentSpaceIdx = 0;
      renderSpacesBar(); renderWidgets(); applyBg(); save();
    } catch(err) { alert('Invalid layout file.'); }
  };
  r.readAsText(f);
});

// ═══════════════════════════════════════════════════════════
// KEYBOARD SHORTCUTS
// ═══════════════════════════════════════════════════════════
document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA' || e.target.isContentEditable) return;
  if ((e.metaKey || e.ctrlKey) && e.key === 'e') { e.preventDefault(); toggleEditMode(); }
  if (e.key === 'Delete' || e.key === 'Backspace') {
    const sel = document.querySelector('.widget.selected'); if (!sel) return;
    deleteWidget(sel.dataset.id);
  }
  if ((e.metaKey || e.ctrlKey) && e.key === 'd') {
    e.preventDefault();
    const sel = document.querySelector('.widget.selected'); if (!sel) return;
    const w = findWidget(sel.dataset.id); if (w) duplicateWidget(w);
  }
});

// ═══════════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════════
load();
if (!spaces || spaces.length === 0) {
  spaces = [{ id: 0, name: 'Main', widgets: [], bg: { type: 'gradient', value: 'linear-gradient(135deg,#0a0a0a 0%,#111 100%)', blur: 0, brightness: 100, dim: 0, parallax: false } }];
}
renderSpacesBar();
renderWidgets();
applyBg();

// Default welcome widgets on first load
if (currentSpace().widgets.length === 0) {
  currentSpace().widgets = [
    { id: uid(), type: 'note', x: 60, y: 100, width: 240, height: 200, z: 10, color: 'yellow', content: 'Welcome to My Space 🌙\n\nThis is your personal canvas. Toggle edit mode to start adding and moving things.' },
    { id: uid(), type: 'clock', x: 340, y: 100, width: 220, height: 120, z: 11 },
    { id: uid(), type: 'quote', x: 60, y: 340, width: 280, height: 160, z: 12, content: 'The space between who you are and who you want to be is where the magic happens.', author: 'Unknown' },
    { id: uid(), type: 'todo', x: 400, y: 270, width: 240, height: 240, z: 13, items: [{ id: uid(), text: 'Customize your space', done: false }, { id: uid(), text: 'Add a background', done: false }, { id: uid(), text: 'Try drag & resize', done: false }] },
  ];
  renderWidgets();
  currentSpace().widgets.forEach(w => { if (w.type === 'clock') tickClock(w.id); });
  save();
} else {
  // Restart clocks
  currentSpace().widgets.forEach(w => { if (w.type === 'clock') tickClock(w.id); });
}

// CSS for widget exit animation
const style = document.createElement('style');
style.textContent = `@keyframes widgetOut { to { opacity:0; transform: scale(0.85); } }`;
document.head.appendChild(style);
</script>
</body>
