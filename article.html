<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Patholytica — Article</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root {
  --bg-color: #0d0d0d;
  --bg-secondary: #141414;
  --text-primary: #e8e6e1;
  --text-secondary: #7a7875;
  --card-bg: #141414;
  --hover-bg: #1c1c1c;
  --border-color: #242424;
  --accent: #4f9eff;
  --accent-hover: #3a8ae8;
  --accent-green: #3dba72;
  --accent-purple: #a56fd4;
  --accent-orange: #e88c3a;
  --header-height: 53px;
}
body.light-theme {
  --bg-color: #f9f9f9;
  --bg-secondary: #ffffff;
  --text-primary: #0f0f0f;
  --text-secondary: #606060;
  --card-bg: #ffffff;
  --hover-bg: #f0f0f0;
  --border-color: #e5e5e5;
  --accent: #065fd4;
  --accent-hover: #0448a3;
  --accent-orange: #c9742a;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { min-height: 100%; font-family: "Roboto", Arial, sans-serif; overflow-x: hidden; }
body { background: var(--bg-color); color: var(--text-primary); transition: background 0.2s, color 0.2s; }

/* ── Header ── */
.header-wrapper {
  position: fixed; top: 0; left: 0; right: 0;
  background: var(--bg-color);
  padding-top: env(safe-area-inset-top);
  border-bottom: 1px solid var(--border-color);
  z-index: 40;
}
.header { display: flex; align-items: center; justify-content: space-between; padding: 12px 20px; }
.back-btn {
  width: 36px; height: 36px; border-radius: 50%;
  background: transparent; border: none;
  color: var(--text-primary); cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px; transition: background 0.2s ease;
}
.back-btn:hover { background: var(--hover-bg); }
.header-actions { display: flex; align-items: center; gap: 8px; }
.icon-btn {
  width: 36px; height: 36px; border-radius: 50%;
  background: transparent; border: none;
  color: var(--text-secondary); cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px; transition: all 0.2s ease;
}
.icon-btn:hover { color: var(--text-primary); background: var(--hover-bg); }

/* ── Page scroll ── */
.page-scroll {
  padding-top: var(--header-height);
  padding-bottom: calc(72px + env(safe-area-inset-bottom));
  min-height: 100vh;
}

/* ── Loading / Error ── */
.loading-state {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  min-height: calc(100vh - var(--header-height));
  color: var(--text-secondary); gap: 16px;
}
.loading-spinner {
  width: 32px; height: 32px;
  border: 3px solid var(--border-color); border-top-color: var(--accent);
  border-radius: 50%; animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.error-state {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  min-height: calc(100vh - var(--header-height));
  gap: 16px; text-align: center; padding: 40px; color: var(--text-secondary);
}
.error-state i { font-size: 48px; opacity: 0.3; }
.error-state p { font-size: 15px; }
.error-btn {
  padding: 9px 24px; background: var(--accent); color: white;
  border: none; border-radius: 24px; font-size: 13px; font-weight: 600;
  cursor: pointer; transition: background 0.2s ease;
}
.error-btn:hover { background: var(--accent-hover); }

/* ── Article ── */
.article-wrapper { padding: 20px 20px 0; max-width: 720px; margin: 0 auto; }
.article-author-row {
  display: flex; align-items: center; gap: 12px;
  padding: 16px 0 14px;
  border-bottom: 1px solid var(--border-color);
  margin-bottom: 16px;
}
.author-avatar {
  width: 40px; height: 40px; border-radius: 50%;
  background: var(--accent);
  display: flex; align-items: center; justify-content: center;
  font-size: 16px; font-weight: 700; color: white;
  overflow: hidden; flex-shrink: 0; cursor: pointer;
}
.author-avatar img { width: 100%; height: 100%; object-fit: cover; }
.author-info { flex: 1; min-width: 0; }
.author-name {
  font-size: 14px; font-weight: 600; color: var(--text-primary);
  cursor: pointer; transition: color 0.2s ease;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.author-name:hover { color: var(--accent); }
.article-date { font-size: 12px; color: var(--text-secondary); margin-top: 2px; }
.article-stats-row { display: flex; align-items: center; gap: 16px; margin-bottom: 16px; }
.stat-chip { display: flex; align-items: center; gap: 5px; font-size: 12px; color: var(--text-secondary); }
.stat-chip.views i { color: var(--accent); }
.stat-chip.likes i { color: #ef4444; }
.article-title {
  font-family: "Merriweather", Georgia, serif;
  font-size: 26px; font-weight: 700; line-height: 1.25;
  color: var(--text-primary); margin-bottom: 20px;
}
.article-body {
  font-family: "Merriweather", Georgia, serif;
  font-size: 15px; line-height: 1.8; color: var(--text-primary);
}
.content-paragraph { margin-bottom: 16px; }

/* ── Media (article view) ── */
.media-embed { margin: 16px 0; }
.media-embed img { width: 100%; height: auto; border-radius: 10px; display: block; }
.media-caption { font-size: 12px; color: var(--text-secondary); margin-top: 6px; font-style: italic; }
.pdf-embed-block { background: var(--bg-secondary); border: 1px solid var(--border-color); border-radius: 12px; overflow: hidden; }
.pdf-embed-header { display: flex; align-items: center; gap: 10px; padding: 12px 14px; border-bottom: 1px solid var(--border-color); }
.pdf-embed-header i { color: #e74c3c; font-size: 18px; flex-shrink: 0; }
.pdf-embed-name { font-size: 13px; font-weight: 600; flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: var(--text-primary); }
.pdf-open-link { font-size: 11px; font-weight: 700; color: var(--accent); background: rgba(79,158,255,0.1); border: 1px solid rgba(79,158,255,0.2); border-radius: 8px; padding: 4px 10px; text-decoration: none; white-space: nowrap; flex-shrink: 0; }
.pdf-open-link:hover { background: rgba(79,158,255,0.2); }
.pdf-embed-block iframe { width: 100%; height: 300px; border: none; display: block; }
.yt-embed-block { background: var(--bg-secondary); border: 1px solid var(--border-color); border-radius: 12px; overflow: hidden; }
.yt-embed-header { display: flex; align-items: center; gap: 10px; padding: 10px 14px; border-bottom: 1px solid var(--border-color); }
.yt-embed-header i { color: #ff0000; font-size: 16px; flex-shrink: 0; }
.yt-embed-title { font-size: 13px; font-weight: 600; flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: var(--text-primary); }
.yt-watch-link { font-size: 11px; font-weight: 700; color: #ff0000; background: rgba(255,0,0,0.1); border: 1px solid rgba(255,0,0,0.2); border-radius: 8px; padding: 4px 10px; text-decoration: none; white-space: nowrap; flex-shrink: 0; }
.yt-watch-link:hover { background: rgba(255,0,0,0.2); }
.yt-embed-block iframe { width: 100%; aspect-ratio: 16/9; border: none; display: block; }
.custom-audio-player { background: var(--bg-secondary); border-radius: 12px; padding: 14px; display: flex; align-items: center; gap: 12px; border: 1px solid var(--border-color); margin: 12px 0; }
.play-btn { width: 40px; height: 40px; border-radius: 50%; background: var(--accent); border: none; color: white; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 15px; transition: all 0.2s ease; flex-shrink: 0; }
.play-btn:hover { background: var(--accent-hover); }
.audio-info { flex: 1; min-width: 0; overflow: hidden; }
.audio-title { font-size: 13px; font-weight: 500; margin-bottom: 8px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: var(--text-primary); }
.waveform-container { position: relative; height: 28px; background: var(--hover-bg); border-radius: 4px; margin-bottom: 6px; cursor: pointer; overflow: hidden; }
.waveform-progress { position: absolute; top: 0; left: 0; height: 100%; background: var(--accent); opacity: 0.25; transition: width 0.1s linear; }
.waveform-bars { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; align-items: center; justify-content: space-around; padding: 0 4px; }
.waveform-bar { width: 2px; background: var(--text-secondary); border-radius: 2px; opacity: 0.5; }
.audio-time { display: flex; justify-content: space-between; font-size: 11px; color: var(--text-secondary); }

/* ── Suggested ── */
.suggested-section { margin: 32px 0 0; border-top: 1px solid var(--border-color); padding: 20px 20px 0; max-width: 720px; margin-left: auto; margin-right: auto; }
.suggested-label { font-size: 10px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text-secondary); opacity: 0.7; margin-bottom: 14px; }
.suggested-item { display: flex; align-items: flex-start; gap: 14px; padding: 14px 0; border-bottom: 1px solid var(--border-color); cursor: pointer; }
.suggested-item:last-child { border-bottom: none; }
.suggested-item:hover .suggested-item-title { color: var(--accent); }
.suggested-thumb { width: 56px; height: 56px; border-radius: 8px; flex-shrink: 0; background: var(--hover-bg); display: flex; align-items: center; justify-content: center; overflow: hidden; }
.suggested-thumb img { width: 100%; height: 100%; object-fit: cover; }
.suggested-thumb i { font-size: 20px; color: var(--text-secondary); opacity: 0.4; }
.suggested-item-content { flex: 1; min-width: 0; }
.suggested-item-title { font-size: 14px; font-weight: 600; color: var(--text-primary); margin-bottom: 6px; line-height: 1.35; transition: color 0.2s ease; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
.suggested-item-meta { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
.suggested-meta-chip { display: flex; align-items: center; gap: 4px; font-size: 11px; color: var(--text-secondary); }

/* ── Action bar ── */
.action-bar {
  position: fixed; bottom: 0; left: 0; right: 0;
  background: var(--bg-color); border-top: 1px solid var(--border-color);
  padding: 10px 20px; padding-bottom: calc(10px + env(safe-area-inset-bottom));
  display: none; gap: 10px; z-index: 50; align-items: center;
}
.action-bar.show { display: flex; }
.action-btn {
  flex: 1; display: flex; align-items: center; justify-content: center; gap: 7px;
  background: transparent; border: 1px solid var(--border-color);
  border-radius: 24px; padding: 9px 16px;
  cursor: pointer; transition: all 0.2s ease;
  font-size: 13px; font-weight: 600; color: var(--text-secondary);
}
.action-btn:hover { color: var(--text-primary); border-color: var(--text-secondary); background: var(--hover-bg); }
.action-btn:active { transform: scale(0.97); }
.action-btn svg { width: 18px; height: 18px; stroke: currentColor; fill: none; stroke-width: 2; flex-shrink: 0; }
.action-btn.liked svg { fill: #ef4444; stroke: #ef4444; }
.action-btn.liked { color: #ef4444; border-color: rgba(239,68,68,0.4); background: rgba(239,68,68,0.06); }
.cite-btn {
  display: none; align-items: center; justify-content: center; gap: 7px;
  background: transparent; border: 1px solid var(--border-color);
  border-radius: 24px; padding: 9px 16px;
  cursor: pointer; transition: all 0.2s ease;
  font-size: 13px; font-weight: 600; color: var(--text-secondary); white-space: nowrap;
}
.cite-btn:hover { color: var(--accent-orange); border-color: var(--accent-orange); background: rgba(232,140,58,0.06); }
.cite-btn:active { transform: scale(0.97); }
.cite-btn svg { width: 18px; height: 18px; stroke: currentColor; fill: none; stroke-width: 2; flex-shrink: 0; }

/* ── Comments ── */
.comments-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 199; opacity: 0; pointer-events: none; transition: opacity 0.3s ease; }
.comments-overlay.active { opacity: 1; pointer-events: all; }
.comments-popup { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0.9); width: calc(100% - 40px); max-width: 500px; height: 70vh; max-height: 600px; background: var(--card-bg); border-radius: 16px; z-index: 200; opacity: 0; pointer-events: none; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); display: flex; flex-direction: column; box-shadow: 0 24px 72px rgba(0,0,0,0.8); border: 1px solid var(--border-color); }
.comments-popup.active { opacity: 1; pointer-events: all; transform: translate(-50%, -50%) scale(1); }
.comments-header { display: flex; align-items: center; justify-content: space-between; padding: 16px 20px; border-bottom: 1px solid var(--border-color); }
.comments-header h3 { font-size: 15px; font-weight: 700; margin: 0; color: var(--text-primary); }
.close-comments { background: none; border: none; color: var(--text-primary); font-size: 22px; cursor: pointer; width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; border-radius: 50%; transition: background 0.2s ease; }
.close-comments:hover { background: var(--hover-bg); }
.comments-list { flex: 1; overflow-y: auto; padding: 16px 20px; }
.comment-item { display: flex; gap: 12px; margin-bottom: 20px; }
.comment-avatar { width: 32px; height: 32px; border-radius: 50%; background: var(--accent); display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; color: white; flex-shrink: 0; overflow: hidden; }
.comment-avatar img { width: 100%; height: 100%; object-fit: cover; }
.comment-content { flex: 1; }
.comment-author { font-weight: 600; font-size: 13px; margin-bottom: 4px; color: var(--text-primary); }
.comment-text { font-size: 14px; line-height: 1.5; margin-bottom: 6px; color: var(--text-primary); }
.comment-time { font-size: 11px; color: var(--text-secondary); }
.comment-input-wrapper { padding: 12px 20px; border-top: 1px solid var(--border-color); background: var(--bg-secondary); border-radius: 0 0 16px 16px; }
.comment-input-container { display: flex; gap: 8px; align-items: center; }
.comment-input { flex: 1; background: var(--hover-bg); border: 1px solid var(--border-color); border-radius: 20px; padding: 10px 16px; color: var(--text-primary); font-size: 14px; outline: none; font-family: inherit; }
.comment-input::placeholder { color: var(--text-secondary); }
.comment-input:focus { border-color: var(--accent); }
.send-comment-btn { width: 36px; height: 36px; border-radius: 50%; background: var(--accent); border: none; color: white; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 15px; transition: all 0.2s ease; flex-shrink: 0; }
.send-comment-btn:hover { background: var(--accent-hover); }
.send-comment-btn:disabled { opacity: 0.4; cursor: not-allowed; }
.no-comments { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; color: var(--text-secondary); gap: 12px; text-align: center; }
.no-comments i { font-size: 40px; opacity: 0.3; }
.no-comments p { font-size: 14px; margin: 0; }
.no-comments span { font-size: 12px; opacity: 0.7; }

/* ════════════════════════════════════════
   CITE MODAL — full-screen editor
   ════════════════════════════════════════ */
.cite-modal-overlay {
  display: none; position: fixed; inset: 0;
  background: var(--bg-color); z-index: 500;
  flex-direction: column;
}
.cite-modal-overlay.show { display: flex; }

/* header */
.cite-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px 16px;
  border-bottom: 1px solid var(--border-color);
  background: var(--bg-color);
  flex-shrink: 0;
}
.cite-header-left { display: flex; align-items: center; gap: 10px; }
.cite-close-btn {
  width: 36px; height: 36px; border-radius: 50%; background: transparent;
  border: none; color: var(--text-primary); cursor: pointer;
  display: flex; align-items: center; justify-content: center; font-size: 18px;
  transition: background 0.2s ease;
}
.cite-close-btn:hover { background: var(--hover-bg); }
.cite-header-title { font-size: 15px; font-weight: 700; color: var(--text-primary); }
.cite-publish-btn {
  padding: 8px 22px; border-radius: 20px;
  background: var(--accent-orange); color: white;
  border: none; cursor: pointer;
  font-size: 13px; font-weight: 700;
  transition: all 0.2s ease;
}
.cite-publish-btn:hover { filter: brightness(1.1); }
.cite-publish-btn:disabled { opacity: 0.4; cursor: not-allowed; }

/* source pill */
.cite-source-pill {
  margin: 12px 16px;
  padding: 10px 14px;
  background: rgba(232,140,58,0.08);
  border: 1px solid rgba(232,140,58,0.2);
  border-radius: 10px;
  display: flex; align-items: center; gap: 10px;
  flex-shrink: 0;
}
.cite-source-pill i { color: var(--accent-orange); font-size: 13px; flex-shrink: 0; }
.cite-source-pill-text { flex: 1; min-width: 0; }
.cite-source-pill-label { font-size: 10px; font-weight: 700; letter-spacing: 0.07em; text-transform: uppercase; color: var(--accent-orange); opacity: 0.8; margin-bottom: 1px; }
.cite-source-pill-title { font-size: 13px; font-weight: 600; color: var(--text-primary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

/* scrollable editor area */
.cite-editor-scroll {
  flex: 1; overflow-y: auto; padding: 0 16px 16px;
}
.cite-editor-scroll::-webkit-scrollbar { width: 3px; }
.cite-editor-scroll::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 2px; }

/* title input */
.cite-title-label { font-size: 10px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text-secondary); opacity: 0.7; margin: 14px 0 7px; display: block; }
.cite-title-input {
  width: 100%; font-size: 22px; font-weight: 800;
  color: var(--text-primary); border: none; outline: none;
  background: transparent; resize: none; overflow: hidden;
  font-family: inherit; letter-spacing: -0.01em; line-height: 1.2;
  padding: 0; margin-bottom: 4px;
}
.cite-title-input::placeholder { color: var(--text-secondary); opacity: 0.4; }
.cite-title-counter { font-size: 11px; color: var(--text-secondary); text-align: right; margin-bottom: 14px; }
.cite-title-counter.over { color: #ef4444; font-weight: 700; }

/* content divider */
.cite-divider { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
.cite-divider-line { flex: 1; height: 1px; background: var(--border-color); }
.cite-divider-label { font-size: 10px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-secondary); opacity: 0.6; }

/* content blocks */
.cite-content-item { margin-bottom: 10px; }
.cite-content-block {
  background: var(--card-bg); border: 1px solid var(--border-color);
  border-radius: 12px; padding: 11px 13px; transition: border-color 0.2s ease;
}
.cite-content-block:focus-within { border-color: var(--accent); }
.cite-editable {
  outline: none; min-height: 1.6em; word-wrap: break-word; overflow-wrap: break-word;
  width: 100%; cursor: text; color: var(--text-primary); font-size: 15px; line-height: 1.6;
}
.cite-editable:empty::before { content: 'Write something...'; color: var(--text-secondary); opacity: 0.4; }
.cite-block-footer {
  display: flex; justify-content: space-between; align-items: center;
  margin-top: 8px; padding-top: 8px; border-top: 1px solid var(--border-color);
}
.cite-block-counter { font-size: 11px; color: var(--text-secondary); }
.cite-block-counter.over { color: #ef4444; font-weight: 700; }
.cite-delete-btn {
  width: 26px; height: 26px; border-radius: 50%; background: transparent;
  border: 1px solid var(--border-color); color: var(--text-secondary);
  cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 11px;
  transition: all 0.2s ease;
}
.cite-delete-btn:hover { background: #ef4444; border-color: #ef4444; color: white; }

/* cite media embeds */
.cite-media-embed {
  background: var(--card-bg); border: 1px solid var(--border-color);
  border-radius: 12px; overflow: hidden; position: relative;
}
.cite-media-embed img { width: 100%; height: auto; display: block; }
.cite-media-caption {
  font-size: 13px; color: var(--text-secondary); padding: 9px 13px;
  outline: none; cursor: text; border-top: 1px solid var(--border-color);
  background: var(--card-bg); min-height: 34px;
}
.cite-media-caption:empty::before { content: 'Add a caption...'; opacity: 0.4; }
.cite-remove-media {
  position: absolute; top: 8px; right: 8px;
  width: 28px; height: 28px; border-radius: 50%;
  background: rgba(0,0,0,0.75); color: white; border: none; cursor: pointer;
  display: flex; align-items: center; justify-content: center; font-size: 12px;
  transition: background 0.2s ease; z-index: 5;
}
.cite-remove-media:hover { background: #ef4444; }
.cite-pdf-header { display: flex; align-items: center; gap: 10px; padding: 13px 14px; }
.cite-pdf-header i { color: #e74c3c; font-size: 18px; flex-shrink: 0; }
.cite-pdf-name { font-size: 13px; font-weight: 600; flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: var(--text-primary); }
.cite-pdf-size { font-size: 11px; color: var(--text-secondary); background: var(--hover-bg); padding: 2px 8px; border-radius: 8px; flex-shrink: 0; }
.cite-pdf-info { background: var(--hover-bg); border-top: 1px solid var(--border-color); padding: 9px 14px; font-size: 12px; color: var(--text-secondary); display: flex; align-items: center; gap: 7px; }
.cite-pdf-info i { color: var(--accent); }
.cite-yt-header { display: flex; align-items: center; gap: 10px; padding: 11px 14px; }
.cite-yt-header i { color: #ff0000; font-size: 15px; }
.cite-yt-title { font-size: 13px; font-weight: 600; flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: var(--text-primary); }
.cite-yt-iframe { width: 100%; aspect-ratio: 16/9; border: none; display: block; }
.cite-audio-player { padding: 13px 14px; display: flex; align-items: center; gap: 12px; }
.cite-audio-play {
  width: 38px; height: 38px; border-radius: 50%; background: var(--accent);
  border: none; color: white; cursor: pointer; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center; font-size: 14px;
  transition: all 0.2s ease;
}
.cite-audio-play:hover { background: var(--accent-hover); }
.cite-audio-info { flex: 1; min-width: 0; }
.cite-audio-name { font-size: 13px; font-weight: 500; margin-bottom: 7px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: var(--text-primary); }

/* action toolbar */
.cite-toolbar {
  display: flex; gap: 6px; flex-shrink: 0;
  padding: 10px 16px; padding-bottom: calc(10px + env(safe-area-inset-bottom));
  border-top: 1px solid var(--border-color);
  background: var(--bg-color); overflow-x: auto;
}
.cite-toolbar::-webkit-scrollbar { display: none; }
.cite-tool-btn {
  flex: 1; min-width: 52px;
  display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px;
  background: var(--hover-bg); border: 1px solid var(--border-color);
  border-radius: 10px; padding: 9px 8px;
  cursor: pointer; transition: all 0.15s ease;
  font-size: 10px; font-weight: 700; letter-spacing: 0.02em;
  color: var(--text-secondary); white-space: nowrap;
}
.cite-tool-btn:hover { background: var(--border-color); color: var(--text-primary); border-color: var(--accent); }
.cite-tool-btn:active { transform: scale(0.94); }
.cite-tool-btn i { font-size: 15px; }
.cite-tool-btn.text-tool { color: var(--accent); border-color: var(--accent); background: rgba(79,158,255,0.08); }
.cite-tool-btn.text-tool:hover { background: rgba(79,158,255,0.15); }

/* YouTube modal for cite */
.cite-yt-modal-overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,0.7); backdrop-filter: blur(4px);
  z-index: 600; align-items: flex-end; justify-content: center; padding: 0;
}
.cite-yt-modal-overlay.show { display: flex; }
.cite-yt-modal-box {
  background: var(--card-bg); border: 1px solid var(--border-color);
  border-radius: 20px 20px 0 0;
  padding: 24px 24px calc(24px + env(safe-area-inset-bottom));
  width: 100%; max-width: 480px;
  animation: slideUp 0.3s cubic-bezier(0.4,0,0.2,1);
}
@keyframes slideUp { from { transform: translateY(100%); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
.cite-yt-modal-handle { width: 36px; height: 4px; background: var(--border-color); border-radius: 2px; margin: 0 auto 20px; }
.cite-yt-modal-title { font-size: 17px; font-weight: 700; margin-bottom: 16px; display: flex; align-items: center; gap: 10px; color: var(--text-primary); }
.cite-yt-modal-title i { color: #ff0000; }
.cite-yt-input {
  width: 100%; background: var(--hover-bg); border: 1px solid var(--border-color);
  border-radius: 10px; padding: 13px 14px; font-size: 14px;
  color: var(--text-primary); outline: none; font-family: inherit; margin-bottom: 14px;
  transition: border-color 0.2s ease;
}
.cite-yt-input:focus { border-color: var(--accent); }
.cite-yt-input::placeholder { color: var(--text-secondary); opacity: 0.6; }
.cite-yt-modal-actions { display: flex; gap: 10px; }
.cite-yt-cancel { flex: 1; padding: 12px; border-radius: 10px; background: var(--hover-bg); border: 1px solid var(--border-color); color: var(--text-primary); cursor: pointer; font-size: 14px; font-weight: 600; }
.cite-yt-cancel:hover { background: var(--border-color); }
.cite-yt-confirm { flex: 1; padding: 12px; border-radius: 10px; background: #ff0000; border: none; color: white; cursor: pointer; font-size: 14px; font-weight: 700; }
.cite-yt-confirm:hover { background: #cc0000; }

/* progress overlay */
.cite-progress-overlay {
  display: none; position: absolute; inset: 0;
  background: var(--bg-color); z-index: 10;
  flex-direction: column; align-items: center; justify-content: center; gap: 14px;
}
.cite-progress-overlay.show { display: flex; }
.cite-progress-spinner { width: 36px; height: 36px; border: 3px solid var(--border-color); border-top-color: var(--accent-orange); border-radius: 50%; animation: spin 0.8s linear infinite; }
.cite-progress-label { font-size: 15px; font-weight: 600; color: var(--text-primary); }
.cite-progress-sub { font-size: 13px; color: var(--text-secondary); }
</style>
</head>
<body>
<script>
if (localStorage.getItem('theme') === 'light') document.body.classList.add('light-theme');
function updateHeaderHeight() {
  const h = document.getElementById('headerWrapper'); if (!h) return;
  document.documentElement.style.setProperty('--header-height', h.offsetHeight + 'px');
}
document.addEventListener('DOMContentLoaded', updateHeaderHeight);
window.addEventListener('resize', updateHeaderHeight);
</script>

<!-- Header -->
<div class="header-wrapper" id="headerWrapper">
  <div class="header">
    <button class="back-btn" onclick="goBack()"><i class="fas fa-arrow-left"></i></button>
    <div class="header-actions">
      <button class="icon-btn" onclick="toggleTheme()" title="Toggle theme"><i class="fas fa-circle-half-stroke" id="themeIcon"></i></button>
      <button class="icon-btn" onclick="shareArticle()" title="Share"><i class="fas fa-share"></i></button>
    </div>
  </div>
</div>

<!-- Page -->
<div class="page-scroll" id="pageScroll">
  <div class="loading-state" id="loadingState">
    <div class="loading-spinner"></div>
    <div>Loading article...</div>
  </div>
  <div class="error-state" id="errorState" style="display:none;">
    <i class="fas fa-exclamation-triangle"></i>
    <p>Article not found</p>
    <button class="error-btn" onclick="goBack()">Go Back</button>
  </div>
  <div id="articleContent" style="display:none;">
    <div class="article-wrapper">
      <div class="article-author-row">
        <div class="author-avatar" id="authorAvatar">A</div>
        <div class="author-info">
          <div class="author-name" id="authorName">Loading...</div>
          <div class="article-date" id="articleDate"></div>
        </div>
      </div>
      <div class="article-stats-row">
        <div class="stat-chip views"><i class="fas fa-eye"></i><span id="viewCount">0</span></div>
        <div class="stat-chip likes"><i class="fas fa-heart"></i><span id="likeCountStat">0</span></div>
      </div>
      <div class="article-title" id="articleTitle"></div>
      <div class="article-body" id="articleBody"></div>
    </div>
    <div class="suggested-section" id="suggestedSection" style="display:none;">
      <div class="suggested-label">More from this author</div>
      <div id="suggestedList"></div>
    </div>
    <div style="height:24px;"></div>
  </div>
</div>

<!-- Action Bar -->
<div class="action-bar" id="actionBar">
  <button class="action-btn" id="likeBtn" onclick="toggleLike()">
    <svg viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path></svg>
    <span id="likeCount">0</span>
  </button>
  <button class="action-btn" id="commentBtn" onclick="openComments()">
    <svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg>
    <span id="commentCount">0</span>
  </button>
  <button class="cite-btn" id="citeBtn" onclick="openCiteModal()">
    <svg viewBox="0 0 24 24"><path d="M3 21c3 0 7-1 7-8V5c0-1.25-.756-2.017-2-2H4c-1.25 0-2 .75-2 2v7c0 1.25.75 2 2 2 1 0 1 0 1 1v1c0 1-1 2-2 2s-1 .008-1 1.031V20c0 1 0 1 1 1z"></path><path d="M15 21c3 0 7-1 7-8V5c0-1.25-.757-2.017-2-2h-4c-1.25 0-2 .75-2 2v7c0 1.25.75 2 2 2h.75c0 2.25.25 4-2.75 4v3c0 1 0 1 1 1z"></path></svg>
    Cite
  </button>
</div>

<!-- Comments -->
<div class="comments-overlay" id="commentsOverlay" onclick="closeComments()"></div>
<div class="comments-popup" id="commentsPopup">
  <div class="comments-header">
    <h3>Comments</h3>
    <button class="close-comments" onclick="closeComments()">×</button>
  </div>
  <div class="comments-list" id="commentsList">
    <div class="no-comments"><i class="fas fa-comments"></i><p>No comments yet</p><span>Be the first to comment!</span></div>
  </div>
  <div class="comment-input-wrapper">
    <div class="comment-input-container">
      <input type="text" class="comment-input" id="commentInput" placeholder="Add a comment...">
      <button class="send-comment-btn" id="sendCommentBtn" onclick="sendComment()"><i class="fas fa-paper-plane"></i></button>
    </div>
  </div>
</div>

<!-- ════════════════════════════════════════
     CITE MODAL — full-screen editor
     ════════════════════════════════════════ -->
<div class="cite-modal-overlay" id="citeModalOverlay">

  <!-- progress overlay (shown during publish) -->
  <div class="cite-progress-overlay" id="citeProgressOverlay">
    <div class="cite-progress-spinner"></div>
    <div class="cite-progress-label" id="citeProgressLabel">Creating article...</div>
    <div class="cite-progress-sub">This will only take a moment</div>
  </div>

  <!-- header -->
  <div class="cite-header">
    <div class="cite-header-left">
      <button class="cite-close-btn" onclick="closeCiteModal()"><i class="fas fa-arrow-left"></i></button>
      <span class="cite-header-title">Cite Article</span>
    </div>
    <button class="cite-publish-btn" id="citePublishBtn" onclick="publishCitation()">Publish</button>
  </div>

  <!-- source pill -->
  <div class="cite-source-pill">
    <i class="fas fa-quote-left"></i>
    <div class="cite-source-pill-text">
      <div class="cite-source-pill-label">Citing</div>
      <div class="cite-source-pill-title" id="citeSourceTitle">—</div>
    </div>
  </div>

  <!-- scrollable editor -->
  <div class="cite-editor-scroll" id="citeEditorScroll">
    <label class="cite-title-label">Title</label>
    <textarea class="cite-title-input" id="citeTitleInput" placeholder="Give your article a title..." rows="1"
      oninput="citeAutoResizeTitle(this); citeTitleCounter()"></textarea>
    <div class="cite-title-counter" id="citeTitleCounter">0 / 60</div>

    <div class="cite-divider">
      <div class="cite-divider-line"></div>
      <div class="cite-divider-label">Content</div>
      <div class="cite-divider-line"></div>
    </div>

    <div id="citeContentItems">
      <div class="cite-content-item">
        <div class="cite-content-block">
          <div class="cite-editable" contenteditable="true" oninput="citeBlockCounter(this)"></div>
          <div class="cite-block-footer">
            <span class="cite-block-counter">0 / 200</span>
            <button class="cite-delete-btn" onclick="citeDeleteBlock(this)"><i class="fas fa-trash"></i></button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- toolbar -->
  <div class="cite-toolbar">
    <button class="cite-tool-btn text-tool" onclick="citeAddParagraph()">
      <i class="fas fa-plus"></i>TEXT
    </button>
    <label class="cite-tool-btn">
      <i class="fas fa-image"></i>IMAGE
      <input type="file" accept="image/*" style="display:none;" onchange="citeHandleImage(event)">
    </label>
    <label class="cite-tool-btn">
      <i class="fas fa-microphone"></i>AUDIO
      <input type="file" accept="audio/*" style="display:none;" onchange="citeHandleAudio(event)">
    </label>
    <label class="cite-tool-btn">
      <i class="fas fa-file-pdf" style="color:#e74c3c;"></i>PDF
      <input type="file" accept="application/pdf" style="display:none;" onchange="citeHandlePdf(event)">
    </label>
    <button class="cite-tool-btn" onclick="openCiteYtModal()">
      <i class="fab fa-youtube" style="color:#ff0000;"></i>VIDEO
    </button>
  </div>
</div>

<!-- YouTube modal for cite -->
<div class="cite-yt-modal-overlay" id="citeYtModalOverlay">
  <div class="cite-yt-modal-box">
    <div class="cite-yt-modal-handle"></div>
    <div class="cite-yt-modal-title"><i class="fab fa-youtube"></i> Embed YouTube Video</div>
    <input class="cite-yt-input" id="citeYtInput" type="url" placeholder="https://www.youtube.com/watch?v=...">
    <div class="cite-yt-modal-actions">
      <button class="cite-yt-cancel" onclick="closeCiteYtModal()">Cancel</button>
      <button class="cite-yt-confirm" onclick="citeEmbedYoutube()">Embed</button>
    </div>
  </div>
</div>

<script>
function goBack() {
  if (document.referrer && document.referrer.includes(window.location.host)) window.history.back();
  else window.location.href = 'index.html';
}
function toggleTheme() {
  const isLight = document.body.classList.toggle('light-theme');
  localStorage.setItem('theme', isLight ? 'light' : 'dark');
  document.getElementById('themeIcon').className = isLight ? 'fas fa-moon' : 'fas fa-circle-half-stroke';
}
(function() {
  const ico = document.getElementById('themeIcon');
  if (ico) ico.className = document.body.classList.contains('light-theme') ? 'fas fa-moon' : 'fas fa-circle-half-stroke';
})();

function openProfile(username) {
  if (username) window.location.href = `profile.html?username=${username.replace('@','')}`;
}

// ── Audio playback (article view) ──
window.toggleAudio = function(btn, audioId) {
  const player = btn.closest('.custom-audio-player');
  const audio = document.getElementById(audioId); const icon = btn.querySelector('i');
  if (audio.paused) {
    audio.play(); icon.className = 'fas fa-pause';
    audio.ontimeupdate = function() {
      const p = (audio.currentTime / audio.duration) * 100;
      player.querySelector('.waveform-progress').style.width = p + '%';
      const m = Math.floor(audio.currentTime/60), s = Math.floor(audio.currentTime%60);
      player.querySelector('.current-time').textContent = `${m}:${s.toString().padStart(2,'0')}`;
    };
    audio.onended = function() { icon.className = 'fas fa-play'; player.querySelector('.waveform-progress').style.width = '0%'; player.querySelector('.current-time').textContent = '0:00'; };
  } else { audio.pause(); icon.className = 'fas fa-play'; }
};
window.seekAudio = function(event, container, audioId) {
  const audio = document.getElementById(audioId); const rect = container.getBoundingClientRect();
  audio.currentTime = ((event.clientX - rect.left) / rect.width) * audio.duration;
};

document.getElementById('commentInput').addEventListener('keypress', e => { if (e.key === 'Enter') window.sendComment(); });

// ════════════════════════════════════════
// CITE EDITOR HELPERS
// ════════════════════════════════════════
const CITE_TITLE_MAX = 60, CITE_BLOCK_MAX = 200, CITE_IMG_MAX_MB = 2, CITE_PDF_MAX_MB = 10, CITE_AUDIO_MAX_SEC = 30;

function citeAutoResizeTitle(t) { t.style.height = 'auto'; t.style.height = t.scrollHeight + 'px'; }
function citeTitleCounter() {
  const input = document.getElementById('citeTitleInput');
  if (input.value.length > CITE_TITLE_MAX) input.value = input.value.slice(0, CITE_TITLE_MAX);
  const len = input.value.length;
  const el = document.getElementById('citeTitleCounter');
  el.textContent = `${len} / ${CITE_TITLE_MAX}`;
  el.className = 'cite-title-counter' + (len >= CITE_TITLE_MAX ? ' over' : '');
  citeAutoResizeTitle(input);
}

function citeBlockCounter(editable) {
  const len = editable.textContent.length;
  if (len > CITE_BLOCK_MAX) {
    editable.textContent = editable.textContent.slice(0, CITE_BLOCK_MAX);
    const sel = window.getSelection(), range = document.createRange();
    range.selectNodeContents(editable); range.collapse(false);
    sel.removeAllRanges(); sel.addRange(range);
  }
  const cur = Math.min(len, CITE_BLOCK_MAX);
  const counter = editable.closest('.cite-content-block').querySelector('.cite-block-counter');
  counter.textContent = `${cur} / ${CITE_BLOCK_MAX}`;
  counter.className = 'cite-block-counter' + (cur >= CITE_BLOCK_MAX ? ' over' : '');
}

function citeAddParagraph() {
  const item = document.createElement('div'); item.className = 'cite-content-item';
  item.innerHTML = `<div class="cite-content-block"><div class="cite-editable" contenteditable="true" oninput="citeBlockCounter(this)"></div><div class="cite-block-footer"><span class="cite-block-counter">0 / ${CITE_BLOCK_MAX}</span><button class="cite-delete-btn" onclick="citeDeleteBlock(this)"><i class="fas fa-trash"></i></button></div></div>`;
  document.getElementById('citeContentItems').appendChild(item);
  item.querySelector('.cite-editable').focus();
}

function citeDeleteBlock(btn) {
  const item = btn.closest('.cite-content-item');
  const allText = document.querySelectorAll('.cite-content-item .cite-editable');
  if (allText.length > 1) item.remove();
}

function citeRemoveMedia(btn) { btn.closest('.cite-content-item').remove(); }

// Image
function citeHandleImage(event) {
  const file = event.target.files[0]; if (!file) return;
  if (file.size > CITE_IMG_MAX_MB * 1024 * 1024) { alert(`Images must be under ${CITE_IMG_MAX_MB}MB`); event.target.value = ''; return; }
  const reader = new FileReader();
  reader.onload = e => {
    const item = document.createElement('div'); item.className = 'cite-content-item';
    item.innerHTML = `<div class="cite-media-embed"><button class="cite-remove-media" onclick="citeRemoveMedia(this)"><i class="fas fa-times"></i></button><img src="${e.target.result}" alt=""><div class="cite-media-caption" contenteditable="true"></div></div>`;
    document.getElementById('citeContentItems').appendChild(item);
  };
  reader.readAsDataURL(file); event.target.value = '';
}

// Audio
function citeHandleAudio(event) {
  const file = event.target.files[0]; if (!file) return;
  const tempUrl = URL.createObjectURL(file);
  const tempAudio = new Audio(tempUrl);
  tempAudio.addEventListener('loadedmetadata', function() {
    URL.revokeObjectURL(tempUrl);
    if (tempAudio.duration > CITE_AUDIO_MAX_SEC) { alert(`Audio must be ${CITE_AUDIO_MAX_SEC}s or less`); event.target.value = ''; return; }
    const reader = new FileReader();
    reader.onload = e => {
      const audioId = 'citeaudio-' + Math.random().toString(36).substr(2,9);
      const dur = Math.floor(tempAudio.duration);
      const dStr = `${Math.floor(dur/60)}:${(dur%60).toString().padStart(2,'0')}`;
      const item = document.createElement('div'); item.className = 'cite-content-item';
      item.innerHTML = `
        <div class="cite-media-embed">
          <button class="cite-remove-media" onclick="citeRemoveMedia(this)"><i class="fas fa-times"></i></button>
          <div class="cite-audio-player">
            <button class="cite-audio-play" onclick="citeToggleAudio(this,'${audioId}')"><i class="fas fa-play"></i></button>
            <div class="cite-audio-info">
              <div class="cite-audio-name">${file.name}</div>
              <div class="waveform-container" onclick="citeSeekAudio(event,this,'${audioId}')">
                <div class="waveform-progress"></div>
                <div class="waveform-bars">${Array(15).fill(0).map(()=>`<div class="waveform-bar" style="height:${Math.random()*60+20}%"></div>`).join('')}</div>
              </div>
              <div class="audio-time"><span class="current-time">0:00</span><span class="duration">${dStr}</span></div>
            </div>
            <audio id="${audioId}" src="${e.target.result}" style="display:none;"></audio>
          </div>
          <div class="cite-media-caption" contenteditable="true"></div>
        </div>`;
      document.getElementById('citeContentItems').appendChild(item);
    };
    reader.readAsDataURL(file); event.target.value = '';
  });
  tempAudio.addEventListener('error', () => { alert('Could not read audio file'); event.target.value = ''; });
}

function citeToggleAudio(btn, audioId) {
  const player = btn.closest('.cite-audio-player');
  const audio = document.getElementById(audioId); const icon = btn.querySelector('i');
  if (audio.paused) {
    audio.play(); icon.className = 'fas fa-pause';
    audio.ontimeupdate = function() {
      const p = (audio.currentTime / audio.duration) * 100;
      player.querySelector('.waveform-progress').style.width = p + '%';
      const m = Math.floor(audio.currentTime/60), s = Math.floor(audio.currentTime%60);
      player.querySelector('.current-time').textContent = `${m}:${s.toString().padStart(2,'0')}`;
    };
    audio.onended = function() { icon.className = 'fas fa-play'; player.querySelector('.waveform-progress').style.width = '0%'; player.querySelector('.current-time').textContent = '0:00'; };
  } else { audio.pause(); icon.className = 'fas fa-play'; }
}
function citeSeekAudio(event, container, audioId) {
  const audio = document.getElementById(audioId); const rect = container.getBoundingClientRect();
  audio.currentTime = ((event.clientX - rect.left) / rect.width) * audio.duration;
}

// PDF
function citeHandlePdf(event) {
  const file = event.target.files[0]; if (!file) return;
  if (file.size > CITE_PDF_MAX_MB * 1024 * 1024) { alert(`PDFs must be under ${CITE_PDF_MAX_MB}MB`); event.target.value = ''; return; }
  const sizeText = file.size >= 1024*1024 ? `${(file.size/1024/1024).toFixed(1)} MB` : `${(file.size/1024).toFixed(0)} KB`;
  const item = document.createElement('div'); item.className = 'cite-content-item';
  item.innerHTML = `
    <div class="cite-media-embed" data-type="pdf">
      <button class="cite-remove-media" onclick="citeRemoveMedia(this)"><i class="fas fa-times"></i></button>
      <div class="cite-pdf-header">
        <i class="fas fa-file-pdf"></i>
        <span class="cite-pdf-name">${file.name}</span>
        <span class="cite-pdf-size">${sizeText}</span>
      </div>
      <div class="cite-pdf-info"><i class="fas fa-info-circle"></i>PDF will be uploaded when you publish</div>
      <div class="cite-media-caption" contenteditable="true"></div>
    </div>`;
  document.getElementById('citeContentItems').appendChild(item);
  // Store file reference on element
  const mediaEl = item.querySelector('.cite-media-embed');
  mediaEl._pdfFile = file;
  event.target.value = '';
}

// YouTube
function openCiteYtModal() {
  document.getElementById('citeYtInput').value = '';
  document.getElementById('citeYtModalOverlay').classList.add('show');
  setTimeout(() => document.getElementById('citeYtInput').focus(), 150);
}
function closeCiteYtModal() { document.getElementById('citeYtModalOverlay').classList.remove('show'); }
function extractYouTubeId(url) {
  const m = url.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/|youtube\.com\/embed\/|youtube\.com\/shorts\/)([A-Za-z0-9_-]{11})/);
  return m ? m[1] : null;
}
function citeEmbedYoutube() {
  const url = document.getElementById('citeYtInput').value.trim();
  const videoId = extractYouTubeId(url);
  if (!videoId) { alert('Please enter a valid YouTube URL'); return; }
  closeCiteYtModal();
  const item = document.createElement('div'); item.className = 'cite-content-item';
  item.innerHTML = `
    <div class="cite-media-embed" data-type="youtube" data-videoid="${videoId}">
      <button class="cite-remove-media" onclick="citeRemoveMedia(this)"><i class="fas fa-times"></i></button>
      <div class="cite-yt-header"><i class="fab fa-youtube"></i><span class="cite-yt-title">youtube.com/watch?v=${videoId}</span></div>
      <iframe class="cite-yt-iframe" src="https://www.youtube.com/embed/${videoId}" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
      <div class="cite-media-caption" contenteditable="true"></div>
    </div>`;
  document.getElementById('citeContentItems').appendChild(item);
}
document.getElementById('citeYtModalOverlay').addEventListener('click', e => { if (e.target === e.currentTarget) closeCiteYtModal(); });
document.getElementById('citeYtInput').addEventListener('keydown', e => { if (e.key === 'Enter') citeEmbedYoutube(); });
</script>

<script type="module">

const firebaseConfig = {

);

let currentUser = null;

function formatNumber(n) {
  if (n >= 1000000) return (n/1000000).toFixed(1)+'M';
  if (n >= 1000) return (n/1000).toFixed(1)+'K';
  return (n||0).toString();
}
function formatDate(d) {
  const now = new Date(), ms = now-d, mins = Math.floor(ms/60000), hrs = Math.floor(ms/3600000), days = Math.floor(ms/86400000);
  if (mins < 60) return `${mins}m ago`;
  if (hrs < 24) return `${hrs}h ago`;
  if (days < 7) return `${days}d ago`;
  return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
}

async function getCurrentUser() {
  try {
    const fu = auth.currentUser; if (!fu) return null;
    const { data } = await supabase.from('users').select('user_id, firebase_uid, username, pfp').eq('firebase_uid', fu.uid).single();
    return data || null;
  } catch(e) { return null; }
}

onAuthStateChanged(auth, async user => {
  if (user) {
    currentUser = await getCurrentUser();
    if (currentUser && currentArticle) await checkIfUserLiked();

  } else {
    currentUser = null;
    document.getElementById('citeBtn').style.display = 'none';
  }
});

function getArticleId() { return new URLSearchParams(window.location.search).get('id'); }

function startViewTimer(id) { if (hasIncrementedView) return; viewTimer = setTimeout(() => incrementView(id), 5000); }
function clearViewTimer() { if (viewTimer) { clearTimeout(viewTimer); viewTimer = null; } }

async function incrementView(id) {
  if (hasIncrementedView) return;
  try {
    hasIncrementedView = true;
    const { data: a } = await supabase.from('articles').select('views').eq('id', id).single();
    const nv = (a.views||0)+1;
    await supabase.from('articles').update({ views: nv }).eq('id', id);
    if (currentArticle) { currentArticle.views = nv; document.getElementById('viewCount').textContent = formatNumber(nv); }
  } catch(e) { hasIncrementedView = false; }
}

window.addEventListener('beforeunload', clearViewTimer);
document.addEventListener('visibilitychange', () => {
  if (document.hidden) clearViewTimer();
  else if (!hasIncrementedView && currentArticle) startViewTimer(currentArticle.id);
});

async function loadArticle() {
  const id = getArticleId(); if (!id) { showError(); return; }
  try {
    const { data: article, error } = await supabase.from('articles').select('*').eq('id', id).single();
    if (error || !article) { showError(); return; }
    currentArticle = article;
    const [authorRes, mediaRes] = await Promise.all([
      supabase.from('users').select('username, full_name, pfp').eq('firebase_uid', article.firebase_user_id).single(),
      supabase.from('media').select('*').eq('article_id', id).order('display_order', { ascending: true })
    ]);
    displayArticle(article, authorRes.data, mediaRes.data);
    if (currentUser) await checkIfUserLiked();
    await Promise.all([loadCommentCount(id), loadSuggested(article.firebase_user_id, id)]);
    startViewTimer(id);
  } catch(e) { console.error(e); showError(); }
}

function displayArticle(article, author, media) {
  document.getElementById('loadingState').style.display = 'none';
  document.getElementById('articleContent').style.display = 'block';
  document.getElementById('actionBar').classList.add('show');
  document.title = `${article.title || 'Article'} — Patholytica`;
  document.getElementById('articleTitle').textContent = article.title || 'Untitled';
  document.getElementById('articleDate').textContent = formatDate(new Date(article.created_at));
  document.getElementById('viewCount').textContent = formatNumber(article.views||0);
  document.getElementById('likeCountStat').textContent = formatNumber(article.likes||0);
  document.getElementById('likeCount').textContent = formatNumber(article.likes||0);

  const authorUsername = author?.username || '';
  const authorDisplay = authorUsername ? `@${authorUsername}` : (author?.full_name || 'Anonymous');
  const nameEl = document.getElementById('authorName');
  nameEl.textContent = authorDisplay;
  if (authorUsername) nameEl.onclick = () => openProfile(authorUsername);
  const avatarEl = document.getElementById('authorAvatar');
  if (author?.pfp) { avatarEl.innerHTML = `<img src="${author.pfp}" alt="${authorDisplay}">`; }
  else { avatarEl.textContent = (authorUsername || authorDisplay).replace('@','')[0]?.toUpperCase() || 'A'; }
  if (authorUsername) avatarEl.onclick = () => openProfile(authorUsername);

  const body = document.getElementById('articleBody'); body.innerHTML = '';
  const paragraphs = (article.content || '').split('\n\n');
  paragraphs.forEach((p, i) => {
    if (p.trim()) {
      const el = document.createElement('div'); el.className = 'content-paragraph'; el.textContent = p.trim();
      body.appendChild(el);
      if (media) media.filter(m => m.display_order === i).forEach(m => body.appendChild(createMediaElement(m)));
    }
  });
  if (media) media.filter(m => m.display_order >= paragraphs.length).forEach(m => body.appendChild(createMediaElement(m)));
}

function createMediaElement(m) {
  const d = document.createElement('div'); d.className = 'media-embed';
  if (m.type === 'image') {
    d.innerHTML = `<img src="${m.url}" alt="${m.caption||''}">${m.caption?`<div class="media-caption">${m.caption}</div>`:''}`;
  } else if (m.type === 'audio') {
    const aid = 'audio-'+Math.random().toString(36).substr(2,9);
    d.innerHTML = `<div class="custom-audio-player"><button class="play-btn" onclick="toggleAudio(this,'${aid}')"><i class="fas fa-play"></i></button><div class="audio-info"><div class="audio-title">${m.caption||'Audio'}</div><div class="waveform-container" onclick="seekAudio(event,this,'${aid}')"><div class="waveform-progress"></div><div class="waveform-bars">${Array(15).fill(0).map(()=>`<div class="waveform-bar" style="height:${Math.random()*60+20}%"></div>`).join('')}</div></div><div class="audio-time"><span class="current-time">0:00</span><span class="duration">0:00</span></div></div><audio id="${aid}" src="${m.url}" style="display:none;"></audio></div>${m.caption?`<div class="media-caption">${m.caption}</div>`:''}`;
    setTimeout(() => { const audio = document.getElementById(aid); if (audio) audio.addEventListener('loadedmetadata', () => { const dur = Math.floor(audio.duration); const span = audio.closest('.custom-audio-player')?.querySelector('.duration'); if (span) span.textContent = `${Math.floor(dur/60)}:${(dur%60).toString().padStart(2,'0')}`; }); }, 100);
  } else if (m.type === 'pdf') {
    d.innerHTML = `<div class="pdf-embed-block"><div class="pdf-embed-header"><i class="fas fa-file-pdf"></i><span class="pdf-embed-name">${m.caption||'Document'}</span><a class="pdf-open-link" href="${m.url}" target="_blank" rel="noopener">Open PDF</a></div><iframe src="${m.url}" title="${m.caption||'Document'}"></iframe></div>${m.caption?`<div class="media-caption">${m.caption}</div>`:''}`;
  } else if (m.type === 'youtube') {
    const ytMatch = m.url.match(/embed\/([A-Za-z0-9_-]{11})/); const videoId = ytMatch ? ytMatch[1] : '';
    const label = m.caption || (videoId ? `youtube.com/watch?v=${videoId}` : 'YouTube Video');
    d.innerHTML = `<div class="yt-embed-block"><div class="yt-embed-header"><i class="fab fa-youtube"></i><span class="yt-embed-title">${label}</span>${videoId?`<a class="yt-watch-link" href="https://www.youtube.com/watch?v=${videoId}" target="_blank" rel="noopener">Watch</a>`:''}</div><iframe src="${m.url}" title="${label}" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe></div>${m.caption?`<div class="media-caption">${m.caption}</div>`:''}`;
  }
  return d;
}

function showError() {
  document.getElementById('loadingState').style.display = 'none';
  document.getElementById('errorState').style.display = 'flex';
}

async function loadCommentCount(id) {
  try { const { data } = await supabase.from('comments').select('id').eq('article_id', id); document.getElementById('commentCount').textContent = data?.length || 0; } catch(e) {}
}

async function loadSuggested(firebaseUserId, currentId) {

    document.getElementById('suggestedSection').style.display = 'block';
  } catch(e) { console.error(e); }
}

async function checkIfUserLiked() {
  if (!currentUser || !currentArticle) return;
  try { const { data } = await supabase.from('likes').select('*').eq('article_id', currentArticle.id).eq('user_id', currentUser.user_id).single(); userHasLiked = !!data; document.getElementById('likeBtn').classList.toggle('liked', userHasLiked); } catch(e) {}

window.toggleLike = async function() {
  if (!currentUser) { window.location.href = 'login.html'; return; }
  if (!currentArticle) return;
  const likeBtn = document.getElementById('likeBtn'), likeCount = document.getElementById('likeCount'), likeCountStat = document.getElementById('likeCountStat');
  const wasLiked = userHasLiked, originalCount = currentArticle.likes || 0;
  try {
    if (wasLiked) {
      userHasLiked = false; likeBtn.classList.remove('liked'); currentArticle.likes = Math.max(0, originalCount - 1);
      await supabase.from('likes').delete().eq('article_id', currentArticle.id).eq('user_id', currentUser.user_id);
    } else {
      userHasLiked = true; likeBtn.classList.add('liked'); currentArticle.likes = originalCount + 1;
      await supabase.from('likes').insert([{ article_id: currentArticle.id, user_id: currentUser.user_id }]);
    }
    likeCount.textContent = formatNumber(currentArticle.likes); likeCountStat.textContent = formatNumber(currentArticle.likes);
    await supabase.from('articles').update({ likes: currentArticle.likes }).eq('id', currentArticle.id);
  } catch(e) { console.error(e); userHasLiked = wasLiked; currentArticle.likes = originalCount; likeBtn.classList.toggle('liked', wasLiked); likeCount.textContent = formatNumber(originalCount); likeCountStat.textContent = formatNumber(originalCount); }
};

window.shareArticle = function() {

  if (navigator.share) navigator.share({ title, url }).catch(console.error);
  else { navigator.clipboard.writeText(url); alert('Link copied!'); }

window.openComments = async function() {
  if (!currentArticle) return;
  document.getElementById('commentsPopup').classList.add('active');
  document.getElementById('commentsOverlay').classList.add('active');
  await loadComments(currentArticle.id);

window.closeComments = function() {

async function loadComments(id) {
  const list = document.getElementById('commentsList');
  list.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:80px;"><div style="width:28px;height:28px;border:3px solid var(--border-color);border-top-color:var(--accent);border-radius:50%;animation:spin 0.8s linear infinite;"></div></div>';
  try {
    const { data: comments } = await supabase.from('comments').select('*').eq('article_id', id).order('created_at', { ascending: true });
    if (!comments || comments.length === 0) { list.innerHTML = '<div class="no-comments"><i class="fas fa-comments"></i><p>No comments yet</p><span>Be the first to comment!</span></div>'; return; }
    const uids = [...new Set(comments.map(c => c.user_id).filter(Boolean))]; let umap = {};
    if (uids.length > 0) { const { data: u } = await supabase.from('users').select('user_id, username, pfp').in('user_id', uids); if (u) u.forEach(u => { umap[u.user_id] = u; }); }
    list.innerHTML = comments.map(c => { const u = umap[c.user_id], author = u?.username ? `@${u.username}` : 'Anonymous'; const av = u?.pfp ? `<img src="${u.pfp}" alt="${author}">` : (u?.username||'A')[0].toUpperCase(); return `<div class="comment-item"><div class="comment-avatar">${av}</div><div class="comment-content"><div class="comment-author">${author}</div><div class="comment-text">${c.comment_text}</div><div class="comment-time">${formatDate(new Date(c.created_at))}</div></div></div>`; }).join('');
  } catch(e) { list.innerHTML = '<div class="no-comments"><i class="fas fa-exclamation-triangle"></i><p>Failed to load</p></div>'; }
}

window.sendComment = async function() {
  const input = document.getElementById('commentInput'), text = input.value.trim();
  if (!text || !currentArticle) return;
  const btn = document.getElementById('sendCommentBtn'); btn.disabled = true;
  try {
    if (!currentUser) currentUser = await getCurrentUser();
    if (!currentUser) { window.location.href = 'login.html'; return; }
    await supabase.from('comments').insert([{ article_id: currentArticle.id, user_id: currentUser.user_id, comment_text: text }]);
    input.value = ''; await loadComments(currentArticle.id);
    const cc = document.getElementById('commentCount'); cc.textContent = parseInt(cc.textContent)+1;
  } catch(e) { alert('Failed to post comment.'); } finally { btn.disabled = false; }
};

window.openCiteModal = function() {
  if (!currentArticle) return;
  document.getElementById('citeSourceTitle').textContent = currentArticle.title || 'Untitled';
  document.getElementById('citeTitleInput').value = '';
  document.getElementById('citeTitleCounter').textContent = '0 / 60';
  // Reset content blocks to one empty
  const items = document.getElementById('citeContentItems');
  items.innerHTML = `<div class="cite-content-item"><div class="cite-content-block"><div class="cite-editable" contenteditable="true" oninput="citeBlockCounter(this)"></div><div class="cite-block-footer"><span class="cite-block-counter">0 / 200</span><button class="cite-delete-btn" onclick="citeDeleteBlock(this)"><i class="fas fa-trash"></i></button></div></div></div>`;
  document.getElementById('citeProgressOverlay').classList.remove('show');
  document.getElementById('citePublishBtn').disabled = false;
  document.getElementById('citeModalOverlay').classList.add('show');
  setTimeout(() => document.getElementById('citeTitleInput').focus(), 150);
};

window.closeCiteModal = function() {
  document.getElementById('citeModalOverlay').classList.remove('show');
};

async function uploadPdfToStorage(file, articleId) {
  const ext = file.name.split('.').pop();
  const path = `pdfs/${articleId}/${Date.now()}.${ext}`;
  const { error } = await supabase.storage.from('media').upload(path, file, { contentType: 'application/pdf', upsert: false });
  if (error) throw error;
  const { data: urlData } = supabase.storage.from('media').getPublicUrl(path);
  return urlData.publicUrl;
}

window.publishCitation = async function() {
  if (!currentUser || !currentArticle) return;

  const title = document.getElementById('citeTitleInput').value.trim();
  if (!title) { document.getElementById('citeTitleInput').focus(); return; }

  // Validate text blocks
  const editables = document.querySelectorAll('#citeContentItems .cite-editable');
  for (const el of editables) {
    if (el.textContent.length > 200) { el.focus(); return; }
  }

  // Build content string
  const contentLines = [];
  editables.forEach(el => { const t = el.textContent.trim(); if (t) contentLines.push(t); });
  // Append citation reference
  contentLines.push(`[Citing: "${currentArticle.title}" — article.html?id=${currentArticle.id}]`);
  const content = contentLines.join('\n\n');

  // Show progress
  document.getElementById('citePublishBtn').disabled = true;
  document.getElementById('citeProgressOverlay').classList.add('show');
  const setLabel = t => document.getElementById('citeProgressLabel').textContent = t;

  try {
    // 1. Insert new article
    setLabel('Creating article...');
    const { data: newArticle, error: articleErr } = await supabase
      .from('articles')
      .insert([{ title, content, firebase_user_id: currentUser.firebase_uid, views: 0, likes: 0 }])
      .select().single();
    if (articleErr) throw articleErr;

    // 2. Collect and insert media
    setLabel('Uploading media...');
    const mediaEmbeds = document.querySelectorAll('#citeContentItems .cite-media-embed');
    const mediaItems = [];

    for (let i = 0; i < mediaEmbeds.length; i++) {
      const embed = mediaEmbeds[i];
      const caption = embed.querySelector('.cite-media-caption')?.textContent.trim() || '';
      const type = embed.dataset.type;

      if (type === 'pdf') {
        const file = embed._pdfFile;
        if (file) {
          setLabel(`Uploading PDF ${i+1}...`);
          const publicUrl = await uploadPdfToStorage(file, newArticle.id);
          mediaItems.push({ article_id: newArticle.id, type: 'pdf', url: publicUrl, caption, display_order: i });
        }
      } else if (type === 'youtube') {
        const videoId = embed.dataset.videoid;
        if (videoId) mediaItems.push({ article_id: newArticle.id, type: 'youtube', url: `https://www.youtube.com/embed/${videoId}`, caption, display_order: i });
      } else {
        const img = embed.querySelector('img');
        const audio = embed.querySelector('audio');
        if (img) mediaItems.push({ article_id: newArticle.id, type: 'image', url: img.src, caption, display_order: i });
        if (audio) mediaItems.push({ article_id: newArticle.id, type: 'audio', url: audio.src, caption, display_order: i });
      }
    }

    if (mediaItems.length > 0) {
      const { error: mediaErr } = await supabase.from('media').insert(mediaItems);
      if (mediaErr) console.error('Media insert error:', mediaErr);
    }

    // 3. Create a new library for the citation article (named after the new article)
    setLabel('Creating your library...');
    const { data: newLib, error: newLibErr } = await supabase
      .from('playlists')
      .insert([{
        name: title,
        description: `Library for "${title}" — citing "${currentArticle.title}"`,
        user_id: currentUser.user_id
      }])
      .select().single();
    if (newLibErr) throw newLibErr;

    // Add both the new article AND the cited article to the new library
    await supabase.from('playlist_items').insert([
      { playlist_id: newLib.id, article_id: newArticle.id },
      { playlist_id: newLib.id, article_id: currentArticle.id }
    ]);

    // 4. Also add new article to any existing library that contains the cited article
    setLabel('Linking to existing library...');
    const { data: existingItems } = await supabase
      .from('playlist_items')
      .select('playlist_id')
      .eq('article_id', currentArticle.id);

    if (existingItems && existingItems.length > 0) {
      const insertRows = existingItems.map(item => ({
        playlist_id: item.playlist_id,
        article_id: newArticle.id
      }));
      await supabase.from('playlist_items').insert(insertRows);
    }

    setLabel('Done!');
    await new Promise(r => setTimeout(r, 500));
    closeCiteModal();
    window.location.href = `article.html?id=${newArticle.id}`;

  } catch(err) {
    console.error('Citation error:', err);
    document.getElementById('citeProgressOverlay').classList.remove('show');
    document.getElementById('citePublishBtn').disabled = false;
    alert('Failed to create citation: ' + err.message);
  }
};

loadArticle();
